# Simple8 - A Simple 8-bit CPU Example
# This is a minimal example to demonstrate the ISA format

metadata:
  name: "Simple8"
  version: "1.0"
  bits: 8
  address_bits: 16
  endian: little
  undefined_opcode_policy: trap

registers:
  # 8-bit general purpose registers
  - name: "R0"
    type: general
    bits: 8
  - name: "R1"
    type: general
    bits: 8
  - name: "R2"
    type: general
    bits: 8
  - name: "R3"
    type: general
    bits: 8
  - name: "R4"
    type: general
    bits: 8
  - name: "R5"
    type: general
    bits: 8
  - name: "R6"
    type: general
    bits: 8
  - name: "R7"
    type: general
    bits: 8
  
  # Special registers
  - name: "PC"
    type: program_counter
    bits: 16
  - name: "SP"
    type: stack_pointer
    bits: 16
  - name: "A"
    type: general
    bits: 8

flags:
  - name: "Z"    # Zero flag
    bit: 0
  - name: "N"    # Negative flag
    bit: 1
  - name: "P"    # Parity/Overflow flag
    bit: 2
  - name: "S"    # Sign flag
    bit: 3
  - name: "C"    # Carry flag
    bit: 4

memory:
  address_bits: 16
  default_size: 65536

hooks:
  pre_fetch:
    enabled: false
  post_execute:
    enabled: false

instructions:
  # NOP - No operation
  - name: "NOP"
    category: control
    encoding:
      opcode: 0x00
      mask: 0xFF
      length: 1
    cycles: 1
    behavior: |
      (void)cpu;

  # LDA #n - Load immediate into A
  - name: "LDA_IMM"
    category: data_transfer
    encoding:
      opcode: 0x10
      mask: 0xF0
      length: 2
      fields:
        - name: "imm"
          position: [7, 0]
          type: immediate
    cycles: 2
    behavior: |
      cpu->registers[REG_A] = inst->imm;

  # LDR r - Load register into A (r encoded in bits 2-0)
  - name: "LDR"
    category: data_transfer
    encoding:
      opcode: 0x20
      mask: 0xF8
      length: 1
      fields:
        - name: "r"
          position: [2, 0]
    cycles: 1
    behavior: |
      cpu->registers[REG_A] = cpu->registers[inst->r];

  # STR r - Store A to register
  - name: "STR"
    category: data_transfer
    encoding:
      opcode: 0x28
      mask: 0xF8
      length: 1
      fields:
        - name: "r"
          position: [2, 0]
    cycles: 1
    behavior: |
      cpu->registers[inst->r] = cpu->registers[REG_A];

  # ADD r - Add register to A
  - name: "ADD"
    category: arithmetic
    encoding:
      opcode: 0x30
      mask: 0xF8
      length: 1
      fields:
        - name: "r"
          position: [2, 0]
    cycles: 1
    behavior: |
      uint16_t result = cpu->registers[REG_A] + cpu->registers[inst->r];
      cpu->flags.C = ((result > 0xFF));
      cpu->flags.Z = (((result & 0xFF) == 0));
      cpu->flags.N = (((result & 0x80) != 0));
      cpu->registers[REG_A] = result & 0xFF;

  # SUB r - Subtract register from A
  - name: "SUB"
    category: arithmetic
    encoding:
      opcode: 0x38
      mask: 0xF8
      length: 1
      fields:
        - name: "r"
          position: [2, 0]
    cycles: 1
    behavior: |
      uint16_t result = cpu->registers[REG_A] - cpu->registers[inst->r];
      cpu->flags.C = ((result > 0xFF));
      cpu->flags.Z = (((result & 0xFF) == 0));
      cpu->flags.N = (((result & 0x80) != 0));
      cpu->registers[REG_A] = result & 0xFF;

  # INC r - Increment register
  - name: "INC"
    category: arithmetic
    encoding:
      opcode: 0x40
      mask: 0xF8
      length: 1
      fields:
        - name: "r"
          position: [2, 0]
    cycles: 1
    behavior: |
      cpu->registers[inst->r]++;
      cpu->flags.Z = ((cpu->registers[inst->r] == 0));
      cpu->flags.N = (((cpu->registers[inst->r] & 0x80) != 0));

  # DEC r - Decrement register
  - name: "DEC"
    category: arithmetic
    encoding:
      opcode: 0x48
      mask: 0xF8
      length: 1
      fields:
        - name: "r"
          position: [2, 0]
    cycles: 1
    behavior: |
      cpu->registers[inst->r]--;
      cpu->flags.Z = ((cpu->registers[inst->r] == 0));
      cpu->flags.N = (((cpu->registers[inst->r] & 0x80) != 0));

  # JP nn - Jump to address
  - name: "JP"
    category: control
    encoding:
      opcode: 0xC0
      mask: 0xF0
      length: 2
      fields:
        - name: "addr"
          position: [15, 0]
          type: address
    cycles: 3
    behavior: |
      cpu->pc = inst->addr;

  # JPZ nn - Jump if zero
  - name: "JPZ"
    category: control
    encoding:
      opcode: 0xC2
      mask: 0xF0
      length: 2
      fields:
        - name: "addr"
          position: [15, 0]
          type: address
    cycles: 3
    behavior: |
      if (cpu->flags.Z) {
        cpu->pc = inst->addr;
      }

  # JPNZ nn - Jump if not zero
  - name: "JPNZ"
    category: control
    encoding:
      opcode: 0xC4
      mask: 0xF0
      length: 2
      fields:
        - name: "addr"
          position: [15, 0]
          type: address
    cycles: 3
    behavior: |
      if (!cpu->flags.Z) {
        cpu->pc = inst->addr;
      }

  # CALL nn - Call subroutine
  - name: "CALL"
    category: control
    encoding:
      opcode: 0xD0
      mask: 0xF0
      length: 2
      fields:
        - name: "addr"
          position: [15, 0]
          type: address
    cycles: 5
    behavior: |
      cpu->sp--;
      simple8_write_byte(cpu, cpu->sp, (cpu->pc) & 0xFF);
      cpu->sp--;
      simple8_write_byte(cpu, cpu->sp, (cpu->pc >> 8) & 0xFF);
      cpu->pc = inst->addr;

  # RET - Return from subroutine
  - name: "RET"
    category: control
    encoding:
      opcode: 0xD8
      mask: 0xFF
      length: 1
    cycles: 3
    behavior: |
      uint8_t pcl = simple8_read_byte(cpu, cpu->sp);
      cpu->sp++;
      uint8_t pch = simple8_read_byte(cpu, cpu->sp);
      cpu->sp++;
      cpu->pc = pcl | (pch << 8);

  # HALT - Halt execution
  - name: "HALT"
    category: control
    encoding:
      opcode: 0xFF
      mask: 0xFF
      length: 1
    cycles: 1
    behavior: |
      cpu->halted = true;
