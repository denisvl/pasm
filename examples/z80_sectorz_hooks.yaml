# Z80 ISA example for PASM
#
# This file provides broad Z80 coverage, including prefixed spaces and
# block I/O operations, with deterministic undefined-opcode handling.
# It is structured to exercise the generator end-to-end:
# - rich register set
# - flags
# - memory, ports, interrupts
# - a mix of simple, masked, prefixed, and multi-byte encodings

metadata:
  name: "Z80"
  version: "0.1"
  bits: 8
  address_bits: 16
  endian: little
  undefined_opcode_policy: trap

registers:
  # 8-bit primary registers
  - name: "A"
    type: general
    bits: 8
  - name: "B"
    type: general
    bits: 8
  - name: "C"
    type: general
    bits: 8
  - name: "D"
    type: general
    bits: 8
  - name: "E"
    type: general
    bits: 8
  - name: "H"
    type: general
    bits: 8
  - name: "L"
    type: general
    bits: 8

  # Shadow registers (represented as general for now)
  - name: "A_PRIME"
    type: general
    bits: 8
  - name: "B_PRIME"
    type: general
    bits: 8
  - name: "C_PRIME"
    type: general
    bits: 8
  - name: "D_PRIME"
    type: general
    bits: 8
  - name: "E_PRIME"
    type: general
    bits: 8
  - name: "H_PRIME"
    type: general
    bits: 8
  - name: "L_PRIME"
    type: general
    bits: 8

  # Special registers
  - name: "I"
    type: special
    bits: 8
  - name: "R"
    type: special
    bits: 8

  # Index registers
  - name: "IX"
    type: index
    bits: 16
  - name: "IY"
    type: index
    bits: 16

  # Program counter and stack pointer
  - name: "PC"
    type: program_counter
    bits: 16
  - name: "SP"
    type: stack_pointer
    bits: 16

flags:
  - name: "S"    # Sign
    bit: 0
  - name: "Z"    # Zero
    bit: 1
  - name: "H"    # Half carry
    bit: 2
  - name: "P"    # Parity/overflow
    bit: 3
  - name: "N"    # Subtract
    bit: 4
  - name: "C"    # Carry
    bit: 5

memory:
  address_bits: 16
  default_size: 65536
  regions:
    - name: "RAM_LOW"
      start: 0x0000
      size: 0x9000
      read_write: true
    - name: "ROM"
      start: 0x9000
      size: 0x1000
      read_only: true
    - name: "RAM_HIGH"
      start: 0xA000
      size: 0x6000
      read_write: true

ports:
  address_bits: 8
  size: 256

interrupts:
  model: z80
  modes:
    - name: "IM0"
    - name: "IM1"
    - name: "IM2"
  vector_table: true
  vector_size: 2

hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: true

instructions:
  # NOP
  - name: "NOP"
    display: "NOP"
    category: control
    encoding:
      opcode: 0x00
      mask: 0xFF
      length: 1
    cycles: 4
    behavior: |
      (void)cpu;

  # LD A, n (immediate 8-bit)
  - name: "LD_A_N"
    display: "LD A, n"
    category: data_transfer
    encoding:
      opcode: 0x3E
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_A] = inst->n;

  # LD B, n (immediate 8-bit)
  - name: "LD_B_N"
    display: "LD B, n"
    category: data_transfer
    encoding:
      opcode: 0x06
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_B] = inst->n;

  # LD C, n (immediate 8-bit)
  - name: "LD_C_N"
    display: "LD C, n"
    category: data_transfer
    encoding:
      opcode: 0x0E
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_C] = inst->n;

  # LD D, n (immediate 8-bit)
  - name: "LD_D_N"
    display: "LD D, n"
    category: data_transfer
    encoding:
      opcode: 0x16
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_D] = inst->n;

  # LD E, n (immediate 8-bit)
  - name: "LD_E_N"
    display: "LD E, n"
    category: data_transfer
    encoding:
      opcode: 0x1E
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_E] = inst->n;

  # LD H, n (immediate 8-bit)
  - name: "LD_H_N"
    display: "LD H, n"
    category: data_transfer
    encoding:
      opcode: 0x26
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_H] = inst->n;

  # LD L, n (immediate 8-bit)
  - name: "LD_L_N"
    display: "LD L, n"
    category: data_transfer
    encoding:
      opcode: 0x2E
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 7
    behavior: |
      cpu->registers[REG_L] = inst->n;

  # LD IX, nn
  - name: "LD_IX_NN"
    display: "LD IX, nn"
    category: data_transfer
    encoding:
      prefix: 0xDD
      opcode: 0x21
      mask: 0xFF
      length: 4
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 14
    behavior: |
      cpu->ix = inst->addr;

  # LD IY, nn
  - name: "LD_IY_NN"
    display: "LD IY, nn"
    category: data_transfer
    encoding:
      prefix: 0xFD
      opcode: 0x21
      mask: 0xFF
      length: 4
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 14
    behavior: |
      cpu->iy = inst->addr;

  # LD SP, nn
  - name: "LD_SP_NN"
    display: "LD SP, nn"
    category: data_transfer
    encoding:
      opcode: 0x31
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 10
    behavior: |
      cpu->sp = inst->addr;

  # LD SP, HL
  - name: "LD_SP_HL"
    display: "LD SP, HL"
    category: data_transfer
    encoding:
      opcode: 0xF9
      mask: 0xFF
      length: 1
    cycles: 6
    behavior: |
      cpu->sp = (uint16_t)((cpu->registers[REG_H] << 8) | cpu->registers[REG_L]);

  # LD SP, IX
  - name: "LD_SP_IX"
    display: "LD SP, IX"
    category: data_transfer
    encoding:
      prefix: 0xDD
      opcode: 0xF9
      mask: 0xFF
      length: 2
    cycles: 10
    behavior: |
      cpu->sp = cpu->ix;

  # LD SP, IY
  - name: "LD_SP_IY"
    display: "LD SP, IY"
    category: data_transfer
    encoding:
      prefix: 0xFD
      opcode: 0xF9
      mask: 0xFF
      length: 2
    cycles: 10
    behavior: |
      cpu->sp = cpu->iy;

  # LD BC, nn
  - name: "LD_BC_NN"
    display: "LD BC, nn"
    category: data_transfer
    encoding:
      opcode: 0x01
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 10
    behavior: |
      cpu->registers[REG_B] = (uint8_t)(inst->addr >> 8);
      cpu->registers[REG_C] = (uint8_t)(inst->addr & 0xFF);

  # LD DE, nn
  - name: "LD_DE_NN"
    display: "LD DE, nn"
    category: data_transfer
    encoding:
      opcode: 0x11
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 10
    behavior: |
      cpu->registers[REG_D] = (uint8_t)(inst->addr >> 8);
      cpu->registers[REG_E] = (uint8_t)(inst->addr & 0xFF);

  # INC ss (BC, DE, HL, SP)
  - name: "INC_SS"
    display: "INC ss"
    category: arithmetic
    encoding:
      opcode: 0x03
      mask: 0xCF
      length: 1
      fields:
        - name: "ss"
          position: [5, 4]
          type: immediate
    cycles: 6
    behavior: |
      uint8_t ss = inst->ss & 0x03;
      if (ss == 0) {
        uint16_t bc = (uint16_t)((cpu->registers[REG_B] << 8) | cpu->registers[REG_C]);
        bc++;
        cpu->registers[REG_B] = (uint8_t)(bc >> 8);
        cpu->registers[REG_C] = (uint8_t)(bc & 0xFF);
      } else if (ss == 1) {
        uint16_t de = (uint16_t)((cpu->registers[REG_D] << 8) | cpu->registers[REG_E]);
        de++;
        cpu->registers[REG_D] = (uint8_t)(de >> 8);
        cpu->registers[REG_E] = (uint8_t)(de & 0xFF);
      } else if (ss == 2) {
        uint16_t hl = (uint16_t)((cpu->registers[REG_H] << 8) | cpu->registers[REG_L]);
        hl++;
        cpu->registers[REG_H] = (uint8_t)(hl >> 8);
        cpu->registers[REG_L] = (uint8_t)(hl & 0xFF);
      } else {
        cpu->sp++;
      }

  # DEC ss (BC, DE, HL, SP)
  - name: "DEC_SS"
    display: "DEC ss"
    category: arithmetic
    encoding:
      opcode: 0x0B
      mask: 0xCF
      length: 1
      fields:
        - name: "ss"
          position: [5, 4]
          type: immediate
    cycles: 6
    behavior: |
      uint8_t ss = inst->ss & 0x03;
      if (ss == 0) {
        uint16_t bc = (uint16_t)((cpu->registers[REG_B] << 8) | cpu->registers[REG_C]);
        bc--;
        cpu->registers[REG_B] = (uint8_t)(bc >> 8);
        cpu->registers[REG_C] = (uint8_t)(bc & 0xFF);
      } else if (ss == 1) {
        uint16_t de = (uint16_t)((cpu->registers[REG_D] << 8) | cpu->registers[REG_E]);
        de--;
        cpu->registers[REG_D] = (uint8_t)(de >> 8);
        cpu->registers[REG_E] = (uint8_t)(de & 0xFF);
      } else if (ss == 2) {
        uint16_t hl = (uint16_t)((cpu->registers[REG_H] << 8) | cpu->registers[REG_L]);
        hl--;
        cpu->registers[REG_H] = (uint8_t)(hl >> 8);
        cpu->registers[REG_L] = (uint8_t)(hl & 0xFF);
      } else {
        cpu->sp--;
      }

  # INC IX
  - name: "INC_IX"
    display: "INC IX"
    category: arithmetic
    encoding:
      prefix: 0xDD
      opcode: 0x23
      mask: 0xFF
      length: 2
    cycles: 10
    behavior: |
      cpu->ix = (uint16_t)(cpu->ix + 1u);

  # DEC IX
  - name: "DEC_IX"
    display: "DEC IX"
    category: arithmetic
    encoding:
      prefix: 0xDD
      opcode: 0x2B
      mask: 0xFF
      length: 2
    cycles: 10
    behavior: |
      cpu->ix = (uint16_t)(cpu->ix - 1u);

  # INC IY
  - name: "INC_IY"
    display: "INC IY"
    category: arithmetic
    encoding:
      prefix: 0xFD
      opcode: 0x23
      mask: 0xFF
      length: 2
    cycles: 10
    behavior: |
      cpu->iy = (uint16_t)(cpu->iy + 1u);

  # DEC IY
  - name: "DEC_IY"
    display: "DEC IY"
    category: arithmetic
    encoding:
      prefix: 0xFD
      opcode: 0x2B
      mask: 0xFF
      length: 2
    cycles: 10
    behavior: |
      cpu->iy = (uint16_t)(cpu->iy - 1u);

  # LD HL, nn
  - name: "LD_HL_NN"
    display: "LD HL, (nn)"
    category: data_transfer
    encoding:
      opcode: 0x21
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 10
    behavior: |
      cpu->registers[REG_H] = (uint8_t)(inst->addr >> 8);
      cpu->registers[REG_L] = (uint8_t)(inst->addr & 0xFF);

  # LD (nn), A
  - name: "LD_NN_A"
    display: "LD (nn), A"
    category: data_transfer
    encoding:
      opcode: 0x32
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 13
    behavior: |
      z80_write_byte(cpu, inst->addr, cpu->registers[REG_A]);

  # LD (BC), A
  - name: "LD_BCI_A"
    display: "LD (BC), A"
    category: data_transfer
    encoding:
      opcode: 0x02
      mask: 0xFF
      length: 1
    cycles: 7
    behavior: |
      uint16_t addr = (uint16_t)((cpu->registers[REG_B] << 8) | cpu->registers[REG_C]);
      z80_write_byte(cpu, addr, cpu->registers[REG_A]);

  # LD (DE), A
  - name: "LD_DEI_A"
    display: "LD (DE), A"
    category: data_transfer
    encoding:
      opcode: 0x12
      mask: 0xFF
      length: 1
    cycles: 7
    behavior: |
      uint16_t addr = (uint16_t)((cpu->registers[REG_D] << 8) | cpu->registers[REG_E]);
      z80_write_byte(cpu, addr, cpu->registers[REG_A]);

  # LD A, (nn)
  - name: "LD_A_NN"
    display: "LD A, (nn)"
    category: data_transfer
    encoding:
      opcode: 0x3A
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 13
    behavior: |
      cpu->registers[REG_A] = z80_read_byte(cpu, inst->addr);

  # LD A, (BC)
  - name: "LD_A_BCI"
    display: "LD A, (BC)"
    category: data_transfer
    encoding:
      opcode: 0x0A
      mask: 0xFF
      length: 1
    cycles: 7
    behavior: |
      uint16_t addr = (uint16_t)((cpu->registers[REG_B] << 8) | cpu->registers[REG_C]);
      cpu->registers[REG_A] = z80_read_byte(cpu, addr);

  # LD A, (DE)
  - name: "LD_A_DEI"
    display: "LD A, (DE)"
    category: data_transfer
    encoding:
      opcode: 0x1A
      mask: 0xFF
      length: 1
    cycles: 7
    behavior: |
      uint16_t addr = (uint16_t)((cpu->registers[REG_D] << 8) | cpu->registers[REG_E]);
      cpu->registers[REG_A] = z80_read_byte(cpu, addr);

  # LD (HL), n
  - name: "LD_HLI_N"
    display: "LD (HL), n"
    category: data_transfer
    encoding:
      opcode: 0x36
      mask: 0xFF
      length: 2
      fields:
        - name: "n"
          position: [15, 8]
          type: immediate
    cycles: 10
    behavior: |
      uint16_t addr = (uint16_t)((cpu->registers[REG_H] << 8) | cpu->registers[REG_L]);
      z80_write_byte(cpu, addr, inst->n);

  # LD (nn), HL
  - name: "LD_NN_HL"
    display: "LD (nn), HL"
    category: data_transfer
    encoding:
      opcode: 0x22
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 16
    behavior: |
      z80_write_byte(cpu, inst->addr, cpu->registers[REG_L]);
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), cpu->registers[REG_H]);

  # LD HL, (nn)
  - name: "LD_HL_NN_IND"
    display: "LD HL, (nn)"
    category: data_transfer
    encoding:
      opcode: 0x2A
      mask: 0xFF
      length: 3
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 16
    behavior: |
      cpu->registers[REG_L] = z80_read_byte(cpu, inst->addr);
      cpu->registers[REG_H] = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));

  # LD (nn), IX
  - name: "LD_NN_IX"
    display: "LD (nn), IX"
    category: data_transfer
    encoding:
      prefix: 0xDD
      opcode: 0x22
      mask: 0xFF
      length: 4
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 20
    behavior: |
      z80_write_byte(cpu, inst->addr, (uint8_t)(cpu->ix & 0x00FF));
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), (uint8_t)((cpu->ix >> 8) & 0x00FF));

  # LD IX, (nn)
  - name: "LD_IX_NN_IND"
    display: "LD IX, (nn)"
    category: data_transfer
    encoding:
      prefix: 0xDD
      opcode: 0x2A
      mask: 0xFF
      length: 4
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 20
    behavior: |
      uint8_t lo = z80_read_byte(cpu, inst->addr);
      uint8_t hi = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));
      cpu->ix = (uint16_t)(lo | ((uint16_t)hi << 8));

  # LD (nn), IY
  - name: "LD_NN_IY"
    display: "LD (nn), IY"
    category: data_transfer
    encoding:
      prefix: 0xFD
      opcode: 0x22
      mask: 0xFF
      length: 4
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 20
    behavior: |
      z80_write_byte(cpu, inst->addr, (uint8_t)(cpu->iy & 0x00FF));
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), (uint8_t)((cpu->iy >> 8) & 0x00FF));

  # LD IY, (nn)
  - name: "LD_IY_NN_IND"
    display: "LD IY, (nn)"
    category: data_transfer
    encoding:
      prefix: 0xFD
      opcode: 0x2A
      mask: 0xFF
      length: 4
      fields:
        - name: "addr"
          position: [23, 8]
          type: address
    cycles: 20
    behavior: |
      uint8_t lo = z80_read_byte(cpu, inst->addr);
      uint8_t hi = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));
      cpu->iy = (uint16_t)(lo | ((uint16_t)hi << 8));

  # LD (nn), BC (ED 43)
  - name: "LD_NN_BC_ED"
    display: "LD (nn), BC"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x43
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      z80_write_byte(cpu, inst->addr, cpu->registers[REG_C]);
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), cpu->registers[REG_B]);

  # LD (nn), DE (ED 53)
  - name: "LD_NN_DE_ED"
    display: "LD (nn), DE"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x53
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      z80_write_byte(cpu, inst->addr, cpu->registers[REG_E]);
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), cpu->registers[REG_D]);

  # LD (nn), HL (ED 63)
  - name: "LD_NN_HL_ED"
    display: "LD (nn), HL"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x63
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      z80_write_byte(cpu, inst->addr, cpu->registers[REG_L]);
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), cpu->registers[REG_H]);

  # LD (nn), SP (ED 73)
  - name: "LD_NN_SP_ED"
    display: "LD (nn), SP"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x73
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      z80_write_byte(cpu, inst->addr, (uint8_t)(cpu->sp & 0xFF));
      z80_write_byte(cpu, (uint16_t)(inst->addr + 1), (uint8_t)(cpu->sp >> 8));

  # LD BC, (nn) (ED 4B)
  - name: "LD_BC_NN_IND_ED"
    display: "LD BC, (nn)"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x4B
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      cpu->registers[REG_C] = z80_read_byte(cpu, inst->addr);
      cpu->registers[REG_B] = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));

  # LD DE, (nn) (ED 5B)
  - name: "LD_DE_NN_IND_ED"
    display: "LD DE, (nn)"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x5B
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      cpu->registers[REG_E] = z80_read_byte(cpu, inst->addr);
      cpu->registers[REG_D] = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));

  # LD HL, (nn) (ED 6B)
  - name: "LD_HL_NN_IND_ED"
    display: "LD HL, (nn)"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x6B
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
      cpu->registers[REG_L] = z80_read_byte(cpu, inst->addr);
      cpu->registers[REG_H] = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));

  # LD SP, (nn) (ED 7B)
  - name: "LD_SP_NN_IND_ED"
    display: "LD SP, (nn)"
    category: data_transfer
    encoding:
      opcode: 0xED
      subop: 0x7B
      length: 4
      fields:
        - name: "addr"
          position: [31, 16]
          type: address
    cycles: 20
    behavior: |
