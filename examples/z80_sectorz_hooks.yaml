  # LD r, r' in DD space with IXH/IXL substitution (undocumented forms included)
  # Memory and HALT forms are matched by earlier DD-specific entries.
  - name: "LD_R_IXHIXL_DD"
    display: "LD r, r' (DD)"
    category: data_transfer
    encoding:
      prefix: 0xDD
      opcode: 0x40
      mask: 0xC0
      length: 2
      fields:
        - name: "rd"
          position: [5, 3]
          type: register
        - name: "rs"
          position: [2, 0]
          type: register
    cycles: 8
    behavior: |
      uint8_t rd = inst->rd & 0x07;
      uint8_t rs = inst->rs & 0x07;
      uint8_t ixh = (uint8_t)(cpu->ix >> 8);
      uint8_t ixl = (uint8_t)(cpu->ix & 0xFF);
      uint8_t value = 0;

      if (rd == 6 || rs == 6 || (rd == 7 && rs == 6)) {
        /* (IX+d) and HALT forms are handled by earlier DD matches. */
        return;
      }

      if (rs == 0) value = cpu->registers[REG_B];
      else if (rs == 1) value = cpu->registers[REG_C];
      else if (rs == 2) value = cpu->registers[REG_D];
      else if (rs == 3) value = cpu->registers[REG_E];
      else if (rs == 4) value = ixh;
      else if (rs == 5) value = ixl;
      else value = cpu->registers[REG_A];

      if (rd == 0) cpu->registers[REG_B] = value;
      else if (rd == 1) cpu->registers[REG_C] = value;
      else if (rd == 2) cpu->registers[REG_D] = value;
      else if (rd == 3) cpu->registers[REG_E] = value;
