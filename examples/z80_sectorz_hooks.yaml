      cpu->flags.Z = (cpu->registers[REG_B] == 0);
      cpu->flags.H = (hc);
      cpu->flags.P = (cpu_parity((uint8_t)((sum & 0x07u) ^ cpu->registers[REG_B])));
      cpu->flags.N = ((value & 0x80) != 0);
      cpu->flags.C = (hc);

