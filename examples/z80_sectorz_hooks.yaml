  # LD r, r' in FD space with IYH/IYL substitution (undocumented forms included)
  # Memory and HALT forms are matched by earlier FD-specific entries.
  - name: "LD_R_IYHIYL_FD"
    display: "LD r, r' (FD)"
    category: data_transfer
    encoding:
      prefix: 0xFD
      opcode: 0x40
      mask: 0xC0
      length: 2
      fields:
        - name: "rd"
          position: [5, 3]
          type: register
        - name: "rs"
          position: [2, 0]
          type: register
    cycles: 8
    behavior: |
      uint8_t rd = inst->rd & 0x07;
      uint8_t rs = inst->rs & 0x07;
      uint8_t iyh = (uint8_t)(cpu->iy >> 8);
      uint8_t iyl = (uint8_t)(cpu->iy & 0xFF);
      uint8_t value = 0;

      if (rd == 6 || rs == 6 || (rd == 7 && rs == 6)) {
        /* (IY+d) and HALT forms are handled by earlier FD matches. */
        return;
