    init: "do {\n    if (comp->host_inited != 0u) break;\n    {\n        const char\
      \ *disable_dead = cpu_host_hal_getenv(\"PASM_DISABLE_DEADKEYS\");\n        if\
      \ (disable_dead == NULL || disable_dead[0] != '0') {\n            #if defined(__linux__)\n\
      \            /* Keep scancode flow deterministic by disabling XIM dead-key composition\
      \ for this process. */\n            setenv(\"XMODIFIERS\", \"@im=none\", 1);\n\
      \            setenv(\"GTK_IM_MODULE\", \"xim\", 0);\n            setenv(\"QT_IM_MODULE\"\
      , \"xim\", 0);\n            #endif\n        }\n    }\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO\
      \ | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) {\n        break;\n  \
      \  }\n    comp->window = cpu_host_hal_create_window(\n        \"PASM TRS-80\
      \ Model 4\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n        CPU_HOST_WINDOWPOS_CENTERED,\n\
      \        384,\n        128,\n        CPU_HOST_WINDOW_RESIZABLE\n    );\n   \
      \ if (comp->window == NULL) break;\n    comp->renderer = cpu_host_hal_create_renderer(comp->window,\
      \ -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n \
      \       comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n\
      \    }\n    if (comp->renderer == NULL) break;\n    {\n        static const\
      \ char *apple2_crt_vertex_shader =\n            \"#version 330 core\\n\"\n \
      \           \"layout (location = 0) in vec3 aPos;\\n\"\n            \"layout\
      \ (location = 1) in vec2 aTexCoords;\\n\"\n            \"out vec2 TexCoords;\\\
      n\"\n            \"void main() {\\n\"\n            \"    TexCoords = aTexCoords;\\\
      n\"\n            \"    gl_Position = vec4(aPos, 1.0);\\n\"\n            \"}\\\
      n\";\n        static const char *apple2_crt_green_fragment_shader =\n      \
      \      \"#version 330 core\\n\"\n            \"out vec4 FragColor;\\n\"\n  \
      \          \"in vec2 TexCoords;\\n\"\n            \"uniform sampler2D screenTexture;\\\
      n\"\n            \"uniform vec2 sourceResolution;\\n\"\n            \"const float CURVATURE = 6.0;\\n\"\n            \"const float SCANLINE_WEIGHT = 0.15;\\n\"\n            \"const float MASK_DARKNESS = 0.15;\\n\"\n            \"const vec3 PHOSPHOR_COLOR = vec3(0.12, 1.0, 0.18);\\n\"\n            \"vec2 curve(vec2\
      \ coord) {\\n\"\n            \"    coord = coord * 2.0 - 1.0;\\n\"\n       \
      \     \"    coord.x *= 1.0 + pow((abs(coord.y) / CURVATURE), 2.0);\\n\"\n  \
      \          \"    coord.y *= 1.0 + pow((abs(coord.x) / CURVATURE), 2.0);\\n\"\
      \n            \"    return coord * 0.5 + 0.5;\\n\"\n            \"}\\n\"\n \
      \           \"void main() {\\n\"\n            \"    vec2 crtUV = curve(TexCoords);\\\
      n\"\n            \"    if (crtUV.x < 0.0 || crtUV.x > 1.0 || crtUV.y < 0.0 ||\
      \ crtUV.y > 1.0) {\\n\"\n            \"        FragColor = vec4(0.0, 0.0, 0.0,\
      \ 1.0);\\n\"\n            \"        return;\\n\"\n            \"    }\\n\"\n\
      \            \"    vec3 src = texture(screenTexture, crtUV).rgb;\\n\"\n    \
      \        \"    float luma = dot(src, vec3(0.30, 0.59, 0.11));\\n\"\n       \
      \     \"    vec3 baseColor = luma * PHOSPHOR_COLOR;\\n\"\n            \"   \
      \ float scanline = sin(crtUV.y * sourceResolution.y * 3.14159265) * SCANLINE_WEIGHT;\\\
      n\"\n            \"    baseColor -= vec3(scanline);\\n\"\n            \"   \
      \ float mask = 1.0 - (MASK_DARKNESS * (1.0 - step(0.5, fract(gl_FragCoord.x\
      \ / 3.0))));\\n\"\n            \"    baseColor *= mask;\\n\"\n            \"\
      \    baseColor *= 1.25;\\n\"\n            \"    FragColor = vec4(baseColor,\
      \ 1.0);\\n\"\n            \"}\\n\";\n        comp->display_shader = cpu_host_hal_shader_create(comp->renderer,\
      \ apple2_crt_vertex_shader, apple2_crt_green_fragment_shader);\n    }\n    /*\
      \ Use scancodes only (SDL text-input is layout/dead-key dependent). */\n   \
      \ cpu_host_hal_stop_text_input();\n    comp->texture = cpu_host_hal_create_texture(\n\
      \        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n\
      \        384,\n        128\n    );\n    if (comp->texture == NULL) break;\n\
      \    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\"\
      );\n        if (audio_env == NULL || audio_env[0] != '0') {\n            CPUHostAudioSpec\
      \ want;\n            CPUHostAudioSpec have;\n            cpu_host_audio_spec_zero(&want);\n\
      \            cpu_host_audio_spec_zero(&have);\n            want.freq = (CPU_AUDIO_SAMPLE_RATE\
      \ > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n\
      \            want.channels = 1;\n            want.samples = 512;\n         \
      \   want.callback = NULL;\n            comp->audio_device_samples = 0u;\n  \
      \                  comp->audio_channels = 0u;\n            comp->audio_out_dev\
      \ = cpu_host_hal_audio_open(NULL, 0, &want, &have, CPU_HOST_AUDIO_ALLOW_CHANNELS_CHANGE\
      \ |\n                    CPU_HOST_AUDIO_ALLOW_SAMPLES_CHANGE);\n           \
      \ if (comp->audio_out_dev != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16\
      \ && have.channels <= 2u && have.channels >= 1u) {\n                uint32_t\
      \ ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq * 2u) : 88200u;\n \
      \               if (ring_capacity < 8192u) ring_capacity = 8192u;\n        \
      \        comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity\
      \ * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n   \
      \                 comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq :\
      \ 44100u;\n                    comp->audio_device_samples = (uint32_t)have.samples\
      \ * (uint32_t)have.channels;\n                    comp->audio_channels = (uint32_t)have.channels;\n\
      \                    comp->audio_ring_capacity = ring_capacity;\n          \
      \          comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx\
      \ = 0u;\n                    comp->audio_ring_fill = 0u;\n                 \
      \   comp->audio_out_ready = 1u;\n                    cpu_host_hal_audio_pause(comp->audio_out_dev,\
      \ 0);\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                    comp->audio_out_dev = 0u;\n                    comp->audio_device_samples\
      \ = 0u;\n                    comp->audio_channels = 0u;\n                }\n\
      \            } else if (comp->audio_out_dev != 0u) {\n                cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                comp->audio_out_dev = 0u;\n                comp->audio_device_samples\
      \ = 0u;\n                    comp->audio_channels = 0u;\n            }\n   \
      \     }\n    }\n    comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      \    comp->last_focus_state = comp->has_keyboard_focus;\n    if (comp->window\
      \ != NULL && comp->has_keyboard_focus == 0u) {\n        cpu_host_hal_raise_window(comp->window);\n\
      \    }\n    comp->host_inited = 1u;\n} while (0);\n"
    reset: "comp->row0 = 0xFFu;\ncomp->row1 = 0xFFu;\ncomp->row2 = 0xFFu;\ncomp->row3\
      \ = 0xFFu;\ncomp->row4 = 0xFFu;\ncomp->row5 = 0xFFu;\ncomp->row6 = 0xFFu;\n\
      comp->row7 = 0xFFu;\ncomp->frame_count = 0u;\ncomp->irq_edges = 0u;\ncomp->audio_samples\
      \ = 0u;\ncomp->audio_level = 0;\ncomp->audio_last_cycle = 0u;\ncomp->audio_sample_cursor\
      \ = 0u;\ncomp->audio_ring_read_idx = 0u;\ncomp->audio_ring_write_idx = 0u;\n\
      comp->audio_ring_fill = 0u;\ncomp->last_event_poll_cycle = 0u;\ncomp->overlay_last_ms\
      \ = 0u;\ncomp->overlay_last_frame_count = 0u;\ncomp->overlay_last_cycle_count\
      \ = 0u;\ncomp->overlay_fps_x100 = 0u;\ncomp->overlay_cpu_hz = 0u;\ncomp->overlay_cpu_pct_x10\
      \ = 0u;\nif (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_clear(comp->audio_out_dev);\n\
      }\n\ncomp->display_shader_supported = (comp->display_shader != NULL) ? -1 :\
      \ 0;\n"
    step_post: "if (comp->host_inited == 0u) return;\nstatic int kb_trace = -1;\n\
      static FILE *kb_trace_fp = NULL;\nif (kb_trace < 0) {\n    const char *trace_env\
      \ = cpu_host_hal_getenv(\"PASM_TRS80_KB_TRACE\");\n    kb_trace = (trace_env\
      \ != NULL && trace_env[0] != '\\0' && trace_env[0] != '0') ? 1 : 0;\n    if\
      \ (kb_trace != 0) {\n        const char *trace_file = cpu_host_hal_getenv(\"\
      PASM_TRS80_KB_TRACE_FILE\");\n        if (trace_file == NULL || trace_file[0]\
      \ == '\\0') trace_file = \"trs80_kb_trace.log\";\n        kb_trace_fp = fopen(trace_file,\
      \ \"a\");\n    }\n}\nuint64_t now = cpu->total_cycles;\nif ((now - comp->last_event_poll_cycle)\
      \ < 2048u) return;\ncomp->last_event_poll_cycle = now;\nCPUHostEvent ev;\nwhile\
      \ (cpu_host_hal_poll_event(&ev)) {\n    if (cpu_host_hal_event_type(&ev) ==\
      \ CPU_HOST_EVENT_QUIT) {\n        cpu->running = false;\n        cpu->halted\
      \ = true;\n    } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN\
      \ || cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {\n        if (kb_trace\
      \ != 0 && kb_trace_fp != NULL) {\n            int32_t sc = cpu_host_hal_event_scancode(&ev);\n\
      \            fprintf(\n                kb_trace_fp,\n                \"trs80-kb\
      \ event=%s sc=%d name=%s repeat=%u focus=%u\\n\",\n                (cpu_host_hal_event_type(&ev)\
      \ == CPU_HOST_EVENT_KEYDOWN) ? \"down\" : \"up\",\n                (int)sc,\n\
      \                cpu_host_hal_scancode_name(sc),\n                (unsigned)cpu_host_hal_event_key_repeat(&ev),\n\
      \                (unsigned)comp->has_keyboard_focus\n            );\n      \
      \      fflush(kb_trace_fp);\n        }\n    }\n}\ncpu_host_hal_pump_events();\n\
      comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\nif\
      \ (comp->has_keyboard_focus != comp->last_focus_state) {\n    comp->last_focus_state\
      \ = comp->has_keyboard_focus;\n    if (comp->window != NULL) {\n        cpu_host_hal_set_window_title(\n\
      \            comp->window,\n            (comp->has_keyboard_focus != 0u) ? \"\
      PASM TRS-80 Model 4 [FOCUS]\" : \"PASM TRS-80 Model 4 [NO-FOCUS]\"\n       \
      \ );\n    }\n}\n{\n    pasm_overlay_update_perf(\n        cpu_host_hal_ticks_ms(),\n\
      \        (uint64_t)comp->frame_count,\n        cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n\
      \        &comp->overlay_last_ms,\n        &comp->overlay_last_frame_count,\n\
      \        &comp->overlay_last_cycle_count,\n        &comp->overlay_fps_x100,\n\
      \        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n    );\n\
      }\nint key_count = 0;\nconst uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n\
      if (ks == NULL || key_count <= 0) return;\nuint8_t rows[8] = {\n    0xFFu, 0xFFu,\
      \ 0xFFu, 0xFFu,\n    0xFFu, 0xFFu, 0xFFu, 0xFFu\n};\ncpu_component_apply_declared_keymap(\n\
      \    cpu,\n    \"host_trs80\",\n    ks,\n    (size_t)key_count,\n    rows,\n\
      \    8u,\n    comp->has_keyboard_focus\n);\n{\n    if (kb_trace != 0 && kb_trace_fp\
      \ != NULL) {\n        uint8_t changed = 0u;\n        if (\n            rows[0]\
      \ != comp->row0 || rows[1] != comp->row1 || rows[2] != comp->row2 || rows[3]\
      \ != comp->row3 ||\n            rows[4] != comp->row4 || rows[5] != comp->row5\
      \ || rows[6] != comp->row6 || rows[7] != comp->row7\n        ) {\n         \
      \   changed = 1u;\n        }\n        if (changed != 0u) {\n            fprintf(\n\
      \                kb_trace_fp,\n                \"trs80-kb matrix focus=%u rows=[%02X\
      \ %02X %02X %02X %02X %02X %02X %02X]\\n\",\n                (unsigned)comp->has_keyboard_focus,\n\
      \                (unsigned)rows[0], (unsigned)rows[1], (unsigned)rows[2], (unsigned)rows[3],\n\
      \                (unsigned)rows[4], (unsigned)rows[5], (unsigned)rows[6], (unsigned)rows[7]\n\
      \            );\n            fflush(kb_trace_fp);\n        }\n    }\n}\ncomp->row0\
      \ = rows[0];\ncomp->row1 = rows[1];\ncomp->row2 = rows[2];\ncomp->row3 = rows[3];\n\
      comp->row4 = rows[4];\ncomp->row5 = rows[5];\ncomp->row6 = rows[6];\ncomp->row7\
      \ = rows[7];\nif (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u &&\
      \ comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {\n    uint32_t channels\
      \ = (comp->audio_channels > 0u) ? comp->audio_channels : 1u;\n    if (channels\
      \ > 2u) channels = 2u;\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev)\
      \ / (uint32_t)sizeof(int16_t);\n    uint32_t queued_frames = queued_samples\
      \ / channels;\n    uint32_t device_samples = (comp->audio_device_samples > 0u)\
      \ ? comp->audio_device_samples : 512u;\n    uint32_t device_frames = device_samples\
      \ / channels;\n    if (device_frames == 0u) device_frames = 512u;\n    uint32_t\
      \ low_watermark = device_frames * 2u;\n    uint32_t target_total = device_frames\
      \ * 4u;\n    uint32_t max_total = device_frames * 8u;\n    uint32_t total_backlog\
      \ = queued_frames + comp->audio_ring_fill;\n    if (total_backlog > max_total)\
      \ {\n        uint32_t drop = total_backlog - max_total;\n        if (drop >\
      \ comp->audio_ring_fill) {\n            drop = comp->audio_ring_fill;\n    \
      \    }\n        if (drop > 0u) {\n            comp->audio_ring_read_idx = (comp->audio_ring_read_idx\
      \ + drop) % comp->audio_ring_capacity;\n            comp->audio_ring_fill -=\
      \ drop;\n        }\n    }\n    if (queued_frames < low_watermark) {\n      \
      \  uint32_t desired = target_total - queued_frames;\n        uint32_t to_send\
      \ = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;\n \
      \       while (to_send > 0u) {\n            int16_t chunk[1024];\n         \
      \   uint32_t max_frames = 1024u / channels;\n            uint32_t n = (to_send\
      \ > max_frames) ? max_frames : to_send;\n            uint32_t out = 0u;\n  \
      \          if (n == 0u) break;\n            for (uint32_t i = 0u; i < n; ++i)\
      \ {\n                int16_t sample = comp->audio_ring[comp->audio_ring_read_idx];\n\
      \                for (uint32_t ch = 0u; ch < channels; ++ch) {\n           \
      \         chunk[out++] = sample;\n                }\n                comp->audio_ring_read_idx\
      \ += 1u;\n                if (comp->audio_ring_read_idx >= comp->audio_ring_capacity)\
      \ comp->audio_ring_read_idx = 0u;\n            }\n            comp->audio_ring_fill\
      \ -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk,\
      \ out * (uint32_t)sizeof(int16_t)) != 0) {\n                break;\n       \
      \     }\n            to_send -= n;\n        }\n    }\n}\n"
    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \    comp->audio_out_dev = 0u;\n}\nif (comp->audio_ring != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n\
