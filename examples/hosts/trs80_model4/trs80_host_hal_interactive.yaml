      \ = 0u;\ncomp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\ncomp->audio_device_samples\
      \ = 0u;\ncomp->audio_channels = 0u;\nif (comp->display_shader != NULL) {\n \
      \   cpu_host_hal_shader_destroy(comp->display_shader);\n    comp->display_shader\
      \ = NULL;\n}\ncomp->display_shader_supported = -1;\nif (comp->texture != NULL)\
