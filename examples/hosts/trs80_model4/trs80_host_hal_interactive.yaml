    keyboard_matrix: "uint8_t row = (argc > 0) ? (uint8_t)(args[0] & 0x0Fu) : 0xFFu;\n\
      uint8_t value = 0xFFu;\nswitch (row) {\n    case 0u: value = comp->row0; break;\n\
      \    case 1u: value = comp->row1; break;\n    case 2u: value = comp->row2; break;\n\
      \    case 3u: value = comp->row3; break;\n    case 4u: value = comp->row4; break;\n\
      \    case 5u: value = comp->row5; break;\n    case 6u: value = comp->row6; break;\n\
      \    case 7u: value = comp->row7; break;\n    default: value = 0xFFu; break;\n\
      }\nreturn (uint64_t)value;\n"
