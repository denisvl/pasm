    initial: "0xFF"
  - name: row1
    type: uint8_t
    initial: "0xFF"
  - name: row2
    type: uint8_t
    initial: "0xFF"
  - name: row3
    type: uint8_t
    initial: "0xFF"
  - name: row4
    type: uint8_t
    initial: "0xFF"
  - name: row5
    type: uint8_t
    initial: "0xFF"
  - name: row6
    type: uint8_t
    initial: "0xFF"
  - name: row7
    type: uint8_t
    initial: "0xFF"

interfaces:
  callbacks:
    - name: keyboard_matrix
      args: [u8]
      returns: u8
  handlers:
    - name: video_frame
      args: [u32, u64, u32, u32]
    - name: irq_edge
      args: [u8]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

input:
  keyboard:
    source: sdl_scancode
    focus_required: true
    bindings:
      # Row 0: @ A B C D E F G
      - host_key: SDL_SCANCODE_F5
        presses: [{ row: 0, bit: 0 }]
      - host_key: SDL_SCANCODE_LEFTBRACKET
        presses: [{ row: 0, bit: 0 }]
      - host_key: SDL_SCANCODE_A
        presses: [{ row: 0, bit: 1 }]
      - host_key: SDL_SCANCODE_B
        presses: [{ row: 0, bit: 2 }]
      - host_key: SDL_SCANCODE_C
        presses: [{ row: 0, bit: 3 }]
      - host_key: SDL_SCANCODE_D
        presses: [{ row: 0, bit: 4 }]
      - host_key: SDL_SCANCODE_E
