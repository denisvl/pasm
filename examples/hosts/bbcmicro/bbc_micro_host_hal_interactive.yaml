behavior:
  snippets:
    init: "do {\n    if (comp->host_inited != 0u) break;\n    {\n        const char\
      \ *disable_dead = cpu_host_hal_getenv(\"PASM_DISABLE_DEADKEYS\");\n        if\
      \ (disable_dead == NULL || disable_dead[0] != '0') {\n            #if defined(__linux__)\n\
      \            setenv(\"XMODIFIERS\", \"@im=none\", 1);\n            setenv(\"\
      GTK_IM_MODULE\", \"xim\", 0);\n            setenv(\"QT_IM_MODULE\", \"xim\"\
      , 0);\n            #endif\n        }\n    }\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO\
      \ | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;\n    cpu_host_hal_stop_text_input();\n\
      \    comp->window = cpu_host_hal_create_window(\n        \"PASM BBC Micro\"\
      ,\n        CPU_HOST_WINDOWPOS_CENTERED,\n        CPU_HOST_WINDOWPOS_CENTERED,\n\
      \        480,\n        250,\n        CPU_HOST_WINDOW_RESIZABLE\n    );\n   \
      \ if (comp->window == NULL) break;\n    comp->renderer = cpu_host_hal_create_renderer(comp->window,\
      \ -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n \
      \       comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n\
      \    }\n    if (comp->renderer == NULL) break;\n    comp->texture = cpu_host_hal_create_texture(\n\
      \        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n\
      \        480,\n        250\n    );\n    if (comp->texture == NULL) break;\n\
      \    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\"\
      );\n        if (audio_env == NULL || audio_env[0] != '0') {\n            CPUHostAudioSpec\
      \ want;\n            CPUHostAudioSpec have;\n            cpu_host_audio_spec_zero(&want);\n\
      \            cpu_host_audio_spec_zero(&have);\n            want.freq = (CPU_AUDIO_SAMPLE_RATE\
      \ > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n\
      \            want.channels = 1;\n            want.samples = 512;\n         \
      \   want.callback = NULL;\n            comp->audio_device_samples = 0u;\n  \
      \          comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have,\
      \ SDL_AUDIO_ALLOW_ANY_CHANGE);\n            if (comp->audio_out_dev\
      \ != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16 && have.channels <= 2u && have.channels >= 1u) {\n\
      \                uint32_t ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq\
      \ * 2u) : 88200u;\n                if (ring_capacity < 8192u) ring_capacity\
      \ = 8192u;\n                comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity\
      \ * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n   \
      \                 comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq :\
      \ 44100u;\n                    comp->audio_ring_capacity = ring_capacity;\n\
      \                    comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx\
      \ = 0u;\n                    comp->audio_ring_fill = 0u;\n                 \
      \   comp->audio_device_samples = (uint32_t)have.samples * (uint32_t)have.channels;\n                 \
      \   comp->audio_out_ready = 1u;\n                    cpu_host_hal_audio_pause(comp->audio_out_dev,\
      \ 0);\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                    comp->audio_out_dev = 0u;\n                    comp->audio_device_samples\
      \ = 0u;\n                }\n            } else if (comp->audio_out_dev != 0u)\
      \ {\n                cpu_host_hal_audio_close(comp->audio_out_dev);\n      \
      \          comp->audio_out_dev = 0u;\n                comp->audio_device_samples\
      \ = 0u;\n            }\n        }\n    }\n    comp->host_inited = 1u;\n} while\
      \ (0);\n"
    reset: "comp->frame_count = 0u;\ncomp->audio_samples = 0u;\ncomp->audio_level\
      \ = 0;\ncomp->audio_last_cycle = 0u;\ncomp->audio_sample_cursor = 0u;\ncomp->audio_ring_read_idx\
      \ = 0u;\ncomp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\ncomp->last_event_poll_cycle\
      \ = 0u;\ncomp->overlay_last_ms = 0u;\ncomp->overlay_last_frame_count = 0u;\n\
      comp->overlay_last_cycle_count = 0u;\ncomp->overlay_fps_x100 = 0u;\ncomp->overlay_cpu_hz\
      \ = 0u;\ncomp->overlay_cpu_pct_x10 = 0u;\ncomp->pending_texture_w = 0u;\ncomp->pending_texture_h = 0u;\ncomp->pending_texture_frames = 0u;\ncomp->kb_row0 = 0xFFu;\ncomp->kb_row1 = 0xFFu;\ncomp->kb_row2 = 0xFFu;\ncomp->kb_row3 = 0xFFu;\ncomp->kb_row4 = 0xFFu;\ncomp->kb_row5 = 0xFFu;\ncomp->kb_row6 = 0xFFu;\ncomp->kb_row7 = 0xFFu;\ncomp->kb_row8 = 0xFFu;\ncomp->kb_row9 = 0xFFu;\ncomp->kb_row10 = 0xFFu;\ncomp->kb_row11 = 0xFFu;\ncomp->kb_row12 = 0xFFu;\ncomp->kb_row13 = 0xFFu;\ncomp->kb_row14 = 0xFFu;\ncomp->kb_row15 = 0xFFu;\ncomp->kb_shiftlock_latched = 0u;\ncomp->kb_shiftlock_prev_raw = 0u;\nif (comp->audio_out_dev != 0u) {\n\
      \    cpu_host_hal_audio_clear(comp->audio_out_dev);\n}\n"
    step_post: "if (comp->host_inited == 0u) return;\n{\n    uint64_t now = cpu->total_cycles;\n\
      \    if ((now - comp->last_event_poll_cycle) < 4096u) {\n        return;\n \
      \   }\n    comp->last_event_poll_cycle = now;\n}\nCPUHostEvent ev;\nwhile (cpu_host_hal_poll_event(&ev))\
      \ {\n    if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n      \
      \  cpu->running = false;\n        cpu->halted = true;\n        return;\n   \
      \ } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN && cpu_host_hal_event_key_repeat(&ev)\
      \ == 0) {\n        int32_t sc = cpu_host_hal_event_scancode(&ev);\n        if (comp->window != NULL) {\n\
      \            char tbuf[192];\n            const char *nm = cpu_host_hal_scancode_name(sc);\n            if (nm == NULL) nm = \"?\";\n\
      \            snprintf(tbuf, sizeof(tbuf), \"PASM BBC Micro | KEYDOWN sc=%d (%s)\", (int)sc, nm);\n            cpu_host_hal_set_window_title(comp->window, tbuf);\n\
      \        }\n        int key_count = 0;\n        const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n\
      \        cpu_component_keyboard_ascii_feed(sc, ks, (size_t)((key_count > 0)\
      \ ? key_count : 0), 1u);\n    }\n}\n{\n    int key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n    uint8_t rows[16] = { 0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu,0xFFu };\n    if (ks != NULL && key_count > 0) {
        cpu_component_apply_declared_keymap(cpu, \"host_bbc_micro\", ks, (size_t)key_count, rows, 16u, 1u);
    }
    {
        uint8_t raw_shiftlock = (uint8_t)(((rows[6] & (uint8_t)(1u << 7u)) == 0u) ? 1u : 0u);
        if (raw_shiftlock != 0u && comp->kb_shiftlock_prev_raw == 0u) {
            comp->kb_shiftlock_latched ^= 1u;
        }
        comp->kb_shiftlock_prev_raw = raw_shiftlock;
        if (comp->kb_shiftlock_latched != 0u) rows[6] = (uint8_t)(rows[6] & (uint8_t)~(1u << 7u));
        else rows[6] = (uint8_t)(rows[6] | (uint8_t)(1u << 7u));
    }
    comp->kb_row0 = rows[0];
    comp->kb_row1 = rows[1];
    comp->kb_row2 = rows[2];
    comp->kb_row3 = rows[3];
    comp->kb_row4 = rows[4];
    comp->kb_row5 = rows[5];
    comp->kb_row6 = rows[6];
    comp->kb_row7 = rows[7];
    comp->kb_row8 = rows[8];
    comp->kb_row9 = rows[9];
    comp->kb_row10 = rows[10];
    comp->kb_row11 = rows[11];
    comp->kb_row12 = rows[12];
    comp->kb_row13 = rows[13];
    comp->kb_row14 = rows[14];
    comp->kb_row15 = rows[15];
}
{
    sms_overlay_update_perf(\n      \
      \  cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n        cpu->total_cycles,\n\
      \        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n        &comp->overlay_last_ms,\n \
      \       &comp->overlay_last_frame_count,\n        &comp->overlay_last_cycle_count,\n\
      \        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n\
      \    );\n}\nif (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u &&\
      \ comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {\n    uint32_t queued_samples\
      \ = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);\n\
      \    uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples\
      \ : 512u;\n    uint32_t low_watermark = device_samples * 2u;\n    uint32_t target_total\
      \ = device_samples * 4u;\n    uint32_t max_total = device_samples * 8u;\n  \
      \  if (queued_samples + comp->audio_ring_fill > max_total) {\n        uint32_t\
      \ desired_ring_fill = (queued_samples < target_total) ? (target_total - queued_samples)\
      \ : 0u;\n        while (comp->audio_ring_fill > desired_ring_fill) {\n     \
      \       comp->audio_ring_read_idx += 1u;\n            if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n          \
      \  comp->audio_ring_fill -= 1u;\n        }\n    }\n    if (queued_samples <\
      \ low_watermark) {\n        uint32_t desired = (queued_samples < target_total)\
      \ ? (target_total - queued_samples) : 0u;\n        uint32_t to_send = (comp->audio_ring_fill\
      \ < desired) ? comp->audio_ring_fill : desired;\n        while (to_send > 0u)\
      \ {\n            int16_t chunk[1024];\n            uint32_t n = (to_send > 1024u)\
      \ ? 1024u : to_send;\n            for (uint32_t i = 0u; i < n; ++i) {\n    \
      \            chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];\n     \
      \           comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n          \
      \  }\n            comp->audio_ring_fill -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev,\
      \ chunk, n * (uint32_t)sizeof(int16_t)) != 0) {\n                break;\n  \
      \          }\n            to_send -= n;\n        }\n    }\n}\n"
    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \    comp->audio_out_dev = 0u;\n}\ncomp->audio_device_samples = 0u;\nif (comp->audio_ring\
      \ != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n    comp->audio_ring\
      \ = NULL;\n}\ncomp->audio_ring_capacity = 0u;\ncomp->audio_ring_read_idx = 0u;\n\
      comp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\nif (comp->texture\
      \ != NULL) {\n    cpu_host_hal_destroy_texture(comp->texture);\n    comp->texture\
      \ = NULL;\n}\nif (comp->renderer != NULL) {\n    cpu_host_hal_destroy_renderer(comp->renderer);\n\
      \    comp->renderer = NULL;\n}\nif (comp->window != NULL) {\n    cpu_host_hal_destroy_window(comp->window);\n\
      \    comp->window = NULL;\n}\nif (comp->host_inited != 0u) {\n    cpu_host_hal_quit_subsystems();\n\
      \    cpu_host_hal_quit();\n    comp->host_inited = 0u;\n}\n"
  callback_handlers:
    keyboard_ascii: 'return (uint64_t)cpu_component_keyboard_ascii_pop();

      '
    keyboard_read_row: |
      uint8_t row = (argc > 0u) ? (uint8_t)(args[0] & 0x0Fu) : 0u;
      switch (row) {
          case 0u: return (uint64_t)comp->kb_row0;
          case 1u: return (uint64_t)comp->kb_row1;
          case 2u: return (uint64_t)comp->kb_row2;
          case 3u: return (uint64_t)comp->kb_row3;
          case 4u: return (uint64_t)comp->kb_row4;
          case 5u: return (uint64_t)comp->kb_row5;
          case 6u: return (uint64_t)comp->kb_row6;
          case 7u: return (uint64_t)comp->kb_row7;
          case 8u: return (uint64_t)comp->kb_row8;
          case 9u: return (uint64_t)comp->kb_row9;
          case 10u: return (uint64_t)comp->kb_row10;
          case 11u: return (uint64_t)comp->kb_row11;
          case 12u: return (uint64_t)comp->kb_row12;
          case 13u: return (uint64_t)comp->kb_row13;
          case 14u: return (uint64_t)comp->kb_row14;
          case 15u: return (uint64_t)comp->kb_row15;
          default: return (uint64_t)0xFFu;
      }
  handler_bodies:
    video_frame: "if (comp->host_inited == 0u || argc < 4) return;\nvoid *renderer\
      \ = comp->renderer;\nvoid *texture = comp->texture;\nuint32_t frame = (uint32_t)(args[0]\
      \ & 0xFFFFFFFFu);\nuint32_t *pixels = (uint32_t *)(uintptr_t)args[1];\nuint32_t\
      \ w = (uint32_t)(args[2] & 0xFFFFFFFFu);\nuint32_t h = (uint32_t)(args[3] &\
      \ 0xFFFFFFFFu);\nif (renderer == NULL || texture == NULL || pixels == NULL ||\
      \ w == 0u || h == 0u) return;\ncomp->frame_count = frame;\nif (cpu->debug_overlay_enabled)\
      \ {\n    sms_overlay_draw_perf(\n        pixels,\n        w,\n        h,\n \
      \       comp->overlay_fps_x100,\n        comp->overlay_cpu_hz,\n        comp->overlay_cpu_pct_x10\n\
      \    );\n}\n/* Debounce output size changes during CRTC/ROM init so the host window doesn't flicker.\n\
      \   Require the same new size for a few consecutive frames before reallocating texture. */\nif (comp->texture_w != w || comp->texture_h != h) {\n\
      \    if (comp->pending_texture_w == w && comp->pending_texture_h == h) {\n\
      \        if (comp->pending_texture_frames < 0xFFFFFFFFu) comp->pending_texture_frames += 1u;\n\
      \    } else {\n        comp->pending_texture_w = w;\n        comp->pending_texture_h = h;\n\
      \        comp->pending_texture_frames = 1u;\n    }\n    if (comp->pending_texture_frames\
      \ >= 6u) {\n        cpu_host_hal_destroy_texture(texture);\n        texture =\
      \ cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888, CPU_HOST_TEXTUREACCESS_STREAMING,\
      \ (int)w, (int)h);\n        if (texture == NULL) return;\n        (void)cpu_host_hal_set_window_size(comp->window, (int)w, (int)h);\n        comp->texture\
      \ = (void *)texture;\n        comp->texture_w = w;\n        comp->texture_h\
      \ = h;\n    \
      \        comp->pending_texture_frames = 0u;\n        comp->pending_texture_w\
      \ = w;\n        comp->pending_texture_h = h;\n    } else {\n        /* Drop this frame until size stabilizes; keep previous texture on screen. */\n        return;\n    }\n} else {\n    comp->pending_texture_frames\
      \ = 0u;\n    comp->pending_texture_w = w;\n    comp->pending_texture_h = h;\n\
      }\nif (cpu_host_hal_update_texture(texture, NULL,\
      \ pixels, (int)(w * sizeof(uint32_t))) != 0) return;\ncpu_host_hal_render_set_draw_color(renderer,\
      \ 0, 0, 0, 255);\ncpu_host_hal_render_clear(renderer);\nint ww = 0;\nint wh\
      \ = 0;\nif (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 || ww\
      \ <= 0 || wh <= 0) return;\nCPUHostRect dst;\nint scaled_w = ww;\nint scaled_h\
      \ = (int)((((int64_t)ww) * (int64_t)h) / (int64_t)w);\nif (scaled_h > wh) {\n\
      \    scaled_h = wh;\n    scaled_w = (int)((((int64_t)wh) * (int64_t)w) / (int64_t)h);\n\
      }\ndst.w = (scaled_w > 0) ? scaled_w : ww;\ndst.h = (scaled_h > 0) ? scaled_h\
      \ : wh;\ndst.x = (ww - dst.w) / 2;\ndst.y = (wh - dst.h) / 2;\nif (cpu_host_hal_render_copy(renderer,\
      \ texture, NULL, &dst) != 0) return;\ncpu_host_hal_render_present(renderer);\n"
    audio_pcm: "if (\n    comp->audio_out_dev == 0u\n    || comp->audio_out_ready\
      \ == 0u\n    || comp->audio_ring == NULL\n    || comp->audio_ring_capacity ==\
      \ 0u\n    || argc < 1\n) {\n    return;\n}\n\n{\n    uint8_t level = (uint8_t)\
      \ (args[0] & 0xFFu);\n    int centered = ((int) level) - 128;\n    int16_t sample\
      \ = (int16_t) (centered * 128);\n\n    if (comp->audio_ring_fill >= comp->audio_ring_capacity)\
      \ {\n        comp->audio_ring_read_idx += 1u;\n\n        if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) {\n            comp->audio_ring_read_idx = 0u;\n\
      \        }\n\n        comp->audio_ring_fill -= 1u;\n    }\n\n    comp->audio_ring[comp->audio_ring_write_idx]\
      \ = sample;\n    comp->audio_ring_write_idx += 1u;\n\n    if (comp->audio_ring_write_idx\
      \ >= comp->audio_ring_capacity) {\n        comp->audio_ring_write_idx = 0u;\n\
      \    }\n\n    comp->audio_ring_fill += 1u;\n    comp->audio_samples += 1u;\n\
      \    comp->audio_level = sample;\n    comp->audio_last_cycle = (argc > 1) ?\
      \ (uint64_t) args[1] : cpu->total_cycles;\n}\n"
