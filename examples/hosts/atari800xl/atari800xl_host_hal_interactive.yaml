    initial: "0"
  - name: audio_rate
    type: uint32_t
    initial: "0"
  - name: audio_ring
    type: int16_t *
    initial: "NULL"
  - name: audio_ring_capacity
    type: uint32_t
    initial: "0"
  - name: audio_ring_read_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_write_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_fill
    type: uint32_t
    initial: "0"
  - name: key_ascii
    type: uint8_t
    initial: "0"
  - name: key_queue
    type: uint8_t *
    initial: "NULL"
  - name: key_q_read_idx
    type: uint8_t
    initial: "0"
  - name: key_q_write_idx
    type: uint8_t
    initial: "0"
  - name: consol_state
    type: uint8_t
    initial: "0x07"
  - name: joy0_state
    type: uint8_t
    initial: "0x0F"
  - name: joy1_state
    type: uint8_t
    initial: "0x0F"
  - name: trig0
