    init: "do {\n    if (comp->host_inited != 0u) break;\n    {\n        const char *disable_dead = cpu_host_hal_getenv(\"PASM_DISABLE_DEADKEYS\");\n        if (disable_dead == NULL || disable_dead[0] != '0') {\n            #if defined(__linux__)\n            /* Keep scancode flow deterministic by disabling XIM dead-key composition for this process. */\n            setenv(\"XMODIFIERS\", \"@im=none\", 1);\n            setenv(\"GTK_IM_MODULE\", \"xim\", 0);\n            setenv(\"QT_IM_MODULE\", \"xim\", 0);\n            #endif\n        }\n    }\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;\n    cpu_host_hal_stop_text_input();\n    comp->window = cpu_host_hal_create_window(\n        \"PASM Atari 800XL\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n        CPU_HOST_WINDOWPOS_CENTERED,\n        320,\n        192,\n        CPU_HOST_WINDOW_RESIZABLE\n    );\n    if (comp->window == NULL) break;\n    comp->renderer = cpu_host_hal_create_renderer(comp->window,\
      \ -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n        comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n    }\n    if (comp->renderer == NULL) break;\n    comp->texture = cpu_host_hal_create_texture(\n        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n        320,\n        192\n    );\n    if (comp->texture == NULL) break;\n    if (comp->key_queue == NULL) {\n        comp->key_queue = (uint8_t *)cpu_host_hal_alloc(16u * sizeof(uint8_t));\n        if (comp->key_queue == NULL) break;\n        cpu_host_hal_memset(comp->key_queue, 0, 16u * sizeof(uint8_t));\n    }\n    cpu_host_hal_show_window(comp->window);\n    cpu_host_hal_raise_window(comp->window);\n    (void)cpu_host_hal_set_window_input_focus(comp->window);\n    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\");\n        if (audio_env == NULL || audio_env[0] != '0') {\n            if (cpu_host_hal_init_subsystem(CPU_HOST_INIT_AUDIO)\
      \ != 0) {\n                /* Keep host running without audio if audio backend is unavailable. */\n                comp->audio_out_dev = 0u;\n                comp->audio_out_ready = 0u;\n                comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n            } else {\n            CPUHostAudioSpec want;\n            CPUHostAudioSpec have;\n            cpu_host_audio_spec_zero(&want);\n            cpu_host_audio_spec_zero(&have);\n            want.freq = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n            want.channels = 1;\n            want.samples = 512;\n            want.callback = NULL;\n            comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n            comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have, CPU_HOST_AUDIO_ALLOW_CHANNELS_CHANGE |\n                    CPU_HOST_AUDIO_ALLOW_SAMPLES_CHANGE);\n    \
      \        if (comp->audio_out_dev != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16 && have.channels <= 2u && have.channels >= 1u) {\n                uint32_t ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq * 2u) : 88200u;\n                if (ring_capacity < 8192u) ring_capacity = 8192u;\n                comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n                    comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq : 44100u;\n                    comp->audio_ring_capacity = ring_capacity;\n                    comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx = 0u;\n                    comp->audio_ring_fill = 0u;\n                    comp->audio_device_samples = (uint32_t)have.samples * (uint32_t)have.channels;\n                    comp->audio_channels = (uint32_t)have.channels;\n                    comp->audio_out_ready = 1u;\n               \
      \     cpu_host_hal_audio_pause(comp->audio_out_dev, 0);\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n                    comp->audio_out_dev = 0u;\n                    comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n                }\n            } else if (comp->audio_out_dev != 0u) {\n                cpu_host_hal_audio_close(comp->audio_out_dev);\n                comp->audio_out_dev = 0u;\n                comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n            }\n            }\n        }\n    }\n    comp->host_inited = 1u;\n} while (0);\n"
    reset: "comp->frame_count = 0u;\ncomp->audio_samples = 0u;\ncomp->audio_level = 0;\ncomp->audio_hp_prev_in = 0;\ncomp->audio_hp_prev_out = 0;\ncomp->audio_last_cycle = 0u;\ncomp->audio_sample_cursor = 0u;\ncomp->audio_ring_read_idx = 0u;\ncomp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\ncomp->key_ascii = 0u;\nif (comp->key_queue != NULL) {\n    memset(comp->key_queue, 0, 16u * sizeof(uint8_t));\n}\ncomp->key_q_read_idx = 0u;\ncomp->key_q_write_idx = 0u;\ncomp->consol_state = 0x07u;\ncomp->joy0_state = 0x0Fu;\ncomp->joy1_state = 0x0Fu;\ncomp->trig0 = 1u;\ncomp->trig1 = 1u;\ncomp->trig2 = 1u;\ncomp->trig3 = 1u;\ncomp->last_event_poll_cycle = 0u;\ncomp->overlay_last_ms = 0u;\ncomp->overlay_last_frame_count = 0u;\ncomp->overlay_last_cycle_count = 0u;\ncomp->overlay_fps_x100 = 0u;\ncomp->overlay_cpu_hz = 0u;\ncomp->overlay_cpu_pct_x10 = 0u;\nif (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_clear(comp->audio_out_dev);\n}\n"
    step_post: "if (comp->host_inited == 0u) return;\n{\n    static int key_trace = -1;\n    if (key_trace < 0) {\n        const char *env = cpu_host_hal_getenv(\"PASM_ATARI800XL_KEY_TRACE\");\n        key_trace = (env != NULL && env[0] == '1') ? 1 : 0;\n    }\n}\n{\n    uint64_t now = cpu->total_cycles;\n    if ((now - comp->last_event_poll_cycle) < 256u) {\n        return;\n    }\n    comp->last_event_poll_cycle = now;\n}\nCPUHostEvent ev;\nwhile (cpu_host_hal_poll_event(&ev)) {\n    static int ev_trace_init = 0;\n    static int ev_trace_on = 0;\n    static FILE *ev_trace_fp = NULL;\n    if (ev_trace_init == 0) {\n        const char *env_ev = cpu_host_hal_getenv(\"PASM_ATARI800XL_KB_EVENTS\");\n        ev_trace_on = (env_ev != NULL && env_ev[0] != '\\0' && env_ev[0] != '0') ? 1 : 0;\n        ev_trace_init = 1;\n        if (ev_trace_on != 0) {\n            ev_trace_fp = fopen(\"log/atari800xl_host_kb_events.log\", \"w\");\n            if (ev_trace_fp == NULL) ev_trace_fp = stderr;\n   \
      \         fprintf(ev_trace_fp, \"# cycle,type,scancode,scancode_name,key_name,mods_hex,repeat\\n\");\n            fflush(ev_trace_fp);\n        }\n    }\n    if (\n        cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN ||\n        cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP\n    ) {\n        int32_t sc_ev = cpu_host_hal_event_scancode(&ev);\n        uint8_t is_down_ev = (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN) ? 1u : 0u;\n        if (ev_trace_on != 0) {\n            fprintf(\n                ev_trace_fp,\n                \"%llu,%s,%d,%s,%s,0x%X,%u\\n\",\n                (unsigned long long)cpu->total_cycles,\n                (is_down_ev != 0u) ? \"down\" : \"up\",\n                (int)sc_ev,\n                cpu_host_hal_scancode_name(sc_ev),\n                cpu_host_hal_key_name(ev.key.keysym.sym),\n                (unsigned)cpu_host_hal_event_mod_state(&ev),\n                (unsigned)cpu_host_hal_event_key_repeat(&ev)\n            );\n        \
      \    fflush(ev_trace_fp);\n        }\n        if (comp->window != NULL) {\n            int key_count = 0;\n            const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n            uint8_t shifted = 0u;\n            uint8_t controlled = 0u;\n            const RuntimeKeyboardBinding *matched = NULL;\n            char title[256];\n            if (ks != NULL && key_count > 0) {\n                size_t kcount = (size_t)key_count;\n                for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {\n                    const RuntimeKeyboardBinding *m = &g_runtime_keyboard_map.bindings[i];\n                    if (m->scancode < 0 || (size_t)m->scancode >= kcount) continue;\n                    if (ks[m->scancode] == 0u) continue;\n                    if (m->is_shift_modifier != 0u) shifted = 1u;\n                    if (m->is_ctrl_modifier != 0u) controlled = 1u;\n                }\n                for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i)\
      \ {\n                    const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];\n                    if (b->scancode == sc_ev) {\n                        matched = b;\n                        break;\n                    }\n                }\n            }\n            if (matched != NULL) {\n                /* For Atari KBCODE accuracy, the host sends the *base* keycode only.\n                   The IC composes shift/ctrl state into KBCODE (bits 6/7). */\n                uint8_t base = (matched->has_ascii != 0u) ? matched->ascii : 0u;\n                uint8_t out = base;\n                uint8_t kb = 0u;\n                if (base != 0u) {\n                    kb = (uint8_t)(base - 1u);\n                    if (shifted != 0u) kb = (uint8_t)(kb | 0x40u);\n                    if (controlled != 0u) kb = (uint8_t)(kb | 0x80u);\n                }\n                snprintf(\n                    title,\n                    sizeof(title),\n                    \"PASM Atari 800XL\
      \ | %s sc=%d (%s) | %s base=%u kb=0x%02X sh=%u ct=%u\",\n                    (is_down_ev != 0u) ? \"down\" : \"up\",\n                    (int)sc_ev,\n                    cpu_host_hal_scancode_name(sc_ev),\n                    (matched->mapper_key_id[0] != '\\0') ? matched->mapper_key_id : \"(no-id)\",\n                    (unsigned)out,\n                    (unsigned)kb,\n                    (unsigned)shifted,\n                    (unsigned)controlled\n                );\n            } else {\n                snprintf(\n                    title,\n                    sizeof(title),\n                    \"PASM Atari 800XL | %s sc=%d (%s) | unmapped\",\n                    (is_down_ev != 0u) ? \"down\" : \"up\",\n                    (int)sc_ev,\n                    cpu_host_hal_scancode_name(sc_ev)\n                );\n            }\n            cpu_host_hal_set_window_title(comp->window, title);\n        }\n    }\n    if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n   \
      \     cpu->running = false;\n        cpu->halted = true;\n        return;\n    } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN && cpu_host_hal_event_key_repeat(&ev) == 0) {\n        int32_t sc = cpu_host_hal_event_scancode(&ev);\n        /* Discover special scancodes from the runtime map by mapper_key_id (layout independent). */\n        {\n            static int32_t break_sc = -2;\n            if (break_sc == -2) {\n                break_sc = -1;\n                for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {\n                    const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];\n                    if (b->mapper_key_id[0] == '\\0') continue;\n                    if (strcmp(b->mapper_key_id, \"key_break\") == 0) break_sc = b->scancode;\n                }\n            }\n            if (break_sc >= 0 && sc == break_sc) {\n                comp->break_pressed = 1u;\n                continue;\n            }\n        }\n     \
      \   {\n            static int key_trace = -1;\n            if (key_trace < 0) {\n                const char *env = cpu_host_hal_getenv(\"PASM_ATARI800XL_KEY_TRACE\");\n                key_trace = (env != NULL && env[0] == '1') ? 1 : 0;\n            }\n            if (key_trace != 0) {\n                fprintf(stderr, \"[atari800xl-host] keydown sc=%d mod=0x%X\\n\", (int)sc, (unsigned int)cpu_host_hal_event_mod_state(&ev));\n            }\n        }\n        if (sc == CPU_HOST_SCANCODE(F2)) {\n            comp->consol_state = (uint8_t)(comp->consol_state & (uint8_t)~0x04u); /* OPTION */\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(F3)) {\n            comp->consol_state = (uint8_t)(comp->consol_state & (uint8_t)~0x02u); /* SELECT */\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(F4)) {\n            comp->consol_state = (uint8_t)(comp->consol_state & (uint8_t)~0x01u); /* START */\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(UP)\
      \ || sc == CPU_HOST_SCANCODE(KP_8)) {\n            comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x01u);\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(DOWN) || sc == CPU_HOST_SCANCODE(KP_2)) {\n            comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x02u);\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(LEFT) || sc == CPU_HOST_SCANCODE(KP_4)) {\n            comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x04u);\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(RIGHT) || sc == CPU_HOST_SCANCODE(KP_6)) {\n            comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x08u);\n            continue;\n        }\n        if (\n            sc == CPU_HOST_SCANCODE(RCTRL) ||\n            sc == CPU_HOST_SCANCODE(RALT) ||\n            sc == CPU_HOST_SCANCODE(KP_0)\n        ) {\n            comp->trig0 = 0u;\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(I))\
      \ {\n            comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x01u);\n        }\n        if (sc == CPU_HOST_SCANCODE(K)) {\n            comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x02u);\n        }\n        if (sc == CPU_HOST_SCANCODE(J)) {\n            comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x04u);\n        }\n        if (sc == CPU_HOST_SCANCODE(L)) {\n            comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x08u);\n        }\n        if (sc == CPU_HOST_SCANCODE(LCTRL)) {\n            comp->trig1 = 0u;\n            continue;\n        }\n        if (sc == CPU_HOST_SCANCODE(TAB)) {\n            comp->trig2 = 0u;\n            continue;\n        }\n        {\n            int key_count = 0;\n            const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n            uint8_t shifted = 0u;\n            uint8_t controlled = 0u;\n            const RuntimeKeyboardBinding *matched = NULL;\n            if (ks != NULL && key_count\
      \ > 0) {\n                size_t kcount = (size_t)key_count;\n                for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {\n                    const RuntimeKeyboardBinding *m = &g_runtime_keyboard_map.bindings[i];\n                    if (m->scancode < 0 || (size_t)m->scancode >= kcount) continue;\n                    if (ks[m->scancode] == 0u) continue;\n                    if (m->is_shift_modifier != 0u) shifted = 1u;\n                    if (m->is_ctrl_modifier != 0u) controlled = 1u;\n                }\n                for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {\n                    const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];\n                    if (b->scancode == sc) { matched = b; break; }\n                }\n            }\n            if (matched != NULL) {\n                /* Push base keycode only; modifiers are applied in the IC. */\n                uint8_t out = 0u;\n                if (matched->has_ascii\
      \ != 0u && matched->ascii != 0u) {\n                    uint8_t kb = (uint8_t)(matched->ascii - 1u);\n                    if (shifted != 0u) kb = (uint8_t)(kb | 0x40u);\n                    if (controlled != 0u) kb = (uint8_t)(kb | 0x80u);\n                    /* Queue encoded (KBCODE + 1), so 0 means \"no event\". */\n                    out = (uint8_t)(kb + 1u);\n                }\n                cpu_component_keyboard_ascii_queue_push(out);\n            }\n        }\n    } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {\n        int32_t sc = cpu_host_hal_event_scancode(&ev);\n        {\n            static int key_trace = -1;\n            if (key_trace < 0) {\n                const char *env = cpu_host_hal_getenv(\"PASM_ATARI800XL_KEY_TRACE\");\n                key_trace = (env != NULL && env[0] == '1') ? 1 : 0;\n            }\n            if (key_trace != 0) {\n                fprintf(stderr, \"[atari800xl-host] keyup   sc=%d\\n\", (int)sc);\n            }\n  \
