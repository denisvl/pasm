      args: [u32, u64, u32, u32]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

behavior:
  snippets:
    init: |
      do {
          if (comp->host_inited != 0u) break;
          if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_EVENTS) != 0) break;
          comp->window = cpu_host_hal_create_window(
              "PASM Atari 800XL",
              CPU_HOST_WINDOWPOS_CENTERED,
              CPU_HOST_WINDOWPOS_CENTERED,
              960,
              576,
              CPU_HOST_WINDOW_RESIZABLE
          );
          if (comp->window == NULL) break;
          comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);
          if (comp->renderer == NULL) {
              comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);
          }
          if (comp->renderer == NULL) break;
          comp->texture = cpu_host_hal_create_texture(
              comp->renderer,
              CPU_HOST_PIXELFORMAT_ARGB8888,
              CPU_HOST_TEXTUREACCESS_STREAMING,
              320,
              192
          );
          if (comp->texture == NULL) break;
          if (comp->key_queue == NULL) {
              comp->key_queue = (uint8_t *)cpu_host_hal_alloc(16u * sizeof(uint8_t));
              if (comp->key_queue == NULL) break;
              cpu_host_hal_memset(comp->key_queue, 0, 16u * sizeof(uint8_t));
          }
          cpu_host_hal_show_window(comp->window);
          cpu_host_hal_raise_window(comp->window);
          (void)cpu_host_hal_set_window_input_focus(comp->window);
          {
              const char *audio_env = cpu_host_hal_getenv("PASM_HOST_AUDIO");
              if (audio_env == NULL || audio_env[0] != '0') {
                  if (cpu_host_hal_init_subsystem(CPU_HOST_INIT_AUDIO) != 0) {
                      /* Keep host running without audio if audio backend is unavailable. */
                      comp->audio_out_dev = 0u;
                      comp->audio_out_ready = 0u;
                      comp->audio_device_samples = 0u;
                  } else {
                  CPUHostAudioSpec want;
                  CPUHostAudioSpec have;
                  cpu_host_audio_spec_zero(&want);
                  cpu_host_audio_spec_zero(&have);
                  want.freq = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;
                  want.format = CPU_HOST_AUDIO_FORMAT_S16;
                  want.channels = 1;
                  want.samples = 512;
                  want.callback = NULL;
                  comp->audio_device_samples = 0u;
                  comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have, CPU_HOST_AUDIO_ALLOW_FREQUENCY_CHANGE);
                  if (comp->audio_out_dev != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16 && have.channels == 1) {
                      uint32_t ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq * 2u) : 88200u;
                      if (ring_capacity < 8192u) ring_capacity = 8192u;
                      comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));
                      if (comp->audio_ring != NULL) {
                          comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq : 44100u;
                          comp->audio_ring_capacity = ring_capacity;
                          comp->audio_ring_read_idx = 0u;
                          comp->audio_ring_write_idx = 0u;
                          comp->audio_ring_fill = 0u;
                          comp->audio_device_samples = (uint32_t)have.samples;
                          comp->audio_out_ready = 1u;
                          cpu_host_hal_audio_pause(comp->audio_out_dev, 0);
                      } else {
                          cpu_host_hal_audio_close(comp->audio_out_dev);
                          comp->audio_out_dev = 0u;
                          comp->audio_device_samples = 0u;
                      }
                  } else if (comp->audio_out_dev != 0u) {
                      cpu_host_hal_audio_close(comp->audio_out_dev);
                      comp->audio_out_dev = 0u;
                      comp->audio_device_samples = 0u;
                  }
                  }
              }
          }
          comp->host_inited = 1u;
      } while (0);
    reset: |
      comp->frame_count = 0u;
      comp->audio_samples = 0u;
      comp->audio_level = 0;
      comp->audio_hp_prev_in = 0;
      comp->audio_hp_prev_out = 0;
      comp->audio_last_cycle = 0u;
      comp->audio_sample_cursor = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->key_ascii = 0u;
      if (comp->key_queue != NULL) {
          memset(comp->key_queue, 0, 16u * sizeof(uint8_t));
      }
      comp->key_q_read_idx = 0u;
      comp->key_q_write_idx = 0u;
      comp->consol_state = 0x07u;
      comp->joy0_state = 0x0Fu;
      comp->joy1_state = 0x0Fu;
      comp->trig0 = 1u;
      comp->trig1 = 1u;
      comp->trig2 = 1u;
      comp->trig3 = 1u;
      comp->last_event_poll_cycle = 0u;
      comp->overlay_last_ms = 0u;
      comp->overlay_last_frame_count = 0u;
      comp->overlay_last_cycle_count = 0u;
      comp->overlay_fps_x100 = 0u;
      comp->overlay_cpu_hz = 0u;
      comp->overlay_cpu_pct_x10 = 0u;
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_clear(comp->audio_out_dev);
      }
    step_post: |
      if (comp->host_inited == 0u) return;
      {
          static int key_trace = -1;
          if (key_trace < 0) {
              const char *env = cpu_host_hal_getenv("PASM_ATARI800XL_KEY_TRACE");
              key_trace = (env != NULL && env[0] == '1') ? 1 : 0;
          }
      }
      {
          uint64_t now = cpu->total_cycles;
          if ((now - comp->last_event_poll_cycle) < 256u) {
              return;
          }
          comp->last_event_poll_cycle = now;
      }
      CPUHostEvent ev;
      while (cpu_host_hal_poll_event(&ev)) {
          if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {
              cpu->running = false;
              cpu->halted = true;
              return;
          } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN && cpu_host_hal_event_key_repeat(&ev) == 0) {
              int32_t sc = cpu_host_hal_event_scancode(&ev);
              {
                  static int key_trace = -1;
                  if (key_trace < 0) {
                      const char *env = cpu_host_hal_getenv("PASM_ATARI800XL_KEY_TRACE");
                      key_trace = (env != NULL && env[0] == '1') ? 1 : 0;
                  }
                  if (key_trace != 0) {
                      fprintf(stderr, "[atari800xl-host] keydown sc=%d mod=0x%X\n", (int)sc, (unsigned int)cpu_host_hal_event_mod_state(&ev));
                  }
              }
              if (sc == CPU_HOST_SCANCODE(F2)) {
                  comp->consol_state = (uint8_t)(comp->consol_state & (uint8_t)~0x04u); /* OPTION */
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(F3)) {
                  comp->consol_state = (uint8_t)(comp->consol_state & (uint8_t)~0x02u); /* SELECT */
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(F4)) {
                  comp->consol_state = (uint8_t)(comp->consol_state & (uint8_t)~0x01u); /* START */
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(UP) || sc == CPU_HOST_SCANCODE(KP_8)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x01u);
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(DOWN) || sc == CPU_HOST_SCANCODE(KP_2)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x02u);
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(LEFT) || sc == CPU_HOST_SCANCODE(KP_4)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x04u);
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(RIGHT) || sc == CPU_HOST_SCANCODE(KP_6)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state & (uint8_t)~0x08u);
                  continue;
              }
              if (
                  sc == CPU_HOST_SCANCODE(RCTRL) ||
                  sc == CPU_HOST_SCANCODE(RALT) ||
                  sc == CPU_HOST_SCANCODE(KP_0)
              ) {
                  comp->trig0 = 0u;
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(I)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x01u);
              }
              if (sc == CPU_HOST_SCANCODE(K)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x02u);
              }
              if (sc == CPU_HOST_SCANCODE(J)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x04u);
              }
              if (sc == CPU_HOST_SCANCODE(L)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state & (uint8_t)~0x08u);
              }
              if (sc == CPU_HOST_SCANCODE(LCTRL)) {
                  comp->trig1 = 0u;
                  continue;
              }
              if (sc == CPU_HOST_SCANCODE(TAB)) {
                  comp->trig2 = 0u;
                  continue;
              }
              uint8_t controlled = ((cpu_host_hal_event_mod_state(&ev) & CPU_HOST_MOD_CTRL) != 0) ? 1u : 0u;
              uint8_t shifted = ((cpu_host_hal_event_mod_state(&ev) & CPU_HOST_MOD_SHIFT) != 0) ? 1u : 0u;
              uint8_t ascii = 0u;
              if (controlled != 0u) {
                  if (sc >= CPU_HOST_SCANCODE(A) && sc <= CPU_HOST_SCANCODE(Z)) {
                      ascii = (uint8_t)(1u + (uint8_t)(sc - CPU_HOST_SCANCODE(A)));
                  } else if (sc == CPU_HOST_SCANCODE(2) || sc == CPU_HOST_SCANCODE(SPACE)) {
                      ascii = 0x00u;
                  } else if (sc == CPU_HOST_SCANCODE(LEFTBRACKET)) {
                      ascii = 0x1Bu;
                  } else if (sc == CPU_HOST_SCANCODE(BACKSLASH)) {
                      ascii = 0x1Cu;
                  } else if (sc == CPU_HOST_SCANCODE(RIGHTBRACKET)) {
                      ascii = 0x1Du;
                  } else if (sc == CPU_HOST_SCANCODE(6)) {
                      ascii = 0x1Eu;
                  } else if (sc == CPU_HOST_SCANCODE(MINUS)) {
                      ascii = 0x1Fu;
                  }
              } else if (sc == CPU_HOST_SCANCODE(A)) ascii = 'A';
              else if (sc == CPU_HOST_SCANCODE(B)) ascii = 'B';
              else if (sc == CPU_HOST_SCANCODE(C)) ascii = 'C';
              else if (sc == CPU_HOST_SCANCODE(D)) ascii = 'D';
              else if (sc == CPU_HOST_SCANCODE(E)) ascii = 'E';
              else if (sc == CPU_HOST_SCANCODE(F)) ascii = 'F';
              else if (sc == CPU_HOST_SCANCODE(G)) ascii = 'G';
              else if (sc == CPU_HOST_SCANCODE(H)) ascii = 'H';
              else if (sc == CPU_HOST_SCANCODE(I)) ascii = 'I';
              else if (sc == CPU_HOST_SCANCODE(J)) ascii = 'J';
              else if (sc == CPU_HOST_SCANCODE(K)) ascii = 'K';
              else if (sc == CPU_HOST_SCANCODE(L)) ascii = 'L';
              else if (sc == CPU_HOST_SCANCODE(M)) ascii = 'M';
              else if (sc == CPU_HOST_SCANCODE(N)) ascii = 'N';
              else if (sc == CPU_HOST_SCANCODE(O)) ascii = 'O';
              else if (sc == CPU_HOST_SCANCODE(P)) ascii = 'P';
              else if (sc == CPU_HOST_SCANCODE(Q)) ascii = 'Q';
              else if (sc == CPU_HOST_SCANCODE(R)) ascii = 'R';
              else if (sc == CPU_HOST_SCANCODE(S)) ascii = 'S';
              else if (sc == CPU_HOST_SCANCODE(T)) ascii = 'T';
              else if (sc == CPU_HOST_SCANCODE(U)) ascii = 'U';
              else if (sc == CPU_HOST_SCANCODE(V)) ascii = 'V';
              else if (sc == CPU_HOST_SCANCODE(W)) ascii = 'W';
              else if (sc == CPU_HOST_SCANCODE(X)) ascii = 'X';
              else if (sc == CPU_HOST_SCANCODE(Y)) ascii = 'Y';
              else if (sc == CPU_HOST_SCANCODE(Z)) ascii = 'Z';
              else if (sc == CPU_HOST_SCANCODE(0)) ascii = shifted ? ')' : '0';
              else if (sc == CPU_HOST_SCANCODE(1)) ascii = shifted ? '!' : '1';
              else if (sc == CPU_HOST_SCANCODE(2)) ascii = shifted ? '@' : '2';
              else if (sc == CPU_HOST_SCANCODE(3)) ascii = shifted ? '#' : '3';
              else if (sc == CPU_HOST_SCANCODE(4)) ascii = shifted ? '$' : '4';
              else if (sc == CPU_HOST_SCANCODE(5)) ascii = shifted ? '%' : '5';
              else if (sc == CPU_HOST_SCANCODE(6)) ascii = shifted ? '^' : '6';
              else if (sc == CPU_HOST_SCANCODE(7)) ascii = shifted ? '&' : '7';
              else if (sc == CPU_HOST_SCANCODE(8)) ascii = shifted ? '*' : '8';
              else if (sc == CPU_HOST_SCANCODE(9)) ascii = shifted ? '(' : '9';
              else if (sc == CPU_HOST_SCANCODE(KP_0)) ascii = '0';
              else if (sc == CPU_HOST_SCANCODE(KP_1)) ascii = '1';
              else if (sc == CPU_HOST_SCANCODE(KP_2)) ascii = '2';
              else if (sc == CPU_HOST_SCANCODE(KP_3)) ascii = '3';
              else if (sc == CPU_HOST_SCANCODE(KP_4)) ascii = '4';
              else if (sc == CPU_HOST_SCANCODE(KP_5)) ascii = '5';
              else if (sc == CPU_HOST_SCANCODE(KP_6)) ascii = '6';
              else if (sc == CPU_HOST_SCANCODE(KP_7)) ascii = '7';
              else if (sc == CPU_HOST_SCANCODE(KP_8)) ascii = '8';
              else if (sc == CPU_HOST_SCANCODE(KP_9)) ascii = '9';
              else if (sc == CPU_HOST_SCANCODE(SPACE)) ascii = ' ';
              else if (sc == CPU_HOST_SCANCODE(TAB)) ascii = 0x7Fu;
              else if (sc == CPU_HOST_SCANCODE(RETURN) || sc == CPU_HOST_SCANCODE(KP_ENTER)) ascii = 0x9Bu;
              else if (sc == CPU_HOST_SCANCODE(BACKSPACE)) ascii = 0x7Eu;
              else if (sc == CPU_HOST_SCANCODE(ESCAPE)) ascii = 0x1Bu;
              else if (sc == CPU_HOST_SCANCODE(MINUS)) ascii = shifted ? '_' : '-';
              else if (sc == CPU_HOST_SCANCODE(EQUALS)) ascii = shifted ? '+' : '=';
              else if (sc == CPU_HOST_SCANCODE(LEFTBRACKET)) ascii = shifted ? '{' : '[';
              else if (sc == CPU_HOST_SCANCODE(RIGHTBRACKET)) ascii = shifted ? '}' : ']';
              else if (sc == CPU_HOST_SCANCODE(BACKSLASH)) ascii = shifted ? '|' : '\\';
              else if (sc == CPU_HOST_SCANCODE(SEMICOLON)) ascii = shifted ? ':' : ';';
              else if (sc == CPU_HOST_SCANCODE(APOSTROPHE)) ascii = shifted ? '"' : '\'';
              else if (sc == CPU_HOST_SCANCODE(COMMA)) ascii = shifted ? '<' : ',';
              else if (sc == CPU_HOST_SCANCODE(PERIOD)) ascii = shifted ? '>' : '.';
              else if (sc == CPU_HOST_SCANCODE(SLASH)) ascii = shifted ? '?' : '/';
              else if (sc == CPU_HOST_SCANCODE(GRAVE)) ascii = shifted ? '~' : '`';
              if (ascii != 0u) {
                  uint8_t next = (uint8_t)((comp->key_q_write_idx + 1u) & 0x0Fu);
                  if (comp->key_queue != NULL && next != comp->key_q_read_idx) {
                      comp->key_queue[comp->key_q_write_idx] = ascii;
                      comp->key_q_write_idx = next;
                  }
              }
          } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {
              int32_t sc = cpu_host_hal_event_scancode(&ev);
              {
                  static int key_trace = -1;
                  if (key_trace < 0) {
                      const char *env = cpu_host_hal_getenv("PASM_ATARI800XL_KEY_TRACE");
                      key_trace = (env != NULL && env[0] == '1') ? 1 : 0;
                  }
                  if (key_trace != 0) {
                      fprintf(stderr, "[atari800xl-host] keyup   sc=%d\n", (int)sc);
                  }
              }
              if (sc == CPU_HOST_SCANCODE(F2)) {
                  comp->consol_state = (uint8_t)(comp->consol_state | 0x04u);
              } else if (sc == CPU_HOST_SCANCODE(F3)) {
                  comp->consol_state = (uint8_t)(comp->consol_state | 0x02u);
              } else if (sc == CPU_HOST_SCANCODE(F4)) {
                  comp->consol_state = (uint8_t)(comp->consol_state | 0x01u);
              } else if (sc == CPU_HOST_SCANCODE(UP) || sc == CPU_HOST_SCANCODE(KP_8)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state | 0x01u);
              } else if (sc == CPU_HOST_SCANCODE(DOWN) || sc == CPU_HOST_SCANCODE(KP_2)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state | 0x02u);
              } else if (sc == CPU_HOST_SCANCODE(LEFT) || sc == CPU_HOST_SCANCODE(KP_4)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state | 0x04u);
              } else if (sc == CPU_HOST_SCANCODE(RIGHT) || sc == CPU_HOST_SCANCODE(KP_6)) {
                  comp->joy0_state = (uint8_t)(comp->joy0_state | 0x08u);
              } else if (
                  sc == CPU_HOST_SCANCODE(RCTRL) ||
                  sc == CPU_HOST_SCANCODE(RALT) ||
                  sc == CPU_HOST_SCANCODE(KP_0)
              ) {
                  comp->trig0 = 1u;
              } else if (sc == CPU_HOST_SCANCODE(I)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state | 0x01u);
              } else if (sc == CPU_HOST_SCANCODE(K)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state | 0x02u);
              } else if (sc == CPU_HOST_SCANCODE(J)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state | 0x04u);
              } else if (sc == CPU_HOST_SCANCODE(L)) {
                  comp->joy1_state = (uint8_t)(comp->joy1_state | 0x08u);
              } else if (sc == CPU_HOST_SCANCODE(LCTRL)) {
                  comp->trig1 = 1u;
              } else if (sc == CPU_HOST_SCANCODE(TAB)) {
                  comp->trig2 = 1u;
              }
          }
      }
      {
          sms_overlay_update_perf(
              cpu_host_hal_ticks_ms(),
              (uint64_t)comp->frame_count,
              cpu->total_cycles,
              (uint64_t)CPU_SYSTEM_CLOCK_HZ,
              &comp->overlay_last_ms,
              &comp->overlay_last_frame_count,
              &comp->overlay_last_cycle_count,
              &comp->overlay_fps_x100,
              &comp->overlay_cpu_hz,
              &comp->overlay_cpu_pct_x10
          );
      }
      if (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {
          uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);
          uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;
          uint32_t low_watermark = device_samples * 2u;
          uint32_t target_total = device_samples * 4u;
          uint32_t max_total = device_samples * 8u;
          if (queued_samples + comp->audio_ring_fill > max_total) {
              uint32_t desired_ring_fill = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;
              while (comp->audio_ring_fill > desired_ring_fill) {
                  comp->audio_ring_read_idx += 1u;
                  if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  comp->audio_ring_fill -= 1u;
              }
          }
          if (queued_samples < low_watermark) {
              uint32_t desired = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;
              uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;
              while (to_send > 0u) {
                  int16_t chunk[1024];
                  uint32_t n = (to_send > 1024u) ? 1024u : to_send;
                  for (uint32_t i = 0u; i < n; ++i) {
                      chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  }
                  comp->audio_ring_fill -= n;
                  if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, n * (uint32_t)sizeof(int16_t)) != 0) {
                      break;
                  }
                  to_send -= n;
              }
          }
      }
    destroy: |
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_close(comp->audio_out_dev);
          comp->audio_out_dev = 0u;
      }
      comp->audio_device_samples = 0u;
      if (comp->audio_ring != NULL) {
          cpu_host_hal_free(comp->audio_ring);
          comp->audio_ring = NULL;
      }
      if (comp->key_queue != NULL) {
          cpu_host_hal_free(comp->key_queue);
          comp->key_queue = NULL;
      }
      comp->audio_ring_capacity = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      if (comp->texture != NULL) {
          cpu_host_hal_destroy_texture(comp->texture);
          comp->texture = NULL;
      }
      if (comp->renderer != NULL) {
          cpu_host_hal_destroy_renderer(comp->renderer);
          comp->renderer = NULL;
      }
      if (comp->window != NULL) {
          cpu_host_hal_destroy_window(comp->window);
          comp->window = NULL;
      }
      if (comp->host_inited != 0u) {
          cpu_host_hal_quit_subsystems();
          cpu_host_hal_quit();
          comp->host_inited = 0u;
      }
  callback_handlers:
    keyboard_ascii: |
      {
          uint8_t value = 0u;
          if (comp->key_queue != NULL && comp->key_q_read_idx != comp->key_q_write_idx) {
              value = comp->key_queue[comp->key_q_read_idx];
              comp->key_q_read_idx = (uint8_t)((comp->key_q_read_idx + 1u) & 0x0Fu);
          }
          return (uint64_t)value;
      }
    consol_state: |
      return (uint64_t)(comp->consol_state & 0x07u);
    joystick_porta: |
      return (uint64_t)(((comp->joy1_state & 0x0Fu) << 4u) | (comp->joy0_state & 0x0Fu));
    trigger0: |
      return (uint64_t)(comp->trig0 & 0x01u);
    trigger1: |
      return (uint64_t)(comp->trig1 & 0x01u);
    trigger2: |
      return (uint64_t)(comp->trig2 & 0x01u);
    trigger3: |
      return (uint64_t)(comp->trig3 & 0x01u);
  handler_bodies:
    video_frame: |
      if (comp->host_inited == 0u || argc < 4) return;
      void *renderer = comp->renderer;
      void *texture = comp->texture;
      uint32_t frame = (uint32_t)(args[0] & 0xFFFFFFFFu);
      uint32_t *pixels = (uint32_t *)(uintptr_t)args[1];
      uint32_t w = (uint32_t)(args[2] & 0xFFFFFFFFu);
      uint32_t h = (uint32_t)(args[3] & 0xFFFFFFFFu);
      if (renderer == NULL || texture == NULL || pixels == NULL || w == 0u || h == 0u) return;
      comp->frame_count = frame;
      if (cpu->debug_overlay_enabled) {
          sms_overlay_draw_perf(
              pixels,
              w,
              h,
              comp->overlay_fps_x100,
              comp->overlay_cpu_hz,
              comp->overlay_cpu_pct_x10
          );
      }
      if (comp->texture_w != w || comp->texture_h != h) {
          cpu_host_hal_destroy_texture(texture);
          texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888, CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);
          if (texture == NULL) return;
          comp->texture = (void *)texture;
          comp->texture_w = w;
          comp->texture_h = h;
      }
      if (cpu_host_hal_update_texture(texture, NULL, pixels, (int)(w * sizeof(uint32_t))) != 0) return;
      cpu_host_hal_render_set_draw_color(renderer, 0, 0, 0, 255);
      cpu_host_hal_render_clear(renderer);
      int ww = 0;
      int wh = 0;
      if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 || ww <= 0 || wh <= 0) return;
      CPUHostRect dst;
      int scaled_w = ww;
      int scaled_h = (int)((((int64_t)ww) * (int64_t)h) / (int64_t)w);
      if (scaled_h > wh) {
          scaled_h = wh;
          scaled_w = (int)((((int64_t)wh) * (int64_t)w) / (int64_t)h);
      }
      dst.w = (scaled_w > 0) ? scaled_w : ww;
      dst.h = (scaled_h > 0) ? scaled_h : wh;
      dst.x = (ww - dst.w) / 2;
      dst.y = (wh - dst.h) / 2;
      if (cpu_host_hal_render_copy(renderer, texture, NULL, &dst) != 0) return;
      cpu_host_hal_render_present(renderer);
    audio_pcm: |
      if (comp->audio_out_dev == 0u || comp->audio_out_ready == 0u || comp->audio_ring == NULL || comp->audio_ring_capacity == 0u || argc < 1) return;
      uint8_t level_u = (uint8_t)(args[0] & 0xFFu);
      uint64_t cycle = (argc > 1) ? (uint64_t)args[1] : cpu->total_cycles;
      uint64_t sample_rate = (comp->audio_rate > 0u) ? (uint64_t)comp->audio_rate : ((CPU_AUDIO_SAMPLE_RATE > 0u) ? CPU_AUDIO_SAMPLE_RATE : 44100u);
      uint64_t clock_hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? CPU_SYSTEM_CLOCK_HZ : 1u;
      uint64_t target_sample_index = (cycle * sample_rate) / clock_hz;
      int32_t sample_in = ((int32_t)((int16_t)(int)level_u - 128)) << 8;
      int32_t sample_hp = sample_in - comp->audio_hp_prev_in + ((comp->audio_hp_prev_out * 32440) / 32768);
      int16_t next_level;
      int16_t prev_level = comp->audio_level;
      if (sample_hp < -32768) sample_hp = -32768;
      if (sample_hp > 32767) sample_hp = 32767;
      next_level = (int16_t)sample_hp;
      comp->audio_hp_prev_in = sample_in;
      comp->audio_hp_prev_out = sample_hp;

      if (comp->audio_last_cycle == 0u && comp->audio_sample_cursor == 0u && comp->audio_samples == 0u) {
          comp->audio_last_cycle = cycle;
          comp->audio_sample_cursor = target_sample_index;
          comp->audio_level = next_level;
          return;
      }

      if (target_sample_index < comp->audio_sample_cursor) {
          target_sample_index = comp->audio_sample_cursor;
      }
      {
          uint64_t samples_to_emit = target_sample_index - comp->audio_sample_cursor;
          while (samples_to_emit > 0u) {
              uint64_t n = (samples_to_emit > 4096u) ? 4096u : samples_to_emit;
              for (uint64_t i = 0u; i < n; ++i) {
                  if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                      comp->audio_ring_fill -= 1u;
                  }
                  comp->audio_ring[comp->audio_ring_write_idx] = prev_level;
                  comp->audio_ring_write_idx += 1u;
                  if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
                  comp->audio_ring_fill += 1u;
              }
              comp->audio_samples += (uint32_t)n;
              comp->audio_sample_cursor += n;
              samples_to_emit -= n;
          }
      }
      if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
          comp->audio_ring_read_idx += 1u;
          if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
          comp->audio_ring_fill -= 1u;
      }
      comp->audio_ring[comp->audio_ring_write_idx] = next_level;
      comp->audio_ring_write_idx += 1u;
      if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill += 1u;

      comp->audio_last_cycle = cycle;
      comp->audio_level = next_level;
      if (target_sample_index >= comp->audio_sample_cursor) comp->audio_sample_cursor = target_sample_index + 1u;

