    - name: joystick_porta
      args: []
      returns: u8
    - name: trigger0
      args: []
      returns: u8
    - name: trigger1
      args: []
      returns: u8
    - name: trigger2
      args: []
      returns: u8
    - name: trigger3
      args: []
      returns: u8
  handlers:
