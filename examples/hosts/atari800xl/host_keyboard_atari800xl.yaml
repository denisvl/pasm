    ascii_ctrl: 0
  - host_scancode: 230
    mapper_key_id: key_atari
    # POKEY KBCODE for ATARI/INV (0x27) + 1
    ascii: 40
    ascii_shift: 0
    ascii_ctrl: 0
  # PC keyboards don't usually have a dedicated Atari/INV key.
  # Map Left Alt as the Atari/INV key for interactive host usage.
  - host_scancode: LALT
    mapper_key_id: key_atari
    # POKEY KBCODE for ATARI/INV (0x27) + 1
    ascii: 40
    ascii_shift: 0
    ascii_ctrl: 0
  # Cartridge picker toggle
  - host_scancode: F12
    emulator_key_id: EMU_CART_PICKER
