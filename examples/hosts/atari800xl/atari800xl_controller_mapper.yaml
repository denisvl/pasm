system_name: atari800xl

# The current Atari 800XL IO model exposes 2 joystick direction nibbles via PORTA
# (P1/P2) and 4 triggers (TRIG0..TRIG3). This mapper focuses on the 2 primary
# digital joystick ports.
max_ports: 2

