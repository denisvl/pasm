metadata:
  id: host_sdl2
  type: host_adapter
  model: zx48_sdl2_interactive
  version: "1.0"

backend:
  target: sdl2

state:
  - name: sdl_inited
    type: uint8_t
    initial: "0"
  - name: window
    type: void *
    initial: "NULL"
  - name: renderer
    type: void *
    initial: "NULL"
  - name: texture
    type: void *
    initial: "NULL"
  - name: audio_out_dev
    type: uint32_t
    initial: "0"
  - name: audio_device_samples
    type: uint32_t
    initial: "0"
  - name: audio_in_dev
    type: uint32_t
    initial: "0"
  - name: row0
    type: uint8_t
    initial: "0x1F"
  - name: row1
    type: uint8_t
    initial: "0x1F"
  - name: row2
    type: uint8_t
    initial: "0x1F"
  - name: row3
    type: uint8_t
    initial: "0x1F"
  - name: row4
    type: uint8_t
    initial: "0x1F"
  - name: row5
    type: uint8_t
    initial: "0x1F"
  - name: row6
    type: uint8_t
    initial: "0x1F"
  - name: row7
    type: uint8_t
    initial: "0x1F"
  - name: last_mic
    type: uint8_t
    initial: "0"
  - name: border_color
    type: uint8_t
    initial: "0"
  - name: video_frames
    type: uint64_t
    initial: "0"
  - name: last_event_poll_tstate
    type: uint64_t
    initial: "0"
  - name: overlay_last_ms
    type: uint32_t
    initial: "0"
  - name: overlay_last_frame_count
    type: uint64_t
    initial: "0"
  - name: overlay_last_cycle_count
    type: uint64_t
    initial: "0"
  - name: overlay_fps_x100
    type: uint32_t
    initial: "0"
  - name: overlay_cpu_hz
    type: uint64_t
    initial: "0"
  - name: overlay_cpu_pct_x10
    type: uint32_t
    initial: "0"
  - name: audio_level
    type: int16_t
    initial: "0"
  - name: audio_last_level
    type: uint8_t
    initial: "0"
  - name: audio_last_cycle
    type: uint64_t
    initial: "0"
  - name: audio_sample_cursor
    type: uint64_t
    initial: "0"
  - name: audio_samples
    type: uint32_t
    initial: "0"
  - name: audio_rate
    type: uint32_t
    initial: "0"
  - name: audio_ring
    type: int16_t *
    initial: "NULL"
  - name: audio_ring_capacity
    type: uint32_t
    initial: "0"
  - name: audio_ring_read_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_write_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_fill
    type: uint32_t
    initial: "0"
  - name: audio_out_ready
    type: uint8_t
    initial: "0"
  - name: audio_in_ready
    type: uint8_t
    initial: "0"
  - name: has_keyboard_focus
    type: uint8_t
    initial: "0"
  - name: last_focus_state
    type: uint8_t
    initial: "0"
  - name: debug_enabled
    type: uint8_t
    initial: "0"
  - name: kb_last_row_mask
    type: uint8_t
    initial: "0xFF"
  - name: kb_last_result
    type: uint8_t
    initial: "0xFF"

interfaces:
  callbacks:
    - name: keyboard_matrix
      args: [u8]
      returns: u8
    - name: mic_sample
      args: []
      returns: u8
  handlers:
    - name: irq_edge
      args: [u8]
    - name: frame_boundary
      args: [u32]
    - name: video_frame
      args: [u32, u64, u32, u32, u8]
    - name: video_border
      args: [u8]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

input:
  keyboard:
    focus_required: true
    bindings:
      # Direct ZX matrix rows.
      - host_key: LSHIFT
        presses: [{ row: 0, bit: 0 }]
      - host_key: RSHIFT
        presses: [{ row: 0, bit: 0 }]
      - host_key: Z
        presses: [{ row: 0, bit: 1 }]
      - host_key: X
        presses: [{ row: 0, bit: 2 }]
      - host_key: C
        presses: [{ row: 0, bit: 3 }]
      - host_key: V
        presses: [{ row: 0, bit: 4 }]

      - host_key: A
        presses: [{ row: 1, bit: 0 }]
      - host_key: S
        presses: [{ row: 1, bit: 1 }]
      - host_key: D
        presses: [{ row: 1, bit: 2 }]
      - host_key: F
        presses: [{ row: 1, bit: 3 }]
      - host_key: G
        presses: [{ row: 1, bit: 4 }]

      - host_key: Q
        presses: [{ row: 2, bit: 0 }]
      - host_key: W
        presses: [{ row: 2, bit: 1 }]
      - host_key: E
        presses: [{ row: 2, bit: 2 }]
      - host_key: R
        presses: [{ row: 2, bit: 3 }]
      - host_key: T
        presses: [{ row: 2, bit: 4 }]

      - host_key: "1"
        presses: [{ row: 3, bit: 0 }]
      - host_key: "2"
        presses: [{ row: 3, bit: 1 }]
      - host_key: "3"
        presses: [{ row: 3, bit: 2 }]
      - host_key: "4"
        presses: [{ row: 3, bit: 3 }]
      - host_key: "5"
        presses: [{ row: 3, bit: 4 }]

      - host_key: "0"
        presses: [{ row: 4, bit: 0 }]
      - host_key: "9"
        presses: [{ row: 4, bit: 1 }]
      - host_key: "8"
        presses: [{ row: 4, bit: 2 }]
      - host_key: "7"
        presses: [{ row: 4, bit: 3 }]
      - host_key: "6"
        presses: [{ row: 4, bit: 4 }]

      - host_key: P
        presses: [{ row: 5, bit: 0 }]
      - host_key: O
        presses: [{ row: 5, bit: 1 }]
      - host_key: I
        presses: [{ row: 5, bit: 2 }]
      - host_key: U
        presses: [{ row: 5, bit: 3 }]
      - host_key: Y
        presses: [{ row: 5, bit: 4 }]

      - host_key: RETURN
        presses: [{ row: 6, bit: 0 }]
      - host_key: L
        presses: [{ row: 6, bit: 1 }]
      - host_key: K
        presses: [{ row: 6, bit: 2 }]
      - host_key: J
        presses: [{ row: 6, bit: 3 }]
      - host_key: H
        presses: [{ row: 6, bit: 4 }]

      - host_key: SPACE
        presses: [{ row: 7, bit: 0 }]
      - host_key: RALT
        presses: [{ row: 7, bit: 1 }]
      - host_key: LALT
        presses: [{ row: 7, bit: 1 }]
      - host_key: M
        presses: [{ row: 7, bit: 2 }]
      - host_key: N
        presses: [{ row: 7, bit: 3 }]
      - host_key: B
        presses: [{ row: 7, bit: 4 }]

      # PC-friendly semantic combos (mixed profile).
      - host_key: BACKSPACE
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 0 }] # CAPS SHIFT + 0
      - host_key: DELETE
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 0 }] # CAPS SHIFT + 0
      - host_key: LEFT
        presses: [{ row: 0, bit: 0 }, { row: 3, bit: 4 }] # CAPS SHIFT + 5
      - host_key: DOWN
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 4 }] # CAPS SHIFT + 6
      - host_key: UP
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 3 }] # CAPS SHIFT + 7
      - host_key: RIGHT
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 2 }] # CAPS SHIFT + 8
      - host_key: ESCAPE
        presses: [{ row: 0, bit: 0 }, { row: 7, bit: 0 }] # CAPS SHIFT + SPACE

      - host_key: COMMA
        presses: [{ row: 7, bit: 1 }, { row: 7, bit: 3 }] # SYMBOL SHIFT + N
      - host_key: PERIOD
        presses: [{ row: 7, bit: 1 }, { row: 7, bit: 2 }] # SYMBOL SHIFT + M
      - host_key: SLASH
        presses: [{ row: 7, bit: 1 }, { row: 0, bit: 4 }] # SYMBOL SHIFT + V
      - host_key: SEMICOLON
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 1 }] # SYMBOL SHIFT + O
      - host_key: APOSTROPHE
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 0 }] # SYMBOL SHIFT + P
      - host_key: MINUS
        presses: [{ row: 7, bit: 1 }, { row: 6, bit: 3 }] # SYMBOL SHIFT + J
      - host_key: EQUALS
        presses: [{ row: 7, bit: 1 }, { row: 6, bit: 1 }] # SYMBOL SHIFT + L
      - host_key: LEFTBRACKET
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 4 }] # SYMBOL SHIFT + Y
      - host_key: RIGHTBRACKET
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 3 }] # SYMBOL SHIFT + U
      - host_key: BACKSLASH
        presses: [{ row: 7, bit: 1 }, { row: 1, bit: 2 }] # SYMBOL SHIFT + D
      - host_key: GRAVE
        presses: [{ row: 7, bit: 1 }, { row: 0, bit: 2 }] # SYMBOL SHIFT + X

behavior:
  snippets:
    init: |
      if (comp->sdl_inited == 0u) {
          int sdl_ok = 1;
          const char *dbg = cpu_host_hal_getenv("PASM_SDL_DEBUG");
          comp->debug_enabled = (dbg != NULL && dbg[0] != '\0' && dbg[0] != '0') ? 1u : 0u;
          if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_EVENTS) != 0) {
              cpu_host_hal_log("host_sdl2: cpu_host_hal_init(video/events) failed: %s", cpu_host_hal_last_error());
              sdl_ok = 0;
          }
          if (sdl_ok) {
              comp->window = cpu_host_hal_create_window(
                  "PASM ZX Spectrum 48K",
                  CPU_HOST_WINDOWPOS_CENTERED,
                  CPU_HOST_WINDOWPOS_CENTERED,
                  704,
                  608,
                  CPU_HOST_WINDOW_RESIZABLE
              );
              if (comp->window == NULL) {
                  sdl_ok = 0;
              }
          }
          if (sdl_ok) {
              comp->renderer = cpu_host_hal_create_renderer(
                  comp->window,
                  -1,
                  CPU_HOST_RENDERER_ACCELERATED
              );
              if (comp->renderer == NULL) {
                  comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);
              }
              if (comp->renderer == NULL) {
                  sdl_ok = 0;
              }
          }
          if (sdl_ok) {
              comp->texture = cpu_host_hal_create_texture(
                  comp->renderer,
                  CPU_HOST_PIXELFORMAT_ARGB8888,
                  CPU_HOST_TEXTUREACCESS_STREAMING,
                  256,
                  192
              );
              if (comp->texture == NULL) {
                  sdl_ok = 0;
              } else {
                  (void)cpu_host_hal_set_texture_blend_none(comp->texture);
              }
          }
          if (sdl_ok) {
              cpu_host_hal_show_window(comp->window);
              cpu_host_hal_raise_window(comp->window);
              (void)cpu_host_hal_set_window_input_focus(comp->window);
              cpu_host_hal_render_set_draw_color(comp->renderer, 0, 0, 0, 255);
              cpu_host_hal_render_clear(comp->renderer);
              cpu_host_hal_render_present(comp->renderer);
              comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
              comp->last_focus_state = comp->has_keyboard_focus;
              if (comp->debug_enabled != 0u) {
                  cpu_host_hal_log(
                      "host_sdl2: window init focus=%u",
                      (unsigned)comp->has_keyboard_focus
                  );
              }
          }
          if (sdl_ok) {
              CPUHostAudioSpec want;
              CPUHostAudioSpec have_out;
              CPUHostAudioSpec have_in;
              cpu_host_audio_spec_zero(&want);
              cpu_host_audio_spec_zero(&have_out);
              cpu_host_audio_spec_zero(&have_in);
              want.freq = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;
              want.format = CPU_HOST_AUDIO_FORMAT_S16;
              want.channels = 1;
              want.samples = 512;
              want.callback = NULL;
              comp->audio_out_ready = 0u;
              comp->audio_in_ready = 0u;
              comp->audio_device_samples = 0u;
              if (cpu_host_hal_init_subsystem(CPU_HOST_INIT_AUDIO) != 0) {
                  cpu_host_hal_log("host_sdl2: audio subsystem unavailable: %s", cpu_host_hal_last_error());
              } else {
                  comp->audio_out_dev = cpu_host_hal_audio_open(
                      NULL,
                      0,
                      &want,
                      &have_out,
                      CPU_HOST_AUDIO_ALLOW_FREQUENCY_CHANGE
                  );
                  if (comp->audio_out_dev != 0u) {
                      if (have_out.format != CPU_HOST_AUDIO_FORMAT_S16 || have_out.channels != 1) {
                          cpu_host_hal_log(
                              "host_sdl2: unsupported out format (fmt=%u ch=%u), disabling audio out",
                              (unsigned)have_out.format,
                              (unsigned)have_out.channels
                          );
                          cpu_host_hal_audio_close(comp->audio_out_dev);
                          comp->audio_out_dev = 0u;
                          comp->audio_device_samples = 0u;
                      } else {
                          uint32_t ring_capacity = (have_out.freq > 0) ? ((uint32_t)have_out.freq * 2u) : 88200u;
                          if (ring_capacity < 8192u) ring_capacity = 8192u;
                          comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));
                          if (comp->audio_ring != NULL) {
                              comp->audio_rate = (have_out.freq > 0) ? (uint32_t)have_out.freq : 44100u;
                              comp->audio_device_samples = (uint32_t)have_out.samples;
                              comp->audio_ring_capacity = ring_capacity;
                              comp->audio_ring_read_idx = 0u;
                              comp->audio_ring_write_idx = 0u;
                              comp->audio_ring_fill = 0u;
                              comp->audio_out_ready = 1u;
                              cpu_host_hal_audio_pause(comp->audio_out_dev, 0);
                              if (comp->debug_enabled != 0u) {
                                  cpu_host_hal_log(
                                      "host_sdl2: audio out ready freq=%d",
                                      have_out.freq
                                  );
                              }
                          } else {
                              cpu_host_hal_audio_close(comp->audio_out_dev);
                              comp->audio_out_dev = 0u;
                              comp->audio_device_samples = 0u;
                          }
                      }
                  } else {
                      cpu_host_hal_log("host_sdl2: audio output open failed: %s", cpu_host_hal_last_error());
                  }
                  comp->audio_in_dev = cpu_host_hal_audio_open(
                      NULL,
                      1,
                      &want,
                      &have_in,
                      CPU_HOST_AUDIO_ALLOW_FREQUENCY_CHANGE
                  );
                  if (comp->audio_in_dev != 0u) {
                      if (have_in.format != CPU_HOST_AUDIO_FORMAT_S16 || have_in.channels != 1) {
                          cpu_host_hal_log(
                              "host_sdl2: unsupported in format (fmt=%u ch=%u), disabling audio in",
                              (unsigned)have_in.format,
                              (unsigned)have_in.channels
                          );
                          cpu_host_hal_audio_close(comp->audio_in_dev);
                          comp->audio_in_dev = 0u;
                      } else {
                          comp->audio_in_ready = 1u;
                          cpu_host_hal_audio_pause(comp->audio_in_dev, 0);
                      }
                  } else {
                      cpu_host_hal_log("host_sdl2: audio input open failed: %s", cpu_host_hal_last_error());
                  }
              }
              comp->row0 = 0x1Fu;
              comp->row1 = 0x1Fu;
              comp->row2 = 0x1Fu;
              comp->row3 = 0x1Fu;
              comp->row4 = 0x1Fu;
              comp->row5 = 0x1Fu;
              comp->row6 = 0x1Fu;
              comp->row7 = 0x1Fu;
              comp->sdl_inited = 1u;
          } else {
              if (comp->audio_out_dev != 0u) {
                  cpu_host_hal_audio_close(comp->audio_out_dev);
                  comp->audio_out_dev = 0u;
                  comp->audio_device_samples = 0u;
              }
              if (comp->audio_in_dev != 0u) {
                  cpu_host_hal_audio_close(comp->audio_in_dev);
                  comp->audio_in_dev = 0u;
              }
              if (comp->texture != NULL) {
                  cpu_host_hal_destroy_texture(comp->texture);
                  comp->texture = NULL;
              }
              if (comp->renderer != NULL) {
                  cpu_host_hal_destroy_renderer(comp->renderer);
                  comp->renderer = NULL;
              }
              if (comp->window != NULL) {
                  cpu_host_hal_destroy_window(comp->window);
                  comp->window = NULL;
              }
              cpu_host_hal_quit_subsystems();
              cpu_host_hal_quit();
          }
      }
    reset: |
      comp->row0 = 0x1Fu;
      comp->row1 = 0x1Fu;
      comp->row2 = 0x1Fu;
      comp->row3 = 0x1Fu;
      comp->row4 = 0x1Fu;
      comp->row5 = 0x1Fu;
      comp->row6 = 0x1Fu;
      comp->row7 = 0x1Fu;
      comp->video_frames = 0u;
      comp->last_event_poll_tstate = 0u;
      comp->audio_level = 0;
      comp->audio_last_level = 0u;
      comp->audio_last_cycle = 0u;
      comp->audio_sample_cursor = 0u;
      comp->audio_samples = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
      comp->last_focus_state = comp->has_keyboard_focus;
      comp->kb_last_row_mask = 0xFFu;
      comp->kb_last_result = 0xFFu;
      comp->overlay_last_ms = 0u;
      comp->overlay_last_frame_count = 0u;
      comp->overlay_last_cycle_count = 0u;
      comp->overlay_fps_x100 = 0u;
      comp->overlay_cpu_hz = 0u;
      comp->overlay_cpu_pct_x10 = 0u;
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_clear(comp->audio_out_dev);
      }
    step_post: |
      if (comp->sdl_inited == 0u) return;
      uint64_t now = cpu->comp_ula0.tstate_global;
      if ((now - comp->last_event_poll_tstate) < 2048u) return;
      comp->last_event_poll_tstate = now;
      CPUHostEvent ev;
      while (cpu_host_hal_poll_event(&ev)) {
          if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {
              cpu->running = false;
              cpu->halted = true;
          }
          if (comp->debug_enabled != 0u) {
              if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN || cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {
                  cpu_host_hal_log(
                      "host_sdl2: key event type=%d scancode=%d key=%s",
                      cpu_host_hal_event_type(&ev),
                      (int)cpu_host_hal_event_scancode(&ev),
                      cpu_host_hal_key_name(ev.key.keysym.sym)
                  );
              }
          }
      }
      cpu_host_hal_pump_events();
      comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
      if (comp->has_keyboard_focus != comp->last_focus_state) {
          comp->last_focus_state = comp->has_keyboard_focus;
          if (comp->window != NULL) {
              cpu_host_hal_set_window_title(
                  comp->window,
                  (comp->has_keyboard_focus != 0u)
                      ? "PASM ZX Spectrum 48K [FOCUS]"
                      : "PASM ZX Spectrum 48K [NO-FOCUS]"
              );
          }
          if (comp->debug_enabled != 0u) {
              cpu_host_hal_log(
                  "host_sdl2: keyboard focus=%u",
                  (unsigned)comp->has_keyboard_focus
              );
          }
      }
      {
          sms_overlay_update_perf(
              cpu_host_hal_ticks_ms(),
              comp->video_frames,
              cpu->total_cycles,
              (uint64_t)CPU_SYSTEM_CLOCK_HZ,
              &comp->overlay_last_ms,
              &comp->overlay_last_frame_count,
              &comp->overlay_last_cycle_count,
              &comp->overlay_fps_x100,
              &comp->overlay_cpu_hz,
              &comp->overlay_cpu_pct_x10
          );
      }
      int key_count = 0;
      const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);
      if (ks == NULL || key_count <= 0) return;

      uint8_t rows[8] = { 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu };
      cpu_component_apply_declared_keymap(
          cpu,
          "host_sdl2",
          ks,
          (size_t)key_count,
          rows,
          8u,
          comp->has_keyboard_focus
      );
      comp->row0 = rows[0];
      comp->row1 = rows[1];
      comp->row2 = rows[2];
      comp->row3 = rows[3];
      comp->row4 = rows[4];
      comp->row5 = rows[5];
      comp->row6 = rows[6];
      comp->row7 = rows[7];
      if (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {
          uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);
          uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;
          uint32_t low_watermark = device_samples * 2u;
          uint32_t target_total = device_samples * 4u;
          uint32_t max_total = device_samples * 8u;
          uint32_t total_backlog = queued_samples + comp->audio_ring_fill;
          if (total_backlog > max_total) {
              uint32_t drop = total_backlog - max_total;
              if (drop > comp->audio_ring_fill) {
                  drop = comp->audio_ring_fill;
              }
              if (drop > 0u) {
                  comp->audio_ring_read_idx = (comp->audio_ring_read_idx + drop) % comp->audio_ring_capacity;
                  comp->audio_ring_fill -= drop;
              }
          }
          if (queued_samples < low_watermark) {
              uint32_t desired = target_total - queued_samples;
              uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;
              while (to_send > 0u) {
                  int16_t chunk[1024];
                  uint32_t n = (to_send > 1024u) ? 1024u : to_send;
                  for (uint32_t i = 0u; i < n; ++i) {
                      chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  }
                  comp->audio_ring_fill -= n;
                  if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, n * (uint32_t)sizeof(int16_t)) != 0) {
                      break;
                  }
                  to_send -= n;
              }
          }
      }
    destroy: |
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_close(comp->audio_out_dev);
          comp->audio_out_dev = 0u;
      }
      comp->audio_out_ready = 0u;
      if (comp->audio_ring != NULL) {
          cpu_host_hal_free(comp->audio_ring);
          comp->audio_ring = NULL;
      }
      comp->audio_ring_capacity = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->audio_device_samples = 0u;
      if (comp->audio_in_dev != 0u) {
          cpu_host_hal_audio_close(comp->audio_in_dev);
          comp->audio_in_dev = 0u;
      }
      comp->audio_in_ready = 0u;
      if (comp->texture != NULL) {
          cpu_host_hal_destroy_texture(comp->texture);
          comp->texture = NULL;
      }
      if (comp->renderer != NULL) {
          cpu_host_hal_destroy_renderer(comp->renderer);
          comp->renderer = NULL;
      }
      if (comp->window != NULL) {
          cpu_host_hal_destroy_window(comp->window);
          comp->window = NULL;
      }
      if (comp->sdl_inited != 0u) {
          cpu_host_hal_quit_subsystems();
          cpu_host_hal_quit();
          comp->sdl_inited = 0u;
          comp->has_keyboard_focus = 0u;
      }
  callback_handlers:
    keyboard_matrix: |
      if (comp->sdl_inited == 0u) return 0xFFu;
      uint8_t row_mask = (argc > 0) ? (uint8_t)(args[0] & 0xFFu) : 0xFFu;
      uint8_t lo = 0x1Fu;
      if ((row_mask & 0x01u) == 0u) lo = (uint8_t)(lo & comp->row0);
      if ((row_mask & 0x02u) == 0u) lo = (uint8_t)(lo & comp->row1);
      if ((row_mask & 0x04u) == 0u) lo = (uint8_t)(lo & comp->row2);
      if ((row_mask & 0x08u) == 0u) lo = (uint8_t)(lo & comp->row3);
      if ((row_mask & 0x10u) == 0u) lo = (uint8_t)(lo & comp->row4);
      if ((row_mask & 0x20u) == 0u) lo = (uint8_t)(lo & comp->row5);
      if ((row_mask & 0x40u) == 0u) lo = (uint8_t)(lo & comp->row6);
      if ((row_mask & 0x80u) == 0u) lo = (uint8_t)(lo & comp->row7);
      uint8_t result = (uint8_t)(0xE0u | lo);
      if (comp->debug_enabled != 0u &&
          (
              row_mask != comp->kb_last_row_mask ||
              result != comp->kb_last_result
          )) {
          cpu_host_hal_log(
              "host_sdl2: keyboard_matrix row_mask=0x%02X result=0x%02X focus=%u",
              row_mask,
              result,
              (unsigned)comp->has_keyboard_focus
          );
      }
      comp->kb_last_row_mask = row_mask;
      comp->kb_last_result = result;
      return (uint64_t)result;
    mic_sample: |
      if (comp->audio_in_dev != 0u) {
          int16_t sample = 0;
          if (cpu_host_hal_audio_dequeue(comp->audio_in_dev, &sample, (uint32_t)sizeof(sample)) == sizeof(sample)) {
              comp->last_mic = (sample > 0) ? 1u : 0u;
          }
      }
      return (uint64_t)comp->last_mic;
  handler_bodies:
    irq_edge: |
      (void)args;
      (void)argc;
    frame_boundary: |
      uint32_t frame_count = 0u;
      if (argc > 0) {
          frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);
      }
      comp->video_frames = (uint64_t)frame_count;
    video_border: |
      if (argc > 0) {
          comp->border_color = (uint8_t)(args[0] & 0xFFu);
      }
    video_frame: |
      if (comp->sdl_inited == 0u || argc < 5) return;
      void *renderer = comp->renderer;
      void *texture = comp->texture;
      uint32_t *pixels = (uint32_t *)(uintptr_t)args[1];
      uint32_t w = (uint32_t)(args[2] & 0xFFFFFFFFu);
      uint32_t h = (uint32_t)(args[3] & 0xFFFFFFFFu);
      if (w == 0u) w = 256u;
      if (h == 0u) h = 192u;
      if (renderer == NULL || texture == NULL || pixels == NULL) return;
      comp->video_frames = (uint64_t)(args[0] & 0xFFFFFFFFu);
      if (cpu->debug_overlay_enabled) {
          sms_overlay_draw_perf(
              pixels,
              w,
              h,
              comp->overlay_fps_x100,
              comp->overlay_cpu_hz,
              comp->overlay_cpu_pct_x10
          );
      }
      static const uint8_t border_rgb[8][3] = {
          { 0, 0, 0 }, { 0, 0, 215 }, { 215, 0, 0 }, { 215, 0, 215 },
          { 0, 215, 0 }, { 0, 215, 215 }, { 215, 215, 0 }, { 215, 215, 215 }
      };
      uint8_t border = (uint8_t)(args[4] & 0x07u);
      cpu_host_hal_render_set_draw_color(
          renderer,
          border_rgb[border][0],
          border_rgb[border][1],
          border_rgb[border][2],
          255
      );
      cpu_host_hal_render_clear(renderer);
      if (cpu_host_hal_update_texture(texture, NULL, pixels, (int)(256u * sizeof(uint32_t))) != 0) return;
      int ww = 0;
      int wh = 0;
      if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 || ww <= 0 || wh <= 0) {
          if (comp->window != NULL) {
              cpu_host_hal_get_window_size(comp->window, &ww, &wh);
          }
      }
      if (ww <= 0) ww = 704;
      if (wh <= 0) wh = 608;
      CPUHostRect dst;
      dst.x = (ww * 48) / 352;
      dst.y = (wh * 56) / 304;
      dst.w = (ww * 256) / 352;
      dst.h = (wh * 192) / 304;
      if (dst.w <= 0 || dst.h <= 0) {
          dst.x = 0;
          dst.y = 0;
          dst.w = ww;
          dst.h = wh;
      }
      if (cpu_host_hal_render_copy(renderer, texture, NULL, &dst) != 0) return;
      cpu_host_hal_render_present(renderer);
    audio_pcm: |
      if (comp->audio_out_dev == 0u || comp->audio_out_ready == 0u || comp->audio_ring == NULL || comp->audio_ring_capacity == 0u || argc < 1) return;
      uint8_t level = (uint8_t)(args[0] & 0xFFu);
      uint64_t cycle = (argc > 1) ? (uint64_t)args[1] : cpu->total_cycles;
      uint64_t sample_rate = (comp->audio_rate > 0u) ? (uint64_t)comp->audio_rate : ((CPU_AUDIO_SAMPLE_RATE > 0u) ? CPU_AUDIO_SAMPLE_RATE : 44100u);
      uint64_t clock_hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? CPU_SYSTEM_CLOCK_HZ : 1u;
      uint64_t target_sample_index = (cycle * sample_rate) / clock_hz;
      int16_t target = (level != 0u) ? 1400 : 0;
      if (comp->audio_last_level != level) {
          comp->audio_last_level = level;
          if (comp->debug_enabled != 0u) {
              cpu_host_hal_log("host_sdl2: beeper level=%u", (unsigned)level);
          }
      }
      int16_t next_level = (int16_t)(comp->audio_level + ((target - comp->audio_level) / 6));
      if (level == 0u && next_level > -4 && next_level < 4) next_level = 0;
      if (comp->audio_last_cycle == 0u && comp->audio_sample_cursor == 0u && comp->audio_samples == 0u) {
          comp->audio_last_cycle = cycle;
          comp->audio_sample_cursor = target_sample_index;
          comp->audio_level = next_level;
          return;
      }
      if (target_sample_index < comp->audio_sample_cursor) {
          comp->audio_sample_cursor = target_sample_index;
      }
      {
          uint64_t samples_to_emit = target_sample_index - comp->audio_sample_cursor;
          while (samples_to_emit > 0u) {
              uint64_t n = (samples_to_emit > 4096u) ? 4096u : samples_to_emit;
              for (uint64_t i = 0u; i < n; ++i) {
                  if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                      comp->audio_ring_fill -= 1u;
                  }
                  comp->audio_ring[comp->audio_ring_write_idx] = comp->audio_level;
                  comp->audio_ring_write_idx += 1u;
                  if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
                  comp->audio_ring_fill += 1u;
              }
              comp->audio_samples += (uint32_t)n;
              comp->audio_sample_cursor += n;
              samples_to_emit -= n;
          }
      }
      comp->audio_last_cycle = cycle;
      comp->audio_level = next_level;

coding:
  headers: ["pasm_overlay.h"]
  include_paths: ["include"]
  linked_libraries: []
  library_paths: []
