interfaces:
  callbacks:
    - name: keyboard_matrix
      args: [u8]
      returns: u8
    - name: mic_sample
      args: []
      returns: u8
  handlers:
    - name: irq_edge
      args: [u8]
    - name: frame_boundary
      args: [u32]
    - name: video_frame
      args: [u32, u64, u32, u32, u8]
    - name: video_border
      args: [u8]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

input:
  keyboard:
    source: sdl_scancode
    focus_required: true
    bindings:
      # Direct ZX matrix rows.
      - host_key: SDL_SCANCODE_LSHIFT
        presses: [{ row: 0, bit: 0 }]
      - host_key: SDL_SCANCODE_RSHIFT
        presses: [{ row: 0, bit: 0 }]
      - host_key: SDL_SCANCODE_Z
        presses: [{ row: 0, bit: 1 }]
      - host_key: SDL_SCANCODE_X
        presses: [{ row: 0, bit: 2 }]
      - host_key: SDL_SCANCODE_C
        presses: [{ row: 0, bit: 3 }]
      - host_key: SDL_SCANCODE_V
        presses: [{ row: 0, bit: 4 }]

      - host_key: SDL_SCANCODE_A
        presses: [{ row: 1, bit: 0 }]
      - host_key: SDL_SCANCODE_S
        presses: [{ row: 1, bit: 1 }]
      - host_key: SDL_SCANCODE_D
        presses: [{ row: 1, bit: 2 }]
      - host_key: SDL_SCANCODE_F
        presses: [{ row: 1, bit: 3 }]
      - host_key: SDL_SCANCODE_G
        presses: [{ row: 1, bit: 4 }]

      - host_key: SDL_SCANCODE_Q
        presses: [{ row: 2, bit: 0 }]
      - host_key: SDL_SCANCODE_W
        presses: [{ row: 2, bit: 1 }]
      - host_key: SDL_SCANCODE_E
        presses: [{ row: 2, bit: 2 }]
      - host_key: SDL_SCANCODE_R
        presses: [{ row: 2, bit: 3 }]
      - host_key: SDL_SCANCODE_T
        presses: [{ row: 2, bit: 4 }]

      - host_key: SDL_SCANCODE_1
        presses: [{ row: 3, bit: 0 }]
      - host_key: SDL_SCANCODE_2
        presses: [{ row: 3, bit: 1 }]
      - host_key: SDL_SCANCODE_3
        presses: [{ row: 3, bit: 2 }]
      - host_key: SDL_SCANCODE_4
        presses: [{ row: 3, bit: 3 }]
      - host_key: SDL_SCANCODE_5
        presses: [{ row: 3, bit: 4 }]

      - host_key: SDL_SCANCODE_0
        presses: [{ row: 4, bit: 0 }]
      - host_key: SDL_SCANCODE_9
        presses: [{ row: 4, bit: 1 }]
      - host_key: SDL_SCANCODE_8
        presses: [{ row: 4, bit: 2 }]
      - host_key: SDL_SCANCODE_7
        presses: [{ row: 4, bit: 3 }]
      - host_key: SDL_SCANCODE_6
        presses: [{ row: 4, bit: 4 }]

      - host_key: SDL_SCANCODE_P
        presses: [{ row: 5, bit: 0 }]
      - host_key: SDL_SCANCODE_O
        presses: [{ row: 5, bit: 1 }]
      - host_key: SDL_SCANCODE_I
        presses: [{ row: 5, bit: 2 }]
      - host_key: SDL_SCANCODE_U
        presses: [{ row: 5, bit: 3 }]
      - host_key: SDL_SCANCODE_Y
        presses: [{ row: 5, bit: 4 }]

      - host_key: SDL_SCANCODE_RETURN
        presses: [{ row: 6, bit: 0 }]
      - host_key: SDL_SCANCODE_L
        presses: [{ row: 6, bit: 1 }]
      - host_key: SDL_SCANCODE_K
        presses: [{ row: 6, bit: 2 }]
      - host_key: SDL_SCANCODE_J
        presses: [{ row: 6, bit: 3 }]
      - host_key: SDL_SCANCODE_H
        presses: [{ row: 6, bit: 4 }]

      - host_key: SDL_SCANCODE_SPACE
        presses: [{ row: 7, bit: 0 }]
      - host_key: SDL_SCANCODE_RALT
        presses: [{ row: 7, bit: 1 }]
      - host_key: SDL_SCANCODE_LALT
        presses: [{ row: 7, bit: 1 }]
      - host_key: SDL_SCANCODE_M
        presses: [{ row: 7, bit: 2 }]
      - host_key: SDL_SCANCODE_N
        presses: [{ row: 7, bit: 3 }]
      - host_key: SDL_SCANCODE_B
        presses: [{ row: 7, bit: 4 }]

      # PC-friendly semantic combos (mixed profile).
      - host_key: SDL_SCANCODE_BACKSPACE
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 0 }] # CAPS SHIFT + 0
      - host_key: SDL_SCANCODE_DELETE
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 0 }] # CAPS SHIFT + 0
      - host_key: SDL_SCANCODE_LEFT
        presses: [{ row: 0, bit: 0 }, { row: 3, bit: 4 }] # CAPS SHIFT + 5
      - host_key: SDL_SCANCODE_DOWN
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 4 }] # CAPS SHIFT + 6
      - host_key: SDL_SCANCODE_UP
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 3 }] # CAPS SHIFT + 7
      - host_key: SDL_SCANCODE_RIGHT
        presses: [{ row: 0, bit: 0 }, { row: 4, bit: 2 }] # CAPS SHIFT + 8
      - host_key: SDL_SCANCODE_ESCAPE
        presses: [{ row: 0, bit: 0 }, { row: 7, bit: 0 }] # CAPS SHIFT + SPACE

      - host_key: SDL_SCANCODE_COMMA
        presses: [{ row: 7, bit: 1 }, { row: 7, bit: 3 }] # SYMBOL SHIFT + N
      - host_key: SDL_SCANCODE_PERIOD
        presses: [{ row: 7, bit: 1 }, { row: 7, bit: 2 }] # SYMBOL SHIFT + M
      - host_key: SDL_SCANCODE_SLASH
        presses: [{ row: 7, bit: 1 }, { row: 0, bit: 4 }] # SYMBOL SHIFT + V
      - host_key: SDL_SCANCODE_SEMICOLON
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 1 }] # SYMBOL SHIFT + O
      - host_key: SDL_SCANCODE_APOSTROPHE
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 0 }] # SYMBOL SHIFT + P
      - host_key: SDL_SCANCODE_MINUS
        presses: [{ row: 7, bit: 1 }, { row: 6, bit: 3 }] # SYMBOL SHIFT + J
      - host_key: SDL_SCANCODE_EQUALS
        presses: [{ row: 7, bit: 1 }, { row: 6, bit: 1 }] # SYMBOL SHIFT + L
      - host_key: SDL_SCANCODE_LEFTBRACKET
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 4 }] # SYMBOL SHIFT + Y
      - host_key: SDL_SCANCODE_RIGHTBRACKET
        presses: [{ row: 7, bit: 1 }, { row: 5, bit: 3 }] # SYMBOL SHIFT + U
      - host_key: SDL_SCANCODE_BACKSLASH
        presses: [{ row: 7, bit: 1 }, { row: 1, bit: 2 }] # SYMBOL SHIFT + D
      - host_key: SDL_SCANCODE_GRAVE
        presses: [{ row: 7, bit: 1 }, { row: 0, bit: 2 }] # SYMBOL SHIFT + X

behavior:
  snippets:
    init: |
      if (comp->sdl_inited == 0u) {
          int sdl_ok = 1;
          const char *dbg = SDL_getenv("PASM_SDL_DEBUG");
          comp->debug_enabled = (dbg != NULL && dbg[0] != '\0' && dbg[0] != '0') ? 1u : 0u;
          if (SDL_Init(SDL_INIT_VIDEO | SDL_INIT_EVENTS) != 0) {
              SDL_Log("host_sdl2: SDL_Init(video/events) failed: %s", SDL_GetError());
              sdl_ok = 0;
          }
          if (sdl_ok) {
              comp->window = SDL_CreateWindow(
                  "PASM ZX Spectrum 48K",
                  SDL_WINDOWPOS_CENTERED,
                  SDL_WINDOWPOS_CENTERED,
                  704,
                  608,
                  SDL_WINDOW_RESIZABLE
              );
              if (comp->window == NULL) {
                  sdl_ok = 0;
              }
          }
          if (sdl_ok) {
              comp->renderer = SDL_CreateRenderer(
                  (SDL_Window *)comp->window,
                  -1,
                  SDL_RENDERER_ACCELERATED
              );
              if (comp->renderer == NULL) {
                  comp->renderer = SDL_CreateRenderer((SDL_Window *)comp->window, -1, 0);
              }
              if (comp->renderer == NULL) {
                  sdl_ok = 0;
              }
          }
          if (sdl_ok) {
              comp->texture = SDL_CreateTexture(
                  (SDL_Renderer *)comp->renderer,
                  SDL_PIXELFORMAT_ARGB8888,
                  SDL_TEXTUREACCESS_STREAMING,
                  256,
                  192
              );
              if (comp->texture == NULL) {
                  sdl_ok = 0;
              } else {
                  (void)SDL_SetTextureBlendMode((SDL_Texture *)comp->texture, SDL_BLENDMODE_NONE);
              }
          }
          if (sdl_ok) {
              SDL_ShowWindow((SDL_Window *)comp->window);
              SDL_RaiseWindow((SDL_Window *)comp->window);
              (void)SDL_SetWindowInputFocus((SDL_Window *)comp->window);
              SDL_SetRenderDrawColor((SDL_Renderer *)comp->renderer, 0, 0, 0, 255);
              SDL_RenderClear((SDL_Renderer *)comp->renderer);
              SDL_RenderPresent((SDL_Renderer *)comp->renderer);
              comp->has_keyboard_focus = (SDL_GetKeyboardFocus() == (SDL_Window *)comp->window) ? 1u : 0u;
              comp->last_focus_state = comp->has_keyboard_focus;
              if (comp->debug_enabled != 0u) {
                  SDL_Log(
                      "host_sdl2: window init focus=%u",
                      (unsigned)comp->has_keyboard_focus
                  );
              }
          }
          if (sdl_ok) {
              SDL_AudioSpec want;
              SDL_AudioSpec have_out;
              SDL_AudioSpec have_in;
              SDL_zero(want);
              SDL_zero(have_out);
              SDL_zero(have_in);
              want.freq = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;
              want.format = AUDIO_S16SYS;
              want.channels = 1;
              want.samples = 512;
              want.callback = NULL;
              comp->audio_out_ready = 0u;
              comp->audio_in_ready = 0u;
              comp->audio_device_samples = 0u;
              if (SDL_InitSubSystem(SDL_INIT_AUDIO) != 0) {
                  SDL_Log("host_sdl2: audio subsystem unavailable: %s", SDL_GetError());
              } else {
                  comp->audio_out_dev = SDL_OpenAudioDevice(
                      NULL,
                      0,
                      &want,
                      &have_out,
                      SDL_AUDIO_ALLOW_FREQUENCY_CHANGE
                  );
                  if (comp->audio_out_dev != 0u) {
                      if (have_out.format != AUDIO_S16SYS || have_out.channels != 1) {
                          SDL_Log(
                              "host_sdl2: unsupported out format (fmt=%u ch=%u), disabling audio out",
                              (unsigned)have_out.format,
                              (unsigned)have_out.channels
                          );
                          SDL_CloseAudioDevice(comp->audio_out_dev);
                          comp->audio_out_dev = 0u;
                          comp->audio_device_samples = 0u;
                      } else {
                          uint32_t ring_capacity = (have_out.freq > 0) ? ((uint32_t)have_out.freq * 2u) : 88200u;
                          if (ring_capacity < 8192u) ring_capacity = 8192u;
                          comp->audio_ring = (int16_t *)SDL_malloc((size_t)ring_capacity * sizeof(int16_t));
                          if (comp->audio_ring != NULL) {
                              comp->audio_rate = (have_out.freq > 0) ? (uint32_t)have_out.freq : 44100u;
                              comp->audio_device_samples = (uint32_t)have_out.samples;
                              comp->audio_ring_capacity = ring_capacity;
                              comp->audio_ring_read_idx = 0u;
                              comp->audio_ring_write_idx = 0u;
                              comp->audio_ring_fill = 0u;
                              comp->audio_out_ready = 1u;
                              SDL_PauseAudioDevice(comp->audio_out_dev, 0);
                              if (comp->debug_enabled != 0u) {
                                  SDL_Log(
                                      "host_sdl2: audio out ready freq=%d",
                                      have_out.freq
                                  );
                              }
                          } else {
                              SDL_CloseAudioDevice(comp->audio_out_dev);
                              comp->audio_out_dev = 0u;
                              comp->audio_device_samples = 0u;
                          }
                      }
                  } else {
                      SDL_Log("host_sdl2: audio output open failed: %s", SDL_GetError());
                  }
                  comp->audio_in_dev = SDL_OpenAudioDevice(
                      NULL,
                      1,
                      &want,
                      &have_in,
                      SDL_AUDIO_ALLOW_FREQUENCY_CHANGE
                  );
                  if (comp->audio_in_dev != 0u) {
                      if (have_in.format != AUDIO_S16SYS || have_in.channels != 1) {
                          SDL_Log(
                              "host_sdl2: unsupported in format (fmt=%u ch=%u), disabling audio in",
                              (unsigned)have_in.format,
                              (unsigned)have_in.channels
                          );
                          SDL_CloseAudioDevice(comp->audio_in_dev);
                          comp->audio_in_dev = 0u;
                      } else {
                          comp->audio_in_ready = 1u;
                          SDL_PauseAudioDevice(comp->audio_in_dev, 0);
                      }
                  } else {
                      SDL_Log("host_sdl2: audio input open failed: %s", SDL_GetError());
                  }
              }
              comp->row0 = 0x1Fu;
              comp->row1 = 0x1Fu;
              comp->row2 = 0x1Fu;
              comp->row3 = 0x1Fu;
              comp->row4 = 0x1Fu;
              comp->row5 = 0x1Fu;
              comp->row6 = 0x1Fu;
              comp->row7 = 0x1Fu;
              comp->sdl_inited = 1u;
          } else {
              if (comp->audio_out_dev != 0u) {
                  SDL_CloseAudioDevice(comp->audio_out_dev);
                  comp->audio_out_dev = 0u;
                  comp->audio_device_samples = 0u;
              }
              if (comp->audio_in_dev != 0u) {
                  SDL_CloseAudioDevice(comp->audio_in_dev);
                  comp->audio_in_dev = 0u;
              }
              if (comp->texture != NULL) {
                  SDL_DestroyTexture((SDL_Texture *)comp->texture);
                  comp->texture = NULL;
              }
              if (comp->renderer != NULL) {
                  SDL_DestroyRenderer((SDL_Renderer *)comp->renderer);
                  comp->renderer = NULL;
              }
              if (comp->window != NULL) {
                  SDL_DestroyWindow((SDL_Window *)comp->window);
                  comp->window = NULL;
              }
              SDL_QuitSubSystem(SDL_INIT_VIDEO | SDL_INIT_AUDIO | SDL_INIT_EVENTS);
              SDL_Quit();
          }
      }
    reset: |
      comp->row0 = 0x1Fu;
      comp->row1 = 0x1Fu;
      comp->row2 = 0x1Fu;
      comp->row3 = 0x1Fu;
      comp->row4 = 0x1Fu;
      comp->row5 = 0x1Fu;
      comp->row6 = 0x1Fu;
      comp->row7 = 0x1Fu;
      comp->video_frames = 0u;
      comp->last_event_poll_tstate = 0u;
      comp->audio_level = 0;
      comp->audio_last_level = 0u;
      comp->audio_last_cycle = 0u;
      comp->audio_sample_cursor = 0u;
      comp->audio_samples = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->has_keyboard_focus = (SDL_GetKeyboardFocus() == (SDL_Window *)comp->window) ? 1u : 0u;
      comp->last_focus_state = comp->has_keyboard_focus;
      comp->kb_last_row_mask = 0xFFu;
      comp->kb_last_result = 0xFFu;
      comp->overlay_last_ms = 0u;
      comp->overlay_last_frame_count = 0u;
      comp->overlay_last_cycle_count = 0u;
      comp->overlay_fps_x100 = 0u;
      comp->overlay_cpu_hz = 0u;
      comp->overlay_cpu_pct_x10 = 0u;
      if (comp->audio_out_dev != 0u) {
          SDL_ClearQueuedAudio(comp->audio_out_dev);
      }
    step_post: |
      if (comp->sdl_inited == 0u) return;
      uint64_t now = cpu->comp_ula0.tstate_global;
      if ((now - comp->last_event_poll_tstate) < 2048u) return;
      comp->last_event_poll_tstate = now;
      SDL_Event ev;
      while (SDL_PollEvent(&ev)) {
          if (ev.type == SDL_QUIT) {
              cpu->running = false;
              cpu->halted = true;
          }
          if (comp->debug_enabled != 0u) {
              if (ev.type == SDL_KEYDOWN || ev.type == SDL_KEYUP) {
                  SDL_Log(
                      "host_sdl2: key event type=%d scancode=%d key=%s",
                      ev.type,
                      (int)ev.key.keysym.scancode,
                      SDL_GetKeyName(ev.key.keysym.sym)
                  );
              }
          }
      }
      SDL_PumpEvents();
      comp->has_keyboard_focus = (SDL_GetKeyboardFocus() == (SDL_Window *)comp->window) ? 1u : 0u;
      if (comp->has_keyboard_focus != comp->last_focus_state) {
          comp->last_focus_state = comp->has_keyboard_focus;
          if (comp->window != NULL) {
              SDL_SetWindowTitle(
                  (SDL_Window *)comp->window,
                  (comp->has_keyboard_focus != 0u)
                      ? "PASM ZX Spectrum 48K [FOCUS]"
                      : "PASM ZX Spectrum 48K [NO-FOCUS]"
              );
          }
          if (comp->debug_enabled != 0u) {
              SDL_Log(
                  "host_sdl2: keyboard focus=%u",
                  (unsigned)comp->has_keyboard_focus
              );
          }
      }
      {
          sms_overlay_update_perf(
              SDL_GetTicks(),
              comp->video_frames,
              cpu->total_cycles,
              (uint64_t)CPU_SYSTEM_CLOCK_HZ,
              &comp->overlay_last_ms,
              &comp->overlay_last_frame_count,
              &comp->overlay_last_cycle_count,
              &comp->overlay_fps_x100,
              &comp->overlay_cpu_hz,
              &comp->overlay_cpu_pct_x10
          );
      }
      int key_count = 0;
      const uint8_t *ks = SDL_GetKeyboardState(&key_count);
      if (ks == NULL || key_count <= 0) return;

      uint8_t rows[8] = { 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu, 0x1Fu };
      cpu_component_apply_declared_keymap(
          cpu,
          "host_sdl2",
          ks,
          (size_t)key_count,
          rows,
          8u,
          comp->has_keyboard_focus
      );
      comp->row0 = rows[0];
      comp->row1 = rows[1];
      comp->row2 = rows[2];
      comp->row3 = rows[3];
      comp->row4 = rows[4];
      comp->row5 = rows[5];
      comp->row6 = rows[6];
      comp->row7 = rows[7];
      if (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {
          uint32_t queued_samples = SDL_GetQueuedAudioSize(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);
          uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;
          uint32_t low_watermark = device_samples * 2u;
          uint32_t target_total = device_samples * 4u;
          uint32_t max_total = device_samples * 8u;
          uint32_t total_backlog = queued_samples + comp->audio_ring_fill;
          if (total_backlog > max_total) {
              uint32_t drop = total_backlog - max_total;
              if (drop > comp->audio_ring_fill) {
                  drop = comp->audio_ring_fill;
              }
              if (drop > 0u) {
                  comp->audio_ring_read_idx = (comp->audio_ring_read_idx + drop) % comp->audio_ring_capacity;
                  comp->audio_ring_fill -= drop;
              }
          }
          if (queued_samples < low_watermark) {
              uint32_t desired = target_total - queued_samples;
              uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;
              while (to_send > 0u) {
                  int16_t chunk[1024];
                  uint32_t n = (to_send > 1024u) ? 1024u : to_send;
                  for (uint32_t i = 0u; i < n; ++i) {
                      chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  }
                  comp->audio_ring_fill -= n;
                  if (SDL_QueueAudio(comp->audio_out_dev, chunk, n * (uint32_t)sizeof(int16_t)) != 0) {
                      break;
                  }
                  to_send -= n;
              }
          }
      }
    destroy: |
      if (comp->audio_out_dev != 0u) {
          SDL_CloseAudioDevice(comp->audio_out_dev);
          comp->audio_out_dev = 0u;
      }
      comp->audio_out_ready = 0u;
      if (comp->audio_ring != NULL) {
          SDL_free(comp->audio_ring);
          comp->audio_ring = NULL;
      }
      comp->audio_ring_capacity = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->audio_device_samples = 0u;
      if (comp->audio_in_dev != 0u) {
          SDL_CloseAudioDevice(comp->audio_in_dev);
          comp->audio_in_dev = 0u;
      }
      comp->audio_in_ready = 0u;
      if (comp->texture != NULL) {
          SDL_DestroyTexture((SDL_Texture *)comp->texture);
          comp->texture = NULL;
      }
      if (comp->renderer != NULL) {
          SDL_DestroyRenderer((SDL_Renderer *)comp->renderer);
          comp->renderer = NULL;
      }
      if (comp->window != NULL) {
          SDL_DestroyWindow((SDL_Window *)comp->window);
          comp->window = NULL;
      }
      if (comp->sdl_inited != 0u) {
          SDL_QuitSubSystem(SDL_INIT_VIDEO | SDL_INIT_AUDIO | SDL_INIT_EVENTS);
          SDL_Quit();
          comp->sdl_inited = 0u;
          comp->has_keyboard_focus = 0u;
      }
  callback_handlers:
    keyboard_matrix: |
      if (comp->sdl_inited == 0u) return 0xFFu;
      uint8_t row_mask = (argc > 0) ? (uint8_t)(args[0] & 0xFFu) : 0xFFu;
      uint8_t lo = 0x1Fu;
      if ((row_mask & 0x01u) == 0u) lo = (uint8_t)(lo & comp->row0);
      if ((row_mask & 0x02u) == 0u) lo = (uint8_t)(lo & comp->row1);
      if ((row_mask & 0x04u) == 0u) lo = (uint8_t)(lo & comp->row2);
      if ((row_mask & 0x08u) == 0u) lo = (uint8_t)(lo & comp->row3);
      if ((row_mask & 0x10u) == 0u) lo = (uint8_t)(lo & comp->row4);
      if ((row_mask & 0x20u) == 0u) lo = (uint8_t)(lo & comp->row5);
      if ((row_mask & 0x40u) == 0u) lo = (uint8_t)(lo & comp->row6);
      if ((row_mask & 0x80u) == 0u) lo = (uint8_t)(lo & comp->row7);
      uint8_t result = (uint8_t)(0xE0u | lo);
      if (comp->debug_enabled != 0u &&
          (
              row_mask != comp->kb_last_row_mask ||
              result != comp->kb_last_result
          )) {
          SDL_Log(
              "host_sdl2: keyboard_matrix row_mask=0x%02X result=0x%02X focus=%u",
              row_mask,
              result,
              (unsigned)comp->has_keyboard_focus
          );
      }
      comp->kb_last_row_mask = row_mask;
      comp->kb_last_result = result;
      return (uint64_t)result;
    mic_sample: |
      if (comp->audio_in_dev != 0u) {
          int16_t sample = 0;
          if (SDL_DequeueAudio(comp->audio_in_dev, &sample, (uint32_t)sizeof(sample)) == sizeof(sample)) {
              comp->last_mic = (sample > 0) ? 1u : 0u;
          }
      }
      return (uint64_t)comp->last_mic;
  handler_bodies:
    irq_edge: |
      (void)args;
      (void)argc;
    frame_boundary: |
      uint32_t frame_count = 0u;
      if (argc > 0) {
          frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);
      }
      comp->video_frames = (uint64_t)frame_count;
    video_border: |
      if (argc > 0) {
          comp->border_color = (uint8_t)(args[0] & 0xFFu);
      }
    video_frame: |
      if (comp->sdl_inited == 0u || argc < 5) return;
      SDL_Renderer *renderer = (SDL_Renderer *)comp->renderer;
      SDL_Texture *texture = (SDL_Texture *)comp->texture;
      uint32_t *pixels = (uint32_t *)(uintptr_t)args[1];
      uint32_t w = (uint32_t)(args[2] & 0xFFFFFFFFu);
      uint32_t h = (uint32_t)(args[3] & 0xFFFFFFFFu);
      if (w == 0u) w = 256u;
      if (h == 0u) h = 192u;
      if (renderer == NULL || texture == NULL || pixels == NULL) return;
      comp->video_frames = (uint64_t)(args[0] & 0xFFFFFFFFu);
      if (cpu->debug_overlay_enabled) {
          sms_overlay_draw_perf(
              pixels,
              w,
              h,
              comp->overlay_fps_x100,
              comp->overlay_cpu_hz,
              comp->overlay_cpu_pct_x10
          );
      }
      static const uint8_t border_rgb[8][3] = {
          { 0, 0, 0 }, { 0, 0, 215 }, { 215, 0, 0 }, { 215, 0, 215 },
          { 0, 215, 0 }, { 0, 215, 215 }, { 215, 215, 0 }, { 215, 215, 215 }
      };
      uint8_t border = (uint8_t)(args[4] & 0x07u);
      SDL_SetRenderDrawColor(
          renderer,
          border_rgb[border][0],
          border_rgb[border][1],
          border_rgb[border][2],
          255
      );
      SDL_RenderClear(renderer);
      if (SDL_UpdateTexture(texture, NULL, pixels, (int)(256u * sizeof(uint32_t))) != 0) return;
      int ww = 0;
      int wh = 0;
      if (SDL_GetRendererOutputSize(renderer, &ww, &wh) != 0 || ww <= 0 || wh <= 0) {
          if (comp->window != NULL) {
              SDL_GetWindowSize((SDL_Window *)comp->window, &ww, &wh);
          }
      }
      if (ww <= 0) ww = 704;
      if (wh <= 0) wh = 608;
      SDL_Rect dst;
      dst.x = (ww * 48) / 352;
      dst.y = (wh * 56) / 304;
      dst.w = (ww * 256) / 352;
      dst.h = (wh * 192) / 304;
      if (dst.w <= 0 || dst.h <= 0) {
          dst.x = 0;
          dst.y = 0;
          dst.w = ww;
          dst.h = wh;
      }
      if (SDL_RenderCopy(renderer, texture, NULL, &dst) != 0) return;
      SDL_RenderPresent(renderer);
    audio_pcm: |
      if (comp->audio_out_dev == 0u || comp->audio_out_ready == 0u || comp->audio_ring == NULL || comp->audio_ring_capacity == 0u || argc < 1) return;
      uint8_t level = (uint8_t)(args[0] & 0xFFu);
      uint64_t cycle = (argc > 1) ? (uint64_t)args[1] : cpu->total_cycles;
      uint64_t sample_rate = (comp->audio_rate > 0u) ? (uint64_t)comp->audio_rate : ((CPU_AUDIO_SAMPLE_RATE > 0u) ? CPU_AUDIO_SAMPLE_RATE : 44100u);
      uint64_t clock_hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? CPU_SYSTEM_CLOCK_HZ : 1u;
      uint64_t target_sample_index = (cycle * sample_rate) / clock_hz;
      int16_t target = (level != 0u) ? 1400 : 0;
      if (comp->audio_last_level != level) {
          comp->audio_last_level = level;
          if (comp->debug_enabled != 0u) {
              SDL_Log("host_sdl2: beeper level=%u", (unsigned)level);
          }
      }
      int16_t next_level = (int16_t)(comp->audio_level + ((target - comp->audio_level) / 6));
      if (level == 0u && next_level > -4 && next_level < 4) next_level = 0;
      if (comp->audio_last_cycle == 0u && comp->audio_sample_cursor == 0u && comp->audio_samples == 0u) {
          comp->audio_last_cycle = cycle;
          comp->audio_sample_cursor = target_sample_index;
          comp->audio_level = next_level;
          return;
      }
      if (target_sample_index < comp->audio_sample_cursor) {
          comp->audio_sample_cursor = target_sample_index;
      }
      {
          uint64_t samples_to_emit = target_sample_index - comp->audio_sample_cursor;
          while (samples_to_emit > 0u) {
              uint64_t n = (samples_to_emit > 4096u) ? 4096u : samples_to_emit;
              for (uint64_t i = 0u; i < n; ++i) {
                  if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                      comp->audio_ring_fill -= 1u;
                  }
                  comp->audio_ring[comp->audio_ring_write_idx] = comp->audio_level;
                  comp->audio_ring_write_idx += 1u;
                  if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
                  comp->audio_ring_fill += 1u;
              }
              comp->audio_samples += (uint32_t)n;
              comp->audio_sample_cursor += n;
              samples_to_emit -= n;
          }
      }
      comp->audio_last_cycle = cycle;
      comp->audio_level = next_level;

coding:
  headers: ["SDL2/SDL.h", "pasm_overlay.h"]
  include_paths: ["include"]
  linked_libraries:
    - name: "SDL2"
  library_paths: []
