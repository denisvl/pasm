    initial: "0"
  - name: audio_level
    type: int16_t
    initial: "0"
  - name: audio_last_level
    type: uint8_t
    initial: "0"
  - name: audio_last_cycle
    type: uint64_t
    initial: "0"
  - name: audio_sample_cursor
    type: uint64_t
    initial: "0"
  - name: audio_samples
    type: uint32_t
    initial: "0"
  - name: audio_rate
    type: uint32_t
    initial: "0"
  - name: audio_ring
    type: int16_t *
    initial: "NULL"
  - name: audio_ring_capacity
    type: uint32_t
    initial: "0"
  - name: audio_ring_read_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_write_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_fill
    type: uint32_t
    initial: "0"
  - name: audio_out_ready
    type: uint8_t
    initial: "0"
  - name: audio_in_ready
    type: uint8_t
    initial: "0"
  - name: has_keyboard_focus
    type: uint8_t
    initial: "0"
  - name: last_focus_state
    type: uint8_t
    initial: "0"
  - name: debug_enabled
