    type: uint8_t
    initial: "0"
  - name: window
    type: void *
    initial: "NULL"
  - name: renderer
    type: void *
    initial: "NULL"
  - name: texture
    type: void *
    initial: "NULL"
  - name: audio_out_dev
    type: uint32_t
    initial: "0"
  - name: audio_device_samples
    type: uint32_t
    initial: "0"
  - name: audio_in_dev
    type: uint32_t
    initial: "0"
  - name: row0
    type: uint8_t
    initial: "0x1F"
  - name: row1
    type: uint8_t
    initial: "0x1F"
  - name: row2
    type: uint8_t
    initial: "0x1F"
  - name: row3
    type: uint8_t
    initial: "0x1F"
  - name: row4
    type: uint8_t
    initial: "0x1F"
  - name: row5
    type: uint8_t
    initial: "0x1F"
  - name: row6
    type: uint8_t
    initial: "0x1F"
  - name: row7
    type: uint8_t
    initial: "0x1F"
  - name: last_mic
    type: uint8_t
    initial: "0"
  - name: border_color
