metadata:
  id: host_apple2
  type: host_adapter
  model: apple2_hal_interactive
  version: "1.0"


state:
  - name: host_inited
    type: uint8_t
    initial: "0"
  - name: window
    type: void *
    initial: "NULL"
  - name: renderer
    type: void *
    initial: "NULL"
  - name: texture
    type: void *
    initial: "NULL"
  - name: texture_w
    type: uint32_t
    initial: "280"
  - name: texture_h
    type: uint32_t
    initial: "192"
  - name: audio_out_dev
    type: uint32_t
    initial: "0"
  - name: audio_out_ready
    type: uint8_t
    initial: "0"
  - name: audio_device_samples
    type: uint32_t
    initial: "0"
  - name: frame_count
    type: uint32_t
    initial: "0"
  - name: audio_samples
    type: uint32_t
    initial: "0"
  - name: audio_level
    type: int16_t
    initial: "0"
  - name: audio_last_cycle
    type: uint64_t
    initial: "0"
  - name: audio_sample_cursor
    type: uint64_t
    initial: "0"
  - name: audio_rate
    type: uint32_t
    initial: "0"
  - name: audio_ring
    type: int16_t *
    initial: "NULL"
  - name: audio_ring_capacity
    type: uint32_t
    initial: "0"
  - name: audio_ring_read_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_write_idx
    type: uint32_t
    initial: "0"
  - name: audio_ring_fill
    type: uint32_t
    initial: "0"
  - name: key_ascii
    type: uint8_t
    initial: "0"
  - name: rept_last_ascii
    type: uint8_t
    initial: "0"
  - name: rept_held
    type: uint8_t
    initial: "0"
  - name: rept_next_cycle
    type: uint64_t
    initial: "0u"
  - name: last_event_poll_cycle
    type: uint64_t
    initial: "0u"
  - name: overlay_last_ms
    type: uint32_t
    initial: "0"
  - name: overlay_last_frame_count
    type: uint64_t
    initial: "0"
  - name: overlay_last_cycle_count
    type: uint64_t
    initial: "0"
  - name: overlay_fps_x100
    type: uint32_t
    initial: "0"
  - name: overlay_cpu_hz
    type: uint64_t
    initial: "0"
  - name: overlay_cpu_pct_x10
    type: uint32_t
    initial: "0"
  - name: joy_left
    type: uint8_t
    initial: "0"
  - name: joy_right
    type: uint8_t
    initial: "0"
  - name: joy_up
    type: uint8_t
    initial: "0"
  - name: joy_down
    type: uint8_t
    initial: "0"
  - name: joy_fire
    type: uint8_t
    initial: "0"

interfaces:
  callbacks:
    - name: keyboard_ascii
      args: []
      returns: u8
    - name: joystick_paddle0
      args: []
      returns: u8
    - name: joystick_paddle1
      args: []
      returns: u8
    - name: joystick_button0
      args: []
      returns: u8
    - name: joystick_button1
      args: []
      returns: u8
  handlers:
    - name: video_frame
      args: [u32, u64, u32, u32]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

behavior:
  snippets:
    init: |
      do {
          if (comp->host_inited != 0u) break;
          {
              const char *disable_dead = cpu_host_hal_getenv("PASM_DISABLE_DEADKEYS");
              if (disable_dead == NULL || disable_dead[0] != '0') {
                  #if defined(__linux__)
                  /* Keep scancode flow deterministic by disabling XIM dead-key composition for this process. */
                  setenv("XMODIFIERS", "@im=none", 1);
                  setenv("GTK_IM_MODULE", "xim", 0);
                  setenv("QT_IM_MODULE", "xim", 0);
                  #endif
              }
          }
          if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;
          cpu_host_hal_stop_text_input();
          comp->window = cpu_host_hal_create_window(
              "PASM Apple II",
              CPU_HOST_WINDOWPOS_CENTERED,
              CPU_HOST_WINDOWPOS_CENTERED,
              840,
              576,
              CPU_HOST_WINDOW_RESIZABLE
          );
          if (comp->window == NULL) break;
          comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);
          if (comp->renderer == NULL) {
              comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);
          }
          if (comp->renderer == NULL) break;
          comp->texture = cpu_host_hal_create_texture(
              comp->renderer,
              CPU_HOST_PIXELFORMAT_ARGB8888,
              CPU_HOST_TEXTUREACCESS_STREAMING,
              280,
              192
          );
          if (comp->texture == NULL) break;
          {
              const char *audio_env = cpu_host_hal_getenv("PASM_HOST_AUDIO");
              if (audio_env == NULL || audio_env[0] != '0') {
                  CPUHostAudioSpec want;
                  CPUHostAudioSpec have;
                  cpu_host_audio_spec_zero(&want);
                  cpu_host_audio_spec_zero(&have);
                  want.freq = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;
                  want.format = CPU_HOST_AUDIO_FORMAT_S16;
                  want.channels = 1;
                  want.samples = 512;
                  want.callback = NULL;
                  comp->audio_device_samples = 0u;
                  comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have, CPU_HOST_AUDIO_ALLOW_FREQUENCY_CHANGE);
                  if (comp->audio_out_dev != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16 && have.channels == 1) {
                      uint32_t ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq * 2u) : 88200u;
                      if (ring_capacity < 8192u) ring_capacity = 8192u;
                      comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));
                      if (comp->audio_ring != NULL) {
                          comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq : 44100u;
                          comp->audio_ring_capacity = ring_capacity;
                          comp->audio_ring_read_idx = 0u;
                          comp->audio_ring_write_idx = 0u;
                          comp->audio_ring_fill = 0u;
                          comp->audio_device_samples = (uint32_t)have.samples;
                          comp->audio_out_ready = 1u;
                          cpu_host_hal_audio_pause(comp->audio_out_dev, 0);
                      } else {
                          cpu_host_hal_audio_close(comp->audio_out_dev);
                          comp->audio_out_dev = 0u;
                          comp->audio_device_samples = 0u;
                      }
                  } else if (comp->audio_out_dev != 0u) {
                      cpu_host_hal_audio_close(comp->audio_out_dev);
                      comp->audio_out_dev = 0u;
                      comp->audio_device_samples = 0u;
                  }
              }
          }
          comp->host_inited = 1u;
      } while (0);
    reset: |
      comp->frame_count = 0u;
      comp->audio_samples = 0u;
      comp->audio_level = 0;
      comp->audio_last_cycle = 0u;
      comp->audio_sample_cursor = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->key_ascii = 0u;
      comp->rept_last_ascii = 0u;
      comp->rept_held = 0u;
      comp->rept_next_cycle = 0u;
      comp->last_event_poll_cycle = 0u;
      comp->overlay_last_ms = 0u;
      comp->overlay_last_frame_count = 0u;
      comp->overlay_last_cycle_count = 0u;
      comp->overlay_fps_x100 = 0u;
      comp->overlay_cpu_hz = 0u;
      comp->overlay_cpu_pct_x10 = 0u;
      comp->joy_left = 0u;
      comp->joy_right = 0u;
      comp->joy_up = 0u;
      comp->joy_down = 0u;
      comp->joy_fire = 0u;
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_clear(comp->audio_out_dev);
      }
    step_post: |
      if (comp->host_inited == 0u) return;
      {
          uint64_t now = cpu->total_cycles;
          if ((now - comp->last_event_poll_cycle) < 2048u) {
              return;
          }
          comp->last_event_poll_cycle = now;
      }
      CPUHostEvent ev;
      while (cpu_host_hal_poll_event(&ev)) {
          static int ev_trace_init = 0;
          static int ev_trace_on = 0;
          static FILE *ev_trace_fp = NULL;
          if (ev_trace_init == 0) {
              const char *env_ev = cpu_host_hal_getenv("PASM_APPLE2_HOST_KB_EVENTS");
              ev_trace_on = (env_ev != NULL && env_ev[0] != '\0' && env_ev[0] != '0') ? 1 : 0;
              ev_trace_init = 1;
              if (ev_trace_on != 0) {
                  ev_trace_fp = fopen("log/apple2_host_kb_events.log", "w");
                  if (ev_trace_fp == NULL) ev_trace_fp = stderr;
                  fprintf(ev_trace_fp, "# cycle,type,scancode,scancode_name,key_name,mods_hex,repeat\n");
                  fflush(ev_trace_fp);
              }
          }
          if (ev_trace_on != 0) {
              uint32_t et = cpu_host_hal_event_type(&ev);
              if (et == CPU_HOST_EVENT_KEYDOWN || et == CPU_HOST_EVENT_KEYUP) {
                  int32_t sc_ev = cpu_host_hal_event_scancode(&ev);
                  fprintf(
                      ev_trace_fp,
                      "%llu,%u,%d,%s,%s,0x%X,%u\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)et,
                      (int)sc_ev,
                      cpu_host_hal_scancode_name(sc_ev),
                      cpu_host_hal_key_name(ev.key.keysym.sym),
                      (unsigned)cpu_host_hal_event_mod_state(&ev),
                      (unsigned)cpu_host_hal_event_key_repeat(&ev)
                  );
                  fflush(ev_trace_fp);
              }
          }
          if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {
              cpu->running = false;
              cpu->halted = true;
              return;
          } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN && cpu_host_hal_event_key_repeat(&ev) == 0) {
              int32_t sc = cpu_host_hal_event_scancode(&ev);
              int key_count = 0;
              const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);
              uint8_t shifted = 0u;
              uint8_t controlled = 0u;
              uint8_t out = 0u;
              uint8_t is_rept = 0u;
              uint8_t handled_special = 0u;
              uint64_t repeat_initial_delay = ((uint64_t)CPU_SYSTEM_CLOCK_HZ * 250u) / 1000u;
              if (repeat_initial_delay == 0u) repeat_initial_delay = 1u;
              if (ks != NULL && key_count > 0) {
                  for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {
                      const RuntimeKeyboardBinding *m = &g_runtime_keyboard_map.bindings[i];
                      if (m->scancode < 0 || m->scancode >= key_count) continue;
                      if (ks[m->scancode] == 0u) continue;
                      if (m->is_shift_modifier != 0u) shifted = 1u;
                      if (m->is_ctrl_modifier != 0u) controlled = 1u;
                  }
              }
              for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {
                  const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];
                      if (b->scancode != sc) continue;
                      if (b->emulator_key_id[0] != '\0') {
                          /* Joystick/controller input is handled via the runtime controller map (separate file),
                             not via keyboard map emulator_key_id bindings. */
                          if (strcmp(b->emulator_key_id, "EMU_POWER_TOGGLE") == 0) {
                              /* Power button behavior in the emulator: do a cold power-cycle.
                                 This is layout-independent (scancode-driven) and makes the user-visible
                                 behavior obvious compared to a simple "halt". */
                              cpu->halted = false;
                              if (cpu->memory != NULL && cpu->memory_size > 0) {
                                  size_t ram_end = (cpu->memory_size > 0xD000u) ? 0xD000u : cpu->memory_size;
                                  memset(cpu->memory, 0, ram_end);
                              }
                              if (cpu->port_memory != NULL && cpu->port_size > 0) {
                                  memset(cpu->port_memory, 0, cpu->port_size);
                              }
                              mos6502_reset(cpu);
                              if (comp->window != NULL) cpu_host_hal_set_window_title(comp->window, "PASM Apple II | POWER CYCLE");
                              handled_special = 1u;
                              goto handled_special_keydown;
                          }
                      if (strcmp(b->emulator_key_id, "EMU_RESET") == 0) {
                          cpu->halted = false;
                          mos6502_reset(cpu);
                          if (comp->window != NULL) cpu_host_hal_set_window_title(comp->window, "PASM Apple II | RESET");
                          handled_special = 1u;
                          goto handled_special_keydown;
                      }
                  }
                  if (strcmp(b->mapper_key_id, "K_RESET") == 0) {
                      cpu->halted = false;
                      mos6502_reset(cpu);
                      if (comp->window != NULL) cpu_host_hal_set_window_title(comp->window, "PASM Apple II | RESET");
                      handled_special = 1u;
                      goto handled_special_keydown;
                  }
                  if (strcmp(b->mapper_key_id, "K_REPT") == 0) {
                      is_rept = 1u;
                      break;
                  }
                  if (controlled != 0u && b->has_ascii_ctrl != 0u) out = b->ascii_ctrl;
                  else if (shifted != 0u && b->has_ascii_shift != 0u) out = b->ascii_shift;
                  else if (b->has_ascii != 0u) out = b->ascii;
                  break;
              }
              handled_special_keydown: ;
              if (handled_special != 0u) {
                  continue;
              }
              if (is_rept != 0u) {
                  comp->rept_held = 1u;
                  comp->rept_next_cycle = cpu->total_cycles + repeat_initial_delay;
                  if (comp->window != NULL) {
                      char title[192];
                      snprintf(
                          title,
                          sizeof(title),
                          "PASM Apple II | sc=%d (%s) | REPT held | last=%u (0x%02X)",
                          (int)sc,
                          cpu_host_hal_scancode_name(sc),
                          (unsigned)comp->rept_last_ascii,
                          (unsigned)comp->rept_last_ascii
                      );
                      cpu_host_hal_set_window_title(comp->window, title);
                  }
                  continue;
              }
              cpu_component_keyboard_ascii_feed(sc, ks, (size_t)((key_count > 0) ? key_count : 0), 1u);
              if (out != 0u) {
                  comp->rept_last_ascii = out;
                  if (comp->rept_held != 0u) {
                      comp->rept_next_cycle = cpu->total_cycles + repeat_initial_delay;
                  }
              }
              if (comp->window != NULL) {
                  char title[192];
                  snprintf(
                      title,
                      sizeof(title),
                      "PASM Apple II | sc=%d (%s) | code=%u (0x%02X)",
                      (int)sc,
                      cpu_host_hal_scancode_name(sc),
                      (unsigned)out,
                      (unsigned)out
                  );
                  cpu_host_hal_set_window_title(comp->window, title);
              }
          } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {
              int32_t sc_up = cpu_host_hal_event_scancode(&ev);
              for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {
                  const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];
                  if (b->scancode != sc_up) continue;
                  if (strcmp(b->mapper_key_id, "K_REPT") == 0) {
                      comp->rept_held = 0u;
                      comp->rept_next_cycle = 0u;
                  }
                  break;
              }
          }
      }
      /* Controller map is separate from keyboard map: poll it once per tick and update gameport state. */
      cpu_component_controller_map_poll(cpu, 1u);
      comp->joy_up = cpu_component_controller_pressed("P1_UP");
      comp->joy_down = cpu_component_controller_pressed("P1_DOWN");
      comp->joy_left = cpu_component_controller_pressed("P1_LEFT");
      comp->joy_right = cpu_component_controller_pressed("P1_RIGHT");
      comp->joy_fire = cpu_component_controller_pressed("P1_BUTTON0");
      if (comp->rept_held != 0u && comp->rept_last_ascii != 0u && comp->rept_next_cycle != 0u) {
          uint64_t repeat_step = ((uint64_t)CPU_SYSTEM_CLOCK_HZ * 50u) / 1000u;
          if (repeat_step == 0u) repeat_step = 1u;
          if (cpu->total_cycles >= comp->rept_next_cycle) {
              cpu_component_keyboard_ascii_queue_push(comp->rept_last_ascii);
              do {
                  comp->rept_next_cycle += repeat_step;
              } while (comp->rept_next_cycle <= cpu->total_cycles);
          }
      }
      {
          sms_overlay_update_perf(
              cpu_host_hal_ticks_ms(),
              (uint64_t)comp->frame_count,
              cpu->total_cycles,
              (uint64_t)CPU_SYSTEM_CLOCK_HZ,
              &comp->overlay_last_ms,
              &comp->overlay_last_frame_count,
              &comp->overlay_last_cycle_count,
              &comp->overlay_fps_x100,
              &comp->overlay_cpu_hz,
              &comp->overlay_cpu_pct_x10
          );
      }
      if (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {
          uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);
          uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;
          uint32_t low_watermark = device_samples * 2u;
          uint32_t target_total = device_samples * 4u;
          uint32_t max_total = device_samples * 8u;
          if (queued_samples + comp->audio_ring_fill > max_total) {
              uint32_t desired_ring_fill = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;
              while (comp->audio_ring_fill > desired_ring_fill) {
                  comp->audio_ring_read_idx += 1u;
                  if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  comp->audio_ring_fill -= 1u;
              }
          }
          if (queued_samples < low_watermark) {
              uint32_t desired = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;
              uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;
              while (to_send > 0u) {
                  int16_t chunk[1024];
                  uint32_t n = (to_send > 1024u) ? 1024u : to_send;
                  for (uint32_t i = 0u; i < n; ++i) {
                      chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  }
                  comp->audio_ring_fill -= n;
                  if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, n * (uint32_t)sizeof(int16_t)) != 0) {
                      break;
                  }
                  to_send -= n;
              }
          }
      }
    destroy: |
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_close(comp->audio_out_dev);
          comp->audio_out_dev = 0u;
      }
      comp->audio_device_samples = 0u;
      if (comp->audio_ring != NULL) {
          cpu_host_hal_free(comp->audio_ring);
          comp->audio_ring = NULL;
      }
      comp->audio_ring_capacity = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      if (comp->texture != NULL) {
          cpu_host_hal_destroy_texture(comp->texture);
          comp->texture = NULL;
      }
      if (comp->renderer != NULL) {
          cpu_host_hal_destroy_renderer(comp->renderer);
          comp->renderer = NULL;
      }
      if (comp->window != NULL) {
          cpu_host_hal_destroy_window(comp->window);
          comp->window = NULL;
      }
      if (comp->host_inited != 0u) {
          cpu_host_hal_quit_subsystems();
          cpu_host_hal_quit();
          comp->host_inited = 0u;
      }
  callback_handlers:
    keyboard_ascii: |
      return (uint64_t)cpu_component_keyboard_ascii_pop();
    joystick_paddle0: |
      if (comp->joy_left != 0u && comp->joy_right == 0u) return 0u;
      if (comp->joy_right != 0u && comp->joy_left == 0u) return 255u;
      return 128u;
    joystick_paddle1: |
      if (comp->joy_up != 0u && comp->joy_down == 0u) return 0u;
      if (comp->joy_down != 0u && comp->joy_up == 0u) return 255u;
      return 128u;
    joystick_button0: |
      return (uint64_t)(comp->joy_fire != 0u ? 1u : 0u);
    joystick_button1: |
      return 0u;
  handler_bodies:
    video_frame: |
      if (comp->host_inited == 0u || argc < 4) return;
      void *renderer = comp->renderer;
      void *texture = comp->texture;
      uint32_t frame = (uint32_t)(args[0] & 0xFFFFFFFFu);
      uint32_t *pixels = (uint32_t *)(uintptr_t)args[1];
      uint32_t w = (uint32_t)(args[2] & 0xFFFFFFFFu);
      uint32_t h = (uint32_t)(args[3] & 0xFFFFFFFFu);
      if (renderer == NULL || texture == NULL || pixels == NULL || w == 0u || h == 0u) return;
      comp->frame_count = frame;
      if (cpu->debug_overlay_enabled) {
          sms_overlay_draw_perf(
              pixels,
              w,
              h,
              comp->overlay_fps_x100,
              comp->overlay_cpu_hz,
              comp->overlay_cpu_pct_x10
          );
      }
      if (comp->texture_w != w || comp->texture_h != h) {
          cpu_host_hal_destroy_texture(texture);
          texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888, CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);
          if (texture == NULL) return;
          comp->texture = (void *)texture;
          comp->texture_w = w;
          comp->texture_h = h;
      }
      if (cpu_host_hal_update_texture(texture, NULL, pixels, (int)(w * sizeof(uint32_t))) != 0) return;
      cpu_host_hal_render_set_draw_color(renderer, 0, 0, 0, 255);
      cpu_host_hal_render_clear(renderer);
      int ww = 0;
      int wh = 0;
      if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 || ww <= 0 || wh <= 0) return;
      CPUHostRect dst;
      int scaled_w = ww;
      int scaled_h = (int)((((int64_t)ww) * (int64_t)h) / (int64_t)w);
      if (scaled_h > wh) {
          scaled_h = wh;
          scaled_w = (int)((((int64_t)wh) * (int64_t)w) / (int64_t)h);
      }
      dst.w = (scaled_w > 0) ? scaled_w : ww;
      dst.h = (scaled_h > 0) ? scaled_h : wh;
      dst.x = (ww - dst.w) / 2;
      dst.y = (wh - dst.h) / 2;
      if (cpu_host_hal_render_copy(renderer, texture, NULL, &dst) != 0) return;
      cpu_host_hal_render_present(renderer);
    audio_pcm: |
      if (comp->audio_out_dev == 0u || comp->audio_out_ready == 0u || comp->audio_ring == NULL || comp->audio_ring_capacity == 0u || argc < 1) return;
      uint8_t level_u = (uint8_t)(args[0] & 0xFFu);
      uint64_t cycle = (argc > 1) ? (uint64_t)args[1] : cpu->total_cycles;
      uint64_t sample_rate = (comp->audio_rate > 0u) ? (uint64_t)comp->audio_rate : ((CPU_AUDIO_SAMPLE_RATE > 0u) ? CPU_AUDIO_SAMPLE_RATE : 44100u);
      uint64_t clock_hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? CPU_SYSTEM_CLOCK_HZ : 1u;
      uint64_t target_sample_index = (cycle * sample_rate) / clock_hz;
      int16_t next_level = (level_u != 0u) ? 9000 : -9000;

      if (comp->audio_last_cycle == 0u && comp->audio_sample_cursor == 0u && comp->audio_samples == 0u) {
          comp->audio_last_cycle = cycle;
          comp->audio_sample_cursor = target_sample_index;
          comp->audio_level = next_level;
          return;
      }

      if (target_sample_index < comp->audio_sample_cursor) {
          comp->audio_sample_cursor = target_sample_index;
      }
      {
          uint64_t samples_to_emit = target_sample_index - comp->audio_sample_cursor;
          while (samples_to_emit > 0u) {
              uint64_t n = (samples_to_emit > 4096u) ? 4096u : samples_to_emit;
              for (uint64_t i = 0u; i < n; ++i) {
                  if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                      comp->audio_ring_fill -= 1u;
                  }
                  comp->audio_ring[comp->audio_ring_write_idx] = comp->audio_level;
                  comp->audio_ring_write_idx += 1u;
                  if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
                  comp->audio_ring_fill += 1u;
              }
              comp->audio_samples += (uint32_t)n;
              comp->audio_sample_cursor += n;
              samples_to_emit -= n;
          }
      }
      comp->audio_last_cycle = cycle;
      comp->audio_level = next_level;

