behavior:
  snippets:
    init: "do {\n    if (comp->host_inited != 0u) break;\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO\
      \ | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;\n\n    comp->window\
      \ = cpu_host_hal_create_window(\n        \"PASM Amstrad CPC464\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n\
      \        CPU_HOST_WINDOWPOS_CENTERED,\n        960,\n        600,\n        CPU_HOST_WINDOW_RESIZABLE\n\
      \    );\n    if (comp->window == NULL) break;\n\n    comp->renderer = cpu_host_hal_create_renderer(comp->window,\
      \ -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n \
      \       comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n\
      \    }\n    if (comp->renderer == NULL) break;\n\n    comp->texture = cpu_host_hal_create_texture(\n\
      \        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n\
      \        320,\n        200\n    );\n    if (comp->texture == NULL) break;\n\n\
      \    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\"\
      );\n        if (audio_env == NULL || audio_env[0] != '0') {\n            CPUHostAudioSpec\
      \ want;\n            CPUHostAudioSpec have;\n            uint32_t expected_rate\
      \ = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (uint32_t)CPU_AUDIO_SAMPLE_RATE : 44100u;\n\
      \            cpu_host_audio_spec_zero(&want);\n            cpu_host_audio_spec_zero(&have);\n\
      \            want.freq = (int)expected_rate;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n\
      \            want.channels = 1;\n            want.samples = 512;\n         \
      \   want.callback = NULL;\n\n            comp->audio_out_dev = cpu_host_hal_audio_open(NULL,\
      \ 0, &want, &have, 0);\n            if (\n                comp->audio_out_dev\
      \ != 0u &&\n                have.format == CPU_HOST_AUDIO_FORMAT_S16 &&\n  \
      \              have.channels == 1 &&\n                have.freq > 0 &&\n   \
      \             have.samples > 0\n            ) {\n                uint32_t ring_capacity\
      \ = (uint32_t)have.samples * 8u;\n                if (ring_capacity < 4096u)\
      \ ring_capacity = 4096u;\n                comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity\
      \ * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n   \
      \                 comp->audio_rate = (uint32_t)have.freq;\n                \
      \    comp->audio_device_samples = (uint32_t)have.samples;\n                \
      \    comp->audio_ring_capacity = ring_capacity;\n                    comp->audio_ring_read_idx\
      \ = 0u;\n                    comp->audio_ring_write_idx = 0u;\n            \
      \        comp->audio_ring_fill = 0u;\n                    comp->audio_out_ready\
      \ = 1u;\n                    cpu_host_hal_audio_pause(comp->audio_out_dev, 0);\n\
      \                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                    comp->audio_out_dev = 0u;\n                }\n        \
      \    }\n        }\n    }\n\n    comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      \    comp->last_focus_state = comp->has_keyboard_focus;\n    comp->host_inited\
      \ = 1u;\n} while (0);\n"
    reset: 'comp->frame_count = 0u;

      comp->irq_edges = 0u;

      comp->audio_samples = 0u;

      comp->row0 = 0xFFu;

      comp->row1 = 0xFFu;

      comp->row2 = 0xFFu;

      comp->row3 = 0xFFu;

      comp->row4 = 0xFFu;

      comp->row5 = 0xFFu;

      comp->row6 = 0xFFu;

      comp->row7 = 0xFFu;

      comp->row8 = 0xFFu;

      comp->row9 = 0xFFu;

      comp->last_event_poll_cycle = 0u;

      comp->overlay_last_ms = 0u;

      comp->overlay_last_frame_count = 0u;

      comp->overlay_last_cycle_count = 0u;

      comp->overlay_fps_x100 = 0u;

      comp->overlay_cpu_hz = 0u;

      comp->overlay_cpu_pct_x10 = 0u;

      if (comp->audio_out_dev != 0u) cpu_host_hal_audio_clear(comp->audio_out_dev);

      '
    step_post: "if (comp->host_inited == 0u) return;\nif ((cpu->total_cycles - comp->last_event_poll_cycle)\
      \ < 1024u) return;\ncomp->last_event_poll_cycle = cpu->total_cycles;\n\nCPUHostEvent\
      \ ev;\nwhile (cpu_host_hal_poll_event(&ev)) {\n    if (cpu_host_hal_event_type(&ev)\
      \ == CPU_HOST_EVENT_QUIT) {\n        cpu->running = false;\n        cpu->halted\
      \ = true;\n    }\n}\n\ncpu_host_hal_pump_events();\ncomp->has_keyboard_focus\
      \ = cpu_host_hal_window_has_focus(comp->window);\nif (comp->has_keyboard_focus\
      \ != comp->last_focus_state) {\n    comp->last_focus_state = comp->has_keyboard_focus;\n\
      \    if (comp->window != NULL) {\n        cpu_host_hal_set_window_title(\n \
      \           comp->window,\n            (comp->has_keyboard_focus != 0u)\n  \
      \              ? \"PASM Amstrad CPC464 [FOCUS]\"\n                : \"PASM Amstrad\
      \ CPC464 [NO-FOCUS]\"\n        );\n    }\n}\n{\n    sms_overlay_update_perf(\n\
      \        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n  \
      \      cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n        &comp->overlay_last_ms,\n\
      \        &comp->overlay_last_frame_count,\n        &comp->overlay_last_cycle_count,\n\
      \        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n\
      \    );\n}\n\n{\n    int key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n\
      \    if (ks != NULL && key_count > 0) {\n        static int host_trace_init\
      \ = 0;\n        static int host_trace_on = 0;\n        static uint32_t host_trace_count\
      \ = 0u;\n        static FILE *host_trace_fp = NULL;\n        static uint8_t\
      \ host_prev_rows[10] = {\n            0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu,\
      \ 0xFFu, 0xFFu, 0xFFu, 0xFFu\n        };\n        uint8_t rows[10] = { 0xFFu,\
      \ 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu };\n       \
      \ if (host_trace_init == 0) {\n            const char *env = cpu_host_hal_getenv(\"\
      PASM_CPC_HOST_KB_TRACE\");\n            host_trace_on = (env != NULL && env[0]\
      \ != '\\0' && env[0] != '0') ? 1 : 0;\n            host_trace_init = 1;\n  \
      \          if (host_trace_on != 0) {\n                host_trace_fp = fopen(\"\
      log/cpc_host_kb_trace.log\", \"w\");\n                if (host_trace_fp == NULL)\
      \ host_trace_fp = stderr;\n                fprintf(host_trace_fp, \"# cycle,focus,row0,row1,row2,row3,row4,row5,row6,row7,row8,row9\\\
      n\");\n                fflush(host_trace_fp);\n            }\n        }\n  \
      \      cpu_component_apply_declared_keymap(\n            cpu,\n            \"\
      host_cpc\",\n            ks,\n            (size_t)key_count,\n            rows,\n\
      \            10u,\n            comp->has_keyboard_focus\n        );\n      \
      \  comp->row0 = rows[0];\n        comp->row1 = rows[1];\n        comp->row2\
      \ = rows[2];\n        comp->row3 = rows[3];\n        comp->row4 = rows[4];\n\
      \        comp->row5 = rows[5];\n        comp->row6 = rows[6];\n        comp->row7\
      \ = rows[7];\n        comp->row8 = rows[8];\n        comp->row9 = rows[9];\n\
      \        if (host_trace_on != 0 && host_trace_count < 5000u) {\n           \
      \ int changed = 0;\n            for (int i = 0; i < 10; ++i) {\n           \
      \     if (rows[i] != host_prev_rows[i]) {\n                    changed = 1;\n\
      \                    break;\n                }\n            }\n            if\
      \ (changed != 0) {\n                fprintf(\n                    host_trace_fp,\n\
      \                    \"%llu,%u,%02X,%02X,%02X,%02X,%02X,%02X,%02X,%02X,%02X,%02X\\\
      n\",\n                    (unsigned long long)cpu->total_cycles,\n         \
      \           (unsigned)comp->has_keyboard_focus,\n                    (unsigned)rows[0],\n\
      \                    (unsigned)rows[1],\n                    (unsigned)rows[2],\n\
      \                    (unsigned)rows[3],\n                    (unsigned)rows[4],\n\
      \                    (unsigned)rows[5],\n                    (unsigned)rows[6],\n\
      \                    (unsigned)rows[7],\n                    (unsigned)rows[8],\n\
      \                    (unsigned)rows[9]\n                );\n               \
      \ host_trace_count += 1u;\n                if ((host_trace_count & 63u) == 0u)\
      \ fflush(host_trace_fp);\n                for (int i = 0; i < 10; ++i) host_prev_rows[i]\
      \ = rows[i];\n            }\n        }\n    }\n}\n\nif (\n    comp->audio_out_dev\
      \ != 0u &&\n    comp->audio_out_ready != 0u &&\n    comp->audio_ring != NULL\n\
      ) {\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev)\
      \ / (uint32_t)sizeof(int16_t);\n    uint32_t device_samples = (comp->audio_device_samples\
      \ > 0u) ? comp->audio_device_samples : 512u;\n    uint32_t low_watermark = device_samples\
      \ * 2u;\n    uint32_t target_total = device_samples * 4u;\n\n    if (queued_samples\
      \ < low_watermark && comp->audio_ring_fill > 0u) {\n        uint32_t desired\
      \ = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;\n\
      \        uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill\
      \ : desired;\n        while (to_send > 0u) {\n            int16_t chunk[512];\n\
      \            uint32_t n = (to_send > 512u) ? 512u : to_send;\n            for\
      \ (uint32_t i = 0u; i < n; ++i) {\n                chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];\n\
      \                comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n          \
      \  }\n            comp->audio_ring_fill -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev,\
      \ chunk, n * (uint32_t)sizeof(int16_t)) != 0) break;\n            to_send -=\
      \ n;\n        }\n    }\n}\n"
    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \    comp->audio_out_dev = 0u;\n}\ncomp->audio_out_ready = 0u;\ncomp->audio_device_samples\
      \ = 0u;\ncomp->audio_rate = 0u;\nif (comp->audio_ring != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n\
      \    comp->audio_ring = NULL;\n}\ncomp->audio_ring_capacity = 0u;\ncomp->audio_ring_read_idx\
      \ = 0u;\ncomp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\nif (comp->texture\
      \ != NULL) {\n    cpu_host_hal_destroy_texture(comp->texture);\n    comp->texture\
      \ = NULL;\n}\nif (comp->renderer != NULL) {\n    cpu_host_hal_destroy_renderer(comp->renderer);\n\
      \    comp->renderer = NULL;\n}\nif (comp->window != NULL) {\n    cpu_host_hal_destroy_window(comp->window);\n\
      \    comp->window = NULL;\n}\nif (comp->host_inited != 0u) {\n    cpu_host_hal_quit_subsystems();\n\
      \    cpu_host_hal_quit();\n    comp->host_inited = 0u;\n}\n"
  callback_handlers:
    keyboard_matrix: "if (argc < 1) return 0xFFu;\nswitch ((uint8_t)(args[0] & 0x0Fu))\
      \ {\n    case 0u: return (uint64_t)comp->row0;\n    case 1u: return (uint64_t)comp->row1;\n\
      \    case 2u: return (uint64_t)comp->row2;\n    case 3u: return (uint64_t)comp->row3;\n\
      \    case 4u: return (uint64_t)comp->row4;\n    case 5u: return (uint64_t)comp->row5;\n\
      \    case 6u: return (uint64_t)comp->row6;\n    case 7u: return (uint64_t)comp->row7;\n\
      \    case 8u: return (uint64_t)comp->row8;\n    case 9u: return (uint64_t)comp->row9;\n\
      \    default: return 0xFFu;\n}\n"
  handler_bodies:
    video_frame: "if (comp->host_inited == 0u || argc < 4) return;\nvoid *renderer\
      \ = comp->renderer;\nvoid *texture = comp->texture;\nuint32_t frame = (uint32_t)(args[0]\
      \ & 0xFFFFFFFFu);\nuint32_t *pixels = (uint32_t *)(uintptr_t)args[1];\nuint32_t\
      \ w = (uint32_t)(args[2] & 0xFFFFFFFFu);\nuint32_t h = (uint32_t)(args[3] &\
      \ 0xFFFFFFFFu);\nif (renderer == NULL || texture == NULL || pixels == NULL ||\
      \ w == 0u || h == 0u) return;\n\ncomp->frame_count = frame;\nif (cpu->debug_overlay_enabled)\
      \ {\n    sms_overlay_draw_perf(\n        pixels,\n        w,\n        h,\n \
      \       comp->overlay_fps_x100,\n        comp->overlay_cpu_hz,\n        comp->overlay_cpu_pct_x10\n\
      \    );\n}\nif (comp->texture_w != w || comp->texture_h != h) {\n    cpu_host_hal_destroy_texture(texture);\n\
      \    texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888,\
      \ CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);\n    if (texture == NULL)\
      \ return;\n    comp->texture = (void *)texture;\n    comp->texture_w = w;\n\
      \    comp->texture_h = h;\n}\nif (cpu_host_hal_update_texture(texture, NULL,\
      \ pixels, (int)(w * sizeof(uint32_t))) != 0) return;\ncpu_host_hal_render_set_draw_color(renderer,\
      \ 0, 0, 0, 255);\ncpu_host_hal_render_clear(renderer);\n{\n    int ww = 0;\n\
      \    int wh = 0;\n    CPUHostRect dst;\n    int scaled_w;\n    int scaled_h;\n\
      \    if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 || ww <=\
      \ 0 || wh <= 0) return;\n    scaled_w = ww;\n    scaled_h = (int)((((int64_t)ww)\
      \ * (int64_t)h) / (int64_t)w);\n    if (scaled_h > wh) {\n        scaled_h =\
      \ wh;\n        scaled_w = (int)((((int64_t)wh) * (int64_t)w) / (int64_t)h);\n\
      \    }\n    dst.w = (scaled_w > 0) ? scaled_w : ww;\n    dst.h = (scaled_h >\
      \ 0) ? scaled_h : wh;\n    dst.x = (ww - dst.w) / 2;\n    dst.y = (wh - dst.h)\
      \ / 2;\n    if (cpu_host_hal_render_copy(renderer, texture, NULL, &dst) != 0)\
      \ return;\n}\ncpu_host_hal_render_present(renderer);\n"
    irq_edge: "if (argc > 0 && ((args[0] & 0xFFu) != 0u)) {\n    comp->irq_edges +=\
      \ 1u;\n}\n"
    audio_pcm: "if (\n    comp->audio_out_dev == 0u ||\n    comp->audio_out_ready\
      \ == 0u ||\n    comp->audio_ring == NULL ||\n    comp->audio_ring_capacity ==\
      \ 0u ||\n    argc < 1\n) {\n    return;\n}\n{\n    uint8_t level = (uint8_t)(args[0]\
      \ & 0xFFu);\n    int centered = ((int)level) - 128;\n    int16_t sample = (int16_t)(centered\
      \ * 128);\n    if (comp->audio_ring_fill >= comp->audio_ring_capacity) {\n \
      \       comp->audio_ring_read_idx += 1u;\n        if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n        comp->audio_ring_fill\
      \ -= 1u;\n    }\n    comp->audio_ring[comp->audio_ring_write_idx] = sample;\n\
      \    comp->audio_ring_write_idx += 1u;\n    if (comp->audio_ring_write_idx >=\
      \ comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;\n    comp->audio_ring_fill\
      \ += 1u;\n    comp->audio_samples += 1u;\n}\n"
