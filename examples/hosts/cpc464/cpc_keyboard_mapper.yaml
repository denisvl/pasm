  file: cpc_keyboard.jpg
  width_px: 1220
  height_px: 475
  origin: top-left
  bbox_format:
    x: left
    y: top
    width: pixels
    height: pixels
  approximate: true
  notes:
  - This image is a best-effort cropped top-down approximation derived from the provided
    photo; it is not a true orthographic reconstruction.
  - Bounding boxes are approximate and were derived from the visible key extents in
    the provided image.
  - Legends are listed in visual order when multiple markings appear on the same key.
  - The field multi_legend is true when a key shows more than one visible legend.
  - The field legend_combos maps each visible legend to the physical key combination
    used to produce it.
  - For ordinary symbol keys, the lower legend was treated as the unmodified key and
    the upper legend as SHIFT + key.
  - Some legends on the original photo are small or partially unclear; those entries
    were transcribed from the visible image as closely as practical.
  - Cassette transport buttons, cassette switches, power LED, and other non-keyboard
    controls were not included in this key map.
