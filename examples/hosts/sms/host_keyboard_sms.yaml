keyboard:
  kind: matrix
  focus_required: true
  bindings:
  - host_scancode: UP
    mapper_key_id: P1_UP
    presses:
    - row: 0
      bit: 0
  - host_scancode: DOWN
    mapper_key_id: P1_DOWN
    presses:
    - row: 0
      bit: 1
  - host_scancode: LEFT
    mapper_key_id: P1_LEFT
    presses:
    - row: 0
      bit: 2
  - host_scancode: RIGHT
    mapper_key_id: P1_RIGHT
    presses:
    - row: 0
      bit: 3
  - host_scancode: A
    mapper_key_id: P1_B1
    presses:
    - row: 0
      bit: 4
  - host_scancode: S
    mapper_key_id: P1_B2
    presses:
    - row: 0
      bit: 5
