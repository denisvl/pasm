      \ != 0u && comp->has_keyboard_focus != 0u) {\n            reset_pressed = 1u;\n        }\n        if (comp->joy2_connected\
      \ == 0u) {\n            rows[1] |= 0x0Fu;\n        }\n        if (reset_pressed != 0u) {\n            rows[1] &= (uint8_t)~0x10u;\n\
      \        } else {\n            rows[1] |= 0x10u;\n        }\n        comp->joy1 = rows[0];\n        comp->joy2 = rows[1];\n\
      \        if ((size_t)CPU_HOST_SCANCODE(P) < (size_t)key_count && ks[CPU_HOST_SCANCODE(P)] != 0u && comp->has_keyboard_focus\
      \ != 0u) {\n            pause_pressed = 1u;\n        }\n    }\n    if (reset_pressed != comp->reset_pressed_prev &&\
      \ comp->debug_enabled != 0u) {\n        cpu_host_hal_log(\n            \"sg1000_host: reset_line=%u focus=%u joy1=0x%02X\
      \ joy2=0x%02X\",\n            (unsigned)reset_pressed,\n            (unsigned)comp->has_keyboard_focus,\n          \
      \  (unsigned)comp->joy1,\n            (unsigned)comp->joy2\n        );\n    }\n    comp->reset_pressed_prev = reset_pressed;\n\
      \    if (pause_pressed != 0u && comp->pause_pressed_prev == 0u) {\n        if (comp->debug_enabled != 0u) {\n      \
      \      cpu_host_hal_log(\n                \"sg1000_host: pause_nmi edge focus=%u pc=0x%04X\",\n                (unsigned)comp->has_keyboard_focus,\n\
      \                (unsigned)cpu->pc\n            );\n        }\n        uint16_t ret_pc = cpu->pc;\n        cpu->sp =\
      \ (uint16_t)(cpu->sp - 1u);\n        if ((uint64_t)cpu->sp < cpu->memory_size) {\n            cpu->memory[cpu->sp] =\
      \ (uint8_t)((ret_pc >> 8) & 0xFFu);\n        }\n        cpu->sp = (uint16_t)(cpu->sp - 1u);\n        if ((uint64_t)cpu->sp\
      \ < cpu->memory_size) {\n            cpu->memory[cpu->sp] = (uint8_t)(ret_pc & 0xFFu);\n        }\n        cpu->pc =\
      \ 0x0066u;\n        cpu->halted = false;\n    }\n    comp->pause_pressed_prev = pause_pressed;\n}\nif (\n    comp->audio_out_dev\
      \ != 0u\n    && comp->audio_out_ready != 0u\n    && comp->audio_ring != NULL\n) {\n    uint32_t channels = (comp->audio_channels\
      \ > 0u) ? comp->audio_channels : 1u;\n    if (channels > 2u) channels = 2u;\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev)\
      \ / (uint32_t)sizeof(int16_t);\n    uint32_t queued_frames = queued_samples / channels;\n    uint32_t device_samples\
      \ = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;\n    uint32_t device_frames = device_samples\
      \ / channels;\n    if (device_frames == 0u) device_frames = 512u;\n    uint32_t low_watermark = device_frames * 3u;\n\
      \    uint32_t target_total = device_frames * 6u;\n    uint32_t max_total = device_frames * 12u;\n\n    if (queued_frames\
