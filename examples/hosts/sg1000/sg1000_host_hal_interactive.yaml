    step_post: "if (comp->host_inited == 0u) return;\nuint64_t now = cpu->total_cycles;\nif ((now - comp->last_event_poll_cycle)\
      \ < 1024u) return;\ncomp->last_event_poll_cycle = now;\nCPUHostEvent ev;\nwhile (cpu_host_hal_poll_event(&ev)) {\n \
      \   if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n        cpu->running = false;\n        cpu->halted =\
      \ true;\n    }\n}\ncpu_host_hal_pump_events();\ncomp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      if (comp->has_keyboard_focus != comp->last_focus_state) {\n    comp->last_focus_state = comp->has_keyboard_focus;\n\
      \    if (comp->window != NULL) {\n        cpu_host_hal_set_window_title(\n            comp->window,\n            (comp->has_keyboard_focus\
      \ != 0u)\n                ? \"PASM Sega SG-1000 [FOCUS]\"\n                : \"PASM Sega SG-1000 [NO-FOCUS]\"\n    \
      \    );\n    }\n}\n{\n    pasm_overlay_update_perf(\n        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n\
      \        cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n        &comp->overlay_last_ms,\n        &comp->overlay_last_frame_count,\n\
      \        &comp->overlay_last_cycle_count,\n        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n      \
      \  &comp->overlay_cpu_pct_x10\n    );\n}\n{\n    uint8_t pause_pressed = 0u;\n    uint8_t reset_pressed = 0u;\n    int\
      \ key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n    /* Prefer controller-map when\
      \ loaded (host_controller_sg1000.yaml); otherwise keep legacy keyboard-map behavior. */\n    if (g_runtime_controller_map.loaded\
      \ != 0u) {\n        cpu_component_controller_map_poll(cpu, comp->has_keyboard_focus);\n        comp->joy1 = 0xFFu;\n\
      \        comp->joy2 = 0xFFu;\n        if (cpu_component_controller_pressed(\"P1_UP\"))    comp->joy1 &= (uint8_t)~0x01u;\n\
      \        if (cpu_component_controller_pressed(\"P1_DOWN\"))  comp->joy1 &= (uint8_t)~0x02u;\n        if (cpu_component_controller_pressed(\"\
      P1_LEFT\"))  comp->joy1 &= (uint8_t)~0x04u;\n        if (cpu_component_controller_pressed(\"P1_RIGHT\")) comp->joy1\
      \ &= (uint8_t)~0x08u;\n        if (cpu_component_controller_pressed(\"P1_B1\"))   comp->joy1 &= (uint8_t)~0x10u;\n \
      \       if (cpu_component_controller_pressed(\"P1_B2\"))   comp->joy1 &= (uint8_t)~0x20u;\n        if (cpu_component_controller_pressed(\"\
      P2_UP\"))    comp->joy2 &= (uint8_t)~0x01u;\n        if (cpu_component_controller_pressed(\"P2_DOWN\"))  comp->joy2\
      \ &= (uint8_t)~0x02u;\n        if (cpu_component_controller_pressed(\"P2_LEFT\"))  comp->joy2 &= (uint8_t)~0x04u;\n\
      \        if (cpu_component_controller_pressed(\"P2_RIGHT\")) comp->joy2 &= (uint8_t)~0x08u;\n        if (cpu_component_controller_pressed(\"\
      P2_B1\"))   comp->joy2 &= (uint8_t)~0x10u;\n        if (cpu_component_controller_pressed(\"P2_B2\"))   comp->joy2 &=\
      \ (uint8_t)~0x20u;\n        {\n            uint8_t p2c = (g_runtime_controller_map.port_count >= 2u) ? g_runtime_controller_map.port_connected[1]\
      \ : 0u;\n            /* Preserve legacy env override behavior (PASM_SG1000_JOY2_CONNECTED=0 disables port 2 even if\
      \ map says connected). */\n            if (comp->joy2_connected == 0u) p2c = 0u;\n            comp->joy2_connected =\
      \ p2c;\n            if (p2c == 0u) comp->joy2 = 0xFFu;\n        }\n    } else if (ks != NULL && key_count > 0) {\n \
      \       uint8_t rows[2] = { 0xFFu, 0xFFu };\n        cpu_component_apply_declared_keymap(\n            cpu,\n      \
