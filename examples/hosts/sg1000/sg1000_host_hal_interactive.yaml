      \        &window_h\n    );\n    comp->window = cpu_host_hal_create_window(\n        \"PASM Sega SG-1000\",\n       \
      \ CPU_HOST_WINDOWPOS_CENTERED,\n        CPU_HOST_WINDOWPOS_CENTERED,\n        window_w,\n        window_h, CPU_HOST_WINDOW_RESIZABLE\n\
      \    );\n    if (comp->window == NULL) break;\n    comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);\n\
      \    if (comp->renderer == NULL) {\n        comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n  \
      \  }\n    if (comp->renderer == NULL) break;\n\n\n    {\n        static const char *sg1000_crt_tv_vertex_shader =\n\
      \            \"#version 330 core\\n\"\n            \"layout (location = 0) in vec3 aPos;\\n\"\n            \"layout\
      \ (location = 1) in vec2 aTexCoords;\\n\"\n            \"out vec2 TexCoords;\\n\"\n            \"void main() {\\n\"\n\
      \            \"    TexCoords = aTexCoords;\\n\"\n            \"    gl_Position = vec4(aPos, 1.0);\\n\"\n           \
      \ \"}\\n\";\n        static const char *sg1000_crt_tv_fragment_shader =\n            \"#version 330 core\\n\"\n    \
      \        \"out vec4 FragColor;\\n\"\n            \"in vec2 TexCoords;\\n\"\n            \"uniform sampler2D screenTexture;\\\
      n\"\n            \"uniform vec2 sourceResolution;\\n\"\n            \"const float CURVATURE = 8.0;\\n\"\n          \
      \  \"const float SCANLINE_WEIGHT = 0.10;\\n\"\n            \"const float MASK_DARKNESS = 0.08;\\n\"\n            \"\
      const float GLOW_FACTOR = 0.05;\\n\"\n            \"vec2 curve(vec2 coord) {\\n\"\n            \"    coord = coord *\
      \ 2.0 - 1.0;\\n\"\n            \"    coord.x *= 1.0 + pow((abs(coord.y) / CURVATURE), 2.0);\\n\"\n            \"   \
      \ coord.y *= 1.0 + pow((abs(coord.x) / CURVATURE), 2.0);\\n\"\n            \"    return coord * 0.5 + 0.5;\\n\"\n  \
      \          \"}\\n\"\n            \"void main() {\\n\"\n            \"    vec2 crtUV = curve(TexCoords);\\n\"\n     \
      \       \"    if (crtUV.x < 0.0 || crtUV.x > 1.0 || crtUV.y < 0.0 || crtUV.y > 1.0) {\\n\"\n            \"        FragColor\
      \ = vec4(0.0, 0.0, 0.0, 1.0);\\n\"\n            \"        return;\\n\"\n            \"    }\\n\"\n            \"   \
      \ vec3 baseColor = texture(screenTexture, crtUV).rgb;\\n\"\n            \"    vec3 blurColor = texture(screenTexture,\
      \ crtUV + vec2(1.0 / sourceResolution.x, 0.0)).rgb;\\n\"\n            \"    baseColor = mix(baseColor, blurColor, GLOW_FACTOR);\\\
      n\"\n            \"    float scan = 0.5 + 0.5 * sin(crtUV.y * sourceResolution.y * 3.14159265);\\n\"\n            \"\
      \    baseColor *= 1.0 - (SCANLINE_WEIGHT * (1.0 - scan));\\n\"\n            \"    float maskPhase = mod(gl_FragCoord.x\
      \ + floor(gl_FragCoord.y * 0.5), 3.0);\\n\"\n            \"    float mask = 1.0 - (MASK_DARKNESS * step(maskPhase, 0.5));\\\
      n\"\n            \"    baseColor *= mask;\\n\"\n            \"    baseColor *= 1.08;\\n\"\n            \"    FragColor\
      \ = vec4(baseColor, 1.0);\\n\"\n            \"}\\n\";\n        comp->display_shader = cpu_host_hal_shader_create(comp->renderer,\
