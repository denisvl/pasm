behavior:
  snippets:
    init: "do {\n    if (comp->host_inited != 0u) break;\n    {\n        const char\
      \ *dbg_env = cpu_host_hal_getenv(\"PASM_SG1000_DEBUG\");\n        comp->debug_enabled\
      \ = (dbg_env != NULL && dbg_env[0] != '\\0' && dbg_env[0] != '0') ? 1u : 0u;\n\
      \        if (comp->debug_enabled != 0u) {\n            cpu_host_hal_log(\"sg1000_host:\
      \ debug enabled (PASM_SG1000_DEBUG=%s)\", dbg_env);\n        }\n    }\n    if\
      \ (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS)\
      \ != 0) {\n        break;\n    }\n    comp->window = cpu_host_hal_create_window(\n\
      \        \"PASM Sega SG-1000\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n    \
      \    CPU_HOST_WINDOWPOS_CENTERED,\n        768,\n        576,\n        CPU_HOST_WINDOW_RESIZABLE\n\
      \    );\n    if (comp->window == NULL) break;\n    comp->renderer = cpu_host_hal_create_renderer(comp->window,\
      \ -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n \
      \       comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n\
      \    }\n    if (comp->renderer == NULL) break;\n    comp->texture = cpu_host_hal_create_texture(\n\
      \        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n\
      \        256,\n        192\n    );\n    if (comp->texture == NULL) break;\n\
      \    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\"\
      );\n        if (audio_env == NULL || audio_env[0] != '0') {\n            CPUHostAudioSpec\
      \ want;\n            CPUHostAudioSpec have;\n            uint32_t expected_rate\
      \ = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (uint32_t)CPU_AUDIO_SAMPLE_RATE : 44100u;\n\
      \n            cpu_host_audio_spec_zero(&want);\n            cpu_host_audio_spec_zero(&have);\n\
      \n            want.freq = (int)expected_rate;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n\
      \            want.channels = 1;\n            want.samples = 512;\n         \
      \   want.callback = NULL;\n\n            comp->audio_out_ready = 0u;\n     \
      \       comp->audio_device_samples = 0u;\n            comp->audio_rate = 0u;\n\
      \            comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have,\
      \ 0);\n\n            if (\n                comp->audio_out_dev != 0u &&\n  \
      \              have.format == CPU_HOST_AUDIO_FORMAT_S16 &&\n               \
      \ have.channels == 1 &&\n                have.freq > 0 &&\n                (uint32_t)have.freq\
      \ == expected_rate &&\n                have.samples > 0\n            ) {\n \
      \               uint32_t ring_capacity = (uint32_t)have.samples * 8u;\n\n  \
      \              if (ring_capacity < 4096u) {\n                    ring_capacity\
      \ = 4096u;\n                }\n\n                comp->audio_ring = (int16_t\
      \ *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));\n\n       \
      \         if (comp->audio_ring != NULL) {\n                    comp->audio_rate\
      \ = (uint32_t)have.freq;\n                    comp->audio_device_samples = (uint32_t)have.samples;\n\
      \                    comp->audio_ring_capacity = ring_capacity;\n          \
      \          comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx\
      \ = 0u;\n                    comp->audio_ring_fill = 0u;\n                 \
      \   comp->audio_out_ready = 1u;\n\n                    {\n                 \
      \       int16_t prefill[2048];\n                        uint32_t prefill_samples\
      \ = (uint32_t)have.samples * 2u;\n\n                        if (prefill_samples\
      \ > 2048u) {\n                            prefill_samples = 2048u;\n       \
      \                 }\n\n                        for (uint32_t i = 0u; i < prefill_samples;\
      \ ++i) {\n                            prefill[i] = 0;\n                    \
      \    }\n\n                        if (cpu_host_hal_audio_queue(\n          \
      \                      comp->audio_out_dev,\n                              \
      \  prefill,\n                                prefill_samples * (uint32_t)sizeof(int16_t))\
      \ != 0) {\n                            cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                            comp->audio_out_dev = 0u;\n                   \
      \         cpu_host_hal_free(comp->audio_ring);\n                           \
      \ comp->audio_ring = NULL;\n                            comp->audio_ring_capacity\
      \ = 0u;\n                            comp->audio_ring_read_idx = 0u;\n     \
      \                       comp->audio_ring_write_idx = 0u;\n                 \
      \           comp->audio_ring_fill = 0u;\n                            comp->audio_rate\
      \ = 0u;\n                            comp->audio_device_samples = 0u;\n    \
      \                        comp->audio_out_ready = 0u;\n                     \
      \   } else {\n                            cpu_host_hal_audio_pause(comp->audio_out_dev,\
      \ 0);\n                        }\n                    }\n                } else\
      \ {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n  \
      \                  comp->audio_out_dev = 0u;\n                    comp->audio_rate\
      \ = 0u;\n                    comp->audio_device_samples = 0u;\n            \
      \    }\n            } else if (comp->audio_out_dev != 0u) {\n              \
      \  cpu_host_hal_audio_close(comp->audio_out_dev);\n                comp->audio_out_dev\
      \ = 0u;\n                comp->audio_rate = 0u;\n                comp->audio_device_samples\
      \ = 0u;\n            }\n        }\n    }\n    comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      \    comp->last_focus_state = comp->has_keyboard_focus;\n    {\n        const\
      \ char *joy2_env = cpu_host_hal_getenv(\"PASM_SG1000_JOY2_CONNECTED\");\n  \
      \      comp->joy2_connected = (joy2_env != NULL && joy2_env[0] == '1') ? 1u\
      \ : 0u;\n    }\n    {\n        const char *crop_env = cpu_host_hal_getenv(\"\
      PASM_SG1000_CROP_LEFT8\");\n        comp->crop_left8 = (crop_env != NULL &&\
      \ crop_env[0] == '1') ? 1u : 0u;\n    }\n    comp->host_inited = 1u;\n} while\
      \ (0);\n"
    reset: "{\n    const char *dbg_env = cpu_host_hal_getenv(\"PASM_SG1000_DEBUG\"\
      );\n    comp->debug_enabled = (dbg_env != NULL && dbg_env[0] != '\\0' && dbg_env[0]\
      \ != '0') ? 1u : 0u;\n}\ncomp->frame_count = 0u;\ncomp->irq_edges = 0u;\ncomp->audio_samples\
      \ = 0u;\ncomp->audio_level = 0;\ncomp->audio_last_cycle = 0u;\ncomp->audio_sample_cursor\
      \ = 0u;\ncomp->audio_ring_read_idx = 0u;\ncomp->audio_ring_write_idx = 0u;\n\
      comp->audio_ring_fill = 0u;\ncomp->last_event_poll_cycle = 0u;\ncomp->pause_pressed_prev\
      \ = 0u;\ncomp->reset_pressed_prev = 0u;\ncomp->overlay_last_ms = 0u;\ncomp->overlay_last_frame_count\
      \ = 0u;\ncomp->overlay_last_cycle_count = 0u;\ncomp->overlay_fps_x100 = 0u;\n\
      comp->overlay_cpu_hz = 0u;\ncomp->overlay_cpu_pct_x10 = 0u;\n\nif (comp->audio_out_dev\
      \ != 0u) {\n    cpu_host_hal_audio_clear(comp->audio_out_dev);\n}\n"
    step_post: "if (comp->host_inited == 0u) return;\nuint64_t now = cpu->total_cycles;\n\
      if ((now - comp->last_event_poll_cycle) < 1024u) return;\ncomp->last_event_poll_cycle\
      \ = now;\nCPUHostEvent ev;\nwhile (cpu_host_hal_poll_event(&ev)) {\n    if (cpu_host_hal_event_type(&ev)\
      \ == CPU_HOST_EVENT_QUIT) {\n        cpu->running = false;\n        cpu->halted\
      \ = true;\n    }\n}\ncpu_host_hal_pump_events();\ncomp->has_keyboard_focus =\
      \ cpu_host_hal_window_has_focus(comp->window);\nif (comp->has_keyboard_focus\
      \ != comp->last_focus_state) {\n    comp->last_focus_state = comp->has_keyboard_focus;\n\
      \    if (comp->window != NULL) {\n        cpu_host_hal_set_window_title(\n \
      \           comp->window,\n            (comp->has_keyboard_focus != 0u)\n  \
      \              ? \"PASM Sega SG-1000 [FOCUS]\"\n                : \"PASM Sega\
      \ SG-1000 [NO-FOCUS]\"\n        );\n    }\n}\n{\n    sms_overlay_update_perf(\n\
      \        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n  \
      \      cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n        &comp->overlay_last_ms,\n\
      \        &comp->overlay_last_frame_count,\n        &comp->overlay_last_cycle_count,\n\
      \        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n\
      \    );\n}\n{\n    uint8_t pause_pressed = 0u;\n    uint8_t reset_pressed =\
      \ 0u;\n    int key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n\
      \    if (ks != NULL && key_count > 0) {\n        uint8_t rows[2] = { 0xFFu,\
      \ 0xFFu };\n        cpu_component_apply_declared_keymap(\n            cpu,\n\
      \            \"host_sg1000\",\n            ks,\n            (size_t)key_count,\n\
      \            rows,\n            2u,\n            comp->has_keyboard_focus\n\
      \        );\n        if ((size_t)CPU_HOST_SCANCODE(R) < (size_t)key_count &&\
      \ ks[CPU_HOST_SCANCODE(R)] != 0u && comp->has_keyboard_focus != 0u) {\n    \
      \        reset_pressed = 1u;\n        }\n        if (comp->joy2_connected ==\
      \ 0u) {\n            rows[1] |= 0x0Fu;\n        }\n        if (reset_pressed\
      \ != 0u) {\n            rows[1] &= (uint8_t)~0x10u;\n        } else {\n    \
      \        rows[1] |= 0x10u;\n        }\n        comp->joy1 = rows[0];\n     \
      \   comp->joy2 = rows[1];\n        if ((size_t)CPU_HOST_SCANCODE(P) < (size_t)key_count\
      \ && ks[CPU_HOST_SCANCODE(P)] != 0u && comp->has_keyboard_focus != 0u) {\n \
      \           pause_pressed = 1u;\n        }\n    }\n    if (reset_pressed !=\
      \ comp->reset_pressed_prev && comp->debug_enabled != 0u) {\n        cpu_host_hal_log(\n\
      \            \"sg1000_host: reset_line=%u focus=%u joy1=0x%02X joy2=0x%02X\"\
      ,\n            (unsigned)reset_pressed,\n            (unsigned)comp->has_keyboard_focus,\n\
      \            (unsigned)comp->joy1,\n            (unsigned)comp->joy2\n     \
      \   );\n    }\n    comp->reset_pressed_prev = reset_pressed;\n    if (pause_pressed\
      \ != 0u && comp->pause_pressed_prev == 0u) {\n        if (comp->debug_enabled\
      \ != 0u) {\n            cpu_host_hal_log(\n                \"sg1000_host: pause_nmi\
      \ edge focus=%u pc=0x%04X\",\n                (unsigned)comp->has_keyboard_focus,\n\
      \                (unsigned)cpu->pc\n            );\n        }\n        uint16_t\
      \ ret_pc = cpu->pc;\n        cpu->sp = (uint16_t)(cpu->sp - 1u);\n        if\
      \ ((uint64_t)cpu->sp < cpu->memory_size) {\n            cpu->memory[cpu->sp]\
      \ = (uint8_t)((ret_pc >> 8) & 0xFFu);\n        }\n        cpu->sp = (uint16_t)(cpu->sp\
      \ - 1u);\n        if ((uint64_t)cpu->sp < cpu->memory_size) {\n            cpu->memory[cpu->sp]\
      \ = (uint8_t)(ret_pc & 0xFFu);\n        }\n        cpu->pc = 0x0066u;\n    \
      \    cpu->halted = false;\n    }\n    comp->pause_pressed_prev = pause_pressed;\n\
      }\nif (\n    comp->audio_out_dev != 0u\n    && comp->audio_out_ready != 0u\n\
      \    && comp->audio_ring != NULL\n) {\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev)\
      \ / (uint32_t)sizeof(int16_t);\n    uint32_t device_samples = (comp->audio_device_samples\
      \ > 0u) ? comp->audio_device_samples : 512u;\n    uint32_t low_watermark = device_samples\
      \ * 2u;\n    uint32_t target_total = device_samples * 4u;\n    uint32_t max_total\
      \ = device_samples * 8u;\n\n    if (queued_samples + comp->audio_ring_fill >\
      \ max_total) {\n        uint32_t desired_ring_fill = (queued_samples < target_total)\
      \ ? (target_total - queued_samples) : 0u;\n\n        while (comp->audio_ring_fill\
      \ > desired_ring_fill) {\n            comp->audio_ring_read_idx += 1u;\n   \
      \         if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) {\n  \
      \              comp->audio_ring_read_idx = 0u;\n            }\n            comp->audio_ring_fill\
      \ -= 1u;\n        }\n    }\n\n    if (queued_samples < low_watermark && comp->audio_ring_fill\
      \ > 0u) {\n        uint32_t desired = (queued_samples < target_total) ? (target_total\
      \ - queued_samples) : 0u;\n        uint32_t to_send = (comp->audio_ring_fill\
      \ < desired) ? comp->audio_ring_fill : desired;\n\n        while (to_send >\
      \ 0u) {\n            int16_t chunk[512];\n            uint32_t n = (to_send\
      \ > 512u) ? 512u : to_send;\n            for (uint32_t i = 0u; i < n; ++i) {\n\
      \                chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];\n \
      \               comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) {\n                    comp->audio_ring_read_idx\
      \ = 0u;\n                }\n            }\n            comp->audio_ring_fill\
      \ -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk,\
      \ n * (uint32_t)sizeof(int16_t)) != 0) {\n                break;\n         \
      \   }\n            to_send -= n;\n        }\n    }\n}\n"
    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \    comp->audio_out_dev = 0u;\n}\ncomp->audio_out_ready = 0u;\ncomp->audio_device_samples\
      \ = 0u;\ncomp->audio_rate = 0u;\nif (comp->audio_ring != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n\
      \    comp->audio_ring = NULL;\n}\ncomp->audio_ring_capacity = 0u;\ncomp->audio_ring_read_idx\
      \ = 0u;\ncomp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\nif (comp->texture\
      \ != NULL) {\n    cpu_host_hal_destroy_texture(comp->texture);\n    comp->texture\
      \ = NULL;\n}\nif (comp->renderer != NULL) {\n    cpu_host_hal_destroy_renderer(comp->renderer);\n\
      \    comp->renderer = NULL;\n}\nif (comp->window != NULL) {\n    cpu_host_hal_destroy_window(comp->window);\n\
      \    comp->window = NULL;\n}\nif (comp->host_inited != 0u) {\n    cpu_host_hal_quit_subsystems();\n\
      \    cpu_host_hal_quit();\n    comp->host_inited = 0u;\n}\n"
  callback_handlers:
    read_joy1: 'return (uint64_t)comp->joy1;

      '
    read_joy2: 'return (uint64_t)comp->joy2;

      '
  handler_bodies:
    video_frame: "if (comp->host_inited == 0u || argc < 4) return;\nvoid *renderer\
      \ = comp->renderer;\nvoid *texture = comp->texture;\nuint32_t frame = (uint32_t)(args[0]\
      \ & 0xFFFFFFFFu);\nuint32_t *pixels = (uint32_t *)(uintptr_t)args[1];\nuint32_t\
      \ w = (uint32_t)(args[2] & 0xFFFFFFFFu);\nuint32_t h = (uint32_t)(args[3] &\
      \ 0xFFFFFFFFu);\nif (renderer == NULL || texture == NULL || pixels == NULL ||\
      \ w == 0u || h == 0u) return;\ncomp->frame_count = frame;\nif (cpu->debug_overlay_enabled)\
      \ {\n    sms_overlay_draw_perf(\n        pixels,\n        w,\n        h,\n \
      \       comp->overlay_fps_x100,\n        comp->overlay_cpu_hz,\n        comp->overlay_cpu_pct_x10\n\
      \    );\n}\nif (comp->texture_w != w || comp->texture_h != h) {\n    cpu_host_hal_destroy_texture(texture);\n\
      \    texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888,\
      \ CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);\n    if (texture == NULL)\
      \ return;\n    comp->texture = (void *)texture;\n    comp->texture_w = w;\n\
      \    comp->texture_h = h;\n}\nif (cpu_host_hal_update_texture(texture, NULL,\
      \ pixels, (int)(w * sizeof(uint32_t))) != 0) return;\ncpu_host_hal_render_set_draw_color(renderer,\
      \ 0, 0, 0, 255);\ncpu_host_hal_render_clear(renderer);\n{\n    int ww = 0;\n\
      \    int wh = 0;\n    int src_x = (comp->crop_left8 != 0u && w > 8u) ? 8 : 0;\n\
      \    int src_w = (comp->crop_left8 != 0u && w > 8u) ? ((int)w - 8) : (int)w;\n\
      \    int src_h = (int)h;\n    CPUHostRect src;\n    if (cpu_host_hal_renderer_output_size(renderer,\
      \ &ww, &wh) != 0 || ww <= 0 || wh <= 0) return;\n    CPUHostRect dst;\n    int\
      \ scaled_w = ww;\n    if (src_w <= 0 || src_h <= 0) return;\n    int scaled_h\
      \ = (int)((((int64_t)ww) * (int64_t)src_h) / (int64_t)src_w);\n    if (scaled_h\
      \ > wh) {\n        scaled_h = wh;\n        scaled_w = (int)((((int64_t)wh) *\
      \ (int64_t)src_w) / (int64_t)src_h);\n    }\n    dst.w = (scaled_w > 0) ? scaled_w\
      \ : ww;\n    dst.h = (scaled_h > 0) ? scaled_h : wh;\n    dst.x = (ww - dst.w)\
      \ / 2;\n    dst.y = (wh - dst.h) / 2;\n    src.x = src_x;\n    src.y = 0;\n\
      \    src.w = src_w;\n    src.h = src_h;\n    if (cpu_host_hal_render_copy(renderer,\
      \ texture, &src, &dst) != 0) return;\n}\ncpu_host_hal_render_present(renderer);\n"
    irq_edge: "if (argc > 0 && ((args[0] & 0xFFu) != 0u)) {\n    comp->irq_edges +=\
      \ 1u;\n}\n"
    audio_pcm: "if (\n    comp->audio_out_dev == 0u\n    || comp->audio_out_ready\
      \ == 0u\n    || comp->audio_ring == NULL\n    || comp->audio_ring_capacity ==\
      \ 0u\n    || argc < 1\n) {\n    return;\n}\n\n{\n    uint8_t level = (uint8_t)\
      \ (args[0] & 0xFFu);\n    int centered = ((int) level) - 128;\n    int16_t sample\
      \ = (int16_t) (centered * 128);\n\n    if (comp->audio_ring_fill >= comp->audio_ring_capacity)\
      \ {\n        comp->audio_ring_read_idx += 1u;\n\n        if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) {\n            comp->audio_ring_read_idx = 0u;\n\
      \        }\n\n        comp->audio_ring_fill -= 1u;\n    }\n\n    comp->audio_ring[comp->audio_ring_write_idx]\
      \ = sample;\n    comp->audio_ring_write_idx += 1u;\n\n    if (comp->audio_ring_write_idx\
      \ >= comp->audio_ring_capacity) {\n        comp->audio_ring_write_idx = 0u;\n\
      \    }\n\n    comp->audio_ring_fill += 1u;\n    comp->audio_samples += 1u;\n\
      \    comp->audio_level = sample;\n    comp->audio_last_cycle = (argc > 1) ?\
      \ (uint64_t) args[1] : cpu->total_cycles;\n}\n"
