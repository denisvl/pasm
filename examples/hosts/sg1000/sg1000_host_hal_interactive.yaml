      \ ring_capacity = ((uint32_t)have.freq > 0u) ? ((uint32_t)have.freq * 2u) : 88200u;\n\n                if (ring_capacity\
      \ < 16384u) {\n                    ring_capacity = 16384u;\n                }\n\n                comp->audio_ring =\
      \ (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));\n\n                if (comp->audio_ring !=\
      \ NULL) {\n                    comp->audio_rate = (uint32_t)have.freq;\n                    comp->audio_device_samples\
      \ = (uint32_t)have.samples * (uint32_t)have.channels;\n                    comp->audio_channels = (uint32_t)have.channels;\n\
      \                    comp->audio_ring_capacity = ring_capacity;\n                    comp->audio_ring_read_idx = 0u;\n\
      \                    comp->audio_ring_write_idx = 0u;\n                    comp->audio_ring_fill = 0u;\n           \
      \         comp->audio_out_ready = 1u;\n\n                    {\n                        int16_t prefill[4096];\n   \
      \                     uint32_t prefill_samples = (uint32_t)have.samples * 2u * (uint32_t)have.channels;\n\n        \
      \                if (prefill_samples > 4096u) {\n                            prefill_samples = 4096u;\n            \
      \            }\n\n                        for (uint32_t i = 0u; i < prefill_samples; ++i) {\n                      \
      \      prefill[i] = 0;\n                        }\n\n                        if (cpu_host_hal_audio_queue(\n       \
      \                         comp->audio_out_dev,\n                                prefill,\n                         \
      \       prefill_samples * (uint32_t)sizeof(int16_t)) != 0) {\n                            cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                            comp->audio_out_dev = 0u;\n                            cpu_host_hal_free(comp->audio_ring);\n\
      \                            comp->audio_ring = NULL;\n                            comp->audio_ring_capacity = 0u;\n\
      \                            comp->audio_ring_read_idx = 0u;\n                            comp->audio_ring_write_idx\
      \ = 0u;\n                            comp->audio_ring_fill = 0u;\n                            comp->audio_rate = 0u;\n\
      \                comp->audio_channels = 0u;\n                            comp->audio_device_samples = 0u;\n        \
      \            comp->audio_channels = 0u;\n                            comp->audio_out_ready = 0u;\n                 \
      \       } else {\n                            cpu_host_hal_audio_pause(comp->audio_out_dev, 0);\n                  \
      \      }\n                    }\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                    comp->audio_out_dev = 0u;\n                    comp->audio_rate = 0u;\n                comp->audio_channels\
      \ = 0u;\n                    comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n    \
      \            }\n            } else if (comp->audio_out_dev != 0u) {\n                cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                comp->audio_out_dev = 0u;\n                comp->audio_rate = 0u;\n                comp->audio_channels\
      \ = 0u;\n                comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n        \
      \    }\n        }\n    }\n    comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n    comp->last_focus_state\
      \ = comp->has_keyboard_focus;\n    {\n        const char *joy2_env = cpu_host_hal_getenv(\"PASM_SG1000_JOY2_CONNECTED\"\
      );\n        comp->joy2_connected = (joy2_env != NULL && joy2_env[0] == '1') ? 1u : 0u;\n    }\n    {\n        const\
      \ char *crop_env = cpu_host_hal_getenv(\"PASM_SG1000_CROP_LEFT8\");\n        comp->crop_left8 = (crop_env != NULL &&\
      \ crop_env[0] == '1') ? 1u : 0u;\n    }\n    comp->host_inited = 1u;\n} while (0);\n"
    reset: "{\n    const char *dbg_env = cpu_host_hal_getenv(\"PASM_SG1000_DEBUG\");\n    comp->debug_enabled = (dbg_env !=\
      \ NULL && dbg_env[0] != '\\0' && dbg_env[0] != '0') ? 1u : 0u;\n}\ncomp->frame_count = 0u;\ncomp->irq_edges = 0u;\n\
      comp->audio_samples = 0u;\ncomp->audio_level = 0;\ncomp->audio_last_cycle = 0u;\ncomp->audio_sample_cursor = 0u;\ncomp->audio_ring_read_idx\
