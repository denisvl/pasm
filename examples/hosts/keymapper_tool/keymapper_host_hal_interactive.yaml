                          comp->quit_after_save = 0u;
                      }
                      title_dirty = 1u;
                      continue;
                  }
                  if (et == CPU_HOST_EVENT_KEYDOWN && comp->title_last_repeat == 0u) {
                      if (comp->pick_color_mode != 0u && sc == CPU_HOST_SCANCODE(ESCAPE)) {
                          comp->pick_color_mode = 0u;
                          if (comp->cursor_arrow != NULL) {
                              SDL_SetCursor((SDL_Cursor *)comp->cursor_arrow);
                          }
                          title_dirty = 1u;
                          continue;
                      }
                      if (sc == CPU_HOST_SCANCODE(F2)) {
                          if (comp->selected_box >= 0 && (uint32_t)comp->selected_box < comp->mapper_box_count) {
                              const char *sid = boxes[comp->selected_box].id;
                              size_t n = strlen(sid);
                              if (n >= sizeof(rename_buf)) n = sizeof(rename_buf) - 1u;
                              memset(rename_buf, 0, sizeof(rename_buf));
