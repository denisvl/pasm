                          continue;
                      }
                      if (sc == CPU_HOST_SCANCODE(DELETE) || sc == CPU_HOST_SCANCODE(BACKSPACE)) {
                          if (comp->mapper_box_count > 0u && (comp->selection_count > 0u || comp->selected_box >= 0)) {
                              uint32_t remove_count = 0u;
                              if (sel != NULL) {
                                  for (uint32_t i = 0u; i < comp->mapper_box_count; ++i) {
                                      if (sel[i] != 0u) remove_count += 1u;
                                  }
                              } else if (comp->selected_box >= 0 && (uint32_t)comp->selected_box < comp->mapper_box_count) {
                                  remove_count = 1u;
                              }
                              if (remove_count > 0u) {
                                  MapperBox *snap = (MapperBox *)malloc((size_t)comp->mapper_box_count * sizeof(MapperBox));
                                  if (snap != NULL) {
                                      memcpy(snap, boxes, (size_t)comp->mapper_box_count * sizeof(MapperBox));
                                      if (undo_boxes != NULL) free(undo_boxes);
                                      undo_boxes = snap;
                                      comp->undo_boxes = snap;
                                      comp->undo_count = comp->mapper_box_count;
                                      comp->undo_valid = 1u;
                                      if (redo_boxes != NULL) {
                                          free(redo_boxes);
                                          redo_boxes = NULL;
                                      }
                                      comp->redo_boxes = NULL;
                                      comp->redo_count = 0u;
                                      comp->redo_valid = 0u;
                                  }
                                  {
                                      uint32_t wi = 0u;
                                      for (uint32_t ri = 0u; ri < comp->mapper_box_count; ++ri) {
                                          uint8_t to_remove = 0u;
                                          if (sel != NULL) {
                                              to_remove = sel[ri];
                                          } else if ((int32_t)ri == comp->selected_box) {
                                              to_remove = 1u;
                                          }
                                          if (to_remove == 0u) {
                                              if (wi != ri) boxes[wi] = boxes[ri];
                                              wi += 1u;
                                          }
                                      }
                                      comp->mapper_box_count = wi;
                                      comp->selected_box = (wi > 0u) ? 0 : -1;
                                      comp->selection_count = (wi > 0u) ? 1u : 0u;
