                      if ((comp->title_last_mods & CPU_HOST_MOD_CTRL) != 0u && sc == CPU_HOST_SCANCODE(D)) {
                          if (comp->mapper_box_count > 0u && comp->selection_count > 0u) {
                              uint32_t old_count = comp->mapper_box_count;
                              uint32_t sel_count = 0u;
                              for (uint32_t i = 0u; i < old_count; ++i) {
                                  if (sel != NULL && sel[i] != 0u) sel_count += 1u;
                              }
                              if (sel_count > 0u) {
                                  MapperBox *snap = (MapperBox *)malloc((size_t)old_count * sizeof(MapperBox));
                                  if (snap != NULL) {
                                      memcpy(snap, boxes, (size_t)old_count * sizeof(MapperBox));
                                      if (undo_boxes != NULL) free(undo_boxes);
                                      undo_boxes = snap;
                                      comp->undo_boxes = snap;
                                      comp->undo_count = old_count;
                                      comp->undo_valid = 1u;
                                      if (redo_boxes != NULL) {
                                          free(redo_boxes);
                                          redo_boxes = NULL;
