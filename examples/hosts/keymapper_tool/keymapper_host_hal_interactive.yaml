                                              boxes[wi].x += 12;
                                              boxes[wi].y += 12;
                                              if (boxes[wi].x < 0) boxes[wi].x = 0;
                                              if (boxes[wi].y < 0) boxes[wi].y = 0;
                                              {
                                                  char base[96];
                                                  unsigned n = 1u;
                                                  int unique = 0;
                                                  snprintf(base, sizeof(base), "%s_copy", boxes[i].id);
                                                  strncpy(boxes[wi].id, base, sizeof(boxes[wi].id) - 1u);
                                                  boxes[wi].id[sizeof(boxes[wi].id) - 1u] = '\0';
                                                  while (!unique) {
                                                      unique = 1;
                                                      for (uint32_t k = 0u; k < wi; ++k) {
                                                          if (strcmp(boxes[k].id, boxes[wi].id) == 0) {
                                                              unique = 0;
                                                              n += 1u;
                                                              snprintf(boxes[wi].id, sizeof(boxes[wi].id), "%s%u", base, n);
