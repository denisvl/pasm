                                  boxes[ni].x = (wx >= 0) ? wx : 0;
                                  boxes[ni].y = (wy >= 0) ? wy : 0;
                                  boxes[ni].w = 60;
                                  boxes[ni].h = 40;
                                  comp->mapper_box_count = new_count;
                                  comp->selected_box = (int32_t)ni;
