behavior:
  snippets:
    init: |
      typedef struct MapperBox {
          char id[128];
          int x;
          int y;
          int w;
          int h;
          uint8_t has_overlay;
          uint8_t or_;
          uint8_t og;
          uint8_t ob;
      } MapperBox;
      do {
          MapperBox *boxes;
          const char *mapper_path;
          char mapper_dir[768];
          char image_file[512];
          char image_path[1400];
          FILE *fp;
          char line[1024];
          char current_id[128];
          int have_current = 0;
          int cur_x = 0;
          int cur_y = 0;
          int cur_w = 1;
          int cur_h = 1;
          int in_bbox = 0;
          int in_overlay = 0;
          int overlay_idx = 0;
          int cur_or = 0;
          int cur_og = 0;
          int cur_ob = 0;
          int cur_has_overlay = 0;
          size_t line_len;
          char *s;

          if (comp->host_inited != 0u) break;
          if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_EVENTS) != 0) break;
          cpu_host_hal_stop_text_input();

          comp->window = cpu_host_hal_create_window(
              "PASM Keymapper Tool (Host-HAL)",
              CPU_HOST_WINDOWPOS_CENTERED,
              CPU_HOST_WINDOWPOS_CENTERED,
              1280,
              760,
              CPU_HOST_WINDOW_RESIZABLE
          );
          if (comp->window == NULL) break;

          comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);
          if (comp->renderer == NULL) {
              comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);
          }
          if (comp->renderer == NULL) break;

          cpu_host_hal_show_window(comp->window);
          cpu_host_hal_raise_window(comp->window);
          (void)cpu_host_hal_set_window_input_focus(comp->window);

          comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
          comp->last_focus_state = comp->has_keyboard_focus;
          comp->title_last_scancode = -1;
          comp->title_last_keycode = 0;
          comp->title_last_mods = 0u;
          comp->title_last_repeat = 0u;
          comp->title_last_is_down = 0u;
          comp->mapper_boxes = NULL;
          comp->mapper_path = NULL;
          comp->image_texture = NULL;
          comp->image_surface = NULL;
          comp->image_lib_inited = 0u;
          comp->image_w = 0;
          comp->image_h = 0;
          comp->mapper_box_count = 0u;
          comp->mapper_box_cap = 0u;
          comp->undo_boxes = NULL;
          comp->undo_count = 0u;
          comp->undo_valid = 0u;
          comp->redo_boxes = NULL;
          comp->redo_count = 0u;
          comp->redo_valid = 0u;
          comp->selection_mask = NULL;
          comp->selection_count = 0u;
          comp->selected_box = -1;
          comp->drag_active = 0u;
          comp->resize_active = 0u;
          comp->pan_active = 0u;
          comp->dirty = 0u;
          comp->edit_field = 0u;
          comp->view_zoom_q8 = 256;
          comp->view_off_x = 0;
          comp->view_off_y = 0;
          comp->last_mouse_x = 0;
          comp->last_mouse_y = 0;
          comp->quit_prompt_active = 0u;
          comp->quit_after_save = 0u;
          comp->rename_mode = 0u;
          comp->pick_color_mode = 0u;
          comp->cursor_arrow = (void *)SDL_CreateSystemCursor(SDL_SYSTEM_CURSOR_ARROW);
          comp->cursor_crosshair = (void *)SDL_CreateSystemCursor(SDL_SYSTEM_CURSOR_CROSSHAIR);
          if (comp->cursor_arrow != NULL) {
              SDL_SetCursor((SDL_Cursor *)comp->cursor_arrow);
          }

          mapper_path = cpu_host_hal_getenv("PASM_KEYMAPPER_FILE");
          if (mapper_path == NULL || mapper_path[0] == '\0') {
              mapper_path = "examples/hosts/cpc464/cpc_keyboard_mapper.yaml";
          }
          {
              size_t path_len = strlen(mapper_path);
              char *mp = (char *)malloc(path_len + 1u);
              if (mp != NULL) {
                  memcpy(mp, mapper_path, path_len + 1u);
                  comp->mapper_path = mp;
              }
          }

          fp = fopen(mapper_path, "r");
          if (fp == NULL) {
              cpu_host_hal_log("keymapper_tool: failed to open mapper file: %s", mapper_path);
              comp->host_inited = 1u;
              break;
          }

          {
              int img_flags = IMG_Init(IMG_INIT_PNG | IMG_INIT_JPG);
              if ((img_flags & (IMG_INIT_PNG | IMG_INIT_JPG)) != 0) {
                  comp->image_lib_inited = 1u;
              }
          }

          memset(mapper_dir, 0, sizeof(mapper_dir));
          memset(image_file, 0, sizeof(image_file));
          memset(image_path, 0, sizeof(image_path));
          {
              const char *slash = strrchr(mapper_path, '/');
              if (slash != NULL) {
                  size_t dn = (size_t)(slash - mapper_path);
                  if (dn >= sizeof(mapper_dir)) dn = sizeof(mapper_dir) - 1u;
                  memcpy(mapper_dir, mapper_path, dn);
                  mapper_dir[dn] = '\0';
              } else {
                  strcpy(mapper_dir, ".");
              }
          }

          current_id[0] = '\0';
          while (fgets(line, (int)sizeof(line), fp) != NULL) {
              line_len = strlen(line);
              while (line_len > 0u && (line[line_len - 1u] == '\r' || line[line_len - 1u] == '\n')) {
                  line[--line_len] = '\0';
              }
              s = cpu_component_trim(line);
              if (s == NULL || s[0] == '\0' || s[0] == '#') continue;

              if (strncmp(s, "- id:", 5) == 0 || strncmp(s, "id:", 3) == 0) {
                  const char *p = strchr(s, ':');
                  if (have_current != 0 && current_id[0] != '\0') {
                      if (comp->mapper_box_count >= comp->mapper_box_cap) {
                          uint32_t new_cap = (comp->mapper_box_cap == 0u) ? 128u : (comp->mapper_box_cap * 2u);
                          MapperBox *nb = (MapperBox *)realloc((MapperBox *)comp->mapper_boxes, (size_t)new_cap * sizeof(MapperBox));
                          if (nb == NULL) break;
                          comp->mapper_boxes = nb;
                          comp->mapper_box_cap = new_cap;
                      }
                      boxes = (MapperBox *)comp->mapper_boxes;
                      memset(&boxes[comp->mapper_box_count], 0, sizeof(MapperBox));
                      strncpy(boxes[comp->mapper_box_count].id, current_id, sizeof(boxes[comp->mapper_box_count].id) - 1u);
                      boxes[comp->mapper_box_count].x = cur_x;
                      boxes[comp->mapper_box_count].y = cur_y;
                      boxes[comp->mapper_box_count].w = (cur_w > 0) ? cur_w : 1;
                      boxes[comp->mapper_box_count].h = (cur_h > 0) ? cur_h : 1;
                      boxes[comp->mapper_box_count].has_overlay = (cur_has_overlay != 0) ? 1u : 0u;
                      boxes[comp->mapper_box_count].or_ = (uint8_t)((cur_or < 0) ? 0 : (cur_or > 255 ? 255 : cur_or));
                      boxes[comp->mapper_box_count].og = (uint8_t)((cur_og < 0) ? 0 : (cur_og > 255 ? 255 : cur_og));
                      boxes[comp->mapper_box_count].ob = (uint8_t)((cur_ob < 0) ? 0 : (cur_ob > 255 ? 255 : cur_ob));
                      comp->mapper_box_count += 1u;
                  }
                  have_current = 1;
                  cur_x = 0;
                  cur_y = 0;
                  cur_w = 1;
                  cur_h = 1;
                  cur_or = 0;
                  cur_og = 0;
                  cur_ob = 0;
                  cur_has_overlay = 0;
                  in_bbox = 0;
                  in_overlay = 0;
                  overlay_idx = 0;
                  current_id[0] = '\0';
                  if (p != NULL) {
                      char *val = cpu_component_trim((char *)(p + 1));
                      size_t n;
                      if (val != NULL) {
                          n = strlen(val);
                          if (n >= 2u && ((val[0] == '\'' && val[n - 1u] == '\'') || (val[0] == '"' && val[n - 1u] == '"'))) {
                              val[n - 1u] = '\0';
                              val += 1;
                          }
                          strncpy(current_id, val, sizeof(current_id) - 1u);
                          current_id[sizeof(current_id) - 1u] = '\0';
                      }
                  }
                  continue;
              }

              if (strncmp(s, "file:", 5) == 0 && image_file[0] == '\0') {
                  char *v = cpu_component_trim(s + 5);
                  if (v != NULL && v[0] != '\0') {
                      size_t n = strlen(v);
                      if (n >= 2u && ((v[0] == '\'' && v[n - 1u] == '\'') || (v[0] == '"' && v[n - 1u] == '"'))) {
                          v[n - 1u] = '\0';
                          v += 1;
                      }
                      strncpy(image_file, v, sizeof(image_file) - 1u);
                      image_file[sizeof(image_file) - 1u] = '\0';
                  }
                  continue;
              }

              if (strncmp(s, "bbox:", 5) == 0) {
                  in_bbox = 1;
                  in_overlay = 0;
                  overlay_idx = 0;
                  continue;
              }
              if (strncmp(s, "overlay_color:", 14) == 0) {
                  in_overlay = 1;
                  overlay_idx = 0;
                  continue;
              }

              if (have_current != 0 && in_bbox != 0) {
                  if (strncmp(s, "x:", 2) == 0) {
                      cur_x = (int)strtol(cpu_component_trim(s + 2), NULL, 0);
                  } else if (strncmp(s, "y:", 2) == 0) {
                      cur_y = (int)strtol(cpu_component_trim(s + 2), NULL, 0);
                  } else if (strncmp(s, "width:", 6) == 0) {
                      cur_w = (int)strtol(cpu_component_trim(s + 6), NULL, 0);
                  } else if (strncmp(s, "height:", 7) == 0) {
                      cur_h = (int)strtol(cpu_component_trim(s + 7), NULL, 0);
                  }
              } else if (have_current != 0 && in_overlay != 0) {
                  if (s[0] == '-' && (s[1] == ' ' || s[1] == '\t')) {
                      int v = (int)strtol(cpu_component_trim(s + 1), NULL, 0);
                      if (overlay_idx == 0) cur_or = v;
                      else if (overlay_idx == 1) cur_og = v;
                      else if (overlay_idx == 2) cur_ob = v;
                      overlay_idx += 1;
                      if (overlay_idx >= 3) {
                          cur_has_overlay = 1;
                      }
                  } else {
                      in_overlay = 0;
                  }
              }
          }

          if (have_current != 0 && current_id[0] != '\0') {
              if (comp->mapper_box_count >= comp->mapper_box_cap) {
                  uint32_t new_cap = (comp->mapper_box_cap == 0u) ? 128u : (comp->mapper_box_cap * 2u);
                  MapperBox *nb = (MapperBox *)realloc((MapperBox *)comp->mapper_boxes, (size_t)new_cap * sizeof(MapperBox));
                  if (nb != NULL) {
                      comp->mapper_boxes = nb;
                      comp->mapper_box_cap = new_cap;
                  }
              }
              if (comp->mapper_box_count < comp->mapper_box_cap) {
                  boxes = (MapperBox *)comp->mapper_boxes;
                  memset(&boxes[comp->mapper_box_count], 0, sizeof(MapperBox));
                  strncpy(boxes[comp->mapper_box_count].id, current_id, sizeof(boxes[comp->mapper_box_count].id) - 1u);
                  boxes[comp->mapper_box_count].x = cur_x;
                  boxes[comp->mapper_box_count].y = cur_y;
                  boxes[comp->mapper_box_count].w = (cur_w > 0) ? cur_w : 1;
                  boxes[comp->mapper_box_count].h = (cur_h > 0) ? cur_h : 1;
                  boxes[comp->mapper_box_count].has_overlay = (cur_has_overlay != 0) ? 1u : 0u;
                  boxes[comp->mapper_box_count].or_ = (uint8_t)((cur_or < 0) ? 0 : (cur_or > 255 ? 255 : cur_or));
                  boxes[comp->mapper_box_count].og = (uint8_t)((cur_og < 0) ? 0 : (cur_og > 255 ? 255 : cur_og));
                  boxes[comp->mapper_box_count].ob = (uint8_t)((cur_ob < 0) ? 0 : (cur_ob > 255 ? 255 : cur_ob));
                  comp->mapper_box_count += 1u;
              }
          }

          fclose(fp);

          if (image_file[0] != '\0') {
              SDL_Surface *surf = NULL;
              int loaded = 0;
              if (image_file[0] == '/') {
                  strncpy(image_path, image_file, sizeof(image_path) - 1u);
              } else {
                  snprintf(image_path, sizeof(image_path), "%s/%s", mapper_dir, image_file);
              }
              if (comp->image_lib_inited != 0u) {
                  surf = IMG_Load(image_path);
              }
              if (surf == NULL) {
                  surf = SDL_LoadBMP(image_path);
              }
              if (surf != NULL) {
                  loaded = 1;
                  SDL_Texture *tex = SDL_CreateTextureFromSurface((SDL_Renderer *)comp->renderer, surf);
                  if (tex != NULL) {
                      comp->image_texture = tex;
                      comp->image_surface = surf;
                      comp->image_w = surf->w;
                      comp->image_h = surf->h;
                      cpu_host_hal_log("keymapper_tool: loaded image: %s (%dx%d)", image_path, surf->w, surf->h);
                  } else {
                      cpu_host_hal_log("keymapper_tool: texture create failed for image: %s", image_path);
                      SDL_FreeSurface(surf);
                  }
              }
              if (loaded == 0) {
                  const char *exts[] = { ".png", ".jpg", ".jpeg", ".bmp", ".webp" };
                  char stem[512];
                  char *dot = NULL;
                  memset(stem, 0, sizeof(stem));
                  strncpy(stem, image_file, sizeof(stem) - 1u);
                  dot = strrchr(stem, '.');
                  if (dot != NULL) {
                      *dot = '\0';
                  }
                  for (size_t ei = 0u; ei < (sizeof(exts) / sizeof(exts[0])); ++ei) {
                      if (stem[0] == '\0') break;
                      snprintf(image_path, sizeof(image_path), "%s/%s%s", mapper_dir, stem, exts[ei]);
                      surf = NULL;
                      if (comp->image_lib_inited != 0u) {
                          surf = IMG_Load(image_path);
                      }
                      if (surf == NULL) {
                          surf = SDL_LoadBMP(image_path);
                      }
                      if (surf != NULL) {
                          SDL_Texture *tex = SDL_CreateTextureFromSurface((SDL_Renderer *)comp->renderer, surf);
                          if (tex != NULL) {
                              comp->image_texture = tex;
                              comp->image_surface = surf;
                              comp->image_w = surf->w;
                              comp->image_h = surf->h;
                              loaded = 1;
                              cpu_host_hal_log("keymapper_tool: loaded image: %s (%dx%d)", image_path, surf->w, surf->h);
                          }
                          if (loaded == 0) {
                              SDL_FreeSurface(surf);
                          }
                          if (loaded != 0) break;
                      }
                  }
              }
              if (loaded == 0) {
                  cpu_host_hal_log("keymapper_tool: image load failed: %s", image_path);
              }
          }

          if (comp->mapper_box_count > 0u) {
              comp->selection_mask = calloc((size_t)comp->mapper_box_count, sizeof(uint8_t));
          }
          cpu_host_hal_log("keymapper_tool: loaded %u boxes from %s", (unsigned)comp->mapper_box_count, mapper_path);
          comp->host_inited = 1u;
      } while (0);

    step_post: |
      typedef struct MapperBox {
          char id[128];
          int x;
          int y;
          int w;
          int h;
          uint8_t has_overlay;
          uint8_t or_;
          uint8_t og;
          uint8_t ob;
      } MapperBox;
      static char rename_buf[128] = {0};
      static uint32_t rename_len = 0u;
      if (comp->host_inited == 0u) return;
      {
          CPUHostEvent ev;
          uint8_t title_dirty = 0u;
          int key_count = 0;
          int win_w = 0;
          int win_h = 0;
          const uint8_t *host_state = cpu_host_hal_keyboard_state(&key_count);
          MapperBox *boxes = (MapperBox *)comp->mapper_boxes;
          uint8_t *sel = (uint8_t *)comp->selection_mask;
          MapperBox *undo_boxes = (MapperBox *)comp->undo_boxes;
          MapperBox *redo_boxes = (MapperBox *)comp->redo_boxes;

          (void)cpu_host_hal_get_window_size(comp->window, &win_w, &win_h);

          while (cpu_host_hal_poll_event(&ev)) {
              uint32_t et = cpu_host_hal_event_type(&ev);
              if (et == CPU_HOST_EVENT_QUIT) {
                  if (comp->dirty != 0u) {
                      comp->quit_prompt_active = 1u;
                      comp->quit_after_save = 0u;
                      title_dirty = 1u;
                  } else {
                      cpu->running = false;
                      cpu->halted = true;
                  }
                  continue;
              }

              if (et == SDL_MOUSEMOTION) {
                  comp->last_mouse_x = (int32_t)ev.motion.x;
                  comp->last_mouse_y = (int32_t)ev.motion.y;
              } else if (et == SDL_MOUSEBUTTONDOWN || et == SDL_MOUSEBUTTONUP) {
                  comp->last_mouse_x = (int32_t)ev.button.x;
                  comp->last_mouse_y = (int32_t)ev.button.y;
              }

              if (et == SDL_MOUSEWHEEL) {
                  int32_t oldz = comp->view_zoom_q8;
                  int32_t newz = oldz + ((int32_t)ev.wheel.y * 24);
                  int32_t mx = comp->last_mouse_x;
                  int32_t my = comp->last_mouse_y;
                  if (newz < 64) newz = 64;
                  if (newz > 1024) newz = 1024;
                  if (newz != oldz) {
                      int32_t wx = ((mx + comp->view_off_x) * 256) / oldz;
                      int32_t wy = ((my + comp->view_off_y) * 256) / oldz;
                      comp->view_zoom_q8 = newz;
                      comp->view_off_x = ((wx * newz) / 256) - mx;
                      comp->view_off_y = ((wy * newz) / 256) - my;
                      if (comp->view_off_x < 0) comp->view_off_x = 0;
                      if (comp->view_off_y < 0) comp->view_off_y = 0;
                      title_dirty = 1u;
                  }
              }

              if (comp->rename_mode != 0u && et == SDL_TEXTINPUT) {
                  const char *txt = ev.text.text;
                  if (txt != NULL) {
                      while (*txt != '\0' && rename_len + 1u < sizeof(rename_buf)) {
                          char c = *txt++;
                          if ((unsigned char)c < 32u) continue;
                          rename_buf[rename_len++] = c;
                      }
                      rename_buf[rename_len] = '\0';
                      title_dirty = 1u;
                  }
                  continue;
              }

              if (et == CPU_HOST_EVENT_KEYDOWN || et == CPU_HOST_EVENT_KEYUP) {
                  int32_t sc = cpu_host_hal_event_scancode(&ev);
                  comp->title_last_scancode = sc;
                  comp->title_last_keycode = cpu_host_hal_key_from_scancode(sc);
                  comp->title_last_mods = cpu_host_hal_event_mod_state(&ev);
                  comp->title_last_repeat = cpu_host_hal_event_key_repeat(&ev);
                  comp->title_last_is_down = (et == CPU_HOST_EVENT_KEYDOWN) ? 1u : 0u;
                  if (comp->rename_mode != 0u && et == CPU_HOST_EVENT_KEYDOWN && comp->title_last_repeat == 0u) {
                      if (sc == CPU_HOST_SCANCODE(BACKSPACE)) {
                          if (rename_len > 0u) {
                              rename_len -= 1u;
                              rename_buf[rename_len] = '\0';
                          }
                      } else if (sc == CPU_HOST_SCANCODE(ESCAPE)) {
                          comp->rename_mode = 0u;
                          cpu_host_hal_stop_text_input();
                      } else if (sc == CPU_HOST_SCANCODE(RETURN) || sc == CPU_HOST_SCANCODE(KP_ENTER)) {
                          if (comp->selected_box >= 0 && (uint32_t)comp->selected_box < comp->mapper_box_count && rename_len > 0u) {
                              int unique = 1;
                              for (uint32_t i = 0u; i < comp->mapper_box_count; ++i) {
                                  if ((int32_t)i == comp->selected_box) continue;
                                  if (strcmp(boxes[i].id, rename_buf) == 0) {
                                      unique = 0;
                                      break;
                                  }
                              }
                              if (unique != 0) {
                                  if (comp->mapper_box_count > 0u) {
                                      MapperBox *snap = (MapperBox *)malloc((size_t)comp->mapper_box_count * sizeof(MapperBox));
                                      if (snap != NULL) {
                                          memcpy(snap, boxes, (size_t)comp->mapper_box_count * sizeof(MapperBox));
                                          if (undo_boxes != NULL) free(undo_boxes);
                                          undo_boxes = snap;
                                          comp->undo_boxes = snap;
                                          comp->undo_count = comp->mapper_box_count;
                                          comp->undo_valid = 1u;
                                          if (redo_boxes != NULL) {
                                              free(redo_boxes);
                                              redo_boxes = NULL;
                                          }
                                          comp->redo_boxes = NULL;
                                          comp->redo_count = 0u;
                                          comp->redo_valid = 0u;
                                      }
                                  }
                                  strncpy(boxes[comp->selected_box].id, rename_buf, sizeof(boxes[comp->selected_box].id) - 1u);
                                  boxes[comp->selected_box].id[sizeof(boxes[comp->selected_box].id) - 1u] = '\0';
                                  comp->dirty = 1u;
                                  comp->rename_mode = 0u;
                                  cpu_host_hal_stop_text_input();
                              }
                          }
                      }
                      title_dirty = 1u;
                      continue;
                  }
                  if (comp->quit_prompt_active != 0u && et == CPU_HOST_EVENT_KEYDOWN && comp->title_last_repeat == 0u) {
                      if ((comp->title_last_mods & CPU_HOST_MOD_CTRL) != 0u && sc == CPU_HOST_SCANCODE(S)) {
                          const char *src_path = (const char *)comp->mapper_path;
                          int save_failed = 0;
                          if (src_path != NULL && src_path[0] != '\0') {
                              char tmp_path[768];
                              FILE *in_fp = NULL;
                              FILE *out_fp = NULL;
                              char line[1024];
                              char cur_id[128];
                              uint8_t *found_ids = NULL;
                              int skip_key_block = 0;
                              int in_bbox = 0;
                              int in_overlay = 0;
                              int overlay_idx = 0;
                              int line_changed = 0;
                              cur_id[0] = '\0';
                              snprintf(tmp_path, sizeof(tmp_path), "%s.tmp", src_path);
                              if (comp->mapper_box_count > 0u) {
                                  found_ids = (uint8_t *)calloc((size_t)comp->mapper_box_count, sizeof(uint8_t));
                              }
                              in_fp = fopen(src_path, "r");
                              out_fp = fopen(tmp_path, "w");
                              if (in_fp == NULL || out_fp == NULL) {
                                  save_failed = 1;
                              } else {
                                  while (fgets(line, (int)sizeof(line), in_fp) != NULL) {
                                      char work[1024];
                                      char *trimmed;
                                      memcpy(work, line, sizeof(work));
                                      work[sizeof(work) - 1u] = '\0';
                                      trimmed = cpu_component_trim(work);
                                      line_changed = 0;
                                      if (trimmed != NULL) {
                                          if (strncmp(trimmed, "- id:", 5) == 0 || strncmp(trimmed, "id:", 3) == 0) {
                                              const char *p = strchr(trimmed, ':');
                                              in_bbox = 0;
                                              in_overlay = 0;
                                              overlay_idx = 0;
                                              cur_id[0] = '\0';
                                              if (p != NULL) {
                                                  char val[128];
                                                  char *tv;
                                                  size_t vn;
                                                  memset(val, 0, sizeof(val));
                                                  strncpy(val, p + 1, sizeof(val) - 1u);
                                                  tv = cpu_component_trim(val);
                                                  if (tv != NULL) {
                                                      vn = strlen(tv);
                                                      if (vn >= 2u && ((tv[0] == '\'' && tv[vn - 1u] == '\'') || (tv[0] == '"' && tv[vn - 1u] == '"'))) {
                                                          tv[vn - 1u] = '\0';
                                                          tv += 1;
                                                      }
                                                      strncpy(cur_id, tv, sizeof(cur_id) - 1u);
                                                      {
                                                          int known = 0;
                                                          for (uint32_t bi = 0u; bi < comp->mapper_box_count; ++bi) {
                                                              if (strcmp(boxes[bi].id, cur_id) == 0) {
                                                                  known = 1;
                                                                  if (found_ids != NULL) found_ids[bi] = 1u;
                                                                  break;
                                                              }
                                                          }
                                                          skip_key_block = (known == 0) ? 1 : 0;
                                                          if (skip_key_block != 0) {
                                                              in_bbox = 0;
                                                              in_overlay = 0;
                                                              overlay_idx = 0;
                                                              line_changed = 1;
                                                          }
                                                      }
                                                  }
                                              }
                                          } else if (strncmp(trimmed, "bbox:", 5) == 0) {
                                              in_bbox = 1;
                                              in_overlay = 0;
                                              overlay_idx = 0;
                                          } else if (strncmp(trimmed, "overlay_color:", 14) == 0) {
                                              in_overlay = 1;
                                              overlay_idx = 0;
                                          } else if (trimmed[0] == '-' && strncmp(trimmed, "- ", 2) == 0) {
                                              in_bbox = 0;
                                          }
                                          if (skip_key_block != 0) {
                                              line_changed = 1;
                                          } else if (in_bbox != 0 && cur_id[0] != '\0') {
                                              const MapperBox *b = NULL;
                                              for (uint32_t bi = 0u; bi < comp->mapper_box_count; ++bi) {
                                                  if (strcmp(boxes[bi].id, cur_id) == 0) {
                                                      b = &boxes[bi];
                                                      break;
                                                  }
                                              }
                                              if (b != NULL) {
                                                  int indent = 0;
                                                  while (line[indent] == ' ' || line[indent] == '\t') indent++;
                                                  if (strncmp(trimmed, "x:", 2) == 0) {
                                                      fprintf(out_fp, "%.*sx: %d\n", indent, line, b->x);
                                                      line_changed = 1;
                                                  } else if (strncmp(trimmed, "y:", 2) == 0) {
                                                      fprintf(out_fp, "%.*sy: %d\n", indent, line, b->y);
                                                      line_changed = 1;
                                                  } else if (strncmp(trimmed, "width:", 6) == 0) {
                                                      fprintf(out_fp, "%.*swidth: %d\n", indent, line, b->w);
                                                      line_changed = 1;
                                                  } else if (strncmp(trimmed, "height:", 7) == 0) {
                                                      fprintf(out_fp, "%.*sheight: %d\n", indent, line, b->h);
                                                      line_changed = 1;
                                                  }
                                              }
                                          }
                                          if (in_overlay != 0 && cur_id[0] != '\0' &&
                                              trimmed[0] == '-' && strncmp(trimmed, "- ", 2) == 0) {
                                              const MapperBox *b = NULL;
                                              for (uint32_t bi = 0u; bi < comp->mapper_box_count; ++bi) {
                                                  if (strcmp(boxes[bi].id, cur_id) == 0) {
                                                      b = &boxes[bi];
                                                      break;
                                                  }
                                              }
                                              if (b != NULL && b->has_overlay != 0u && overlay_idx < 3) {
                                                  int indent = 0;
                                                  int vv = 0;
                                                  while (line[indent] == ' ' || line[indent] == '\t') indent++;
                                                  if (overlay_idx == 0) vv = (int)b->or_;
                                                  else if (overlay_idx == 1) vv = (int)b->og;
                                                  else vv = (int)b->ob;
                                                  fprintf(out_fp, "%.*s- %d\n", indent, line, vv);
                                                  line_changed = 1;
                                              }
                                              overlay_idx += 1;
                                          } else if (in_overlay != 0 && trimmed[0] != '-') {
                                              in_overlay = 0;
                                              overlay_idx = 0;
                                          }
                                      }
                                      if (line_changed == 0) {
                                          fputs(line, out_fp);
                                      }
                                  }
                              }
                              if (save_failed == 0 && out_fp != NULL && found_ids != NULL) {
                                  for (uint32_t bi = 0u; bi < comp->mapper_box_count; ++bi) {
                                      if (found_ids[bi] != 0u) continue;
                                      fprintf(out_fp, "- id: %s\n", boxes[bi].id);
                                      fprintf(out_fp, "  multi_legend: false\n");
                                      fprintf(out_fp, "  legend:\n");
                                      fprintf(out_fp, "  - %s\n", boxes[bi].id);
                                      fprintf(out_fp, "  legend_combos:\n");
                                      fprintf(out_fp, "    %s:\n", boxes[bi].id);
                                      fprintf(out_fp, "    - %s\n", boxes[bi].id);
                                      fprintf(out_fp, "  bbox:\n");
                                      fprintf(out_fp, "    x: %d\n", boxes[bi].x);
                                      fprintf(out_fp, "    y: %d\n", boxes[bi].y);
                                      fprintf(out_fp, "    width: %d\n", boxes[bi].w);
                                      fprintf(out_fp, "    height: %d\n", boxes[bi].h);
                                      if (boxes[bi].has_overlay != 0u) {
                                          fprintf(out_fp, "  overlay_color:\n");
                                          fprintf(out_fp, "  - %u\n", (unsigned)boxes[bi].or_);
                                          fprintf(out_fp, "  - %u\n", (unsigned)boxes[bi].og);
                                          fprintf(out_fp, "  - %u\n", (unsigned)boxes[bi].ob);
                                      }
                                  }
                              }
                              if (in_fp != NULL) fclose(in_fp);
                              if (out_fp != NULL) fclose(out_fp);
                              if (save_failed == 0) {
                                  if (rename(tmp_path, src_path) != 0) {
                                      remove(tmp_path);
