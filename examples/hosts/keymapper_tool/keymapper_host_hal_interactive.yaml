                      }
                      if ((comp->title_last_mods & CPU_HOST_MOD_CTRL) != 0u && sc == CPU_HOST_SCANCODE(Q)) {
                          if (comp->dirty != 0u) {
                              comp->quit_prompt_active = 1u;
                              comp->quit_after_save = 0u;
                              title_dirty = 1u;
                              continue;
                          }
                          cpu->running = false;
                          cpu->halted = true;
                          continue;
                      }
                      if ((comp->title_last_mods & CPU_HOST_MOD_CTRL) != 0u && sc == CPU_HOST_SCANCODE(0)) {
                          int max_x = 0;
                          int max_y = 0;
                          int target_q8 = 256;
                          if (comp->image_w > max_x) max_x = comp->image_w;
                          if (comp->image_h > max_y) max_y = comp->image_h;
                          for (uint32_t i = 0u; i < comp->mapper_box_count; ++i) {
                              int bx2 = boxes[i].x + boxes[i].w;
                              int by2 = boxes[i].y + boxes[i].h;
                              if (bx2 > max_x) max_x = bx2;
                              if (by2 > max_y) max_y = by2;
                          }
                          if (max_x > 0 && max_y > 0 && win_w > 0 && win_h > 0) {
                              int zx = (win_w * 256) / max_x;
                              int zy = (win_h * 256) / max_y;
                              target_q8 = (zx < zy) ? zx : zy;
                              if (target_q8 < 64) target_q8 = 64;
                              if (target_q8 > 1024) target_q8 = 1024;
                          }
                          comp->view_zoom_q8 = target_q8;
                          comp->view_off_x = 0;
                          comp->view_off_y = 0;
                          title_dirty = 1u;
                          continue;
                      }
                      if ((comp->title_last_mods & CPU_HOST_MOD_CTRL) != 0u && sc == CPU_HOST_SCANCODE(I)) {
                          comp->pick_color_mode = (comp->pick_color_mode == 0u) ? 1u : 0u;
                          if (comp->pick_color_mode != 0u) {
