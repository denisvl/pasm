                                              sel[i] = 1u;
                                          }
                                          comp->selection_count = comp->mapper_box_count - old_count;
                                          comp->selected_box = (comp->selection_count > 0u) ? (int32_t)old_count : -1;
                                          comp->dirty = 1u;
                                          title_dirty = 1u;
                                      }
