                                  }
                              }
                              if (found_ids != NULL) {
                                  free(found_ids);
                                  found_ids = NULL;
                              }
                              if (save_failed != 0) {
                                  cpu_host_hal_log("keymapper_tool: failed to save mapper file: %s", src_path);
                              } else {
                                  comp->dirty = 0u;
                                  cpu_host_hal_log("keymapper_tool: saved mapper file: %s", src_path);
                              }
                          } else {
                              save_failed = 1;
                          }
                          if (save_failed == 0) {
                              comp->quit_after_save = 1u;
                              cpu->running = false;
                              cpu->halted = true;
                              continue;
                          }
                      } else if (sc == CPU_HOST_SCANCODE(RETURN) || sc == CPU_HOST_SCANCODE(KP_ENTER) || sc == CPU_HOST_SCANCODE(Q)) {
                          cpu->running = false;
                          cpu->halted = true;
                          continue;
                      } else if (sc == CPU_HOST_SCANCODE(ESCAPE)) {
