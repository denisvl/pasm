                              {
                                  uint32_t ni = comp->mapper_box_count;
                                  int32_t zoom = comp->view_zoom_q8;
                                  int wx = ((comp->last_mouse_x + comp->view_off_x) * 256) / (zoom > 0 ? zoom : 256);
                                  int wy = ((comp->last_mouse_y + comp->view_off_y) * 256) / (zoom > 0 ? zoom : 256);
                                  memset(&boxes[ni], 0, sizeof(MapperBox));
