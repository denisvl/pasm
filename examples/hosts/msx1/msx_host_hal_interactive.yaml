      \ != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {\n    uint32_t\
      \ queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);\n\
      \    uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples\
      \ : 512u;\n    uint32_t low_watermark = device_samples * 2u;\n    uint32_t target_total\
      \ = device_samples * 4u;\n    uint32_t max_total = device_samples * 8u;\n  \
      \  uint32_t total_backlog = queued_samples + comp->audio_ring_fill;\n    if\
      \ (total_backlog > max_total) {\n        uint32_t drop = total_backlog - max_total;\n\
      \        if (drop > comp->audio_ring_fill) {\n            drop = comp->audio_ring_fill;\n\
