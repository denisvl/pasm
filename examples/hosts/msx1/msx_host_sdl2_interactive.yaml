  - name: row1
    type: uint8_t
    initial: "0xFF"
  - name: row2
    type: uint8_t
    initial: "0xFF"
  - name: row3
    type: uint8_t
    initial: "0xFF"
  - name: row4
    type: uint8_t
    initial: "0xFF"
  - name: row5
    type: uint8_t
    initial: "0xFF"
  - name: row6
    type: uint8_t
    initial: "0xFF"
  - name: row7
    type: uint8_t
    initial: "0xFF"
  - name: row8
    type: uint8_t
    initial: "0xFF"
  - name: row9
