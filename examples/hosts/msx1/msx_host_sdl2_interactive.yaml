        presses: [{ row: 6, bit: 2 }]
      - host_key: SDL_SCANCODE_CAPSLOCK # CAPS
        presses: [{ row: 6, bit: 3 }]
      - host_key: SDL_SCANCODE_APPLICATION # CODE
        presses: [{ row: 6, bit: 4 }]
      - host_key: SDL_SCANCODE_F1
        presses: [{ row: 6, bit: 5 }]
      - host_key: SDL_SCANCODE_F2
        presses: [{ row: 6, bit: 6 }]
      - host_key: SDL_SCANCODE_F3
