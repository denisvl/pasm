      args: [u8, u64]
  signals: []

input:
  keyboard:
    source: sdl_scancode
    focus_required: false
    bindings:
      # Row 0
      - host_key: SDL_SCANCODE_0
        presses: [{ row: 0, bit: 0 }]
      - host_key: SDL_SCANCODE_1
        presses: [{ row: 0, bit: 1 }]
      - host_key: SDL_SCANCODE_2
        presses: [{ row: 0, bit: 2 }]
      - host_key: SDL_SCANCODE_3
        presses: [{ row: 0, bit: 3 }]
      - host_key: SDL_SCANCODE_4
        presses: [{ row: 0, bit: 4 }]
      - host_key: SDL_SCANCODE_5
        presses: [{ row: 0, bit: 5 }]
      - host_key: SDL_SCANCODE_6
        presses: [{ row: 0, bit: 6 }]
      - host_key: SDL_SCANCODE_7
        presses: [{ row: 0, bit: 7 }]

      # Row 1
      - host_key: SDL_SCANCODE_8
        presses: [{ row: 1, bit: 0 }]
      - host_key: SDL_SCANCODE_9
        presses: [{ row: 1, bit: 1 }]
      - host_key: SDL_SCANCODE_MINUS
        presses: [{ row: 1, bit: 2 }]
      - host_key: SDL_SCANCODE_EQUALS
        presses: [{ row: 1, bit: 3 }] # MSX "Equal/Plus"
      - host_key: SDL_SCANCODE_BACKSLASH
        presses: [{ row: 1, bit: 4 }] # MSX "Yen/Backslash"
      - host_key: SDL_SCANCODE_LEFTBRACKET
        presses: [{ row: 1, bit: 5 }]
      - host_key: SDL_SCANCODE_RIGHTBRACKET
        presses: [{ row: 1, bit: 6 }]
