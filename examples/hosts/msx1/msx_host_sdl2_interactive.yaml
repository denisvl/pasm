    initial: "NULL"
  - name: texture
    type: void *
    initial: "NULL"
  - name: texture_w
    type: uint32_t
    initial: "256"
  - name: texture_h
    type: uint32_t
    initial: "192"
  - name: audio_out_dev
    type: uint32_t
    initial: "0"
  - name: audio_device_samples
    type: uint32_t
    initial: "0"
  - name: audio_out_ready
    type: uint8_t
    initial: "0"
  - name: frame_count
    type: uint32_t
    initial: "0"
  - name: irq_edges
    type: uint32_t
    initial: "0"
  - name: audio_samples
    type: uint32_t
    initial: "0"
  - name: audio_level
