controller_map:
  focus_required: false
  ports:
    - port: 1
      connected: true
      host_device:
        kind: any
    - port: 2
      connected: false
      host_device:
        kind: any
  bindings:
    - target_control_id: P1_UP
      host_scancode: UP
    - target_control_id: P1_DOWN
      host_scancode: DOWN
    - target_control_id: P1_LEFT
      host_scancode: LEFT
    - target_control_id: P1_RIGHT
      host_scancode: RIGHT
    - target_control_id: P1_A
      host_scancode: Z
    - target_control_id: P1_B
      host_scancode: X
    - target_control_id: P1_SELECT
      host_scancode: RSHIFT
    - target_control_id: P1_START
      host_scancode: RETURN
    - target_control_id: P1_START
      host_scancode: KP_ENTER

    - target_control_id: P2_UP
      host_scancode: KP_8
    - target_control_id: P2_DOWN
      host_scancode: KP_2
    - target_control_id: P2_LEFT
      host_scancode: KP_4
    - target_control_id: P2_RIGHT
      host_scancode: KP_6
    - target_control_id: P2_A
      host_scancode: KP_1
    - target_control_id: P2_B
      host_scancode: KP_3
    - target_control_id: P2_SELECT
      host_scancode: KP_7
    - target_control_id: P2_START
      host_scancode: KP_9

    - target_control_id: P1_UP
      host_gamepad:
        control: dpad_up
    - target_control_id: P1_DOWN
      host_gamepad:
        control: dpad_down
    - target_control_id: P1_LEFT
      host_gamepad:
        control: dpad_left
    - target_control_id: P1_RIGHT
      host_gamepad:
        control: dpad_right
    - target_control_id: P1_UP
      host_gamepad:
        control: left_y
        direction: "-"
        threshold: 0.50
    - target_control_id: P1_DOWN
      host_gamepad:
        control: left_y
        direction: "+"
        threshold: 0.50
    - target_control_id: P1_LEFT
      host_gamepad:
        control: left_x
        direction: "-"
        threshold: 0.50
    - target_control_id: P1_RIGHT
      host_gamepad:
        control: left_x
        direction: "+"
        threshold: 0.50
    - target_control_id: P1_A
      host_gamepad:
        control: a
    - target_control_id: P1_B
      host_gamepad:
        control: b
    - target_control_id: P1_SELECT
      host_gamepad:
        control: back
    - target_control_id: P1_START
      host_gamepad:
        control: start

    - target_control_id: P1_UP
      host_joystick:
        hat: 0
        hat_dir: up
    - target_control_id: P1_DOWN
      host_joystick:
        hat: 0
        hat_dir: down
    - target_control_id: P1_LEFT
      host_joystick:
        hat: 0
        hat_dir: left
    - target_control_id: P1_RIGHT
      host_joystick:
        hat: 0
        hat_dir: right
    - target_control_id: P1_A
      host_joystick:
        button: 0
    - target_control_id: P1_B
      host_joystick:
        button: 1
    - target_control_id: P1_SELECT
      host_joystick:
        button: 6
    - target_control_id: P1_START
      host_joystick:
        button: 7
