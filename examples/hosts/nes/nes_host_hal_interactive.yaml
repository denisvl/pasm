      \        comp->audio_out_dev != 0u &&\n                have.format == CPU_HOST_AUDIO_FORMAT_S16 &&\n               \
      \ have.channels <= 2u && have.channels >= 1u &&\n                have.freq > 0 &&\n                (uint32_t)have.freq\
      \ == expected_rate &&\n                have.samples > 0\n            ) {\n                uint32_t ring_capacity = (uint32_t)have.samples\
      \ * 128u;\n               if (ring_capacity < 65536u) ring_capacity = 65536u;\n              comp->audio_ring = (int16_t\
      \ *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n\
      \                    comp->audio_out_ready = 1u;\n                    comp->audio_device_samples = (uint32_t)have.samples\
      \ * (uint32_t)have.channels;\n                    comp->audio_channels = (uint32_t)have.channels;\n                \
      \    comp->audio_rate = (uint32_t)have.freq;\n                    comp->audio_ring_capacity = ring_capacity;\n     \
      \               comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx = 0u;\n            \
      \        comp->audio_ring_fill = 0u;\n                    {\n                        int16_t prefill[2048];\n      \
      \                  uint32_t prefill_frames = (uint32_t)have.samples * 2u;\n                        uint32_t prefill_samples\
      \ = prefill_frames * (uint32_t)have.channels;\n                        if (prefill_samples > 2048u) prefill_samples\
      \ = 2048u;\n                        for (uint32_t i = 0u; i < prefill_samples; ++i) prefill[i] = 0;\n              \
      \          if (cpu_host_hal_audio_queue(comp->audio_out_dev, prefill, prefill_samples * (uint32_t)sizeof(int16_t)) ==\
      \ 0) {\n                            cpu_host_hal_audio_pause(comp->audio_out_dev, 0);\n                        } else\
      \ {\n                            cpu_host_hal_audio_close(comp->audio_out_dev);\n                            comp->audio_out_dev\
      \ = 0u;\n                            cpu_host_hal_free(comp->audio_ring);\n                            comp->audio_ring\
      \ = NULL;\n                            comp->audio_ring_capacity = 0u;\n                            comp->audio_ring_read_idx\
      \ = 0u;\n                            comp->audio_ring_write_idx = 0u;\n                            comp->audio_ring_fill\
      \ = 0u;\n                            comp->audio_rate = 0u;\ncomp->audio_channels = 0u;\n                          \
      \  comp->audio_device_samples = 0u;\ncomp->audio_channels = 0u;\n                            comp->audio_out_ready =\
      \ 0u;\n                        }\n                    }\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                    comp->audio_out_dev = 0u;\n                    comp->audio_rate = 0u;\ncomp->audio_channels = 0u;\n\
      \                    comp->audio_device_samples = 0u;\ncomp->audio_channels = 0u;\n                }\n            }\n\
      \        }\n    }\n\n    {\n        const char *joy2_env = cpu_host_hal_getenv(\"PASM_NES_JOY2_CONNECTED\");\n     \
      \   comp->joy2_connected = (joy2_env != NULL && joy2_env[0] == '1') ? 1u : 0u;\n    } comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\
      \     comp->last_focus_state = comp->has_keyboard_focus;\n    comp->host_inited = 1u;\n} while (0);\n"
    reset: 'comp->frame_count = 0u;

      comp->audio_samples = 0u;

      comp->audio_hp_prev_in = 0;

      comp->audio_hp_prev_out = 0;

      comp->joy1 = 0u;

      comp->joy2 = 0u;

      comp->audio_ring_read_idx = 0u;

      comp->audio_ring_write_idx = 0u;

      comp->audio_ring_fill = 0u;

      comp->last_event_poll_cycle = 0u;

      comp->overlay_last_ms = 0u;

      comp->overlay_last_frame_count = 0u;

      comp->overlay_last_cycle_count = 0u;

      comp->overlay_fps_x100 = 0u;

      comp->overlay_cpu_hz = 0u;

      comp->overlay_cpu_pct_x10 = 0u;

      if (comp->audio_out_dev != 0u) cpu_host_hal_audio_clear(comp->audio_out_dev);


      comp->display_shader_supported = (comp->display_shader != NULL) ? -1 : 0;

      '
    step_post: "if (comp->host_inited == 0u) return;\nif ((cpu->total_cycles - comp->last_event_poll_cycle) < 512u) return;\n\
      comp->last_event_poll_cycle = cpu->total_cycles;\n\n{\n    CPUHostEvent ev;\n    while (cpu_host_hal_poll_event(&ev))\
      \ {\n        if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n            cpu->running = false;\n       \
      \     cpu->halted = true;\n        }\n    }\n    cpu_host_hal_pump_events();\n}\n\ncomp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      if (comp->has_keyboard_focus != comp->last_focus_state) {\n    comp->last_focus_state = comp->has_keyboard_focus;\n\
      \    if (comp->window != NULL) {\n        cpu_host_hal_set_window_title(\n            comp->window,\n            (comp->has_keyboard_focus\
      \ != 0u) ? \"PASM NES [FOCUS]\" : \"PASM NES [NO-FOCUS]\"\n        );\n    }\n}\n{\n    pasm_overlay_update_perf(\n\
      \        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n        cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n\
      \        &comp->overlay_last_ms,\n        &comp->overlay_last_frame_count,\n        &comp->overlay_last_cycle_count,\n\
      \        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n    );\n}\n\n\
      {\n    int key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n    /* Prefer controller-map\
      \ when loaded (host_controller_nes.yaml); otherwise keep legacy keyboard-map behavior. */\n    if (g_runtime_controller_map.loaded\
      \ != 0u) {\n        cpu_component_controller_map_poll(cpu, 1u);\n        comp->joy1 = 0u;\n        comp->joy2 = 0u;\n\
      \        if (cpu_component_controller_pressed(\"P1_A\")) comp->joy1 |= 0x01u;\n        if (cpu_component_controller_pressed(\"\
      P1_B\")) comp->joy1 |= 0x02u;\n        if (cpu_component_controller_pressed(\"P1_SELECT\")) comp->joy1 |= 0x04u;\n \
      \       if (cpu_component_controller_pressed(\"P1_START\")) comp->joy1 |= 0x08u;\n        if (cpu_component_controller_pressed(\"\
      P1_UP\")) comp->joy1 |= 0x10u;\n        if (cpu_component_controller_pressed(\"P1_DOWN\")) comp->joy1 |= 0x20u;\n  \
      \      if (cpu_component_controller_pressed(\"P1_LEFT\")) comp->joy1 |= 0x40u;\n        if (cpu_component_controller_pressed(\"\
      P1_RIGHT\")) comp->joy1 |= 0x80u;\n        if (cpu_component_controller_pressed(\"P2_A\")) comp->joy2 |= 0x01u;\n  \
      \      if (cpu_component_controller_pressed(\"P2_B\")) comp->joy2 |= 0x02u;\n        if (cpu_component_controller_pressed(\"\
      P2_SELECT\")) comp->joy2 |= 0x04u;\n        if (cpu_component_controller_pressed(\"P2_START\")) comp->joy2 |= 0x08u;\n\
      \        if (cpu_component_controller_pressed(\"P2_UP\")) comp->joy2 |= 0x10u;\n        if (cpu_component_controller_pressed(\"\
      P2_DOWN\")) comp->joy2 |= 0x20u;\n        if (cpu_component_controller_pressed(\"P2_LEFT\")) comp->joy2 |= 0x40u;\n\
      \        if (cpu_component_controller_pressed(\"P2_RIGHT\")) comp->joy2 |= 0x80u;\n        {\n            uint8_t p2c\
      \ = (g_runtime_controller_map.port_count >= 2u) ? g_runtime_controller_map.port_connected[1] : 0u;\n            /* Preserve\
      \ legacy env override behavior (PASM_NES_JOY2_CONNECTED=0 disables port 2 even if map says connected). */\n        \
      \    if (comp->joy2_connected == 0u) p2c = 0u;\n            comp->joy2_connected = p2c;\n            if (p2c == 0u)\
      \ comp->joy2 = 0u;\n        }\n    } else if (ks != NULL && key_count > 0) {\n        uint8_t rows[2] = { 0xFFu, 0xFFu\
      \ };\n        cpu_component_apply_declared_keymap(\n            cpu,\n            \"host_nes\",\n            ks,\n \
      \           (size_t)key_count,\n            rows,\n            2u,\n            1u\n        );\n        if (comp->joy2_connected\
      \ == 0u) {\n            rows[1] = 0xFFu;\n        }\n\n        comp->joy1 = 0u;\n        comp->joy2 = 0u;\n\n      \
      \  if ((rows[0] & 0x10u) == 0u) comp->joy1 |= 0x01u; /* A */\n        if ((rows[0] & 0x20u) == 0u) comp->joy1 |= 0x02u;\
      \ /* B */\n        if ((rows[0] & 0x40u) == 0u) comp->joy1 |= 0x04u; /* Select */\n        if ((rows[0] & 0x80u) ==\
      \ 0u) comp->joy1 |= 0x08u; /* Start */\n        if ((rows[0] & 0x01u) == 0u) comp->joy1 |= 0x10u; /* Up */\n       \
      \ if ((rows[0] & 0x02u) == 0u) comp->joy1 |= 0x20u; /* Down */\n        if ((rows[0] & 0x04u) == 0u) comp->joy1 |= 0x40u;\
      \ /* Left */\n        if ((rows[0] & 0x08u) == 0u) comp->joy1 |= 0x80u; /* Right */\n\n        if ((rows[1] & 0x10u)\
      \ == 0u) comp->joy2 |= 0x01u;\n        if ((rows[1] & 0x20u) == 0u) comp->joy2 |= 0x02u;\n        if ((rows[1] & 0x40u)\
      \ == 0u) comp->joy2 |= 0x04u;\n        if ((rows[1] & 0x80u) == 0u) comp->joy2 |= 0x08u;\n        if ((rows[1] & 0x01u)\
      \ == 0u) comp->joy2 |= 0x10u;\n        if ((rows[1] & 0x02u) == 0u) comp->joy2 |= 0x20u;\n        if ((rows[1] & 0x04u)\
      \ == 0u) comp->joy2 |= 0x40u;\n        if ((rows[1] & 0x08u) == 0u) comp->joy2 |= 0x80u;\n    }\n    {\n        static\
      \ int force_start_enabled = -1;\n        if (force_start_enabled < 0) {\n            const char *force_start = cpu_host_hal_getenv(\"\
      PASM_NES_FORCE_START\");\n            force_start_enabled = (force_start != NULL && force_start[0] != '0') ? 1 : 0;\n\
      \        }\n        if (force_start_enabled != 0) comp->joy1 |= 0x08u;\n    }\n    {\n        static int host_pad_trace_enabled\
      \ = -1;\n        if (host_pad_trace_enabled < 0) {\n            const char *env = cpu_host_hal_getenv(\"PASM_NES_PAD_TRACE\"\
      );\n            host_pad_trace_enabled = (env != NULL && env[0] != '0') ? 1 : 0;\n        }\n        if (host_pad_trace_enabled\
      \ != 0) {\n            static FILE *fp = NULL;\n            if (fp == NULL) fp = fopen(\"log/nes_pad_trace.log\", \"\
      a\");\n            if (fp != NULL) {\n                unsigned k_ret = 0u, k_ret2 = 0u, k_kpenter = 0u, k_space = 0u,\
      \ k_rshift = 0u, k_z = 0u, k_x = 0u, k_up = 0u, k_down = 0u, k_left = 0u, k_right = 0u, map_start = 0u;\n          \
      \      if (ks != NULL && key_count > 0) {\n                    if ((size_t)CPU_HOST_SCANCODE(RETURN) < (size_t)key_count)\
      \ k_ret = (unsigned)ks[CPU_HOST_SCANCODE(RETURN)];\n                    if ((size_t)CPU_HOST_SCANCODE(RETURN2) < (size_t)key_count)\
      \ k_ret2 = (unsigned)ks[CPU_HOST_SCANCODE(RETURN2)];\n                    if ((size_t)CPU_HOST_SCANCODE(KP_ENTER) <\
      \ (size_t)key_count) k_kpenter = (unsigned)ks[CPU_HOST_SCANCODE(KP_ENTER)];\n                    if ((size_t)CPU_HOST_SCANCODE(RSHIFT)\
      \ < (size_t)key_count) k_rshift = (unsigned)ks[CPU_HOST_SCANCODE(RSHIFT)];\n                    if ((size_t)CPU_HOST_SCANCODE(UP)\
      \ < (size_t)key_count) k_up = (unsigned)ks[CPU_HOST_SCANCODE(UP)];\n                    if ((size_t)CPU_HOST_SCANCODE(DOWN)\
      \ < (size_t)key_count) k_down = (unsigned)ks[CPU_HOST_SCANCODE(DOWN)];\n                    if ((size_t)CPU_HOST_SCANCODE(LEFT)\
      \ < (size_t)key_count) k_left = (unsigned)ks[CPU_HOST_SCANCODE(LEFT)];\n                    if ((size_t)CPU_HOST_SCANCODE(RIGHT)\
      \ < (size_t)key_count) k_right = (unsigned)ks[CPU_HOST_SCANCODE(RIGHT)];\n                }\n                map_start\
      \ = cpu_component_controller_pressed(\"P1_START\") ? 1u : 0u;\n                fprintf(\n                    fp,\n \
      \                   \"hostpad cyc=%llu focus=%u cmap=%u joy1=%02X joy2=%02X kcount=%d mapStart=%u raw[RET=%u RET2=%u\
      \ KPENTER=%u RSH=%u U=%u D=%u L=%u R=%u]\\n\",\n                    (unsigned long long)cpu->total_cycles,\n       \
      \             (unsigned)comp->has_keyboard_focus,\n                    (unsigned)g_runtime_controller_map.loaded,\n\
      \                    (unsigned)comp->joy1,\n                    (unsigned)comp->joy2,\n                    key_count,\n\
      \                    map_start,\n                    k_ret,\n                    k_ret2,\n                    k_kpenter,\n\
      \                    k_rshift,\n                    k_up,\n                    k_down,\n                    k_left,\n\
      \                    k_right\n                );\n                fflush(fp);\n            }\n        }\n    }\n}\n\n\
      if (\n    comp->audio_out_dev != 0u &&\n    comp->audio_out_ready != 0u &&\n    comp->audio_ring != NULL\n) {\n    uint32_t\
      \ channels = (comp->audio_channels > 0u) ? comp->audio_channels : 1u;\n    if (channels > 2u) channels = 2u;\n    uint32_t\
      \ queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);\n    uint32_t queued_frames\
      \ = queued_samples / channels;\n    uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples\
      \ : 1024u;\n    uint32_t device_frames = device_samples / channels;\n    if (device_frames == 0u) device_frames = 1024u;\n\
      \    uint32_t low_watermark = device_frames * 32u;\n    uint32_t target_total = device_frames * 64u;\n\n    if (queued_frames\
      \ < low_watermark && comp->audio_ring_fill >= device_frames) {\n        int16_t chunk[1024];\n        uint32_t max_frames\
      \ = 1024u / channels;\n        uint32_t n = (device_frames > max_frames) ? max_frames : device_frames;\n        while\
      \ (queued_frames < target_total && comp->audio_ring_fill >= n) {\n            uint32_t out = 0u;\n            if (n\
      \ == 0u) break;\n            for (uint32_t i = 0u; i < n; ++i) {\n                int16_t sample = comp->audio_ring[comp->audio_ring_read_idx];\n\
      \                for (uint32_t ch = 0u; ch < channels; ++ch) {\n                    chunk[out++] = sample;\n       \
      \         }\n                comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx >= comp->audio_ring_capacity)\
