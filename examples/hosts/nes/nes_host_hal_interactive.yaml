    init: "do {\n    if (comp->host_inited != 0u) break;\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO\
      \ | CPU_HOST_INIT_EVENTS) != 0) break;\n\n    int window_w = 256;\n    int window_h = 240;\n    cpu_host_hal_display_window_size(\n\
      \        cpu->comp_tv.display_width,\n        cpu->comp_tv.display_height,\n        cpu->comp_tv.aspect_width,\n   \
      \     cpu->comp_tv.aspect_height,\n        cpu->comp_tv.display_inches,\n        256,\n        240,\n        &window_w,\n\
      \        &window_h\n    );\n    comp->window = cpu_host_hal_create_window(\n        \"PASM NES\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n\
      \        CPU_HOST_WINDOWPOS_CENTERED,\n        window_w,\n        window_h,\n        CPU_HOST_WINDOW_RESIZABLE\n   \
      \ );\n    if (comp->window == NULL) break;\n\n    comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);\n\
      \    if (comp->renderer == NULL) {\n        comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n  \
      \  }\n    if (comp->renderer == NULL) break;\n\n    {\n        static const char *nes_crt_tv_vertex_shader =\n     \
      \       \"#version 330 core\\n\"\n            \"layout (location = 0) in vec3 aPos;\\n\"\n            \"layout (location\
      \ = 1) in vec2 aTexCoords;\\n\"\n            \"out vec2 TexCoords;\\n\"\n            \"void main() {\\n\"\n        \
      \    \"    TexCoords = aTexCoords;\\n\"\n            \"    gl_Position = vec4(aPos, 1.0);\\n\"\n            \"}\\n\"\
      ;\n        static const char *nes_crt_tv_fragment_shader =\n            \"#version 330 core\\n\"\n            \"out\
      \ vec4 FragColor;\\n\"\n            \"in vec2 TexCoords;\\n\"\n            \"uniform sampler2D screenTexture;\\n\"\n\
      \            \"uniform vec2 sourceResolution;\\n\"\n            \"const float CURVATURE = 8.0;\\n\"\n            \"\
      const float SCANLINE_WEIGHT = 0.10;\\n\"\n            \"const float MASK_DARKNESS = 0.08;\\n\"\n            \"const\
      \ float GLOW_FACTOR = 0.05;\\n\"\n            \"vec2 curve(vec2 coord) {\\n\"\n            \"    coord = coord * 2.0\
      \ - 1.0;\\n\"\n            \"    coord.x *= 1.0 + pow((abs(coord.y) / CURVATURE), 2.0);\\n\"\n            \"    coord.y\
      \ *= 1.0 + pow((abs(coord.x) / CURVATURE), 2.0);\\n\"\n            \"    return coord * 0.5 + 0.5;\\n\"\n          \
      \  \"}\\n\"\n            \"void main() {\\n\"\n            \"    vec2 crtUV = curve(TexCoords);\\n\"\n            \"\
      \    if (crtUV.x < 0.0 || crtUV.x > 1.0 || crtUV.y < 0.0 || crtUV.y > 1.0) {\\n\"\n            \"        FragColor =\
      \ vec4(0.0, 0.0, 0.0, 1.0);\\n\"\n            \"        return;\\n\"\n            \"    }\\n\"\n            \"    vec3\
      \ baseColor = texture(screenTexture, crtUV).rgb;\\n\"\n            \"    vec3 blurColor = texture(screenTexture, crtUV\
      \ + vec2(1.0 / sourceResolution.x, 0.0)).rgb;\\n\"\n            \"    baseColor = mix(baseColor, blurColor, GLOW_FACTOR);\\\
      n\"\n            \"    float scan = 0.5 + 0.5 * sin(crtUV.y * sourceResolution.y * 3.14159265);\\n\"\n            \"\
      \    baseColor *= 1.0 - (SCANLINE_WEIGHT * (1.0 - scan));\\n\"\n            \"    float maskPhase = mod(gl_FragCoord.x\
      \ + floor(gl_FragCoord.y * 0.5), 3.0);\\n\"\n            \"    float mask = 1.0 - (MASK_DARKNESS * step(maskPhase, 0.5));\\\
      n\"\n            \"    baseColor *= mask;\\n\"\n            \"    baseColor *= 1.08;\\n\"\n            \"    FragColor\
      \ = vec4(baseColor, 1.0);\\n\"\n            \"}\\n\";\n        comp->display_shader = cpu_host_hal_shader_create(comp->renderer,\
      \ nes_crt_tv_vertex_shader, nes_crt_tv_fragment_shader);\n        comp->display_shader_supported = (comp->display_shader\
      \ != NULL) ? -1 : 0;\n    }\n    comp->texture = cpu_host_hal_create_texture(\n        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n\
      \        CPU_HOST_TEXTUREACCESS_STREAMING,\n        256,\n        240\n    );\n    if (comp->texture == NULL) break;\n\
      \n    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\");\n        if (audio_env == NULL ||\
      \ audio_env[0] != '0') {\n            CPUHostAudioSpec want;\n            CPUHostAudioSpec have;\n            uint32_t\
      \ expected_rate = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (uint32_t)CPU_AUDIO_SAMPLE_RATE : 44100u;\n            cpu_host_audio_spec_zero(&want);\n\
      \            cpu_host_audio_spec_zero(&have);\n            want.freq = (int)expected_rate;\n            want.format\
      \ = CPU_HOST_AUDIO_FORMAT_S16;\n            want.channels = 1;\n            want.samples = 1024;\n           want.callback\
      \ = NULL;\n\n            comp->audio_out_ready = 0u;\n            comp->audio_device_samples = 0u;\ncomp->audio_channels\
      \ = 0u;\n            comp->audio_rate = 0u;\n            comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want,\
