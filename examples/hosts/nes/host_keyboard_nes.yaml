keyboard:
  kind: matrix
  focus_required: true
  bindings:
  - host_scancode: UP
    mapper_key_id: K_UP
    presses:
    - row: 0
      bit: 0
  - host_scancode: DOWN
    mapper_key_id: K_DOWN
    presses:
    - row: 0
      bit: 1
  - host_scancode: LEFT
    mapper_key_id: K_LEFT
    presses:
    - row: 0
      bit: 2
  - host_scancode: RIGHT
    mapper_key_id: K_RIGHT
    presses:
    - row: 0
      bit: 3
  - host_scancode: A
    mapper_key_id: K_A
    presses:
    - row: 0
      bit: 4
  - host_scancode: S
    mapper_key_id: K_S
    presses:
    - row: 0
      bit: 5
  - host_scancode: RSHIFT
    mapper_key_id: K_RSHIFT
    presses:
    - row: 0
      bit: 6
  - host_scancode: RETURN
    mapper_key_id: K_RETURN
    presses:
    - row: 0
      bit: 7
  - host_scancode: KP_8
    mapper_key_id: K_8
    presses:
    - row: 1
      bit: 0
  - host_scancode: KP_2
    mapper_key_id: K_2
    presses:
    - row: 1
      bit: 1
  - host_scancode: KP_4
    mapper_key_id: K_4
    presses:
    - row: 1
      bit: 2
  - host_scancode: KP_6
    mapper_key_id: K_6
    presses:
    - row: 1
      bit: 3
  - host_scancode: KP_1
    mapper_key_id: K_1
    presses:
    - row: 1
      bit: 4
  - host_scancode: KP_3
    mapper_key_id: K_3
    presses:
    - row: 1
      bit: 5
  - host_scancode: KP_7
    mapper_key_id: K_7
    presses:
    - row: 1
      bit: 6
  - host_scancode: KP_9
    mapper_key_id: K_9
    presses:
    - row: 1
      bit: 7
