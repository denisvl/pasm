  width_px: 1002
  height_px: 333
  origin: top-left
  bbox_format:
    x: left
    y: top
    width: pixels
    height: pixels
  approximate: true
  notes:
  - Derived from the uploaded TRS-80 Color Computer 1 keyboard photo.
  - Bounding boxes were rebuilt directly from the provided 1002x333 image.
  - Legends are listed in visual order when multiple markings appear on the same key.
  - For two-symbol keys, the lower legend is treated as the unmodified key and the
    upper legend as SHIFT + key.
  - Some host-side bindings map modern keys to the nearest physical CoCo key even
    when the printed legends differ.
