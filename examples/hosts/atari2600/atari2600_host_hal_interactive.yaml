    init: "do {\n    if (comp->host_inited != 0u) break;\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;\n\n    comp->window = cpu_host_hal_create_window(\n        \"PASM Atari 2600\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n        CPU_HOST_WINDOWPOS_CENTERED,\n        160,\n        192,\n        CPU_HOST_WINDOW_RESIZABLE\n    );\n    if (comp->window == NULL) break;\n\n    comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n        comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n    }\n    if (comp->renderer == NULL) break;\n\n    comp->texture = cpu_host_hal_create_texture(\n        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n        160,\n        192\n    );\n    if (comp->texture == NULL) break;\n\n    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\"\
      );\n        if (audio_env == NULL || audio_env[0] != '0') {\n            CPUHostAudioSpec want;\n            CPUHostAudioSpec have;\n            uint32_t expected_rate = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (uint32_t)CPU_AUDIO_SAMPLE_RATE : 44100u;\n            cpu_host_audio_spec_zero(&want);\n            cpu_host_audio_spec_zero(&have);\n            want.freq = (int)expected_rate;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n            want.channels = 1;\n            want.samples = 512;\n            want.callback = NULL;\n\n            comp->audio_out_ready = 0u;\n            comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n            comp->audio_rate = 0u;\n                comp->audio_channels = 0u;\n            comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have, CPU_HOST_AUDIO_ALLOW_CHANNELS_CHANGE |\n                    CPU_HOST_AUDIO_ALLOW_SAMPLES_CHANGE);\n\n            if (\n                comp->audio_out_dev != 0u &&\n\
      \                have.format == CPU_HOST_AUDIO_FORMAT_S16 &&\n                have.channels <= 2u && have.channels >= 1u &&\n                have.freq > 0 &&\n                have.samples > 0\n            ) {\n                uint32_t ring_capacity = (uint32_t)have.samples * 8u;\n                if (ring_capacity < 4096u) ring_capacity = 4096u;\n                comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n                    cpu_host_hal_memset(comp->audio_ring, 0, ring_capacity * sizeof(int16_t));\n                    comp->audio_ring_capacity = ring_capacity;\n                    comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx = 0u;\n                    comp->audio_ring_fill = 0u;\n                    comp->audio_rate = (uint32_t)have.freq;\n                    comp->audio_device_samples = (uint32_t)have.samples * (uint32_t)have.channels;\n             \
      \       comp->audio_channels = (uint32_t)have.channels;\n                    comp->audio_out_ready = 1u;\n                    cpu_host_hal_audio_pause(comp->audio_out_dev, 0);\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n                    comp->audio_out_dev = 0u;\n                    comp->audio_rate = 0u;\n                comp->audio_channels = 0u;\n                    comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n                }\n            } else if (comp->audio_out_dev != 0u) {\n                cpu_host_hal_audio_close(comp->audio_out_dev);\n                comp->audio_out_dev = 0u;\n                comp->audio_rate = 0u;\n                comp->audio_channels = 0u;\n                comp->audio_device_samples = 0u;\n                    comp->audio_channels = 0u;\n            }\n        }\n    }\n\n    {\n        const char *joy2_env = cpu_host_hal_getenv(\"PASM_ATARI2600_JOY2_CONNECTED\"\
      );\n        comp->joy2_connected = (joy2_env != NULL && joy2_env[0] == '1') ? 1u : 0u;\n    }\n    comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n    comp->last_focus_state = comp->has_keyboard_focus;\n    comp->host_inited = 1u;\n} while (0);\n"
    reset: 'comp->frame_count = 0u;

      comp->audio_samples = 0u;

      comp->audio_hp_prev_in = 0;

      comp->audio_hp_prev_out = 0;

      comp->joy1 = 0u;

      comp->joy2 = 0u;

      comp->console_state = 0xFFu;

      comp->sw_tv_bw = 0u;

      comp->sw_left_diff_b = 0u;

      comp->sw_right_diff_b = 0u;

      comp->sw_select_held = 0u;

      comp->sw_reset_held = 0u;

      comp->sw_prev_power = 0u;

      comp->sw_prev_tv = 0u;

      comp->sw_prev_left_diff = 0u;

      comp->sw_prev_right_diff = 0u;

      comp->audio_ring_read_idx = 0u;

      comp->audio_ring_write_idx = 0u;

      comp->audio_ring_fill = 0u;

      comp->last_event_poll_cycle = 0u;

      comp->overlay_last_ms = 0u;

      comp->overlay_last_frame_count = 0u;

      comp->overlay_last_cycle_count = 0u;

      comp->overlay_fps_x100 = 0u;

      comp->overlay_cpu_hz = 0u;

      comp->overlay_cpu_pct_x10 = 0u;

      if (comp->audio_out_dev != 0u) cpu_host_hal_audio_clear(comp->audio_out_dev);

      '
    step_post: "if (comp->host_inited == 0u) return;\nif ((cpu->total_cycles - comp->last_event_poll_cycle) < 1024u) return;\ncomp->last_event_poll_cycle = cpu->total_cycles;\n\n{\n    CPUHostEvent ev;\n    while (cpu_host_hal_poll_event(&ev)) {\n        if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n            cpu->running = false;\n            cpu->halted = true;\n        } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN && cpu_host_hal_event_key_repeat(&ev) == 0) {\n            int32_t sc = cpu_host_hal_event_scancode(&ev);\n            for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {\n                const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];\n                if (b->scancode != sc) continue;\n                if (b->emulator_key_id[0] == 0) break;\n                if (strcmp(b->emulator_key_id, \"SW_GAME_SELECT\") == 0) { comp->sw_select_held = 1u; break; }\n                if (strcmp(b->emulator_key_id, \"SW_GAME_RESET\"\
      ) == 0) { comp->sw_reset_held = 1u; break; }\n                if (strcmp(b->emulator_key_id, \"SW_TV_TYPE\") == 0) { comp->sw_tv_bw ^= 1u; break; }\n                if (strcmp(b->emulator_key_id, \"SW_LEFT_DIFFICULTY\") == 0) { comp->sw_left_diff_b ^= 1u; break; }\n                if (strcmp(b->emulator_key_id, \"SW_RIGHT_DIFFICULTY\") == 0) { comp->sw_right_diff_b ^= 1u; break; }\n                if (strcmp(b->emulator_key_id, \"SW_POWER\") == 0) { cpu->halted = false; mos6502_reset(cpu); if (comp->window != NULL) cpu_host_hal_set_window_title(comp->window, \"PASM Atari 2600 | POWER CYCLE\"); break; }\n                break;\n            }\n        } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {\n            int32_t sc = cpu_host_hal_event_scancode(&ev);\n            for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {\n                const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];\n                if (b->scancode != sc) continue;\n\
      \                if (b->emulator_key_id[0] == 0) break;\n                if (strcmp(b->emulator_key_id, \"SW_GAME_SELECT\") == 0) { comp->sw_select_held = 0u; break; }\n                if (strcmp(b->emulator_key_id, \"SW_GAME_RESET\") == 0) { comp->sw_reset_held = 0u; break; }\n                break;\n            }\n        }\n    }\n    cpu_host_hal_pump_events();\n}\n\ncomp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\nif (comp->has_keyboard_focus != comp->last_focus_state) {\n    comp->last_focus_state = comp->has_keyboard_focus;\n    if (comp->has_keyboard_focus == 0u) { comp->sw_select_held = 0u; comp->sw_reset_held = 0u; }\n    if (comp->window != NULL) {\n        char ttl[160];\n        (void)snprintf(\n            ttl,\n            sizeof(ttl),\n            (comp->has_keyboard_focus != 0u) ? \"PASM Atari 2600 [FOCUS] | CMAP=%u\" : \"PASM Atari 2600 [NO-FOCUS] | CMAP=%u\",\n            (unsigned)g_runtime_controller_map.loaded\n        );\n        cpu_host_hal_set_window_title(comp->window,\
      \ ttl);\n    }\n}\n{\n    sms_overlay_update_perf(\n        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n        cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n        &comp->overlay_last_ms,\n        &comp->overlay_last_frame_count,\n        &comp->overlay_last_cycle_count,\n        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n    );\n}\n\n{\n    /* Joystick ports come from the controller-map (host_controller_atari2600.yaml).\n       Console switches come from the console keyboard-map (host_console_atari2600.yaml) via the keydown/up handling above. */\n    if (g_runtime_controller_map.loaded != 0u) {\n        uint8_t focus = comp->has_keyboard_focus;\n        cpu_component_controller_map_poll(cpu, focus);\n\n        comp->joy1 = 0u;\n        comp->joy2 = 0u;\n\n        if (cpu_component_controller_pressed(\"P1_UP\")) comp->joy1 |= 0x01u;\n        if (cpu_component_controller_pressed(\"P1_DOWN\")) comp->joy1\
      \ |= 0x02u;\n        if (cpu_component_controller_pressed(\"P1_LEFT\")) comp->joy1 |= 0x04u;\n        if (cpu_component_controller_pressed(\"P1_RIGHT\")) comp->joy1 |= 0x08u;\n        if (cpu_component_controller_pressed(\"P1_FIRE\")) comp->joy1 |= 0x10u;\n\n        if (cpu_component_controller_pressed(\"P2_UP\")) comp->joy2 |= 0x01u;\n        if (cpu_component_controller_pressed(\"P2_DOWN\")) comp->joy2 |= 0x02u;\n        if (cpu_component_controller_pressed(\"P2_LEFT\")) comp->joy2 |= 0x04u;\n        if (cpu_component_controller_pressed(\"P2_RIGHT\")) comp->joy2 |= 0x08u;\n        if (cpu_component_controller_pressed(\"P2_FIRE\")) comp->joy2 |= 0x10u;\n\n        {\n            uint8_t p2c = 1u;\n            if (g_runtime_controller_map.port_count >= 2u) p2c = g_runtime_controller_map.port_connected[1];\n            comp->joy2_connected = p2c;\n            if (p2c == 0u) comp->joy2 = 0u;\n        }\n\n        if (comp->window != NULL && comp->has_keyboard_focus != 0u) {\n        \
      \    int kc2 = 0;\n            const uint8_t *ks2 = cpu_host_hal_keyboard_state(&kc2);\n            unsigned ku = 0, kd = 0, kl = 0, kr = 0, kf = 0;\n            if (ks2 != NULL) {\n                if (kc2 > (int)CPU_HOST_SCANCODE(UP)) ku = (unsigned)ks2[CPU_HOST_SCANCODE(UP)];\n                if (kc2 > (int)CPU_HOST_SCANCODE(DOWN)) kd = (unsigned)ks2[CPU_HOST_SCANCODE(DOWN)];\n                if (kc2 > (int)CPU_HOST_SCANCODE(LEFT)) kl = (unsigned)ks2[CPU_HOST_SCANCODE(LEFT)];\n                if (kc2 > (int)CPU_HOST_SCANCODE(RIGHT)) kr = (unsigned)ks2[CPU_HOST_SCANCODE(RIGHT)];\n                if (kc2 > (int)CPU_HOST_SCANCODE(SPACE)) kf = (unsigned)ks2[CPU_HOST_SCANCODE(SPACE)];\n            }\n            int su=-1, sd=-1, sl=-1, sr=-1, sf=-1;\n            unsigned kb = 0;\n            for (size_t bi = 0; bi < g_runtime_controller_map.binding_count; ++bi) {\n                if (g_runtime_controller_map.bindings[bi].source_kind == 1u) kb += 1u;\n            }\n            const\
      \ RuntimeControllerBinding *b0 = (g_runtime_controller_map.binding_count > 0u) ? &g_runtime_controller_map.bindings[0] : NULL;\n            unsigned b0k = (b0 != NULL) ? (unsigned)b0->source_kind : 0u;\n            int b0sc = (b0 != NULL) ? (int)b0->scancode : -1;\n            const char *b0id = (b0 != NULL) ? b0->target_id : \"-\";\n            unsigned ku_kind=0, kd_kind=0, kl_kind=0, kr_kind=0, kf_kind=0;\n            for (size_t bi = 0; bi < g_runtime_controller_map.binding_count; ++bi) {\n                const RuntimeControllerBinding *b = &g_runtime_controller_map.bindings[bi];\n                if (b->source_kind == 1u && strcmp(b->target_id, \"P1_UP\") == 0 && su < 0) { su = (int)b->scancode; ku_kind = (unsigned)b->source_kind; }\n                if (b->source_kind == 1u && strcmp(b->target_id, \"P1_DOWN\") == 0 && sd < 0) { sd = (int)b->scancode; kd_kind = (unsigned)b->source_kind; }\n                if (b->source_kind == 1u && strcmp(b->target_id, \"P1_LEFT\") == 0 && sl <\
      \ 0) { sl = (int)b->scancode; kl_kind = (unsigned)b->source_kind; }\n                if (b->source_kind == 1u && strcmp(b->target_id, \"P1_RIGHT\") == 0 && sr < 0) { sr = (int)b->scancode; kr_kind = (unsigned)b->source_kind; }\n                if (b->source_kind == 1u && strcmp(b->target_id, \"P1_FIRE\") == 0 && sf < 0) { sf = (int)b->scancode; kf_kind = (unsigned)b->source_kind; }\n            }\n            char ttl2[360];\n            (void)snprintf(ttl2, sizeof(ttl2), \"PASM Atari 2600 [FOCUS] | CMAP=%u BC=%u KB=%u | KC=%d | K[U%u D%u L%u R%u F%u] | B0[k%u sc%d id=%s] | B[U k%u sc%d D k%u sc%d L k%u sc%d R k%u sc%d F k%u sc%d] | J1=%02X\", (unsigned)g_runtime_controller_map.loaded, (unsigned)g_runtime_controller_map.binding_count, kb, kc2, ku, kd, kl, kr, kf, b0k, b0sc, b0id, ku_kind, su, kd_kind, sd, kl_kind, sl, kr_kind, sr, kf_kind, sf, (unsigned)comp->joy1);\n            cpu_host_hal_set_window_title(comp->window, ttl2);\n        }\n    } else {\n        comp->joy1 = 0u;\n\
      \        comp->joy2 = 0u;\n    }\n\n    comp->console_state = 0xFFu;\n    /* SWCHB input bits (active-low): bit0=RESET, bit1=SELECT, bit3=TV TYPE (0=BW, 1=Color), bit6/7=difficulty.\n       POWER isn't a RIOT switch; it is implemented as an emulator power-cycle (mos6502_reset) on keydown. */\n    if (comp->sw_reset_held != 0u) comp->console_state &= (uint8_t)~0x01u;\n    if (comp->sw_select_held != 0u) comp->console_state &= (uint8_t)~0x02u;\n    if (comp->sw_tv_bw != 0u) comp->console_state &= (uint8_t)~0x08u;\n    if (comp->sw_left_diff_b != 0u) comp->console_state &= (uint8_t)~0x40u;\n    if (comp->sw_right_diff_b != 0u) comp->console_state &= (uint8_t)~0x80u;\n}\n\nif (\n    comp->audio_out_dev != 0u &&\n    comp->audio_out_ready != 0u &&\n    comp->audio_ring != NULL\n) {\n    uint32_t channels = (comp->audio_channels > 0u) ? comp->audio_channels : 1u;\n    if (channels > 2u) channels = 2u;\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);\n\
      \    uint32_t queued_frames = queued_samples / channels;\n    uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;\n    uint32_t device_frames = device_samples / channels;\n    if (device_frames == 0u) device_frames = 512u;\n    uint32_t low_watermark = device_frames * 3u;\n    uint32_t target_total = device_frames * 6u;\n    uint32_t max_total = device_frames * 12u;\n\n    if (queued_frames + comp->audio_ring_fill > max_total) {\n        uint32_t desired_ring_fill = (queued_frames < target_total) ? (target_total - queued_frames) : 0u;\n        while (comp->audio_ring_fill > desired_ring_fill) {\n            comp->audio_ring_read_idx += 1u;\n            if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n            comp->audio_ring_fill -= 1u;\n        }\n    }\n    if (queued_frames < low_watermark) {\n        uint32_t want_samples = target_total - queued_frames;\n        uint32_t to_send = (comp->audio_ring_fill\
      \ < want_samples) ? comp->audio_ring_fill : want_samples;\n        while (to_send > 0u) {\n            int16_t chunk[1024];\n            uint32_t max_frames = 1024u / channels;\n            uint32_t n = (to_send > max_frames) ? max_frames : to_send;\n            uint32_t out = 0u;\n            if (n == 0u) break;\n            for (uint32_t i = 0u; i < n; ++i) {\n                int16_t sample = comp->audio_ring[comp->audio_ring_read_idx];\n                for (uint32_t ch = 0u; ch < channels; ++ch) {\n                    chunk[out++] = sample;\n                }\n                comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n            }\n            comp->audio_ring_fill -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, out * (uint32_t)sizeof(int16_t)) != 0) break;\n            to_send -= n;\n        }\n    }\n}\n"
    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_close(comp->audio_out_dev);\n    comp->audio_out_dev = 0u;\n}\nif (comp->audio_ring != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n    comp->audio_ring = NULL;\n}\nif (comp->texture != NULL) {\n    cpu_host_hal_destroy_texture(comp->texture);\n    comp->texture = NULL;\n}\nif (comp->renderer != NULL) {\n    cpu_host_hal_destroy_renderer(comp->renderer);\n    comp->renderer = NULL;\n}\nif (comp->window != NULL) {\n    cpu_host_hal_destroy_window(comp->window);\n    comp->window = NULL;\n}\nif (comp->host_inited != 0u) {\n    cpu_host_hal_quit_subsystems();\n    cpu_host_hal_quit();\n    comp->host_inited = 0u;\n}\n"
  callback_handlers:
    read_joy1: 'return (uint64_t)comp->joy1;

