behavior:
  snippets:
    init: |
      do {
          if (comp->host_inited != 0u) break;
          if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;

          comp->window = cpu_host_hal_create_window(
              "PASM Atari 2600",
              CPU_HOST_WINDOWPOS_CENTERED,
              CPU_HOST_WINDOWPOS_CENTERED,
              160,
              192,
              CPU_HOST_WINDOW_RESIZABLE
          );
          if (comp->window == NULL) break;

          comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);
          if (comp->renderer == NULL) {
              comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);
          }
          if (comp->renderer == NULL) break;

          {
              static const char *atari2600_crt_tv_vertex_shader =
                  "#version 330 core\n"
                  "layout (location = 0) in vec3 aPos;\n"
                  "layout (location = 1) in vec2 aTexCoords;\n"
                  "out vec2 TexCoords;\n"
                  "void main() {\n"
                  "    TexCoords = aTexCoords;\n"
                  "    gl_Position = vec4(aPos, 1.0);\n"
                  "}\n";
              static const char *atari2600_crt_tv_fragment_shader =
                  "#version 330 core\n"
                  "out vec4 FragColor;\n"
                  "in vec2 TexCoords;\n"
                  "uniform sampler2D screenTexture;\n"
                  "uniform vec2 sourceResolution;\n"
                  "const float CURVATURE = 8.0;\n"
                  "const float SCANLINE_WEIGHT = 0.10;\n"
                  "const float MASK_DARKNESS = 0.08;\n"
                  "const float GLOW_FACTOR = 0.05;\n"
                  "vec2 curve(vec2 coord) {\n"
                  "    coord = coord * 2.0 - 1.0;\n"
                  "    coord.x *= 1.0 + pow((abs(coord.y) / CURVATURE), 2.0);\n"
                  "    coord.y *= 1.0 + pow((abs(coord.x) / CURVATURE), 2.0);\n"
                  "    return coord * 0.5 + 0.5;\n"
                  "}\n"
                  "void main() {\n"
                  "    vec2 crtUV = curve(TexCoords);\n"
                  "    if (crtUV.x < 0.0 || crtUV.x > 1.0 || crtUV.y < 0.0 || crtUV.y > 1.0) {\n"
                  "        FragColor = vec4(0.0, 0.0, 0.0, 1.0);\n"
                  "        return;\n"
                  "    }\n"
                  "    vec3 baseColor = texture(screenTexture, crtUV).rgb;\n"
                  "    vec3 blurColor = texture(screenTexture, crtUV + vec2(1.0 / sourceResolution.x, 0.0)).rgb;\n"
                  "    baseColor = mix(baseColor, blurColor, GLOW_FACTOR);\n"
                  "    float scan = 0.5 + 0.5 * sin(crtUV.y * sourceResolution.y * 3.14159265);\n"
                  "    baseColor *= 1.0 - (SCANLINE_WEIGHT * (1.0 - scan));\n"
                  "    float maskPhase = mod(gl_FragCoord.x + floor(gl_FragCoord.y * 0.5), 3.0);\n"
                  "    float mask = 1.0 - (MASK_DARKNESS * step(maskPhase, 0.5));\n"
                  "    baseColor *= mask;\n"
                  "    baseColor *= 1.08;\n"
                  "    FragColor = vec4(baseColor, 1.0);\n"
                  "}\n";
              comp->display_shader = cpu_host_hal_shader_create(comp->renderer, atari2600_crt_tv_vertex_shader, atari2600_crt_tv_fragment_shader);
              comp->display_shader_supported = (comp->display_shader != NULL) ? -1 : 0;
          }

          comp->texture = cpu_host_hal_create_texture(
              comp->renderer,
              CPU_HOST_PIXELFORMAT_ARGB8888,
              CPU_HOST_TEXTUREACCESS_STREAMING,
              160,
              192
          );
          if (comp->texture == NULL) break;

          {
              const char *audio_env = cpu_host_hal_getenv("PASM_HOST_AUDIO");
              if (audio_env == NULL || audio_env[0] != '0') {
                  CPUHostAudioSpec want;
                  CPUHostAudioSpec have;
                  uint32_t expected_rate = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (uint32_t)CPU_AUDIO_SAMPLE_RATE : 44100u;
                  cpu_host_audio_spec_zero(&want);
                  cpu_host_audio_spec_zero(&have);
                  want.freq = (int)expected_rate;
                  want.format = CPU_HOST_AUDIO_FORMAT_S16;
                  want.channels = 1;
                  want.samples = 4096;
                  want.callback = NULL;

                  comp->audio_out_ready = 0u;
                  comp->audio_device_samples = 0u;
                  comp->audio_channels = 0u;
                  comp->audio_rate = 0u;
                  comp->audio_out_dev = cpu_host_hal_audio_open(
                      NULL,
                      0,
                      &want,
                      &have,
                      CPU_HOST_AUDIO_ALLOW_CHANNELS_CHANGE | CPU_HOST_AUDIO_ALLOW_SAMPLES_CHANGE
                  );

                  if (
                      comp->audio_out_dev != 0u &&
                      have.format == CPU_HOST_AUDIO_FORMAT_S16 &&
                      have.channels <= 2u && have.channels >= 1u &&
                      have.freq > 0 &&
                      have.samples > 0
                  ) {
                      uint32_t ring_capacity = (uint32_t)have.samples * 8u;
                      if (ring_capacity < 4096u) ring_capacity = 4096u;
                      comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));
                      if (comp->audio_ring != NULL) {
                          cpu_host_hal_memset(comp->audio_ring, 0, ring_capacity * sizeof(int16_t));
                          comp->audio_ring_capacity = ring_capacity;
                          comp->audio_ring_read_idx = 0u;
                          comp->audio_ring_write_idx = 0u;
                          comp->audio_ring_fill = 0u;
                          comp->audio_rate = (uint32_t)have.freq;
                          comp->audio_device_samples = (uint32_t)have.samples * (uint32_t)have.channels;
                          comp->audio_channels = (uint32_t)have.channels;
                          comp->audio_out_ready = 1u;
                          cpu_host_hal_audio_pause(comp->audio_out_dev, 0);
                      } else {
                          cpu_host_hal_audio_close(comp->audio_out_dev);
                          comp->audio_out_dev = 0u;
                          comp->audio_rate = 0u;
                          comp->audio_channels = 0u;
                          comp->audio_device_samples = 0u;
                      }
                  } else if (comp->audio_out_dev != 0u) {
                      cpu_host_hal_audio_close(comp->audio_out_dev);
                      comp->audio_out_dev = 0u;
                      comp->audio_rate = 0u;
                      comp->audio_channels = 0u;
                      comp->audio_device_samples = 0u;
                  }
              }
          }

          {
              const char *joy2_env = cpu_host_hal_getenv("PASM_ATARI2600_JOY2_CONNECTED");
              comp->joy2_connected = (joy2_env != NULL && joy2_env[0] == '1') ? 1u : 0u;
          }
          comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
          comp->last_focus_state = comp->has_keyboard_focus;
          comp->host_inited = 1u;
      } while (0);
    reset: 'comp->frame_count = 0u;

      comp->audio_samples = 0u;

      comp->audio_level = 0;

      comp->audio_last_cycle = 0u;

      comp->audio_sample_cursor = 0u;

      comp->audio_rate = 0u;

      comp->audio_channels = 0u;

      comp->audio_hp_prev_in = 0;

      comp->audio_hp_prev_out = 0;

      comp->joy1 = 0u;

      comp->joy2 = 0u;

      comp->console_state = 0xFFu;

      comp->sw_tv_bw = 0u;

      comp->sw_left_diff_b = 0u;

      comp->sw_right_diff_b = 0u;

      comp->sw_select_held = 0u;

      comp->sw_reset_held = 0u;

      comp->sw_prev_power = 0u;

      comp->sw_prev_tv = 0u;

      comp->sw_prev_left_diff = 0u;

      comp->sw_prev_right_diff = 0u;

      comp->audio_ring_read_idx = 0u;

      comp->audio_ring_write_idx = 0u;

      comp->audio_ring_fill = 0u;

      comp->last_event_poll_cycle = 0u;

      comp->overlay_last_ms = 0u;

      comp->overlay_last_frame_count = 0u;

      comp->overlay_last_cycle_count = 0u;

      comp->overlay_fps_x100 = 0u;

      comp->overlay_cpu_hz = 0u;

      comp->overlay_cpu_pct_x10 = 0u;

      if (comp->audio_out_dev != 0u) cpu_host_hal_audio_clear(comp->audio_out_dev);

      '
    step_post: |
      if (comp->host_inited == 0u) return;
      if ((cpu->total_cycles - comp->last_event_poll_cycle) < 65536u) return;
      comp->last_event_poll_cycle = cpu->total_cycles;

      {
          CPUHostEvent ev;
          while (cpu_host_hal_poll_event(&ev)) {
              if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {
                  cpu->running = false;
                  cpu->halted = true;
              } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYDOWN && cpu_host_hal_event_key_repeat(&ev) == 0) {
                  int32_t sc = cpu_host_hal_event_scancode(&ev);
                  for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {
                      const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];
                      if (b->scancode != sc) continue;
                      if (b->emulator_key_id[0] == 0) break;
                      if (strcmp(b->emulator_key_id, "SW_GAME_SELECT") == 0) { comp->sw_select_held = 1u; break; }
                      if (strcmp(b->emulator_key_id, "SW_GAME_RESET") == 0) { comp->sw_reset_held = 1u; break; }
                      if (strcmp(b->emulator_key_id, "SW_TV_TYPE") == 0) { comp->sw_tv_bw ^= 1u; break; }
                      if (strcmp(b->emulator_key_id, "SW_LEFT_DIFFICULTY") == 0) { comp->sw_left_diff_b ^= 1u; break; }
                      if (strcmp(b->emulator_key_id, "SW_RIGHT_DIFFICULTY") == 0) { comp->sw_right_diff_b ^= 1u; break; }
                      if (strcmp(b->emulator_key_id, "SW_POWER") == 0) { cpu->halted = false; mos6502_reset(cpu); break; }
                      break;
                  }
              } else if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_KEYUP) {
                  int32_t sc = cpu_host_hal_event_scancode(&ev);
                  for (size_t i = 0; i < g_runtime_keyboard_map.binding_count; ++i) {
                      const RuntimeKeyboardBinding *b = &g_runtime_keyboard_map.bindings[i];
                      if (b->scancode != sc) continue;
                      if (b->emulator_key_id[0] == 0) break;
                      if (strcmp(b->emulator_key_id, "SW_GAME_SELECT") == 0) { comp->sw_select_held = 0u; break; }
                      if (strcmp(b->emulator_key_id, "SW_GAME_RESET") == 0) { comp->sw_reset_held = 0u; break; }
                      break;
                  }
              }
          }
          cpu_host_hal_pump_events();
      }

      comp->has_keyboard_focus = 1u;
      comp->last_focus_state = 1u;

      {
          pasm_overlay_update_perf(
              cpu_host_hal_ticks_ms(),
              (uint64_t)comp->frame_count,
              cpu->total_cycles,
              (uint64_t)CPU_SYSTEM_CLOCK_HZ,
              &comp->overlay_last_ms,
              &comp->overlay_last_frame_count,
              &comp->overlay_last_cycle_count,
              &comp->overlay_fps_x100,
              &comp->overlay_cpu_hz,
              &comp->overlay_cpu_pct_x10
          );
      }

      if (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {
          uint32_t channels = (comp->audio_channels > 0u) ? comp->audio_channels : 1u;
          if (channels > 2u) channels = 2u;
          uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);
          uint32_t queued_frames = queued_samples / channels;
          uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 4096u;
          uint32_t device_frames = device_samples / channels;
          if (device_frames == 0u) device_frames = 4096u;
          uint32_t low_watermark = device_frames * 2u;
          uint32_t target_total = device_frames * 4u;
          uint32_t max_total = device_frames * 8u;
          if (queued_frames + comp->audio_ring_fill > max_total) {
              uint32_t desired_ring_fill = (queued_frames < target_total) ? (target_total - queued_frames) : 0u;
              while (comp->audio_ring_fill > desired_ring_fill) {
                  comp->audio_ring_read_idx += 1u;
                  if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  comp->audio_ring_fill -= 1u;
              }
          }
          if (queued_frames < low_watermark) {
              uint32_t desired = (queued_frames < target_total) ? (target_total - queued_frames) : 0u;
              uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;
              while (to_send > 0u) {
                  int16_t chunk[1024];
                  uint32_t max_frames = 1024u / channels;
                  uint32_t n = (to_send > max_frames) ? max_frames : to_send;
                  uint32_t out = 0u;
                  if (n == 0u) break;
                  for (uint32_t i = 0u; i < n; ++i) {
                      int16_t sample = comp->audio_ring[comp->audio_ring_read_idx];
                      for (uint32_t ch = 0u; ch < channels; ++ch) {
                          chunk[out++] = sample;
                      }
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  }
                  comp->audio_ring_fill -= n;
                  if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, out * (uint32_t)sizeof(int16_t)) != 0) {
                      break;
                  }
                  to_send -= n;
              }
          }
      }

      {
          /* Joystick ports come from the controller-map (host_controller_atari2600.yaml).
             Console switches come from the console keyboard-map (host_console_atari2600.yaml) via the keydown/up handling above. */
          if (g_runtime_controller_map.loaded != 0u) {
              cpu_component_controller_map_poll(cpu, 1u);

              comp->joy1 = 0u;
              comp->joy2 = 0u;

              if (cpu_component_controller_pressed("P1_UP")) comp->joy1 |= 0x01u;
              if (cpu_component_controller_pressed("P1_DOWN")) comp->joy1 |= 0x02u;
              if (cpu_component_controller_pressed("P1_LEFT")) comp->joy1 |= 0x04u;
              if (cpu_component_controller_pressed("P1_RIGHT")) comp->joy1 |= 0x08u;
              if (cpu_component_controller_pressed("P1_FIRE")) comp->joy1 |= 0x10u;

              if (cpu_component_controller_pressed("P2_UP")) comp->joy2 |= 0x01u;
              if (cpu_component_controller_pressed("P2_DOWN")) comp->joy2 |= 0x02u;
              if (cpu_component_controller_pressed("P2_LEFT")) comp->joy2 |= 0x04u;
              if (cpu_component_controller_pressed("P2_RIGHT")) comp->joy2 |= 0x08u;
              if (cpu_component_controller_pressed("P2_FIRE")) comp->joy2 |= 0x10u;

              {
                  uint8_t p2c = 1u;
                  if (g_runtime_controller_map.port_count >= 2u) p2c = g_runtime_controller_map.port_connected[1];
                  comp->joy2_connected = p2c;
                  if (p2c == 0u) comp->joy2 = 0u;
              }
          } else {
              comp->joy1 = 0u;
              comp->joy2 = 0u;
          }

          comp->console_state = 0xFFu;
          /* SWCHB input bits (active-low): bit0=RESET, bit1=SELECT, bit3=TV TYPE (0=BW, 1=Color), bit6/7=difficulty.
             POWER isn't a RIOT switch; it is implemented as an emulator power-cycle (mos6502_reset) on keydown. */
          if (comp->sw_reset_held != 0u) comp->console_state &= (uint8_t)~0x01u;
          if (comp->sw_select_held != 0u) comp->console_state &= (uint8_t)~0x02u;
          if (comp->sw_tv_bw != 0u) comp->console_state &= (uint8_t)~0x08u;
          if (comp->sw_left_diff_b != 0u) comp->console_state &= (uint8_t)~0x40u;
          if (comp->sw_right_diff_b != 0u) comp->console_state &= (uint8_t)~0x80u;
      }

    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \    comp->audio_out_dev = 0u;\n}\nif (comp->display_shader != NULL) {\n    cpu_host_hal_shader_destroy(comp->display_shader);\n    comp->display_shader = NULL;\n}\ncomp->display_shader_supported = -1;\nif (comp->audio_ring != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n\
      \    comp->audio_ring = NULL;\n}\nif (comp->texture != NULL) {\n    cpu_host_hal_destroy_texture(comp->texture);\n\
      \    comp->texture = NULL;\n}\nif (comp->renderer != NULL) {\n    cpu_host_hal_destroy_renderer(comp->renderer);\n\
      \    comp->renderer = NULL;\n}\nif (comp->window != NULL) {\n    cpu_host_hal_destroy_window(comp->window);\n\
      \    comp->window = NULL;\n}\nif (comp->host_inited != 0u) {\n    cpu_host_hal_quit_subsystems();\n\
      \    cpu_host_hal_quit();\n    comp->host_inited = 0u;\n}\n"
  callback_handlers:
    read_joy1: 'return (uint64_t)comp->joy1;

      '
    read_joy2: 'return (uint64_t)comp->joy2;

      '
    read_console: 'return (uint64_t)comp->console_state;

      '
  handler_bodies:
    video_frame: "if (comp->host_inited == 0u || argc < 4) return;\nvoid *renderer\
      \ = comp->renderer;\nvoid *texture = comp->texture;\nuint32_t frame = (uint32_t)(args[0]\
      \ & 0xFFFFFFFFu);\nuint32_t *pixels = (uint32_t *)(uintptr_t)args[1];\nuint32_t\
      \ w = (uint32_t)(args[2] & 0xFFFFFFFFu);\nuint32_t h = (uint32_t)(args[3] &\
      \ 0xFFFFFFFFu);\nif (renderer == NULL || texture == NULL || pixels == NULL ||\
      \ w == 0u || h == 0u) return;\ncomp->frame_count = frame;\nif (cpu->debug_overlay_enabled)\
      \ {\n    pasm_overlay_draw_perf(\n        pixels,\n        w,\n        h,\n \
      \       comp->overlay_fps_x100,\n        comp->overlay_cpu_hz,\n        comp->overlay_cpu_pct_x10\n\
      \    );\n}\nif (comp->texture_w != w || comp->texture_h != h) {\n    cpu_host_hal_destroy_texture(texture);\n\
      \    texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888,\
      \ CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);\n    if (texture == NULL)\
      \ return;\n    comp->texture = (void *)texture;\n    comp->texture_w = w;\n\
      \    comp->texture_h = h;\n}\nif (cpu_host_hal_update_texture(texture, NULL,\
      \ pixels, (int)(w * sizeof(uint32_t))) != 0) return;\ncpu_host_hal_render_set_draw_color(renderer,\
      \ 0, 0, 0, 255);\ncpu_host_hal_render_clear(renderer);\n{\n    int ww = 0;\n\
      \    int wh = 0;\n    int scaled_w = 0;\n    int scaled_h = 0;\n    CPUHostRect\
      \ dst;\n    if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 ||\
      \ ww <= 0 || wh <= 0) return;\n    uint32_t aspect_w = cpu->comp_tv.aspect_width;\n\
