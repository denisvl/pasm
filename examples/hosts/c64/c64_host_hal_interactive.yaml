behavior:
  snippets:
    init: "do {\n    if (comp->host_inited != 0u) break;\n    if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO\
      \ | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;\n    comp->window\
      \ = cpu_host_hal_create_window(\n        \"PASM C64\",\n        CPU_HOST_WINDOWPOS_CENTERED,\n\
      \        CPU_HOST_WINDOWPOS_CENTERED,\n        960,\n        600,\n        CPU_HOST_WINDOW_RESIZABLE\n\
      \    );\n    if (comp->window == NULL) break;\n    comp->renderer = cpu_host_hal_create_renderer(comp->window,\
      \ -1, CPU_HOST_RENDERER_ACCELERATED);\n    if (comp->renderer == NULL) {\n \
      \       comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);\n\
      \    }\n    if (comp->renderer == NULL) break;\n    comp->texture = cpu_host_hal_create_texture(\n\
      \        comp->renderer,\n        CPU_HOST_PIXELFORMAT_ARGB8888,\n        CPU_HOST_TEXTUREACCESS_STREAMING,\n\
      \        320,\n        200\n    );\n    if (comp->texture == NULL) break;\n\
      \    {\n        const char *audio_env = cpu_host_hal_getenv(\"PASM_HOST_AUDIO\"\
      );\n        if (audio_env == NULL || audio_env[0] != '0') {\n            CPUHostAudioSpec\
      \ want;\n            CPUHostAudioSpec have;\n            cpu_host_audio_spec_zero(&want);\n\
      \            cpu_host_audio_spec_zero(&have);\n            want.freq = (CPU_AUDIO_SAMPLE_RATE\
      \ > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;\n            want.format = CPU_HOST_AUDIO_FORMAT_S16;\n\
      \            want.channels = 1;\n            want.samples = 512;\n         \
      \   want.callback = NULL;\n            comp->audio_device_samples = 0u;\n  \
      \          comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have,\
      \ CPU_HOST_AUDIO_ALLOW_FREQUENCY_CHANGE);\n            if (comp->audio_out_dev\
      \ != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16 && have.channels == 1) {\n\
      \                uint32_t ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq\
      \ * 2u) : 88200u;\n                if (ring_capacity < 8192u) ring_capacity\
      \ = 8192u;\n                comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity\
      \ * sizeof(int16_t));\n                if (comp->audio_ring != NULL) {\n   \
      \                 comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq :\
      \ 44100u;\n                    comp->audio_ring_capacity = ring_capacity;\n\
      \                    comp->audio_ring_read_idx = 0u;\n                    comp->audio_ring_write_idx\
      \ = 0u;\n                    comp->audio_ring_fill = 0u;\n                 \
      \   comp->audio_device_samples = (uint32_t)have.samples;\n                 \
      \   comp->audio_out_ready = 1u;\n                    cpu_host_hal_audio_pause(comp->audio_out_dev,\
      \ 0);\n                } else {\n                    cpu_host_hal_audio_close(comp->audio_out_dev);\n\
      \                    comp->audio_out_dev = 0u;\n                    comp->audio_device_samples\
      \ = 0u;\n                }\n            } else if (comp->audio_out_dev != 0u)\
      \ {\n                cpu_host_hal_audio_close(comp->audio_out_dev);\n      \
      \          comp->audio_out_dev = 0u;\n                comp->audio_device_samples\
      \ = 0u;\n            }\n        }\n    }\n    comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      \    {\n        int32_t kc_sem = cpu_host_hal_key_from_scancode(CPU_HOST_SCANCODE(SEMICOLON));\n\
      \        int32_t kc_slash = cpu_host_hal_key_from_scancode(CPU_HOST_SCANCODE(SLASH));\n\
      \        comp->swap_semicolon_slash = (kc_slash == CPU_HOST_KEYCODE_SEMICOLON\
      \ && kc_sem != CPU_HOST_KEYCODE_SEMICOLON) ? 1u : 0u;\n    }\n    comp->host_inited\
      \ = 1u;\n} while (0);\n"
    reset: 'comp->frame_count = 0u;

      comp->row0 = 0xFFu;

      comp->row1 = 0xFFu;

      comp->row2 = 0xFFu;

      comp->row3 = 0xFFu;

      comp->row4 = 0xFFu;

      comp->row5 = 0xFFu;

      comp->row6 = 0xFFu;

      comp->row7 = 0xFFu;

      comp->audio_ring_read_idx = 0u;

      comp->audio_ring_write_idx = 0u;

      comp->audio_ring_fill = 0u;

      comp->audio_last_cycle = 0u;

      comp->audio_sample_cursor = 0u;

      comp->audio_level = 0;

      comp->last_event_poll_cycle = 0u;

      comp->overlay_last_ms = 0u;

      comp->overlay_last_frame_count = 0u;

      comp->overlay_last_cycle_count = 0u;

      comp->overlay_fps_x100 = 0u;

      comp->overlay_cpu_hz = 0u;

      comp->overlay_cpu_pct_x10 = 0u;

      if (comp->audio_out_dev != 0u) cpu_host_hal_audio_clear(comp->audio_out_dev);

      '
    step_post: "if (comp->host_inited == 0u) return;\n{\n    uint64_t now = cpu->total_cycles;\n\
      \    if ((now - comp->last_event_poll_cycle) < 2048u) {\n        return;\n \
      \   }\n    comp->last_event_poll_cycle = now;\n}\nCPUHostEvent ev;\nwhile (cpu_host_hal_poll_event(&ev))\
      \ {\n    if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n      \
      \  cpu->running = false;\n        cpu->halted = true;\n        return;\n   \
      \ }\n}\ncpu_host_hal_pump_events();\ncomp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n\
      {\n    sms_overlay_update_perf(\n        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n\
      \        cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n      \
      \  &comp->overlay_last_ms,\n        &comp->overlay_last_frame_count,\n     \
      \   &comp->overlay_last_cycle_count,\n        &comp->overlay_fps_x100,\n   \
      \     &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n    );\n}\n\
      {\n    int key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n\
      \    uint8_t rows[8] = { 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu\
      \ };\n    if (ks != NULL && key_count > 0) {\n        cpu_component_apply_declared_keymap(\n\
      \            cpu,\n            \"host_c64\",\n            ks,\n            (size_t)key_count,\n\
      \            rows,\n            8u,\n            comp->has_keyboard_focus\n\
      \        );\n        if (\n            comp->swap_semicolon_slash != 0u &&\n\
      \            (size_t)CPU_HOST_SCANCODE(SEMICOLON) < (size_t)key_count &&\n \
      \           (size_t)CPU_HOST_SCANCODE(SLASH) < (size_t)key_count\n        )\
      \ {\n            uint8_t sem_down = (ks[CPU_HOST_SCANCODE(SEMICOLON)] != 0u)\
      \ ? 1u : 0u;\n            uint8_t slash_down = (ks[CPU_HOST_SCANCODE(SLASH)]\
      \ != 0u) ? 1u : 0u;\n            rows[5] = (uint8_t)(rows[5] | (uint8_t)(1u\
      \ << 5)); /* clear C64 ':' bit */\n            rows[6] = (uint8_t)(rows[6] |\
      \ (uint8_t)(1u << 7)); /* clear C64 '/' bit */\n            if (slash_down !=\
      \ 0u) rows[5] = (uint8_t)(rows[5] & (uint8_t)~(uint8_t)(1u << 5));\n       \
      \     if (sem_down != 0u) rows[6] = (uint8_t)(rows[6] & (uint8_t)~(uint8_t)(1u\
      \ << 7));\n        }\n    }\n    comp->row0 = rows[0];\n    comp->row1 = rows[1];\n\
      \    comp->row2 = rows[2];\n    comp->row3 = rows[3];\n    comp->row4 = rows[4];\n\
      \    comp->row5 = rows[5];\n    comp->row6 = rows[6];\n    comp->row7 = rows[7];\n\
      }\nif (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring\
      \ != NULL && comp->audio_ring_fill > 0u) {\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev)\
      \ / (uint32_t)sizeof(int16_t);\n    uint32_t device_samples = (comp->audio_device_samples\
      \ > 0u) ? comp->audio_device_samples : 512u;\n    uint32_t low_watermark = device_samples\
      \ * 2u;\n    uint32_t target_total = device_samples * 4u;\n    uint32_t max_total\
      \ = device_samples * 8u;\n    if (queued_samples + comp->audio_ring_fill > max_total)\
      \ {\n        uint32_t desired_ring_fill = (queued_samples < target_total) ?\
      \ (target_total - queued_samples) : 0u;\n        while (comp->audio_ring_fill\
      \ > desired_ring_fill) {\n            comp->audio_ring_read_idx += 1u;\n   \
      \         if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx\
      \ = 0u;\n            comp->audio_ring_fill -= 1u;\n        }\n    }\n    if\
      \ (queued_samples < low_watermark) {\n        uint32_t desired = (queued_samples\
      \ < target_total) ? (target_total - queued_samples) : 0u;\n        uint32_t\
      \ to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;\n\
      \        while (to_send > 0u) {\n            int16_t chunk[1024];\n        \
      \    uint32_t n = (to_send > 1024u) ? 1024u : to_send;\n            for (uint32_t\
      \ i = 0u; i < n; ++i) {\n                chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];\n\
      \                comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n          \
      \  }\n            comp->audio_ring_fill -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev,\
      \ chunk, n * (uint32_t)sizeof(int16_t)) != 0) {\n                break;\n  \
      \          }\n            to_send -= n;\n        }\n    }\n}\n"
    destroy: "if (comp->audio_out_dev != 0u) {\n    cpu_host_hal_audio_clear(comp->audio_out_dev);\n\
      \    cpu_host_hal_audio_close(comp->audio_out_dev);\n    comp->audio_out_dev\
      \ = 0u;\n}\nif (comp->audio_ring != NULL) {\n    cpu_host_hal_free(comp->audio_ring);\n\
      \    comp->audio_ring = NULL;\n}\ncomp->audio_out_ready = 0u;\ncomp->audio_device_samples\
      \ = 0u;\ncomp->audio_ring_capacity = 0u;\ncomp->audio_ring_read_idx = 0u;\n\
      comp->audio_ring_write_idx = 0u;\ncomp->audio_ring_fill = 0u;\ncomp->audio_rate\
      \ = 0u;\ncomp->audio_last_cycle = 0u;\ncomp->audio_sample_cursor = 0u;\ncomp->audio_level\
      \ = 0;\nif (comp->texture != NULL) {\n    cpu_host_hal_destroy_texture(comp->texture);\n\
      \    comp->texture = NULL;\n}\nif (comp->renderer != NULL) {\n    cpu_host_hal_destroy_renderer(comp->renderer);\n\
      \    comp->renderer = NULL;\n}\nif (comp->window != NULL) {\n    cpu_host_hal_destroy_window(comp->window);\n\
      \    comp->window = NULL;\n}\nif (comp->host_inited != 0u) {\n    cpu_host_hal_quit_subsystems();\n\
      \    cpu_host_hal_quit();\n    comp->host_inited = 0u;\n}\n"
  callback_handlers:
    keyboard_matrix: "uint8_t row = (argc > 0) ? (uint8_t)(args[0] & 0x07u) : 0u;\n\
      switch (row) {\n    case 0u: return (uint64_t)comp->row0;\n    case 1u: return\
      \ (uint64_t)comp->row1;\n    case 2u: return (uint64_t)comp->row2;\n    case\
      \ 3u: return (uint64_t)comp->row3;\n    case 4u: return (uint64_t)comp->row4;\n\
      \    case 5u: return (uint64_t)comp->row5;\n    case 6u: return (uint64_t)comp->row6;\n\
      \    case 7u: return (uint64_t)comp->row7;\n    default: return 0xFFu;\n}\n"
  handler_bodies:
    video_frame: "if (comp->host_inited == 0u || argc < 4) return;\nvoid *renderer\
      \ = comp->renderer;\nvoid *texture = comp->texture;\nuint32_t frame = (uint32_t)(args[0]\
      \ & 0xFFFFFFFFu);\nuint32_t *pixels = (uint32_t *)(uintptr_t)args[1];\nuint32_t\
      \ w = (uint32_t)(args[2] & 0xFFFFFFFFu);\nuint32_t h = (uint32_t)(args[3] &\
      \ 0xFFFFFFFFu);\nif (renderer == NULL || texture == NULL || pixels == NULL ||\
      \ w == 0u || h == 0u) return;\ncomp->frame_count = frame;\nif (cpu->debug_overlay_enabled)\
      \ {\n    sms_overlay_draw_perf(\n        pixels,\n        w,\n        h,\n \
      \       comp->overlay_fps_x100,\n        comp->overlay_cpu_hz,\n        comp->overlay_cpu_pct_x10\n\
      \    );\n}\nif (comp->texture_w != w || comp->texture_h != h) {\n    cpu_host_hal_destroy_texture(texture);\n\
      \    texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888,\
      \ CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);\n    if (texture == NULL)\
      \ return;\n    comp->texture = (void *)texture;\n    comp->texture_w = w;\n\
      \    comp->texture_h = h;\n}\nif (cpu_host_hal_update_texture(texture, NULL,\
      \ pixels, (int)(w * sizeof(uint32_t))) != 0) return;\ncpu_host_hal_render_set_draw_color(renderer,\
      \ 0, 0, 0, 255);\ncpu_host_hal_render_clear(renderer);\n{\n    int ww = 0;\n\
      \    int wh = 0;\n    CPUHostRect dst;\n    int scaled_w = 0;\n    int scaled_h\
      \ = 0;\n    if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 ||\
      \ ww <= 0 || wh <= 0) return;\n    scaled_w = ww;\n    scaled_h = (int)((((int64_t)ww)\
      \ * (int64_t)h) / (int64_t)w);\n    if (scaled_h > wh) {\n        scaled_h =\
      \ wh;\n        scaled_w = (int)((((int64_t)wh) * (int64_t)w) / (int64_t)h);\n\
      \    }\n    dst.w = (scaled_w > 0) ? scaled_w : ww;\n    dst.h = (scaled_h >\
      \ 0) ? scaled_h : wh;\n    dst.x = (ww - dst.w) / 2;\n    dst.y = (wh - dst.h)\
      \ / 2;\n    if (cpu_host_hal_render_copy(renderer, texture, NULL, &dst) != 0)\
      \ return;\n}\ncpu_host_hal_render_present(renderer);\n"
    audio_pcm: "if (argc == 0) return;\n{\n    uint8_t level8 = (uint8_t)(args[0]\
      \ & 0xFFu);\n    uint64_t src_cycle = (argc > 1) ? args[1] : cpu->total_cycles;\n\
      \    int16_t cur = (int16_t)(((int16_t)(int)level8 - 128) << 8);\n    int16_t\
      \ prev = comp->audio_level;\n    uint32_t rate = (comp->audio_rate > 0u) ? comp->audio_rate\
      \ : ((CPU_AUDIO_SAMPLE_RATE > 0u) ? CPU_AUDIO_SAMPLE_RATE : 44100u);\n    uint64_t\
      \ hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? CPU_SYSTEM_CLOCK_HZ : 1u;\n    uint64_t\
      \ target_sample = (src_cycle * (uint64_t)rate) / hz;\n\n    comp->audio_last_cycle\
      \ = src_cycle;\n    if (comp->audio_sample_cursor == 0u) comp->audio_sample_cursor\
      \ = target_sample;\n\n    if (comp->audio_ring != NULL && comp->audio_ring_capacity\
      \ > 0u) {\n        if (target_sample > comp->audio_sample_cursor) {\n      \
      \      uint64_t gap = target_sample - comp->audio_sample_cursor;\n         \
      \   while (gap > 0u) {\n                uint64_t n = (gap > 4096u) ? 4096u :\
      \ gap;\n                for (uint64_t i = 0u; i < n; ++i) {\n              \
      \      if (comp->audio_ring_fill >= comp->audio_ring_capacity) {\n         \
      \               comp->audio_ring_read_idx += 1u;\n                        if\
      \ (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx\
      \ = 0u;\n                        comp->audio_ring_fill -= 1u;\n            \
      \        }\n                    comp->audio_ring[comp->audio_ring_write_idx]\
      \ = prev;\n                    comp->audio_ring_write_idx += 1u;\n         \
      \           if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx\
      \ = 0u;\n                    comp->audio_ring_fill += 1u;\n                }\n\
      \                comp->audio_sample_cursor += n;\n                gap -= n;\n\
      \            }\n        }\n\n        if (comp->audio_ring_fill >= comp->audio_ring_capacity)\
      \ {\n            comp->audio_ring_read_idx += 1u;\n            if (comp->audio_ring_read_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n          \
      \  comp->audio_ring_fill -= 1u;\n        }\n        comp->audio_ring[comp->audio_ring_write_idx]\
      \ = cur;\n        comp->audio_ring_write_idx += 1u;\n        if (comp->audio_ring_write_idx\
      \ >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;\n        comp->audio_ring_fill\
      \ += 1u;\n    }\n\n    comp->audio_level = cur;\n    if (target_sample >= comp->audio_sample_cursor)\
      \ comp->audio_sample_cursor = target_sample + 1u;\n}\n"
