    step_post: "if (comp->host_inited == 0u) return;\n{\n    uint64_t now = cpu->total_cycles;\n    if ((now - comp->last_event_poll_cycle) < 2048u) {\n        return;\n    }\n    comp->last_event_poll_cycle = now;\n}\nCPUHostEvent ev;\nwhile (cpu_host_hal_poll_event(&ev)) {\n    if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {\n        cpu->running = false;\n        cpu->halted = true;\n        return;\n    }\n}\ncpu_host_hal_pump_events();\ncomp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);\n{\n    pasm_overlay_update_perf(\n        cpu_host_hal_ticks_ms(),\n        (uint64_t)comp->frame_count,\n        cpu->total_cycles,\n        (uint64_t)CPU_SYSTEM_CLOCK_HZ,\n        &comp->overlay_last_ms,\n        &comp->overlay_last_frame_count,\n        &comp->overlay_last_cycle_count,\n        &comp->overlay_fps_x100,\n        &comp->overlay_cpu_hz,\n        &comp->overlay_cpu_pct_x10\n    );\n}\n{\n    int key_count = 0;\n    const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);\n    uint8_t rows[8] = { 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu };\n    if (ks != NULL && key_count > 0) {\n        cpu_component_apply_declared_keymap(\n            cpu,\n            \"host_c64\",\n            ks,\n            (size_t)key_count,\n            rows,\n            8u,\n            comp->has_keyboard_focus\n        );\n        if (\n            comp->swap_semicolon_slash != 0u &&\n            (size_t)CPU_HOST_SCANCODE(SEMICOLON) < (size_t)key_count &&\n            (size_t)CPU_HOST_SCANCODE(SLASH) < (size_t)key_count\n        ) {\n            uint8_t sem_down = (ks[CPU_HOST_SCANCODE(SEMICOLON)] != 0u) ? 1u : 0u;\n            uint8_t slash_down = (ks[CPU_HOST_SCANCODE(SLASH)] != 0u) ? 1u : 0u;\n            rows[5] = (uint8_t)(rows[5] | (uint8_t)(1u << 5));\n            rows[6] = (uint8_t)(rows[6] | (uint8_t)(1u << 7));\n            if (slash_down != 0u) rows[5] = (uint8_t)(rows[5] & (uint8_t)~(uint8_t)(1u << 5));\n            if (sem