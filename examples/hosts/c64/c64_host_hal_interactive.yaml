t8_t transport_mode = (uint8_t)(transport_state & 0xFFu);\n                uint8_t motor_on = (uint8_t)((transport_state >> 8u) & 0x01u);\n                uint8_t media_loaded = (uint8_t)((transport_state >> 9u) & 0x01u);\n                if (space_host_trace != 0 && space_host_trace_fp != NULL) {\n                    fprintf(space_host_trace_fp,\n                            \"host_space_edge cycle=%llu mode=%u motor=%u loaded=%u state=%03llX\\n\",\n                            (unsigned long long)cpu->total_cycles,\n                            (unsigned)transport_mode,\n                            (unsigned)motor_on,\n                            (unsigned)media_loaded,\n                            (unsigned long long)transport_state);\n                    fflush(space_host_trace_fp);\n                }\n                if (transport_mode == 1u && motor_on == 0u && media_loaded != 0u) {\n                    uint64_t motor_args[1] = { 1u };\n                    (void)cpu_component_dispatch_callback(cpu, \"datasette_c64\", \"set_motor\", motor_args, 1u);\n                    if (space_host_trace != 0 && space_host_trace_fp != NULL) {\n                        uint64_t after_state = cpu_component_dispatch_callback(cpu, \"datasette_c64\", \"query_transport_state\", NULL, 0u);\n                        fprintf(space_host_trace_fp,\n                                \"host_space_resume cycle=%llu after=%03llX\\n\",\n                                (unsigned long long)cpu->total_cycles,\n                                (unsigned long long)after_state);\n                        fflush(space_host_trace_fp);\n                    }\n                }\n            }\n            comp->datasette_resume_prev = space_down;\n        } else {\n            comp->datasette_resume_prev = 0u;\n        }\n    } else {\n        comp->datasette_resume_prev = 0u;\n    }\n    comp->row0 = rows[0];\n    comp->row1 = rows[1];\n    comp->row2 = rows[2];\n    comp->row3 = rows[3];\n    comp->row4 = rows[4];\n    comp->row5 = rows[5];\n    comp->row6 = rows[6];\n    comp->row7 = rows[7];\n}\n{\n/* Joystick ports come from the controller-map (host_controller_c64.yaml).\nNote: C64 joystick port 2 is treated as Player 1 (P1_*), port 1 as Player 2 (P2_*). */\nif (g_runtime_controller_map.loaded != 0u) {\ncpu_component_controller_map_poll(cpu, comp->has_keyboard_focus);\ncomp->joy_port1 = 0xFFu;\ncomp->joy_port2 = 0xFFu;\nif (cpu_component_controller_pressed(\"P1_UP\")) comp->joy_port2 &= (uint8_t)~0x01u;\nif (cpu_component_controller_pressed(\"P1_DOWN\")) comp->joy_port2 &= (uint8_t)~0x02u;\nif (cpu_component_controller_pressed(\"P1_LEFT\")) comp->joy_port2 &= (uint8_t)~0x04u;\nif (cpu_component_controller_pressed(\"P1_RIGHT\")) comp->joy_port2 &= (uint8_t)~0x08u;\nif (cpu_component_controller_pressed(\"P1_FIRE\")) comp->joy_port2 &= (uint8_t)~0x10u;\nif (cpu_component_controller_pressed(\"P2_UP\")) comp->joy_port1 &= (uint8_t)~0x01u;\nif (cpu_component_controller_pressed(\"P2_DOWN\")) comp->joy_port1 &= (uint8_t)~0x02u;\nif (cpu_component_controller_pressed(\"P2_LEFT\")) comp->joy_port1 &= (uint8_t)~0x04u;\nif (cpu_component_controller_pressed(\"P2_RIGHT\")) comp->joy_port1 &= (uint8_t)~0x08u;\nif (cpu_component_controller_pressed(\"P2_FIRE\")) comp->joy_port1 &= (uint8_t)~0x10u;\n} else {\ncomp->joy_port1 = 0xFFu;\ncomp->joy_port2 = 0xFFu;\n}\n}\nif (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {\n    uint32_t channels = (comp->audio_channels > 0u) ? comp->audio_channels : 1u;\n    if (channels > 2u) channels = 2u;\n    uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);\n    uint32_t queued_frames = queued_samples / channels;\n    uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;\n    uint32_t device_frames = device_samples / channels;\n    if (device_frames == 0u) device_frames = 512u;\n    uint32_t low_watermark = device_frames * 2u;\n    uint32_t target_total = device_frames * 4u;\n    uint32_t max_total = device_frames * 8u;\n    if (queued_frames + comp->audio_ring_fill > max_total) {\n        uint32_t desired_ring_fill = (queued_frames < target_total) ? (target_total - queued_frames) : 0u;\n        while (comp->audio_ring_fill > desired_ring_fill) {\n            comp->audio_ring_read_idx += 1u;\n            if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n            comp->audio_ring_fill -= 1u;\n        }\n    }\n    if (queued_frames < low_watermark) {\n        uint32_t desired = (queued_frames < target_total) ? (target_total - queued_frames) : 0u;\n        uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;\n        while (to_send > 0u) {\n            int16_t chunk[1024];\n            uint32_t max_frames = 1024u / channels;\n            uint32_t n = (to_send > max_frames) ? max_frames : to_send;\n            uint32_t out = 0u;\n            if (n == 0u) break;\n            for (uint32_t i = 0u; i < n; ++i) {\n                int16_t sample = comp->audio_ring[comp->audio_ring_read_idx];\n                for (uint32_t ch = 0u; ch < channels; ++ch) {\n                    chunk[out++] = sample;\n                }\n                comp->audio_ring_read_idx += 1u;\n                if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;\n            }\n            comp->audio_ring_fill -= n;\n            if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, out * (uint32_t)sizeof(int16_t)) != 0) {\n                break;\n            }\n            to_send -= n;\n        }\n    }\n}\n"
