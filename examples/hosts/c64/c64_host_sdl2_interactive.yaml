metadata:
  id: host_c64_sdl2
  type: host_adapter
  model: c64_sdl2_interactive
  version: "1.0"

state:
  - name: sdl_inited
    type: uint8_t
    initial: "0u"
  - name: window
    type: void *
    initial: "NULL"
  - name: renderer
    type: void *
    initial: "NULL"
  - name: texture
    type: void *
    initial: "NULL"
  - name: texture_w
    type: uint32_t
    initial: "320u"
  - name: texture_h
    type: uint32_t
    initial: "200u"
  - name: audio_out_dev
    type: uint32_t
    initial: "0u"
  - name: audio_out_ready
    type: uint8_t
    initial: "0u"
  - name: audio_device_samples
    type: uint32_t
    initial: "0u"
  - name: audio_rate
    type: uint32_t
    initial: "0u"
  - name: audio_ring
    type: int16_t *
    initial: "NULL"
  - name: audio_ring_capacity
    type: uint32_t
    initial: "0u"
  - name: audio_ring_read_idx
    type: uint32_t
    initial: "0u"
  - name: audio_ring_write_idx
    type: uint32_t
    initial: "0u"
  - name: audio_ring_fill
    type: uint32_t
    initial: "0u"
  - name: audio_last_cycle
    type: uint64_t
    initial: "0u"
  - name: audio_sample_cursor
    type: uint64_t
    initial: "0u"
  - name: audio_level
    type: int16_t
    initial: "0"
  - name: frame_count
    type: uint32_t
    initial: "0u"
  - name: has_keyboard_focus
    type: uint8_t
    initial: "0u"
  - name: last_event_poll_cycle
    type: uint64_t
    initial: "0u"
  - name: overlay_last_ms
    type: uint32_t
    initial: "0u"
  - name: overlay_last_frame_count
    type: uint64_t
    initial: "0u"
  - name: overlay_last_cycle_count
    type: uint64_t
    initial: "0u"
  - name: overlay_fps_x100
    type: uint32_t
    initial: "0u"
  - name: overlay_cpu_hz
    type: uint64_t
    initial: "0u"
  - name: overlay_cpu_pct_x10
    type: uint32_t
    initial: "0u"
  - name: swap_semicolon_slash
    type: uint8_t
    initial: "0u"
  - name: row0
    type: uint8_t
    initial: "0xFFu"
  - name: row1
    type: uint8_t
    initial: "0xFFu"
  - name: row2
    type: uint8_t
    initial: "0xFFu"
  - name: row3
    type: uint8_t
    initial: "0xFFu"
  - name: row4
    type: uint8_t
    initial: "0xFFu"
  - name: row5
    type: uint8_t
    initial: "0xFFu"
  - name: row6
    type: uint8_t
    initial: "0xFFu"
  - name: row7
    type: uint8_t
    initial: "0xFFu"

interfaces:
  callbacks:
    - name: keyboard_matrix
      args: [u8]
      returns: u8
  handlers:
    - name: video_frame
      args: [u32, u64, u32, u32]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

input:
  keyboard:
    source: sdl_scancode
    focus_required: false
    bindings:
      # Row 0
      - host_key: SDL_SCANCODE_BACKSPACE
        presses: [{ row: 0, bit: 0 }]
      - host_key: SDL_SCANCODE_RETURN
        presses: [{ row: 0, bit: 1 }]
      - host_key: SDL_SCANCODE_RIGHT
        presses: [{ row: 0, bit: 2 }]
      - host_key: SDL_SCANCODE_LEFT
        presses: [{ row: 0, bit: 2 }, { row: 1, bit: 7 }]
      - host_key: SDL_SCANCODE_F7
        presses: [{ row: 0, bit: 3 }]
      - host_key: SDL_SCANCODE_F8
        presses: [{ row: 0, bit: 3 }, { row: 1, bit: 7 }]
      - host_key: SDL_SCANCODE_F1
        presses: [{ row: 0, bit: 4 }]
      - host_key: SDL_SCANCODE_F2
        presses: [{ row: 0, bit: 4 }, { row: 1, bit: 7 }]
      - host_key: SDL_SCANCODE_F3
        presses: [{ row: 0, bit: 5 }]
      - host_key: SDL_SCANCODE_F4
        presses: [{ row: 0, bit: 5 }, { row: 1, bit: 7 }]
      - host_key: SDL_SCANCODE_F5
        presses: [{ row: 0, bit: 6 }]
      - host_key: SDL_SCANCODE_F6
        presses: [{ row: 0, bit: 6 }, { row: 1, bit: 7 }]
      - host_key: SDL_SCANCODE_DOWN
        presses: [{ row: 0, bit: 7 }]
      - host_key: SDL_SCANCODE_UP
        presses: [{ row: 0, bit: 7 }, { row: 1, bit: 7 }]

      # Row 1
      - host_key: SDL_SCANCODE_3
        presses: [{ row: 1, bit: 0 }]
      - host_key: SDL_SCANCODE_W
        presses: [{ row: 1, bit: 1 }]
      - host_key: SDL_SCANCODE_A
        presses: [{ row: 1, bit: 2 }]
      - host_key: SDL_SCANCODE_4
        presses: [{ row: 1, bit: 3 }]
      - host_key: SDL_SCANCODE_Z
        presses: [{ row: 1, bit: 4 }]
      - host_key: SDL_SCANCODE_S
        presses: [{ row: 1, bit: 5 }]
      - host_key: SDL_SCANCODE_E
        presses: [{ row: 1, bit: 6 }]
      - host_key: SDL_SCANCODE_LSHIFT
        presses: [{ row: 1, bit: 7 }]

      # Row 2
      - host_key: SDL_SCANCODE_5
