metadata:
  id: host_c64_sdl2
  type: host_adapter
  model: c64_sdl2_interactive
  version: "1.0"

backend:
  target: sdl2

state:
  - name: sdl_inited
    type: uint8_t
    initial: "0u"
  - name: window
    type: void *
    initial: "NULL"
  - name: renderer
    type: void *
    initial: "NULL"
  - name: texture
    type: void *
    initial: "NULL"
  - name: texture_w
    type: uint32_t
    initial: "320u"
  - name: texture_h
    type: uint32_t
    initial: "200u"
  - name: audio_out_dev
    type: uint32_t
    initial: "0u"
  - name: audio_out_ready
    type: uint8_t
    initial: "0u"
  - name: audio_device_samples
    type: uint32_t
    initial: "0u"
  - name: audio_rate
    type: uint32_t
    initial: "0u"
  - name: audio_ring
    type: int16_t *
    initial: "NULL"
  - name: audio_ring_capacity
    type: uint32_t
    initial: "0u"
  - name: audio_ring_read_idx
    type: uint32_t
    initial: "0u"
  - name: audio_ring_write_idx
    type: uint32_t
    initial: "0u"
  - name: audio_ring_fill
    type: uint32_t
    initial: "0u"
  - name: audio_last_cycle
    type: uint64_t
    initial: "0u"
  - name: audio_sample_cursor
    type: uint64_t
    initial: "0u"
  - name: audio_level
    type: int16_t
    initial: "0"
  - name: frame_count
    type: uint32_t
    initial: "0u"
  - name: has_keyboard_focus
    type: uint8_t
    initial: "0u"
  - name: last_event_poll_cycle
    type: uint64_t
    initial: "0u"
  - name: overlay_last_ms
    type: uint32_t
    initial: "0u"
  - name: overlay_last_frame_count
    type: uint64_t
    initial: "0u"
  - name: overlay_last_cycle_count
    type: uint64_t
    initial: "0u"
  - name: overlay_fps_x100
    type: uint32_t
    initial: "0u"
  - name: overlay_cpu_hz
    type: uint64_t
    initial: "0u"
  - name: overlay_cpu_pct_x10
    type: uint32_t
    initial: "0u"
  - name: swap_semicolon_slash
    type: uint8_t
    initial: "0u"
  - name: row0
    type: uint8_t
    initial: "0xFFu"
  - name: row1
    type: uint8_t
    initial: "0xFFu"
  - name: row2
    type: uint8_t
    initial: "0xFFu"
  - name: row3
    type: uint8_t
    initial: "0xFFu"
  - name: row4
    type: uint8_t
    initial: "0xFFu"
  - name: row5
    type: uint8_t
    initial: "0xFFu"
  - name: row6
    type: uint8_t
    initial: "0xFFu"
  - name: row7
    type: uint8_t
    initial: "0xFFu"

interfaces:
  callbacks:
    - name: keyboard_matrix
      args: [u8]
      returns: u8
  handlers:
    - name: video_frame
      args: [u32, u64, u32, u32]
    - name: audio_pcm
      args: [u8, u64]
  signals: []

input:
  keyboard:
    focus_required: false
    bindings:
      # Row 0
      - host_key: BACKSPACE
        presses: [{ row: 0, bit: 0 }]
      - host_key: RETURN
        presses: [{ row: 0, bit: 1 }]
      - host_key: RIGHT
        presses: [{ row: 0, bit: 2 }]
      - host_key: LEFT
        presses: [{ row: 0, bit: 2 }, { row: 1, bit: 7 }]
      - host_key: F7
        presses: [{ row: 0, bit: 3 }]
      - host_key: F8
        presses: [{ row: 0, bit: 3 }, { row: 1, bit: 7 }]
      - host_key: F1
        presses: [{ row: 0, bit: 4 }]
      - host_key: F2
        presses: [{ row: 0, bit: 4 }, { row: 1, bit: 7 }]
      - host_key: F3
        presses: [{ row: 0, bit: 5 }]
      - host_key: F4
        presses: [{ row: 0, bit: 5 }, { row: 1, bit: 7 }]
      - host_key: F5
        presses: [{ row: 0, bit: 6 }]
      - host_key: F6
        presses: [{ row: 0, bit: 6 }, { row: 1, bit: 7 }]
      - host_key: DOWN
        presses: [{ row: 0, bit: 7 }]
      - host_key: UP
        presses: [{ row: 0, bit: 7 }, { row: 1, bit: 7 }]

      # Row 1
      - host_key: "3"
        presses: [{ row: 1, bit: 0 }]
      - host_key: W
        presses: [{ row: 1, bit: 1 }]
      - host_key: A
        presses: [{ row: 1, bit: 2 }]
      - host_key: "4"
        presses: [{ row: 1, bit: 3 }]
      - host_key: Z
        presses: [{ row: 1, bit: 4 }]
      - host_key: S
        presses: [{ row: 1, bit: 5 }]
      - host_key: E
        presses: [{ row: 1, bit: 6 }]
      - host_key: LSHIFT
        presses: [{ row: 1, bit: 7 }]

      # Row 2
      - host_key: "5"
        presses: [{ row: 2, bit: 0 }]
      - host_key: R
        presses: [{ row: 2, bit: 1 }]
      - host_key: D
        presses: [{ row: 2, bit: 2 }]
      - host_key: "6"
        presses: [{ row: 2, bit: 3 }]
      - host_key: C
        presses: [{ row: 2, bit: 4 }]
      - host_key: F
        presses: [{ row: 2, bit: 5 }]
      - host_key: T
        presses: [{ row: 2, bit: 6 }]
      - host_key: X
        presses: [{ row: 2, bit: 7 }]

      # Row 3
      - host_key: "7"
        presses: [{ row: 3, bit: 0 }]
      - host_key: Y
        presses: [{ row: 3, bit: 1 }]
      - host_key: G
        presses: [{ row: 3, bit: 2 }]
      - host_key: "8"
        presses: [{ row: 3, bit: 3 }]
      - host_key: B
        presses: [{ row: 3, bit: 4 }]
      - host_key: H
        presses: [{ row: 3, bit: 5 }]
      - host_key: U
        presses: [{ row: 3, bit: 6 }]
      - host_key: V
        presses: [{ row: 3, bit: 7 }]

      # Row 4
      - host_key: "9"
        presses: [{ row: 4, bit: 0 }]
      - host_key: I
        presses: [{ row: 4, bit: 1 }]
      - host_key: J
        presses: [{ row: 4, bit: 2 }]
      - host_key: "0"
        presses: [{ row: 4, bit: 3 }]
      - host_key: M
        presses: [{ row: 4, bit: 4 }]
      - host_key: K
        presses: [{ row: 4, bit: 5 }]
      - host_key: O
        presses: [{ row: 4, bit: 6 }]
      - host_key: N
        presses: [{ row: 4, bit: 7 }]

      # Row 5
      - host_key: EQUALS
        presses: [{ row: 5, bit: 0 }]
      - host_key: P
        presses: [{ row: 5, bit: 1 }]
      - host_key: L
        presses: [{ row: 5, bit: 2 }]
      - host_key: MINUS
        presses: [{ row: 5, bit: 3 }]
      - host_key: PERIOD
        presses: [{ row: 5, bit: 4 }]
      - host_key: SEMICOLON
        presses: [{ row: 5, bit: 5 }]
      - host_key: LEFTBRACKET
        presses: [{ row: 5, bit: 6 }]
      - host_key: COMMA
        presses: [{ row: 5, bit: 7 }]

      # Row 6
      - host_key: BACKSLASH
        presses: [{ row: 6, bit: 0 }]
      - host_key: RIGHTBRACKET
        presses: [{ row: 6, bit: 1 }]
      - host_key: APOSTROPHE
        presses: [{ row: 6, bit: 2 }]
      - host_key: HOME
        presses: [{ row: 6, bit: 3 }]
      - host_key: RSHIFT
        presses: [{ row: 6, bit: 4 }]
      - host_key: NONUSBACKSLASH
        presses: [{ row: 6, bit: 4 }]
      - host_key: GRAVE
        presses: [{ row: 6, bit: 5 }]
      - host_key: SLASH
        presses: [{ row: 6, bit: 7 }]

      # Row 7
      - host_key: "1"
        presses: [{ row: 7, bit: 0 }]
      - host_key: "2"
        presses: [{ row: 7, bit: 3 }]
      - host_key: SPACE
        presses: [{ row: 7, bit: 4 }]
      - host_key: LALT
        presses: [{ row: 7, bit: 5 }]
      - host_key: RALT
        presses: [{ row: 7, bit: 5 }]
      - host_key: Q
        presses: [{ row: 7, bit: 6 }]
      - host_key: ESCAPE
        presses: [{ row: 7, bit: 7 }]
      - host_key: LCTRL
        presses: [{ row: 7, bit: 2 }]
      - host_key: RCTRL
        presses: [{ row: 7, bit: 2 }]

behavior:
  snippets:
    init: |
      do {
          if (comp->sdl_inited != 0u) break;
          if (cpu_host_hal_init(CPU_HOST_INIT_VIDEO | CPU_HOST_INIT_AUDIO | CPU_HOST_INIT_EVENTS) != 0) break;
          comp->window = cpu_host_hal_create_window(
              "PASM C64",
              CPU_HOST_WINDOWPOS_CENTERED,
              CPU_HOST_WINDOWPOS_CENTERED,
              960,
              600,
              CPU_HOST_WINDOW_RESIZABLE
          );
          if (comp->window == NULL) break;
          comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, CPU_HOST_RENDERER_ACCELERATED);
          if (comp->renderer == NULL) {
              comp->renderer = cpu_host_hal_create_renderer(comp->window, -1, 0);
          }
          if (comp->renderer == NULL) break;
          comp->texture = cpu_host_hal_create_texture(
              comp->renderer,
              CPU_HOST_PIXELFORMAT_ARGB8888,
              CPU_HOST_TEXTUREACCESS_STREAMING,
              320,
              200
          );
          if (comp->texture == NULL) break;
          {
              const char *audio_env = cpu_host_hal_getenv("PASM_SDL_AUDIO");
              if (audio_env == NULL || audio_env[0] != '0') {
                  CPUHostAudioSpec want;
                  CPUHostAudioSpec have;
                  cpu_host_audio_spec_zero(&want);
                  cpu_host_audio_spec_zero(&have);
                  want.freq = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (int)CPU_AUDIO_SAMPLE_RATE : 44100;
                  want.format = CPU_HOST_AUDIO_FORMAT_S16;
                  want.channels = 1;
                  want.samples = 512;
                  want.callback = NULL;
                  comp->audio_device_samples = 0u;
                  comp->audio_out_dev = cpu_host_hal_audio_open(NULL, 0, &want, &have, CPU_HOST_AUDIO_ALLOW_FREQUENCY_CHANGE);
                  if (comp->audio_out_dev != 0u && have.format == CPU_HOST_AUDIO_FORMAT_S16 && have.channels == 1) {
                      uint32_t ring_capacity = (have.freq > 0) ? ((uint32_t)have.freq * 2u) : 88200u;
                      if (ring_capacity < 8192u) ring_capacity = 8192u;
                      comp->audio_ring = (int16_t *)cpu_host_hal_alloc((size_t)ring_capacity * sizeof(int16_t));
                      if (comp->audio_ring != NULL) {
                          comp->audio_rate = (have.freq > 0) ? (uint32_t)have.freq : 44100u;
                          comp->audio_ring_capacity = ring_capacity;
                          comp->audio_ring_read_idx = 0u;
                          comp->audio_ring_write_idx = 0u;
                          comp->audio_ring_fill = 0u;
                          comp->audio_device_samples = (uint32_t)have.samples;
                          comp->audio_out_ready = 1u;
                          cpu_host_hal_audio_pause(comp->audio_out_dev, 0);
                      } else {
                          cpu_host_hal_audio_close(comp->audio_out_dev);
                          comp->audio_out_dev = 0u;
                          comp->audio_device_samples = 0u;
                      }
                  } else if (comp->audio_out_dev != 0u) {
                      cpu_host_hal_audio_close(comp->audio_out_dev);
                      comp->audio_out_dev = 0u;
                      comp->audio_device_samples = 0u;
                  }
              }
          }
          comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
          {
              int32_t kc_sem = cpu_host_hal_key_from_scancode(CPU_HOST_SCANCODE(SEMICOLON));
              int32_t kc_slash = cpu_host_hal_key_from_scancode(CPU_HOST_SCANCODE(SLASH));
              comp->swap_semicolon_slash = (kc_slash == CPU_HOST_KEYCODE_SEMICOLON && kc_sem != CPU_HOST_KEYCODE_SEMICOLON) ? 1u : 0u;
          }
          comp->sdl_inited = 1u;
      } while (0);
    reset: |
      comp->frame_count = 0u;
      comp->row0 = 0xFFu;
      comp->row1 = 0xFFu;
      comp->row2 = 0xFFu;
      comp->row3 = 0xFFu;
      comp->row4 = 0xFFu;
      comp->row5 = 0xFFu;
      comp->row6 = 0xFFu;
      comp->row7 = 0xFFu;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->audio_last_cycle = 0u;
      comp->audio_sample_cursor = 0u;
      comp->audio_level = 0;
      comp->last_event_poll_cycle = 0u;
      comp->overlay_last_ms = 0u;
      comp->overlay_last_frame_count = 0u;
      comp->overlay_last_cycle_count = 0u;
      comp->overlay_fps_x100 = 0u;
      comp->overlay_cpu_hz = 0u;
      comp->overlay_cpu_pct_x10 = 0u;
      if (comp->audio_out_dev != 0u) cpu_host_hal_audio_clear(comp->audio_out_dev);
    step_post: |
      if (comp->sdl_inited == 0u) return;
      {
          uint64_t now = cpu->total_cycles;
          if ((now - comp->last_event_poll_cycle) < 2048u) {
              return;
          }
          comp->last_event_poll_cycle = now;
      }
      CPUHostEvent ev;
      while (cpu_host_hal_poll_event(&ev)) {
          if (cpu_host_hal_event_type(&ev) == CPU_HOST_EVENT_QUIT) {
              cpu->running = false;
              cpu->halted = true;
              return;
          }
      }
      cpu_host_hal_pump_events();
      comp->has_keyboard_focus = cpu_host_hal_window_has_focus(comp->window);
      {
          sms_overlay_update_perf(
              cpu_host_hal_ticks_ms(),
              (uint64_t)comp->frame_count,
              cpu->total_cycles,
              (uint64_t)CPU_SYSTEM_CLOCK_HZ,
              &comp->overlay_last_ms,
              &comp->overlay_last_frame_count,
              &comp->overlay_last_cycle_count,
              &comp->overlay_fps_x100,
              &comp->overlay_cpu_hz,
              &comp->overlay_cpu_pct_x10
          );
      }
      {
          int key_count = 0;
          const uint8_t *ks = cpu_host_hal_keyboard_state(&key_count);
          uint8_t rows[8] = { 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu, 0xFFu };
          if (ks != NULL && key_count > 0) {
              cpu_component_apply_declared_keymap(
                  cpu,
                  "host_c64_sdl2",
                  ks,
                  (size_t)key_count,
                  rows,
                  8u,
                  comp->has_keyboard_focus
              );
              if (
                  comp->swap_semicolon_slash != 0u &&
                  (size_t)CPU_HOST_SCANCODE(SEMICOLON) < (size_t)key_count &&
                  (size_t)CPU_HOST_SCANCODE(SLASH) < (size_t)key_count
              ) {
                  uint8_t sem_down = (ks[CPU_HOST_SCANCODE(SEMICOLON)] != 0u) ? 1u : 0u;
                  uint8_t slash_down = (ks[CPU_HOST_SCANCODE(SLASH)] != 0u) ? 1u : 0u;
                  rows[5] = (uint8_t)(rows[5] | (uint8_t)(1u << 5)); /* clear C64 ':' bit */
                  rows[6] = (uint8_t)(rows[6] | (uint8_t)(1u << 7)); /* clear C64 '/' bit */
                  if (slash_down != 0u) rows[5] = (uint8_t)(rows[5] & (uint8_t)~(uint8_t)(1u << 5));
                  if (sem_down != 0u) rows[6] = (uint8_t)(rows[6] & (uint8_t)~(uint8_t)(1u << 7));
              }
          }
          comp->row0 = rows[0];
          comp->row1 = rows[1];
          comp->row2 = rows[2];
          comp->row3 = rows[3];
          comp->row4 = rows[4];
          comp->row5 = rows[5];
          comp->row6 = rows[6];
          comp->row7 = rows[7];
      }
      if (comp->audio_out_dev != 0u && comp->audio_out_ready != 0u && comp->audio_ring != NULL && comp->audio_ring_fill > 0u) {
          uint32_t queued_samples = cpu_host_hal_audio_queued_bytes(comp->audio_out_dev) / (uint32_t)sizeof(int16_t);
          uint32_t device_samples = (comp->audio_device_samples > 0u) ? comp->audio_device_samples : 512u;
          uint32_t low_watermark = device_samples * 2u;
          uint32_t target_total = device_samples * 4u;
          uint32_t max_total = device_samples * 8u;
          if (queued_samples + comp->audio_ring_fill > max_total) {
              uint32_t desired_ring_fill = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;
              while (comp->audio_ring_fill > desired_ring_fill) {
                  comp->audio_ring_read_idx += 1u;
                  if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  comp->audio_ring_fill -= 1u;
              }
          }
          if (queued_samples < low_watermark) {
              uint32_t desired = (queued_samples < target_total) ? (target_total - queued_samples) : 0u;
              uint32_t to_send = (comp->audio_ring_fill < desired) ? comp->audio_ring_fill : desired;
              while (to_send > 0u) {
                  int16_t chunk[1024];
                  uint32_t n = (to_send > 1024u) ? 1024u : to_send;
                  for (uint32_t i = 0u; i < n; ++i) {
                      chunk[i] = comp->audio_ring[comp->audio_ring_read_idx];
                      comp->audio_ring_read_idx += 1u;
                      if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  }
                  comp->audio_ring_fill -= n;
                  if (cpu_host_hal_audio_queue(comp->audio_out_dev, chunk, n * (uint32_t)sizeof(int16_t)) != 0) {
                      break;
                  }
                  to_send -= n;
              }
          }
      }
    destroy: |
      if (comp->audio_out_dev != 0u) {
          cpu_host_hal_audio_clear(comp->audio_out_dev);
          cpu_host_hal_audio_close(comp->audio_out_dev);
          comp->audio_out_dev = 0u;
      }
      if (comp->audio_ring != NULL) {
          cpu_host_hal_free(comp->audio_ring);
          comp->audio_ring = NULL;
      }
      comp->audio_out_ready = 0u;
      comp->audio_device_samples = 0u;
      comp->audio_ring_capacity = 0u;
      comp->audio_ring_read_idx = 0u;
      comp->audio_ring_write_idx = 0u;
      comp->audio_ring_fill = 0u;
      comp->audio_rate = 0u;
      comp->audio_last_cycle = 0u;
      comp->audio_sample_cursor = 0u;
      comp->audio_level = 0;
      if (comp->texture != NULL) {
          cpu_host_hal_destroy_texture(comp->texture);
          comp->texture = NULL;
      }
      if (comp->renderer != NULL) {
          cpu_host_hal_destroy_renderer(comp->renderer);
          comp->renderer = NULL;
      }
      if (comp->window != NULL) {
          cpu_host_hal_destroy_window(comp->window);
          comp->window = NULL;
      }
      if (comp->sdl_inited != 0u) {
          cpu_host_hal_quit_subsystems();
          cpu_host_hal_quit();
          comp->sdl_inited = 0u;
      }
  callback_handlers:
    keyboard_matrix: |
      uint8_t row = (argc > 0) ? (uint8_t)(args[0] & 0x07u) : 0u;
      switch (row) {
          case 0u: return (uint64_t)comp->row0;
          case 1u: return (uint64_t)comp->row1;
          case 2u: return (uint64_t)comp->row2;
          case 3u: return (uint64_t)comp->row3;
          case 4u: return (uint64_t)comp->row4;
          case 5u: return (uint64_t)comp->row5;
          case 6u: return (uint64_t)comp->row6;
          case 7u: return (uint64_t)comp->row7;
          default: return 0xFFu;
      }
  handler_bodies:
    video_frame: |
      if (comp->sdl_inited == 0u || argc < 4) return;
      void *renderer = comp->renderer;
      void *texture = comp->texture;
      uint32_t frame = (uint32_t)(args[0] & 0xFFFFFFFFu);
      uint32_t *pixels = (uint32_t *)(uintptr_t)args[1];
      uint32_t w = (uint32_t)(args[2] & 0xFFFFFFFFu);
      uint32_t h = (uint32_t)(args[3] & 0xFFFFFFFFu);
      if (renderer == NULL || texture == NULL || pixels == NULL || w == 0u || h == 0u) return;
      comp->frame_count = frame;
      if (cpu->debug_overlay_enabled) {
          sms_overlay_draw_perf(
              pixels,
              w,
              h,
              comp->overlay_fps_x100,
              comp->overlay_cpu_hz,
              comp->overlay_cpu_pct_x10
          );
      }
      if (comp->texture_w != w || comp->texture_h != h) {
          cpu_host_hal_destroy_texture(texture);
          texture = cpu_host_hal_create_texture(renderer, CPU_HOST_PIXELFORMAT_ARGB8888, CPU_HOST_TEXTUREACCESS_STREAMING, (int)w, (int)h);
          if (texture == NULL) return;
          comp->texture = (void *)texture;
          comp->texture_w = w;
          comp->texture_h = h;
      }
      if (cpu_host_hal_update_texture(texture, NULL, pixels, (int)(w * sizeof(uint32_t))) != 0) return;
      cpu_host_hal_render_set_draw_color(renderer, 0, 0, 0, 255);
      cpu_host_hal_render_clear(renderer);
      {
          int ww = 0;
          int wh = 0;
          CPUHostRect dst;
          int scaled_w = 0;
          int scaled_h = 0;
          if (cpu_host_hal_renderer_output_size(renderer, &ww, &wh) != 0 || ww <= 0 || wh <= 0) return;
          scaled_w = ww;
          scaled_h = (int)((((int64_t)ww) * (int64_t)h) / (int64_t)w);
          if (scaled_h > wh) {
              scaled_h = wh;
              scaled_w = (int)((((int64_t)wh) * (int64_t)w) / (int64_t)h);
          }
          dst.w = (scaled_w > 0) ? scaled_w : ww;
          dst.h = (scaled_h > 0) ? scaled_h : wh;
          dst.x = (ww - dst.w) / 2;
          dst.y = (wh - dst.h) / 2;
          if (cpu_host_hal_render_copy(renderer, texture, NULL, &dst) != 0) return;
      }
      cpu_host_hal_render_present(renderer);
    audio_pcm: |
      if (argc == 0) return;
      {
          uint8_t level8 = (uint8_t)(args[0] & 0xFFu);
          uint64_t src_cycle = (argc > 1) ? args[1] : cpu->total_cycles;
          int16_t cur = (int16_t)(((int16_t)(int)level8 - 128) << 8);
          int16_t prev = comp->audio_level;
          uint32_t rate = (comp->audio_rate > 0u) ? comp->audio_rate : ((CPU_AUDIO_SAMPLE_RATE > 0u) ? CPU_AUDIO_SAMPLE_RATE : 44100u);
          uint64_t hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? CPU_SYSTEM_CLOCK_HZ : 1u;
          uint64_t target_sample = (src_cycle * (uint64_t)rate) / hz;

          comp->audio_last_cycle = src_cycle;
          if (comp->audio_sample_cursor == 0u) comp->audio_sample_cursor = target_sample;

          if (comp->audio_ring != NULL && comp->audio_ring_capacity > 0u) {
              if (target_sample > comp->audio_sample_cursor) {
                  uint64_t gap = target_sample - comp->audio_sample_cursor;
                  while (gap > 0u) {
                      uint64_t n = (gap > 4096u) ? 4096u : gap;
                      for (uint64_t i = 0u; i < n; ++i) {
                          if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
                              comp->audio_ring_read_idx += 1u;
                              if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                              comp->audio_ring_fill -= 1u;
                          }
                          comp->audio_ring[comp->audio_ring_write_idx] = prev;
                          comp->audio_ring_write_idx += 1u;
                          if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
                          comp->audio_ring_fill += 1u;
                      }
                      comp->audio_sample_cursor += n;
                      gap -= n;
                  }
              }

              if (comp->audio_ring_fill >= comp->audio_ring_capacity) {
                  comp->audio_ring_read_idx += 1u;
                  if (comp->audio_ring_read_idx >= comp->audio_ring_capacity) comp->audio_ring_read_idx = 0u;
                  comp->audio_ring_fill -= 1u;
              }
              comp->audio_ring[comp->audio_ring_write_idx] = cur;
              comp->audio_ring_write_idx += 1u;
              if (comp->audio_ring_write_idx >= comp->audio_ring_capacity) comp->audio_ring_write_idx = 0u;
              comp->audio_ring_fill += 1u;
          }

          comp->audio_level = cur;
          if (target_sample >= comp->audio_sample_cursor) comp->audio_sample_cursor = target_sample + 1u;
      }

