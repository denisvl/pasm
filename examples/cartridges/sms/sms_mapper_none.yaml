metadata:
  id: sms_cart0
  type: cartridge_mapper
  model: sms_mapper_none
  version: "1.0"

state:
  - name: rom_data
    type: uint8_t *
    initial: "NULL"
  - name: rom_size
    type: uint32_t
    initial: "0"
  - name: bios_visible
    type: uint8_t
    initial: "1"

interfaces:
  callbacks: []
  handlers: []
  signals: []

maps:
  memory:
    ranges:
      - name: cart_window
        start: 0x0000
        size: 0xC000
        access: [read]
  ports:
    write:
      - name: memory_ctrl
        mask: 0x00FF
        value: 0x003E

behavior:
  snippets:
    reset: |
      comp->bios_visible = (cpu->memory[0] != 0u || cpu->memory[1] != 0u) ? 1u : 0u;
    destroy: |
      if (comp->rom_data != NULL) {
          free(comp->rom_data);
          comp->rom_data = NULL;
      }
      comp->rom_size = 0u;
    port_write_pre: |
      if ((((uint16_t)port) & 0x00FFu) == 0x003Eu) {
          comp->bios_visible = ((value & 0x08u) == 0u) ? 1u : 0u;
          return;
      }
    mem_read_pre: |
      if (addr < 0xC000u) {
          if (comp->bios_visible != 0u && addr < 0x8000u) {
              return cpu->memory[addr];
          }
          if (comp->rom_data == NULL || comp->rom_size == 0u) {
              return 0xFFu;
          }
          {
              uint32_t off = (uint32_t)addr;
              if (off < comp->rom_size) {
                  return comp->rom_data[off];
              }
          }
          return 0xFFu;
      }
  callback_handlers: {}
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
