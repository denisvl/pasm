metadata:
  id: sms_cart0
  type: cartridge_mapper
  model: sms_mapper_korean_msx_8k
  version: "1.0"

state:
  - name: rom_data
    type: uint8_t *
    initial: "NULL"
  - name: rom_size
    type: uint32_t
    initial: "0"
  - name: bios_visible
    type: uint8_t
    initial: "1"
  - name: bank0
    type: uint8_t
    initial: "0"
  - name: bank1
    type: uint8_t
    initial: "1"
  - name: bank2
    type: uint8_t
    initial: "2"
  - name: bank3
    type: uint8_t
    initial: "3"
  - name: bank4
    type: uint8_t
    initial: "4"
  - name: bank5
    type: uint8_t
    initial: "5"

interfaces:
  callbacks: []
  handlers: []
  signals: []

maps:
  memory:
    ranges:
      - name: cart_window
        start: 0x0000
        size: 0xC000
        access: [read, write]
  ports:
    write:
      - name: memory_ctrl
        mask: 0x00FF
        value: 0x003E

behavior:
  snippets:
    reset: |
      comp->bank0 = 0u;
      comp->bank1 = 1u;
      comp->bank2 = 2u;
      comp->bank3 = 3u;
      comp->bank4 = 4u;
      comp->bank5 = 5u;
      comp->bios_visible = (cpu->memory[0] != 0u || cpu->memory[1] != 0u) ? 1u : 0u;
    destroy: |
      if (comp->rom_data != NULL) {
          free(comp->rom_data);
          comp->rom_data = NULL;
      }
      comp->rom_size = 0u;
    port_write_pre: |
      if ((((uint16_t)port) & 0x00FFu) == 0x003Eu) {
          comp->bios_visible = ((value & 0x08u) == 0u) ? 1u : 0u;
          return;
      }
    mem_read_pre: |
      if (addr < 0xC000u) {
          if (comp->bios_visible != 0u && addr < 0x8000u) {
              return cpu->memory[addr];
          }
          if (comp->rom_data == NULL || comp->rom_size == 0u) return 0xFFu;
          {
              uint32_t bank_size = 0x2000u;
              uint32_t bank_count = (comp->rom_size + (bank_size - 1u)) / bank_size;
              uint8_t page = (uint8_t)(((uint32_t)addr) >> 13);
              uint32_t bank = 0u;
              uint32_t off;
              if (bank_count == 0u) return 0xFFu;
              switch (page) {
                  case 0u: bank = comp->bank0; break;
                  case 1u: bank = comp->bank1; break;
                  case 2u: bank = comp->bank2; break;
                  case 3u: bank = comp->bank3; break;
                  case 4u: bank = comp->bank4; break;
                  default: bank = comp->bank5; break;
              }
              bank %= bank_count;
              off = bank * bank_size + (((uint32_t)addr) & 0x1FFFu);
              if (off < comp->rom_size) return comp->rom_data[off];
          }
          return 0xFFu;
      }
    mem_write_pre: |
      if (addr <= 0x0005u) {
          switch (addr) {
              case 0x0000u: comp->bank0 = value; break;
              case 0x0001u: comp->bank1 = value; break;
              case 0x0002u: comp->bank2 = value; break;
              case 0x0003u: comp->bank3 = value; break;
              case 0x0004u: comp->bank4 = value; break;
              case 0x0005u: comp->bank5 = value; break;
              default: break;
          }
          return;
      }
  callback_handlers: {}
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
