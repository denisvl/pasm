metadata:
  name: Apple2InteractiveSystem
  version: "0.1"

clock_hz: 1023000
reset_delay_seconds: 0

memory:
  default_size: 65536
  regions:
    - name: RAM_MAIN
      start: 0x0000
      size: 0xC000     # RAM from $0000 to $BFFF
      read_write: true
    # Note: $C000-$CFFF is handled by Apple II softswitch IC components.
    - name: ROM_SYSTEM
      start: 0xD000    # Standard Apple II ROM start
      size: 0x3000     # 12KB (Applesoft + Monitor)
      read_only: true
  rom_images:
    - name: apple2plus_rom
      file: ../../roms/apple2/apple2.rom
      target_region: ROM_SYSTEM
      offset: 0        # Ensure your .rom file is exactly 12,288 bytes

hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false

components:
  ics:
    - apple2_keyboard_encoder
    - apple2_gameio
    - apple2_video_softswitches
    - apple2_speaker_toggle
    - apple2_char_rom
    - apple2_slot_decoder
    - apple2_main_ram
  devices:
    - keyboard_apple2
    - gameport_apple2
    - video_apple2
    - speaker_apple2
  hosts:
    - host_apple2

connections:
  - from:
      component: apple2_keyboard_encoder
      kind: callback
      name: keyboard_ascii
    to:
      component: keyboard_apple2
      kind: callback
      name: read_key

  - from:
      component: keyboard_apple2
      kind: callback
      name: host_key
    to:
      component: host_apple2
      kind: callback
      name: keyboard_ascii

  - from:
      component: apple2_gameio
      kind: callback
      name: read_paddle0
    to:
      component: gameport_apple2
      kind: callback
      name: read_paddle0

  - from:
      component: apple2_gameio
      kind: callback
      name: read_paddle1
    to:
      component: gameport_apple2
      kind: callback
      name: read_paddle1

  - from:
      component: apple2_gameio
      kind: callback
      name: read_button0
    to:
      component: gameport_apple2
      kind: callback
      name: read_button0

  - from:
      component: apple2_gameio
      kind: callback
      name: read_button1
    to:
      component: gameport_apple2
      kind: callback
      name: read_button1

  - from:
      component: gameport_apple2
      kind: callback
      name: host_paddle0
    to:
      component: host_apple2
      kind: callback
      name: joystick_paddle0

  - from:
      component: gameport_apple2
      kind: callback
      name: host_paddle1
    to:
      component: host_apple2
      kind: callback
      name: joystick_paddle1

  - from:
      component: gameport_apple2
      kind: callback
      name: host_button0
    to:
      component: host_apple2
      kind: callback
      name: joystick_button0

  - from:
      component: gameport_apple2
      kind: callback
      name: host_button1
    to:
      component: host_apple2
      kind: callback
      name: joystick_button1

  - from:
      component: apple2_video_softswitches
      kind: signal
      name: frame_ready
    to:
      component: video_apple2
      kind: handler
      name: on_frame_ready

  - from:
      component: video_apple2
      kind: signal
      name: frame_present
    to:
      component: host_apple2
      kind: handler
      name: video_frame

  - from:
      component: apple2_speaker_toggle
      kind: signal
      name: audio_level
    to:
      component: speaker_apple2
      kind: handler
      name: on_audio_level

  - from:
      component: speaker_apple2
      kind: signal
      name: pcm_sample
    to:
      component: host_apple2
      kind: handler
      name: audio_pcm

audio:
  sample_rate: 44100
  format: s16le
  channels: 1

integrations:
  profile: apple2_interactive
