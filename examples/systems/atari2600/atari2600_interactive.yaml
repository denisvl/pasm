metadata:
  name: MOS6502Atari2600InteractiveSystem
  version: "0.1"

clock_hz: 1193191
reset_delay_seconds: 0

memory:
  default_size: 8192

hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false

components:
  ics:
    - atari2600_io
  devices:
    - video_atari2600
    - speaker_atari2600
  hosts:
    - host_atari2600
  cartridge: atari2600_cart0

connections:
  - from:
      component: atari2600_io
      kind: callback
      name: joy0_read
    to:
      component: host_atari2600
      kind: callback
      name: read_joy1

  - from:
      component: atari2600_io
      kind: callback
      name: joy1_read
    to:
      component: host_atari2600
      kind: callback
      name: read_joy2

  - from:
      component: atari2600_io
      kind: callback
      name: console_read
    to:
      component: host_atari2600
      kind: callback
      name: read_console

  - from:
      component: atari2600_io
      kind: signal
      name: frame_ready
    to:
      component: video_atari2600
      kind: handler
      name: on_frame_ready

  - from:
      component: video_atari2600
      kind: signal
      name: frame_present
    to:
      component: host_atari2600
      kind: handler
      name: video_frame

  - from:
      component: atari2600_io
      kind: signal
      name: audio_level
    to:
      component: speaker_atari2600
      kind: handler
      name: on_audio_level

  - from:
      component: speaker_atari2600
      kind: signal
      name: pcm_sample
    to:
      component: host_atari2600
      kind: handler
      name: audio_pcm

audio:
  sample_rate: 44100
  format: s16le
  channels: 1

integrations:
  profile: atari2600_interactive
