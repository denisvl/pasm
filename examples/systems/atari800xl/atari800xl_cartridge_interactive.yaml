audio:
  sample_rate: 44100
  format: s16le
  channels: 1
integrations:
  profile: atari800xl_cartridge_interactive
display:
  default_component: tv
  default_model: generic_crt_tv_mono
  runtime_switchable: true
  available_models:
  - component: tv
    model: generic_crt_tv_mono
  - component: tv
    model: generic_crt_tv_stereo
  - component: tv
    model: generic_lcd_tv_stereo
  - component: monitor
    model: generic_crt_monitor_green
  - component: monitor
    model: generic_crt_monitor_color
  - component: monitor
    model: generic_lcd_monitor
  - component: monitor
    model: generic_lcd_monitor_with_speakers
