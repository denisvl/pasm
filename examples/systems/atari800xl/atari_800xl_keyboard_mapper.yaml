image:
  file: atari_800XL_keyboard.jpg
  width_px: 947
  height_px: 327
  origin: top-left
  bbox_format:
    x: left
    y: top
    width: pixels
    height: pixels
  approximate: true
  notes:
  - Bounding boxes are approximate and were derived from the visible key extents in the provided image.
  - Legends are listed in visual order when multiple markings appear on the same key.
  - The field legend_combos maps each visible legend to the physical key combination used to produce it.
  - For ordinary symbol keys, the lower legend was treated as the unmodified key and the upper legend as SHIFT + key.
  - 'For Atari cursor legends, CTRL combinations were inferred from the standard Atari keyboard behavior: CTRL+- = cursor up, CTRL+= = cursor
    down, CTRL++ = cursor left, CTRL+* = cursor right.'
  - Some mixed function/symbol keys such as CLR/SET/TAB, CLEAR/<, and INSERT/> were inferred from the visible layout and may need confirmation
    against a specific Atari 800XL manual.
