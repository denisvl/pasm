metadata:
  name: C64InteractiveSystem
  version: "1.0"

clock_hz: 1022727
reset_delay_seconds: 0

memory:
  default_size: 65536
  regions:
    - name: RAM_LO
      start: 0x0000
      size: 0xA000
      read_write: true
    - name: ROM_BASIC
      start: 0xA000
      size: 0x2000
      read_only: true
    - name: RAM_MID
      start: 0xC000
      size: 0x1000
      read_write: true
    - name: ROM_CHAR
      start: 0xD000
      size: 0x1000
      read_only: true
    - name: ROM_KERNAL
      start: 0xE000
      size: 0x2000
      read_only: true
  rom_images:
    - name: c64_basic_rom
      file: ../roms/basic.901226-01.bin
      target_region: ROM_BASIC
      offset: 0
    - name: c64_char_rom
      file: ../roms/characters.901225-01.bin
      target_region: ROM_CHAR
      offset: 0
    - name: c64_kernal_rom
      file: ../roms/kernal.901227-03.bin
      target_region: ROM_KERNAL
      offset: 0

hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false

components:
  ics:
    - c64_io
  devices:
    - keyboard_c64
    - video_c64
    - speaker_c64
  hosts:
    - host_c64_sdl2

connections:
  - from:
      component: c64_io
      kind: callback
      name: keyboard_row
    to:
      component: keyboard_c64
      kind: callback
      name: read_row

  - from:
      component: keyboard_c64
      kind: callback
      name: host_matrix
    to:
      component: host_c64_sdl2
      kind: callback
      name: keyboard_matrix

  - from:
      component: c64_io
      kind: signal
      name: frame_ready
    to:
      component: video_c64
      kind: handler
      name: on_frame_ready

  - from:
      component: video_c64
      kind: signal
      name: frame_present
    to:
      component: host_c64_sdl2
      kind: handler
      name: video_frame

  - from:
      component: c64_io
      kind: signal
      name: audio_level
    to:
      component: speaker_c64
      kind: handler
      name: on_audio_level

  - from:
      component: speaker_c64
      kind: signal
      name: pcm_sample
    to:
      component: host_c64_sdl2
      kind: handler
      name: audio_pcm

audio:
  sample_rate: 44100
  format: s16le
  channels: 1

integrations:
  profile: c64_interactive
