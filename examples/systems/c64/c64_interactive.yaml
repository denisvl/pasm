metadata:
  name: C64InteractiveSystem
  version: '1.0'
clock_hz: 1022727
reset_delay_seconds: 0
memory:
  default_size: 65536
  regions:
  - name: RAM_LO
    start: 0
    size: 32768
    read_write: true
  - name: CART_8K
    start: 32768
    size: 8192
    read_only: true
  - name: ROM_BASIC
    start: 40960
    size: 8192
    read_only: true
  - name: RAM_MID
    start: 49152
    size: 4096
    read_write: true
  - name: ROM_CHAR
    start: 53248
    size: 4096
    read_only: true
  - name: ROM_KERNAL
    start: 57344
    size: 8192
    read_only: true
  rom_images:
  - name: c64_basic_rom
    file: ../../roms/c64/basic.901226-01.bin
    target_region: ROM_BASIC
    offset: 0
  - name: c64_char_rom
    file: ../../roms/c64/characters.901225-01.bin
    target_region: ROM_CHAR
    offset: 0
  - name: c64_kernal_rom
    file: ../../roms/c64/kernal.901227-03.bin
    target_region: ROM_KERNAL
    offset: 0
hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false
components:
  ics:
  - c64_vic_ii
  - c64_sid
  - c64_cia1
  - c64_cia2
  - c64_color_ram
  - c64_pla
  - c64_main_ram
  devices:
  - keyboard_c64
  - joystick_c64
  - video_c64
  - tv
  hosts:
  - host_c64_sdl2
connections:
- from:
    component: c64_pla
    kind: callback
    name: keyboard_row
  to:
    component: keyboard_c64
    kind: callback
    name: read_row
- from:
    component: keyboard_c64
    kind: callback
    name: host_matrix
  to:
    component: host_c64_sdl2
    kind: callback
    name: keyboard_matrix
- from:
    component: c64_pla
    kind: callback
    name: joystick_port
  to:
    component: joystick_c64
    kind: callback
    name: read_port
- from:
    component: joystick_c64
    kind: callback
    name: host_port
  to:
    component: host_c64_sdl2
    kind: callback
    name: joystick_port
- from:
    component: c64_pla
    kind: signal
    name: frame_ready
  to:
    component: video_c64
    kind: handler
    name: on_frame_ready
- from:
    component: video_c64
    kind: signal
    name: frame_present
  to:
    component: tv
    kind: handler
    name: on_frame_present
- from:
    component: c64_pla
    kind: signal
    name: audio_level
  to:
    component: tv
    kind: handler
    name: on_audio_level
- from:
    component: tv
    kind: signal
    name: frame_present
  to:
    component: host_c64_sdl2
    kind: handler
    name: video_frame
- from:
    component: tv
    kind: signal
    name: pcm_sample
  to:
    component: host_c64_sdl2
    kind: handler
    name: audio_pcm
audio:
  sample_rate: 44100
  format: s16le
  channels: 1
integrations:
  profile: c64_interactive
display:
  default_component: tv
  default_model: generic_crt_tv_mono
  runtime_switchable: true
  available_models:
  - component: tv
    model: generic_crt_tv_mono
  - component: tv
    model: generic_crt_tv_stereo
  - component: tv
    model: generic_lcd_tv_stereo
  - component: monitor
    model: generic_crt_monitor_green
  - component: monitor
    model: generic_crt_monitor_color
  - component: monitor
    model: generic_lcd_monitor
  - component: monitor
    model: generic_lcd_monitor_with_speakers
