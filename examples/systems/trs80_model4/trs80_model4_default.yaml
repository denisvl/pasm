metadata:
  name: Z80TRS80Model4DefaultSystem
  version: '0.1'
clock_hz: 4000000
reset_delay_seconds: 5
memory:
  default_size: 65536
  regions:
  - name: ROM_BOOT
    start: 0
    size: 14336
    read_only: true
  - name: RAM_MAIN
    start: 14336
    size: 49152
    read_write: true
  - name: VIDEO_RAM
    start: 63488
    size: 2048
    read_write: true
  rom_images:
  - name: trs80_model4_rom
    file: ../../roms/trs80_model4/model4.rom
    target_region: ROM_BOOT
    offset: 0
hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false
components:
  ics:
  - trs80_m4io
  - trs80_m4ga
  - trs80_m4ram
  - wd1793_fdc
  - trs80_m4ppi
  - trs80_m4sio
  - trs80_m4video
  - trs80_m4irq
  - trs80_m4cass
  devices:
  - keyboard_trs80
  - video_trs80
  - speaker
  - trs80_floppy_image_backend
  - cassette_transport
  - monitor
  hosts:
  - host_trs80
  cassette: cassette_transport
  floppy: wd1793_fdc
media_picker:
  open_action_id: EMU_MEDIA_PICKER
cassette:
  component: cassette_transport
  directory: examples/cassettes/trs80_model4
  allowed_extensions: [yaml, wav]
  sources:
    - kind: file
      source_type: ../../cassette_sources/wav_file.yaml
      component: cassette_transport
      label: Tape File
      allowed_extensions: [yaml, wav]
    - kind: line_in
      source_type: ../../cassette_sources/line_in.yaml
      component: cassette_transport
      label: Line In
  controls:
    picker_action_id: EMU_MEDIA_PICKER
    play_action_id: EMU_CASSETTE_PLAY
    pause_action_id: EMU_CASSETTE_PAUSE
    stop_action_id: EMU_CASSETTE_STOP
    record_action_id: EMU_CASSETTE_RECORD
    volume_up_action_id: EMU_CASSETTE_VOL_UP
    volume_down_action_id: EMU_CASSETTE_VOL_DOWN
    bass_up_action_id: EMU_CASSETTE_BASS_UP
    bass_down_action_id: EMU_CASSETTE_BASS_DOWN
    treble_up_action_id: EMU_CASSETTE_TREBLE_UP
    treble_down_action_id: EMU_CASSETTE_TREBLE_DOWN
floppy:
  directory: examples/floppies/trs80_model4
  sources:
    - kind: file
      source_type: ../../floppy_sources/dsk_file.yaml
      source_component: trs80_floppy_image_backend
      label: TRS-80 DSK Disk
      allowed_extensions: [dsk]
    - kind: file
      source_type: ../../floppy_sources/dmk_file.yaml
      source_component: trs80_floppy_image_backend
      label: TRS-80 DMK Disk
      allowed_extensions: [dmk]
    - kind: file
      source_type: ../../floppy_sources/jv3_file.yaml
      source_component: trs80_floppy_image_backend
      label: TRS-80 JV3 Disk
      allowed_extensions: [jv3]
    - kind: file
      source_type: ../../floppy_sources/jv1_file.yaml
      source_component: floppy_raw_sector_image_backend
      label: TRS-80 JV1 Disk
      allowed_extensions: [jv1]
  drives:
    - slot: 0
      label: Drive 0
      drive_type: ../../floppy_drives/trs80_model4_internal.yaml
      component: wd1793_fdc
  controls:
    picker_action_id: EMU_MEDIA_PICKER
connections:
- from:
    component: trs80_m4ppi
    kind: callback
    name: keyboard_read_row
  to:
    component: keyboard_trs80
    kind: callback
    name: read_row
- from:
    component: keyboard_trs80
    kind: callback
    name: host_matrix
  to:
    component: host_trs80
    kind: callback
    name: keyboard_matrix
- from:
    component: trs80_m4video
    kind: signal
    name: frame_ready
  to:
    component: video_trs80
    kind: handler
    name: on_frame_ready
- from:
    component: video_trs80
    kind: signal
    name: frame_present
  to:
    component: monitor
    kind: handler
    name: on_frame_present
- from:
    component: trs80_m4irq
    kind: signal
    name: irq_edge
  to:
    component: host_trs80
    kind: handler
    name: irq_edge
- from:
    component: trs80_m4io
    kind: signal
    name: audio_level
  to:
    component: speaker
    kind: handler
    name: on_audio_level
- from:
    component: speaker
    kind: signal
    name: pcm_sample
  to:
    component: host_trs80
    kind: handler
    name: audio_pcm
- from:
    component: trs80_m4cass
    kind: callback
    name: transport_sample_in
  to:
    component: cassette_transport
    kind: callback
    name: sample_input
- from:
    component: trs80_m4cass
    kind: callback
    name: transport_push_out
  to:
    component: cassette_transport
    kind: callback
    name: push_output_sample
- from:
    component: trs80_m4cass
    kind: callback
    name: transport_set_motor
  to:
    component: cassette_transport
    kind: callback
    name: set_motor
- from:
    component: monitor
    kind: signal
    name: frame_present
  to:
    component: host_trs80
    kind: handler
    name: video_frame
audio:
  sample_rate: 44100
  format: s16le
  channels: 1
integrations:
  profile: trs80_model4_default
display:
  default_component: monitor
  default_model: generic_crt_monitor_green
  runtime_switchable: true
  available_models:
  - component: tv
    model: generic_crt_tv_mono
  - component: tv
    model: generic_crt_tv_stereo
  - component: tv
    model: generic_lcd_tv_stereo
  - component: monitor
    model: generic_crt_monitor_green
  - component: monitor
    model: generic_crt_monitor_color
  - component: monitor
    model: generic_lcd_monitor
  - component: monitor
    model: generic_lcd_monitor_with_speakers
