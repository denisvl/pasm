metadata:
  name: Z80TRS80Model4InteractiveSystem
  version: "0.1"

clock_hz: 4000000
reset_delay_seconds: 5

memory:
  default_size: 65536
  regions:
    - name: ROM_BOOT
      start: 0x0000
      size: 0x3800
      read_only: true
    - name: RAM_MAIN
      start: 0x3800
      size: 0xC000
      read_write: true
    - name: VIDEO_RAM
      start: 0xF800
      size: 0x0800
      read_write: true
  rom_images:
    - name: trs80_model4_rom
      file: ../../roms/trs80_model4/model4.rom
      target_region: ROM_BOOT
      offset: 0

hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false

components:
  ics:
    - trs80_m4io
  devices:
    - keyboard_trs80
    - video_trs80
    - speaker_trs80
  hosts:
    - host_trs80

connections:
  - from:
      component: trs80_m4io
      kind: callback
      name: keyboard_read_row
    to:
      component: keyboard_trs80
      kind: callback
      name: read_row

  - from:
      component: keyboard_trs80
      kind: callback
      name: host_matrix
    to:
      component: host_trs80
      kind: callback
      name: keyboard_matrix

  - from:
      component: trs80_m4io
      kind: signal
      name: frame_ready
    to:
      component: video_trs80
      kind: handler
      name: on_frame_ready

  - from:
      component: video_trs80
      kind: signal
      name: frame_present
    to:
      component: host_trs80
      kind: handler
      name: video_frame

  - from:
      component: trs80_m4io
      kind: signal
      name: irq_edge
    to:
      component: host_trs80
      kind: handler
      name: irq_edge

  - from:
      component: trs80_m4io
      kind: signal
      name: audio_level
    to:
      component: speaker_trs80
      kind: handler
      name: on_audio_level

  - from:
      component: speaker_trs80
      kind: signal
      name: pcm_sample
    to:
      component: host_trs80
      kind: handler
      name: audio_pcm

audio:
  sample_rate: 44100
  format: s16le
  channels: 1

integrations:
  profile: trs80_model4_interactive

