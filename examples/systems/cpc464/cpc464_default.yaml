metadata:
  name: Z80AmstradCPC464DefaultSystem
  version: '0.1'
clock_hz: 4000000
reset_delay_seconds: 0
memory:
  default_size: 65536
  regions:
  - name: RAM_64K
    start: 0
    size: 65536
    read_write: true
  rom_images:
  - name: cpc464_os_rom
    file: ../../roms/cpc464/OS_464.ROM
    target_region: RAM_64K
    offset: 0
  - name: cpc464_basic_rom
    file: ../../roms/cpc464/BASIC_1.0.ROM
    target_region: RAM_64K
    offset: 49152
hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false
components:
  ics:
  - cpc_gate_array
  - cpc_crtc
  - cpc_ppi
  - cpc_psg
  - cpc464_ram
  devices:
  - keyboard_cpc
  - gameport_cpc
  - video_cpc
  - speaker
  - cassette_transport
  - monitor
  hosts:
  - host_cpc
  cassette: cassette_transport
cassette:
  component: cassette_transport
  directory: examples/cassettes/cpc464
  allowed_extensions: [yaml, wav, cdt]
  sources:
    - kind: file
      source_type: ../../cassette_sources/wav_file.yaml
      component: cassette_transport
      label: Tape File
      allowed_extensions: [yaml, wav]
    - kind: file
      source_type: ../../cassette_sources/cdt_file.yaml
      component: cassette_transport
      label: CDT Tape
      allowed_extensions: [cdt]
    - kind: line_in
      source_type: ../../cassette_sources/line_in.yaml
      component: cassette_transport
      label: Line In
  controls:
    picker_action_id: EMU_CASSETTE_PICKER
    play_action_id: EMU_CASSETTE_PLAY
    pause_action_id: EMU_CASSETTE_PAUSE
    stop_action_id: EMU_CASSETTE_STOP
    record_action_id: EMU_CASSETTE_RECORD
    volume_up_action_id: EMU_CASSETTE_VOL_UP
    volume_down_action_id: EMU_CASSETTE_VOL_DOWN
    bass_up_action_id: EMU_CASSETTE_BASS_UP
    bass_down_action_id: EMU_CASSETTE_BASS_DOWN
    treble_up_action_id: EMU_CASSETTE_TREBLE_UP
    treble_down_action_id: EMU_CASSETTE_TREBLE_DOWN
connections:
- from:
    component: cpc_ppi
    kind: callback
    name: keyboard_read_row
  to:
    component: keyboard_cpc
    kind: callback
    name: read_row
- from:
    component: keyboard_cpc
    kind: callback
    name: host_matrix
  to:
    component: host_cpc
    kind: callback
    name: keyboard_matrix
- from:
    component: cpc_ppi
    kind: callback
    name: controller_read_row
  to:
    component: gameport_cpc
    kind: callback
    name: read_row
- from:
    component: cpc_gate_array
    kind: callback
    name: crtc_read_reg
  to:
    component: cpc_crtc
    kind: callback
    name: read_reg
- from:
    component: cpc_gate_array
    kind: callback
    name: ppi_write_io_page
  to:
    component: cpc_ppi
    kind: callback
    name: write_io_page
- from:
    component: cpc_gate_array
    kind: callback
    name: ppi_read_port_c_raw
  to:
    component: cpc_ppi
    kind: callback
    name: read_port_c_latched
- from:
    component: cpc_gate_array
    kind: callback
    name: ppi_read_io_page
  to:
    component: cpc_ppi
    kind: callback
    name: read_io_page
- from:
    component: cpc_ppi
    kind: callback
    name: psg_bus_apply
  to:
    component: cpc_psg
    kind: callback
    name: bus_apply
- from:
    component: cpc_gate_array
    kind: callback
    name: psg_tick_audio
  to:
    component: cpc_psg
    kind: callback
    name: tick_audio
- from:
    component: gameport_cpc
    kind: callback
    name: host_matrix
  to:
    component: host_cpc
    kind: callback
    name: joystick_matrix
- from:
    component: cpc_gate_array
    kind: signal
    name: frame_ready
  to:
    component: video_cpc
    kind: handler
    name: on_frame_ready
- from:
    component: video_cpc
    kind: signal
    name: frame_present
  to:
    component: monitor
    kind: handler
    name: on_frame_present
- from:
    component: cpc_gate_array
    kind: signal
    name: irq_edge
  to:
    component: host_cpc
    kind: handler
    name: irq_edge
- from:
    component: cpc_gate_array
    kind: signal
    name: audio_level
  to:
    component: speaker
    kind: handler
    name: on_audio_level
- from:
    component: speaker
    kind: signal
    name: pcm_sample
  to:
    component: host_cpc
    kind: handler
    name: audio_pcm
- from:
    component: cassette_transport
    kind: signal
    name: playback_sample
  to:
    component: speaker
    kind: handler
    name: on_tape_playback_sample
- from:
    component: cassette_transport
    kind: signal
    name: tape_level
  to:
    component: cpc_ppi
    kind: handler
    name: tape_input
- from:
    component: monitor
    kind: signal
    name: frame_present
  to:
    component: host_cpc
    kind: handler
    name: video_frame
audio:
  sample_rate: 44100
  format: s16le
  channels: 1
integrations:
  profile: amstrad_cpc464_default
display:
  default_component: monitor
  default_model: generic_crt_monitor_color
  runtime_switchable: true
  available_models:
  - component: tv
    model: generic_crt_tv_mono
  - component: tv
    model: generic_crt_tv_stereo
  - component: tv
    model: generic_lcd_tv_stereo
  - component: monitor
    model: generic_crt_monitor_green
  - component: monitor
    model: generic_crt_monitor_color
  - component: monitor
    model: generic_lcd_monitor
  - component: monitor
    model: generic_lcd_monitor_with_speakers
