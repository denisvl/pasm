metadata:
  name: MC6809CoCo1DefaultSystem
  version: '0.1'
clock_hz: 894886
reset_delay_seconds: 0
memory:
  default_size: 65536
  regions:
  - name: RAM_LOWER
    start: 0
    size: 40960
    read_write: true
  - name: ROM_COCOROM_A000
    start: 40960
    size: 8192
    read_only: true
  - name: RAM_CART_WINDOW
    start: 49152
    size: 8192
    read_write: true
  - name: ROM_COCOROM_E000
    start: 57344
    size: 8192
    read_only: true
  rom_images:
  - name: coco_rom_primary
    file: ../../roms/coco1/coco.rom
    target_region: ROM_COCOROM_A000
    offset: 0
  - name: coco_rom_mirror
    file: ../../roms/coco1/coco.rom
    target_region: ROM_COCOROM_E000
    offset: 0
hooks:
  pre_fetch:
    enabled: false
  post_decode:
    enabled: false
  post_execute:
    enabled: false
  port_read_pre:
    enabled: false
  port_read_post:
    enabled: false
  port_write_pre:
    enabled: false
  port_write_post:
    enabled: false
components:
  ics:
  - coco1_sam_6883
  - coco1_pia0_6821
  - coco1_pia1_6821
  - coco1_vdg_6847
  - coco1_cart_expansion
  - coco1_main_ram
  devices:
  - keyboard_coco
  - gameport_coco
  - video_coco
  - speaker
  - cassette_transport
  - tv
  hosts:
  - host_coco
  cartridge: coco_cart0
  cassette: cassette_transport
cassette:
  component: cassette_transport
  directory: examples/cassettes/coco1
  allowed_extensions: [yaml, wav, cas]
  sources:
    - kind: file
      source_type: ../../cassette_sources/wav_file.yaml
      component: cassette_transport
      label: Tape File
      allowed_extensions: [yaml, wav]
    - kind: file
      source_type: ../../cassette_sources/coco_cas_file.yaml
      component: cassette_transport
      label: CoCo CAS Tape
      allowed_extensions: [cas]
    - kind: line_in
      source_type: ../../cassette_sources/line_in.yaml
      component: cassette_transport
      label: Line In
  controls:
    picker_action_id: EMU_CASSETTE_PICKER
    play_action_id: EMU_CASSETTE_PLAY
    play_sets_motor: false
    pause_action_id: EMU_CASSETTE_PAUSE
    stop_action_id: EMU_CASSETTE_STOP
    record_action_id: EMU_CASSETTE_RECORD
    volume_up_action_id: EMU_CASSETTE_VOL_UP
    volume_down_action_id: EMU_CASSETTE_VOL_DOWN
    bass_up_action_id: EMU_CASSETTE_BASS_UP
    bass_down_action_id: EMU_CASSETTE_BASS_DOWN
    treble_up_action_id: EMU_CASSETTE_TREBLE_UP
    treble_down_action_id: EMU_CASSETTE_TREBLE_DOWN
connections:
- from:
    component: coco1_sam_6883
    kind: callback
    name: keyboard_read_row
  to:
    component: keyboard_coco
    kind: callback
    name: read_row
- from:
    component: keyboard_coco
    kind: callback
    name: host_matrix
  to:
    component: host_coco
    kind: callback
    name: keyboard_matrix
- from:
    component: coco1_sam_6883
    kind: callback
    name: joystick_read_axis
  to:
    component: gameport_coco
    kind: callback
    name: read_axis
- from:
    component: coco1_sam_6883
    kind: callback
    name: joystick_read_button
  to:
    component: gameport_coco
    kind: callback
    name: read_button
- from:
    component: coco1_pia0_6821
    kind: callback
