metadata:
  id: cassette_msx_cas_source
  type: cassette_source_backend
  model: msx1_cassette_cas_source
  version: "1.0"

state:
  - name: selected_source_kind
    type: uint8_t
    initial: "0"
  - name: selected_source_index
    type: uint8_t
    initial: "0"
  - name: selected_source_model
    type: char *
    initial: "NULL"
  - name: selected_source_component
    type: char *
    initial: "NULL"
  - name: media_loaded
    type: uint8_t
    initial: "0"
  - name: transport_mode
    type: uint8_t
    initial: "0"
  - name: motor_on
    type: uint8_t
    initial: "0"
  - name: volume_percent
    type: uint8_t
    initial: "100"
  - name: bass_percent
    type: uint8_t
    initial: "50"
  - name: treble_percent
    type: uint8_t
    initial: "50"
  - name: media_path
    type: char *
    initial: "NULL"
  - name: edge_positions
    type: uint64_t *
    initial: "NULL"
  - name: edge_count
    type: uint32_t
    initial: "0"
  - name: edge_cap
    type: uint32_t
    initial: "0"
  - name: edge_index
    type: uint32_t
    initial: "0"
  - name: edge_initial_level
    type: uint8_t
    initial: "1"
  - name: signal_sample_rate
    type: uint32_t
    initial: "14976"
  - name: total_samples
    type: uint64_t
    initial: "0"
  - name: playhead_samples
    type: uint64_t
    initial: "0"
  - name: playhead_cycle_residue
    type: uint64_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: playback_level
    type: uint8_t
    initial: "255"

interfaces:
  callbacks:
    - name: select_source
      args: [u8, u8, ptr, ptr]
      returns: u8
    - name: load_media
      args: [ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: []
      returns: u8
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_edge_count
      args: []
      returns: u64
    - name: query_edge_initial_level
      args: []
      returns: u64
    - name: query_edge_fp
      args: [u32]
      returns: u64
    - name: query_sample_rate
      args: []
      returns: u64
    - name: query_playhead_samples
      args: []
      returns: u64
    - name: query_leader_start_sample
      args: []
      returns: u64
    - name: query_leader_start_index
      args: []
      returns: u64
    - name: query_leader_end_sample
      args: []
      returns: u64
    - name: query_leader_end_index
      args: []
      returns: u64
    - name: query_playback_level
      args: []
      returns: u64
    - name: query_volume_percent
      args: []
      returns: u64
    - name: set_playhead_fp
      args: [u64, u32]
      returns: u8
    - name: push_output_sample
      args: [u8, u64]
      returns: u8
  handlers: []
  signals: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->selected_source_kind = 0u;
      comp->selected_source_index = 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      comp->media_loaded = 0u;
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->volume_percent = 100u;
      comp->bass_percent = 50u;
      comp->treble_percent = 50u;
      comp->edge_count = 0u;
      comp->edge_cap = 0u;
      comp->edge_index = 0u;
      comp->edge_initial_level = 1u;
      comp->signal_sample_rate = 14976u;
      comp->total_samples = 0u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->playback_level = 255u;
    destroy: |
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      (void)cpu;
  callback_handlers:
    select_source: |
      const char *model = (argc > 2u && args[2] != 0u) ? (const char *)(uintptr_t)args[2] : NULL;
      const char *source_component = (argc > 3u && args[3] != 0u) ? (const char *)(uintptr_t)args[3] : NULL;
      comp->selected_source_kind = (argc > 0u) ? (uint8_t)(args[0] & 0xFFu) : 0u;
      comp->selected_source_index = (argc > 1u) ? (uint8_t)(args[1] & 0xFFu) : 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (model != NULL && model[0] != '\0') {
          comp->selected_source_model = strdup(model);
          if (comp->selected_source_model == NULL) return 0u;
      }
      if (source_component != NULL && source_component[0] != '\0') {
          comp->selected_source_component = strdup(source_component);
          if (comp->selected_source_component == NULL) return 0u;
      }
      return 1u;
    load_media: |
      if (argc < 1u || args[0] == 0u) return 0u;
      {
          static const uint8_t CAS_HEADER[8] = { 0x1F, 0xA6, 0xDE, 0xBA, 0xCC, 0x13, 0x7D, 0x74 };
          static const uint8_t ASCII_HEADER[10]  = { 0xEA, 0xEA, 0xEA, 0xEA, 0xEA, 0xEA, 0xEA, 0xEA, 0xEA, 0xEA };
          static const uint8_t BINARY_HEADER[10] = { 0xD0, 0xD0, 0xD0, 0xD0, 0xD0, 0xD0, 0xD0, 0xD0, 0xD0, 0xD0 };
          static const uint8_t BASIC_HEADER[10]  = { 0xD3, 0xD3, 0xD3, 0xD3, 0xD3, 0xD3, 0xD3, 0xD3, 0xD3, 0xD3 };
          enum { MSX_FILE_UNKNOWN = 0, MSX_FILE_ASCII = 1, MSX_FILE_BINARY = 2, MSX_FILE_BASIC = 3 };
          const char *path = (const char *)(uintptr_t)args[0];
          const char *source_model = (comp->selected_source_model != NULL) ? comp->selected_source_model : "";
          const char *dot = strrchr(path, '.');
          FILE *fp = NULL;
          uint8_t *buf = NULL;
          long file_size = 0;
          uint64_t *edges = NULL;
          uint32_t edge_count = 0u;
          uint32_t edge_cap = 0u;
          uint64_t sample_cursor = 0u;
          uint8_t signal_level = 1u;
          size_t pos = 0u;
          int header_found = 0;
          int issue_warning = 0;
          int first_file = 1;
          (void)first_file;
          if (comp->selected_source_kind != 0u) return 0u;
          if (source_model[0] != '\0' && strcmp(source_model, "msx1_cas_file_source") != 0) return 0u;
          if (dot == NULL || strcmp(dot, ".cas") != 0) return 0u;
          if (comp->edge_positions != NULL) {
              free(comp->edge_positions);
              comp->edge_positions = NULL;
          }
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          comp->edge_count = 0u;
          comp->edge_cap = 0u;
          comp->edge_index = 0u;
          comp->edge_initial_level = 1u;
          comp->total_samples = 0u;
          comp->playhead_samples = 0u;
          comp->playhead_cycle_residue = 0u;
          comp->playback_level = 255u;
          comp->media_loaded = 0u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          fp = fopen(path, "rb");
          if (fp == NULL) return 0u;
          if (fseek(fp, 0L, SEEK_END) != 0) {
              fclose(fp);
              return 0u;
          }
          file_size = ftell(fp);
          if (file_size <= 0) {
              fclose(fp);
              return 0u;
          }
          if (fseek(fp, 0L, SEEK_SET) != 0) {
              fclose(fp);
              return 0u;
          }
          buf = (uint8_t *)malloc((size_t)file_size);
          if (buf == NULL) {
              fclose(fp);
              return 0u;
          }
          if (fread(buf, 1, (size_t)file_size, fp) != (size_t)file_size) {
              free(buf);
              fclose(fp);
              return 0u;
          }
          fclose(fp);
          #define MSX_APPEND_EDGE(sample_pos) \
              do { \
                  if (edge_count >= edge_cap) { \
                      uint32_t new_cap = (edge_cap == 0u) ? 4096u : (edge_cap * 2u); \
                      uint64_t *new_edges = (uint64_t *)realloc(edges, (size_t)new_cap * sizeof(uint64_t)); \
                      if (new_edges == NULL) goto msx_cas_fail; \
                      edges = new_edges; \
                      edge_cap = new_cap; \
                  } \
                  edges[edge_count++] = (sample_pos); \
              } while (0)
          #define MSX_WRITE_RUN(level_val, count_val) \
              do { \
                  uint8_t __level = (uint8_t)((level_val) ? 1u : 0u); \
                  uint64_t __count = (uint64_t)(count_val); \
                  if (__count != 0u) { \
                      if (signal_level != __level) { \
                          MSX_APPEND_EDGE(sample_cursor); \
                          signal_level = __level; \
                      } \
                      sample_cursor += __count; \
                  } \
              } while (0)
          #define MSX_WRITE0() \
              do { \
                  MSX_WRITE_RUN(1u, 2u); \
                  MSX_WRITE_RUN(0u, 2u); \
              } while (0)
          #define MSX_WRITE1() \
              do { \
                  MSX_WRITE_RUN(1u, 1u); \
                  MSX_WRITE_RUN(0u, 1u); \
                  MSX_WRITE_RUN(1u, 1u); \
                  MSX_WRITE_RUN(0u, 1u); \
              } while (0)
          #define MSX_WRITE_HEADER(bit_count) \
              do { \
                  uint32_t __count = (uint32_t)(bit_count); \
                  for (uint32_t __i = 0u; __i < __count; ++__i) { \
                      MSX_WRITE1(); \
                  } \
              } while (0)
          #define MSX_WRITE_BYTE(byte_val) \
              do { \
                  uint8_t __b = (uint8_t)(byte_val); \
                  MSX_WRITE0(); \
                  for (uint32_t __bit = 0u; __bit < 8u; ++__bit) { \
                      if ((__b & (1u << __bit)) != 0u) MSX_WRITE1(); else MSX_WRITE0(); \
                  } \
                  MSX_WRITE1(); \
                  MSX_WRITE1(); \
              } while (0)
          #define MSX_WRITE_DATA(until_eof_flag) \
              do { \
                  (until_eof_flag) = 0; \
                  while ((pos + sizeof(CAS_HEADER)) <= (size_t)file_size) { \
                      if (memcmp(buf + pos, CAS_HEADER, sizeof(CAS_HEADER)) == 0) break; \
                      MSX_WRITE_BYTE(buf[pos]); \
                      if (buf[pos] == 0x1Au) (until_eof_flag) = 1; \
                      pos += 1u; \
                  } \
                  while (pos < (size_t)file_size && ((until_eof_flag) == 0 || (pos + sizeof(CAS_HEADER)) > (size_t)file_size)) { \
                      if ((pos + sizeof(CAS_HEADER)) <= (size_t)file_size && memcmp(buf + pos, CAS_HEADER, sizeof(CAS_HEADER)) == 0) break; \
                      MSX_WRITE_BYTE(buf[pos]); \
                      if (buf[pos] == 0x1Au) (until_eof_flag) = 1; \
                      pos += 1u; \
                  } \
              } while (0)
          while ((pos + sizeof(CAS_HEADER)) <= (size_t)file_size) {
              if (memcmp(buf + pos, CAS_HEADER, sizeof(CAS_HEADER)) == 0) {
                  int file_type = MSX_FILE_UNKNOWN;
                  header_found = 1;
                  pos += sizeof(CAS_HEADER);
                  MSX_WRITE_RUN(1u, (uint64_t)comp->signal_sample_rate * 2u);
                  MSX_WRITE_HEADER(8000u);
                  if ((pos + sizeof(ASCII_HEADER)) <= (size_t)file_size) {
                      if (memcmp(buf + pos, ASCII_HEADER, sizeof(ASCII_HEADER)) == 0) {
                          file_type = MSX_FILE_ASCII;
                      } else if (memcmp(buf + pos, BINARY_HEADER, sizeof(BINARY_HEADER)) == 0) {
                          file_type = MSX_FILE_BINARY;
                      } else if (memcmp(buf + pos, BASIC_HEADER, sizeof(BASIC_HEADER)) == 0) {
                          file_type = MSX_FILE_BASIC;
                      }
                  }
                  if (file_type == MSX_FILE_ASCII) {
                      int eof = 0;
                      MSX_WRITE_DATA(eof);
                      while (!eof && (pos + sizeof(CAS_HEADER)) <= (size_t)file_size && memcmp(buf + pos, CAS_HEADER, sizeof(CAS_HEADER)) == 0) {
                          pos += sizeof(CAS_HEADER);
                          MSX_WRITE_RUN(1u, (uint64_t)comp->signal_sample_rate);
                          MSX_WRITE_HEADER(2000u);
                          MSX_WRITE_DATA(eof);
                      }
                  } else if (file_type == MSX_FILE_BINARY || file_type == MSX_FILE_BASIC) {
                      int eof = 0;
                      MSX_WRITE_DATA(eof);
                      MSX_WRITE_RUN(1u, (uint64_t)comp->signal_sample_rate);
                      MSX_WRITE_HEADER(2000u);
                      if ((pos + sizeof(CAS_HEADER)) <= (size_t)file_size && memcmp(buf + pos, CAS_HEADER, sizeof(CAS_HEADER)) == 0) {
                          pos += sizeof(CAS_HEADER);
                      }
                      eof = 0;
                      MSX_WRITE_DATA(eof);
                  } else {
                      int eof = 0;
                      MSX_WRITE_DATA(eof);
                  }
                  first_file = 0;
              } else {
                  pos += 1u;
                  issue_warning = 1;
              }
          }
          if (!header_found) goto msx_cas_fail;
          free(buf);
          buf = NULL;
          if (issue_warning) {
              /* Ignored padding / unhandled bytes before the first MSX CAS header. */
          }
          comp->media_path = strdup(path);
          if (comp->media_path == NULL) goto msx_cas_fail;
          comp->edge_positions = edges;
          comp->edge_count = edge_count;
          comp->edge_cap = edge_cap;
          comp->edge_index = 0u;
          comp->edge_initial_level = 1u;
          comp->media_loaded = 1u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->total_samples = sample_cursor;
          comp->playhead_samples = 0u;
          comp->playhead_cycle_residue = 0u;
          comp->last_cycle = cpu->total_cycles;
          comp->playback_level = 255u;
          return 1u;
      msx_cas_fail:
          if (buf != NULL) free(buf);
          if (edges != NULL) free(edges);
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          if (comp->edge_positions != NULL) {
              free(comp->edge_positions);
              comp->edge_positions = NULL;
          }
          comp->edge_count = 0u;
          comp->edge_cap = 0u;
          comp->edge_index = 0u;
          comp->media_loaded = 0u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->total_samples = 0u;
          comp->playhead_samples = 0u;
          comp->playback_level = 255u;
      }
      return 0u;
    unload_media: |
      comp->media_loaded = 0u;
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->edge_index = 0u;
      comp->total_samples = 0u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->playback_level = 255u;
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      comp->edge_count = 0u;
      comp->edge_cap = 0u;
      return 1u;
    set_transport_mode: |
      if (argc < 1u) return 0u;
      comp->transport_mode = (uint8_t)(args[0] & 0xFFu);
      if (comp->transport_mode == 1u && comp->media_loaded != 0u) comp->motor_on = 1u;
      else if (comp->transport_mode == 0u) comp->motor_on = 0u;
      comp->last_cycle = cpu->total_cycles;
      return 1u;
    set_motor: |
      if (argc < 1u) return 0u;
      comp->motor_on = (uint8_t)(args[0] & 0x01u);
      comp->last_cycle = cpu->total_cycles;
      return 1u;
    set_volume: |
      if (argc < 1u) return 0u;
      comp->volume_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    set_bass: |
      if (argc < 1u) return 0u;
      comp->bass_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    set_treble: |
      if (argc < 1u) return 0u;
      comp->treble_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    sample_input: |
      {
          uint64_t now = cpu->total_cycles;
          uint8_t current_level = comp->edge_initial_level;
          if (comp->media_loaded == 0u || comp->motor_on == 0u || comp->transport_mode != 1u) {
              comp->last_cycle = now;
              comp->playback_level = 255u;
              return 255u;
          }
          if (now > comp->last_cycle) {
              uint64_t delta = now - comp->last_cycle;
              uint64_t numer = comp->playhead_cycle_residue + delta * (uint64_t)comp->signal_sample_rate;
              comp->playhead_samples += numer / (uint64_t)CPU_SYSTEM_CLOCK_HZ;
              comp->playhead_cycle_residue = numer % (uint64_t)CPU_SYSTEM_CLOCK_HZ;
          }
          comp->last_cycle = now;
          if (comp->total_samples != 0u && comp->playhead_samples >= comp->total_samples) {
              comp->playhead_samples = comp->total_samples;
              comp->transport_mode = 0u;
              comp->motor_on = 0u;
              comp->edge_index = comp->edge_count;
              comp->playback_level = 255u;
              return 255u;
          }
          while (comp->edge_index < comp->edge_count && comp->edge_positions[comp->edge_index] <= comp->playhead_samples) {
              comp->edge_index += 1u;
          }
          current_level = (uint8_t)(comp->edge_initial_level ^ (uint8_t)(comp->edge_index & 0x01u));
          comp->playback_level = current_level ? 255u : 0u;
          return (uint64_t)comp->playback_level;
      }
    query_transport_state: |
      {
          uint64_t packed = (uint64_t)comp->transport_mode;
          uint64_t current_secs = 0u;
          uint64_t total_secs = 0u;
          if (comp->motor_on != 0u) packed |= (1ull << 8);
          if (comp->media_loaded != 0u) packed |= (1ull << 9);
          if (comp->signal_sample_rate != 0u) {
              current_secs = comp->playhead_samples / (uint64_t)comp->signal_sample_rate;
              total_secs = comp->total_samples / (uint64_t)comp->signal_sample_rate;
          }
          if (current_secs > 0xFFFFu) current_secs = 0xFFFFu;
          if (total_secs > 0xFFFFu) total_secs = 0xFFFFu;
          packed |= (current_secs & 0xFFFFu) << 16u;
          packed |= (total_secs & 0xFFFFu) << 32u;
          packed |= ((uint64_t)comp->volume_percent & 0xFFull) << 48u;
          return packed;
      }
    query_edge_count: |
      return (uint64_t)comp->edge_count;
    query_edge_initial_level: |
      return (uint64_t)comp->edge_initial_level;
    query_edge_fp: |
      if (argc < 1u) return 0u;
      {
          uint32_t index = (uint32_t)(args[0] & 0xFFFFFFFFu);
          if (index < comp->edge_count && comp->edge_positions != NULL) return comp->edge_positions[index];
      }
      return 0u;
    query_sample_rate: |
      return (uint64_t)comp->signal_sample_rate;
    query_playhead_samples: |
      return (uint64_t)comp->playhead_samples;
    query_leader_start_sample: |
      return 0u;
    query_leader_start_index: |
      return 0u;
    query_leader_end_sample: |
      return 0u;
    query_leader_end_index: |
      return 0u;
    query_playback_level: |
      return (uint64_t)comp->playback_level;
    query_volume_percent: |
      return (uint64_t)comp->volume_percent;
    set_playhead_fp: |
      if (argc < 1u) return 0u;
      {
          uint64_t fp = args[0];
          comp->playhead_samples = fp >> 8u;
          if (comp->playhead_samples > comp->total_samples) comp->playhead_samples = comp->total_samples;
          comp->edge_index = 0u;
          while (comp->edge_index < comp->edge_count && comp->edge_positions[comp->edge_index] <= comp->playhead_samples) {
              comp->edge_index += 1u;
          }
          comp->playhead_cycle_residue = 0u;
          comp->last_cycle = cpu->total_cycles;
          comp->playback_level = (comp->edge_initial_level ^ (uint8_t)(comp->edge_index & 0x01u)) ? 255u : 0u;
      }
      return 1u;
    push_output_sample: |
      (void)args;
      return 1u;
  handler_bodies: {}

coding:
  headers:
    - stdio.h
    - stdlib.h
    - string.h
  include_paths: []
  linked_libraries: []
  library_paths: []
