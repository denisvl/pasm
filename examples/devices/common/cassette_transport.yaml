metadata:
  id: cassette_transport
  type: cassette_transport
  model: common_cassette_transport_wav
  version: "1.0"

state:
  - name: transport_mode
    type: uint8_t
    initial: "0"
  - name: motor_on
    type: uint8_t
    initial: "0"
  - name: volume_percent
    type: uint8_t
    initial: "100"
  - name: bass_percent
    type: uint8_t
    initial: "50"
  - name: treble_percent
    type: uint8_t
    initial: "50"
  - name: input_level
    type: uint8_t
    initial: "128"
  - name: input_raw_level
    type: uint8_t
    initial: "128"
  - name: playback_level
    type: uint8_t
    initial: "128"
  - name: output_level
    type: uint8_t
    initial: "128"
  - name: media_loaded
    type: uint8_t
    initial: "0"
  - name: media_path
    type: char *
    initial: "NULL"
  - name: parsed_local_playback
    type: uint8_t
    initial: "0"
  - name: parsed_edge_positions
    type: uint64_t *
    initial: "NULL"
  - name: parsed_edge_count
    type: uint32_t
    initial: "0"
  - name: parsed_edge_initial_level
    type: uint8_t
    initial: "1"
  - name: parsed_sample_rate
    type: uint32_t
    initial: "0"
  - name: parsed_total_samples
    type: uint64_t
    initial: "0"
  - name: parsed_playhead_samples
    type: uint64_t
    initial: "0"
  - name: parsed_playhead_cycle_residue
    type: uint64_t
    initial: "0"
  - name: parsed_next_sample_cycle
    type: uint64_t
    initial: "0"
  - name: parsed_edge_index
    type: uint32_t
    initial: "0"
  - name: record_fp
    type: void *
    initial: "NULL"
  - name: record_bytes
    type: uint32_t
    initial: "0"
  - name: selected_source_kind
    type: uint8_t
    initial: "0"
  - name: selected_source_model
    type: char *
    initial: "NULL"
  - name: selected_source_component
    type: char *
    initial: "NULL"

interfaces:
  callbacks:
    - name: load_media
      args: [ptr]
      returns: u8
    - name: select_source
      args: [u8, u8, ptr, ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: []
      returns: u8
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_selected_source_kind
      args: []
      returns: u64
    - name: query_selected_source_model
      args: []
      returns: u64
    - name: query_edge_count
      args: []
      returns: u64
    - name: query_edge_initial_level
      args: []
      returns: u64
    - name: query_edge_fp
      args: [u32]
      returns: u64
    - name: query_sample_rate
      args: []
      returns: u64
    - name: query_playhead_samples
      args: []
      returns: u64
    - name: query_leader_start_sample
      args: []
      returns: u64
    - name: query_leader_start_index
      args: []
      returns: u64
    - name: query_leader_end_sample
      args: []
      returns: u64
    - name: query_leader_end_index
      args: []
      returns: u64
    - name: query_playback_level
      args: []
      returns: u64
    - name: query_volume_percent
      args: []
      returns: u64
    - name: set_playhead_fp
      args: [u64, u32]
      returns: u8
    - name: push_output_sample
      args: [u8, u64]
      returns: u8
  handlers:
    - name: on_output_sample
      args: [u8, u64]
  signals:
    - name: tape_level
      args: [u8, u64]
    - name: playback_sample
      args: [u8, u64]
    - name: tape_output_level
      args: [u8, u64]
    - name: transport_state
      args: [u8]

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->volume_percent = 100u;
      comp->bass_percent = 50u;
      comp->treble_percent = 50u;
      comp->input_level = 128u;
      comp->input_raw_level = 128u;
      comp->playback_level = 128u;
      comp->output_level = 128u;
      comp->media_loaded = 0u;
      comp->parsed_local_playback = 0u;
      if (comp->parsed_edge_positions != NULL) {
          free(comp->parsed_edge_positions);
          comp->parsed_edge_positions = NULL;
      }
      comp->parsed_edge_count = 0u;
      comp->parsed_edge_initial_level = 1u;
      comp->parsed_sample_rate = 0u;
      comp->parsed_total_samples = 0u;
      comp->parsed_playhead_samples = 0u;
      comp->parsed_playhead_cycle_residue = 0u;
      comp->parsed_next_sample_cycle = 0u;
      comp->parsed_edge_index = 0u;
      comp->selected_source_kind = 0u;
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->parsed_edge_positions != NULL) {
          free(comp->parsed_edge_positions);
          comp->parsed_edge_positions = NULL;
      }
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
    destroy: |
      if (comp->record_fp != NULL) {
          FILE *fp = (FILE *)comp->record_fp;
          uint32_t riff_size = 36u + comp->record_bytes;
          uint32_t data_size = comp->record_bytes;
          fseek(fp, 4, SEEK_SET);
          fwrite(&riff_size, 1, 4, fp);
          fseek(fp, 40, SEEK_SET);
          fwrite(&data_size, 1, 4, fp);
          fclose(fp);
          comp->record_fp = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      (void)cpu;
  callback_handlers:
    select_source: |
      const char *model = (argc > 2u && args[2] != 0u) ? (const char *)(uintptr_t)args[2] : NULL;
      const char *source_component = (argc > 3u && args[3] != 0u) ? (const char *)(uintptr_t)args[3] : NULL;
      comp->selected_source_kind = (argc > 0u) ? (uint8_t)(args[0] & 0xFFu) : 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (model != NULL && model[0] != '\0') {
          comp->selected_source_model = strdup(model);
          if (comp->selected_source_model == NULL) return 0u;
      }
      if (source_component != NULL && source_component[0] != '\0') {
          comp->selected_source_component = strdup(source_component);
          if (comp->selected_source_component == NULL) return 0u;
      }
      if (
          comp->selected_source_component != NULL &&
          comp->selected_source_component[0] != '\0' &&
          strcmp(comp->selected_source_component, "cassette_transport") != 0
      ) {
          (void)cpu_component_dispatch_callback(cpu, comp->selected_source_component, "select_source", args, argc);
      }
      return 1u;
    load_media: |
      if (argc < 1u || args[0] == 0u) return 0u;
      {
          const char *path = (const char *)(uintptr_t)args[0];
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          const char *source_model = (comp->selected_source_model != NULL) ? comp->selected_source_model : "";
          uint8_t ok = 0u;
          uint8_t is_audio_source = (uint8_t)(
              strcmp(source_model, "common_wav_file_source") == 0 ||
              strcmp(source_model, "common_line_in_source") == 0
          );
          if (comp->record_fp != NULL) {
              FILE *old_fp = (FILE *)comp->record_fp;
              uint32_t riff_size = 36u + comp->record_bytes;
              uint32_t data_size = comp->record_bytes;
              fseek(old_fp, 4, SEEK_SET);
              fwrite(&riff_size, 1, 4, old_fp);
              fseek(old_fp, 40, SEEK_SET);
              fwrite(&data_size, 1, 4, old_fp);
              fclose(old_fp);
              comp->record_fp = NULL;
              comp->record_bytes = 0u;
          }
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          if (comp->parsed_edge_positions != NULL) {
              free(comp->parsed_edge_positions);
              comp->parsed_edge_positions = NULL;
          }
          comp->parsed_local_playback = 0u;
          comp->parsed_edge_count = 0u;
          comp->parsed_edge_initial_level = 1u;
          comp->parsed_sample_rate = 0u;
          comp->parsed_total_samples = 0u;
          comp->parsed_playhead_samples = 0u;
          comp->parsed_playhead_cycle_residue = 0u;
          comp->parsed_next_sample_cycle = cpu->total_cycles;
          comp->parsed_edge_index = 0u;
          if (source_component[0] == '\0' || strcmp(source_component, "cassette_transport") == 0) {
              return 0u;
          }
          ok = (uint8_t)cpu_component_dispatch_callback(cpu, source_component, "load_media", args, argc);
          if (ok == 0u) return 0u;
          if (is_audio_source == 0u) {
              uint64_t edge_count = cpu_component_dispatch_callback(cpu, source_component, "query_edge_count", NULL, 0);
              uint64_t edge_initial = cpu_component_dispatch_callback(cpu, source_component, "query_edge_initial_level", NULL, 0);
              uint64_t sample_rate = cpu_component_dispatch_callback(cpu, source_component, "query_sample_rate", NULL, 0);
              uint64_t packed_state = cpu_component_dispatch_callback(cpu, source_component, "query_transport_state", NULL, 0);
              uint64_t total_secs = (packed_state >> 32u) & 0xFFFFu;
              if (edge_count != 0u) {
                  uint64_t *edges = (uint64_t *)malloc((size_t)edge_count * sizeof(uint64_t));
                  if (edges == NULL) {
                      (void)cpu_component_dispatch_callback(cpu, source_component, "unload_media", NULL, 0);
                      return 0u;
                  }
                  for (uint32_t i = 0u; i < (uint32_t)edge_count; ++i) {
                      uint64_t qargs[1] = { (uint64_t)i };
                      edges[i] = cpu_component_dispatch_callback(cpu, source_component, "query_edge_fp", qargs, 1);
                  }
                  comp->parsed_edge_positions = edges;
                  comp->parsed_edge_count = (uint32_t)edge_count;
                  comp->parsed_edge_initial_level = (uint8_t)(edge_initial & 0x01u);
                  comp->parsed_sample_rate = (uint32_t)sample_rate;
                  comp->parsed_total_samples =
                      (sample_rate != 0u)
                          ? (total_secs != 0u
                                 ? total_secs * sample_rate
                                 : (edges[(uint32_t)edge_count - 1u] + 1u))
                          : 0u;
                  comp->parsed_playhead_samples = 0u;
                  comp->parsed_playhead_cycle_residue = 0u;
                  comp->parsed_next_sample_cycle = cpu->total_cycles;
                  comp->parsed_edge_index = 0u;
                  comp->parsed_local_playback = 1u;
              }
          }
          comp->media_path = strdup(path);
          comp->media_loaded = 1u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->input_level = 128u;
          comp->input_raw_level = 128u;
          comp->playback_level = 128u;
      }
      return 1u;
    unload_media: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              (void)cpu_component_dispatch_callback(cpu, source_component, "unload_media", NULL, 0);
          }
          comp->media_loaded = 0u;
          comp->parsed_local_playback = 0u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->input_level = 128u;
          comp->input_raw_level = 128u;
          comp->playback_level = 128u;
          if (comp->parsed_edge_positions != NULL) {
              free(comp->parsed_edge_positions);
              comp->parsed_edge_positions = NULL;
          }
          comp->parsed_edge_count = 0u;
          comp->parsed_edge_initial_level = 1u;
          comp->parsed_sample_rate = 0u;
          comp->parsed_total_samples = 0u;
          comp->parsed_playhead_samples = 0u;
          comp->parsed_playhead_cycle_residue = 0u;
          comp->parsed_next_sample_cycle = cpu->total_cycles;
          comp->parsed_edge_index = 0u;
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          if (comp->record_fp != NULL) {
              FILE *fp = (FILE *)comp->record_fp;
              uint32_t riff_size = 36u + comp->record_bytes;
              uint32_t data_size = comp->record_bytes;
              fseek(fp, 4, SEEK_SET);
              fwrite(&riff_size, 1, 4, fp);
              fseek(fp, 40, SEEK_SET);
              fwrite(&data_size, 1, 4, fp);
              fclose(fp);
              comp->record_fp = NULL;
              comp->record_bytes = 0u;
          }
      }
      return 1u;
    set_transport_mode: |
      if (argc < 1u) return 0u;
      {
          uint8_t prev_mode = comp->transport_mode;
          uint8_t next_mode = (uint8_t)(args[0] & 0xFFu);
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          comp->transport_mode = next_mode;
          if (next_mode == 1u && comp->media_loaded != 0u) comp->motor_on = 1u;
          else if (next_mode == 0u) comp->motor_on = 0u;
          if (comp->parsed_local_playback != 0u) {
              comp->parsed_next_sample_cycle = cpu->total_cycles;
              comp->parsed_playhead_cycle_residue = 0u;
          }
          if (next_mode != 1u) {
              comp->input_level = 128u;
              comp->input_raw_level = 128u;
              comp->playback_level = 128u;
              }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              if (cpu_component_dispatch_callback(cpu, source_component, "set_transport_mode", args, argc) == 0u) return 0u;
          }
          if (prev_mode != next_mode) {
              uint64_t packed_state = (uint64_t)comp->transport_mode | ((uint64_t)(comp->motor_on != 0u) << 8u);
              uint64_t sig_args[1] = { packed_state };
              cpu_component_emit_signal(cpu, "cassette_transport", "transport_state", sig_args, 1);
          }
      }
      if (comp->transport_mode == 3u && comp->record_fp == NULL && comp->media_path != NULL) {
          FILE *fp = fopen(comp->media_path, "wb");
          if (fp != NULL) {
              uint32_t zero32 = 0u;
              uint16_t fmt16 = 1u;
              uint16_t ch16 = 1u;
              uint32_t rate32 = (CPU_AUDIO_SAMPLE_RATE > 0u) ? (uint32_t)CPU_AUDIO_SAMPLE_RATE : 44100u;
              uint32_t byte_rate = rate32 * 2u;
              uint16_t align16 = 2u;
              uint16_t bits16 = 16u;
              fwrite("RIFF", 1, 4, fp);
              fwrite(&zero32, 1, 4, fp);
              fwrite("WAVEfmt ", 1, 8, fp);
              zero32 = 16u;
              fwrite(&zero32, 1, 4, fp);
              fwrite(&fmt16, 1, 2, fp);
              fwrite(&ch16, 1, 2, fp);
              fwrite(&rate32, 1, 4, fp);
              fwrite(&byte_rate, 1, 4, fp);
              fwrite(&align16, 1, 2, fp);
              fwrite(&bits16, 1, 2, fp);
              fwrite("data", 1, 4, fp);
              zero32 = 0u;
              fwrite(&zero32, 1, 4, fp);
              comp->record_fp = (void *)fp;
              comp->record_bytes = 0u;
          }
      }
      return 1u;
    set_motor: |
      if (argc < 1u) return 0u;
      {
          uint8_t prev_motor = comp->motor_on;
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          const char *auto_boot = cpu_host_hal_getenv("PASM_CASSETTE_AUTO_BOOT");
          comp->motor_on = (uint8_t)((args[0] & 0x01u) != 0u);
          if (comp->parsed_local_playback != 0u) {
              comp->parsed_next_sample_cycle = cpu->total_cycles;
              comp->parsed_playhead_cycle_residue = 0u;
          }
          if (prev_motor == 0u && comp->motor_on != 0u && comp->transport_mode == 0u && auto_boot != NULL && auto_boot[0] == '1') {
              comp->transport_mode = 1u;
          }
          if (comp->motor_on == 0u) {
              comp->input_level = 128u;
              comp->input_raw_level = 128u;
              comp->playback_level = 128u;
              }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              if (cpu_component_dispatch_callback(cpu, source_component, "set_motor", args, argc) == 0u) return 0u;
          }
          if (prev_motor != comp->motor_on) {
              uint64_t packed_state = (uint64_t)comp->transport_mode | ((uint64_t)(comp->motor_on != 0u) << 8u);
              uint64_t sig_args[1] = { packed_state };
              cpu_component_emit_signal(cpu, "cassette_transport", "transport_state", sig_args, 1);
          }
      }
      return 1u;
    set_volume: |
      if (argc < 1u) return 0u;
      comp->volume_percent = (uint8_t)((args[0] > 100u) ? 100u : (args[0] & 0xFFu));
      if (
          comp->selected_source_component != NULL &&
          comp->selected_source_component[0] != '\0' &&
          strcmp(comp->selected_source_component, "cassette_transport") != 0
      ) {
          (void)cpu_component_dispatch_callback(cpu, comp->selected_source_component, "set_volume", args, argc);
      }
      return 1u;
    set_bass: |
      if (argc < 1u) return 0u;
      comp->bass_percent = (uint8_t)((args[0] > 100u) ? 100u : (args[0] & 0xFFu));
      if (
          comp->selected_source_component != NULL &&
          comp->selected_source_component[0] != '\0' &&
          strcmp(comp->selected_source_component, "cassette_transport") != 0
      ) {
          (void)cpu_component_dispatch_callback(cpu, comp->selected_source_component, "set_bass", args, argc);
      }
      return 1u;
    set_treble: |
      if (argc < 1u) return 0u;
      comp->treble_percent = (uint8_t)((args[0] > 100u) ? 100u : (args[0] & 0xFFu));
      if (
          comp->selected_source_component != NULL &&
          comp->selected_source_component[0] != '\0' &&
          strcmp(comp->selected_source_component, "cassette_transport") != 0
      ) {
          (void)cpu_component_dispatch_callback(cpu, comp->selected_source_component, "set_treble", args, argc);
      }
      return 1u;
    query_transport_state: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          uint64_t packed = (uint64_t)comp->transport_mode;
          if (comp->parsed_local_playback != 0u) {
              uint64_t current_secs = 0u;
              uint64_t total_secs = 0u;
              if (comp->motor_on != 0u) packed |= (1ull << 8);
              if (comp->media_loaded != 0u) packed |= (1ull << 9);
              if (comp->parsed_sample_rate != 0u) {
                  current_secs = comp->parsed_playhead_samples / (uint64_t)comp->parsed_sample_rate;
                  total_secs = comp->parsed_total_samples / (uint64_t)comp->parsed_sample_rate;
              }
              if (current_secs > 0xFFFFu) current_secs = 0xFFFFu;
              if (total_secs > 0xFFFFu) total_secs = 0xFFFFu;
              packed |= (current_secs & 0xFFFFu) << 16u;
              packed |= (total_secs & 0xFFFFu) << 32u;
              packed |= ((uint64_t)comp->volume_percent & 0xFFull) << 48u;
              return packed;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_transport_state", NULL, 0);
          }
          if (comp->motor_on != 0u) packed |= (1ull << 8);
          if (comp->media_loaded != 0u) packed |= (1ull << 9);
          packed |= ((uint64_t)comp->volume_percent & 0xFFull) << 48u;
          return packed;
      }
    query_selected_source_kind: |
      return (uint64_t)comp->selected_source_kind;
    query_selected_source_model: |
      return (uint64_t)(uintptr_t)((comp->selected_source_model != NULL) ? comp->selected_source_model : "");
    query_edge_count: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (comp->parsed_local_playback != 0u) {
              return (uint64_t)comp->parsed_edge_count;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_edge_count", NULL, 0);
          }
          return 0u;
      }
    query_edge_initial_level: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (comp->parsed_local_playback != 0u) {
              return (uint64_t)comp->parsed_edge_initial_level;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_edge_initial_level", NULL, 0);
          }
          return 0u;
      }
    query_edge_fp: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (comp->parsed_local_playback != 0u) {
              uint32_t index = (argc > 0u) ? (uint32_t)(args[0] & 0xFFFFFFFFu) : 0u;
              if (comp->parsed_edge_positions != NULL && index < comp->parsed_edge_count) {
                  return comp->parsed_edge_positions[index];
              }
              return 0u;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_edge_fp", args, argc);
          }
          return 0u;
      }
    query_sample_rate: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (comp->parsed_local_playback != 0u) {
              return (uint64_t)comp->parsed_sample_rate;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_sample_rate", NULL, 0);
          }
          return 0u;
      }
    query_playhead_samples: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (comp->parsed_local_playback != 0u) {
              return (uint64_t)comp->parsed_playhead_samples;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_playhead_samples", NULL, 0);
          }
          return 0u;
      }
    query_leader_start_sample: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_leader_start_sample", NULL, 0);
          }
          return 0u;
      }
    query_leader_start_index: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_leader_start_index", NULL, 0);
          }
          return 0u;
      }
    query_leader_end_sample: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_leader_end_sample", NULL, 0);
          }
          return 0u;
      }
    query_leader_end_index: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_leader_end_index", NULL, 0);
          }
          return 0u;
      }
    query_playback_level: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_playback_level", NULL, 0);
          }
          return (uint64_t)comp->playback_level;
      }
    query_volume_percent: |
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return cpu_component_dispatch_callback(cpu, source_component, "query_volume_percent", NULL, 0);
          }
          return (uint64_t)comp->volume_percent;
      }
    set_playhead_fp: |
      if (argc < 1u) return 0u;
      {
          const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
          if (comp->parsed_local_playback != 0u) {
              uint64_t fp = args[0];
              comp->parsed_playhead_samples = fp >> 8u;
              if (comp->parsed_playhead_samples > comp->parsed_total_samples) {
                  comp->parsed_playhead_samples = comp->parsed_total_samples;
              }
              comp->parsed_edge_index = 0u;
              while (comp->parsed_edge_index < comp->parsed_edge_count &&
                     comp->parsed_edge_positions[comp->parsed_edge_index] <= comp->parsed_playhead_samples) {
                  comp->parsed_edge_index += 1u;
              }
              comp->parsed_playhead_cycle_residue = 0u;
              comp->parsed_next_sample_cycle = cpu->total_cycles;
              comp->playback_level =
                  (comp->parsed_edge_initial_level ^ (uint8_t)(comp->parsed_edge_index & 0x01u)) ? 255u : 0u;
              return 1u;
          }
          if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
              return (uint8_t)cpu_component_dispatch_callback(cpu, source_component, "set_playhead_fp", args, argc);
          }
      }
      return 0u;
    sample_input: |
      uint64_t cycle = (argc > 1u) ? args[1] : cpu->total_cycles;
      uint64_t flags = (argc > 0u) ? args[0] : 0u;
      uint8_t want_raw = (uint8_t)((flags & 0x01u) != 0u ? 1u : 0u);
      const char *source_component = (comp->selected_source_component != NULL) ? comp->selected_source_component : "";
      const char *source_model = (comp->selected_source_model != NULL) ? comp->selected_source_model : "";
      uint8_t emit_audio_signals = (uint8_t)(
          strcmp(source_model, "common_wav_file_source") == 0 ||
          strcmp(source_model, "common_line_in_source") == 0
      );
      uint8_t prev_input = comp->input_level;
      uint8_t prev_playback = comp->playback_level;
      if (comp->parsed_local_playback != 0u) {
          uint64_t now = cpu->total_cycles;
          uint8_t current_level = comp->parsed_edge_initial_level;
          if (comp->media_loaded == 0u || comp->motor_on == 0u || comp->transport_mode != 1u) {
              comp->parsed_next_sample_cycle = now;
              comp->parsed_playhead_cycle_residue = 0u;
              comp->input_level = 255u;
              comp->input_raw_level = 255u;
              comp->playback_level = 255u;
              if (prev_playback != comp->playback_level) {
                  uint64_t aud_args[2] = { (uint64_t)comp->playback_level, cycle };
                  cpu_component_emit_signal(cpu, "cassette_transport", "playback_sample", aud_args, 2);
              }
              if (want_raw == 0u && prev_input != comp->input_level) {
                  uint64_t sig_args[2] = { (uint64_t)comp->input_level, cycle };
                  cpu_component_emit_signal(cpu, "cassette_transport", "tape_level", sig_args, 2);
              }
              return (want_raw != 0u) ? comp->input_raw_level : comp->input_level;
          }
          if (comp->parsed_sample_rate != 0u && CPU_SYSTEM_CLOCK_HZ > 0u) {
              uint64_t period = (uint64_t)CPU_SYSTEM_CLOCK_HZ / (uint64_t)comp->parsed_sample_rate;
              uint64_t rem = (uint64_t)CPU_SYSTEM_CLOCK_HZ % (uint64_t)comp->parsed_sample_rate;
              if (period == 0u) period = 1u;
              while (now >= comp->parsed_next_sample_cycle &&
                     comp->parsed_playhead_samples < comp->parsed_total_samples) {
                  comp->parsed_playhead_samples += 1u;
                  comp->parsed_next_sample_cycle += period;
                  comp->parsed_playhead_cycle_residue += rem;
                  if (comp->parsed_playhead_cycle_residue >= (uint64_t)comp->parsed_sample_rate) {
                      comp->parsed_next_sample_cycle += 1u;
                      comp->parsed_playhead_cycle_residue -= (uint64_t)comp->parsed_sample_rate;
                  }
              }
          }
          if (comp->parsed_total_samples != 0u && comp->parsed_playhead_samples >= comp->parsed_total_samples) {
              comp->parsed_playhead_samples = comp->parsed_total_samples;
              comp->transport_mode = 0u;
              comp->motor_on = 0u;
              comp->parsed_edge_index = comp->parsed_edge_count;
              comp->input_level = 255u;
              comp->input_raw_level = 255u;
              comp->playback_level = 255u;
              if (prev_playback != comp->playback_level) {
                  uint64_t aud_args[2] = { (uint64_t)comp->playback_level, cycle };
                  cpu_component_emit_signal(cpu, "cassette_transport", "playback_sample", aud_args, 2);
              }
              if (want_raw == 0u && prev_input != comp->input_level) {
                  uint64_t sig_args[2] = { (uint64_t)comp->input_level, cycle };
                  cpu_component_emit_signal(cpu, "cassette_transport", "tape_level", sig_args, 2);
              }
              return (want_raw != 0u) ? comp->input_raw_level : comp->input_level;
          }
          while (comp->parsed_edge_index < comp->parsed_edge_count &&
                 comp->parsed_edge_positions[comp->parsed_edge_index] <= comp->parsed_playhead_samples) {
              comp->parsed_edge_index += 1u;
          }
          current_level = (uint8_t)(comp->parsed_edge_initial_level ^ (uint8_t)(comp->parsed_edge_index & 0x01u));
          comp->playback_level = current_level ? 255u : 0u;
          comp->input_raw_level = comp->playback_level;
          comp->input_level = comp->playback_level;
          if (prev_playback != comp->playback_level) {
              uint64_t aud_args[2] = { (uint64_t)comp->playback_level, cycle };
              cpu_component_emit_signal(cpu, "cassette_transport", "playback_sample", aud_args, 2);
          }
          if (want_raw == 0u && prev_input != comp->input_level) {
              uint64_t sig_args[2] = { (uint64_t)comp->input_level, cycle };
              cpu_component_emit_signal(cpu, "cassette_transport", "tape_level", sig_args, 2);
          }
          return (want_raw != 0u) ? comp->input_raw_level : comp->input_level;
      }
      if (source_component[0] != '\0' && strcmp(source_component, "cassette_transport") != 0) {
          uint8_t value = (uint8_t)cpu_component_dispatch_callback(cpu, source_component, "sample_input", args, argc);
          if (strcmp(source_model, "common_wav_file_source") == 0 ||
              strcmp(source_model, "common_line_in_source") == 0) {
              comp->playback_level = (uint8_t)cpu_component_dispatch_callback(cpu, source_component, "query_playback_level", NULL, 0);
          } else {
              comp->playback_level = value;
          }
          if (want_raw != 0u) comp->input_raw_level = value;
          else comp->input_level = value;
          if (emit_audio_signals != 0u && prev_playback != comp->playback_level) {
              uint64_t aud_args[2] = { (uint64_t)comp->playback_level, cycle };
              cpu_component_emit_signal(cpu, "cassette_transport", "playback_sample", aud_args, 2);
          }
          if (emit_audio_signals != 0u && want_raw == 0u && prev_input != comp->input_level) {
              uint64_t sig_args[2] = { (uint64_t)comp->input_level, cycle };
              cpu_component_emit_signal(cpu, "cassette_transport", "tape_level", sig_args, 2);
          }
          return value;
      }
      comp->input_level = 128u;
      comp->input_raw_level = 128u;
      comp->playback_level = 128u;
      return (want_raw != 0u) ? comp->input_raw_level : comp->input_level;
    push_output_sample: |
      uint64_t cycle = (argc > 1u) ? args[1] : cpu->total_cycles;
      if (argc < 1u) return 0u;
      comp->output_level = (uint8_t)(args[0] & 0xFFu);
      if (comp->transport_mode == 3u && comp->motor_on != 0u && comp->record_fp != NULL) {
          FILE *fp = (FILE *)comp->record_fp;
          int16_t sample = (int16_t)(((int32_t)comp->output_level - 128) << 8u);
          fwrite(&sample, 1, 2, fp);
          comp->record_bytes += 2u;
      }
      {
          uint64_t sig_args[2] = { (uint64_t)comp->output_level, cycle };
          cpu_component_emit_signal(cpu, "cassette_transport", "tape_output_level", sig_args, 2);
      }
      return 1u;
  handler_bodies:
    on_output_sample: |
      uint64_t cycle = (argc > 1u) ? args[1] : cpu->total_cycles;
      if (argc < 1u) return;
      comp->output_level = (uint8_t)(args[0] & 0xFFu);
      if (comp->transport_mode == 3u && comp->motor_on != 0u && comp->record_fp != NULL) {
          FILE *fp = (FILE *)comp->record_fp;
          int16_t sample = (int16_t)(((int32_t)comp->output_level - 128) << 8u);
          fwrite(&sample, 1, 2, fp);
          comp->record_bytes += 2u;
      }
      {
          uint64_t sig_args[2] = { (uint64_t)comp->output_level, cycle };
          cpu_component_emit_signal(cpu, "cassette_transport", "tape_output_level", sig_args, 2);
      }

