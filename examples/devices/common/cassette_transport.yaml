interfaces:
  callbacks:
    - name: load_media
      args: [ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: []
      returns: u8
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_stream_info
      args: [u8, u32]
      returns: u64
    - name: atari_query_sample_rate
      args: []
      returns: u64
    - name: atari_query_available_samples
      args: []
      returns: u64
    - name: atari_query_edge_count
      args: []
      returns: u64
    - name: atari_query_edge_fp
      args: [u32]
      returns: u64
    - name: atari_query_event_count
      args: []
      returns: u64
    - name: atari_query_event_duration
      args: [u32]
      returns: u64
    - name: atari_query_event_byte
      args: [u32]
      returns: u64
    - name: atari_query_event_kind
      args: [u32]
      returns: u64
    - name: atari_query_audio_present
      args: []
      returns: u64
    - name: atari_query_audio_length
      args: []
      returns: u64
    - name: atari_query_audio_sample
      args: [u32]
      returns: u64
    - name: atari_query_volume_percent
      args: []
      returns: u64
    - name: set_playhead_fp
      args: [u64, u32]
      returns: u8
    - name: push_output_sample
      args: [u8, u64]
      returns: u8
  handlers:
    - name: on_output_sample
      args: [u8, u64]
  signals:
    - name: tape_level
      args: [u8, u64]
    - name: playback_sample
      args: [u8, u64]
    - name: tape_output_level
      args: [u8, u64]
    - name: transport_state
      args: [u8]

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->volume_percent = 100u;
      comp->bass_percent = 50u;
      comp->treble_percent = 50u;
      comp->input_level = 128u;
      comp->input_raw_level = 128u;
      comp->playback_level = 128u;
      comp->input_bias_q8 = (uint32_t)(128u << 8u);
      comp->output_level = 128u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->direct_timebase_cycle = cpu->total_cycles;
      comp->direct_timebase_samples = 0u;
      comp->direct_cached_until_cycle = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->next_sample_cycle = cpu->total_cycles;
      comp->direct_edge_index = 0u;
      comp->direct_edge_initial_level = 0u;
      comp->direct_edge_leader_start_sample = 0u;
      comp->direct_edge_leader_start_index = 0u;
      comp->direct_edge_leader_end_sample = 0u;
      comp->direct_edge_leader_end_index = 0u;
      comp->edge_index = 0u;
      comp->edge_initial_level = 0u;
      comp->atari_audio_present = 0u;
    destroy: |
      if (comp->record_fp != NULL) {
          FILE *fp = (FILE *)comp->record_fp;
          uint32_t riff_size = 36u + comp->record_bytes;
          uint32_t data_size = comp->record_bytes;
          fseek(fp, 4, SEEK_SET);
          fwrite(&riff_size, 1, 4, fp);
          fseek(fp, 40, SEEK_SET);
          fwrite(&data_size, 1, 4, fp);
          fclose(fp);
          comp->record_fp = NULL;
      }
      if (comp->wav_data != NULL) {
          free(comp->wav_data);
          comp->wav_data = NULL;
      }
      if (comp->wav_filtered_mono != NULL) {
          free(comp->wav_filtered_mono);
          comp->wav_filtered_mono = NULL;
      }
      if (comp->direct_edge_positions != NULL) {
          free(comp->direct_edge_positions);
          comp->direct_edge_positions = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->resolved_wav_path != NULL) {
          free(comp->resolved_wav_path);
          comp->resolved_wav_path = NULL;
      }
      if (comp->atari_cas_event_durations != NULL) {
          free(comp->atari_cas_event_durations);
          comp->atari_cas_event_durations = NULL;
      }
      if (comp->atari_cas_event_bytes != NULL) {
          free(comp->atari_cas_event_bytes);
          comp->atari_cas_event_bytes = NULL;
      }
      if (comp->atari_cas_event_is_gap != NULL) {
          free(comp->atari_cas_event_is_gap);
          comp->atari_cas_event_is_gap = NULL;
      }
      (void)cpu;
  callback_handlers:
    load_media: |
      if (argc < 1u || args[0] == 0u) return 0u;
      {
          const char *path = (const char *)(uintptr_t)args[0];
          char wav_path[1024];
          const char *open_path = path;
          FILE *fp = NULL;
          uint8_t *buf = NULL;
          long file_size = 0;
          uint32_t data_offset = 0u;
          uint32_t data_length = 0u;
          uint32_t sample_rate = 0u;
          uint16_t channels = 0u;
          uint16_t bits_per_sample = 0u;
          const char *dot = strrchr(path, '.');
          if (comp->record_fp != NULL) {
              FILE *old_fp = (FILE *)comp->record_fp;
              uint32_t riff_size = 36u + comp->record_bytes;
              uint32_t data_size = comp->record_bytes;
              fseek(old_fp, 4, SEEK_SET);
              fwrite(&riff_size, 1, 4, old_fp);
              fseek(old_fp, 40, SEEK_SET);
              fwrite(&data_size, 1, 4, old_fp);
              fclose(old_fp);
              comp->record_fp = NULL;
              comp->record_bytes = 0u;
          }
          if (comp->wav_data != NULL) {
              free(comp->wav_data);
              comp->wav_data = NULL;
          }
      if (comp->wav_filtered_mono != NULL) {
          free(comp->wav_filtered_mono);
          comp->wav_filtered_mono = NULL;
      }
      if (comp->direct_edge_positions != NULL) {
          free(comp->direct_edge_positions);
          comp->direct_edge_positions = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      if (comp->atari_audio_track != NULL) {
          free(comp->atari_audio_track);
          comp->atari_audio_track = NULL;
      }
      if (comp->atari_cas_event_durations != NULL) {
              free(comp->atari_cas_event_durations);
              comp->atari_cas_event_durations = NULL;
          }
          if (comp->atari_cas_event_bytes != NULL) {
              free(comp->atari_cas_event_bytes);
              comp->atari_cas_event_bytes = NULL;
          }
          if (comp->atari_cas_event_is_gap != NULL) {
              free(comp->atari_cas_event_is_gap);
              comp->atari_cas_event_is_gap = NULL;
          }
          comp->edge_count = 0u;
          comp->edge_cap = 0u;
          comp->edge_index = 0u;
          comp->edge_initial_level = 0u;
          comp->atari_audio_track_length = 0u;
          comp->atari_audio_present = 0u;
          comp->atari_cas_event_count = 0u;
          comp->atari_cas_event_cap = 0u;
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          if (comp->resolved_wav_path != NULL) {
              free(comp->resolved_wav_path);
              comp->resolved_wav_path = NULL;
          }
          if (dot != NULL && strcmp(dot, ".yaml") == 0) {
              FILE *yf = fopen(path, "r");
              if (yf == NULL) return 0u;
              wav_path[0] = '\0';
              while (fgets(wav_path, sizeof(wav_path), yf) != NULL) {
                  char *s = wav_path;
                  while (*s == ' ' || *s == '\t') s++;
                  if (strncmp(s, "file:", 5) == 0) {
                      char *v = s + 5;
                      while (*v == ' ' || *v == '\t') v++;
                      size_t len = strlen(v);
                      while (len > 0u && (v[len - 1u] == '\n' || v[len - 1u] == '\r' || v[len - 1u] == ' ' || v[len - 1u] == '\t')) {
                          v[--len] = '\0';
                      }
                      if (len > 1u && ((v[0] == '"' && v[len - 1u] == '"') || (v[0] == '\'' && v[len - 1u] == '\''))) {
                          v[len - 1u] = '\0';
                          v++;
                      }
                      {
                          const char *slash = strrchr(path, '/');
                          if (slash != NULL && v[0] != '/') {
                              size_t base_len = (size_t)(slash - path);
                              if (base_len + 1u + strlen(v) + 1u >= sizeof(wav_path)) {
                                  fclose(yf);
                                  return 0u;
                              }
                              memcpy(wav_path, path, base_len);
                              wav_path[base_len] = '/';
                              snprintf(wav_path + base_len + 1u, sizeof(wav_path) - base_len - 1u, "%s", v);
                          } else {
                              snprintf(wav_path, sizeof(wav_path), "%s", v);
                          }
                      }
                      break;
                  }
              }
              fclose(yf);
              if (wav_path[0] == '\0') return 0u;
              open_path = wav_path;
          }
          fp = fopen(open_path, "rb");
          if (fp == NULL) return 0u;
          if (fseek(fp, 0, SEEK_END) != 0) {
              fclose(fp);
              return 0u;
          }
          file_size = ftell(fp);
          if (file_size <= 44) {
              fclose(fp);
              return 0u;
          }
          if (fseek(fp, 0, SEEK_SET) != 0) {
              fclose(fp);
              return 0u;
          }
          buf = (uint8_t *)malloc((size_t)file_size);
          if (buf == NULL) {
              fclose(fp);
              return 0u;
          }
          if (fread(buf, 1, (size_t)file_size, fp) != (size_t)file_size) {
              free(buf);
              fclose(fp);
              return 0u;
          }
          fclose(fp);
          if (memcmp(buf, "RIFF", 4) != 0 || memcmp(buf + 8, "WAVE", 4) != 0) {
              free(buf);
              return 0u;
          }
          {
              uint32_t off = 12u;
              while (off + 8u <= (uint32_t)file_size) {
                  uint32_t chunk_size = (uint32_t)buf[off + 4u] | ((uint32_t)buf[off + 5u] << 8u) | ((uint32_t)buf[off + 6u] << 16u) | ((uint32_t)buf[off + 7u] << 24u);
                  if (off + 8u + chunk_size > (uint32_t)file_size) break;
                  if (memcmp(buf + off, "fmt ", 4) == 0 && chunk_size >= 16u) {
                      uint16_t audio_format = (uint16_t)buf[off + 8u] | (uint16_t)((uint16_t)buf[off + 9u] << 8u);
                      channels = (uint16_t)buf[off + 10u] | (uint16_t)((uint16_t)buf[off + 11u] << 8u);
                      sample_rate = (uint32_t)buf[off + 12u] | ((uint32_t)buf[off + 13u] << 8u) | ((uint32_t)buf[off + 14u] << 16u) | ((uint32_t)buf[off + 15u] << 24u);
                      bits_per_sample = (uint16_t)buf[off + 22u] | (uint16_t)((uint16_t)buf[off + 23u] << 8u);
                      if (audio_format != 1u) {
                          free(buf);
                          return 0u;
                      }
                  } else if (memcmp(buf + off, "data", 4) == 0) {
                      data_offset = off + 8u;
                      data_length = chunk_size;
                  }
                  off += 8u + chunk_size + (chunk_size & 1u);
              }
          }
          if (data_offset == 0u || data_length == 0u || sample_rate == 0u || channels == 0u || (bits_per_sample != 8u && bits_per_sample != 16u)) {
              free(buf);
              return 0u;
          }
          comp->wav_data = buf;
          comp->wav_size = (uint32_t)file_size;
          comp->wav_data_offset = data_offset;
          comp->wav_data_length = data_length;
          comp->wav_sample_rate = sample_rate;
          comp->wav_channels = channels;
          comp->wav_bits_per_sample = bits_per_sample;
          comp->wav_filtered_sample_count = 0u;
          comp->direct_edge_count = 0u;
          comp->direct_edge_cap = 0u;
          comp->direct_edge_index = 0u;
          comp->direct_edge_initial_level = 0u;
          comp->direct_edge_leader_start_sample = 0u;
          comp->direct_edge_leader_start_index = 0u;
          comp->direct_edge_leader_end_sample = 0u;
          comp->direct_edge_leader_end_index = 0u;
          comp->media_path = strdup(path);
          comp->resolved_wav_path = strdup(open_path);
          comp->media_loaded = 1u;
          comp->playhead_samples = 0u;
          comp->playhead_cycle_residue = 0u;
          comp->direct_timebase_cycle = cpu->total_cycles;
          comp->direct_timebase_samples = 0u;
          comp->direct_cached_until_cycle = 0u;
          comp->last_cycle = cpu->total_cycles;
          comp->next_sample_cycle = cpu->total_cycles;
          comp->edge_index = 0u;
          comp->input_raw_level = 128u;
          comp->playback_level = 128u;
          comp->input_bias_q8 = (uint32_t)(128u << 8u);
          comp->atari_audio_present = 0u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          {
              uint32_t bytes_per_sample_local = (uint32_t)((bits_per_sample / 8u) * channels);
              uint64_t total_samples_local = (bytes_per_sample_local != 0u) ? ((uint64_t)data_length / (uint64_t)bytes_per_sample_local) : 0u;
              if (total_samples_local > 0u && total_samples_local <= 0xFFFFFFFFull) {
                  int16_t *filtered = (int16_t *)malloc((size_t)total_samples_local * sizeof(int16_t));
                  if (filtered == NULL) {
                      free(buf);
                      comp->wav_data = NULL;
                      return 0u;
                  }
                  {
                      double t0 = 0.0;
                      double r = 0.0;
                      uint16_t data_ch = 0u;
                      if (sample_rate > 0u) {
                          r = 1.0 - (6.28318530717958647692 * 800.0 / (double)sample_rate);
                          if (r < 0.0) r = 0.0;
                          if (r > 0.9999) r = 0.9999;
                      }
                      for (uint64_t sample_index = 0u; sample_index < total_samples_local; ++sample_index) {
                          uint64_t byte_index = (uint64_t)data_offset + sample_index * (uint64_t)bytes_per_sample_local;
                          int32_t sample_value = 0;
                          double t1;
                          int32_t y;
                          if (bits_per_sample == 8u) {
                              sample_value = ((int32_t)buf[byte_index + data_ch] - 128) << 8;
                          } else {
                              uint64_t ch_off = byte_index + ((uint64_t)data_ch * 2u);
                              sample_value = (int32_t)(int16_t)((uint16_t)buf[ch_off] | ((uint16_t)buf[ch_off + 1u] << 8u));
                          }
                          t1 = r * t0 + (double)sample_value;
                          y = (int32_t)(t1 - t0);
                          t0 = t1;
                          if (y < -32768) y = -32768;
                          if (y > 32767) y = 32767;
                          filtered[sample_index] = (int16_t)y;
                      }
                  }
                  comp->wav_filtered_mono = filtered;
                  comp->wav_filtered_sample_count = (uint32_t)total_samples_local;
                  if (total_samples_local > 0u) {
                      uint16_t data_ch = 0u;
                      int32_t prev_sample_raw = 0;
                      uint8_t prev_level;
                      {
                          uint64_t byte_index0 = (uint64_t)data_offset;
                          if (bits_per_sample == 8u) {
                              prev_sample_raw = ((int32_t)buf[byte_index0 + data_ch] - 128) << 8;
                          } else {
                              uint64_t ch_off0 = byte_index0 + ((uint64_t)data_ch * 2u);
                              prev_sample_raw = (int32_t)(int16_t)((uint16_t)buf[ch_off0] | ((uint16_t)buf[ch_off0 + 1u] << 8u));
                          }
                      }
                      prev_level = (uint8_t)(prev_sample_raw >= 0 ? 255u : 0u);
                      comp->direct_edge_initial_level = prev_level;
                      for (uint64_t sample_index = 1u; sample_index < total_samples_local; ++sample_index) {
                          uint64_t byte_index = (uint64_t)data_offset + sample_index * (uint64_t)bytes_per_sample_local;
                          int32_t curr_sample_raw = 0;
                          uint8_t next_level;
                          if (bits_per_sample == 8u) {
                              curr_sample_raw = ((int32_t)buf[byte_index + data_ch] - 128) << 8;
                          } else {
                              uint64_t ch_off = byte_index + ((uint64_t)data_ch * 2u);
                              curr_sample_raw = (int32_t)(int16_t)((uint16_t)buf[ch_off] | ((uint16_t)buf[ch_off + 1u] << 8u));
                          }
                          next_level = (uint8_t)(curr_sample_raw >= 0 ? 255u : 0u);
                          if (next_level != prev_level) {
                              uint32_t edge_fp = (uint32_t)(sample_index << 8u);
                              int32_t denom = curr_sample_raw - prev_sample_raw;
                              if (denom != 0) {
                                  int32_t frac = (int32_t)((-(int64_t)prev_sample_raw * 256ll) / (int64_t)denom);
                                  if (frac < 0) frac = 0;
                                  if (frac > 255) frac = 255;
                                  edge_fp = (uint32_t)(((uint32_t)(sample_index - 1u) << 8u) + (uint32_t)frac);
                              }
                              if (comp->direct_edge_count >= comp->direct_edge_cap) {
                                  uint32_t new_cap = (comp->direct_edge_cap == 0u) ? 1024u : (comp->direct_edge_cap * 2u);
                                  uint32_t *new_edges = (uint32_t *)realloc(comp->direct_edge_positions, (size_t)new_cap * sizeof(uint32_t));
                                  if (new_edges == NULL) {
                                      free(buf);
                                      free(filtered);
                                      comp->wav_data = NULL;
                                      comp->wav_filtered_mono = NULL;
                                      return 0u;
                                  }
                                  comp->direct_edge_positions = new_edges;
                                  comp->direct_edge_cap = new_cap;
                              }
                              comp->direct_edge_positions[comp->direct_edge_count++] = edge_fp;
                              prev_level = next_level;
                          }
                          prev_sample_raw = curr_sample_raw;
