  - name: motor_on
    type: uint8_t
    initial: "0"
  - name: volume_percent
    type: uint8_t
    initial: "100"
  - name: bass_percent
    type: uint8_t
    initial: "50"
  - name: treble_percent
    type: uint8_t
    initial: "50"
  - name: input_level
    type: uint8_t
    initial: "128"
  - name: input_raw_level
    type: uint8_t
    initial: "128"
  - name: playback_level
    type: uint8_t
    initial: "128"
  - name: input_bias_q8
    type: uint32_t
    initial: "32768"
  - name: direct_prev_sample
    type: int32_t
    initial: "0"
  - name: direct_prev_filtered
    type: int32_t
    initial: "0"
  - name: output_level
    type: uint8_t
    initial: "128"
  - name: media_loaded
    type: uint8_t
    initial: "0"
  - name: media_path
    type: char *
    initial: "NULL"
  - name: resolved_wav_path
    type: char *
    initial: "NULL"
  - name: wav_data
    type: uint8_t *
    initial: "NULL"
  - name: wav_size
    type: uint32_t
    initial: "0"
  - name: wav_data_offset
    type: uint32_t
    initial: "0"
  - name: wav_data_length
    type: uint32_t
    initial: "0"
  - name: wav_sample_rate
    type: uint32_t
    initial: "0"
  - name: wav_channels
    type: uint16_t
    initial: "0"
  - name: wav_bits_per_sample
    type: uint16_t
    initial: "0"
  - name: wav_filtered_mono
    type: int16_t *
    initial: "NULL"
  - name: wav_filtered_sample_count
    type: uint32_t
    initial: "0"
  - name: direct_edge_positions
    type: uint32_t *
    initial: "NULL"
  - name: direct_edge_count
    type: uint32_t
    initial: "0"
  - name: direct_edge_cap
    type: uint32_t
    initial: "0"
  - name: direct_edge_index
    type: uint32_t
    initial: "0"
  - name: direct_edge_initial_level
    type: uint8_t
    initial: "0"
  - name: direct_edge_leader_start_sample
    type: uint32_t
    initial: "0"
  - name: direct_edge_leader_start_index
    type: uint32_t
    initial: "0"
  - name: direct_edge_leader_end_sample
    type: uint32_t
    initial: "0"
  - name: direct_edge_leader_end_index
    type: uint32_t
    initial: "0"
  - name: playhead_samples
    type: uint64_t
    initial: "0"
  - name: playhead_cycle_residue
    type: uint64_t
    initial: "0"
  - name: direct_timebase_cycle
    type: uint64_t
    initial: "0"
  - name: direct_timebase_samples
    type: uint64_t
    initial: "0"
  - name: direct_cached_until_cycle
    type: uint64_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: next_sample_cycle
    type: uint64_t
    initial: "0"
  - name: edge_positions
    type: uint32_t *
    initial: "NULL"
  - name: edge_count
    type: uint32_t
    initial: "0"
  - name: edge_cap
    type: uint32_t
    initial: "0"
  - name: edge_index
    type: uint32_t
    initial: "0"
  - name: edge_initial_level
    type: uint8_t
    initial: "0"
  - name: atari_audio_track
    type: uint8_t *
    initial: "NULL"
  - name: atari_audio_track_length
    type: uint32_t
    initial: "0"
  - name: atari_audio_present
    type: uint8_t
    initial: "0"
  - name: atari_cas_event_durations
    type: uint32_t *
    initial: "NULL"
  - name: atari_cas_event_bytes
    type: uint8_t *
    initial: "NULL"
  - name: atari_cas_event_is_gap
    type: uint8_t *
    initial: "NULL"
  - name: atari_cas_event_count
    type: uint32_t
    initial: "0"
  - name: atari_cas_event_cap
    type: uint32_t
    initial: "0"
  - name: record_fp
