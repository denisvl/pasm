metadata:
  id: cassette_cas_source
  type: cassette_source_backend
  model: common_cassette_cas_source
  version: "1.0"

state:
  - name: selected_source_kind
    type: uint8_t
    initial: "0"
  - name: selected_source_index
    type: uint8_t
    initial: "0"
  - name: selected_source_model
    type: char *
    initial: "NULL"
  - name: selected_source_component
    type: char *
    initial: "NULL"
  - name: media_loaded
    type: uint8_t
    initial: "0"
  - name: transport_mode
    type: uint8_t
    initial: "0"
  - name: motor_on
    type: uint8_t
    initial: "0"
  - name: volume_percent
    type: uint8_t
    initial: "100"
  - name: bass_percent
    type: uint8_t
    initial: "50"
  - name: treble_percent
    type: uint8_t
    initial: "50"
  - name: media_path
    type: char *
    initial: "NULL"
  - name: signal_sample_rate
    type: uint32_t
    initial: "44100"
  - name: playhead_samples
    type: uint64_t
    initial: "0"
  - name: playhead_cycle_residue
    type: uint64_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: playback_level
    type: uint8_t
    initial: "128"
  - name: total_samples
    type: uint64_t
    initial: "0"

interfaces:
  callbacks:
    - name: select_source
      args: [u8, u8, ptr, ptr]
      returns: u8
    - name: load_media
      args: [ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: []
      returns: u8
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_sample_rate
      args: []
      returns: u64
    - name: query_playhead_samples
      args: []
      returns: u64
    - name: query_playback_level
      args: []
      returns: u64
    - name: query_volume_percent
      args: []
      returns: u64
    - name: push_output_sample
      args: [u8, u64]
      returns: u8
  handlers: []
  signals: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->selected_source_kind = 0u;
      comp->selected_source_index = 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      comp->media_loaded = 0u;
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->volume_percent = 100u;
      comp->bass_percent = 50u;
      comp->treble_percent = 50u;
      comp->signal_sample_rate = 44100u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->playback_level = 128u;
      comp->total_samples = 0u;
    destroy: |
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      (void)cpu;
  callback_handlers:
    select_source: |
      const char *model = (argc > 2u && args[2] != 0u) ? (const char *)(uintptr_t)args[2] : NULL;
      const char *source_component = (argc > 3u && args[3] != 0u) ? (const char *)(uintptr_t)args[3] : NULL;
      comp->selected_source_kind = (argc > 0u) ? (uint8_t)(args[0] & 0xFFu) : 0u;
      comp->selected_source_index = (argc > 1u) ? (uint8_t)(args[1] & 0xFFu) : 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (model != NULL && model[0] != '\0') {
          comp->selected_source_model = strdup(model);
          if (comp->selected_source_model == NULL) return 0u;
      }
      if (source_component != NULL && source_component[0] != '\0') {
          comp->selected_source_component = strdup(source_component);
          if (comp->selected_source_component == NULL) return 0u;
      }
      return 1u;
    load_media: |
      if (argc < 1u || args[0] == 0u) return 0u;
      {
          const char *path = (const char *)(uintptr_t)args[0];
          const char *source_model = (comp->selected_source_model != NULL) ? comp->selected_source_model : "";
          const char *dot = strrchr(path, '.');
          FILE *fp;
          uint64_t total_samples = 0u;
          if (comp->selected_source_kind != 0u) return 0u;
          if (source_model[0] != '\0' && strcmp(source_model, "common_cas_file_source") != 0) return 0u;
          if (dot == NULL || strcmp(dot, ".cas") != 0) return 0u;
          fp = fopen(path, "rb");
          if (fp == NULL) return 0u;
          {
              uint8_t header[8];
              uint32_t current_baud = 600u;
              while (fread(header, 1, 8, fp) == 8u) {
                  uint32_t chunk_len = (uint32_t)header[4] | ((uint32_t)header[5] << 8u);
                  uint32_t chunk_aux = (uint32_t)header[6] | ((uint32_t)header[7] << 8u);
                  if (memcmp(header, "baud", 4) == 0) {
                      if (chunk_aux != 0u) current_baud = chunk_aux;
                  } else if (memcmp(header, "data", 4) == 0) {
                      uint64_t gap_samples = ((((uint64_t)chunk_aux * (uint64_t)comp->signal_sample_rate) + 5000u) / 10000u);
                      uint64_t bit_samples = ((uint64_t)comp->signal_sample_rate + ((uint64_t)current_baud / 2u)) / (uint64_t)current_baud;
                      if (bit_samples == 0u) bit_samples = 1u;
                      total_samples += gap_samples + ((uint64_t)chunk_len * bit_samples * 10u);
                  } else if (memcmp(header, "fsk ", 4) == 0) {
                      uint64_t gap_samples = ((((uint64_t)chunk_aux * (uint64_t)comp->signal_sample_rate) + 5000u) / 10000u);
                      total_samples += gap_samples;
                      if (chunk_len > 0u) {
                          uint8_t pair[2];
                          for (uint32_t i = 0u; i + 1u < chunk_len; i += 2u) {
                              if (fread(pair, 1, 2, fp) != 2u) break;
                              total_samples += ((((uint64_t)((uint32_t)pair[0] | ((uint32_t)pair[1] << 8u)) * (uint64_t)comp->signal_sample_rate) + 5000u) / 10000u);
                          }
                          if ((chunk_len & 1u) != 0u) (void)fseek(fp, 1L, SEEK_CUR);
                          continue;
                      }
                  }
                  if (chunk_len > 0u && fseek(fp, (long)chunk_len, SEEK_CUR) != 0) break;
              }
              rewind(fp);
          }
          fclose(fp);
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          comp->media_path = strdup(path);
          if (comp->media_path == NULL) return 0u;
          comp->media_loaded = 1u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->playhead_samples = 0u;
          comp->playhead_cycle_residue = 0u;
          comp->last_cycle = cpu->total_cycles;
          comp->playback_level = 128u;
          comp->total_samples = total_samples;
      }
      return 1u;
    unload_media: |
      comp->media_loaded = 0u;
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->playback_level = 128u;
      comp->total_samples = 0u;
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      return 1u;
    set_transport_mode: |
      if (argc < 1u) return 0u;
      comp->transport_mode = (uint8_t)(args[0] & 0xFFu);
      if (comp->transport_mode == 1u && comp->media_loaded != 0u) comp->motor_on = 1u;
      else if (comp->transport_mode == 0u) comp->motor_on = 0u;
      comp->last_cycle = cpu->total_cycles;
      return 1u;
    set_motor: |
      if (argc < 1u) return 0u;
      comp->motor_on = (uint8_t)(args[0] & 0x01u);
      comp->last_cycle = cpu->total_cycles;
      return 1u;
    set_volume: |
      if (argc < 1u) return 0u;
      comp->volume_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    set_bass: |
      if (argc < 1u) return 0u;
      comp->bass_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    set_treble: |
      if (argc < 1u) return 0u;
      comp->treble_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    sample_input: |
      {
          uint64_t delta;
          uint64_t numer;
          uint64_t clock_hz = (CPU_SYSTEM_CLOCK_HZ > 0u) ? (uint64_t)CPU_SYSTEM_CLOCK_HZ : 1u;
          if (comp->media_loaded == 0u || comp->motor_on == 0u || comp->transport_mode != 1u) {
              comp->last_cycle = cpu->total_cycles;
              comp->playback_level = 128u;
              return 128u;
          }
          delta = (cpu->total_cycles >= comp->last_cycle) ? (cpu->total_cycles - comp->last_cycle) : 0u;
          comp->last_cycle = cpu->total_cycles;
          numer = comp->playhead_cycle_residue + delta * (uint64_t)comp->signal_sample_rate;
          comp->playhead_samples += numer / clock_hz;
          comp->playhead_cycle_residue = numer % clock_hz;
          if (comp->total_samples > 0u && comp->playhead_samples >= comp->total_samples) {
              comp->playhead_samples = comp->total_samples;
              comp->transport_mode = 0u;
              comp->motor_on = 0u;
              comp->playhead_cycle_residue = 0u;
          }
          comp->playback_level = 128u;
          return 128u;
      }
    query_transport_state: |
      {
          uint64_t packed = (uint64_t)comp->transport_mode;
          uint64_t current_secs = 0u;
          if (comp->motor_on != 0u) packed |= (1ull << 8);
          if (comp->media_loaded != 0u) packed |= (1ull << 9);
          if (comp->signal_sample_rate != 0u) current_secs = comp->playhead_samples / (uint64_t)comp->signal_sample_rate;
          if (current_secs > 0xFFFFu) current_secs = 0xFFFFu;
          packed |= (current_secs & 0xFFFFu) << 16u;
          packed |= ((uint64_t)comp->volume_percent & 0xFFull) << 48u;
          return packed;
      }
    query_sample_rate: |
      return (uint64_t)comp->signal_sample_rate;
    query_playhead_samples: |
      return (uint64_t)comp->playhead_samples;
    query_playback_level: |
      return (uint64_t)comp->playback_level;
    query_volume_percent: |
      return (uint64_t)comp->volume_percent;
    push_output_sample: |
      (void)args;
      return 1u;
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
