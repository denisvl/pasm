metadata:
  id: cassette_msx_tsx_source
  type: cassette_source_backend
  model: msx1_cassette_tsx_source
  version: "1.0"

state:
  - name: selected_source_kind
    type: uint8_t
    initial: "0"
  - name: selected_source_index
    type: uint8_t
    initial: "0"
  - name: selected_source_model
    type: char *
    initial: "NULL"
  - name: selected_source_component
    type: char *
    initial: "NULL"
  - name: media_loaded
    type: uint8_t
    initial: "0"
  - name: transport_mode
    type: uint8_t
    initial: "0"
  - name: motor_on
    type: uint8_t
    initial: "0"
  - name: volume_percent
    type: uint8_t
    initial: "100"
  - name: bass_percent
    type: uint8_t
    initial: "50"
  - name: treble_percent
    type: uint8_t
    initial: "50"
  - name: media_path
    type: char *
    initial: "NULL"
  - name: edge_positions
    type: uint64_t *
    initial: "NULL"
  - name: edge_count
    type: uint32_t
    initial: "0"
  - name: edge_cap
    type: uint32_t
    initial: "0"
  - name: edge_index
    type: uint32_t
    initial: "0"
  - name: edge_initial_level
    type: uint8_t
    initial: "1"
  - name: signal_sample_rate
    type: uint32_t
    initial: "58900"
  - name: total_samples
    type: uint64_t
    initial: "0"
  - name: playhead_samples
    type: uint64_t
    initial: "0"
  - name: playhead_cycle_residue
    type: uint64_t
    initial: "0"
  - name: next_sample_cycle
    type: uint64_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: playback_level
    type: uint8_t
    initial: "255"

interfaces:
  callbacks:
    - name: select_source
      args: [u8, u8, ptr, ptr]
      returns: u8
    - name: load_media
      args: [ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: []
      returns: u8
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_edge_count
      args: []
      returns: u64
    - name: query_edge_initial_level
      args: []
      returns: u64
    - name: query_edge_fp
      args: [u32]
      returns: u64
    - name: query_sample_rate
      args: []
      returns: u64
    - name: query_playhead_samples
      args: []
      returns: u64
    - name: query_leader_start_sample
      args: []
      returns: u64
    - name: query_leader_start_index
      args: []
      returns: u64
    - name: query_leader_end_sample
      args: []
      returns: u64
    - name: query_leader_end_index
      args: []
      returns: u64
    - name: query_playback_level
      args: []
      returns: u64
    - name: query_volume_percent
      args: []
      returns: u64
    - name: set_playhead_fp
      args: [u64, u32]
      returns: u8
    - name: push_output_sample
      args: [u8, u64]
      returns: u8
  handlers: []
  signals: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->selected_source_kind = 0u;
      comp->selected_source_index = 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      comp->media_loaded = 0u;
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->volume_percent = 100u;
      comp->bass_percent = 50u;
      comp->treble_percent = 50u;
      comp->edge_count = 0u;
      comp->edge_cap = 0u;
      comp->edge_index = 0u;
      comp->edge_initial_level = 1u;
      comp->signal_sample_rate = 58900u;
      comp->total_samples = 0u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->next_sample_cycle = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->playback_level = 255u;
    destroy: |
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      (void)cpu;
  callback_handlers:
    select_source: |
      const char *model = (argc > 2u && args[2] != 0u) ? (const char *)(uintptr_t)args[2] : NULL;
      const char *source_component = (argc > 3u && args[3] != 0u) ? (const char *)(uintptr_t)args[3] : NULL;
      comp->selected_source_kind = (argc > 0u) ? (uint8_t)(args[0] & 0xFFu) : 0u;
      comp->selected_source_index = (argc > 1u) ? (uint8_t)(args[1] & 0xFFu) : 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (comp->selected_source_component != NULL) {
          free(comp->selected_source_component);
          comp->selected_source_component = NULL;
      }
      if (model != NULL && model[0] != '\0') {
          comp->selected_source_model = strdup(model);
          if (comp->selected_source_model == NULL) return 0u;
      }
      if (source_component != NULL && source_component[0] != '\0') {
          comp->selected_source_component = strdup(source_component);
          if (comp->selected_source_component == NULL) return 0u;
      }
      return 1u;
    load_media: |
      if (argc < 1u || args[0] == 0u) return 0u;
      {
          const char *path = (const char *)(uintptr_t)args[0];
          const char *source_model = (comp->selected_source_model != NULL) ? comp->selected_source_model : "";
          const char *trace_env = cpu_host_hal_getenv("PASM_MSX_TSX_TRACE");
          FILE *trace_fp = NULL;
          const char *dot = strrchr(path, '.');
          FILE *fp = NULL;
          uint8_t *buf = NULL;
          long file_size = 0;
          uint64_t *edges = NULL;
          uint32_t edge_count = 0u;
          uint32_t edge_cap = 0u;
          size_t pos = 0u;
          uint64_t sample_cursor = 0u;
          uint8_t signal_level = 1u;
          int parser_level = 1;
          double accum_samples = 0.0;
          const char *fail_reason = "unknown";
          if (trace_env != NULL && trace_env[0] != '\0' && trace_env[0] != '0') {
              trace_fp = fopen("/tmp/msx_tsx_trace.log", "a");
          }
          if (trace_fp != NULL) {
              fprintf(trace_fp, "load_media begin path=%s source_kind=%u source_model=%s\n",
                      path,
                      (unsigned)comp->selected_source_kind,
                      source_model);
              fflush(trace_fp);
          }
          if (comp->selected_source_kind != 0u) {
              fail_reason = "wrong_source_kind";
              goto msx_tsx_fail;
          }
          if (source_model[0] != '\0' && strcmp(source_model, "msx1_tsx_file_source") != 0) {
              fail_reason = "wrong_source_model";
              goto msx_tsx_fail;
          }
          if (dot == NULL ||
              dot[1] == '\0' || dot[2] == '\0' || dot[3] == '\0' || dot[4] != '\0' ||
              (char)tolower((unsigned char)dot[1]) != 't' ||
              (char)tolower((unsigned char)dot[2]) != 's' ||
              (char)tolower((unsigned char)dot[3]) != 'x') {
              fail_reason = "bad_extension";
              goto msx_tsx_fail;
          }
          if (comp->edge_positions != NULL) {
              free(comp->edge_positions);
              comp->edge_positions = NULL;
          }
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          comp->edge_count = 0u;
          comp->edge_cap = 0u;
          comp->edge_index = 0u;
          comp->edge_initial_level = 1u;
          comp->total_samples = 0u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->next_sample_cycle = cpu->total_cycles;
      comp->playback_level = 255u;
      comp->media_loaded = 0u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          fp = fopen(path, "rb");
        if (fp == NULL) {
            fail_reason = "fopen";
            goto msx_tsx_fail;
        }
        if (fseek(fp, 0L, SEEK_END) != 0) {
            fail_reason = "fseek_end";
            fclose(fp);
            goto msx_tsx_fail;
        }
        file_size = ftell(fp);
        if (file_size <= 10) {
            fail_reason = "file_too_small";
            fclose(fp);
            goto msx_tsx_fail;
        }
        if (fseek(fp, 0L, SEEK_SET) != 0) {
            fail_reason = "fseek_set";
            fclose(fp);
            goto msx_tsx_fail;
        }
        buf = (uint8_t *)malloc((size_t)file_size);
        if (buf == NULL) {
            fail_reason = "malloc_buf";
            fclose(fp);
            goto msx_tsx_fail;
        }
        if (fread(buf, 1, (size_t)file_size, fp) != (size_t)file_size) {
            fail_reason = "fread";
            free(buf);
            fclose(fp);
            buf = NULL;
            goto msx_tsx_fail;
        }
        fclose(fp);
        if ((size_t)file_size < 10u || memcmp(buf, "ZXTape!\x1A", 8u) != 0) {
            fail_reason = "bad_header";
            goto msx_tsx_fail;
        }
        if ((((uint16_t)buf[8] << 8u) | (uint16_t)buf[9]) < 0x0115u) {
            fail_reason = "bad_version";
            goto msx_tsx_fail;
        }
          pos = 10u;
          #define MSX_TSX_NEED(n) do { if ((uint64_t)pos + (uint64_t)(n) > (uint64_t)file_size) goto msx_tsx_fail; } while (0)
          #define MSX_TSX_U16(off) ((uint16_t)buf[(off)] | ((uint16_t)buf[(off) + 1u] << 8u))
          #define MSX_TSX_U24(off) ((uint32_t)buf[(off)] | ((uint32_t)buf[(off) + 1u] << 8u) | ((uint32_t)buf[(off) + 2u] << 16u))
          #define MSX_TSX_U32(off) ((uint32_t)buf[(off)] | ((uint32_t)buf[(off) + 1u] << 8u) | ((uint32_t)buf[(off) + 2u] << 16u) | ((uint32_t)buf[(off) + 3u] << 24u))
          #define MSX_TSX_APPEND_EDGE(sample_pos) \
              do { \
                  if (edge_count >= edge_cap) { \
                      uint32_t new_cap = (edge_cap == 0u) ? 4096u : (edge_cap * 2u); \
                      uint64_t *new_edges = (uint64_t *)realloc(edges, (size_t)new_cap * sizeof(uint64_t)); \
                      if (new_edges == NULL) goto msx_tsx_fail; \
                      edges = new_edges; \
                      edge_cap = new_cap; \
                  } \
                  edges[edge_count++] = (sample_pos); \
              } while (0)
          #define MSX_TSX_WRITE_RUN(level, count) \
              do { \
                  uint64_t __run_count = (uint64_t)(count); \
                  uint8_t __run_level = (uint8_t)((level) ? 1u : 0u); \
                  if (__run_count != 0u) { \
                      if (signal_level != __run_level) { \
                          MSX_TSX_APPEND_EDGE(sample_cursor); \
                          signal_level = __run_level; \
                      } \
                      sample_cursor += __run_count; \
                  } \
              } while (0)
          #define MSX_TSX_ADVANCE_TSTATES(tstates_val, level_val) \
              do { \
                  double __samples = ((double)(tstates_val) * 58900.0) / 3500000.0; \
                  accum_samples += __samples; \
                  { \
                      uint64_t __count = (uint64_t)accum_samples; \
                      accum_samples -= (double)__count; \
                      MSX_TSX_WRITE_RUN((level_val), __count); \
                  } \
              } while (0)
          #define MSX_TSX_WRITE_PULSE(tstates_val) \
              do { \
                  MSX_TSX_ADVANCE_TSTATES((tstates_val), parser_level > 0); \
                  parser_level = -parser_level; \
              } while (0)
          #define MSX_TSX_WRITE_PULSES(count_val, tstates_val) \
              do { \
                  uint32_t __count = (uint32_t)(count_val); \
                  for (uint32_t __i = 0u; __i < __count; ++__i) { \
                      MSX_TSX_WRITE_PULSE((tstates_val)); \
                  } \
              } while (0)
          #define MSX_TSX_WRITE_SILENCE(ms_val) \
              do { \
                  uint32_t __count = ((uint32_t)(ms_val) * 58900u) / 1000u; \
                  MSX_TSX_WRITE_RUN(1u, __count); \
                  signal_level = 1u; \
                  parser_level = 1; \
              } while (0)
          #define MSX_TSX_WRITE_STD_BITS(data_ptr, data_len, last_bits, zero_len, one_len) \
              do { \
                  uint32_t __len = (uint32_t)(data_len); \
                  for (uint32_t __i = 0u; __i < __len; ++__i) { \
                      uint8_t __bits = (uint8_t)((__i + 1u == __len) ? (last_bits) : 8u); \
                      uint8_t __byte = (data_ptr)[__i]; \
                      for (uint8_t __bit = 0u; __bit < __bits; ++__bit) { \
                          uint32_t __pulse = (__byte & (uint8_t)(0x80u >> __bit)) ? (uint32_t)(one_len) : (uint32_t)(zero_len); \
                          MSX_TSX_WRITE_PULSES(2u, __pulse); \
                      } \
                  } \
              } while (0)
          while (pos < (size_t)file_size) {
              uint8_t block_id;
              MSX_TSX_NEED(1u);
              block_id = buf[pos++];
              switch (block_id) {
                  case 0x10: {
                      uint16_t pause_ms;
                      uint16_t len;
                      MSX_TSX_NEED(4u);
                      pause_ms = MSX_TSX_U16(pos);
                      len = MSX_TSX_U16(pos + 2u);
                      pos += 4u;
                      MSX_TSX_NEED(len);
                      parser_level = -1;
                      MSX_TSX_WRITE_PULSES(3223u, 2168u);
                      MSX_TSX_WRITE_PULSE(667u);
                      MSX_TSX_WRITE_PULSE(735u);
                      MSX_TSX_WRITE_STD_BITS(buf + pos, len, 8u, 855u, 1710u);
                      if (pause_ms != 0u) MSX_TSX_WRITE_PULSE(2000u);
                      MSX_TSX_WRITE_SILENCE(pause_ms);
                      pos += len;
                      break;
                  }
                  case 0x11: {
                      uint16_t pilot, sync1, sync2, zero_len, one_len, pilot_len, pause_ms;
                      uint8_t last_bits;
                      uint32_t len;
                      MSX_TSX_NEED(18u);
                      pilot = MSX_TSX_U16(pos);
                      sync1 = MSX_TSX_U16(pos + 2u);
                      sync2 = MSX_TSX_U16(pos + 4u);
                      zero_len = MSX_TSX_U16(pos + 6u);
                      one_len = MSX_TSX_U16(pos + 8u);
                      pilot_len = MSX_TSX_U16(pos + 10u);
                      last_bits = buf[pos + 12u];
                      pause_ms = MSX_TSX_U16(pos + 13u);
                      len = MSX_TSX_U24(pos + 15u);
                      pos += 18u;
                      if (len < 1u || last_bits < 1u || last_bits > 8u) goto msx_tsx_fail;
                      MSX_TSX_NEED(len);
                      parser_level = -1;
                      MSX_TSX_WRITE_PULSES(pilot_len, pilot);
                      MSX_TSX_WRITE_PULSE(sync1);
                      MSX_TSX_WRITE_PULSE(sync2);
                      MSX_TSX_WRITE_STD_BITS(buf + pos, len, last_bits, zero_len, one_len);
                      if (pause_ms != 0u) MSX_TSX_WRITE_PULSE(2000u);
                      MSX_TSX_WRITE_SILENCE(pause_ms);
                      pos += len;
                      break;
                  }
                  case 0x12: {
                      uint16_t pulse_len, pulses;
                      MSX_TSX_NEED(4u);
                      pulse_len = MSX_TSX_U16(pos);
                      pulses = MSX_TSX_U16(pos + 2u);
                      pos += 4u;
                      MSX_TSX_WRITE_PULSES((uint32_t)(pulses & (uint16_t)~1u), pulse_len);
                      break;
                  }
                  case 0x13: {
                      uint8_t pulse_count;
                      MSX_TSX_NEED(1u);
                      pulse_count = buf[pos++];
                      MSX_TSX_NEED((size_t)pulse_count * 2u);
                      for (uint32_t i = 0u; i < pulse_count; ++i) {
                          MSX_TSX_WRITE_PULSE(MSX_TSX_U16(pos + i * 2u));
                      }
                      pos += (size_t)pulse_count * 2u;
                      break;
                  }
                  case 0x15: {
                      uint16_t bit_tstates, pause_ms;
                      uint8_t last_bits;
                      uint32_t len;
                      MSX_TSX_NEED(8u);
                      bit_tstates = MSX_TSX_U16(pos);
                      pause_ms = MSX_TSX_U16(pos + 2u);
                      last_bits = buf[pos + 4u];
                      len = MSX_TSX_U24(pos + 5u);
                      pos += 8u;
                      if (len < 1u || last_bits < 1u || last_bits > 8u) goto msx_tsx_fail;
                      MSX_TSX_NEED(len);
                      for (uint32_t i = 0u; i < len; ++i) {
                          uint8_t bits = (uint8_t)((i + 1u == len) ? last_bits : 8u);
                          uint8_t byte = buf[pos + i];
                          for (uint8_t bit = 0u; bit < bits; ++bit) {
                              MSX_TSX_ADVANCE_TSTATES(bit_tstates, (byte & 0x80u) != 0u);
                              byte <<= 1u;
                          }
                      }
                      MSX_TSX_WRITE_SILENCE(pause_ms);
                      pos += len;
                      break;
                  }
                  case 0x20: {
                      uint16_t pause_ms;
                      MSX_TSX_NEED(2u);
                      pause_ms = MSX_TSX_U16(pos);
                      pos += 2u;
                      MSX_TSX_WRITE_SILENCE(pause_ms);
                      break;
                  }
                  case 0x21: {
                      uint8_t text_len;
                      MSX_TSX_NEED(1u);
                      text_len = buf[pos++];
                      MSX_TSX_NEED(text_len);
                      pos += text_len;
                      break;
                  }
                  case 0x22:
                      break;
                  case 0x30: {
                      uint8_t text_len;
                      MSX_TSX_NEED(1u);
                      text_len = buf[pos++];
                      MSX_TSX_NEED(text_len);
                      pos += text_len;
                      break;
                  }
                  case 0x32: {
                      uint16_t block_len;
                      MSX_TSX_NEED(2u);
                      block_len = MSX_TSX_U16(pos);
                      if (trace_fp != NULL) {
                          fprintf(trace_fp, "block 0x32 pos=%zu len=%u sample_cursor=%llu edge_count=%u\n",
                                  pos - 1u,
                                  (unsigned)block_len,
                                  (unsigned long long)sample_cursor,
                                  (unsigned)edge_count);
                      }
                      pos += 2u;
                      MSX_TSX_NEED(block_len);
                      pos += block_len;
                      break;
                  }
                  case 0x35: {
                      uint32_t block_len;
                      MSX_TSX_NEED(20u);
                      block_len = MSX_TSX_U32(pos + 16u);
                      if (trace_fp != NULL) {
                          fprintf(trace_fp, "block 0x35 pos=%zu len=%u sample_cursor=%llu edge_count=%u\n",
                                  pos - 1u,
                                  (unsigned)block_len,
                                  (unsigned long long)sample_cursor,
                                  (unsigned)edge_count);
                      }
                      pos += 20u;
                      MSX_TSX_NEED(block_len);
                      pos += block_len;
                      break;
                  }
                  case 0x4B: {
                      uint32_t block_len, data_len;
                      uint16_t pause_ms, pilot, pulses, bit0len, bit1len;
                      uint8_t bit_cfg, byte_cfg;
                      uint8_t num_zero_pulses, num_one_pulses, num_start_bits, start_bit_val, num_stop_bits, stop_bit_val, msb;
                      MSX_TSX_NEED(14u);
                      block_len = MSX_TSX_U32(pos);
                      pause_ms = MSX_TSX_U16(pos + 4u);
                      pilot = MSX_TSX_U16(pos + 6u);
                      pulses = MSX_TSX_U16(pos + 8u);
                      bit0len = MSX_TSX_U16(pos + 10u);
                      bit1len = MSX_TSX_U16(pos + 12u);
                      MSX_TSX_NEED((size_t)block_len + 4u);
                      if (block_len < 10u) {
                          fail_reason = "block4b_short";
                          goto msx_tsx_fail;
                      }
                      bit_cfg = buf[pos + 14u];
                      byte_cfg = buf[pos + 15u];
                      data_len = block_len - 12u;
                      pos += 16u;
                      num_zero_pulses = (uint8_t)((bit_cfg >> 4u) ? (bit_cfg >> 4u) : 16u);
                      num_one_pulses = (uint8_t)((bit_cfg & 0x0Fu) ? (bit_cfg & 0x0Fu) : 16u);
                      num_start_bits = (uint8_t)((byte_cfg >> 6u) & 0x03u);
                      start_bit_val = (uint8_t)((byte_cfg >> 5u) & 0x01u);
                      num_stop_bits = (uint8_t)((byte_cfg >> 3u) & 0x03u);
                      stop_bit_val = (uint8_t)((byte_cfg >> 2u) & 0x01u);
                      msb = (uint8_t)(byte_cfg & 0x01u);
                      if ((byte_cfg & 0x02u) != 0u) goto msx_tsx_fail;
                      if (trace_fp != NULL) {
                          fprintf(trace_fp,
                                  "block 0x4B pos=%zu block_len=%u pause=%u pilot=%u pulses=%u bit0=%u bit1=%u bit_cfg=%02X byte_cfg=%02X data_len=%u before_samples=%llu before_edges=%u\n",
                                  pos - 1u,
                                  (unsigned)block_len,
                                  (unsigned)pause_ms,
                                  (unsigned)pilot,
                                  (unsigned)pulses,
                                  (unsigned)bit0len,
                                  (unsigned)bit1len,
                                  (unsigned)bit_cfg,
                                  (unsigned)byte_cfg,
                                  (unsigned)data_len,
                                  (unsigned long long)sample_cursor,
                                  (unsigned)edge_count);
                      }
                      MSX_TSX_WRITE_PULSES(pulses, pilot);
                      for (uint32_t i = 0u; i < data_len; ++i) {
                          uint8_t d = buf[pos + i];
                          for (uint32_t n = 0u; n < num_start_bits; ++n) {
                              MSX_TSX_WRITE_PULSES(start_bit_val ? num_one_pulses : num_zero_pulses, start_bit_val ? bit1len : bit0len);
                          }
                          for (uint32_t bit = 0u; bit < 8u; ++bit) {
                              uint8_t mask = (uint8_t)(1u << (msb ? (7u - bit) : bit));
                              uint8_t one = (uint8_t)((d & mask) != 0u);
                              MSX_TSX_WRITE_PULSES(one ? num_one_pulses : num_zero_pulses, one ? bit1len : bit0len);
                          }
                          for (uint32_t n = 0u; n < num_stop_bits; ++n) {
                              MSX_TSX_WRITE_PULSES(stop_bit_val ? num_one_pulses : num_zero_pulses, stop_bit_val ? bit1len : bit0len);
                          }
                      }
                      MSX_TSX_WRITE_SILENCE(pause_ms);
                      if (trace_fp != NULL) {
                          fprintf(trace_fp,
                                  "block 0x4B done after_samples=%llu after_edges=%u accum=%.6f signal=%u parser=%d\n",
                                  (unsigned long long)sample_cursor,
                                  (unsigned)edge_count,
                                  accum_samples,
                                  (unsigned)signal_level,
                                  parser_level);
                      }
                      pos += data_len;
                      break;
                  }
                  case 0x5A:
                      MSX_TSX_NEED(9u);
                      pos += 9u;
                      break;
                  default:
                      goto msx_tsx_fail;
              }
          }
          free(buf);
          buf = NULL;
          comp->media_path = strdup(path);
          if (comp->media_path == NULL) {
              fail_reason = "strdup_path";
              goto msx_tsx_fail;
          }
          comp->edge_positions = edges;
          comp->edge_count = edge_count;
          comp->edge_cap = edge_cap;
          comp->edge_index = 0u;
          comp->edge_initial_level = 1u;
          comp->media_loaded = 1u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->total_samples = sample_cursor;
          comp->playhead_samples = 0u;
          comp->playhead_cycle_residue = 0u;
          comp->next_sample_cycle = cpu->total_cycles;
          comp->last_cycle = cpu->total_cycles;
          comp->playback_level = 255u;
          if (trace_fp != NULL) {
              fprintf(trace_fp,
                      "load_media ok file_size=%ld total_samples=%llu edge_count=%u sample_rate=%u\n",
                      file_size,
                      (unsigned long long)sample_cursor,
                      (unsigned)edge_count,
                      (unsigned)comp->signal_sample_rate);
              fclose(trace_fp);
          }
          return 1u;
      msx_tsx_fail:
          if (buf != NULL) free(buf);
          if (edges != NULL) free(edges);
          if (comp->media_path != NULL) {
              free(comp->media_path);
              comp->media_path = NULL;
          }
          if (comp->edge_positions != NULL) {
              free(comp->edge_positions);
              comp->edge_positions = NULL;
          }
          comp->edge_count = 0u;
          comp->edge_cap = 0u;
          comp->edge_index = 0u;
          comp->media_loaded = 0u;
          comp->transport_mode = 0u;
          comp->motor_on = 0u;
          comp->total_samples = 0u;
          comp->playhead_samples = 0u;
          comp->playback_level = 255u;
          if (trace_fp != NULL) {
              fprintf(trace_fp,
                      "load_media fail reason=%s file_size=%ld pos=%zu total_samples=%llu edge_count=%u\n",
                      fail_reason,
                      file_size,
                      pos,
                      (unsigned long long)sample_cursor,
                      (unsigned)edge_count);
              fclose(trace_fp);
          }
      }
      return 0u;
    unload_media: |
      comp->media_loaded = 0u;
      comp->transport_mode = 0u;
      comp->motor_on = 0u;
      comp->edge_index = 0u;
      comp->total_samples = 0u;
      comp->playhead_samples = 0u;
      comp->playhead_cycle_residue = 0u;
      comp->next_sample_cycle = cpu->total_cycles;
      comp->last_cycle = cpu->total_cycles;
      comp->playback_level = 255u;
      if (comp->media_path != NULL) {
          free(comp->media_path);
          comp->media_path = NULL;
      }
      if (comp->edge_positions != NULL) {
          free(comp->edge_positions);
          comp->edge_positions = NULL;
      }
      comp->edge_count = 0u;
      comp->edge_cap = 0u;
      return 1u;
    set_transport_mode: |
      if (argc < 1u) return 0u;
      comp->transport_mode = (uint8_t)(args[0] & 0xFFu);
      if (comp->transport_mode == 1u && comp->media_loaded != 0u) comp->motor_on = 1u;
      else if (comp->transport_mode == 0u) comp->motor_on = 0u;
      comp->next_sample_cycle = cpu->total_cycles;
      comp->playhead_cycle_residue = 0u;
      comp->last_cycle = cpu->total_cycles;
      return 1u;
    set_motor: |
      if (argc < 1u) return 0u;
      comp->motor_on = (uint8_t)(args[0] & 0x01u);
      comp->next_sample_cycle = cpu->total_cycles;
      comp->playhead_cycle_residue = 0u;
      comp->last_cycle = cpu->total_cycles;
      return 1u;
    set_volume: |
      if (argc < 1u) return 0u;
      comp->volume_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    set_bass: |
      if (argc < 1u) return 0u;
      comp->bass_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    set_treble: |
      if (argc < 1u) return 0u;
      comp->treble_percent = (uint8_t)((args[0] > 100u) ? 100u : args[0]);
      return 1u;
    sample_input: |
      {
          uint64_t now = cpu->total_cycles;
          uint8_t current_level = comp->edge_initial_level;
          if (comp->media_loaded == 0u || comp->motor_on == 0u || comp->transport_mode != 1u) {
              comp->next_sample_cycle = now;
              comp->playhead_cycle_residue = 0u;
              comp->last_cycle = now;
              comp->playback_level = 255u;
              return 255u;
          }
          if (comp->signal_sample_rate != 0u && CPU_SYSTEM_CLOCK_HZ > 0u) {
              uint64_t period = (uint64_t)CPU_SYSTEM_CLOCK_HZ / (uint64_t)comp->signal_sample_rate;
              uint64_t rem = (uint64_t)CPU_SYSTEM_CLOCK_HZ % (uint64_t)comp->signal_sample_rate;
              if (period == 0u) period = 1u;
              while (now >= comp->next_sample_cycle && comp->playhead_samples < comp->total_samples) {
                  comp->playhead_samples += 1u;
                  comp->next_sample_cycle += period;
                  comp->playhead_cycle_residue += rem;
                  if (comp->playhead_cycle_residue >= (uint64_t)comp->signal_sample_rate) {
                      comp->next_sample_cycle += 1u;
                      comp->playhead_cycle_residue -= (uint64_t)comp->signal_sample_rate;
                  }
              }
          }
          comp->last_cycle = now;
          if (comp->total_samples != 0u && comp->playhead_samples >= comp->total_samples) {
              comp->playhead_samples = comp->total_samples;
              comp->transport_mode = 0u;
              comp->motor_on = 0u;
              comp->edge_index = comp->edge_count;
              comp->playback_level = 255u;
              return 255u;
          }
          while (comp->edge_index < comp->edge_count && comp->edge_positions[comp->edge_index] <= comp->playhead_samples) {
              comp->edge_index += 1u;
          }
          current_level = (uint8_t)(comp->edge_initial_level ^ (uint8_t)(comp->edge_index & 0x01u));
          comp->playback_level = current_level ? 255u : 0u;
          return (uint64_t)comp->playback_level;
      }
    query_transport_state: |
      {
          uint64_t packed = (uint64_t)comp->transport_mode;
          uint64_t current_secs = 0u;
          uint64_t total_secs = 0u;
          if (comp->motor_on != 0u) packed |= (1ull << 8);
          if (comp->media_loaded != 0u) packed |= (1ull << 9);
          if (comp->signal_sample_rate != 0u) {
              current_secs = comp->playhead_samples / (uint64_t)comp->signal_sample_rate;
              total_secs = comp->total_samples / (uint64_t)comp->signal_sample_rate;
          }
          if (current_secs > 0xFFFFu) current_secs = 0xFFFFu;
          if (total_secs > 0xFFFFu) total_secs = 0xFFFFu;
          packed |= (current_secs & 0xFFFFu) << 16u;
          packed |= (total_secs & 0xFFFFu) << 32u;
          packed |= ((uint64_t)comp->volume_percent & 0xFFull) << 48u;
          return packed;
      }
    query_edge_count: |
      return (uint64_t)comp->edge_count;
    query_edge_initial_level: |
      return (uint64_t)comp->edge_initial_level;
    query_edge_fp: |
      if (argc < 1u) return 0u;
      {
          uint32_t index = (uint32_t)(args[0] & 0xFFFFFFFFu);
          if (index < comp->edge_count && comp->edge_positions != NULL) return comp->edge_positions[index];
      }
      return 0u;
    query_sample_rate: |
      return (uint64_t)comp->signal_sample_rate;
    query_playhead_samples: |
      return (uint64_t)comp->playhead_samples;
    query_leader_start_sample: |
      return 0u;
    query_leader_start_index: |
      return 0u;
    query_leader_end_sample: |
      return 0u;
    query_leader_end_index: |
      return 0u;
    query_playback_level: |
      return (uint64_t)comp->playback_level;
    query_volume_percent: |
      return (uint64_t)comp->volume_percent;
    set_playhead_fp: |
      if (argc < 1u) return 0u;
      {
          uint64_t fp = args[0];
          comp->playhead_samples = fp >> 8u;
          if (comp->playhead_samples > comp->total_samples) comp->playhead_samples = comp->total_samples;
          comp->edge_index = 0u;
          while (comp->edge_index < comp->edge_count && comp->edge_positions[comp->edge_index] <= comp->playhead_samples) {
              comp->edge_index += 1u;
          }
          comp->playhead_cycle_residue = 0u;
          comp->next_sample_cycle = cpu->total_cycles;
          comp->last_cycle = cpu->total_cycles;
          comp->playback_level = (comp->edge_initial_level ^ (uint8_t)(comp->edge_index & 0x01u)) ? 255u : 0u;
      }
      return 1u;
    push_output_sample: |
      (void)args;
      return 1u;
  handler_bodies: {}

coding:
  headers:
    - ctype.h
    - stdio.h
    - stdlib.h
    - string.h
  include_paths: []
  linked_libraries: []
  library_paths: []
