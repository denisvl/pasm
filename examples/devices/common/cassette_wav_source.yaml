  - name: selected_source_kind
    type: uint8_t
    initial: "0"
  - name: selected_source_model
    type: char *
    initial: "NULL"
  - name: selected_source_component
    type: char *
    initial: "NULL"
  - name: media_loaded
    type: uint8_t
    initial: "0"
  - name: transport_mode
    type: uint8_t
    initial: "0"
  - name: motor_on
    type: uint8_t
    initial: "0"
  - name: volume_percent
    type: uint8_t
    initial: "100"
  - name: bass_percent
    type: uint8_t
    initial: "50"
  - name: treble_percent
    type: uint8_t
    initial: "50"
  - name: input_level
    type: uint8_t
    initial: "128"
  - name: input_raw_level
    type: uint8_t
    initial: "128"
  - name: input_bias_q8
    type: uint32_t
    initial: "32768"
  - name: last_cycle
