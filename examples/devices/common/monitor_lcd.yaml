metadata:
  id: monitor
  type: display_output
  model: generic_lcd_monitor
  version: '1.0'
  display:
    kind: monitor
    technology: lcd
    model: generic_lcd_monitor
    max_resolution:
      width: 1280
      height: 1024
    inches: 17
    colors: 16777216
    frequency_hz: 60
    filter_function: lcd_integer_scale
    is_monitor: true
    aspect_ratio:
      width: 4
      height: 3
    scaling:
      mode: stretch_to_fit_aspect
      integer_scale_base: 2
      large_screen_inches: 102
      resize_preserves_aspect: true
state:
- name: frame_count
  type: uint32_t
  initial: '0'
- name: width
  type: uint32_t
  initial: '0'
- name: height
  type: uint32_t
  initial: '0'
- name: aspect_width
  type: uint32_t
  initial: '4'
- name: aspect_height
  type: uint32_t
  initial: '3'
interfaces:
  callbacks: []
  handlers:
  - name: on_frame_present
    args:
    - u32
    - u64
    - u32
    - u32
  - name: on_frame_present5
    args:
    - u32
    - u64
    - u32
    - u32
    - u8
  signals:
  - name: frame_present
    args:
    - u32
    - u64
    - u32
    - u32
  - name: frame_present5
    args:
    - u32
    - u64
    - u32
    - u32
    - u8
behavior:
  snippets: {}
  callback_handlers: {}
  handler_bodies:
    on_frame_present: 'comp->frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);

      comp->width = (uint32_t)(args[2] & 0xFFFFFFFFu);

      comp->height = (uint32_t)(args[3] & 0xFFFFFFFFu);

      cpu_component_emit_signal(cpu, "monitor", "frame_present", args, argc);

      '
    on_frame_present5: 'comp->frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);

      comp->width = (uint32_t)(args[2] & 0xFFFFFFFFu);

      comp->height = (uint32_t)(args[3] & 0xFFFFFFFFu);

      cpu_component_emit_signal(cpu, "monitor", "frame_present5", args, argc);

      '
coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
