metadata:
  id: mic0
  type: audio_input
  model: zx48_mic_pcm
  version: "1.0"

state:
  - name: current_level
    type: uint8_t
    initial: "0"
  - name: next_sample_cycle
    type: uint64_t
    initial: "0"

interfaces:
  callbacks:
    - name: sample_input
      args: []
      returns: u8
  handlers: []
  signals:
    - name: mic_level
      args: [u8]

behavior:
  snippets:
    step_post: |
      {
          uint64_t sample_args[2] = { 0x44u, cpu->total_cycles };
          uint8_t sample = (uint8_t)cpu_component_dispatch_callback(
              cpu, "cassette_transport_nomotor", "sample_input", sample_args, 2
          );
          if (sample != comp->current_level || comp->next_sample_cycle == 0u) {
              comp->current_level = sample;
              {
                  uint64_t sig_args[1] = { (uint64_t)sample };
                  cpu_component_emit_signal(cpu, "mic0", "mic_level", sig_args, 1);
              }
          }
          comp->next_sample_cycle = cpu->total_cycles;
      }
  callback_handlers: {}
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
