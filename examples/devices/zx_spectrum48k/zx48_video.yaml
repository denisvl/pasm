metadata:
  id: video0
  type: video
  model: zx48_framebuffer_352x296_border
  version: "1.0"

state:
  - name: frame_count
    type: uint32_t
    initial: "0"
  - name: border_color
    type: uint8_t
    initial: "0"
  - name: frame_start_border_color
    type: uint8_t
    initial: "0"
  - name: border_event_count
    type: uint16_t
    initial: "0"
  - name: border_event_colors
    type: uint8_t *
    initial: "NULL"
  - name: border_event_tstates
    type: uint32_t *
    initial: "NULL"
  - name: border_timeline
    type: uint8_t *
    initial: "NULL"

interfaces:
  callbacks: []
  handlers:
    - name: on_frame_boundary
      args: [u32]
    - name: on_border_changed
      args: [u8, u64]
  signals:
    - name: frame_ready
      args: [u32, u64, u32, u32, u8]
    - name: border_present
      args: [u8]

behavior:
  snippets:
    init: |
      comp->border_event_colors = (uint8_t *)calloc(2048u, sizeof(uint8_t));
      comp->border_event_tstates = (uint32_t *)calloc(2048u, sizeof(uint32_t));
      comp->border_timeline = (uint8_t *)calloc(69888u, sizeof(uint8_t));
    destroy: |
      if (comp->border_event_colors != NULL) free(comp->border_event_colors);
      if (comp->border_event_tstates != NULL) free(comp->border_event_tstates);
      if (comp->border_timeline != NULL) free(comp->border_timeline);
  callback_handlers: {}
  handler_bodies:
    on_frame_boundary: |
      comp->frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);
      enum {
          ZX_FB_W = 352u,
          ZX_FB_H = 296u,
          ZX_ACTIVE_W = 256u,
          ZX_ACTIVE_H = 192u,
          ZX_BORDER_X = 48u,
          ZX_BORDER_Y = 48u,
          ZX_ULA_LINES = 312u,
          ZX_ULA_TSTATES_PER_LINE = 224u,
          ZX_VISIBLE_LINE_START = 16u,
          ZX_VISIBLE_TSTATE_START = 24u,
          ZX_TSTATES_PER_PIXEL_X_NUM = 1u,
          ZX_TSTATES_PER_PIXEL_X_DEN = 2u
      };
      static uint32_t framebuf[ZX_FB_W * ZX_FB_H];
      static const uint32_t palette[16] = {
          0xFF000000u, 0xFF0000D7u, 0xFFD70000u, 0xFFD700D7u,
          0xFF00D700u, 0xFF00D7D7u, 0xFFD7D700u, 0xFFD7D7D7u,
          0xFF000000u, 0xFF0000FFu, 0xFFFF0000u, 0xFFFF00FFu,
          0xFF00FF00u, 0xFF00FFFFu, 0xFFFFFF00u, 0xFFFFFFFFu
      };
      uint8_t flash_phase = (uint8_t)((comp->frame_count >> 5) & 1u);
      if (comp->border_timeline != NULL) {
          uint32_t color = (uint32_t)(comp->frame_start_border_color & 0x07u);
          uint32_t ev = 0u;
          for (uint32_t ts = 0u; ts < (ZX_ULA_LINES * ZX_ULA_TSTATES_PER_LINE); ++ts) {
              while (ev < (uint32_t)comp->border_event_count && comp->border_event_tstates[ev] == ts) {
                  color = (uint32_t)(comp->border_event_colors[ev] & 0x07u);
                  ev += 1u;
              }
              comp->border_timeline[ts] = (uint8_t)color;
          }
      }
      for (uint32_t y = 0; y < ZX_FB_H; ++y) {
          uint32_t ula_line = ZX_VISIBLE_LINE_START + y;
          uint32_t ts_base = ula_line * ZX_ULA_TSTATES_PER_LINE;
          for (uint32_t x = 0; x < ZX_FB_W; ++x) {
              uint32_t ula_tstate = ZX_VISIBLE_TSTATE_START + (x / 2u);
              uint8_t border = 0u;
              if (comp->border_timeline != NULL) {
                  border = comp->border_timeline[ts_base + ula_tstate];
              }
              framebuf[y * ZX_FB_W + x] = palette[(uint8_t)(border & 0x07u)];
          }
      }
      for (uint32_t y = 0; y < ZX_ACTIVE_H; y++) {
          uint16_t pix_row = (uint16_t)(0x4000u + ((y & 0xC0u) << 5) + ((y & 0x07u) << 8) + ((y & 0x38u) << 2));
          uint16_t attr_row = (uint16_t)(0x5800u + ((y >> 3) * 32u));
          for (uint32_t xb = 0; xb < 32u; xb++) {
              uint8_t bits = cpu->memory[pix_row + xb];
              uint8_t attr = cpu->memory[attr_row + xb];
              uint8_t ink = (uint8_t)(attr & 0x07u);
              uint8_t paper = (uint8_t)((attr >> 3) & 0x07u);
              uint8_t bright = (uint8_t)((attr >> 6) & 0x01u);
              uint8_t flash = (uint8_t)((attr >> 7) & 0x01u);
              if (flash && flash_phase) {
                  uint8_t t = ink;
                  ink = paper;
                  paper = t;
              }
              uint8_t ink_idx = (uint8_t)(ink + (bright ? 8u : 0u));
              uint8_t paper_idx = (uint8_t)(paper + (bright ? 8u : 0u));
              for (uint32_t b = 0; b < 8u; b++) {
                  uint8_t on = (uint8_t)((bits & (0x80u >> b)) != 0u);
                  uint32_t x = xb * 8u + b;
                  framebuf[(y + ZX_BORDER_Y) * ZX_FB_W + (x + ZX_BORDER_X)] = on ? palette[ink_idx] : palette[paper_idx];
              }
          }
      }
      uint64_t sig_args[5] = {
          (uint64_t)comp->frame_count,
          (uint64_t)(uintptr_t)framebuf,
          ZX_FB_W,
          ZX_FB_H,
          (uint64_t)comp->border_color
      };
      cpu_component_emit_signal(cpu, "video0", "frame_ready", sig_args, 5);
      comp->frame_start_border_color = comp->border_color;
      comp->border_event_count = 0u;
    on_border_changed: |
      comp->border_color = (uint8_t)(args[0] & 0xFFu);
      if (argc > 1u && comp->border_event_colors != NULL && comp->border_event_tstates != NULL && comp->border_event_count < 2048u) {
          comp->border_event_colors[comp->border_event_count] = comp->border_color;
          comp->border_event_tstates[comp->border_event_count] = (uint32_t)(args[1] & 0xFFFFFFFFu);
          comp->border_event_count += 1u;
      }
      cpu_component_emit_signal(cpu, "video0", "border_present", args, argc);

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
