metadata:
  id: keyboard_atari800xl
  type: keyboard
  model: atari800xl_ascii_keyboard
  version: "1.0"

state:
  - name: last_key
    type: uint8_t
    initial: "0"

interfaces:
  callbacks:
    - name: read_ascii
      args: []
      returns: u8
    - name: read_mods
      args: []
      returns: u8
    - name: read_break
      args: []
      returns: u8
    - name: host_ascii
      args: []
      returns: u8
    - name: host_mods
      args: []
      returns: u8
    - name: host_break
      args: []
      returns: u8
  handlers: []
  signals: []

behavior:
  snippets: {}
  callback_handlers:
    read_ascii: |
      __result = cpu_component_call(cpu, "keyboard_atari800xl", "host_ascii", NULL, 0);
      comp->last_key = (uint8_t)(__result & 0xFFu);
      return __result;
    read_mods: |
      __result = cpu_component_call(cpu, "keyboard_atari800xl", "host_mods", NULL, 0);
      return __result;
    read_break: |
      __result = cpu_component_call(cpu, "keyboard_atari800xl", "host_break", NULL, 0);
      comp->last_key = (uint8_t)(__result & 0xFFu);
      return __result;
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
