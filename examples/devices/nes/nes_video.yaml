metadata:
  id: video_nes
  type: video
  model: nes_frame_sink
  version: "1.0"

state:
  - name: frame_count
    type: uint32_t
    initial: "0"
  - name: width
    type: uint32_t
    initial: "256"
  - name: height
    type: uint32_t
    initial: "240"

interfaces:
  callbacks: []
  handlers:
    - name: on_frame_ready
      args: [u32, u64, u32, u32]
  signals:
    - name: frame_present
      args: [u32, u64, u32, u32]

behavior:
  snippets: {}
  callback_handlers: {}
  handler_bodies:
    on_frame_ready: |
      comp->frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);
      comp->width = (uint32_t)(args[2] & 0xFFFFFFFFu);
      comp->height = (uint32_t)(args[3] & 0xFFFFFFFFu);
      {
        static int tr_on = -1;
        static FILE *tr_fp = NULL;
        if (tr_on < 0) {
          const char *env = getenv("PASM_NES_VIDEO_TRACE");
          tr_on = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          if (tr_on != 0) {
            tr_fp = fopen("log/nes_video_trace.log", "a");
            if (tr_fp == NULL) tr_fp = fopen("nes_video_trace.log", "a");
          }
        }
        if (tr_fp != NULL) {
          fprintf(tr_fp, "video on_frame_ready frame=%u ptr=%p w=%u h=%u argc=%u\n",
                  (unsigned)comp->frame_count,
                  (void*)(uintptr_t)args[1],
                  (unsigned)comp->width,
                  (unsigned)comp->height,
                  (unsigned)argc);
          fflush(tr_fp);
        }
      }
      cpu_component_emit_signal(cpu, "video_nes", "frame_present", args, argc);

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
