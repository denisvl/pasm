metadata:
  id: speaker
  type: audio_output
  model: cpc_audio_bridge
  version: "1.0"

state:
  - name: machine_level
    type: uint8_t
    initial: "128"
  - name: level
    type: uint8_t
    initial: "128"
  - name: tape_level
    type: uint8_t
    initial: "128"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: next_sample_cycle
    type: uint64_t
    initial: "0"

interfaces:
  callbacks: []
  handlers:
    - name: on_audio_level
      args: [u8, u64]
    - name: on_tape_playback_sample
      args: [u8, u64]
  signals:
    - name: pcm_sample
      args: [u8, u64]

behavior:
  snippets:
    reset: |
      comp->machine_level = 128u;
      comp->level = 128u;
      comp->tape_level = 128u;
      comp->last_cycle = cpu->total_cycles;
      comp->next_sample_cycle = cpu->total_cycles;
    step_post: |
      if (CPU_AUDIO_SAMPLE_RATE > 0u && CPU_SYSTEM_CLOCK_HZ > 0u) {
          uint64_t period = CPU_SYSTEM_CLOCK_HZ / CPU_AUDIO_SAMPLE_RATE;
          if (period == 0u) period = 1u;
          while (cpu->total_cycles >= comp->next_sample_cycle) {
              int32_t mixed = (int32_t)comp->machine_level + (int32_t)comp->tape_level - 128;
              if (mixed < 0) mixed = 0;
              if (mixed > 255) mixed = 255;
              comp->level = (uint8_t)mixed;
              {
                  uint64_t sig_args[2] = { (uint64_t)comp->level, comp->next_sample_cycle };
                  cpu_component_emit_signal(cpu, "speaker", "pcm_sample", sig_args, 2);
              }
              comp->next_sample_cycle += period;
          }
      }
  callback_handlers: {}
  handler_bodies:
    on_audio_level: |
      comp->machine_level = (uint8_t)(args[0] & 0xFFu);
      comp->last_cycle = (uint64_t)args[1];
    on_tape_playback_sample: |
      comp->tape_level = (uint8_t)(args[0] & 0xFFu);
      comp->last_cycle = (uint64_t)args[1];

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
