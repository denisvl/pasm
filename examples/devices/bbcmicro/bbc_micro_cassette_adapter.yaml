                      if (valid != 0u) {
                          uint32_t accum_units = 0u;
                          uint32_t short_units = 0u;
                          uint32_t long_units = 0u;
                          while (edge_idx < edge_count && accum_units < bit_units) {
                              uint32_t prev_fp = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_fp", (uint64_t[]){ edge_idx - 1u }, 1);
                              uint32_t curr_fp = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_fp", (uint64_t[]){ edge_idx }, 1);
