metadata:
  id: bbc_micro_cassette_adapter
  type: cassette_transport
  model: bbc_micro_cassette_adapter
  version: "1.0"

state:
  - name: event_durations
    type: uint32_t *
    initial: "NULL"
  - name: event_bytes
    type: uint8_t *
    initial: "NULL"
  - name: event_flags
    type: uint8_t *
    initial: "NULL"
  - name: event_count
    type: uint32_t
    initial: "0"
  - name: event_cap
    type: uint32_t
    initial: "0"
  - name: event_index
    type: uint32_t
    initial: "0"
  - name: event_time_left
    type: int32_t
    initial: "0"
  - name: line_state
    type: uint8_t
    initial: "1"
  - name: selected_source_model
    type: char *
    initial: "NULL"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: carrier_run_bits
    type: uint32_t
    initial: "0"

interfaces:
  callbacks:
    - name: load_media
      args: [ptr]
      returns: u8
    - name: select_source
      args: [u8, u8, ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: [u64, u64]
      returns: u64
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_selected_source_kind
      args: []
      returns: u64
    - name: query_selected_source_model
      args: []
      returns: u64
  handlers: []
  signals: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->event_index = 0u;
      comp->event_time_left = 0;
      comp->line_state = 1u;
      comp->last_cycle = cpu->total_cycles;
      comp->carrier_run_bits = 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
    destroy: |
      if (comp->event_durations != NULL) {
          free(comp->event_durations);
          comp->event_durations = NULL;
      }
      if (comp->event_bytes != NULL) {
          free(comp->event_bytes);
          comp->event_bytes = NULL;
      }
      if (comp->event_flags != NULL) {
          free(comp->event_flags);
          comp->event_flags = NULL;
      }
      comp->event_count = 0u;
      comp->event_cap = 0u;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
  callback_handlers:
    select_source: |
      const char *source_model = (argc > 2u && args[2] != 0u) ? (const char *)(uintptr_t)args[2] : NULL;
      if (comp->selected_source_model != NULL) {
          free(comp->selected_source_model);
          comp->selected_source_model = NULL;
      }
      if (source_model != NULL && source_model[0] != '\0') {
          comp->selected_source_model = strdup(source_model);
          if (comp->selected_source_model == NULL) return 0u;
      }
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "select_source", args, argc);
    load_media: |
      uint8_t ok = (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "load_media", args, argc);
      static int tape_trace = -1;
      static FILE *tape_trace_fp = NULL;
      comp->event_index = 0u;
      comp->event_time_left = 0;
      comp->line_state = 1u;
      comp->last_cycle = cpu->total_cycles;
      comp->carrier_run_bits = 0u;
      comp->event_count = 0u;
      if (comp->event_durations != NULL) {
          free(comp->event_durations);
          comp->event_durations = NULL;
      }
      if (comp->event_bytes != NULL) {
          free(comp->event_bytes);
          comp->event_bytes = NULL;
      }
      if (comp->event_flags != NULL) {
          free(comp->event_flags);
          comp->event_flags = NULL;
      }
      comp->event_cap = 0u;
      if (tape_trace < 0) {
          const char *e = getenv("PASM_BBC_TAPE_TRACE");
          tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
          if (tape_trace != 0) {
              const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
              if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
              tape_trace_fp = fopen(p, "a");
              if (tape_trace_fp == NULL) tape_trace = 0;
          }
      }
      if (ok == 0u) return 0u;
      if (
          comp->selected_source_model != NULL &&
          strcmp(comp->selected_source_model, "common_uef_file_source") == 0
      ) {
          const char *path = (argc > 0u && args[0] != 0u) ? (const char *)(uintptr_t)args[0] : NULL;
          FILE *fp = NULL;
          uint8_t *file_data = NULL;
          size_t file_size = 0u;
          uint32_t bit_duration = (uint32_t)((((uint64_t)CPU_SYSTEM_CLOCK_HZ) + 600u) / 1200u);
          if (path == NULL) return 0u;
          fp = fopen(path, "rb");
          if (fp == NULL) return 0u;
          {
              int b0 = fgetc(fp);
              int b1 = fgetc(fp);
              fclose(fp);
              fp = NULL;
              if (b0 == 0x1F && b1 == 0x8B) {
                  gzFile gz = gzopen(path, "rb");
                  if (gz == NULL) return 0u;
                  {
                      size_t cap = 65536u;
                      int rd = 0;
                      file_data = (uint8_t *)malloc(cap);
                      if (file_data == NULL) {
                          gzclose(gz);
                          return 0u;
                      }
                      while ((rd = gzread(gz, file_data + file_size, (unsigned int)(cap - file_size))) > 0) {
                          file_size += (size_t)rd;
                          if (cap - file_size < 4096u) {
                              size_t new_cap = cap * 2u;
                              uint8_t *new_data = (uint8_t *)realloc(file_data, new_cap);
                              if (new_data == NULL) {
                                  free(file_data);
                                  gzclose(gz);
                                  return 0u;
                              }
                              file_data = new_data;
                              cap = new_cap;
                          }
                      }
                  }
                  gzclose(gz);
              } else {
                  long len;
                  fp = fopen(path, "rb");
                  if (fp == NULL) return 0u;
                  if (fseek(fp, 0L, SEEK_END) != 0) {
                      fclose(fp);
                      return 0u;
                  }
                  len = ftell(fp);
                  if (len <= 0) {
                      fclose(fp);
                      return 0u;
                  }
                  rewind(fp);
                  file_size = (size_t)len;
                  file_data = (uint8_t *)malloc(file_size);
                  if (file_data == NULL) {
                      fclose(fp);
                      return 0u;
                  }
                  if (fread(file_data, 1, file_size, fp) != file_size) {
                      free(file_data);
                      fclose(fp);
                      return 0u;
                  }
                  fclose(fp);
              }
          }
          if (file_size < 12u || memcmp(file_data, "UEF File!\0", 10u) != 0) {
              free(file_data);
              return 0u;
          }
          {
              size_t pos = 12u;
              while (pos + 6u <= file_size) {
                  uint16_t chunk_id = (uint16_t)file_data[pos] | (uint16_t)((uint16_t)file_data[pos + 1u] << 8u);
                  uint32_t chunk_len =
                      (uint32_t)file_data[pos + 2u] |
                      ((uint32_t)file_data[pos + 3u] << 8u) |
                      ((uint32_t)file_data[pos + 4u] << 16u) |
                      ((uint32_t)file_data[pos + 5u] << 24u);
                  const uint8_t *payload = file_data + pos + 6u;
                  if (pos + 6u + (size_t)chunk_len > file_size) break;
                  if (chunk_id == 0x0110u && chunk_len >= 2u) {
                      uint16_t cycles = (uint16_t)payload[0] | (uint16_t)((uint16_t)payload[1] << 8u);
                      uint32_t bit_count = (uint32_t)(cycles >> 1u);
                      if (bit_count > 0u) {
                          uint32_t needed = comp->event_count + bit_count;
                          if (needed > comp->event_cap) {
                              uint32_t new_cap = (comp->event_cap == 0u) ? 256u : comp->event_cap;
                              while (new_cap < needed) new_cap *= 2u;
                              {
                                  uint32_t *new_durations = (uint32_t *)realloc(comp->event_durations, (size_t)new_cap * sizeof(uint32_t));
                                  uint8_t *new_bytes = (uint8_t *)realloc(comp->event_bytes, (size_t)new_cap * sizeof(uint8_t));
                                  uint8_t *new_flags = (uint8_t *)realloc(comp->event_flags, (size_t)new_cap * sizeof(uint8_t));
                                  if (new_durations == NULL || new_bytes == NULL || new_flags == NULL) {
                                      free(new_durations);
                                      free(new_bytes);
                                      free(new_flags);
                                      free(file_data);
                                      return 0u;
                                  }
                                  comp->event_durations = new_durations;
                                  comp->event_bytes = new_bytes;
                                  comp->event_flags = new_flags;
                                  comp->event_cap = new_cap;
                              }
                          }
                          for (uint32_t i = 0u; i < bit_count; ++i) {
                              comp->event_durations[comp->event_count] = bit_duration;
                              comp->event_bytes[comp->event_count] = 1u;
                              comp->event_flags[comp->event_count] = 0x04u;
                              comp->event_count += 1u;
                          }
                      }
                  } else if (chunk_id == 0x0111u && chunk_len >= 4u) {
                      uint16_t cycles1 = (uint16_t)payload[0] | (uint16_t)((uint16_t)payload[1] << 8u);
                      uint16_t cycles2 = (uint16_t)payload[2] | (uint16_t)((uint16_t)payload[3] << 8u);
                      uint32_t bit_count1 = (uint32_t)(cycles1 >> 1u);
                      uint32_t bit_count2 = (uint32_t)(cycles2 >> 1u);
                      uint32_t needed = comp->event_count + bit_count1 + 10u + bit_count2;
                      if (needed > comp->event_cap) {
                          uint32_t new_cap = (comp->event_cap == 0u) ? 256u : comp->event_cap;
                          while (new_cap < needed) new_cap *= 2u;
                          {
                              uint32_t *new_durations = (uint32_t *)realloc(comp->event_durations, (size_t)new_cap * sizeof(uint32_t));
                              uint8_t *new_bytes = (uint8_t *)realloc(comp->event_bytes, (size_t)new_cap * sizeof(uint8_t));
                              uint8_t *new_flags = (uint8_t *)realloc(comp->event_flags, (size_t)new_cap * sizeof(uint8_t));
                              if (new_durations == NULL || new_bytes == NULL || new_flags == NULL) {
                                  free(new_durations);
                                  free(new_bytes);
                                  free(new_flags);
                                  free(file_data);
                                  return 0u;
                              }
                              comp->event_durations = new_durations;
                              comp->event_bytes = new_bytes;
                              comp->event_flags = new_flags;
                              comp->event_cap = new_cap;
                          }
                      }
                      for (uint32_t i = 0u; i < bit_count1; ++i) {
                          comp->event_durations[comp->event_count] = bit_duration;
                          comp->event_bytes[comp->event_count] = 1u;
                          comp->event_flags[comp->event_count] = 0x04u;
                          comp->event_count += 1u;
                      }
                      comp->event_durations[comp->event_count] = bit_duration;
                      comp->event_bytes[comp->event_count] = 0u;
                      comp->event_flags[comp->event_count] = 0x04u;
                      comp->event_count += 1u;
                      for (uint32_t bit = 0u; bit < 8u; ++bit) {
                          comp->event_durations[comp->event_count] = bit_duration;
                          comp->event_bytes[comp->event_count] = (uint8_t)((0xAAu >> bit) & 0x01u);
                          comp->event_flags[comp->event_count] = 0x04u;
                          comp->event_count += 1u;
                      }
                      comp->event_durations[comp->event_count] = bit_duration;
                      comp->event_bytes[comp->event_count] = 1u;
                      comp->event_flags[comp->event_count] = 0x04u;
                      comp->event_count += 1u;
                      for (uint32_t i = 0u; i < bit_count2; ++i) {
                          comp->event_durations[comp->event_count] = bit_duration;
                          comp->event_bytes[comp->event_count] = 1u;
                          comp->event_flags[comp->event_count] = 0x04u;
                          comp->event_count += 1u;
                      }
                  } else if (chunk_id == 0x0112u && chunk_len >= 2u) {
                      uint16_t gap_units = (uint16_t)payload[0] | (uint16_t)((uint16_t)payload[1] << 8u);
                      uint32_t bit_count = (uint32_t)(gap_units >> 1u);
                      if (bit_count > 0u) {
                          uint32_t needed = comp->event_count + bit_count;
                          if (needed > comp->event_cap) {
                              uint32_t new_cap = (comp->event_cap == 0u) ? 256u : comp->event_cap;
                              while (new_cap < needed) new_cap *= 2u;
                              {
                                  uint32_t *new_durations = (uint32_t *)realloc(comp->event_durations, (size_t)new_cap * sizeof(uint32_t));
                                  uint8_t *new_bytes = (uint8_t *)realloc(comp->event_bytes, (size_t)new_cap * sizeof(uint8_t));
                                  uint8_t *new_flags = (uint8_t *)realloc(comp->event_flags, (size_t)new_cap * sizeof(uint8_t));
                                  if (new_durations == NULL || new_bytes == NULL || new_flags == NULL) {
                                      free(new_durations);
                                      free(new_bytes);
                                      free(new_flags);
                                      free(file_data);
                                      return 0u;
                                  }
                                  comp->event_durations = new_durations;
                                  comp->event_bytes = new_bytes;
                                  comp->event_flags = new_flags;
                                  comp->event_cap = new_cap;
                              }
                          }
                          for (uint32_t i = 0u; i < bit_count; ++i) {
                              comp->event_durations[comp->event_count] = bit_duration;
                              comp->event_bytes[comp->event_count] = 2u;
                              comp->event_flags[comp->event_count] = 0x04u;
                              comp->event_count += 1u;
                          }
                      }
                  } else if (chunk_id == 0x0100u && chunk_len > 0u) {
                      uint32_t needed = comp->event_count + (chunk_len * 10u);
                      if (needed > comp->event_cap) {
                          uint32_t new_cap = (comp->event_cap == 0u) ? 256u : comp->event_cap;
                          while (new_cap < needed) new_cap *= 2u;
                          {
                              uint32_t *new_durations = (uint32_t *)realloc(comp->event_durations, (size_t)new_cap * sizeof(uint32_t));
                              uint8_t *new_bytes = (uint8_t *)realloc(comp->event_bytes, (size_t)new_cap * sizeof(uint8_t));
                              uint8_t *new_flags = (uint8_t *)realloc(comp->event_flags, (size_t)new_cap * sizeof(uint8_t));
                              if (new_durations == NULL || new_bytes == NULL || new_flags == NULL) {
                                  free(new_durations);
                                  free(new_bytes);
                                  free(new_flags);
                                  free(file_data);
                                  return 0u;
                              }
                              comp->event_durations = new_durations;
                              comp->event_bytes = new_bytes;
                              comp->event_flags = new_flags;
                              comp->event_cap = new_cap;
                          }
                      }
                      for (uint32_t i = 0u; i < chunk_len; ++i) {
                          uint8_t byte = payload[i];
                          comp->event_durations[comp->event_count] = bit_duration;
                          comp->event_bytes[comp->event_count] = 0u;
                          comp->event_flags[comp->event_count] = 0x04u;
                          comp->event_count += 1u;
                          for (uint32_t bit = 0u; bit < 8u; ++bit) {
                              comp->event_durations[comp->event_count] = bit_duration;
                              comp->event_bytes[comp->event_count] = (uint8_t)((byte >> bit) & 0x01u);
                              comp->event_flags[comp->event_count] = 0x04u;
                              comp->event_count += 1u;
                          }
                          comp->event_durations[comp->event_count] = bit_duration;
                          comp->event_bytes[comp->event_count] = 1u;
                          comp->event_flags[comp->event_count] = 0x04u;
                          comp->event_count += 1u;
                      }
                  } else if (chunk_id == 0x0104u && chunk_len >= 3u) {
                      uint32_t data_bits = (uint32_t)payload[0];
                      uint8_t parity_mode = payload[1];
                      uint32_t stop_bits = (uint32_t)payload[2];
                      uint8_t invert_parity = 1u;
                      if (data_bits != 7u && data_bits != 8u) {
                          pos += 6u + (size_t)chunk_len;
                          continue;
                      }
                      if (stop_bits != 1u && stop_bits != 2u) {
                          pos += 6u + (size_t)chunk_len;
                          continue;
                      }
                      {
                          uint32_t parity_bits = ((parity_mode == (uint8_t)'E') || (parity_mode == (uint8_t)'O')) ? 1u : 0u;
                          uint32_t frame_bits = 1u + data_bits + parity_bits + stop_bits;
                          uint32_t byte_count = chunk_len - 3u;
                          uint32_t needed = comp->event_count + (byte_count * frame_bits);
                          if (needed > comp->event_cap) {
                              uint32_t new_cap = (comp->event_cap == 0u) ? 256u : comp->event_cap;
                              while (new_cap < needed) new_cap *= 2u;
                              {
                                  uint32_t *new_durations = (uint32_t *)realloc(comp->event_durations, (size_t)new_cap * sizeof(uint32_t));
                                  uint8_t *new_bytes = (uint8_t *)realloc(comp->event_bytes, (size_t)new_cap * sizeof(uint8_t));
                                  uint8_t *new_flags = (uint8_t *)realloc(comp->event_flags, (size_t)new_cap * sizeof(uint8_t));
                                  if (new_durations == NULL || new_bytes == NULL || new_flags == NULL) {
                                      free(new_durations);
                                      free(new_bytes);
                                      free(new_flags);
                                      free(file_data);
                                      return 0u;
                                  }
                                  comp->event_durations = new_durations;
                                  comp->event_bytes = new_bytes;
                                  comp->event_flags = new_flags;
                                  comp->event_cap = new_cap;
                              }
                          }
                          for (uint32_t i = 3u; i < chunk_len; ++i) {
                              uint8_t byte = payload[i];
                              uint8_t parity = 0u;
                              comp->event_durations[comp->event_count] = bit_duration;
                              comp->event_bytes[comp->event_count] = 0u;
                              comp->event_flags[comp->event_count] = 0x04u;
                              comp->event_count += 1u;
                              for (uint32_t bit = 0u; bit < data_bits; ++bit) {
                                  uint8_t out = (uint8_t)((byte >> bit) & 0x01u);
                                  comp->event_durations[comp->event_count] = bit_duration;
                                  comp->event_bytes[comp->event_count] = out;
                                  comp->event_flags[comp->event_count] = 0x04u;
                                  comp->event_count += 1u;
                                  if (out != 0u) parity ^= 1u;
                              }
                              if (parity_mode == (uint8_t)'E' || parity_mode == (uint8_t)'O') {
                                  uint8_t parity_out = parity;
                                  if (parity_mode == (uint8_t)'O') parity_out ^= 1u;
                                  if (invert_parity != 0u) parity_out ^= 1u;
                                  comp->event_durations[comp->event_count] = bit_duration;
                                  comp->event_bytes[comp->event_count] = parity_out;
                                  comp->event_flags[comp->event_count] = 0x04u;
                                  comp->event_count += 1u;
                              }
                              for (uint32_t bit = 0u; bit < stop_bits; ++bit) {
                                  comp->event_durations[comp->event_count] = bit_duration;
                                  comp->event_bytes[comp->event_count] = 1u;
                                  comp->event_flags[comp->event_count] = 0x04u;
                                  comp->event_count += 1u;
                              }
                          }
                      }
                  }
                  pos += 6u + (size_t)chunk_len;
              }
          }
          {
              /* Give the BBC loader a little breathing room after the last
               * parsed block. Some tapes expect a small amount of trailing
               * carrier / silence before the transport fully runs dry.
               */
              uint32_t post_carrier_bits = 32u;
              uint32_t post_silence_bits = 128u;
              uint32_t needed = comp->event_count + post_carrier_bits + post_silence_bits;
              if (needed > comp->event_cap) {
                  uint32_t new_cap = (comp->event_cap == 0u) ? 256u : comp->event_cap;
                  while (new_cap < needed) new_cap *= 2u;
                  {
                      uint32_t *new_durations = (uint32_t *)realloc(comp->event_durations, (size_t)new_cap * sizeof(uint32_t));
                      uint8_t *new_bytes = (uint8_t *)realloc(comp->event_bytes, (size_t)new_cap * sizeof(uint8_t));
                      uint8_t *new_flags = (uint8_t *)realloc(comp->event_flags, (size_t)new_cap * sizeof(uint8_t));
                      if (new_durations == NULL || new_bytes == NULL || new_flags == NULL) {
                          free(new_durations);
                          free(new_bytes);
                          free(new_flags);
                          free(file_data);
                          return 0u;
                      }
                      comp->event_durations = new_durations;
                      comp->event_bytes = new_bytes;
                      comp->event_flags = new_flags;
                      comp->event_cap = new_cap;
                  }
              }
              for (uint32_t i = 0u; i < post_carrier_bits; ++i) {
                  comp->event_durations[comp->event_count] = bit_duration;
                  comp->event_bytes[comp->event_count] = 1u;
                  comp->event_flags[comp->event_count] = 0x04u;
                  comp->event_count += 1u;
              }
              for (uint32_t i = 0u; i < post_silence_bits; ++i) {
                  comp->event_durations[comp->event_count] = bit_duration;
                  comp->event_bytes[comp->event_count] = 2u;
                  comp->event_flags[comp->event_count] = 0x04u;
                  comp->event_count += 1u;
              }
          }
          if (tape_trace != 0 && tape_trace_fp != NULL) {
              uint32_t byte_events = 0u;
              uint32_t carrier_events = 0u;
              uint32_t gap_events = 0u;
              for (uint32_t i = 0u; i < comp->event_count; ++i) {
                  if ((comp->event_flags[i] & 0x04u) != 0u) {
                      if (comp->event_bytes[i] == 1u) carrier_events += 1u;
                      else if (comp->event_bytes[i] == 2u) gap_events += 1u;
                      else byte_events += 1u;
                  } else if ((comp->event_flags[i] & 0x02u) != 0u) carrier_events += 1u;
                  else gap_events += 1u;
              }
              fprintf(tape_trace_fp, "adapter_load_uef,%llu,%u,%u,%u,%u\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)comp->event_count,
                      (unsigned)byte_events,
                      (unsigned)carrier_events,
                      (unsigned)gap_events);
              fflush(tape_trace_fp);
          }
          free(file_data);
          return 1u;
      }
      {
          uint32_t edge_count = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_count", NULL, 0);
          uint32_t sample_rate = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_sample_rate", NULL, 0);
          if (edge_count > 2u && sample_rate != 0u) {
              uint32_t samples_per_bit = (sample_rate + 600u) / 1200u;
              uint32_t short_peak = (sample_rate + 1600u) / 3200u;
