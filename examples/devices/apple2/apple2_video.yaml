metadata:
  id: video_apple2
  type: video
  model: apple2_display_renderer
  version: "1.0"

state:
  - name: frame_count
    type: uint32_t
    initial: "0"
  - name: width
    type: uint32_t
    initial: "40"
  - name: height
    type: uint32_t
    initial: "24"

interfaces:
  callbacks: []
  handlers:
    - name: on_frame_ready
      args: [u32, u64, u32, u32]
  signals:
    - name: frame_present
      args: [u32, u64, u32, u32]

behavior:
  snippets: {}
  callback_handlers: {}
  handler_bodies:
    on_frame_ready: |
      comp->frame_count = (uint32_t)(args[0] & 0xFFFFFFFFu);
      comp->width = 280u;
      comp->height = 192u;

      static uint32_t framebuf[280u * 192u];
      static const uint32_t lores_palette[16] = {
          0xFF000000u, 0xFF8A2BE2u, 0xFF0000AAu, 0xFFFF44FFu,
          0xFF006400u, 0xFF808080u, 0xFF2F6BFFu, 0xFF7FDBFFu,
          0xFF8B4513u, 0xFFFF7A00u, 0xFFC0C0C0u, 0xFFFFA0FFu,
          0xFF00C040u, 0xFFFFFF66u, 0xFF40E0D0u, 0xFFFFFFFFu
      };
      static const uint8_t apple2_glyph[64][7] = {
          {0x0E,0x11,0x15,0x1D,0x15,0x11,0x0E}, /* @  */
          {0x0E,0x11,0x11,0x1F,0x11,0x11,0x11}, /* A  */
          {0x1E,0x11,0x11,0x1E,0x11,0x11,0x1E}, /* B  */
          {0x0E,0x11,0x10,0x10,0x10,0x11,0x0E}, /* C  */
          {0x1E,0x11,0x11,0x11,0x11,0x11,0x1E}, /* D  */
          {0x1F,0x10,0x10,0x1E,0x10,0x10,0x1F}, /* E  */
          {0x1F,0x10,0x10,0x1E,0x10,0x10,0x10}, /* F  */
          {0x0E,0x11,0x10,0x17,0x11,0x11,0x0E}, /* G  */
          {0x11,0x11,0x11,0x1F,0x11,0x11,0x11}, /* H  */
          {0x1F,0x04,0x04,0x04,0x04,0x04,0x1F}, /* I  */
          {0x01,0x01,0x01,0x01,0x11,0x11,0x0E}, /* J  */
          {0x11,0x12,0x14,0x18,0x14,0x12,0x11}, /* K  */
          {0x10,0x10,0x10,0x10,0x10,0x10,0x1F}, /* L  */
          {0x11,0x1B,0x15,0x15,0x11,0x11,0x11}, /* M  */
          {0x11,0x19,0x15,0x13,0x11,0x11,0x11}, /* N  */
          {0x0E,0x11,0x11,0x11,0x11,0x11,0x0E}, /* O  */
          {0x1E,0x11,0x11,0x1E,0x10,0x10,0x10}, /* P  */
          {0x0E,0x11,0x11,0x11,0x15,0x12,0x0D}, /* Q  */
          {0x1E,0x11,0x11,0x1E,0x14,0x12,0x11}, /* R  */
          {0x0F,0x10,0x10,0x0E,0x01,0x01,0x1E}, /* S  */
          {0x1F,0x04,0x04,0x04,0x04,0x04,0x04}, /* T  */
          {0x11,0x11,0x11,0x11,0x11,0x11,0x0E}, /* U  */
          {0x11,0x11,0x11,0x11,0x11,0x0A,0x04}, /* V  */
          {0x11,0x11,0x11,0x15,0x15,0x15,0x0A}, /* W  */
          {0x11,0x11,0x0A,0x04,0x0A,0x11,0x11}, /* X  */
          {0x11,0x11,0x0A,0x04,0x04,0x04,0x04}, /* Y  */
          {0x1F,0x01,0x02,0x04,0x08,0x10,0x1F}, /* Z  */
          {0x0E,0x08,0x08,0x08,0x08,0x08,0x0E}, /* [  */
          {0x10,0x08,0x04,0x02,0x01,0x00,0x00}, /* \  */
          {0x0E,0x02,0x02,0x02,0x02,0x02,0x0E}, /* ]  */
          {0x04,0x0E,0x15,0x04,0x04,0x04,0x04}, /* up */
          {0x04,0x08,0x1F,0x08,0x04,0x00,0x00}, /* left */
          {0x00,0x00,0x00,0x00,0x00,0x00,0x00}, /* sp */
          {0x04,0x04,0x04,0x04,0x04,0x00,0x04}, /* !  */
          {0x0A,0x0A,0x0A,0x00,0x00,0x00,0x00}, /* "  */
          {0x0A,0x1F,0x0A,0x0A,0x1F,0x0A,0x00}, /* #  */
          {0x04,0x0F,0x14,0x0E,0x05,0x1E,0x04}, /* $  */
          {0x19,0x19,0x02,0x04,0x08,0x13,0x13}, /* %  */
          {0x0C,0x12,0x14,0x08,0x15,0x12,0x0D}, /* &  */
          {0x04,0x04,0x08,0x00,0x00,0x00,0x00}, /* '  */
          {0x02,0x04,0x08,0x08,0x08,0x04,0x02}, /* (  */
          {0x08,0x04,0x02,0x02,0x02,0x04,0x08}, /* )  */
          {0x00,0x0A,0x04,0x1F,0x04,0x0A,0x00}, /* *  */
          {0x00,0x04,0x04,0x1F,0x04,0x04,0x00}, /* +  */
          {0x00,0x00,0x00,0x00,0x0C,0x0C,0x08}, /* ,  */
          {0x00,0x00,0x00,0x1F,0x00,0x00,0x00}, /* -  */
          {0x00,0x00,0x00,0x00,0x00,0x0C,0x0C}, /* .  */
          {0x01,0x02,0x04,0x08,0x10,0x00,0x00}, /* /  */
          {0x0E,0x11,0x13,0x15,0x19,0x11,0x0E}, /* 0  */
          {0x04,0x0C,0x04,0x04,0x04,0x04,0x0E}, /* 1  */
          {0x0E,0x11,0x01,0x02,0x04,0x08,0x1F}, /* 2  */
          {0x1E,0x01,0x01,0x06,0x01,0x01,0x1E}, /* 3  */
          {0x02,0x06,0x0A,0x12,0x1F,0x02,0x02}, /* 4  */
          {0x1F,0x10,0x10,0x1E,0x01,0x01,0x1E}, /* 5  */
          {0x06,0x08,0x10,0x1E,0x11,0x11,0x0E}, /* 6  */
          {0x1F,0x01,0x02,0x04,0x08,0x08,0x08}, /* 7  */
          {0x0E,0x11,0x11,0x0E,0x11,0x11,0x0E}, /* 8  */
          {0x0E,0x11,0x11,0x0F,0x01,0x02,0x0C}, /* 9  */
          {0x00,0x0C,0x0C,0x00,0x0C,0x0C,0x00}, /* :  */
          {0x00,0x0C,0x0C,0x00,0x0C,0x0C,0x08}, /* ;  */
          {0x02,0x04,0x08,0x10,0x08,0x04,0x02}, /* <  */
          {0x00,0x1F,0x00,0x1F,0x00,0x00,0x00}, /* =  */
          {0x08,0x04,0x02,0x01,0x02,0x04,0x08}, /* >  */
          {0x0E,0x11,0x01,0x02,0x04,0x00,0x04}  /* ?  */
      };
      const uint32_t text_bg = 0xFF000000u;
      const uint32_t text_fg = 0xFFA8FF7Au;
      const uint32_t hires_violet = 0xFFFF44FFu;
      const uint32_t hires_green = 0xFF40FF40u;
      const uint32_t hires_blue = 0xFF2F6BFFu;
      const uint32_t hires_orange = 0xFFFF7A00u;
      const uint32_t hires_white = 0xFFFFFFFFu;
      uint16_t text_base = (cpu->comp_apple2_io.page2 != 0u) ? 0x0800u : 0x0400u;
      uint16_t hires_base = (cpu->comp_apple2_io.page2 != 0u) ? 0x4000u : 0x2000u;
      uint8_t text_mode = (uint8_t)(cpu->comp_apple2_io.text_mode != 0u);
      uint8_t mixed_mode = (uint8_t)(cpu->comp_apple2_io.mixed_mode != 0u);
      uint8_t hires_mode = (uint8_t)(cpu->comp_apple2_io.hires != 0u);
      uint8_t flash_phase = (uint8_t)((comp->frame_count >> 4) & 0x01u);
      uint32_t graphics_rows = mixed_mode != 0u ? 20u : 24u;
      uint32_t graphics_lines = graphics_rows * 8u;

      #define A2_TEXT_ADDR(base,row,col) ((uint16_t)((base) + ((((uint16_t)(row)) & 0x0007u) << 7u) + ((((uint16_t)(row)) >> 3u) * 40u) + (uint16_t)(col)))
      #define A2_HIRES_ADDR(base,y,xb) ((uint16_t)((base) + ((((uint16_t)(y)) & 0x0007u) << 10u) + (((((uint16_t)(y)) >> 3u) & 0x0007u) << 7u) + ((((uint16_t)(y)) >> 6u) * 40u) + (uint16_t)(xb)))

      for (uint32_t i = 0u; i < 280u * 192u; ++i) {
          framebuf[i] = text_bg;
      }

      if (text_mode == 0u) {
          if (hires_mode != 0u) {
              uint8_t line_bits[280];
              uint8_t line_phase[280];
              for (uint32_t y = 0u; y < graphics_lines; ++y) {
                  for (uint32_t x = 0u; x < 280u; ++x) {
                      line_bits[x] = 0u;
                      line_phase[x] = 0u;
                  }
                  for (uint32_t xb = 0u; xb < 40u; ++xb) {
                      uint16_t addr = A2_HIRES_ADDR(hires_base, y, xb);
                      uint8_t raw = ((uint64_t)addr < cpu->memory_size) ? cpu->memory[addr] : 0u;
                      uint8_t phase = (uint8_t)((raw >> 7u) & 0x01u);
                      for (uint32_t bit = 0u; bit < 7u; ++bit) {
                          uint32_t x = xb * 7u + bit;
                          line_bits[x] = (uint8_t)((raw >> bit) & 0x01u);
                          line_phase[x] = phase;
                      }
                  }
                  for (uint32_t x = 0u; x < 280u; ++x) {
                      uint32_t color = text_bg;
                      if (line_bits[x] != 0u) {
                          uint8_t left = (x > 0u) ? line_bits[x - 1u] : 0u;
                          uint8_t right = (x + 1u < 280u) ? line_bits[x + 1u] : 0u;
                          if (left != 0u || right != 0u) {
                              color = hires_white;
                          } else if (line_phase[x] != 0u) {
                              color = ((x & 0x01u) != 0u) ? hires_orange : hires_blue;
                          } else {
                              color = ((x & 0x01u) != 0u) ? hires_green : hires_violet;
                          }
                      }
                      framebuf[y * 280u + x] = color;
                  }
              }
          } else {
              for (uint32_t row = 0u; row < graphics_rows; ++row) {
                  for (uint32_t col = 0u; col < 40u; ++col) {
                      uint16_t addr = A2_TEXT_ADDR(text_base, row, col);
                      uint8_t raw = ((uint64_t)addr < cpu->memory_size) ? cpu->memory[addr] : 0u;
                      uint32_t top = lores_palette[raw & 0x0Fu];
                      uint32_t bottom = lores_palette[(raw >> 4u) & 0x0Fu];
                      uint32_t x0 = col * 7u;
                      uint32_t y0 = row * 8u;
                      for (uint32_t py = 0u; py < 4u; ++py) {
                          for (uint32_t px = 0u; px < 7u; ++px) {
                              framebuf[(y0 + py) * 280u + x0 + px] = top;
                          }
                      }
                      for (uint32_t py = 4u; py < 8u; ++py) {
                          for (uint32_t px = 0u; px < 7u; ++px) {
                              framebuf[(y0 + py) * 280u + x0 + px] = bottom;
                          }
                      }
                  }
              }
          }
      }

      for (uint32_t row = 0u; row < 24u; ++row) {
          if (text_mode == 0u && (mixed_mode == 0u || row < 20u)) {
              continue;
          }
          for (uint32_t col = 0u; col < 40u; ++col) {
              uint16_t addr = A2_TEXT_ADDR(text_base, row, col);
              uint8_t raw = ((uint64_t)addr < cpu->memory_size) ? cpu->memory[addr] : 0xA0u;
              uint8_t glyph_idx = (uint8_t)(raw & 0x3Fu);
              uint8_t inverse = (uint8_t)(raw < 0x40u);
              uint8_t flashing = (uint8_t)(raw >= 0x40u && raw < 0x80u);
              uint32_t fg = text_fg;
              uint32_t bg = text_bg;
              uint32_t x0 = col * 7u;
              uint32_t y0 = row * 8u;
              if (flashing != 0u && flash_phase != 0u) {
                  inverse ^= 1u;
              }
              if (inverse != 0u) {
                  fg = text_bg;
                  bg = text_fg;
              }
              for (uint32_t py = 0u; py < 8u; ++py) {
                  for (uint32_t px = 0u; px < 7u; ++px) {
                      framebuf[(y0 + py) * 280u + x0 + px] = bg;
                  }
              }
              for (uint32_t gy = 0u; gy < 7u; ++gy) {
                  uint8_t bits = apple2_glyph[glyph_idx][gy];
                  for (uint32_t gx = 0u; gx < 5u; ++gx) {
                      if ((bits & (uint8_t)(1u << (4u - gx))) == 0u) continue;
                      framebuf[(y0 + gy) * 280u + x0 + gx + 1u] = fg;
                  }
              }
          }
      }

      {
          uint64_t out_args[4] = {
              (uint64_t)comp->frame_count,
              (uint64_t)(uintptr_t)framebuf,
              280u,
              192u
          };
          cpu_component_emit_signal(cpu, "video_apple2", "frame_present", out_args, 4);
      }

      #undef A2_TEXT_ADDR
      #undef A2_HIRES_ADDR

