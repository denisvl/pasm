metadata:
  id: apple2_cassette_adapter
  type: cassette_transport
  model: apple2_cassette_adapter
  version: "1.0"

state:
  - name: start_sample
    type: uint32_t
    initial: "0"
  - name: start_index
    type: uint32_t
    initial: "0"
  - name: start_fp
    type: uint32_t
    initial: "0"
  - name: playhead_seeded
    type: uint8_t
    initial: "0"

interfaces:
  callbacks:
    - name: load_media
      args: [ptr]
      returns: u8
    - name: select_source
      args: [u8, u8, ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: set_transport_mode
      args: [u8]
      returns: u8
    - name: set_motor
      args: [u8]
      returns: u8
    - name: set_volume
      args: [u8]
      returns: u8
    - name: set_bass
      args: [u8]
      returns: u8
    - name: set_treble
      args: [u8]
      returns: u8
    - name: sample_input
      args: [u64, u64]
      returns: u8
    - name: query_transport_state
      args: []
      returns: u64
    - name: query_selected_source_kind
      args: []
      returns: u64
    - name: query_selected_source_model
      args: []
      returns: u64
  handlers:
    - name: on_output_sample
      args: [u8, u64]
  signals: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->start_sample = 0u;
      comp->start_index = 0u;
      comp->start_fp = 0u;
      comp->playhead_seeded = 0u;
    destroy: |
      (void)cpu;
  callback_handlers:
    select_source: |
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "select_source", args, argc);
    load_media: |
      uint8_t ok = (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "load_media", args, argc);
      comp->start_sample = 0u;
      comp->start_index = 0u;
      comp->start_fp = 0u;
      comp->playhead_seeded = 0u;
      if (ok == 0u) return 0u;
      {
          uint32_t edge_count = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_count", NULL, 0);
          if (edge_count > 512u) {
              uint32_t run_start = 0u;
              uint32_t run_len = 0u;
              for (uint32_t i = 1u; i < edge_count; ++i) {
                  uint32_t prev_fp = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_fp", (uint64_t[]){ i - 1u }, 1);
                  uint32_t curr_fp = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_fp", (uint64_t[]){ i }, 1);
                  uint32_t delta_fp = curr_fp - prev_fp;
                  uint32_t delta_samples = (delta_fp + 128u) >> 8u;
                  if (delta_samples >= 24u && delta_samples <= 32u) {
                      if (run_len == 0u) run_start = i - 1u;
                      run_len += 1u;
                  } else {
                      if (run_len >= 64u) {
                          uint32_t start_edge = (run_start + 1u < edge_count) ? (run_start + 1u) : run_start;
                          uint32_t start_fp = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_fp", (uint64_t[]){ start_edge }, 1);
                          uint32_t start_index = start_edge;
                          if (start_edge + 1u < edge_count) {
                              uint32_t next_fp = (uint32_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_fp", (uint64_t[]){ start_edge + 1u }, 1);
                              if (next_fp > start_fp) {
                                  start_fp += (next_fp - start_fp) / 2u;
                                  start_index = start_edge + 1u;
                              }
                          }
                          comp->start_index = start_index;
                          comp->start_fp = start_fp;
                          comp->start_sample = start_fp >> 8u;
                          break;
                      }
                      run_len = 0u;
                  }
              }
          }
      }
      return ok;
    unload_media: |
      comp->start_sample = 0u;
      comp->start_index = 0u;
      comp->start_fp = 0u;
      comp->playhead_seeded = 0u;
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "unload_media", args, argc);
    set_transport_mode: |
      if (argc > 0u && (uint8_t)(args[0] & 0xFFu) != 1u) {
          comp->playhead_seeded = 0u;
      }
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "set_transport_mode", args, argc);
    set_motor: |
      if (argc > 0u && (uint8_t)(args[0] & 0x01u) == 0u) {
          comp->playhead_seeded = 0u;
      }
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "set_motor", args, argc);
    set_volume: |
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "set_volume", args, argc);
    set_bass: |
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "set_bass", args, argc);
    set_treble: |
      return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "set_treble", args, argc);
    sample_input: |
      uint64_t cycle = (argc > 1u) ? args[1] : cpu->total_cycles;
      uint64_t flags = (argc > 0u) ? args[0] : 0u;
      if (comp->playhead_seeded == 0u && comp->start_fp > 0u) {
          uint64_t seek_args[2] = { (uint64_t)comp->start_fp, (uint64_t)comp->start_index };
          (void)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "set_playhead_fp", seek_args, 2);
          comp->playhead_seeded = 1u;
      }
      {
          uint64_t transport_args[2] = { (flags & 0x01u) | 0x80u, cycle };
          return (uint8_t)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "sample_input", transport_args, 2);
      }
    query_transport_state: |
      return cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_transport_state", args, argc);
    query_selected_source_kind: |
      return cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_selected_source_kind", args, argc);
    query_selected_source_model: |
      return cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_selected_source_model", args, argc);
  handler_bodies:
    on_output_sample: |
      (void)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "push_output_sample", args, argc);

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
