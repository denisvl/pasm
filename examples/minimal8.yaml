# Minimal8 - A Minimal 8-bit CPU Example

metadata:
  name: "Minimal8"
  version: "1.0"
  bits: 8
  address_bits: 16
  endian: little
  undefined_opcode_policy: trap

registers:
  - name: "R0"
    type: general
    bits: 8
  - name: "R1"
    type: general
    bits: 8
  - name: "R2"
    type: general
    bits: 8
  - name: "R3"
    type: general
    bits: 8
  - name: "A"
    type: general
    bits: 8
  - name: "PC"
    type: program_counter
    bits: 16
  - name: "SP"
    type: stack_pointer
    bits: 16

flags:
  - name: "Z"    # Zero flag
    bit: 0

memory:
  address_bits: 16
  default_size: 65536

instructions:
  # NOP - No operation
  - name: "NOP"
    category: control
    encoding:
      opcode: 0x00
      mask: 0xFF
      length: 1
    cycles: 1
    behavior: |
      (void)cpu;

  # INC r - Increment register
  - name: "INC"
    category: arithmetic
    encoding:
      opcode: 0x10
      mask: 0xF0
      length: 1
      fields:
        - name: "r"
          position: [3, 0]
    cycles: 1
    behavior: |
      cpu->registers[inst->r]++;
      cpu->flags.Z = (cpu->registers[inst->r] == 0);

  # HALT - Halt execution
  - name: "HALT"
    category: control
    encoding:
      opcode: 0xFF
      mask: 0xFF
      length: 1
    cycles: 1
    behavior: |
      cpu->halted = 1;
