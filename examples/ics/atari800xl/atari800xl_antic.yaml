                              int32_t xpair0 = (int32_t)hposp[pn] - 0x20;
                              uint32_t color = atari_ntsc_palette[(uint8_t)(line_colpm[pn] & 0xFEu)];
                              for (uint32_t bit = 0u; bit < 8u; ++bit) {
                                  if ((graf & (uint8_t)(0x80u >> bit)) == 0u) continue;
                                  for (uint32_t dup = 0u; dup < scale; ++dup) {
                                      int32_t xpair = xpair0 + (int32_t)(bit * scale + dup);
                                      int32_t px0 = xpair * 2;
                                      for (int32_t px = px0; px < px0 + 2; ++px) {
                                          if (px >= 0 && px < 320) {
                                              framebuf[py * 320u + (uint32_t)px] = color;
                                          }
                                      }
                                  }
                              }
                          }
                      }
                      if (missile_dma != 0u) {
                          uint16_t moffs = (uint16_t)(singleline != 0u ? 0x0300u : 0x0180u);
                          uint16_t maddr = (uint16_t)(pm_base + moffs + (uint16_t)pm_row);
                          uint8_t mgraf = ((uint64_t)maddr < cpu->memory_size) ? ATARI_BUS_READ8(maddr) : 0u;
                          static const uint8_t missile_masks[4] = { 0x03u, 0x0Cu, 0x30u, 0xC0u };
                          for (uint32_t mn = 0u; mn < 4u; ++mn) {
                              if ((mgraf & missile_masks[mn]) == 0u) continue;
                              uint32_t scale = pm_width[(sizem >> (mn * 2u)) & 0x03u];
                              int32_t xpair0 = (int32_t)hposm[mn] - 0x20;
                              uint32_t color = atari_ntsc_palette[(uint8_t)(line_colpm[mn] & 0xFEu)];
                              for (uint32_t dup = 0u; dup < scale; ++dup) {
                                  int32_t xpair = xpair0 + (int32_t)dup;
                                  int32_t px0 = xpair * 2;
                                  for (int32_t px = px0; px < px0 + 2; ++px) {
                                      if (px >= 0 && px < 320) {
                                          framebuf[py * 320u + (uint32_t)px] = color;
                                      }
                                  }
                              }
                          }
