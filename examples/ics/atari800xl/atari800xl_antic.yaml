                          (uniform_regs != 0u) ? raw_hposp[1] : gtia_line[1u * 262u],
                          (uniform_regs != 0u) ? raw_hposp[2] : gtia_line[2u * 262u],
                          (uniform_regs != 0u) ? raw_hposp[3] : gtia_line[3u * 262u]
                      };
                      uint8_t hposm[4] = {
                          (uniform_regs != 0u) ? raw_hposm[0] : gtia_line[4u * 262u],
                          (uniform_regs != 0u) ? raw_hposm[1] : gtia_line[5u * 262u],
                          (uniform_regs != 0u) ? raw_hposm[2] : gtia_line[6u * 262u],
                          (uniform_regs != 0u) ? raw_hposm[3] : gtia_line[7u * 262u]
                      };
                      uint8_t sizep[4] = {
                          (uniform_regs != 0u) ? raw_sizep[0] : gtia_line[8u * 262u],
                          (uniform_regs != 0u) ? raw_sizep[1] : gtia_line[9u * 262u],
                          (uniform_regs != 0u) ? raw_sizep[2] : gtia_line[10u * 262u],
                          (uniform_regs != 0u) ? raw_sizep[3] : gtia_line[11u * 262u]
                      };
                      uint8_t sizem = (uniform_regs != 0u) ? raw_sizem : gtia_line[12u * 262u];
                      uint8_t line_colpm[4] = {
                          (uniform_regs != 0u) ? raw_line_colpm[0] : gtia_line[13u * 262u],
                          (uniform_regs != 0u) ? raw_line_colpm[1] : gtia_line[14u * 262u],
                          (uniform_regs != 0u) ? raw_line_colpm[2] : gtia_line[15u * 262u],
                          (uniform_regs != 0u) ? raw_line_colpm[3] : gtia_line[16u * 262u]
                      };
                      uint8_t vdelay = (uniform_regs != 0u) ? raw_vdelay : gtia_line[17u * 262u];
                      uint8_t gractl = (uniform_regs != 0u) ? raw_gractl : gtia_line[18u * 262u];
                      uint8_t player_dma = (uint8_t)((dmactl & 0x08u) != 0u && (gractl & 0x02u) != 0u);
                      uint8_t missile_dma = (uint8_t)((dmactl & 0x04u) != 0u && (gractl & 0x01u) != 0u);
                      if (player_dma == 0u && missile_dma == 0u) continue;
                      uint32_t pm_row = singleline != 0u ? hw_line : (hw_line >> 1u);
                      uint16_t pm_base = (singleline != 0u) ? pmbase_s : pmbase_d;
                      for (uint32_t pn = 0u; pn < 4u; ++pn) {
                          uint8_t graf = 0u;
                          if (player_dma != 0u) {
                              uint16_t offs = singleline != 0u
                                  ? (uint16_t)(0x0400u + pn * 0x0100u)
                                  : (uint16_t)(0x0200u + pn * 0x0080u);
                              uint16_t addr = (uint16_t)(pm_base + offs + (uint16_t)pm_row);
                              if ((uint64_t)addr < cpu->memory_size) {
                                  graf = ATARI_BUS_READ8(addr);
                              }
