                  if ((ir & 0x40u) != 0u) {
                      if ((uint64_t)(dl_ptr + 1u) >= cpu->memory_size) break;
                      scan_addr = (uint16_t)ATARI_BUS_READ8(dl_ptr) | ((uint16_t)ATARI_BUS_READ8((uint16_t)(dl_ptr + 1u)) << 8u);
                      dl_ptr = (uint16_t)(dl_ptr + 2u);
                  }

                  switch (mode) {
                      case 0x02u: bytes_per_row = 40u; line_height = 8u;  text_mode = 1u; text_cols = 40u; break;
                      case 0x03u: bytes_per_row = 40u; line_height = 10u; text_mode = 1u; text_cols = 40u; break;
                      case 0x04u: bytes_per_row = 40u; line_height = 8u;  text_mode = 1u; text_cols = 40u; break;
                      case 0x05u: bytes_per_row = 40u; line_height = 16u; text_mode = 1u; text_cols = 40u; break;
                      case 0x06u: bytes_per_row = 20u; line_height = 8u;  text_mode = 1u; text_cols = 20u; break;
                      case 0x07u: bytes_per_row = 20u; line_height = 16u; text_mode = 1u; text_cols = 20u; break;
                      case 0x08u: bytes_per_row = 10u; line_height = 8u; break;
                      case 0x09u: bytes_per_row = 10u; line_height = 4u; break;
                      case 0x0Au: bytes_per_row = 20u; line_height = 4u; break;
                      case 0x0Bu: bytes_per_row = 20u; line_height = 2u; break;
                      case 0x0Cu: bytes_per_row = 20u; line_height = 1u; break;
                      case 0x0Du: bytes_per_row = 40u; line_height = 2u; break;
                      case 0x0Eu: bytes_per_row = 40u; line_height = 1u; break;
                      case 0x0Fu: bytes_per_row = 40u; line_height = 1u; break;
                      default: bytes_per_row = 40u; line_height = 1u; break;
                  }
                  if (text_mode != 0u) {
                      logical_width = (uint32_t)text_cols * 8u;
                  } else {
                      uint8_t bits_per_pixel_l = ((mode == 0x08u || mode == 0x0Au || mode == 0x0Du || mode == 0x0Eu) ? 2u : 1u);
                      uint32_t pixels_per_byte_l = (bits_per_pixel_l == 2u) ? 4u : 8u;
                      logical_width = bytes_per_row * pixels_per_byte_l;
                      {
                          uint32_t mode_out_w = 320u;
                          /* BASIC graphics logical widths by ANTIC mode:
                             8:40, 9/A:80, B/C/D/E:160, F:320 */
                          if (mode == 0x08u) mode_out_w = 40u;
                          else if (mode == 0x09u || mode == 0x0Au) mode_out_w = 80u;
                          else if (
                              mode == 0x0Bu || mode == 0x0Cu ||
                              mode == 0x0Du || mode == 0x0Eu
                          ) mode_out_w = 160u;
                          else if (mode == 0x0Fu) mode_out_w = 320u;
                          mode_render_w = mode_out_w;
                      }
                  }

                  if (text_mode != 0u && char_base != 0u) {
                      uint8_t mode_23 = (uint8_t)(mode == 0x02u || mode == 0x03u);
                      uint8_t mode_45 = (uint8_t)(mode == 0x04u || mode == 0x05u);
                      uint8_t mode_67 = (uint8_t)(mode == 0x06u || mode == 0x07u);
                      for (uint32_t py = 0u; py < line_height && y < 192; ++py) {
                          uint32_t line = (uint32_t)(y + top_crop);
                          if (line > 261u) line = 261u;
                          {
                              uint8_t line_chactl = comp->antic_chactl;
                              uint16_t line_char_base = char_base;
                              uint8_t line_chbase = 0u;
                              uint8_t line_chbase_from_shadow = 0u;
                              if (comp->render_chactl_by_line != NULL) {
                                  line_chactl = comp->render_chactl_by_line[line];
                              }
                              if (comp->render_chbase_by_line != NULL) {
                                  line_chbase = comp->render_chbase_by_line[line];
                                  if (
                                      chbas_shadow != 0u &&
                                      line_chbase == comp->antic_chbase &&
                                      line_chbase != chbas_shadow
                                  ) {
                                      /* The OS updates CHBAS shadow even when our emulated D409
                                         hardware register lags. Prefer the live shadow unless a
                                         per-line D409 write has clearly diverged from global state. */
                                      line_chbase = chbas_shadow;
                                      line_chbase_from_shadow = 1u;
                                  }
                                  line_char_base = (uint16_t)(
                                      line_chbase_from_shadow != 0u
                                          ? ((uint16_t)line_chbase << 8u)
                                          : ((uint16_t)(line_chbase & 0xFEu) << 8u)
                                  );
                                  if ((uint64_t)line_char_base + 1024u > cpu->memory_size) {
                                      line_char_base = 0u;
                                  }
                              }
                              if (line_char_base == 0u) {
                                  y += 1u;
                                  continue;
                              }
                              {
                                  uint8_t chact = (uint8_t)(line_chactl & 0x07u);
                                  uint8_t reflect = (uint8_t)((chact & 0x04u) != 0u);
                                  uint8_t inverse_enable = (uint8_t)((chact & 0x02u) != 0u);
                                  uint8_t blank_enable = (uint8_t)((chact & 0x01u) != 0u);
                                  uint8_t line_colpf0 = colpf0_raw;
                                  uint8_t line_colpf1 = colpf1_raw;
                                  uint8_t line_colpf2 = colpf2_raw;
                                  uint8_t line_colpf3 = colpf3_raw;
                                  uint8_t line_colbk = colbk_raw;
                                  if (comp->render_colpf0_by_line != NULL) line_colpf0 = comp->render_colpf0_by_line[line];
                                  if (comp->render_colpf1_by_line != NULL) line_colpf1 = comp->render_colpf1_by_line[line];
                                  if (comp->render_colpf2_by_line != NULL) line_colpf2 = comp->render_colpf2_by_line[line];
                                  if (comp->render_colpf3_by_line != NULL) line_colpf3 = comp->render_colpf3_by_line[line];
                                  if (comp->render_colbk_by_line != NULL) line_colbk = comp->render_colbk_by_line[line];
                                  {
                                      uint32_t line_pf0 = atari_ntsc_palette[line_colpf0];
                                      uint32_t line_pf1 = atari_ntsc_palette[line_colpf1];
                                      uint32_t line_pf2 = atari_ntsc_palette[line_colpf2];
                                      uint32_t line_pf3 = atari_ntsc_palette[line_colpf3];
                                      uint32_t line_bg = atari_ntsc_palette[line_colbk];
                          uint8_t glyph_row = (uint8_t)(py & 0x07u);
                          if (mode == 0x05u || mode == 0x07u) {
                              glyph_row = (uint8_t)((py >> 1u) & 0x07u);
                          } else if (mode == 0x03u && py >= 8u) {
                              glyph_row = 7u;
                          }
                          if (reflect != 0u) {
                              glyph_row = (uint8_t)(7u - glyph_row);
                          }
                          for (uint32_t col = 0u; col < (uint32_t)text_cols; ++col) {
                              uint16_t saddr = (uint16_t)(scan_addr + (uint16_t)col);
                              uint8_t raw = ((uint64_t)saddr < cpu->memory_size) ? ATARI_BUS_READ8(saddr) : 0u;
                              uint32_t x0 = col * 8u * (uint32_t)(40u / text_cols);
                              uint32_t x_scale = (uint32_t)(40u / text_cols);
                              if (mode_45 != 0u) x_scale *= 2u;
                              if (x_scale == 0u) x_scale = 1u;
                              {
                                  uint16_t chbase20 = (uint16_t)((uint16_t)(line_chbase & 0xFEu) << 8u);
                                  if (reflect != 0u) {
                                      chbase20 ^= 7u;
                                  }
                              if (mode_67 != 0u) {
                                  uint8_t code = (uint8_t)(raw & 0x3Fu);
                                  uint16_t row_base = (uint16_t)(((mode == 0x06u ? (py & 7u) : (py >> 1u)) ^ chbase20));
                                  uint16_t caddr = (uint16_t)(row_base + ((uint16_t)code << 3u));
                                  uint8_t bits = ((uint64_t)caddr < cpu->memory_size) ? ATARI_BUS_READ8(caddr) : 0u;
                                  if (bits == 0u && line_chbase == 0xE0u) {
                                      uint16_t zero_base = (uint16_t)(mode == 0x06u ? (py & 7u) : (py >> 1u));
                                      uint16_t zero_caddr = (uint16_t)(zero_base + ((uint16_t)code << 3u));
                                      uint8_t zero_bits = ((uint64_t)zero_caddr < cpu->memory_size) ? ATARI_BUS_READ8(zero_caddr) : 0u;
                                      if (zero_bits != 0u) {
                                          bits = zero_bits;
                                      }
                                  }
                                  uint32_t fg = line_pf0;
                                  uint8_t csel = (uint8_t)((raw >> 6u) & 0x03u);
                                  if (csel == 1u) fg = line_pf1;
                                  else if (csel == 2u) fg = line_pf2;
                                  else if (csel == 3u) fg = line_pf3;
                                  for (uint32_t gx = 0u; gx < 8u; ++gx) {
                                      uint32_t color = ((bits & (uint8_t)(0x80u >> gx)) != 0u) ? fg : line_bg;
                                      for (uint32_t xs = 0u; xs < x_scale; ++xs) {
                                          uint32_t px = x0 + gx * x_scale + xs + row_hscroll;
                                          if (px < 320u) {
                                              int32_t py_out = y;
                                              if (py_out >= 0 && py_out < 192) {
                                                  framebuf[py_out * 320u + px] = color;
                                              }
                                          }
                                      }
                                  }
                              } else if (mode_45 != 0u) {
                                  uint8_t code = (uint8_t)(raw & 0x7Fu);
                                  uint16_t row_phase = (uint16_t)(mode == 0x04u ? (py & 7u) : (py >> 1u));
                                  uint16_t row_base = (uint16_t)(((row_phase ^ chbase20) & 0xFC07u));
                                  uint16_t caddr = (uint16_t)(row_base + ((uint16_t)code << 3u));
                                  uint8_t bits = ((uint64_t)caddr < cpu->memory_size) ? ATARI_BUS_READ8(caddr) : 0u;
                                  uint32_t pair_colors[4] = {
                                      line_bg,
                                      line_pf0,
                                      line_pf1,
                                      ((raw & 0x80u) != 0u) ? line_pf3 : line_pf2
                                  };
                                  for (uint32_t gx = 0u; gx < 4u; ++gx) {
                                      uint8_t pair = (uint8_t)((bits >> ((3u - gx) * 2u)) & 0x03u);
                                      uint32_t color = pair_colors[pair];
                                      for (uint32_t xs = 0u; xs < x_scale; ++xs) {
                                          uint32_t px = x0 + gx * x_scale + xs + row_hscroll;
                                          if (px < 320u) {
                                              int32_t py_out = y;
                                              if (py_out >= 0 && py_out < 192) {
                                                  framebuf[py_out * 320u + px] = color;
                                              }
                                          }
                                      }
                                  }
                              } else {
                                  uint8_t code = (uint8_t)(raw & 0x7Fu);
                                  uint16_t row_base = (uint16_t)(((py ^ chbase20) & 0xFC07u));
                                  uint16_t caddr = (uint16_t)(row_base + ((uint16_t)code << 3u));
                                  uint8_t bits = ((uint64_t)caddr < cpu->memory_size) ? ATARI_BUS_READ8(caddr) : 0u;
                                  uint8_t invert_mask = (uint8_t)(inverse_enable != 0u ? 0x80u : 0u);
                                  uint8_t blank_mask = (uint8_t)(blank_enable != 0u ? 0xE0u : 0x60u);
                                  uint8_t key = (uint8_t)(raw & blank_mask);
                                  uint8_t draw_glyph = 1u;
                                  if (key == 0x60u) {
                                      draw_glyph = (uint8_t)((mode == 0x02u || (py & 0x0Eu) != 0u) ? 1u : 0u);
                                  } else if (key == 0x00u || key == 0x20u || key == 0x40u) {
                                      draw_glyph = (uint8_t)(((py & 0x0Eu) == 8u) ? 0u : 1u);
                                  }
                                  if (draw_glyph != 0u) {
                                      bits = (uint8_t)((((raw & invert_mask) != 0u) ? 0xFFu : 0x00u) ^ bits);
                                  } else {
                                      bits = (uint8_t)(((raw & invert_mask) != 0u) ? 0xFFu : 0x00u);
                                  }
                                  {
                                      uint8_t hi2_raw = (uint8_t)((line_colpf2 & 0xF0u) | (line_colpf1 & 0x0Fu));
                                      uint32_t hi2 = atari_ntsc_palette[hi2_raw];
                                      for (uint32_t gx = 0u; gx < 8u; ++gx) {
                                          uint32_t color = ((bits & (uint8_t)(0x80u >> gx)) != 0u) ? hi2 : line_pf2;
                                          uint32_t px = x0 + gx + row_hscroll;
                                          if (px < 320u) {
                                              int32_t py_out = y;
                                              if (py_out >= 0 && py_out < 192) {
                                                  framebuf[py_out * 320u + px] = color;
                                              }
                                          }
                                      }
                                  }
                              }
                              }
                          }
                                  }
                              }
                          }
                          y += 1u;
                      }
                  } else {
                      uint8_t bits_per_pixel = 1u;
                      if (mode == 0x08u || mode == 0x0Au || mode == 0x0Du || mode == 0x0Eu) {
                          bits_per_pixel = 2u;
                      }

                      uint32_t pixels_per_byte = (bits_per_pixel == 2u) ? 4u : 8u;
                      uint32_t target_w = 320u;
                      uint32_t x_scale = (logical_width > 0u) ? (target_w / logical_width) : 1u;
                      if (x_scale == 0u) x_scale = 1u;

                      for (uint32_t py = 0u; py < line_height && y < 192; ++py) {
                          int32_t py_out = y;
                          uint32_t line = (uint32_t)(y + top_crop);
                          if (line > 261u) line = 261u;
                          {
                              uint8_t line_colpf0 = colpf0_raw;
                              uint8_t line_colpf1 = colpf1_raw;
                              uint8_t line_colpf2 = colpf2_raw;
                              uint8_t line_colpf3 = colpf3_raw;
                              uint8_t line_colbk = colbk_raw;
                              uint8_t line_prior = prior_raw;
                              if (comp->render_colpf0_by_line != NULL) line_colpf0 = comp->render_colpf0_by_line[line];
                              if (comp->render_colpf1_by_line != NULL) line_colpf1 = comp->render_colpf1_by_line[line];
                              if (comp->render_colpf2_by_line != NULL) line_colpf2 = comp->render_colpf2_by_line[line];
                              if (comp->render_colpf3_by_line != NULL) line_colpf3 = comp->render_colpf3_by_line[line];
                              if (comp->render_colbk_by_line != NULL) line_colbk = comp->render_colbk_by_line[line];
                              if (comp->render_prior_by_line != NULL) line_prior = comp->render_prior_by_line[line];
                              {
                                  uint32_t line_pf0 = atari_ntsc_palette[line_colpf0];
                                  uint32_t line_pf1 = atari_ntsc_palette[line_colpf1];
                                  uint32_t line_pf2 = atari_ntsc_palette[line_colpf2];
                                  uint32_t line_bg = atari_ntsc_palette[line_colbk];
                                  uint8_t gtia_mode_line = (uint8_t)(line_prior >> 6u);
                          for (uint32_t bx = 0u; bx < bytes_per_row; ++bx) {
                              uint16_t saddr = (uint16_t)(scan_addr + (uint16_t)bx);
                              uint8_t bits = ((uint64_t)saddr < cpu->memory_size) ? ATARI_BUS_READ8(saddr) : 0u;
                              if (bits_per_pixel == 1u) {
                                  for (uint32_t bit = 0u; bit < 8u; ++bit) {
                                      uint8_t pix = (uint8_t)((bits >> (7u - bit)) & 0x01u);
                                      uint32_t px0 = ((bx * 8u + bit) * x_scale) + row_hscroll;
                                      uint32_t color = (pix != 0u) ? line_pf0 : line_bg;
                                      for (uint32_t xs = 0u; xs < x_scale; ++xs) {
                                          uint32_t px = px0 + xs;
                                          if (px < target_w && py_out >= 0 && py_out < 192) {
                                              framebuf[py_out * 320u + px] = color;
                                          }
                                      }
                                  }
                              } else {
                                  if ((mode == 0x0Du || mode == 0x0Eu) && gtia_mode_line != 0u) {
                                      for (uint32_t nib = 0u; nib < 2u; ++nib) {
                                          uint8_t quad = (uint8_t)((nib == 0u) ? ((bits >> 4u) & 0x0Fu) : (bits & 0x0Fu));
                                          uint8_t an0 = 0u;
                                          uint8_t an1 = 0u;
                                          if ((quad & 0x0Cu) == 0x08u) an0 = 1u;
                                          else if ((quad & 0x0Cu) == 0x0Cu) an0 = 2u;
                                          if ((quad & 0x03u) == 0x02u) an1 = 1u;
                                          else if ((quad & 0x03u) == 0x03u) an1 = 2u;
                                          {
                                              uint8_t pix = (uint8_t)((an0 << 2u) | an1);
                                              uint32_t px0 = ((bx * 2u + nib) * (target_w / 80u)) + row_hscroll;
                                              uint32_t color = line_bg;
                                              if (gtia_mode_line == 1u) {
                                                  color = atari_ntsc_palette[(uint8_t)((line_colpf3 & 0xF0u) | (pix & 0x0Fu))];
                                              } else if (gtia_mode_line == 2u) {
                                                  static const uint8_t gtia10_lookup[16] = {
                                                      0u, 1u, 2u, 3u, 4u, 5u, 6u, 7u,
                                                      8u, 8u, 8u, 8u, 4u, 5u, 6u, 7u
                                                  };
                                                  uint8_t color_sel = gtia10_lookup[pix & 0x0Fu];
                                                  uint8_t color_raw = colbk_raw;
                                                  if (color_sel == 0u) color_raw = colpm0_raw;
                                                  else if (color_sel == 1u) color_raw = colpm1_raw;
                                                  else if (color_sel == 2u) color_raw = colpm2_raw;
                                                  else if (color_sel == 3u) color_raw = colpm3_raw;
                                                  else if (color_sel == 4u) color_raw = line_colpf0;
                                                  else if (color_sel == 5u) color_raw = line_colpf1;
                                                  else if (color_sel == 6u) color_raw = line_colpf2;
                                                  else if (color_sel == 7u) color_raw = line_colpf3;
                                                  else color_raw = line_colbk;
                                                  color = atari_ntsc_palette[color_raw];
                                              } else if (gtia_mode_line == 3u) {
                                                  color = atari_ntsc_palette[(uint8_t)(((pix & 0x0Fu) << 4u) | (line_colpf3 & 0x0Fu))];
                                              }
                                              for (uint32_t xs = 0u; xs < (target_w / 80u); ++xs) {
                                                  uint32_t px = px0 + xs;
                                                  if (px < target_w && py_out >= 0 && py_out < 192) {
                                                      framebuf[py_out * 320u + px] = color;
                                                  }
                                              }
                                          }
                                      }
                                  } else {
                                      for (uint32_t grp = 0u; grp < 4u; ++grp) {
                                          uint8_t pix = (uint8_t)((bits >> ((3u - grp) * 2u)) & 0x03u);
                                          uint32_t px0 = ((bx * 4u + grp) * x_scale) + row_hscroll;
                                          uint32_t color = line_bg;
                                          if (pix == 1u) color = line_pf0;
                                          else if (pix == 2u) color = line_pf1;
                                          else if (pix == 3u) color = line_pf2;
                                          for (uint32_t xs = 0u; xs < x_scale; ++xs) {
                                              uint32_t px = px0 + xs;
                                              if (px < target_w && py_out >= 0 && py_out < 192) {
                                                  framebuf[py_out * 320u + px] = color;
                                              }
                                          }
                                      }
                                  }
                              }
                          }
                              }
                          }
                          y += 1u;
                      }
                  }

                  scan_addr = (uint16_t)(scan_addr + (uint16_t)bytes_per_row);
              }
              }

          {
              uint64_t frame_args[4] = {
                  (uint64_t)comp->frame_counter,
                  (uint64_t)(uintptr_t)framebuf,
                  (uint64_t)frame_out_w,
                  192u
              };
              cpu_component_emit_signal(cpu, "atari800xl_antic", "frame_ready", frame_args, 4);
          }
          uint8_t had_render_next_valid = comp->render_next_valid;
          if (had_render_next_valid != 0u) {
              if (comp->render_colpf0_by_line != NULL && comp->render_colpf0_next_by_line != NULL) memcpy(comp->render_colpf0_by_line, comp->render_colpf0_next_by_line, 262u);
              if (comp->render_colpf1_by_line != NULL && comp->render_colpf1_next_by_line != NULL) memcpy(comp->render_colpf1_by_line, comp->render_colpf1_next_by_line, 262u);
              if (comp->render_colpf2_by_line != NULL && comp->render_colpf2_next_by_line != NULL) memcpy(comp->render_colpf2_by_line, comp->render_colpf2_next_by_line, 262u);
              if (comp->render_colpf3_by_line != NULL && comp->render_colpf3_next_by_line != NULL) memcpy(comp->render_colpf3_by_line, comp->render_colpf3_next_by_line, 262u);
              if (comp->render_colbk_by_line != NULL && comp->render_colbk_next_by_line != NULL) memcpy(comp->render_colbk_by_line, comp->render_colbk_next_by_line, 262u);
              if (comp->render_prior_by_line != NULL && comp->render_prior_next_by_line != NULL) memcpy(comp->render_prior_by_line, comp->render_prior_next_by_line, 262u);
              if (comp->render_chactl_by_line != NULL && comp->render_chactl_next_by_line != NULL) memcpy(comp->render_chactl_by_line, comp->render_chactl_next_by_line, 262u);
              if (comp->render_pmbase_by_line != NULL && comp->render_pmbase_next_by_line != NULL) memcpy(comp->render_pmbase_by_line, comp->render_pmbase_next_by_line, 262u);
              if (comp->render_chbase_by_line != NULL && comp->render_chbase_next_by_line != NULL) memcpy(comp->render_chbase_by_line, comp->render_chbase_next_by_line, 262u);
              if (comp->render_gtia_regs_by_line != NULL && comp->render_gtia_regs_next_by_line != NULL) memcpy(comp->render_gtia_regs_by_line, comp->render_gtia_regs_next_by_line, 19u * 262u);
          } else {
              if (comp->render_colpf0_by_line != NULL) memset(comp->render_colpf0_by_line, colpf0_raw, 262u);
              if (comp->render_colpf1_by_line != NULL) memset(comp->render_colpf1_by_line, colpf1_raw, 262u);
              if (comp->render_colpf2_by_line != NULL) memset(comp->render_colpf2_by_line, colpf2_raw, 262u);
              if (comp->render_colpf3_by_line != NULL) memset(comp->render_colpf3_by_line, colpf3_raw, 262u);
              if (comp->render_colbk_by_line != NULL) memset(comp->render_colbk_by_line, colbk_raw, 262u);
              if (comp->render_prior_by_line != NULL) memset(comp->render_prior_by_line, prior_raw, 262u);
              if (comp->render_chactl_by_line != NULL) memset(comp->render_chactl_by_line, comp->antic_chactl, 262u);
              if (comp->render_pmbase_by_line != NULL) memset(comp->render_pmbase_by_line, comp->antic_pmbase, 262u);
              if (comp->render_chbase_by_line != NULL) memset(comp->render_chbase_by_line, comp->antic_chbase, 262u);
          }
          comp->render_next_valid = 0u;
          {
              /* Minimal PMG overlay: enough to render status-panel/player text that
                 lives in GTIA player/missile DMA over blank playfield rows. */
              uint8_t dmactl = comp->antic_dmactl;
              static const uint8_t pm_width[4] = { 1u, 2u, 1u, 4u };
              uint8_t singleline = (uint8_t)((dmactl & 0x10u) != 0u);
              uint8_t uniform_regs = (uint8_t)(had_render_next_valid == 0u);
              uint8_t raw_hposp[4] = { 0u, 0u, 0u, 0u };
              uint8_t raw_hposm[4] = { 0u, 0u, 0u, 0u };
              uint8_t raw_sizep[4] = { 0u, 0u, 0u, 0u };
              uint8_t raw_line_colpm[4] = { 0u, 0u, 0u, 0u };
              uint8_t raw_sizem = 0u;
              uint8_t raw_vdelay = 0u;
              uint8_t raw_gractl = 0u;
              if (uniform_regs != 0u) {
                  raw_hposp[0] = ATARI_BUS_READ8(0xD000u);
                  raw_hposp[1] = ATARI_BUS_READ8(0xD001u);
                  raw_hposp[2] = ATARI_BUS_READ8(0xD002u);
                  raw_hposp[3] = ATARI_BUS_READ8(0xD003u);
                  raw_hposm[0] = ATARI_BUS_READ8(0xD004u);
                  raw_hposm[1] = ATARI_BUS_READ8(0xD005u);
                  raw_hposm[2] = ATARI_BUS_READ8(0xD006u);
                  raw_hposm[3] = ATARI_BUS_READ8(0xD007u);
                  raw_sizep[0] = ATARI_BUS_READ8(0xD008u);
                  raw_sizep[1] = ATARI_BUS_READ8(0xD009u);
                  raw_sizep[2] = ATARI_BUS_READ8(0xD00Au);
                  raw_sizep[3] = ATARI_BUS_READ8(0xD00Bu);
                  raw_sizem = ATARI_BUS_READ8(0xD00Cu);
                  raw_line_colpm[0] = ATARI_BUS_READ8(0xD012u);
                  raw_line_colpm[1] = ATARI_BUS_READ8(0xD013u);
                  raw_line_colpm[2] = ATARI_BUS_READ8(0xD014u);
                  raw_line_colpm[3] = ATARI_BUS_READ8(0xD015u);
                  raw_vdelay = ATARI_BUS_READ8(0xD01Cu);
                  raw_gractl = ATARI_BUS_READ8(0xD01Du);
              }
              if ((uniform_regs != 0u) || (comp->render_gtia_regs_by_line != NULL && comp->render_pmbase_by_line != NULL)) {
                  for (uint32_t py = 0u; py < 192u; ++py) {
                      uint32_t hw_line = py + 24u;
                      uint8_t *gtia_line = (uniform_regs == 0u) ? (comp->render_gtia_regs_by_line + hw_line) : NULL;
                      uint8_t line_pmbase = (uniform_regs != 0u) ? comp->antic_pmbase : comp->render_pmbase_by_line[hw_line];
                      uint16_t pmbase_d = (uint16_t)(((uint16_t)(line_pmbase & 0xFCu)) << 8u);
                      uint16_t pmbase_s = (uint16_t)(pmbase_d & 0xF8FFu);
