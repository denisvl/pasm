metadata:
  id: atari_io
  type: io_controller
  model: atari800xl_core_io
  version: "1.0"

clock_hz: 1789773

state:
  - name: portb
    type: uint8_t
    initial: "0xFF"
  - name: pia_ora
    type: uint8_t
    initial: "0xFF"
  - name: pia_orb
    type: uint8_t
    initial: "0xFF"
  - name: pia_ddra
    type: uint8_t
    initial: "0x00"
  - name: pia_ddrb
    type: uint8_t
    initial: "0x00"
  - name: pia_cra
    type: uint8_t
    initial: "0x00"
  - name: pia_crb
    type: uint8_t
    initial: "0x00"
  - name: keyboard_code
    type: uint8_t
    initial: "0xFF"
  - name: keyboard_atascii
    type: uint8_t
    initial: "0xFF"
  - name: keyboard_sticky
    type: uint8_t
    initial: "0"
  - name: nmi_enable
    type: uint8_t
    initial: "0"
  - name: nmi_status
    type: uint8_t
    initial: "0"
  - name: antic_dmactl
    type: uint8_t
    initial: "0"
  - name: antic_chactl
    type: uint8_t
    initial: "0"
  - name: antic_dlistl
    type: uint8_t
    initial: "0"
  - name: antic_dlisth
    type: uint8_t
    initial: "0"
  - name: antic_hscrol
    type: uint8_t
    initial: "0"
  - name: antic_vscrol
    type: uint8_t
    initial: "0"
  - name: antic_pmbase
    type: uint8_t
    initial: "0"
  - name: antic_chbase
    type: uint8_t
    initial: "0"
  - name: frame_counter
    type: uint32_t
    initial: "0"
  - name: last_frame_cycle
    type: uint64_t
    initial: "0"
  - name: random_lfsr
    type: uint32_t
    initial: "0xACE1u"
  - name: pokey_audf1
    type: uint8_t
    initial: "0"
  - name: pokey_audc1
    type: uint8_t
    initial: "0"
  - name: pokey_serout
    type: uint8_t
    initial: "0"
  - name: pokey_irqen
    type: uint8_t
    initial: "0"
  - name: pokey_irqst
    type: uint8_t
    initial: "0xF7"
  - name: pokey_skctl
    type: uint8_t
    initial: "0"
  - name: pokey_skstat
    type: uint8_t
    initial: "0x7F"
  - name: pokey_serout_busy
    type: uint8_t
    initial: "0"
  - name: pokey_serout_done_cycle
    type: uint64_t
    initial: "0"
  - name: pokey_serout_done_latch
    type: uint8_t
    initial: "0"
  - name: pokey_serout_need_cycle
    type: uint64_t
    initial: "0"
  - name: pokey_serout_need_fired
    type: uint8_t
    initial: "0"
  - name: speaker_level
    type: uint8_t
    initial: "0"
  - name: ram_under_basic
    type: uint8_t *
    initial: "NULL"
  - name: ram_under_os_low
    type: uint8_t *
    initial: "NULL"
  - name: ram_under_os_high
    type: uint8_t *
    initial: "NULL"
  - name: selftest_rom
    type: uint8_t *
    initial: "NULL"

interfaces:
  callbacks:
    - name: keyboard_ascii
      args: []
      returns: u8
    - name: consol_state
      args: []
      returns: u8
    - name: joystick_porta
      args: []
      returns: u8
    - name: trigger0
      args: []
      returns: u8
    - name: trigger1
      args: []
      returns: u8
    - name: trigger2
      args: []
      returns: u8
    - name: trigger3
      args: []
      returns: u8
  handlers: []
  signals:
    - name: frame_ready
      args: [u32, u64, u32, u32]
    - name: audio_level
      args: [u8, u64]
    - name: irq_edge
      args: [u8]

maps:
  memory:
    ranges:
      - name: low_space
        start: 0x0000
        size: 0xA000
        access: [read, write]
      - name: high_space
        start: 0xC000
        size: 0x4000
        access: [read, write]

behavior:
  snippets:
    init: |
      if (comp->ram_under_basic == NULL) {
          comp->ram_under_basic = (uint8_t *)calloc(0x2000u, sizeof(uint8_t));
      }
      if (comp->ram_under_os_low == NULL) {
          comp->ram_under_os_low = (uint8_t *)calloc(0x1000u, sizeof(uint8_t));
      }
      if (comp->ram_under_os_high == NULL) {
          comp->ram_under_os_high = (uint8_t *)calloc(0x2800u, sizeof(uint8_t));
      }
      if (comp->selftest_rom == NULL) {
          comp->selftest_rom = (uint8_t *)calloc(0x0800u, sizeof(uint8_t));
          if (comp->selftest_rom != NULL) {
              FILE *f = fopen("examples/roms/ATARIXL.ROM", "rb");
              if (f != NULL) {
                  if (fseek(f, 0x1000L, SEEK_SET) == 0) {
                      (void)fread(comp->selftest_rom, 1u, 0x0800u, f);
                  }
                  fclose(f);
              }
          }
      }
    reset: |
      comp->pia_ora = 0xFFu;
      comp->pia_orb = 0xFFu;
      comp->pia_ddra = 0x00u;
      comp->pia_ddrb = 0x00u;
      comp->pia_cra = 0x00u;
      comp->pia_crb = 0x00u;
      comp->portb = (uint8_t)((comp->pia_orb & comp->pia_ddrb) | (uint8_t)(~comp->pia_ddrb));
      comp->keyboard_code = 0xFFu;
      comp->keyboard_atascii = 0xFFu;
      comp->keyboard_sticky = 0u;
      comp->nmi_enable = 0u;
      comp->nmi_status = 0u;
      comp->antic_dmactl = 0u;
      comp->antic_chactl = 0u;
      comp->antic_dlistl = 0u;
      comp->antic_dlisth = 0u;
      comp->antic_hscrol = 0u;
      comp->antic_vscrol = 0u;
      comp->antic_pmbase = 0u;
      comp->antic_chbase = 0u;
      comp->frame_counter = 0u;
      comp->last_frame_cycle = 0u;
      comp->random_lfsr = 0xACE1u;
      comp->pokey_audf1 = 0u;
      comp->pokey_audc1 = 0u;
      comp->pokey_serout = 0u;
      comp->pokey_irqen = 0u;
      comp->pokey_irqst = 0xF7u;
      comp->pokey_skctl = 0u;
      comp->pokey_skstat = 0x7Fu;
      comp->pokey_serout_busy = 0u;
      comp->pokey_serout_done_cycle = 0u;
      comp->pokey_serout_done_latch = 0u;
      comp->pokey_serout_need_cycle = 0u;
      comp->pokey_serout_need_fired = 0u;
      comp->speaker_level = 0u;
      if (comp->ram_under_basic != NULL) {
          for (uint16_t i = 0u; i < 0x2000u; ++i) {
              uint16_t a = (uint16_t)(0xA000u + i);
              comp->ram_under_basic[i] = ((uint64_t)a < cpu->memory_size) ? cpu->memory[a] : 0u;
          }
      }
      if (comp->ram_under_os_low != NULL) {
          for (uint16_t i = 0u; i < 0x1000u; ++i) {
              uint16_t a = (uint16_t)(0xC000u + i);
              comp->ram_under_os_low[i] = ((uint64_t)a < cpu->memory_size) ? cpu->memory[a] : 0u;
          }
      }
      if (comp->ram_under_os_high != NULL) {
          for (uint16_t i = 0u; i < 0x2800u; ++i) {
              uint16_t a = (uint16_t)(0xD800u + i);
              comp->ram_under_os_high[i] = ((uint64_t)a < cpu->memory_size) ? cpu->memory[a] : 0u;
          }
      }
      if (cpu->memory_size >= 0x02FDu) {
          cpu->memory[0x02FCu] = 0xFFu; /* CH */
      }
      if (cpu->memory_size > 0xD301u) {
          cpu->memory[0xD300u] = comp->pia_ora;
          cpu->memory[0xD301u] = comp->portb;
      }
      if (cpu->memory_size > 0xD303u) {
          cpu->memory[0xD302u] = comp->pia_cra;
          cpu->memory[0xD303u] = comp->pia_crb;
      }
      if (cpu->memory_size > 0xD407u) {
          cpu->memory[0xD400u] = comp->antic_dmactl;
          cpu->memory[0xD401u] = comp->antic_chactl;
          cpu->memory[0xD402u] = comp->antic_dlistl;
          cpu->memory[0xD403u] = comp->antic_dlisth;
          cpu->memory[0xD404u] = comp->antic_hscrol;
          cpu->memory[0xD405u] = comp->antic_vscrol;
          cpu->memory[0xD406u] = comp->antic_pmbase;
          cpu->memory[0xD407u] = comp->antic_chbase;
      }
    destroy: |
      if (comp->ram_under_basic != NULL) {
          free(comp->ram_under_basic);
          comp->ram_under_basic = NULL;
      }
      if (comp->ram_under_os_low != NULL) {
          free(comp->ram_under_os_low);
          comp->ram_under_os_low = NULL;
      }
      if (comp->ram_under_os_high != NULL) {
          free(comp->ram_under_os_high);
          comp->ram_under_os_high = NULL;
      }
      if (comp->selftest_rom != NULL) {
          free(comp->selftest_rom);
          comp->selftest_rom = NULL;
      }
    mem_read_pre: |
      if (addr >= 0x5000u && addr < 0x5800u) {
          if ((comp->portb & 0x80u) == 0u && comp->selftest_rom != NULL) {
              return comp->selftest_rom[(uint16_t)(addr - 0x5000u)];
          }
      }
      if (addr >= 0xA000u && addr < 0xC000u) {
      #if CPU_CARTRIDGE_COUNT > 0
          uint8_t cart_present = (uint8_t)((cpu->comp_atari_cart0.rom_data != NULL && cpu->comp_atari_cart0.rom_size > 0u) ? 1u : 0u);
          if (cart_present == 0u)
      #endif
          {
          if ((comp->portb & 0x02u) != 0u && comp->ram_under_basic != NULL) {
              return comp->ram_under_basic[(uint16_t)(addr - 0xA000u)];
          }
          }
      }
      if (addr >= 0xC000u && addr < 0xD000u) {
          if ((comp->portb & 0x01u) == 0u && comp->ram_under_os_low != NULL) {
              return comp->ram_under_os_low[(uint16_t)(addr - 0xC000u)];
          }
      }
      if (addr >= 0xD800u) {
          if ((comp->portb & 0x01u) == 0u && comp->ram_under_os_high != NULL) {
              return comp->ram_under_os_high[(uint16_t)(addr - 0xD800u)];
          }
      }

      if (addr >= 0xD000u && addr < 0xD800u) {
          if (addr == 0xD300u) {
              if ((comp->pia_cra & 0x04u) == 0u) {
                  return comp->pia_ddra;
              }
              {
                  uint8_t in_a = (uint8_t)cpu_component_call(cpu, "atari_io", "joystick_porta", NULL, 0);
                  return (uint8_t)((comp->pia_ora & comp->pia_ddra) | (in_a & (uint8_t)(~comp->pia_ddra)));
              }
          }
          if (addr == 0xD301u) {
              if ((comp->pia_crb & 0x04u) == 0u) {
                  return comp->pia_ddrb;
              }
              return (uint8_t)((comp->pia_orb & comp->pia_ddrb) | (uint8_t)(~comp->pia_ddrb));
          }
          if (addr == 0xD302u) {
              return comp->pia_cra;
          }
          if (addr == 0xD303u) {
              return comp->pia_crb;
          }
          if (addr == 0xD20Au) {
              /* POKEY RANDOM */
              uint32_t l = comp->random_lfsr;
              uint32_t bit = ((l >> 0u) ^ (l >> 2u) ^ (l >> 3u) ^ (l >> 5u)) & 1u;
              l = (l >> 1u) | (bit << 15u);
              comp->random_lfsr = l;
              return (uint8_t)(l & 0xFFu);
          }
          if (addr == 0xD209u) {
              /* POKEY KBCODE (very simplified) */
              uint8_t v = comp->keyboard_code;
              if (comp->keyboard_sticky != 0u) {
                  comp->keyboard_sticky = 0u;
                  /* Keycode acknowledged: clear keyboard IRQ source (bit 6). */
                  comp->pokey_irqst = (uint8_t)(comp->pokey_irqst | 0x40u);
              }
              return v;
          }
          if (addr == 0xD20Fu) {
              /* POKEY SKSTAT */
              return comp->pokey_skstat;
          }
          if (addr == 0xD20Du) {
              /* POKEY SERIN (no external SIO device yet). */
              return 0xFFu;
          }
          if (addr == 0xD20Eu) {
              /* POKEY IRQST (active-low status bits) */
              return comp->pokey_irqst;
          }
          if (addr == 0xD40Bu) {
              /* ANTIC VCOUNT approximation */
              uint64_t frame_period = (CPU_SYSTEM_CLOCK_HZ > 0u) ? (CPU_SYSTEM_CLOCK_HZ / 60u) : 29829u;
              if (frame_period == 0u) frame_period = 29829u;
              uint64_t in_frame = cpu->total_cycles - comp->last_frame_cycle;
              if (in_frame >= frame_period) in_frame = frame_period - 1u;
              uint32_t line = (uint32_t)((in_frame * 262u) / frame_period);
              return (uint8_t)(line & 0xFFu);
          }
          if (addr == 0xD400u) return comp->antic_dmactl;
          if (addr == 0xD401u) return comp->antic_chactl;
          if (addr == 0xD402u) return comp->antic_dlistl;
          if (addr == 0xD403u) return comp->antic_dlisth;
          if (addr == 0xD404u) return comp->antic_hscrol;
          if (addr == 0xD405u) return comp->antic_vscrol;
          if (addr == 0xD406u) return comp->antic_pmbase;
          if (addr == 0xD407u) return comp->antic_chbase;
          if (addr == 0xD40Fu) {
              /* ANTIC NMIST */
              return comp->nmi_status;
          }
          if (addr == 0xD01Fu) {
              /* GTIA CONSOL (OPTION/SELECT/START), active low. */
              uint8_t consol = (uint8_t)cpu_component_call(cpu, "atari_io", "consol_state", NULL, 0);
              return (uint8_t)(consol & 0x07u);
          }
          if (addr == 0xD010u) {
              /* GTIA TRIG0, active low (0=pressed, 1=released). */
              uint8_t trig = (uint8_t)(cpu_component_call(cpu, "atari_io", "trigger0", NULL, 0) & 0x01u);
              return trig;
          }
          if (addr == 0xD011u) {
              /* GTIA TRIG1, active low (0=pressed, 1=released). */
              uint8_t trig = (uint8_t)(cpu_component_call(cpu, "atari_io", "trigger1", NULL, 0) & 0x01u);
              return trig;
          }
          if (addr == 0xD012u) {
              /* GTIA TRIG2, active low (0=pressed, 1=released). */
              uint8_t trig = (uint8_t)(cpu_component_call(cpu, "atari_io", "trigger2", NULL, 0) & 0x01u);
              return trig;
          }
          if (addr == 0xD013u) {
              /* GTIA TRIG3, active low (0=pressed, 1=released). */
              uint8_t trig = (uint8_t)(cpu_component_call(cpu, "atari_io", "trigger3", NULL, 0) & 0x01u);
      #if CPU_CARTRIDGE_COUNT > 0
              /* XL/XE cartridge detect line: present cartridge pulls TRIG3 low. */
              if (cpu->comp_atari_cart0.rom_data != NULL && cpu->comp_atari_cart0.rom_size > 0u) {
                  trig = 0u;
              }
      #endif
              return trig;
          }

          if ((uint64_t)addr < cpu->memory_size) {
              return cpu->memory[addr];
          }
      }
    mem_write_pre: |
      if (addr == 0x02FCu) {
          /* OS CH shadow: keep POKEY keycode in sync until software clears it. */
          comp->keyboard_atascii = value;
          if (value == 0xFFu) {
              comp->keyboard_sticky = 0u;
          }
      }
      if (addr >= 0x5000u && addr < 0x5800u) {
          if ((comp->portb & 0x80u) == 0u) {
              return;
          }
      }
      if (addr >= 0xA000u && addr < 0xC000u) {
      #if CPU_CARTRIDGE_COUNT > 0
          uint8_t cart_present = (uint8_t)((cpu->comp_atari_cart0.rom_data != NULL && cpu->comp_atari_cart0.rom_size > 0u) ? 1u : 0u);
          if (cart_present == 0u)
      #endif
          {
          if (comp->ram_under_basic != NULL) {
              comp->ram_under_basic[(uint16_t)(addr - 0xA000u)] = value;
          }
          return;
          }
      }
      if (addr >= 0xC000u && addr < 0xD000u) {
          if (comp->ram_under_os_low != NULL) {
              comp->ram_under_os_low[(uint16_t)(addr - 0xC000u)] = value;
          }
          return;
      }
      if (addr >= 0xD800u) {
          if (comp->ram_under_os_high != NULL) {
              comp->ram_under_os_high[(uint16_t)(addr - 0xD800u)] = value;
          }
          return;
      }

      if (addr >= 0xD000u && addr < 0xD800u) {
          if ((uint64_t)addr < cpu->memory_size) {
              cpu->memory[addr] = value;
          }

          if (addr == 0xD300u) {
              if ((comp->pia_cra & 0x04u) == 0u) {
                  comp->pia_ddra = value;
              } else {
                  comp->pia_ora = value;
              }
              if (cpu->memory_size > 0xD300u) {
                  cpu->memory[0xD300u] = (uint8_t)((comp->pia_ora & comp->pia_ddra) | (uint8_t)(~comp->pia_ddra));
              }
              return;
          }
          if (addr == 0xD301u) {
              if ((comp->pia_crb & 0x04u) == 0u) {
                  comp->pia_ddrb = value;
              } else {
                  comp->pia_orb = value;
              }
              comp->portb = (uint8_t)((comp->pia_orb & comp->pia_ddrb) | (uint8_t)(~comp->pia_ddrb));
              if (cpu->memory_size > 0xD301u) {
                  cpu->memory[0xD301u] = comp->portb;
              }
              return;
          }
          if (addr == 0xD302u) {
              comp->pia_cra = value;
              if (cpu->memory_size > 0xD302u) cpu->memory[0xD302u] = value;
              return;
          }
          if (addr == 0xD303u) {
              comp->pia_crb = value;
              if (cpu->memory_size > 0xD303u) cpu->memory[0xD303u] = value;
              return;
          }

          if (addr == 0xD200u) {
              comp->pokey_audf1 = value;
              return;
          }
          if (addr == 0xD201u) {
              comp->pokey_audc1 = value;
              /* Simplified audio proxy: use channel volume nibble as level. */
              {
                  uint8_t vol = (uint8_t)(value & 0x0Fu);
                  comp->speaker_level = (uint8_t)(vol << 4);
                  uint64_t sig_args[2] = { (uint64_t)comp->speaker_level, cpu->total_cycles };
                  cpu_component_emit_signal(cpu, "atari_io", "audio_level", sig_args, 2);
              }
              return;
          }
          if (addr == 0xD20Du) {
              /* POKEY SEROUT: load output register; shifting starts shortly after. */
              comp->pokey_serout = value;
              if (comp->pokey_serout_busy == 0u) {
                  comp->pokey_serout_busy = 1u;
                  comp->pokey_serout_need_fired = 0u;
                  comp->pokey_serout_done_latch = 0u;
                  comp->pokey_serout_need_cycle = cpu->total_cycles + 32u;
                  comp->pokey_serout_done_cycle = cpu->total_cycles + 512u;
                  /* Serial output active. */
                  comp->pokey_skstat = (uint8_t)(comp->pokey_skstat | 0x80u);
              }
              return;
          }
          if (addr == 0xD20Eu) {
              /* POKEY IRQEN */
              comp->pokey_irqen = value;
              /* Altirra behavior: disabled IRQ bits go inactive, except bit 3. */
              comp->pokey_irqst = (uint8_t)(comp->pokey_irqst | (uint8_t)(~value & 0xF7u));
              if ((((uint8_t)(~comp->pokey_irqst)) & comp->pokey_irqen) != 0u) {
                  cpu->interrupt_vector = 0x00u;
                  cpu->interrupt_pending = true;
              }
              return;
          }
          if (addr == 0xD20Fu) {
              /* POKEY SKCTL */
              if ((value & 0x03u) == 0u && (comp->pokey_skctl & 0x03u) != 0u) {
                  /* Entering init mode resets serial state and asserts SERDONE. */
                  comp->pokey_serout_busy = 0u;
                  comp->pokey_serout_need_fired = 0u;
                  comp->pokey_serout_done_latch = 1u;
                  comp->pokey_serout_need_cycle = 0u;
                  comp->pokey_serout_done_cycle = 0u;
                  comp->pokey_irqst = (uint8_t)(comp->pokey_irqst & (uint8_t)~0x08u);
              }
              comp->pokey_skctl = value;
              return;
          }
          if (addr == 0xD20Au) {
              /* SKRES: only upper SKSTAT bits are reset. */
              comp->pokey_skstat = (uint8_t)(comp->pokey_skstat | 0xE0u);
              return;
          }
          if (addr == 0xD40Eu) {
              /* NMIEN */
              comp->nmi_enable = value;
              return;
          }
          if (addr == 0xD400u) {
              comp->antic_dmactl = value;
              return;
          }
          if (addr == 0xD401u) {
              comp->antic_chactl = value;
              return;
          }
          if (addr == 0xD402u) {
              comp->antic_dlistl = value;
              return;
          }
          if (addr == 0xD403u) {
              comp->antic_dlisth = value;
              return;
          }
          if (addr == 0xD404u) {
              comp->antic_hscrol = value;
              return;
          }
          if (addr == 0xD405u) {
              comp->antic_vscrol = value;
              return;
          }
          if (addr == 0xD406u) {
              comp->antic_pmbase = value;
              return;
          }
          if (addr == 0xD407u) {
              comp->antic_chbase = (uint8_t)(value & 0xFEu);
              return;
          }
          if (addr == 0xD40Fu) {
              /* NMIRES */
              comp->nmi_status = 0u;
              return;
          }
      }
    step_post: |
      static uint32_t framebuf[320u * 192u];
      {
          /* POKEY serial timing/IRQ, aligned with Altirra register-level behavior. */
          if (
              comp->pokey_serout_busy != 0u &&
              comp->pokey_serout_need_fired == 0u &&
              cpu->total_cycles >= comp->pokey_serout_need_cycle
          ) {
              comp->pokey_serout_need_fired = 1u;
              /* Shift register has consumed SEROUT, so SERDONE clears and SEROUTIRQ may assert. */
              comp->pokey_irqst = (uint8_t)(comp->pokey_irqst | 0x08u);
              if ((comp->pokey_irqen & 0x10u) != 0u) {
                  comp->pokey_irqst = (uint8_t)(comp->pokey_irqst & (uint8_t)~0x10u);
                  cpu->interrupt_vector = 0x00u;
                  cpu->interrupt_pending = true;
              }
          }
          if (comp->pokey_serout_busy != 0u && cpu->total_cycles >= comp->pokey_serout_done_cycle) {
              comp->pokey_serout_busy = 0u;
              comp->pokey_serout_need_fired = 0u;
              /* Transmission complete: clear SKSTAT bit 7 and latch serial completion. */
              comp->pokey_skstat = (uint8_t)(comp->pokey_skstat & 0x7Fu);
              comp->pokey_serout_done_latch = 1u;
              /* Assert serial output complete (bit 3, active-low). */
