metadata:
  id: psg0
  type: audio_generator
  model: ay8910_msx
  version: "1.0"

clock_hz: 1789772

state:
  - name: audio_enabled
    type: uint8_t
    initial: "0"
  - name: selected_reg
    type: uint8_t
    initial: "0"
  - name: reg0
    type: uint8_t
    initial: "0"
  - name: reg1
    type: uint8_t
    initial: "0"
  - name: reg2
    type: uint8_t
    initial: "0"
  - name: reg3
    type: uint8_t
    initial: "0"
  - name: reg4
    type: uint8_t
    initial: "0"
  - name: reg5
    type: uint8_t
    initial: "0"
  - name: reg6
    type: uint8_t
    initial: "0"
  - name: reg7
    type: uint8_t
    initial: "0"
  - name: reg8
    type: uint8_t
    initial: "0"
  - name: reg9
    type: uint8_t
    initial: "0"
  - name: reg10
    type: uint8_t
    initial: "0"
  - name: reg11
    type: uint8_t
    initial: "0"
  - name: reg12
    type: uint8_t
    initial: "0"
  - name: reg13
    type: uint8_t
    initial: "0"
  - name: reg14
    type: uint8_t
    initial: "0xFF"
  - name: reg15
    type: uint8_t
    initial: "0"
  - name: level_a
    type: uint8_t
    initial: "0"
  - name: level_b
    type: uint8_t
    initial: "0"
  - name: level_c
    type: uint8_t
    initial: "0"
  - name: audio_tick_accum
    type: uint64_t
    initial: "0"
  - name: tone_ctr_a
    type: uint16_t
    initial: "1"
  - name: tone_ctr_b
    type: uint16_t
    initial: "1"
  - name: tone_ctr_c
    type: uint16_t
    initial: "1"
  - name: tone_out_a
    type: uint8_t
    initial: "1"
  - name: tone_out_b
    type: uint8_t
    initial: "1"
  - name: tone_out_c
    type: uint8_t
    initial: "1"
  - name: psg_subtick
    type: uint8_t
    initial: "0"
  - name: noise_ctr
    type: uint8_t
    initial: "1"
  - name: noise_lfsr
    type: uint32_t
    initial: "0x1FFFFu"
  - name: noise_out
    type: uint8_t
    initial: "1"
  - name: env_ctr
    type: uint16_t
    initial: "1"
  - name: env_volume
    type: int8_t
    initial: "0"
  - name: env_direction
    type: int8_t
    initial: "1"
  - name: env_attack
    type: uint8_t
    initial: "0"
  - name: env_continue
    type: uint8_t
    initial: "0"
  - name: env_alternate
    type: uint8_t
    initial: "0"
  - name: env_hold
    type: uint8_t
    initial: "0"
  - name: env_holding
    type: uint8_t
    initial: "0"
  - name: last_mix
    type: uint8_t
    initial: "255"
  - name: last_emitted_mix
    type: uint8_t
    initial: "255"
  - name: emit_accum
    type: uint64_t
    initial: "0"
  - name: emit_keepalive
