          for (uint16_t i = 0u; i < 0x2000u; ++i) {
              uint16_t a0 = (uint16_t)(0xA000u + i);
              uint16_t a1 = (uint16_t)(0xE000u + i);
              comp->sam_rom_a000[i] = ((uint64_t)a0 < cpu->memory_size) ? cpu->memory[a0] : 0xFFu;
              comp->sam_rom_e000[i] = ((uint64_t)a1 < cpu->memory_size) ? cpu->memory[a1] : 0xFFu;
          }
          comp->sam_rom_shadow_ready = 1u;
      }
      if (addr >= 0xFF00u && addr <= 0xFF03u) {
          uint8_t reg = (uint8_t)(addr & 0x03u);
          uint64_t cb_args[12] = {
              (uint64_t)(reg & 0xFFu),
              (uint64_t)(comp->pia0_cra & 0xFFu),
              (uint64_t)(comp->pia0_crb & 0xFFu),
