              if ((uint64_t)addr < cpu->memory_size) {
                  return cpu->memory[addr];
              }
              return 0xFFu;
          }
          if (addr >= 0xFF00u && addr < 0xFFE0u) {
              return 0xFFu;
          }
      } else {
          if (addr < 0xA000u) {
              if ((uint64_t)addr < cpu->memory_size) {
                  return cpu->memory[addr];
              }
              return 0xFFu;
          }
          if (addr >= 0xA000u && addr < 0xC000u) {
              if (comp->sam_rom_shadow_ready != 0u && comp->sam_rom_a000 != NULL) {
                  return comp->sam_rom_a000[(uint16_t)(addr - 0xA000u)];
              }
          }
          if (addr >= 0xE000u && (addr < 0xFF00u || addr >= 0xFFE0u)) {
              if (comp->sam_rom_shadow_ready != 0u && comp->sam_rom_e000 != NULL) {
                  return comp->sam_rom_e000[(uint16_t)(addr - 0xE000u)];
              }
          }
      }
    mem_write_pre: |
      if (addr >= 0xFFC0u && addr <= 0xFFDFu) {
          uint8_t bit = (uint8_t)((addr - 0xFFC0u) >> 1);
          uint16_t mask = (uint16_t)(1u << bit);
          if ((addr & 0x0001u) != 0u) {
              comp->sam_ctrl = (uint16_t)(comp->sam_ctrl | mask);
          } else {
              comp->sam_ctrl = (uint16_t)(comp->sam_ctrl & (uint16_t)(~mask));
          }
          comp->sam_vdg_bits = (uint8_t)(comp->sam_ctrl & 0x0007u);
          comp->sam_display_base = (uint16_t)((((comp->sam_ctrl >> 3) & 0x007Fu) << 9) & 0xFE00u);
          comp->sam_page_switch = (uint8_t)((comp->sam_ctrl >> 10) & 0x01u);
          comp->sam_mpu_rate = (uint8_t)((comp->sam_ctrl >> 11) & 0x03u);
          comp->sam_mem_size_mode = (uint8_t)((comp->sam_ctrl >> 13) & 0x03u);
          comp->sam_map_type = (uint8_t)((comp->sam_ctrl >> 15) & 0x01u);
          comp->sam_all_ram = comp->sam_map_type;
          switch (comp->sam_mem_size_mode) {
              case 0u: comp->sam_ram_limit = 0x1000u; break; /* 4K */
              case 1u: comp->sam_ram_limit = 0x4000u; break; /* 16K */
              default: comp->sam_ram_limit = 0x10000u; break; /* 64K */
          }
          return;
      }
      if (comp->sam_map_type != 0u) {
          if ((addr < 0xFF00u) || (addr >= 0xFFE0u)) {
              if ((uint64_t)addr < cpu->memory_size) {
