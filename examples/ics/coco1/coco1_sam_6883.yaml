          uint8_t bit_set = (uint8_t)((comp->sam_ctrl >> bit) & 0x01u);
          return bit_set ? 0xFFu : 0x00u;
      }
      if (
          (comp->sam_rom_shadow_ready == 0u) &&
          comp->sam_rom_a000 != NULL &&
          comp->sam_rom_e000 != NULL
