              uint16_t a0 = (uint16_t)(0xA000u + i);
              uint16_t a1 = (uint16_t)(0xE000u + i);
              if ((uint64_t)a0 < cpu->memory_size) cpu->memory[a0] = comp->sam_rom_a000[i];
              if ((uint64_t)a1 < cpu->memory_size) cpu->memory[a1] = comp->sam_rom_e000[i];
          }
      }
    mem_read_pre: |
