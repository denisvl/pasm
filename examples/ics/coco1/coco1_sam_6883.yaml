                      {
                          uint64_t sig_args[1] = { 2u };
                          cpu_component_emit_signal(cpu, "coco1_sam_6883", "irq_edge", sig_args, 1);
                      }
                  }
              }
          }
      #endif
          {
              {
                  uint64_t cb_args[6] = {
                      (uint64_t)(comp->pia1_ora & 0xFFu),
                      (uint64_t)(comp->pia1_ddra & 0xFFu),
                      (uint64_t)(comp->pia1_orb & 0xFFu),
                      (uint64_t)(comp->pia1_ddrb & 0xFFu),
                      (uint64_t)(comp->audio_level & 0xFFu),
                      (uint64_t)cpu->total_cycles
                  };
                  comp->audio_level = (uint8_t)(cpu_component_call(cpu, "coco1_sam_6883", "pia1_compute_audio", cb_args, 6) & 0xFFu);
              }
          }
          return;
      }
      if (addr >= 0xFF00u) {
          return;
      }
    step_post: |
      uint64_t now = cpu->total_cycles;
      uint64_t frame_tstates = (CPU_SYSTEM_CLOCK_HZ > 0u) ? (CPU_SYSTEM_CLOCK_HZ / 60u) : 14915u;
      uint64_t hsync_tstates = frame_tstates / 262u;
      if (frame_tstates == 0u) frame_tstates = 14915u;
      if (hsync_tstates == 0u) hsync_tstates = 57u;

      /* Keep cartridge FIRQ wiring live independently of frame cadence. */
      #if CPU_CARTRIDGE_COUNT > 0
      {
          uint8_t cart_present = (uint8_t)((cpu->comp_coco_cart0.rom_data != NULL && cpu->comp_coco_cart0.rom_size > 0u) ? 1u : 0u);
          {
              uint64_t cb_args[4] = {
                  (uint64_t)(comp->pia1_crb & 0xFFu),
                  (uint64_t)(comp->pia1_crb_irq1 & 0xFFu),
                  (uint64_t)(cart_present & 0x01u),
                  0u
              };
              uint64_t eval = cpu_component_call(cpu, "coco1_sam_6883", "cart_firq_eval", cb_args, 4);
              comp->pia1_crb_irq1 = (uint8_t)(eval & 0xFFu);
              uint8_t fire = (uint8_t)((eval >> 8u) & 0x01u);
              if (fire != 0u) {
              uint64_t irq_args[1] = { 2u };
              (void)cpu_component_call(cpu, "coco1_sam_6883", "raise_interrupt", irq_args, 1);
              {
                  uint64_t sig_args[1] = { 2u };
                  cpu_component_emit_signal(cpu, "coco1_sam_6883", "irq_edge", sig_args, 1);
              }
              }
          }
      }
      #endif

      if (comp->last_cycle == 0u) {
          comp->last_cycle = now;
      }
      if (now >= comp->last_cycle) {
          uint64_t delta = (now - comp->last_cycle);
          comp->tstate_accum += delta;
          comp->hsync_tstate_accum += delta;
      }
      comp->last_cycle = now;

      /*
       * HSYNC interrupt model:
       * - Each horizontal period latches PIA0-A IRQ flag (CRA bit7, FF01).
       * - If PIA0-A IRQ routing is enabled (CRA bit0), raise CPU IRQ.
       */
      while (comp->hsync_tstate_accum >= hsync_tstates) {
          comp->hsync_tstate_accum -= hsync_tstates;
          uint64_t cb_args[4] = {
              0u,
              (uint64_t)(comp->pia0_ca1_level & 0xFFu),
              (uint64_t)(comp->pia0_cra & 0xFFu),
              (uint64_t)(comp->pia0_cra_irq1 & 0xFFu)
          };
          uint64_t packed = cpu_component_call(cpu, "coco1_sam_6883", "pia0_clock_irq_edge", cb_args, 4);
          comp->pia0_ca1_level = (uint8_t)(packed & 0xFFu);
          comp->pia0_cra_irq1 = (uint8_t)((packed >> 8u) & 0xFFu);
          if (((packed >> 16u) & 0x01u) != 0u) {
              uint64_t irq_args[1] = { 0u };
              (void)cpu_component_call(cpu, "coco1_sam_6883", "raise_interrupt", irq_args, 1);
              {
                  uint64_t sig_args[1] = { 0u };
                  cpu_component_emit_signal(cpu, "coco1_sam_6883", "irq_edge", sig_args, 1);
              }
          }
      }

      if (comp->tstate_accum < frame_tstates) return;
      comp->tstate_accum -= frame_tstates;
      comp->frame_counter += 1u;

      /*
       * VSync interrupt model:
       * - Each video frame latches PIA0-B IRQ flag (CRB bit7, FF03).
       * - If PIA0-B IRQ routing is enabled (CRB bit0), raise CPU IRQ.
       */
      {
          uint64_t cb_args[4] = {
              1u,
              (uint64_t)(comp->pia0_cb1_level & 0xFFu),
              (uint64_t)(comp->pia0_crb & 0xFFu),
              (uint64_t)(comp->pia0_crb_irq1 & 0xFFu)
          };
          uint64_t packed = cpu_component_call(cpu, "coco1_sam_6883", "pia0_clock_irq_edge", cb_args, 4);
          comp->pia0_cb1_level = (uint8_t)(packed & 0xFFu);
          comp->pia0_crb_irq1 = (uint8_t)((packed >> 8u) & 0xFFu);
          if (((packed >> 16u) & 0x01u) != 0u) {
              uint64_t irq_args[1] = { 0u };
              (void)cpu_component_call(cpu, "coco1_sam_6883", "raise_interrupt", irq_args, 1);
              {
                  uint64_t sig_args[1] = { 0u };
                  cpu_component_emit_signal(cpu, "coco1_sam_6883", "irq_edge", sig_args, 1);
              }
          }
      }

      {
          uint64_t sig_args[5] = {
              (uint64_t)comp->frame_counter,
              (uint64_t)now,
              (uint64_t)comp->sam_display_base,
              (uint64_t)(comp->sam_vdg_bits & 0x07u),
              (uint64_t)(comp->pia1_orb & 0xFFu)
          };
          cpu_component_emit_signal(cpu, "coco1_sam_6883", "frame_ready", sig_args, 5);
      }

  callback_handlers:
    raise_interrupt: |
      if (argc < 1u) return 0u;
      uint8_t vector = (uint8_t)(args[0] & 0xFFu);
      mc6809_interrupt(cpu, vector);
      return 1u;
  handler_bodies: {}

