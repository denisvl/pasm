    port_write_pre: "uint8_t p = (uint8_t) (((uint16_t) port) & 0x00C1u);\n\nif (p == 0x40u || p == 0x41u) {\n    uint8_t v = value;\n\n    if ((v & 0x80u) != 0u) {\n        uint8_t ch = (uint8_t) ((v >> 5) & 0x03u);\n        uint8_t is_vol = (uint8_t) ((v >> 4) & 0x01u);\n        uint8_t nib = (uint8_t) (v & 0x0Fu);\n\n        comp->latched_channel = ch;\n        comp->latched_is_volume = is_vol;\n\n        if (is_vol != 0u) {\n            switch (ch) {\n                case 0u:\n                    comp->vol0 = nib;\n                    break;\n\n                case 1u:\n                    comp->vol1 = nib;\n                    break;\n\n                case 2u:\n                    comp->vol2 = nib;\n                    break;\n\n                case 3u:\n                    comp->vol3 = nib;\n                    break;\n\n                default:\n                    break;\n            }\n        } else if (ch < 3u) {\n            if (ch == 0u) {\n                comp->tone0 = (uint16_t) ((comp->tone0 & 0x03F0u) | (uint16_t) nib);\n            } else if (ch == 1u) {\n                comp->tone1 = (uint16_t) ((comp->tone1 & 0x03F0u) | (uint16_t) nib);\n            } else {\n                comp->tone2 = (uint16_t) ((comp->tone2 & 0x03F0u) | (uint16_t) nib);\n            }\n        } else {\n            comp->noise_reg = (uint8_t) (nib & 0x07u);\n            comp->lfsr = 0x8000u;\n            comp->noise_phase = 0u;\n            comp->noise_out = 0u;\n            comp->noise_ctr = 0u;\n        }\n    } else {\n        uint8_t ch = comp->latched_channel;\n\n        if (comp->latched_is_volume != 0u) {\n            uint8_t nib = (uint8_t) (v & 0x0Fu);\n\n            switch (ch) {\n                case 0u:\n                    comp->vol0 = nib;\n                    break;\n\n                case 1u:\n                    comp->vol1 = nib;\n                    break;\n\n                case 2u:\n                    comp->vol2 = nib;\n                    break;\n\n                case 3u:\n                    comp->vol3 = nib;\n                    break;\n\n                default:\n                    break;\n            }\n        } else if (ch < 3u) {\n            uint16_t hi = (uint16_t) (v & 0x3Fu);\n\n            if (ch == 0u) {\n                comp->tone0 = (uint16_t) ((comp->tone0 & 0x000Fu) | (uint16_t) (hi << 4));\n            } else if (ch == 1u) {\n                comp->tone1 = (uint16_t) ((comp->tone1 & 0x000Fu) | (uint16_t) (hi << 4));\n            } else {\n                comp->tone2 = (uint16_t) ((comp->tone2 & 0x000Fu) | (uint16_t) (hi << 4));\n            }\n        } else {\n            comp->noise_reg = (uint8_t) (v & 0x07u);\n            comp->lfsr = 0x8000u;\n            comp->noise_phase = 0u;\n            comp->noise_out = 0u;\n            comp->noise_ctr = 0u;\n        }\n    }\n    return;\n}\n"
    step_post: "if (comp->audio_enabled == 0u) {\n    return;\n}\n\nstatic const int16_t vol_lut[16] = {\n    32767, 26028, 20675, 16422,\n    13045, 10362,  8231,  6568,\n     5193,  4125,  3277,  2603,\n     2067,  1642,  1304,     0\n};\n\ncomp->psg_tick_accum += (uint64_t) inst->cycles;\n\nwhile (comp->psg_tick_accum >= 16u) {\n    comp->psg_tick_accum -= 16u;\n\n    {\n        uint16_t t0 = (uint16_t) (comp->tone0 & 0x03FFu);\n        uint16_t t1 = (uint16_t) (comp->tone1 & 0x03FFu);\n        uint16_t t2 = (uint16_t) (comp->tone2 & 0x03FFu);\n\n        if (t0 <= 1u) {\n            comp->out0 = 1u;\n            comp->ctr0 = 1u;\n        } else {\n            if (comp->ctr0 == 0u) {\n                comp->ctr0 = t0;\n            }\n\n            comp->ctr0 -= 1u;\n\n            if (comp->ctr0 == 0u) {\n                comp->ctr0 = t0;\n                comp->out0 ^= 1u;\n            }\n        }\n\n        if (t1 <= 1u) {\n            comp->out1 = 1u;\n            comp->ctr1 = 1u;\n        } else {\n            if (comp->ctr1 == 0u) {\n                comp->ctr1 = t1;\n            }\n\n            comp->ctr1 -= 1u;\n\n            if (comp->ctr1 == 0u) {\n                comp->ctr1 = t1;\n                comp->out1 ^= 1u;\n            }\n        }\n\n        if (t2 <= 1u) {\n            comp->out2 = 1u;\n            comp->ctr2 = 1u;\n        } else {\n            if (comp->ctr2 == 0u) {\n                comp->ctr2 = t2;\n            }\n\n            comp->ctr2 -= 1u;\n\n            if (comp->ctr2 == 0u) {\n                comp->ctr2 = t2;\n                comp->out2 ^= 1u;\n            }\n        }\n\n        {\n            uint16_t noise_period = 16u;\n\n            switch (comp->noise_reg & 0x03u) {\n                case 0u:\n                    noise_period = 16u;\n                    break;\n\n                case 1u:\n                    noise_period = 32u;\n                    break;\n\n                case 2u:\n                    noise_period = 64u;\n                    break;\n\n                case 3u:\n                    noise_period = (uint16_t) (comp->tone2 & 0x03FFu);\n                    break;\n\n                default:\n                    noise_period = 16u;\n                    break;\n            }\n\n            if (noise_period <= 1u) {\n                noise_period = 1u;\n            }\n\n            if (comp->noise_ctr == 0u) {\n                comp->noise_ctr = noise_period;\n            }\n\n            comp->noise_ctr -= 1u;\n\n            if (comp->noise_ctr == 0u) {\n                comp->noise_ctr = noise_period;\n                comp->noise_phase ^= 1u;\n\n                if (comp->noise_phase != 0u) {\n                    uint16_t feedback;\n\n                    if ((comp->noise_reg & 0x04u) != 0u) {\n                        uint16_t tapped = (uint16_t) (comp->lfsr & 0x0009u);\n\n                        tapped ^= (uint16_t) (tapped >> 8);\n                        tapped ^= (uint16_t) (tapped >> 4);\n                        tapped ^= (uint16_t) (tapped >> 2);\n                        tapped ^= (uint16_t) (tapped >> 1);\n\n                        feedback = (uint16_t) (tapped & 0x0001u);\n                    } else {\n                        feedback = (uint16_t) (comp->lfsr & 0x0001u);\n                    }\n\n                    comp->lfsr = (uint16_t) ((comp->lfsr >> 1) | (uint16_t) (feedback << 15));\n                    comp->noise_out = (uint8_t) (comp->lfsr & 0x0001u);\n                }\n            }\n        }\n    }\n}\n\ncomp->sample_accum += (uint64_t) inst->cycles * (uint64_t) comp->sample_rate;\n\nwhile (comp->sample_accum >= (uint64_t) CPU_SYSTEM_CLOCK_HZ) {\n    int32_t sa;\n    int32_t sb;\n    int32_t sc;\n    int32_t sn;\n    int32_t mix;\n    int32_t centered;\n    int16_t va = vol_lut[comp->vol0 & 0x0Fu];\n    int16_t vb = vol_lut[comp->vol1 & 0x0Fu];\n    int16_t vc = vol_lut[comp->vol2 & 0x0Fu];\n    int16_t vn = vol_lut[comp->vol3 & 0x0Fu];\n\n    comp->sample_accum -= (uint64_t) CPU_SYSTEM_CLOCK_HZ;\n\n    sa = (((comp->tone0 & 0x03FFu) <= 1u) || comp->out0 != 0u) ? va : -va;\n    sb = (((comp->tone1 & 0x03FFu) <= 1u) || comp->out1 != 0u) ? vb : -vb;\n    sc = (((comp->tone2 & 0x03FFu) <= 1u) || comp->out2 != 0u) ? vc : -vc;\n\n    if ((comp->noise_reg & 0x04u) != 0u) {\n        sn = (comp->noise_out != 0u) ? vn : -vn;\n    } else {\n        sn = (comp->noise_out != 0u) ? vn : 0;\n    }\n\n    mix = sa + sb + sc + sn;\n\n    {\n        int32_t pcm = mix / 4;\n        if (pcm < -32768) pcm = -32768;\n        if (pcm > 32767) pcm = 32767;\n        uint64_t pcm_args[2] = {\n            (uint64_t)(uint16_t)(int16_t)pcm,\n            cpu->total_cycles\n        };\n        cpu_component_emit_signal(cpu, \"sg_psg0\", \"pcm_sample_s16\", pcm_args, 2);\n    }\n\n    centered = 128 + (mix / 1024);\n\n    if (centered < 0) {\n        centered = 0;\n    }\n\n    if (centered > 255) {\n        centered = 255;\n    }\n\n    {\n        int32_t filtered = (int32_t) comp->last_mix + ((centered - (int32_t) comp->last_mix) / 5);\n\n        if (filtered < 0) {\n            filtered = 0;\n        }\n\n        if (filtered > 255) {\n            filtered = 255;\n        }\n\n        comp->last_mix = (uint8_t) filtered;\n    }\n\n    {\n        uint64_t sig_args[2] = {\n            (uint64_t) comp->last_mix,\n            cpu->total_cycles\n        };\n\n        cpu_component_emit_signal(cpu, \"sg_psg0\", \"audio_level\", sig_args, 2);\n    }\n}\n"
