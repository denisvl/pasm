metadata:
  id: sg_ram0
  type: memory
  model: sg1000_main_ram_16k
  version: "1.0"

clock_hz: 3579545

state: []

interfaces:
  callbacks:
    - name: ram_read
      args: [u16]
      returns: u8
    - name: ram_write
      args: [u16, u8]
      returns: u8
  handlers: []
  signals: []

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      (void)cpu;
    destroy: |
      (void)cpu;
  callback_handlers:
    ram_read: |
      if (argc < 1u) return 0u;
      uint16_t addr = (uint16_t)(args[0] & 0xFFFFu);
      return (uint8_t)cpu->memory[addr];
    ram_write: |
      if (argc < 2u) return 0u;
      uint16_t addr = (uint16_t)(args[0] & 0xFFFFu);
      uint8_t data = (uint8_t)(args[1] & 0xFFu);
      cpu->memory[addr] = data;
      return 0u;
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
