metadata:
  id: ula0
  type: video_controller
  model: zx_spectrum_48k_ula
  version: "2.0"

clock_hz: 3500000

state:
  - name: tstate_global
    type: uint64_t
    initial: "0"
  - name: tstate_frame
    type: uint64_t
    initial: "0"
  - name: frame_index
    type: uint32_t
    initial: "0"
  - name: irq_active
    type: uint8_t
    initial: "0"
  - name: irq_pulse_remaining
    type: uint64_t
    initial: "0"
  - name: border_color
    type: uint8_t
    initial: "0"
  - name: beeper_level
    type: uint8_t
    initial: "0"
  - name: mic_level
    type: uint8_t
    initial: "0"
  - name: ear_readback_default
    type: uint8_t
    initial: "0x40"
  - name: render_dirty
    type: uint8_t
    initial: "1"
  - name: last_render_tstate
    type: uint64_t
    initial: "0"

interfaces:
  callbacks:
    - name: keyboard_read
      args: [u8]
      returns: u8
    - name: kempston_read
      args: []
      returns: u8
  handlers:
    - name: mic_input
      args: [u8]
  signals:
    - name: frame_boundary
      args: [u32]
    - name: irq_edge
      args: [u8]
    - name: border_changed
      args: [u8, u64]
    - name: beeper_level
      args: [u8]
    - name: tape_out
      args: [u8, u64]

maps:
  ports:
    read:
      - name: fe_read
        mask: 0x0001
        value: 0x0000
    write:
      - name: fe_write
        mask: 0x0001
        value: 0x0000
  memory:
    ranges:
      - name: contended_ram
        start: 0x4000
        size: 0x4000
        access: [read, write]

behavior:
  snippets:
    mem_read_pre: |
      if (addr >= 0x4000u && addr < 0x8000u) {
          uint64_t line = comp->tstate_frame / 224u;
          uint64_t tline = comp->tstate_frame % 224u;
          if (line <= 191u && tline <= 127u) {
              cpu->total_cycles += 1u;
              comp->tstate_global += 1u;
              comp->tstate_frame += 1u;
              if (comp->tstate_frame >= 69888u) {
                  comp->tstate_frame = 0u;
                  comp->frame_index += 1u;
                  uint64_t sig_args[1] = { (uint64_t)comp->frame_index };
                  cpu_component_emit_signal(cpu, "ula0", "frame_boundary", sig_args, 1);
              }
          }
          {
              uint64_t ram_args[1] = { (uint64_t)addr };
              return (uint8_t)cpu_component_dispatch_callback(cpu, "zx48_loram", "ram_read", ram_args, 1);
          }
      } else if (addr >= 0x8000u) {
          uint64_t ram_args[1] = { (uint64_t)addr };
          return (uint8_t)cpu_component_dispatch_callback(cpu, "zx48_hiram", "ram_read", ram_args, 1);
      }
    mem_write_pre: |
      if (addr >= 0x4000u && addr < 0x8000u) {
          if (addr < 0x5B00u) {
              comp->render_dirty = 1u;
          }
          uint64_t line = comp->tstate_frame / 224u;
          uint64_t tline = comp->tstate_frame % 224u;
          if (line <= 191u && tline <= 127u) {
              cpu->total_cycles += 1u;
              comp->tstate_global += 1u;
              comp->tstate_frame += 1u;
              if (comp->tstate_frame >= 69888u) {
                  comp->tstate_frame = 0u;
                  comp->frame_index += 1u;
                  uint64_t sig_args[1] = { (uint64_t)comp->frame_index };
                  cpu_component_emit_signal(cpu, "ula0", "frame_boundary", sig_args, 1);
              }
          }
          {
              uint64_t ram_args[2] = { (uint64_t)addr, (uint64_t)value };
              (void)cpu_component_dispatch_callback(cpu, "zx48_loram", "ram_write", ram_args, 2);
              return;
          }
      } else if (addr >= 0x8000u) {
          uint64_t ram_args[2] = { (uint64_t)addr, (uint64_t)value };
          (void)cpu_component_dispatch_callback(cpu, "zx48_hiram", "ram_write", ram_args, 2);
          return;
      }
    port_read_post: |
      if ((((uint16_t)port) & 0x0001u) == 0u) {
          uint8_t row_mask = (uint8_t)(((uint16_t)port >> 8) & 0xFFu);
          uint8_t ear_bit;
          uint64_t sample_args[2] = { 0x44u, cpu->total_cycles };
          uint8_t sampled_mic = (uint8_t)cpu_component_dispatch_callback(
              cpu, "cassette_transport_nomotor", "sample_input", sample_args, 2
          );
          if (row_mask == 0u) {
              /* Some decoder paths expose ED in hook_opcode with hook_prefix=0x00. */
              if (cpu->hook_prefix == 0xEDu || cpu->hook_opcode == 0xEDu) {
                  row_mask = cpu->registers[REG_B];
              } else {
                  row_mask = cpu->registers[REG_A];
              }
          }
          uint64_t call_args[1] = { (uint64_t)row_mask };
          value = (uint8_t)cpu_component_call(cpu, "ula0", "keyboard_read", call_args, 1);
          comp->mic_level = sampled_mic;
          ear_bit = comp->ear_readback_default;
          if (sampled_mic > 128u) ear_bit ^= 0x40u;
          value = (uint8_t)((value & (uint8_t)~0x40u) | ear_bit);
          {
              static int zx_tape_trace = -1;
              static FILE *zx_tape_trace_fp = NULL;
              static uint8_t prev_mic = 0xFFu;
              static uint8_t prev_ear = 0xFFu;
              static uint32_t trace_count = 0u;
              if (zx_tape_trace < 0) {
                  const char *env = getenv("PASM_ZX_TAPE_TRACE");
                  zx_tape_trace = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
                  if (zx_tape_trace != 0) {
                      const char *path = getenv("PASM_ZX_TAPE_TRACE_FILE");
                      if (path == NULL || path[0] == '\0') path = "/tmp/zx_tape_trace.log";
                      {
                          FILE *reset_fp = fopen(path, "w");
                          if (reset_fp != NULL) fclose(reset_fp);
                      }
                      zx_tape_trace_fp = fopen(path, "a");
                      if (zx_tape_trace_fp == NULL) zx_tape_trace = 0;
                  }
              }
              if (
                  zx_tape_trace != 0 &&
                  zx_tape_trace_fp != NULL &&
                  (trace_count < 2048u || prev_mic != comp->mic_level || prev_ear != ear_bit)
              ) {
                  fprintf(
                      zx_tape_trace_fp,
                      "fe_read cycle=%llu pc=%04X port=%04X row=%02X mic=%u ear=%02X value=%02X a=%02X b=%02X edge_count=%llu playhead=%llu rate=%llu\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)(cpu->pc & 0xFFFFu),
                      (unsigned)((uint16_t)port),
                      (unsigned)row_mask,
                      (unsigned)comp->mic_level,
                      (unsigned)ear_bit,
                      (unsigned)value,
                      (unsigned)cpu->registers[REG_A],
                      (unsigned)cpu->registers[REG_B],
                      (unsigned long long)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_edge_count", NULL, 0),
                      (unsigned long long)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_playhead_samples", NULL, 0),
                      (unsigned long long)cpu_component_dispatch_callback(cpu, "cassette_transport_nomotor", "query_sample_rate", NULL, 0)
                  );
                  fflush(zx_tape_trace_fp);
                  prev_mic = comp->mic_level;
                  prev_ear = ear_bit;
                  trace_count += 1u;
              }
          }
      } else if ((((uint16_t)port) & 0x00FFu) == 0x1Fu) {
          value = (uint8_t)cpu_component_call(cpu, "ula0", "kempston_read", NULL, 0);
      }
    port_write_pre: |
      if ((((uint16_t)port) & 0x0001u) == 0u) {
          uint8_t border = (uint8_t)(value & 0x07u);
          if (comp->border_color != border) {
              comp->border_color = border;
              uint64_t sig_args[2] = { (uint64_t)border, comp->tstate_frame };
              cpu_component_emit_signal(cpu, "ula0", "border_changed", sig_args, 2);
          }
          uint8_t beep = (uint8_t)((value >> 4) & 0x01u);
          if (comp->beeper_level != beep) {
              comp->beeper_level = beep;
              uint64_t sig_args[1] = { (uint64_t)beep };
              cpu_component_emit_signal(cpu, "ula0", "beeper_level", sig_args, 1);
          }
          {
              uint8_t mic = (uint8_t)(((value >> 3u) & 0x01u) != 0u);
              comp->ear_readback_default = (uint8_t)(((value & 0x10u) != 0u) ? 0x40u : 0x00u);
              uint64_t sig_args[2] = { (uint64_t)(mic != 0u ? 255u : 0u), cpu->total_cycles };
              cpu_component_emit_signal(cpu, "ula0", "tape_out", sig_args, 2);
          }
      }
    step_post: |
      for (uint32_t _t = 0; _t < (uint32_t)inst->cycles; _t++) {
          comp->tstate_global += 1u;
          if (comp->tstate_frame == 0u && comp->irq_active == 0u) {
              comp->irq_active = 1u;
              comp->irq_pulse_remaining = 32u;
              cpu->interrupt_pending = true;
              uint64_t sig_args[1] = { 1u };
              cpu_component_emit_signal(cpu, "ula0", "irq_edge", sig_args, 1);
          }
          if (comp->irq_pulse_remaining > 0u) {
              comp->irq_pulse_remaining -= 1u;
              if (comp->irq_pulse_remaining == 0u && comp->irq_active != 0u) {
                  comp->irq_active = 0u;
                  uint64_t sig_args[1] = { 0u };
                  cpu_component_emit_signal(cpu, "ula0", "irq_edge", sig_args, 1);
              }
          }
          comp->tstate_frame += 1u;
          if (comp->tstate_frame >= 69888u) {
              comp->tstate_frame = 0u;
              comp->frame_index += 1u;
              uint64_t sig_args[1] = { (uint64_t)comp->frame_index };
              cpu_component_emit_signal(cpu, "ula0", "frame_boundary", sig_args, 1);
              comp->render_dirty = 0u;
              comp->last_render_tstate = comp->tstate_global;
          }
      }
  callback_handlers: {}
  handler_bodies:
    mic_input: |
      comp->mic_level = (uint8_t)(args[0] & 0xFFu);

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
