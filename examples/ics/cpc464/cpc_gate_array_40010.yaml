metadata:
  id: cpc_gate_array
  type: io_controller
  model: amstrad_cpc_gate_array_40010
  version: "1.0"

clock_hz: 4000000

state:
  - name: frame_counter
    type: uint32_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: tstate_accum
    type: uint64_t
    initial: "0"
  - name: irq_accum
    type: uint64_t
    initial: "0"
  - name: ga_hsync_accum
    type: uint64_t
    initial: "0"
  - name: ga_hsync_count
    type: uint8_t
    initial: "0"
  - name: ga_irq_window
    type: uint8_t
    initial: "0"
  - name: ga_irq_pending
    type: uint8_t
    initial: "0"
  - name: ga_irq_issued
    type: uint8_t
    initial: "0"
  - name: lower_rom
    type: uint8_t *
    initial: "NULL"
  - name: upper_rom
    type: uint8_t *
    initial: "NULL"
  - name: lower_rom_enabled
    type: uint8_t
    initial: "1"
  - name: upper_rom_enabled
    type: uint8_t
    initial: "1"
  - name: ga_pen_select
    type: uint8_t
    initial: "0"
  - name: ga_mode
    type: uint8_t
    initial: "1"
  - name: ga_inks
    type: uint8_t *
    initial: "NULL"
  - name: display_active
    type: uint8_t
    initial: "0"
  - name: audio_emit_accum
    type: uint64_t
    initial: "0"
  - name: audio_ay_tick_residual
    type: uint64_t
    initial: "0"

interfaces:
  callbacks:
    - name: crtc_read_reg
      args: [u8]
      returns: u8
    - name: ppi_write_io_page
      args: [u16, u8]
      returns: u8
    - name: ppi_read_port_c_raw
      args: []
      returns: u8
    - name: ppi_read_io_page
      args: [u16, u8, u8]
      returns: u8
    - name: psg_tick_audio
      args: [u32]
      returns: u8
  handlers: []
  signals:
    - name: frame_ready
      args: [u32, u64, u32, u32]
    - name: audio_level
      args: [u8, u64]
    - name: irq_edge
      args: [u8]

maps:
  memory:
    ranges:
      - name: cpc_mem
        start: 0x0000
        size: 0x10000
        access: [read, write]
  ports:
    read:
      - name: ppi_port_a_read
        mask: 0xFF00
        value: 0xF400
      - name: ppi_port_b_read
        mask: 0xFF00
        value: 0xF500
      - name: ppi_port_c_read
        mask: 0xFF00
        value: 0xF600
      - name: ppi_ctrl_read
        mask: 0xFF00
        value: 0xF700
    write:
      - name: gate_array_write
        mask: 0xC000
        value: 0x4000
      - name: ppi_port_a_write
        mask: 0xFF00
        value: 0xF400
      - name: ppi_port_b_write
        mask: 0xFF00
        value: 0xF500
      - name: ppi_port_c_write
        mask: 0xFF00
        value: 0xF600
      - name: ppi_ctrl_write
        mask: 0xFF00
        value: 0xF700

behavior:
  snippets:
    init: |
      if (comp->lower_rom == NULL) {
          comp->lower_rom = (uint8_t *)calloc(0x4000u, sizeof(uint8_t));
      }
      if (comp->upper_rom == NULL) {
          comp->upper_rom = (uint8_t *)calloc(0x4000u, sizeof(uint8_t));
      }
      if (comp->ga_inks == NULL) {
          comp->ga_inks = (uint8_t *)calloc(17u, sizeof(uint8_t));
      }
      /* ROM contents are expected to be provided by system ROM loading
         (CLI/runtime), not by direct file I/O from this component. */
    reset: |
      comp->frame_counter = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->tstate_accum = 0u;
      comp->irq_accum = 0u;
      comp->ga_hsync_accum = 0u;
      comp->ga_hsync_count = 0u;
      comp->ga_irq_pending = 0u;
      comp->ga_irq_issued = 0u;
      comp->ga_irq_window = 0u;
      comp->lower_rom_enabled = 1u;
      comp->upper_rom_enabled = 1u;
      comp->ga_pen_select = 0u;
      comp->ga_mode = 1u;
      if (comp->ga_inks != NULL) {
          for (uint32_t i = 0u; i < 17u; ++i) comp->ga_inks[i] = 0u;
          comp->ga_inks[0] = 0u;
          comp->ga_inks[1] = 24u;
          comp->ga_inks[2] = 11u;
          comp->ga_inks[3] = 6u;
          comp->ga_inks[16] = 0u;
      }
      comp->display_active = 0u;
      comp->audio_emit_accum = 0u;
      comp->audio_ay_tick_residual = 0u;
      /* Mirror loaded system ROM bytes into fixed CPC ROM banks.
         System ROM loader places bytes in cpu->memory before reset. */
      uint8_t *ram = cpu->comp_cpc464_ram.bytes;
      if (ram == NULL) return;
      if (comp->lower_rom != NULL && cpu->memory_size >= 0x4000u) {
          memcpy(comp->lower_rom, &ram[0x0000u], 0x4000u);
      }
      if (comp->upper_rom != NULL && cpu->memory_size >= 0x10000u) {
          memcpy(comp->upper_rom, &ram[0xC000u], 0x4000u);
      }
      /* Keep RAM-under-ROM separate from ROM image storage.
         Video fetches from cpu->memory and must see writable RAM, not ROM bytes. */
      if (cpu->memory_size >= 0x4000u) {
          memset(&ram[0x0000u], 0, 0x4000u);
      }
      if (cpu->memory_size >= 0x10000u) {
          memset(&ram[0xC000u], 0, 0x4000u);
      }
    destroy: |
      if (comp->lower_rom != NULL) {
          free(comp->lower_rom);
          comp->lower_rom = NULL;
      }
      if (comp->upper_rom != NULL) {
          free(comp->upper_rom);
          comp->upper_rom = NULL;
      }
      if (comp->ga_inks != NULL) {
          free(comp->ga_inks);
          comp->ga_inks = NULL;
      }
    mem_read_pre: |
      if (comp->lower_rom_enabled != 0u && addr < 0x4000u && comp->lower_rom != NULL) {
          return comp->lower_rom[addr & 0x3FFFu];
      }
      if (comp->upper_rom_enabled != 0u && addr >= 0xC000u && comp->upper_rom != NULL) {
          return comp->upper_rom[(uint16_t)(addr - 0xC000u) & 0x3FFFu];
      }
      if (comp->display_active != 0u) {
          uint64_t slot = cpu->total_cycles & 0x03u;
          if (slot != 0u) {
              uint64_t wait = 4u - slot;
              cpu->total_cycles += wait;
              comp->tstate_accum += wait;
              comp->ga_hsync_accum += wait;
          }
      }
      uint8_t *ram = cpu->comp_cpc464_ram.bytes;
      if (ram == NULL) return 0xFFu;
      return ((uint64_t)addr < cpu->memory_size) ? ram[addr] : 0xFFu;
    mem_write_pre: |
      if (comp->display_active != 0u) {
          uint64_t slot = cpu->total_cycles & 0x03u;
          if (slot != 0u) {
              uint64_t wait = 4u - slot;
              cpu->total_cycles += wait;
              comp->tstate_accum += wait;
              comp->ga_hsync_accum += wait;
          }
      }
      uint8_t *ram = cpu->comp_cpc464_ram.bytes;
      if (ram == NULL) return;
      if ((uint64_t)addr < cpu->memory_size) {
          ram[addr] = value;
      }
    port_read_post: |
      uint16_t ph = (uint16_t)(port & 0xFF00u);
      if (ph == 0xF400u) {
          uint8_t port_c_raw = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "ppi_read_port_c_raw", NULL, 0);
          uint64_t io_args[3] = {
              (uint64_t)ph,
              (uint64_t)(cpu->comp_cpc_crtc.vsync & 0x01u),
              (uint64_t)port_c_raw
          };
          value = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "ppi_read_io_page", io_args, 3);
      } else if (ph == 0xF500u) {
          uint64_t io_args[3] = {
              (uint64_t)ph,
              (uint64_t)(cpu->comp_cpc_crtc.vsync & 0x01u),
              0u
          };
          value = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "ppi_read_io_page", io_args, 3);
      } else if (ph == 0xF600u) {
          uint64_t io_args[3] = {
              (uint64_t)ph,
              (uint64_t)(cpu->comp_cpc_crtc.vsync & 0x01u),
              0u
          };
          value = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "ppi_read_io_page", io_args, 3);
      } else if (ph == 0xF700u) {
          uint64_t io_args[3] = {
              (uint64_t)ph,
              (uint64_t)(cpu->comp_cpc_crtc.vsync & 0x01u),
              0u
          };
          value = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "ppi_read_io_page", io_args, 3);
      }
    port_write_pre: |
      uint16_t ph = (uint16_t)(port & 0xFF00u);
      static int ay_trace_on = 0;
      static uint32_t ay_trace_count = 0u;
      static FILE *ay_trace_fp = NULL;
      static int ppi_trace_on = 0;
      static uint32_t ppi_trace_count = 0u;
      static FILE *ppi_trace_fp = NULL;

      if ((port & 0xC000u) == 0x4000u) {
          uint8_t cmd = (uint8_t)(value & 0xC0u);
          if (cmd == 0x00u) {
              uint8_t pen = (uint8_t)(value & 0x1Fu);
              comp->ga_pen_select = (pen <= 16u) ? pen : 16u;
          } else if (cmd == 0x40u) {
              if (comp->ga_inks != NULL) {
                  comp->ga_inks[comp->ga_pen_select] = (uint8_t)(value & 0x1Fu);
              }
          } else if (cmd == 0x80u) {
              comp->ga_mode = (uint8_t)(value & 0x03u);
              comp->lower_rom_enabled = ((value & 0x04u) == 0u) ? 1u : 0u;
              comp->upper_rom_enabled = ((value & 0x08u) == 0u) ? 1u : 0u;
              if ((value & 0x10u) != 0u) {
                  comp->ga_hsync_count = 0u;
                  comp->ga_irq_pending = 0u;
                  comp->ga_irq_issued = 0u;
              }
          }
          return;
      }

      if (ph == 0xF400u) {
          uint64_t io_args[2] = { (uint64_t)ph, (uint64_t)value };
          (void)cpu_component_call(cpu, "cpc_gate_array", "ppi_write_io_page", io_args, 2);
          if (ppi_trace_on != 0 && ppi_trace_count < 5000u) {
              fprintf(
                  ppi_trace_fp,
                  "%llu,%04X,%04X,%02X\n",
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)cpu->pc,
                  (unsigned)port,
                  (unsigned)value
              );
              ppi_trace_count += 1u;
              if ((ppi_trace_count & 63u) == 0u) fflush(ppi_trace_fp);
          }
          return;
      }
      if (ph == 0xF500u) {
          uint64_t io_args[2] = { (uint64_t)ph, (uint64_t)value };
          (void)cpu_component_call(cpu, "cpc_gate_array", "ppi_write_io_page", io_args, 2);
          if (ppi_trace_on != 0 && ppi_trace_count < 5000u) {
              fprintf(
                  ppi_trace_fp,
                  "%llu,%04X,%04X,%02X\n",
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)cpu->pc,
                  (unsigned)port,
                  (unsigned)value
              );
              ppi_trace_count += 1u;
              if ((ppi_trace_count & 63u) == 0u) fflush(ppi_trace_fp);
          }
          return;
      }
      if (ph == 0xF700u) {
          uint64_t io_args[2] = { (uint64_t)ph, (uint64_t)value };
          (void)cpu_component_call(cpu, "cpc_gate_array", "ppi_write_io_page", io_args, 2);
          if (ppi_trace_on != 0 && ppi_trace_count < 5000u) {
              fprintf(
                  ppi_trace_fp,
                  "%llu,%04X,%04X,%02X\n",
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)cpu->pc,
                  (unsigned)port,
                  (unsigned)value
              );
              ppi_trace_count += 1u;
              if ((ppi_trace_count & 63u) == 0u) fflush(ppi_trace_fp);
          }
          return;
      }
      if (ph == 0xF600u) {
          uint64_t io_args[2] = { (uint64_t)ph, (uint64_t)value };
          (void)cpu_component_call(cpu, "cpc_gate_array", "ppi_write_io_page", io_args, 2);
          if (ppi_trace_on != 0 && ppi_trace_count < 5000u) {
              fprintf(
                  ppi_trace_fp,
                  "%llu,%04X,%04X,%02X\n",
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)cpu->pc,
                  (unsigned)port,
                  (unsigned)value
              );
              ppi_trace_count += 1u;
              if ((ppi_trace_count & 63u) == 0u) fflush(ppi_trace_fp);
          }
          return;
      }
    step_post: |
      static uint32_t framebuf[640u * 200u];
      static const uint32_t cpc_hw_palette[32] = {
          0xFF808080u, 0xFF808080u, 0xFF00FF80u, 0xFFFFFF80u,
          0xFF000080u, 0xFFFF0080u, 0xFF008080u, 0xFFFF8080u,
          0xFFFF0080u, 0xFFFFFF80u, 0xFFFFFF00u, 0xFFFFFFFFu,
          0xFFFF0000u, 0xFFFF00FFu, 0xFFFF8000u, 0xFFFF80FFu,
          0xFF000080u, 0xFF00FF80u, 0xFF00FF00u, 0xFF00FFFFu,
          0xFF000000u, 0xFF0000FFu, 0xFF008000u, 0xFF0080FFu,
          0xFF800080u, 0xFF80FF80u, 0xFF80FF00u, 0xFF80FFFFu,
          0xFF800000u, 0xFF8000FFu, 0xFF808000u, 0xFF8080FFu
      };
      static int irq_trace_on = 0;
      static uint32_t irq_trace_count = 0u;
      static FILE *irq_trace_fp = NULL;

      uint64_t now = cpu->total_cycles;
      uint64_t delta = 0u;
      if (comp->last_cycle == 0u) {
          comp->last_cycle = now;
      }
      if (now >= comp->last_cycle) {
          delta = now - comp->last_cycle;
          comp->tstate_accum += delta;
          comp->irq_accum += delta;
          comp->ga_hsync_accum += delta;
      }
      comp->last_cycle = now;

      {
          uint64_t cycles = delta;
          uint8_t htotal = 63u;
          uint8_t hdisp = 40u;
          uint8_t hsync_pos = 46u;
          uint8_t hsync_w = 8u;
          uint8_t vtotal = 38u;
          uint8_t vadjust = 0u;
          uint8_t vdisp = 25u;
          uint8_t vsync_pos = 30u;
          uint8_t vsync_w = 2u;
          uint8_t raster_max = 7u;
          uint8_t skew = 0u;
          {
              uint64_t cb0[1] = { 0u };
              uint64_t cb1[1] = { 1u };
              uint64_t cb2[1] = { 2u };
              uint64_t cb3[1] = { 3u };
              uint64_t cb4[1] = { 4u };
              uint64_t cb5[1] = { 5u };
              uint64_t cb6[1] = { 6u };
              uint64_t cb7[1] = { 7u };
              uint64_t cb8[1] = { 8u };
              uint64_t cb9[1] = { 9u };
              htotal = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb0, 1);
              hdisp = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb1, 1);
              hsync_pos = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb2, 1);
              {
                  uint8_t r3 = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb3, 1);
                  hsync_w = (uint8_t)(r3 & 0x0Fu);
                  vsync_w = (uint8_t)((r3 >> 4u) & 0x0Fu);
              }
              vtotal = (uint8_t)(cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb4, 1) & 0x7Fu);
              vadjust = (uint8_t)(cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb5, 1) & 0x1Fu);
              vdisp = (uint8_t)(cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb6, 1) & 0x7Fu);
              vsync_pos = (uint8_t)(cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb7, 1) & 0x7Fu);
              raster_max = (uint8_t)(cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb9, 1) & 0x1Fu);
              skew = (uint8_t)((cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb8, 1) >> 4u) & 0x03u);
          }
          if (hsync_w == 0u) hsync_w = 16u;
          if (vsync_w == 0u) vsync_w = 16u;
          if (htotal == 0u) htotal = 1u;
          while (cycles > 0u) {
              uint8_t step = (cycles >= 4u) ? 4u : (uint8_t)cycles;
              cpu->comp_cpc_crtc.char_accum = (uint8_t)(cpu->comp_cpc_crtc.char_accum + step);
              cycles -= step;
              if (cpu->comp_cpc_crtc.char_accum < 4u) continue;
              cpu->comp_cpc_crtc.char_accum = (uint8_t)(cpu->comp_cpc_crtc.char_accum - 4u);

              /* Horizontal character tick. */
              cpu->comp_cpc_crtc.hc = (uint8_t)(cpu->comp_cpc_crtc.hc + 1u);
              if (cpu->comp_cpc_crtc.hc == hsync_pos) {
                  cpu->comp_cpc_crtc.hsync = 1u;
                  comp->ga_hsync_count = (uint8_t)(comp->ga_hsync_count + 1u);
                  if (comp->ga_hsync_count >= 52u) {
                      comp->ga_hsync_count = 0u;
                      comp->ga_irq_pending = 1u;
                      comp->ga_irq_issued = 0u;
                      comp->ga_irq_window = 1u;
                      if (irq_trace_on != 0 && irq_trace_count < 2000u) {
                          fprintf(
                              irq_trace_fp,
                              "%llu,%04X,%u,%u,%u,%u,%u,%u,%u,%u\n",
                              (unsigned long long)cpu->total_cycles,
                              (unsigned)cpu->pc,
                              (unsigned)cpu->interrupts_enabled,
                              (unsigned)cpu->interrupt_mode,
                              (unsigned)comp->ga_hsync_count,
                              (unsigned)comp->ga_irq_pending,
                              (unsigned)comp->ga_irq_issued,
                              (unsigned)comp->ga_irq_window,
                              (unsigned)cpu->comp_cpc_crtc.hsync,
                              (unsigned)cpu->comp_cpc_crtc.vsync
                          );
                          irq_trace_count += 1u;
                          if ((irq_trace_count & 63u) == 0u) fflush(irq_trace_fp);
                      }
                  }
              }
              if (cpu->comp_cpc_crtc.hsync != 0u) {
                  if ((uint8_t)(cpu->comp_cpc_crtc.hc - hsync_pos) >= hsync_w) cpu->comp_cpc_crtc.hsync = 0u;
              }

              if (cpu->comp_cpc_crtc.hc > htotal) {
                  cpu->comp_cpc_crtc.hc = 0u;
                  if (hsync_pos == 0u || hsync_pos > htotal) {
                      cpu->comp_cpc_crtc.hsync = 1u;
                      comp->ga_hsync_count = (uint8_t)(comp->ga_hsync_count + 1u);
                      if (comp->ga_hsync_count >= 52u) {
                          comp->ga_hsync_count = 0u;
                          comp->ga_irq_pending = 1u;
                          comp->ga_irq_issued = 0u;
                          comp->ga_irq_window = 1u;
                          if (irq_trace_on != 0 && irq_trace_count < 2000u) {
                              fprintf(
                                  irq_trace_fp,
                                  "%llu,%04X,%u,%u,%u,%u,%u,%u,%u,%u\n",
                                  (unsigned long long)cpu->total_cycles,
                                  (unsigned)cpu->pc,
                                  (unsigned)cpu->interrupts_enabled,
                                  (unsigned)cpu->interrupt_mode,
                                  (unsigned)comp->ga_hsync_count,
                                  (unsigned)comp->ga_irq_pending,
                                  (unsigned)comp->ga_irq_issued,
                                  (unsigned)comp->ga_irq_window,
                                  (unsigned)cpu->comp_cpc_crtc.hsync,
                                  (unsigned)cpu->comp_cpc_crtc.vsync
                              );
                              irq_trace_count += 1u;
                              if ((irq_trace_count & 63u) == 0u) fflush(irq_trace_fp);
                          }
                      }
                  }
                  /* End of scanline. */
                  if (cpu->comp_cpc_crtc.ra >= raster_max) {
                      cpu->comp_cpc_crtc.ra = 0u;
                      if (cpu->comp_cpc_crtc.vadj != 0u) {
                          cpu->comp_cpc_crtc.vadj = (uint8_t)(cpu->comp_cpc_crtc.vadj - 1u);
                          if (cpu->comp_cpc_crtc.vadj == 0u) {
                              cpu->comp_cpc_crtc.vc = 0u;
                              {
                                  uint64_t cb12[1] = { 12u };
                                  uint64_t cb13[1] = { 13u };
                                  cpu->comp_cpc_crtc.ma = (uint16_t)(((uint16_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb12, 1) << 8u)
                                      | (uint16_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb13, 1));
                              }
                          }
                      } else {
                          cpu->comp_cpc_crtc.vc = (uint8_t)(cpu->comp_cpc_crtc.vc + 1u);
                          cpu->comp_cpc_crtc.ma = (uint16_t)(cpu->comp_cpc_crtc.ma + hdisp);
                          if (cpu->comp_cpc_crtc.vc > vtotal) {
                              cpu->comp_cpc_crtc.vc = 0u;
                              if (vadjust != 0u) {
                                  cpu->comp_cpc_crtc.vadj = vadjust;
                              } else {
                                  uint64_t cb12[1] = { 12u };
                                  uint64_t cb13[1] = { 13u };
                                  cpu->comp_cpc_crtc.ma = (uint16_t)(((uint16_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb12, 1) << 8u)
                                      | (uint16_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb13, 1));
                              }
                          }
                      }
                  } else {
                      cpu->comp_cpc_crtc.ra = (uint8_t)(cpu->comp_cpc_crtc.ra + 1u);
                  }

                  /* VSYNC update at line start. */
                  if (cpu->comp_cpc_crtc.vc == vsync_pos && cpu->comp_cpc_crtc.ra == 0u) {
                      cpu->comp_cpc_crtc.vsync = 1u;
                  }
                  if (cpu->comp_cpc_crtc.vsync != 0u) {
                      if (cpu->comp_cpc_crtc.vc == vsync_pos && cpu->comp_cpc_crtc.ra >= vsync_w) {
                          cpu->comp_cpc_crtc.vsync = 0u;
                      }
                  }
              }
          }

          {
              uint8_t hstart = skew;
              uint8_t hend = (uint8_t)(hstart + hdisp);
              {
                  uint64_t cb8v[1] = { 8u };
                  uint8_t r8v = (uint8_t)cpu_component_call(cpu, "cpc_gate_array", "crtc_read_reg", cb8v, 1);
                  uint8_t vstart = (uint8_t)(r8v & 0x03u);
                  uint8_t vstop = (uint8_t)(vstart + vdisp);
                  uint8_t h_ok = (cpu->comp_cpc_crtc.hc >= hstart && cpu->comp_cpc_crtc.hc < hend) ? 1u : 0u;
