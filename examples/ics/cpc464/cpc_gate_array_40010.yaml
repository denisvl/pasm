                                      framebuf[y * fb_w + x + 1u] = pens[p0 & 0x0Fu];
                                      framebuf[y * fb_w + x + 2u] = pens[p1 & 0x0Fu];
                                      framebuf[y * fb_w + x + 3u] = pens[p1 & 0x0Fu];
