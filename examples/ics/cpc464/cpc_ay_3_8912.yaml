metadata:
  id: cpc_psg
  type: sound_generator
  model: ay_3_8912
  version: "1.0"

state:
  - name: regs
    type: uint8_t *
    initial: "NULL"
  - name: reg_index
    type: uint8_t
    initial: "0"
  - name: ctrl_last
    type: uint8_t
    initial: "0"
  - name: level
    type: uint8_t
    initial: "128"
  - name: last_mix
    type: uint8_t
    initial: "128"
  - name: phase_a
    type: uint32_t
