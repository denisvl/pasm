metadata:
  id: cpc_io
  type: io_controller
  model: amstrad_cpc464_io
  version: "1.0"

clock_hz: 4000000

state:
  - name: frame_counter
    type: uint32_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: tstate_accum
    type: uint64_t
    initial: "0"
  - name: irq_accum
    type: uint64_t
    initial: "0"
  - name: ga_hsync_accum
    type: uint64_t
    initial: "0"
  - name: ga_hsync_count
    type: uint8_t
    initial: "0"
  - name: ga_irq_window
    type: uint8_t
    initial: "0"
  - name: ga_irq_pending
    type: uint8_t
    initial: "0"
  - name: ga_irq_issued
    type: uint8_t
    initial: "0"
  - name: audio_emit_accum
    type: uint64_t
    initial: "0"
  - name: lower_rom
    type: uint8_t *
    initial: "NULL"
  - name: upper_rom
    type: uint8_t *
    initial: "NULL"
  - name: lower_rom_enabled
    type: uint8_t
    initial: "1"
  - name: upper_rom_enabled
    type: uint8_t
    initial: "1"
  - name: ga_pen_select
    type: uint8_t
    initial: "0"
  - name: ga_mode
    type: uint8_t
    initial: "1"
  - name: ga_inks
    type: uint8_t *
    initial: "NULL"
  - name: crtc_index
    type: uint8_t
    initial: "0"
  - name: crtc_regs
    type: uint8_t *
    initial: "NULL"
  - name: ppi_port_a
    type: uint8_t
    initial: "0xFF"
  - name: ppi_port_b
    type: uint8_t
    initial: "0xFF"
  - name: ppi_port_c
    type: uint8_t
    initial: "0"
  - name: ppi_ctrl
    type: uint8_t
    initial: "0x82"
  - name: tape_level
    type: uint8_t
    initial: "0x80"
  - name: printer_ready
    type: uint8_t
    initial: "1"
  - name: jumpers
    type: uint8_t
    initial: "0x7F"
  - name: ay_regs
    type: uint8_t *
    initial: "NULL"
  - name: ay_reg_index
    type: uint8_t
    initial: "0"
  - name: ay_ctrl_last
    type: uint8_t
    initial: "0"
  - name: ay_level
    type: uint8_t
    initial: "128"
  - name: ay_last_mix
    type: uint8_t
    initial: "128"
  - name: ay_phase_a
    type: uint32_t
    initial: "0"
  - name: ay_phase_b
    type: uint32_t
    initial: "0"
  - name: ay_phase_c
    type: uint32_t
    initial: "0"
  - name: ay_phase_noise
    type: uint32_t
    initial: "0"
  - name: ay_tone_a
    type: uint8_t
    initial: "1"
  - name: ay_tone_b
    type: uint8_t
    initial: "1"
  - name: ay_tone_c
    type: uint8_t
    initial: "1"
  - name: ay_noise_bit
    type: uint8_t
    initial: "1"
  - name: ay_noise_lfsr
    type: uint32_t
    initial: "0x1FFFF"
  - name: ay_env_phase
    type: uint32_t
    initial: "0"
  - name: ay_env_value
    type: uint8_t
    initial: "0"
  - name: ay_env_dir
    type: int8_t
    initial: "-1"
  - name: ay_env_hold
    type: uint8_t
    initial: "0"
  - name: crtc_ma
    type: uint16_t
    initial: "0"
  - name: crtc_ra
    type: uint8_t
    initial: "0"
  - name: crtc_hc
    type: uint8_t
    initial: "0"
  - name: crtc_vc
    type: uint8_t
    initial: "0"
  - name: crtc_vadj
    type: uint8_t
    initial: "0"
  - name: crtc_hsync
    type: uint8_t
    initial: "0"
  - name: crtc_vsync
    type: uint8_t
    initial: "0"
  - name: crtc_display
    type: uint8_t
    initial: "0"
  - name: display_active
    type: uint8_t
    initial: "0"
  - name: crtc_char_accum
    type: uint8_t
    initial: "0"

interfaces:
  callbacks:
    - name: keyboard_read_row
      args: [u8]
      returns: u8
  handlers: []
  signals:
    - name: frame_ready
      args: [u32, u64, u32, u32]
    - name: audio_level
      args: [u8, u64]
    - name: irq_edge
      args: [u8]

maps:
  memory:
    ranges:
      - name: cpc_mem
        start: 0x0000
        size: 0x10000
        access: [read, write]
  ports:
    read:
      - name: ppi_port_a_read
        mask: 0xFF00
        value: 0xF400
      - name: ppi_port_b_read
        mask: 0xFF00
        value: 0xF500
      - name: ppi_port_c_read
        mask: 0xFF00
        value: 0xF600
      - name: ppi_ctrl_read
        mask: 0xFF00
        value: 0xF700
    write:
      - name: gate_array_write
        mask: 0xC000
        value: 0x4000
      - name: crtc_index_write
        mask: 0xFF00
        value: 0xBC00
      - name: crtc_data_write
        mask: 0xFF00
        value: 0xBD00
      - name: ppi_port_a_write
        mask: 0xFF00
        value: 0xF400
      - name: ppi_port_b_write
        mask: 0xFF00
        value: 0xF500
      - name: ppi_port_c_write
        mask: 0xFF00
        value: 0xF600
      - name: ppi_ctrl_write
        mask: 0xFF00
        value: 0xF700

behavior:
  snippets:
    init: |
      if (comp->lower_rom == NULL) {
          comp->lower_rom = (uint8_t *)calloc(0x4000u, sizeof(uint8_t));
      }
      if (comp->upper_rom == NULL) {
          comp->upper_rom = (uint8_t *)calloc(0x4000u, sizeof(uint8_t));
      }
      if (comp->ga_inks == NULL) {
          comp->ga_inks = (uint8_t *)calloc(17u, sizeof(uint8_t));
      }
      if (comp->crtc_regs == NULL) {
          comp->crtc_regs = (uint8_t *)calloc(32u, sizeof(uint8_t));
      }
      if (comp->ay_regs == NULL) {
          comp->ay_regs = (uint8_t *)calloc(16u, sizeof(uint8_t));
      }

      if (comp->lower_rom != NULL) {
          FILE *f = fopen("examples/roms/OS_464.ROM", "rb");
          if (f != NULL) {
              (void)fread(comp->lower_rom, 1u, 0x4000u, f);
              fclose(f);
          }
      }
      if (comp->upper_rom != NULL) {
          FILE *f = fopen("examples/roms/BASIC_1.0.ROM", "rb");
          if (f != NULL) {
              (void)fread(comp->upper_rom, 1u, 0x4000u, f);
              fclose(f);
          }
      }
    reset: |
      comp->frame_counter = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->tstate_accum = 0u;
      comp->irq_accum = 0u;
      comp->ga_hsync_accum = 0u;
      comp->ga_hsync_count = 0u;
      comp->ga_irq_pending = 0u;
      comp->ga_irq_issued = 0u;
      comp->ga_irq_window = 0u;
      comp->audio_emit_accum = 0u;
      comp->lower_rom_enabled = 1u;
      comp->upper_rom_enabled = 1u;
      comp->ga_pen_select = 0u;
      comp->ga_mode = 1u;
      if (comp->ga_inks != NULL) {
          for (uint32_t i = 0u; i < 17u; ++i) comp->ga_inks[i] = 0u;
          comp->ga_inks[0] = 0u;
          comp->ga_inks[1] = 24u;
          comp->ga_inks[2] = 11u;
          comp->ga_inks[3] = 6u;
          comp->ga_inks[16] = 0u;
      }
      comp->crtc_index = 0u;
      if (comp->crtc_regs != NULL) {
          memset(comp->crtc_regs, 0, 32u);
          /* CPC 6845 power-on defaults used by firmware assumptions. */
          comp->crtc_regs[0] = 63u;
          comp->crtc_regs[1] = 40u;
          comp->crtc_regs[2] = 46u;
          comp->crtc_regs[3] = 0x8Eu;
          comp->crtc_regs[4] = 38u;
          comp->crtc_regs[5] = 0u;
          comp->crtc_regs[6] = 25u;
          comp->crtc_regs[7] = 30u;
          comp->crtc_regs[8] = 0u;
          comp->crtc_regs[9] = 7u;
          comp->crtc_regs[10] = 0u;
          comp->crtc_regs[11] = 0u;
          comp->crtc_regs[12] = 0x30u;
          comp->crtc_regs[13] = 0x00u;
          comp->crtc_regs[14] = 0u;
          comp->crtc_regs[15] = 0u;
      }
      comp->ppi_port_a = 0xFFu;
      comp->ppi_port_b = 0xFFu;
      comp->ppi_port_c = 0x00u;
      comp->ppi_ctrl = 0x82u;
      comp->tape_level = 0x80u;
      comp->printer_ready = 1u;
      comp->jumpers = 0x7Fu;
      if (comp->ay_regs != NULL) {
          memset(comp->ay_regs, 0, 16u);
          /* AY port A must default to input mode for CPC keyboard scanning. */
          comp->ay_regs[7] = 0xFFu;
          comp->ay_regs[14] = 0xFFu;
      }
      comp->ay_reg_index = 0u;
      comp->ay_ctrl_last = 0u;
      comp->ay_level = 128u;
      comp->ay_last_mix = 128u;
      comp->ay_phase_a = 0u;
      comp->ay_phase_b = 0u;
      comp->ay_phase_c = 0u;
      comp->ay_phase_noise = 0u;
      comp->ay_tone_a = 1u;
      comp->ay_tone_b = 1u;
      comp->ay_tone_c = 1u;
      comp->ay_noise_bit = 1u;
      comp->ay_noise_lfsr = 0x1FFFFu;
      comp->ay_env_phase = 0u;
      comp->ay_env_value = 0u;
      comp->ay_env_dir = -1;
      comp->ay_env_hold = 0u;
      comp->crtc_ma = 0u;
      comp->crtc_ra = 0u;
      comp->crtc_hc = 0u;
      comp->crtc_vc = 0u;
      comp->crtc_vadj = 0u;
      comp->crtc_hsync = 0u;
      comp->crtc_vsync = 0u;
      comp->crtc_display = 0u;
      comp->display_active = 0u;
      comp->crtc_char_accum = 0u;
    destroy: |
      if (comp->lower_rom != NULL) {
          free(comp->lower_rom);
          comp->lower_rom = NULL;
      }
      if (comp->upper_rom != NULL) {
          free(comp->upper_rom);
          comp->upper_rom = NULL;
      }
      if (comp->ga_inks != NULL) {
          free(comp->ga_inks);
          comp->ga_inks = NULL;
      }
      if (comp->crtc_regs != NULL) {
          free(comp->crtc_regs);
          comp->crtc_regs = NULL;
      }
      if (comp->ay_regs != NULL) {
          free(comp->ay_regs);
          comp->ay_regs = NULL;
      }
    mem_read_pre: |
      if (comp->lower_rom_enabled != 0u && addr < 0x4000u && comp->lower_rom != NULL) {
          return comp->lower_rom[addr & 0x3FFFu];
      }
      if (comp->upper_rom_enabled != 0u && addr >= 0xC000u && comp->upper_rom != NULL) {
          return comp->upper_rom[(uint16_t)(addr - 0xC000u) & 0x3FFFu];
      }
      if (comp->display_active != 0u) {
          uint64_t slot = cpu->total_cycles & 0x03u;
          if (slot != 0u) {
              uint64_t wait = 4u - slot;
              cpu->total_cycles += wait;
              comp->tstate_accum += wait;
              comp->ga_hsync_accum += wait;
              comp->audio_emit_accum += wait;
          }
      }
      return ((uint64_t)addr < cpu->memory_size) ? cpu->memory[addr] : 0xFFu;
    mem_write_pre: |
      if (comp->display_active != 0u) {
          uint64_t slot = cpu->total_cycles & 0x03u;
          if (slot != 0u) {
              uint64_t wait = 4u - slot;
              cpu->total_cycles += wait;
              comp->tstate_accum += wait;
              comp->ga_hsync_accum += wait;
              comp->audio_emit_accum += wait;
          }
      }
      if ((uint64_t)addr < cpu->memory_size) {
          cpu->memory[addr] = value;
      }
    port_read_post: |
      uint16_t ph = (uint16_t)(port & 0xFF00u);
      if (ph == 0xF400u) {
          static int kb_trace_init = 0;
          static int kb_trace_on = 0;
          static uint32_t kb_trace_count = 0u;
          static FILE *kb_trace_fp = NULL;
          if (kb_trace_init == 0) {
              const char *env = getenv("PASM_CPC_KB_TRACE");
              kb_trace_on = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
              kb_trace_init = 1;
              if (kb_trace_on != 0) {
                  kb_trace_fp = fopen("log/cpc_kb_trace.log", "w");
                  if (kb_trace_fp == NULL) kb_trace_fp = stderr;
                  fprintf(kb_trace_fp, "# cycle,pc,ctrl,row,reg,reg7,reg14,kb,ret\n");
                  fflush(kb_trace_fp);
              }
          }
          uint8_t pa_input = (uint8_t)((comp->ppi_ctrl & 0x10u) != 0u);
          uint8_t ctrl = (uint8_t)((comp->ppi_port_c >> 6u) & 0x03u);
          if (pa_input == 0u) {
              value = comp->ppi_port_a;
          } else if (ctrl == 0x01u) {
              uint8_t ridx = (uint8_t)(comp->ay_reg_index & 0x0Fu);
              if (ridx == 14u && comp->ay_regs != NULL) {
                  uint8_t row = (uint8_t)(comp->ppi_port_c & 0x0Fu);
                  uint64_t cb_args[1] = { (uint64_t)row };
                  uint8_t kb = (uint8_t)cpu_component_call(cpu, "cpc_io", "keyboard_read_row", cb_args, 1);
                  if ((comp->ay_regs[7] & 0x40u) == 0u) {
                      value = kb;
                  } else {
                      value = (uint8_t)(comp->ay_regs[14] & kb);
                  }
                  comp->ppi_port_a = value;
                  if (kb_trace_on != 0 && kb_trace_count < 5000u) {
                      fprintf(
                          kb_trace_fp,
                          "%llu,%04X,%u,%u,%u,%02X,%02X,%02X,%02X\n",
                          (unsigned long long)cpu->total_cycles,
                          (unsigned)cpu->pc,
                          (unsigned)ctrl,
                          (unsigned)row,
                          (unsigned)ridx,
                          (unsigned)comp->ay_regs[7],
                          (unsigned)comp->ay_regs[14],
                          (unsigned)kb,
                          (unsigned)value
                      );
                      kb_trace_count += 1u;
                      if ((kb_trace_count & 63u) == 0u) fflush(kb_trace_fp);
                  }
              } else {
                  value = (comp->ay_regs != NULL) ? comp->ay_regs[ridx] : 0xFFu;
                  comp->ppi_port_a = value;
              }
          } else {
              value = 0xFFu;
          }
      } else if (ph == 0xF500u) {
          uint8_t pb_input = (uint8_t)((comp->ppi_ctrl & 0x02u) != 0u);
          if (pb_input != 0u) {
              uint8_t v = (uint8_t)(comp->tape_level & 0x80u);
              if (comp->printer_ready == 0u) v |= 0x40u;
              v = (uint8_t)(v | (comp->jumpers & 0x7Fu));
              if (comp->crtc_vsync != 0u) v |= 0x01u;
              value = v;
          } else {
              value = comp->ppi_port_b;
          }
      } else if (ph == 0xF600u) {
          uint8_t c = comp->ppi_port_c;
          uint8_t direction = (uint8_t)(comp->ppi_ctrl & 0x09u);
          if (direction != 0u) {
              if ((direction & 0x08u) != 0u) {
                  uint8_t val = (uint8_t)(comp->ppi_port_c & 0xC0u);
                  c = (uint8_t)(c & 0x0Fu);
                  if (val == 0xC0u) val = 0x80u;
                  c = (uint8_t)(c | val | 0x20u);
                  if ((comp->tape_level & 0x10u) != 0u) {
                      c = (uint8_t)(c | 0x10u);
                  }
              }
          }
          value = c;
      } else if (ph == 0xF700u) {
          value = comp->ppi_ctrl;
      }
    port_write_pre: |
      uint16_t ph = (uint16_t)(port & 0xFF00u);
      static int ay_trace_init = 0;
      static int ay_trace_on = 0;
      static uint32_t ay_trace_count = 0u;
      static FILE *ay_trace_fp = NULL;
      static int ppi_trace_init = 0;
      static int ppi_trace_on = 0;
      static uint32_t ppi_trace_count = 0u;
      static FILE *ppi_trace_fp = NULL;
      if (ay_trace_init == 0) {
          const char *env = getenv("PASM_CPC_KB_TRACE");
          ay_trace_on = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          ay_trace_init = 1;
          if (ay_trace_on != 0) {
              ay_trace_fp = fopen("log/cpc_ay_trace.log", "w");
              if (ay_trace_fp == NULL) ay_trace_fp = stderr;
              fprintf(ay_trace_fp, "# cycle,pc,port,op,ridx,data,reg7,reg14,pc6_7,ppiA\n");
              fflush(ay_trace_fp);
          }
      }
      if (ppi_trace_init == 0) {
          const char *env = getenv("PASM_CPC_KB_TRACE");
          ppi_trace_on = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          ppi_trace_init = 1;
          if (ppi_trace_on != 0) {
              ppi_trace_fp = fopen("log/cpc_ppi_trace.log", "w");
              if (ppi_trace_fp == NULL) ppi_trace_fp = stderr;
              fprintf(ppi_trace_fp, "# cycle,pc,port,value,ppi_ctrl,ppi_a,ppi_b,ppi_c\n");
              fflush(ppi_trace_fp);
          }
      }

      if ((port & 0xC000u) == 0x4000u) {
          uint8_t cmd = (uint8_t)(value & 0xC0u);
          if (cmd == 0x00u) {
              uint8_t pen = (uint8_t)(value & 0x1Fu);
              comp->ga_pen_select = (pen <= 16u) ? pen : 16u;
          } else if (cmd == 0x40u) {
              if (comp->ga_inks != NULL) {
                  comp->ga_inks[comp->ga_pen_select] = (uint8_t)(value & 0x1Fu);
              }
          } else if (cmd == 0x80u) {
              comp->ga_mode = (uint8_t)(value & 0x03u);
              comp->lower_rom_enabled = ((value & 0x04u) == 0u) ? 1u : 0u;
              comp->upper_rom_enabled = ((value & 0x08u) == 0u) ? 1u : 0u;
              if ((value & 0x10u) != 0u) {
                  comp->ga_hsync_count = 0u;
                  comp->ga_irq_pending = 0u;
                  comp->ga_irq_issued = 0u;
              }
          }
          return;
      }

      if (ph == 0xBC00u) {
          comp->crtc_index = (uint8_t)(value & 0x1Fu);
          return;
      }
      if (ph == 0xBD00u) {
          if (comp->crtc_regs != NULL) {
              comp->crtc_regs[comp->crtc_index & 0x1Fu] = value;
          }
          return;
      }

      if (ph == 0xF400u) {
          if ((comp->ppi_ctrl & 0x10u) == 0u) {
              comp->ppi_port_a = value;
          }
          if ((comp->ppi_ctrl & 0x08u) == 0u && comp->ay_regs != NULL) {
              uint8_t ctrl = (uint8_t)(comp->ppi_port_c & 0xC0u);
              if ((ctrl & 0x80u) != 0u && (comp->ay_ctrl_last & 0x80u) == 0u) {
                  uint8_t psg_data = comp->ppi_port_a;
                  if (ctrl == 0xC0u) {
                      comp->ay_reg_index = (uint8_t)(psg_data & 0x0Fu);
                      if (ay_trace_on != 0 && ay_trace_count < 5000u) {
                          fprintf(
                              ay_trace_fp,
                              "%llu,%04X,%04X,SEL,%u,%02X,%02X,%02X,%u,%02X\n",
                              (unsigned long long)cpu->total_cycles,
                              (unsigned)cpu->pc,
                              (unsigned)port,
                              (unsigned)comp->ay_reg_index,
                              (unsigned)psg_data,
                              (unsigned)comp->ay_regs[7],
                              (unsigned)comp->ay_regs[14],
                              (unsigned)(comp->ppi_port_c & 0xC0u),
                              (unsigned)comp->ppi_port_a
                          );
                          ay_trace_count += 1u;
                          if ((ay_trace_count & 63u) == 0u) fflush(ay_trace_fp);
                      }
                  } else if (ctrl == 0x80u) {
                      uint8_t ridx = (uint8_t)(comp->ay_reg_index & 0x0Fu);
                      comp->ay_regs[ridx] = psg_data;
                      if (ridx == 13u) {
                          uint8_t shape = (uint8_t)(psg_data & 0x0Fu);
                          uint8_t attack = (uint8_t)((shape & 0x04u) != 0u);
                          comp->ay_env_value = attack != 0u ? 0u : 15u;
                          comp->ay_env_dir = attack != 0u ? 1 : -1;
                          comp->ay_env_hold = 0u;
                          comp->ay_env_phase = 0u;
                      }
                      {
                          uint8_t v0 = (uint8_t)(comp->ay_regs[8] & 0x0Fu);
                          uint8_t v1 = (uint8_t)(comp->ay_regs[9] & 0x0Fu);
                          uint8_t v2 = (uint8_t)(comp->ay_regs[10] & 0x0Fu);
                          uint8_t level = (uint8_t)(((uint32_t)(v0 + v1 + v2) * 255u) / 45u);
                          comp->ay_level = level;
                      }
                      if (ay_trace_on != 0 && ay_trace_count < 5000u) {
                          fprintf(
                              ay_trace_fp,
                              "%llu,%04X,%04X,WR,%u,%02X,%02X,%02X,%u,%02X\n",
                              (unsigned long long)cpu->total_cycles,
                              (unsigned)cpu->pc,
                              (unsigned)port,
                              (unsigned)ridx,
                              (unsigned)psg_data,
                              (unsigned)comp->ay_regs[7],
                              (unsigned)comp->ay_regs[14],
                              (unsigned)(comp->ppi_port_c & 0xC0u),
                              (unsigned)comp->ppi_port_a
                          );
                          ay_trace_count += 1u;
                          if ((ay_trace_count & 63u) == 0u) fflush(ay_trace_fp);
                      }
                  }
              }
              comp->ay_ctrl_last = (uint8_t)(comp->ppi_port_c & 0xC0u);
          }
          if (ppi_trace_on != 0 && ppi_trace_count < 5000u) {
              fprintf(
                  ppi_trace_fp,
                  "%llu,%04X,%04X,%02X,%02X,%02X,%02X,%02X\n",
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)cpu->pc,
                  (unsigned)port,
                  (unsigned)value,
                  (unsigned)comp->ppi_ctrl,
                  (unsigned)comp->ppi_port_a,
                  (unsigned)comp->ppi_port_b,
                  (unsigned)comp->ppi_port_c
              );
              ppi_trace_count += 1u;
              if ((ppi_trace_count & 63u) == 0u) fflush(ppi_trace_fp);
          }
          return;
      }
      if (ph == 0xF500u) {
          if ((comp->ppi_ctrl & 0x02u) == 0u) {
              comp->ppi_port_b = value;
          }
          if (ppi_trace_on != 0 && ppi_trace_count < 5000u) {
