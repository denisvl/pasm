      if (comp->ram_e000 == NULL) comp->ram_e000 = (uint8_t *)calloc(0x2000u, 1u);
      if (cpu->comp_c64_color_ram.color_ram == NULL) cpu->comp_c64_color_ram.color_ram = (uint8_t *)calloc(0x0400u, 1u);
      if (cpu->comp_c64_vic_ii.vic_regs == NULL) cpu->comp_c64_vic_ii.vic_regs = (uint8_t *)calloc(0x40u, 1u);
      if (cpu->comp_c64_sid.sid_regs == NULL) cpu->comp_c64_sid.sid_regs = (uint8_t *)calloc(0x20u, 1u);
      if (cpu->comp_c64_cia1.regs == NULL) cpu->comp_c64_cia1.regs = (uint8_t *)calloc(0x10u, 1u);
      if (cpu->comp_c64_cia2.regs == NULL) cpu->comp_c64_cia2.regs = (uint8_t *)calloc(0x10u, 1u);
      if (cpu->comp_c64_color_ram.color_ram != NULL) memset(cpu->comp_c64_color_ram.color_ram, 0x0Eu, 0x0400u);
      if (cpu->comp_c64_vic_ii.vic_regs != NULL) {
          memset(cpu->comp_c64_vic_ii.vic_regs, 0, 0x40u);
          cpu->comp_c64_vic_ii.vic_regs[0x11u] = 0x1Bu; cpu->comp_c64_vic_ii.vic_regs[0x16u] = 0x08u; cpu->comp_c64_vic_ii.vic_regs[0x18u] = 0x14u;
          cpu->comp_c64_vic_ii.vic_regs[0x20u] = 0x0Eu; cpu->comp_c64_vic_ii.vic_regs[0x21u] = 0x06u;
      }
      if (cpu->comp_c64_sid.sid_regs != NULL) memset(cpu->comp_c64_sid.sid_regs, 0, 0x20u);
