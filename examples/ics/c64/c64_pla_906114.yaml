                  if (r == 0x00u) {
                      uint8_t sel_cols=(uint8_t)(~cpu->comp_c64_cia1.prb); uint8_t k=0xFFu; uint8_t out=(uint8_t)((cpu->comp_c64_cia1.pra & cpu->comp_c64_cia1.ddra) | (uint8_t)(~cpu->comp_c64_cia1.ddra));
                      for (uint8_t rw=0u;rw<8u;++rw){ uint64_t a[1]={(uint64_t)rw}; uint8_t rb=(uint8_t)cpu_component_call(cpu,"c64_pla","keyboard_row",a,1); if ((((uint8_t)(~rb)) & sel_cols) != 0u) k=(uint8_t)(k & (uint8_t)~(uint8_t)(1u<<rw)); }
                      { uint64_t ja[1] = { 2u }; uint8_t joy = (uint8_t)cpu_component_call(cpu, "c64_pla", "joystick_port", ja, 1); return (uint8_t)(out & k & joy); }
                  }
