                      for (uint8_t c=0u;c<8u;++c){ uint8_t p=0u; for (uint8_t rw=0u;rw<8u;++rw){ if ((sel_rows & (uint8_t)(1u<<rw))==0u) continue; uint64_t a[1]={(uint64_t)rw}; uint8_t rb=(uint8_t)cpu_component_call(cpu,"c64_pla","keyboard_row",a,1); if ((rb & (uint8_t)(1u<<c))==0u){ p=1u; break; } } if (p!=0u) k=(uint8_t)(k & (uint8_t)~(uint8_t)(1u<<c)); }
