    destroy: |
      if (comp->cpu_ram != NULL) {
          free(comp->cpu_ram);
          comp->cpu_ram = NULL;
      }
      if (comp->ppu_vram != NULL) {
          free(comp->ppu_vram);
          comp->ppu_vram = NULL;
      }
      if (comp->palette_ram != NULL) {
          free(comp->palette_ram);
          comp->palette_ram = NULL;
      }
      if (comp->oam != NULL) {
          free(comp->oam);
          comp->oam = NULL;
      }
    mem_read_pre: |
      if (comp->cpu_ram == NULL || comp->ppu_vram == NULL || comp->palette_ram == NULL || comp->oam == NULL) return 0u;

      if (addr < 0x2000u) {
          return comp->cpu_ram[(uint16_t)(addr & 0x07FFu)];
      }

      if (addr >= 0x2000u && addr < 0x4000u) {
          uint16_t reg = (uint16_t)(0x2000u + (addr & 0x0007u));
          if (reg == 0x2002u) {
              uint8_t v = (uint8_t)((comp->ppu_status & 0xE0u) | (comp->ppu_open_bus & 0x1Fu));
              comp->ppu_status = (uint8_t)(comp->ppu_status & 0x7Fu);
              comp->ppu_addr_latch = 0u;
              comp->ppu_scroll_latch = 0u;
              comp->ppu_w = 0u;
              comp->ppu_open_bus = v;
              return v;
          }
          if (reg == 0x2004u) {
              uint8_t v = comp->oam[comp->oam_addr];
              comp->ppu_open_bus = v;
              return v;
          }
          if (reg == 0x2007u) {
              uint16_t paddr = (uint16_t)(comp->ppu_v & 0x3FFFu);
              uint8_t ret = 0u;
              uint8_t direct = 0u;
              uint8_t new_buf = 0u;

              if (paddr < 0x2000u) {
                  uint64_t cb_args[1] = { (uint64_t)paddr };
                  new_buf = (uint8_t)cpu_component_call(cpu, "nes_io", "cart_chr_read", cb_args, 1);
              } else if (paddr < 0x3F00u) {
                  uint16_t nt = (uint16_t)((paddr - 0x2000u) & 0x0FFFu);
                  uint8_t mir = (uint8_t)(cpu_component_call(cpu, "nes_io", "cart_mirroring", NULL, 0) & 0x01u);
                  uint16_t table = (uint16_t)((nt >> 10) & 0x03u);
                  uint16_t offs = (uint16_t)(nt & 0x03FFu);
                  uint16_t phys;
                  if (mir != 0u) {
                      phys = (uint16_t)(((table & 0x01u) << 10) | offs);
                  } else {
                      phys = (uint16_t)((((table >> 1) & 0x01u) << 10) | offs);
                  }
                  new_buf = comp->ppu_vram[(uint16_t)(phys & 0x07FFu)];
              } else {
                  uint8_t pi = (uint8_t)((paddr - 0x3F00u) & 0x1Fu);
                  if (pi == 0x10u || pi == 0x14u || pi == 0x18u || pi == 0x1Cu) pi = (uint8_t)(pi - 0x10u);
                  ret = comp->palette_ram[pi & 0x1Fu];
                  direct = 1u;

                  uint16_t ub = (uint16_t)(paddr - 0x1000u);
                  uint16_t nt = (uint16_t)((ub - 0x2000u) & 0x0FFFu);
                  uint8_t mir = (uint8_t)(cpu_component_call(cpu, "nes_io", "cart_mirroring", NULL, 0) & 0x01u);
                  uint16_t table = (uint16_t)((nt >> 10) & 0x03u);
                  uint16_t offs = (uint16_t)(nt & 0x03FFu);
                  uint16_t phys;
                  if (mir != 0u) {
                      phys = (uint16_t)(((table & 0x01u) << 10) | offs);
                  } else {
                      phys = (uint16_t)((((table >> 1) & 0x01u) << 10) | offs);
                  }
                  new_buf = comp->ppu_vram[(uint16_t)(phys & 0x07FFu)];
              }

              if (direct == 0u) {
                  ret = comp->ppu_data_buffer;
              }
              comp->ppu_data_buffer = new_buf;
              comp->ppu_v = (uint16_t)((comp->ppu_v + (((comp->ppu_ctrl & 0x04u) != 0u) ? 32u : 1u)) & 0x3FFFu);
              comp->ppu_addr = comp->ppu_v;
              comp->ppu_open_bus = ret;
              return ret;
          }
          return comp->ppu_open_bus;
      }

      if (addr == 0x4016u) {
          uint8_t bit;
          if (comp->controller_strobe != 0u) {
              comp->controller_shift0 = (uint8_t)cpu_component_call(cpu, "nes_io", "joy1_read", NULL, 0);
              bit = (uint8_t)(comp->controller_shift0 & 0x01u);
          } else {
              bit = (uint8_t)(comp->controller_shift0 & 0x01u);
              comp->controller_shift0 = (uint8_t)((comp->controller_shift0 >> 1) | 0x80u);
          }
          return (uint8_t)(0x40u | bit);
      }

      if (addr == 0x4017u) {
          uint8_t bit;
          if (comp->controller_strobe != 0u) {
              comp->controller_shift1 = (uint8_t)cpu_component_call(cpu, "nes_io", "joy2_read", NULL, 0);
              bit = (uint8_t)(comp->controller_shift1 & 0x01u);
          } else {
              bit = (uint8_t)(comp->controller_shift1 & 0x01u);
              comp->controller_shift1 = (uint8_t)((comp->controller_shift1 >> 1) | 0x80u);
          }
          return (uint8_t)(0x40u | bit);
      }

      if (addr == 0x4015u) {
          uint8_t status = 0u;
          if (comp->apu_p1_enabled != 0u && comp->apu_p1_length > 0u) status |= 0x01u;
          if (comp->apu_p2_enabled != 0u && comp->apu_p2_length > 0u) status |= 0x02u;
          if (comp->apu_tri_enabled != 0u && comp->apu_tri_length > 0u) status |= 0x04u;
          if (comp->apu_noise_enabled != 0u && comp->apu_noise_length > 0u) status |= 0x08u;
          if (comp->apu_dmc_active != 0u) {
              status |= 0x10u;
          }
          if (comp->apu_frame_irq_pending != 0u) {
              status |= 0x40u;
          }
          if (comp->apu_dmc_irq_pending != 0u) {
              status |= 0x80u;
          }
          comp->apu_frame_irq_pending = 0u;
          if (
              comp->apu_dmc_irq_pending == 0u &&
              cpu->interrupt_pending &&
              cpu->interrupt_vector != 0xFFu
          ) {
              cpu->interrupt_pending = false;
          }
          return status;
      }

      if (addr >= 0x4000u && addr <= 0x4015u) {
          return 0u;
      }
    mem_write_pre: |
      if (comp->cpu_ram == NULL || comp->ppu_vram == NULL || comp->palette_ram == NULL || comp->oam == NULL) return;

      if (addr < 0x2000u) {
          comp->cpu_ram[(uint16_t)(addr & 0x07FFu)] = value;
          return;
      }

      if (addr >= 0x2000u && addr < 0x4000u) {
          uint16_t reg = (uint16_t)(0x2000u + (addr & 0x0007u));
          if (reg == 0x2000u) {
              uint8_t old_ctrl = comp->ppu_ctrl;
