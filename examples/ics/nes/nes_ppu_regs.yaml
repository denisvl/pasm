metadata:
  id: nes_ppu_regs
  type: video_controller
  model: nes_ppu_register_access
  version: "1.0"

state:
  - name: ppu_vram
    type: uint8_t *
    initial: "NULL"
  - name: palette_ram
    type: uint8_t *
    initial: "NULL"
  - name: oam
    type: uint8_t *
    initial: "NULL"
  - name: ppu_ctrl
    type: uint8_t
    initial: "0"
  - name: ppu_mask
    type: uint8_t
    initial: "0"
  - name: ppu_status
    type: uint8_t
    initial: "0"
  - name: oam_addr
    type: uint8_t
    initial: "0"
  - name: ppu_open_bus
    type: uint8_t
    initial: "0"
  - name: ppu_scroll_latch
    type: uint8_t
    initial: "0"
  - name: ppu_addr_latch
    type: uint8_t
    initial: "0"
  - name: scroll_x
    type: uint8_t
    initial: "0"
  - name: scroll_y
    type: uint8_t
    initial: "0"
  - name: ppu_addr
    type: uint16_t
    initial: "0"
  - name: ppu_data_buffer
    type: uint8_t
    initial: "0"
  - name: ppu_v
    type: uint16_t
    initial: "0"
  - name: ppu_t
    type: uint16_t
    initial: "0"
  - name: ppu_x
    type: uint8_t
    initial: "0"
  - name: ppu_w
    type: uint8_t
    initial: "0"

  - name: ppu_scanline
    type: int16_t
    initial: "261"
  - name: ppu_cycle
    type: uint16_t
    initial: "0"
  - name: frame_counter
    type: uint32_t
    initial: "0"
  - name: cycle_accum
    type: uint64_t
    initial: "0"
  - name: ppu_dot_accum
    type: uint64_t
    initial: "0"
  - name: ppu_abs_tick
    type: uint64_t
    initial: "0"
  - name: odd_frame
    type: uint8_t
    initial: "0"
  - name: vblank_set_this_frame
    type: uint8_t
    initial: "0"
  - name: ppu_prevent_vbl_flag
    type: uint8_t
    initial: "0"
  - name: ppu_prevent_nmi_flag
    type: uint8_t
    initial: "0"
  - name: sprite0_hit_pending
    type: uint8_t
    initial: "0"
  - name: sprite0_hit_cycle
    type: uint64_t
    initial: "0"

interfaces:
  callbacks:
    - name: ppu_reg_read
      args: [u16]
      returns: u8
    - name: ppu_reg_write
      args: [u16, u8]
      returns: u8
    - name: oam_dma
      args: [u8]
      returns: u8
    - name: accumulate_timing
      args: [u64]
      returns: u8
    - name: ppu_step_loop
      args: []
      returns: u8
    - name: post_step_finalize
      args: [u64]
      returns: u8
  handlers: []
  signals:
    - name: frame_ready
      args: [u32, u64, u32, u32]

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      if (comp->ppu_vram == NULL) comp->ppu_vram = (uint8_t *)calloc(2048u, sizeof(uint8_t));
      if (comp->palette_ram == NULL) comp->palette_ram = (uint8_t *)calloc(32u, sizeof(uint8_t));
      if (comp->oam == NULL) comp->oam = (uint8_t *)calloc(256u, sizeof(uint8_t));
    reset: |
      (void)cpu;
      if (comp->ppu_vram != NULL) memset(comp->ppu_vram, 0, 2048u);
      if (comp->palette_ram != NULL) memset(comp->palette_ram, 0, 32u);
      if (comp->oam != NULL) memset(comp->oam, 0, 256u);
      comp->ppu_ctrl = 0u;
      comp->ppu_mask = 0u;
      comp->ppu_status = 0u;
      comp->oam_addr = 0u;
      comp->ppu_open_bus = 0u;
      comp->ppu_scroll_latch = 0u;
      comp->ppu_addr_latch = 0u;
      comp->scroll_x = 0u;
      comp->scroll_y = 0u;
      comp->ppu_addr = 0u;
      comp->ppu_data_buffer = 0u;
      comp->ppu_v = 0u;
      comp->ppu_t = 0u;
      comp->ppu_x = 0u;
      comp->ppu_w = 0u;
    destroy: |
      if (comp->ppu_vram != NULL) {
          free(comp->ppu_vram);
          comp->ppu_vram = NULL;
      }
      if (comp->palette_ram != NULL) {
          free(comp->palette_ram);
          comp->palette_ram = NULL;
      }
      if (comp->oam != NULL) {
          free(comp->oam);
          comp->oam = NULL;
      }
    step_pre: |
      (void)cpu;
    step_post: |
      if (cpu->comp_nes_ppu_regs.ppu_vram == NULL || cpu->comp_nes_ppu_regs.palette_ram == NULL || cpu->comp_nes_ppu_regs.oam == NULL) return;
      {
          uint64_t inst_cycles = (uint64_t)inst->cycles;
          cpu->comp_nes_ppu_regs.cycle_accum += inst_cycles;
          cpu->comp_nes_ppu_regs.ppu_dot_accum += (inst_cycles * 3u);
      }
      (void)cpu_component_dispatch_callback(cpu, "nes_ppu_regs", "ppu_step_loop", NULL, 0);
      {
          uint64_t inst_cycles = (uint64_t)inst->cycles;
          uint64_t base_cycle = (cpu->total_cycles >= inst_cycles) ? (cpu->total_cycles - inst_cycles) : cpu->total_cycles;
          uint64_t cb_args[2] = { inst_cycles, base_cycle };
          (void)cpu_component_dispatch_callback(cpu, "nes_apu", "apu_step", cb_args, 2);
      }
  callback_handlers:
    ppu_reg_read: |
      if (argc < 1u) return 0u;
      uint16_t addr = (uint16_t)(args[0] & 0xFFFFu);
      if (cpu->comp_nes_ppu_regs.ppu_vram == NULL || cpu->comp_nes_ppu_regs.palette_ram == NULL || cpu->comp_nes_ppu_regs.oam == NULL) return 0u;
      uint16_t reg = (uint16_t)(0x2000u + (addr & 0x0007u));
      if (reg == 0x2002u) {
          static int ppu_status_trace_enabled = -1;
          static FILE *ppu_status_trace_fp = NULL;
          if (ppu_status_trace_enabled < 0) {
              const char *env = NULL;
              ppu_status_trace_enabled = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
              if (ppu_status_trace_enabled != 0) {
                  ppu_status_trace_fp = fopen("log/nes_ppu_status_trace.log", "a");
                  if (ppu_status_trace_fp == NULL) ppu_status_trace_fp = fopen("nes_ppu_status_trace.log", "a");
              }
          }
          int16_t sample_scanline = cpu->comp_nes_ppu_regs.ppu_scanline;
          uint16_t sample_cycle = cpu->comp_nes_ppu_regs.ppu_cycle;
          {
              uint16_t read_bias = ((cpu->pc == 0xFF5Au) || (cpu->pc == 0xFF61u)) ? 352u : 0u;
              uint16_t adv = (uint16_t)(cpu->io_read_phase_ppu_dots + read_bias);
              while (adv != 0u) {
                  sample_cycle = (uint16_t)(sample_cycle + 1u);
                  if (sample_cycle >= 341u) {
                      sample_cycle = 0u;
                      sample_scanline = (int16_t)(sample_scanline + 1);
                      if (sample_scanline >= 262) sample_scanline = 0;
                  }
                  adv = (uint16_t)(adv - 1u);
              }
          }

          uint8_t status_snapshot = cpu->comp_nes_ppu_regs.ppu_status;
          uint8_t before_vblank_now =
              (cpu->comp_nes_ppu_regs.ppu_scanline < 241) ||
              (cpu->comp_nes_ppu_regs.ppu_scanline == 241 && cpu->comp_nes_ppu_regs.ppu_cycle < 1u);
          uint8_t synthetic_vblank_read = 0u;
          if (
              (status_snapshot & 0x80u) == 0u &&
              cpu->comp_nes_ppu_regs.ppu_prevent_vbl_flag == 0u &&
              before_vblank_now != 0u &&
              (
                  sample_scanline > 241 ||
                  (sample_scanline == 241 && sample_cycle >= 1u)
              ) &&
              sample_scanline < 261
          ) {
              status_snapshot = (uint8_t)(status_snapshot | 0x80u);
              synthetic_vblank_read = 1u;
          }
          if (
              (status_snapshot & 0x80u) != 0u &&
              sample_scanline == 261 &&
              sample_cycle >= 1u
          ) {
              status_snapshot = (uint8_t)(status_snapshot & 0x7Fu);
          }

          uint8_t v = (uint8_t)((status_snapshot & 0xE0u) | (cpu->comp_nes_ppu_regs.ppu_open_bus & 0x1Fu));
          if (ppu_status_trace_fp != NULL) {
              fprintf(
                  ppu_status_trace_fp,
                  "read2002 pc=%04X sl=%d cy=%u sample_sl=%d sample_cy=%u abs=%llu status=%02X ret=%02X ctrl=%02X mask=%02X\n",
                  (unsigned)cpu->pc,
                  (int)cpu->comp_nes_ppu_regs.ppu_scanline,
                  (unsigned)cpu->comp_nes_ppu_regs.ppu_cycle,
                  (int)sample_scanline,
                  (unsigned)sample_cycle,
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)cpu->comp_nes_ppu_regs.ppu_status,
                  (unsigned)v,
                  (unsigned)cpu->comp_nes_ppu_regs.ppu_ctrl,
                  (unsigned)cpu->comp_nes_ppu_regs.ppu_mask
              );
              fflush(ppu_status_trace_fp);
          }
          cpu->comp_nes_ppu_regs.ppu_status = (uint8_t)(cpu->comp_nes_ppu_regs.ppu_status & 0x7Fu);
          if (cpu->comp_nes_ppu_regs.ppu_scanline == 241 && cpu->comp_nes_ppu_regs.ppu_cycle == 0u) {
              cpu->comp_nes_ppu_regs.ppu_prevent_vbl_flag = 1u;
              cpu->comp_nes_ppu_regs.ppu_prevent_nmi_flag = 1u;
          }
          if (synthetic_vblank_read != 0u) {
              cpu->comp_nes_ppu_regs.ppu_prevent_vbl_flag = 1u;
          }
          cpu->nmi_pending = false;
          cpu->interrupt_pending = (bool)(cpu->nmi_pending || cpu->irq_pending);
          cpu->comp_nes_ppu_regs.ppu_addr_latch = 0u;
          cpu->comp_nes_ppu_regs.ppu_scroll_latch = 0u;
          cpu->comp_nes_ppu_regs.ppu_w = 0u;
          cpu->comp_nes_ppu_regs.ppu_open_bus = v;
          return v;
      }
      if (reg == 0x2004u) {
          uint8_t v = cpu->comp_nes_ppu_regs.oam[cpu->comp_nes_ppu_regs.oam_addr];
          cpu->comp_nes_ppu_regs.ppu_open_bus = v;
          return v;
      }
      if (reg == 0x2007u) {
          uint16_t paddr = (uint16_t)(cpu->comp_nes_ppu_regs.ppu_v & 0x3FFFu);
          uint8_t ret = 0u;
          uint8_t direct = 0u;
          uint8_t new_buf = 0u;
          if (paddr < 0x2000u) {
              uint64_t cb_args[3] = { (uint64_t)paddr, 0u, (uint64_t)cpu->comp_nes_ppu_regs.ppu_abs_tick };
              new_buf = (uint8_t)cpu_component_dispatch_callback(cpu, "nes_cart_bridge", "chr_read", cb_args, 3);
          } else if (paddr < 0x3F00u) {
              uint16_t nt = (uint16_t)((paddr - 0x2000u) & 0x0FFFu);
              uint8_t mir = (uint8_t)(cpu->comp_nes_cart0.mirroring_mode & 0x01u);
              uint16_t table = (uint16_t)((nt >> 10) & 0x03u);
              uint16_t offs = (uint16_t)(nt & 0x03FFu);
              uint16_t phys = (mir != 0u)
                  ? (uint16_t)(((table & 0x01u) << 10) | offs)
                  : (uint16_t)((((table >> 1) & 0x01u) << 10) | offs);
              new_buf = cpu->comp_nes_ppu_regs.ppu_vram[(uint16_t)(phys & 0x07FFu)];
          } else {
              uint8_t pi = (uint8_t)((paddr - 0x3F00u) & 0x1Fu);
              if (pi == 0x10u || pi == 0x14u || pi == 0x18u || pi == 0x1Cu) pi = (uint8_t)(pi - 0x10u);
              ret = cpu->comp_nes_ppu_regs.palette_ram[pi & 0x1Fu];
              direct = 1u;
              uint16_t ub = (uint16_t)(paddr - 0x1000u);
              uint16_t nt = (uint16_t)((ub - 0x2000u) & 0x0FFFu);
              uint8_t mir = (uint8_t)(cpu->comp_nes_cart0.mirroring_mode & 0x01u);
              uint16_t table = (uint16_t)((nt >> 10) & 0x03u);
              uint16_t offs = (uint16_t)(nt & 0x03FFu);
              uint16_t phys = (mir != 0u)
                  ? (uint16_t)(((table & 0x01u) << 10) | offs)
                  : (uint16_t)((((table >> 1) & 0x01u) << 10) | offs);
              new_buf = cpu->comp_nes_ppu_regs.ppu_vram[(uint16_t)(phys & 0x07FFu)];
          }
          if (direct == 0u) ret = cpu->comp_nes_ppu_regs.ppu_data_buffer;
          cpu->comp_nes_ppu_regs.ppu_data_buffer = new_buf;
          cpu->comp_nes_ppu_regs.ppu_v = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_v + (((cpu->comp_nes_ppu_regs.ppu_ctrl & 0x04u) != 0u) ? 32u : 1u)) & 0x3FFFu);
          cpu->comp_nes_ppu_regs.ppu_addr = cpu->comp_nes_ppu_regs.ppu_v;
          cpu->comp_nes_ppu_regs.ppu_open_bus = ret;
          return ret;
      }
      return cpu->comp_nes_ppu_regs.ppu_open_bus;
    ppu_reg_write: |
      if (argc < 2u) return 0u;
      uint16_t addr = (uint16_t)(args[0] & 0xFFFFu);
      uint8_t value = (uint8_t)(args[1] & 0xFFu);
      if (cpu->comp_nes_ppu_regs.ppu_vram == NULL || cpu->comp_nes_ppu_regs.palette_ram == NULL || cpu->comp_nes_ppu_regs.oam == NULL) return 0u;
      uint16_t reg = (uint16_t)(0x2000u + (addr & 0x0007u));
      if (reg == 0x2000u) {
          uint8_t old_ctrl = cpu->comp_nes_ppu_regs.ppu_ctrl;
          cpu->comp_nes_ppu_regs.ppu_ctrl = value;
          cpu->comp_nes_ppu_regs.ppu_t = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_t & 0xF3FFu) | (((uint16_t)value & 0x03u) << 10));
          cpu->comp_nes_ppu_regs.ppu_open_bus = value;
          if ((old_ctrl & 0x80u) == 0u && (value & 0x80u) != 0u && (cpu->comp_nes_ppu_regs.ppu_status & 0x80u) != 0u) {
              cpu->interrupt_vector = 0xFFu;
              cpu->nmi_pending = true;
              cpu->interrupt_pending = (bool)(cpu->nmi_pending || cpu->irq_pending);
          }
          return 0u;
      }
      if (reg == 0x2001u) {
          cpu->comp_nes_ppu_regs.ppu_mask = value;
          cpu->comp_nes_ppu_regs.ppu_open_bus = value;
          return 0u;
      }
      if (reg == 0x2003u) { cpu->comp_nes_ppu_regs.oam_addr = value; cpu->comp_nes_ppu_regs.ppu_open_bus = value; return 0u; }
      if (reg == 0x2004u) {
          uint8_t val = value;
          uint8_t rendering_now = 0u;
          if ((cpu->comp_nes_ppu_regs.ppu_mask & 0x18u) != 0u && ((cpu->comp_nes_ppu_regs.ppu_scanline >= 0 && cpu->comp_nes_ppu_regs.ppu_scanline < 240) || cpu->comp_nes_ppu_regs.ppu_scanline == 261)) rendering_now = 1u;
          if ((cpu->comp_nes_ppu_regs.oam_addr & 0x03u) == 0x02u) val = (uint8_t)(val & 0xE3u);
          if (rendering_now != 0u) cpu->comp_nes_ppu_regs.oam_addr = (uint8_t)(cpu->comp_nes_ppu_regs.oam_addr + 4u);
          else { cpu->comp_nes_ppu_regs.oam[cpu->comp_nes_ppu_regs.oam_addr] = val; cpu->comp_nes_ppu_regs.oam_addr = (uint8_t)(cpu->comp_nes_ppu_regs.oam_addr + 1u); }
          cpu->comp_nes_ppu_regs.ppu_open_bus = value;
          return 0u;
      }
      if (reg == 0x2005u) {
          if (cpu->comp_nes_ppu_regs.ppu_w == 0u) {
              cpu->comp_nes_ppu_regs.scroll_x = value;
              cpu->comp_nes_ppu_regs.ppu_x = (uint8_t)(value & 0x07u);
              cpu->comp_nes_ppu_regs.ppu_t = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_t & 0x7FE0u) | ((uint16_t)value >> 3));
              cpu->comp_nes_ppu_regs.ppu_w = 1u;
              cpu->comp_nes_ppu_regs.ppu_scroll_latch = 1u;
          } else {
              cpu->comp_nes_ppu_regs.scroll_y = value;
              cpu->comp_nes_ppu_regs.ppu_t = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_t & 0x0C1Fu) | ((((uint16_t)value & 0x07u) << 12) & 0x7000u) | ((((uint16_t)value & 0xF8u) << 2) & 0x03E0u));
              cpu->comp_nes_ppu_regs.ppu_w = 0u;
              cpu->comp_nes_ppu_regs.ppu_scroll_latch = 0u;
          }
          cpu->comp_nes_ppu_regs.ppu_open_bus = value;
          return 0u;
      }
      if (reg == 0x2006u) {
          if (cpu->comp_nes_ppu_regs.ppu_w == 0u) {
              cpu->comp_nes_ppu_regs.ppu_t = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_t & 0x00FFu) | (((uint16_t)value & 0x3Fu) << 8));
              cpu->comp_nes_ppu_regs.ppu_w = 1u;
              cpu->comp_nes_ppu_regs.ppu_addr_latch = 1u;
          } else {
              cpu->comp_nes_ppu_regs.ppu_t = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_t & 0x7F00u) | (uint16_t)value);
              cpu->comp_nes_ppu_regs.ppu_v = cpu->comp_nes_ppu_regs.ppu_t;
              cpu->comp_nes_ppu_regs.ppu_addr = cpu->comp_nes_ppu_regs.ppu_v;
              cpu->comp_nes_ppu_regs.ppu_w = 0u;
              cpu->comp_nes_ppu_regs.ppu_addr_latch = 0u;
          }
          cpu->comp_nes_ppu_regs.ppu_open_bus = value;
          return 0u;
      }
      if (reg == 0x2007u) {
          uint16_t paddr = (uint16_t)(cpu->comp_nes_ppu_regs.ppu_v & 0x3FFFu);
          if (paddr < 0x2000u) {
              uint64_t cb_args[4] = { (uint64_t)paddr, (uint64_t)value, 0u, (uint64_t)cpu->comp_nes_ppu_regs.ppu_abs_tick };
              (void)cpu_component_dispatch_callback(cpu, "nes_cart_bridge", "chr_write", cb_args, 4);
          } else if (paddr < 0x3F00u) {
              uint16_t nt = (uint16_t)((paddr - 0x2000u) & 0x0FFFu);
              uint8_t mir = (uint8_t)(cpu->comp_nes_cart0.mirroring_mode & 0x01u);
              uint16_t table = (uint16_t)((nt >> 10) & 0x03u);
              uint16_t offs = (uint16_t)(nt & 0x03FFu);
              uint16_t phys = (mir != 0u)
                  ? (uint16_t)(((table & 0x01u) << 10) | offs)
                  : (uint16_t)((((table >> 1) & 0x01u) << 10) | offs);
              cpu->comp_nes_ppu_regs.ppu_vram[(uint16_t)(phys & 0x07FFu)] = value;
          } else {
              uint8_t pi = (uint8_t)((paddr - 0x3F00u) & 0x1Fu);
              if (pi == 0x10u || pi == 0x14u || pi == 0x18u || pi == 0x1Cu) pi = (uint8_t)(pi - 0x10u);
              cpu->comp_nes_ppu_regs.palette_ram[pi & 0x1Fu] = (uint8_t)(value & 0x3Fu);
          }
          cpu->comp_nes_ppu_regs.ppu_v = (uint16_t)((cpu->comp_nes_ppu_regs.ppu_v + (((cpu->comp_nes_ppu_regs.ppu_ctrl & 0x04u) != 0u) ? 32u : 1u)) & 0x3FFFu);
          cpu->comp_nes_ppu_regs.ppu_addr = cpu->comp_nes_ppu_regs.ppu_v;
          cpu->comp_nes_ppu_regs.ppu_open_bus = value;
      }
      return 0u;
    oam_dma: |
      if (argc < 1u) return 0u;
      uint8_t value = (uint8_t)(args[0] & 0xFFu);
      uint16_t base = (uint16_t)((uint16_t)value << 8);
      for (uint16_t i = 0u; i < 256u; ++i) {
          uint16_t src = (uint16_t)(base + i);
          uint8_t b = mos6502_read_byte(cpu, src);
          cpu->comp_nes_ppu_regs.oam[(uint8_t)(cpu->comp_nes_ppu_regs.oam_addr + (uint8_t)i)] = b;
      }
      {
          uint64_t dma_cycles = 513u + (cpu->total_cycles & 1u);
          cpu->total_cycles += dma_cycles;
          /* Keep timing domains in sync after OAM DMA cycle steal. */
          cpu->comp_nes_ppu_regs.cycle_accum += dma_cycles;
          cpu->comp_nes_ppu_regs.ppu_dot_accum += (dma_cycles * 3u);
      }
      return 0u;
    accumulate_timing: |
      if (argc < 1u) return 0u;
      uint64_t inst_cycles = args[0];
      cpu->comp_nes_ppu_regs.cycle_accum += inst_cycles;
      cpu->comp_nes_ppu_regs.ppu_dot_accum += (inst_cycles * 3u);
      return 0u;
    ppu_step_loop: |
      /* __PASM_PPU_STEP_LOOP_BEGIN__ */
      ComponentState_nes_ppu_regs *io = &cpu->comp_nes_ppu_regs;
      static uint32_t framebuf[256u * 240u];
      static uint16_t line_sprite_idx[8];
      static uint8_t line_sprite_count = 0u;
      static uint8_t line_sprite_ready = 0u;
      static int16_t line_bg_scanline = -1;
      static uint16_t line_bg_base_x = 0u;
      static uint16_t line_bg_base_y = 0u;
      static const uint32_t nes_palette[64] = {
          0xFF7C7C7Cu,0xFF0000FCu,0xFF0000BCu,0xFF4428BCu,0xFF940084u,0xFFA80020u,0xFFA81000u,0xFF881400u,
          0xFF503000u,0xFF007800u,0xFF006800u,0xFF005800u,0xFF004058u,0xFF000000u,0xFF000000u,0xFF000000u,
          0xFFBCBCBCu,0xFF0078F8u,0xFF0058F8u,0xFF6844FCu,0xFFD800CCu,0xFFE40058u,0xFFF83800u,0xFFE45C10u,
          0xFFAC7C00u,0xFF00B800u,0xFF00A800u,0xFF00A844u,0xFF008888u,0xFF000000u,0xFF000000u,0xFF000000u,
          0xFFF8F8F8u,0xFF3CBCFCu,0xFF6888FCu,0xFF9878F8u,0xFFF878F8u,0xFFF85898u,0xFFF87858u,0xFFFCA044u,
          0xFFF8B800u,0xFFB8F818u,0xFF58D854u,0xFF58F898u,0xFF00E8D8u,0xFF787878u,0xFF000000u,0xFF000000u,
          0xFFFCFCFCu,0xFFA4E4FCu,0xFFB8B8F8u,0xFFD8B8F8u,0xFFF8B8F8u,0xFFF8A4C0u,0xFFF0D0B0u,0xFFFCE0A8u,
