metadata:
  id: wd1793_fdc
  type: io_controller
  model: wd1793_fdc
  version: "1.0"

state:
  - name: fdc_status
    type: uint8_t
    initial: "0x04"
  - name: fdc_track
    type: uint8_t
    initial: "0"
  - name: fdc_sector
    type: uint8_t
    initial: "1"
  - name: fdc_data
    type: uint8_t
    initial: "0"
  - name: fdc_drive_select
    type: uint8_t
    initial: "0"
  - name: fdc_cmd_pending
    type: uint8_t
    initial: "0"
  - name: fdc_deadline
    type: uint64_t
    initial: "0"
  - name: fdc_last_cmd
    type: uint8_t
    initial: "0"
  - name: fdc_busy
    type: uint8_t
    initial: "0"
  - name: fdc_drq
    type: uint8_t
    initial: "0"
  - name: fdc_irq_pending
    type: uint8_t
    initial: "0"
  - name: fdc_data_index
    type: uint16_t
    initial: "0"
  - name: fdc_data_count
    type: uint16_t
    initial: "0"
  - name: fdc_sector_buffer
    type: uint8_t *
    initial: "NULL"
  - name: fdc_media_loaded
    type: uint8_t
    initial: "0"
  - name: fdc_sectors_per_track
    type: uint8_t
    initial: "10"
  - name: fdc_track_count
    type: uint16_t
    initial: "0"
  - name: fdc_nmi_mask
    type: uint8_t
    initial: "0"
  - name: fdc_source_component
    type: char *
    initial: "NULL"

interfaces:
  callbacks:
    - name: fdc_port_read
      args: [u8]
      returns: u8
    - name: fdc_port_write
      args: [u8, u8]
      returns: u8
    - name: fdc_step_tick
      args: [u64]
      returns: u8
    - name: load_media
      args: [ptr]
      returns: u8
    - name: unload_media
      args: []
      returns: u8
    - name: query_drive_activity
      args: []
      returns: u8
  handlers: []
  signals: []

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      if (comp->fdc_sector_buffer == NULL) {
          comp->fdc_sector_buffer = (uint8_t *)calloc(256u, sizeof(uint8_t));
      }
      comp->fdc_media_loaded = 0u;
      comp->fdc_sectors_per_track = 10u;
      comp->fdc_track_count = 0u;
      comp->fdc_source_component = NULL;
    reset: |
      comp->fdc_status = 0x04u;
      comp->fdc_track = 0u;
      comp->fdc_sector = 1u;
      comp->fdc_data = 0u;
      comp->fdc_drive_select = 0u;
      comp->fdc_cmd_pending = 0u;
      comp->fdc_deadline = 0u;
      comp->fdc_last_cmd = 0u;
      comp->fdc_busy = 0u;
      comp->fdc_drq = 0u;
      comp->fdc_irq_pending = 0u;
      comp->fdc_data_index = 0u;
      comp->fdc_data_count = 0u;
      comp->fdc_nmi_mask = 0u;
      if (comp->fdc_sector_buffer != NULL) {
          memset(comp->fdc_sector_buffer, 0, 256u);
      }
    destroy: |
      if (comp->fdc_sector_buffer != NULL) {
          free(comp->fdc_sector_buffer);
          comp->fdc_sector_buffer = NULL;
      }
      if (comp->fdc_source_component != NULL) {
          free(comp->fdc_source_component);
          comp->fdc_source_component = NULL;
      }
      comp->fdc_media_loaded = 0u;
      comp->fdc_track_count = 0u;
  callback_handlers:
    load_media: |
      const char *path = (argc > 0u) ? (const char *)(uintptr_t)args[0] : NULL;
      const char *source_component = (argc > 2u && args[2] != 0u) ? (const char *)(uintptr_t)args[2] : NULL;
      if (path == NULL || path[0] == '\0') return 0u;
      if (source_component == NULL || source_component[0] == '\0') return 0u;
      if (comp->fdc_source_component != NULL) {
          if (comp->fdc_media_loaded != 0u) {
              (void)cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "unload_media", NULL, 0u);
          }
          free(comp->fdc_source_component);
          comp->fdc_source_component = NULL;
      }
      comp->fdc_source_component = strdup(source_component);
      if (comp->fdc_source_component == NULL) return 0u;
      if (cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "load_media", args, 1u) == 0u) {
          free(comp->fdc_source_component);
          comp->fdc_source_component = NULL;
          return 0u;
      }
      {
          uint64_t packed_geometry = cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "query_geometry", NULL, 0u);
          comp->fdc_sectors_per_track = (uint8_t)(packed_geometry & 0xFFu);
          comp->fdc_track_count = (uint16_t)((packed_geometry >> 8u) & 0xFFFFu);
      }
      comp->fdc_media_loaded = 1u;
      comp->fdc_track = 0u;
      comp->fdc_sector = 1u;
      comp->fdc_status = 0x04u;
      comp->fdc_nmi_mask = 0u;
      if (comp->fdc_sector_buffer != NULL) memset(comp->fdc_sector_buffer, 0, 256u);
      return 1u;
    unload_media: |
      if (comp->fdc_source_component != NULL) {
          if (comp->fdc_media_loaded != 0u) {
              (void)cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "unload_media", NULL, 0u);
          }
          free(comp->fdc_source_component);
          comp->fdc_source_component = NULL;
      }
      comp->fdc_media_loaded = 0u;
      comp->fdc_sectors_per_track = 10u;
      comp->fdc_track_count = 0u;
      comp->fdc_track = 0u;
      comp->fdc_sector = 1u;
      comp->fdc_nmi_mask = 0u;
      if (comp->fdc_sector_buffer != NULL) {
          memset(comp->fdc_sector_buffer, 0, 256u);
      }
      return 1u;
    query_drive_activity: |
      if (comp->fdc_source_component != NULL && comp->fdc_source_component[0] != '\0') {
          return cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "query_drive_activity", NULL, 0u);
      }
      return 0u;
    fdc_port_read: |
      if (argc < 1u) return 0xFFu;
      static int trace_enabled = -1;
      static FILE *trace_fp = NULL;
      uint8_t p = (uint8_t)(args[0] & 0xFFu);
      uint8_t value = 0xFFu;
      if (trace_enabled < 0) {
          const char *env = cpu_host_hal_getenv("PASM_TRS80_FDC_TRACE");
          trace_enabled = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          if (trace_enabled != 0) {
              const char *trace_path = cpu_host_hal_getenv("PASM_TRS80_FDC_TRACE_FILE");
              if (trace_path == NULL || trace_path[0] == '\0') trace_path = "/tmp/trs80_fdc_trace.log";
              trace_fp = fopen(trace_path, "a");
              if (trace_fp == NULL) trace_fp = stderr;
          }
      }
      if (p == 0xE4u) {
          value = 0x3Fu;
          if (comp->fdc_drq == 0u) value |= 0x40u;
          if (comp->fdc_irq_pending == 0u) value |= 0x80u;
      } else if (p == 0xF0u) {
          if (comp->fdc_cmd_pending != 0u &&
              (comp->fdc_drive_select & 0x40u) != 0u &&
              cpu->total_cycles < comp->fdc_deadline) {
              uint64_t step_args[1] = { cpu->total_cycles };
              comp->fdc_deadline = cpu->total_cycles;
              (void)cpu_component_dispatch_callback(cpu, "wd1793_fdc", "fdc_step_tick", step_args, 1);
          }
          uint8_t status = (uint8_t)(comp->fdc_status & 0x7Cu);
          uint8_t cmd_class = (uint8_t)(comp->fdc_last_cmd & 0xF0u);
          uint8_t type1_status = ((comp->fdc_last_cmd & 0x80u) == 0u && cmd_class != 0xD0u) ? 1u : 0u;
          uint8_t drive_selected = ((comp->fdc_drive_select & 0x0Fu) != 0u) ? 1u : 0u;
          uint8_t media_ready = (drive_selected != 0u && comp->fdc_media_loaded != 0u) ? 1u : 0u;
          if (comp->fdc_busy != 0u) status |= 0x01u;
          if (type1_status != 0u && media_ready != 0u) {
              status |= 0x20u;
              uint64_t rev_period = (CPU_SYSTEM_CLOCK_HZ > 0u) ? (CPU_SYSTEM_CLOCK_HZ / 5u) : 800000u;
              uint64_t pulse_width = rev_period / 40u;
              if (rev_period == 0u) rev_period = 800000u;
              if (pulse_width == 0u) pulse_width = 1u;
              if ((cpu->total_cycles % rev_period) < pulse_width) status |= 0x02u;
          }
          if (type1_status != 0u && comp->fdc_track == 0u) status |= 0x04u;
          if (comp->fdc_drq != 0u) status |= 0x02u;
          if (media_ready == 0u) status |= 0x80u;
          if (trace_enabled != 0) {
              fprintf(trace_fp, "fdc_rd cycle=%llu pc=%04X port=%02X val=%02X status=%02X sel=%02X ready=%u busy=%u drq=%u irq=%u track=%u sector=%u\n",
                      (unsigned long long)cpu->total_cycles, (unsigned)cpu->pc, (unsigned)p, (unsigned)status, (unsigned)comp->fdc_status,
                      (unsigned)comp->fdc_drive_select, (unsigned)media_ready, (unsigned)comp->fdc_busy,
                      (unsigned)comp->fdc_drq, (unsigned)comp->fdc_irq_pending, (unsigned)comp->fdc_track,
                      (unsigned)comp->fdc_sector);
              fflush(trace_fp);
          }
          value = status;
          comp->fdc_irq_pending = 0u;
      } else if (p == 0xF1u) {
          value = comp->fdc_track;
      } else if (p == 0xF2u) {
          value = comp->fdc_sector;
      } else if (p == 0xF3u) {
          if (comp->fdc_drq != 0u && comp->fdc_sector_buffer != NULL && comp->fdc_data_count > 0u) {
              uint16_t idx = comp->fdc_data_index;
              value = comp->fdc_sector_buffer[(idx < 256u) ? idx : 255u];
              comp->fdc_data = value;
              comp->fdc_data_index = (uint16_t)(comp->fdc_data_index + 1u);
              comp->fdc_data_count = (uint16_t)(comp->fdc_data_count - 1u);
              if (comp->fdc_data_count == 0u) {
                  comp->fdc_drq = 0u;
                  comp->fdc_cmd_pending = 2u;
                  comp->fdc_deadline = cpu->total_cycles + 64u;
              }
              if (trace_enabled != 0) {
                  fprintf(trace_fp, "fdc_rd cycle=%llu pc=%04X port=F3 val=%02X idx=%u remain=%u busy=%u drq=%u track=%u sector=%u\n",
                          (unsigned long long)cpu->total_cycles, (unsigned)cpu->pc, (unsigned)value,
                          (unsigned)comp->fdc_data_index, (unsigned)comp->fdc_data_count,
                          (unsigned)comp->fdc_busy, (unsigned)comp->fdc_drq,
                          (unsigned)comp->fdc_track, (unsigned)comp->fdc_sector);
                  fflush(trace_fp);
              }
          } else {
              value = comp->fdc_data;
          }
      }
      return value;
    fdc_port_write: |
      static int trace_enabled = -1;
      static FILE *trace_fp = NULL;
      if (trace_enabled < 0) {
          const char *env = cpu_host_hal_getenv("PASM_TRS80_FDC_TRACE");
          trace_enabled = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          if (trace_enabled != 0) {
              const char *trace_path = cpu_host_hal_getenv("PASM_TRS80_FDC_TRACE_FILE");
              if (trace_path == NULL || trace_path[0] == '\0') trace_path = "/tmp/trs80_fdc_trace.log";
              trace_fp = fopen(trace_path, "a");
              if (trace_fp == NULL) trace_fp = stderr;
          }
      }
      if (argc < 2u) return 0u;
      uint8_t p = (uint8_t)(args[0] & 0xFFu);
      uint8_t value = (uint8_t)(args[1] & 0xFFu);
      if (trace_enabled != 0 && (p == 0xE4u || (p >= 0xF0u && p <= 0xF4u) || (p & 0xFCu) == 0xF4u)) {
          fprintf(trace_fp, "fdc_wr cycle=%llu pc=%04X port=%02X val=%02X track=%u sector=%u status=%02X\n",
                  (unsigned long long)cpu->total_cycles, (unsigned)cpu->pc, (unsigned)p, (unsigned)value,
                  (unsigned)comp->fdc_track, (unsigned)comp->fdc_sector, (unsigned)comp->fdc_status);
          fflush(trace_fp);
      }
      if (p == 0xE4u) {
          comp->fdc_nmi_mask = value;
      } else if (p == 0xF0u) {
          uint8_t cmd = (uint8_t)(value & 0xF0u);
          comp->fdc_last_cmd = value;
          comp->fdc_irq_pending = 0u;
          if ((value & 0x80u) == 0u) {
          uint64_t cmd_cycles = 2000u;
          comp->fdc_busy = 1u;
          comp->fdc_drq = 0u;
          comp->fdc_data_index = 0u;
          comp->fdc_data_count = 0u;
          comp->fdc_cmd_pending = 1u;
          comp->fdc_deadline = cpu->total_cycles + cmd_cycles;
          comp->fdc_status = (comp->fdc_track == 0u) ? 0x04u : 0x00u;
        } else if (cmd == 0x80u) {
          uint64_t cmd_cycles = 64u;
          comp->fdc_busy = 1u;
          comp->fdc_drq = 0u;
          comp->fdc_data_index = 0u;
          comp->fdc_data_count = 0u;
              comp->fdc_cmd_pending = 1u;
              comp->fdc_deadline = cpu->total_cycles + cmd_cycles;
              comp->fdc_status = 0x04u;
          } else if (cmd == 0xD0u) {
              comp->fdc_busy = 0u;
              comp->fdc_drq = 0u;
              comp->fdc_cmd_pending = 0u;
              comp->fdc_data_index = 0u;
              comp->fdc_data_count = 0u;
              comp->fdc_irq_pending = 1u;
              if ((comp->fdc_nmi_mask & 0x80u) != 0u) {
                  uint64_t irq_args[1] = { 2u };
                  (void)cpu_component_dispatch_callback(cpu, "trs80_m4irq", "pulse_irq", irq_args, 1);
              }
          } else {
              comp->fdc_busy = 0u;
              comp->fdc_drq = 0u;
              comp->fdc_cmd_pending = 0u;
              comp->fdc_data_index = 0u;
              comp->fdc_data_count = 0u;
              comp->fdc_status = 0x04u;
          }
      } else if (p == 0xF1u) {
          comp->fdc_track = value;
      } else if (p == 0xF2u) {
          comp->fdc_sector = value;
      } else if (p == 0xF3u) {
          comp->fdc_data = value;
      } else if ((p & 0xFCu) == 0xF4u) {
          comp->fdc_drive_select = value;
      }
      return 0u;
    fdc_step_tick: |
      static int trace_enabled = -1;
      static FILE *trace_fp = NULL;
      if (trace_enabled < 0) {
          const char *env = cpu_host_hal_getenv("PASM_TRS80_FDC_TRACE");
          trace_enabled = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          if (trace_enabled != 0) {
              const char *trace_path = cpu_host_hal_getenv("PASM_TRS80_FDC_TRACE_FILE");
              if (trace_path == NULL || trace_path[0] == '\0') trace_path = "/tmp/trs80_fdc_trace.log";
              trace_fp = fopen(trace_path, "a");
              if (trace_fp == NULL) trace_fp = stderr;
          }
      }
      uint64_t now = (argc > 0u) ? (uint64_t)args[0] : cpu->total_cycles;
      if (comp->fdc_cmd_pending != 0u && now >= comp->fdc_deadline) {
          if (comp->fdc_cmd_pending == 2u) {
              comp->fdc_cmd_pending = 0u;
              comp->fdc_busy = 0u;
              comp->fdc_irq_pending = 1u;
              if ((comp->fdc_nmi_mask & 0x80u) != 0u) {
                  uint64_t irq_args[1] = { 2u };
                  (void)cpu_component_dispatch_callback(cpu, "trs80_m4irq", "pulse_irq", irq_args, 1);
              }
              return 0u;
          }
          uint8_t read_ok = 0u;
          comp->fdc_cmd_pending = 0u;
          comp->fdc_drq = 0u;
          comp->fdc_data_index = 0u;
          comp->fdc_data_count = 0u;
          if ((comp->fdc_last_cmd & 0x80u) == 0u) {
              comp->fdc_busy = 0u;
              uint8_t cmd = (uint8_t)(comp->fdc_last_cmd & 0xF0u);
              uint8_t verify_ok = 1u;
              if (cmd == 0x00u) {
                  comp->fdc_track = 0u;
              } else if (cmd == 0x10u) {
                  uint8_t target = comp->fdc_data;
                  if (comp->fdc_track_count != 0u && target >= comp->fdc_track_count) {
                      target = (uint8_t)(comp->fdc_track_count - 1u);
                  }
                  comp->fdc_track = target;
              } else if (cmd == 0x40u || cmd == 0x50u) {
                  uint8_t next = (uint8_t)(comp->fdc_track + 1u);
                  if (comp->fdc_track_count == 0u || next < comp->fdc_track_count) {
                      comp->fdc_track = next;
                  }
              } else if (cmd == 0x60u || cmd == 0x70u) {
                  if (comp->fdc_track > 0u) {
                      comp->fdc_track = (uint8_t)(comp->fdc_track - 1u);
                  }
              }
              comp->fdc_status = (comp->fdc_track == 0u) ? 0x04u : 0x00u;
              if ((comp->fdc_last_cmd & 0x04u) != 0u) {
                  if (comp->fdc_source_component != NULL && comp->fdc_source_component[0] != '\0') {
                      uint8_t target_side = (uint8_t)(((comp->fdc_drive_select & 0x10u) != 0u) ? 1u : 0u);
                      uint8_t target_density = (uint8_t)(((comp->fdc_drive_select & 0x80u) != 0u) ? 1u : 0u);
                      uint64_t verify_args[3] = { (uint64_t)comp->fdc_track, (uint64_t)target_side, (uint64_t)target_density };
                      verify_ok = (uint8_t)cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "query_track_present", verify_args, 3u);
                  } else if (!(comp->fdc_media_loaded != 0u &&
                               comp->fdc_sectors_per_track != 0u &&
                               comp->fdc_track < comp->fdc_track_count)) {
                      verify_ok = 0u;
                  }
                  if (verify_ok == 0u) {
                      comp->fdc_status |= 0x10u;
                  }
              }
              if (trace_enabled != 0) {
                  fprintf(trace_fp, "fdc_type1 cycle=%llu cmd=%02X track=%u status=%02X\n",
                          (unsigned long long)now, (unsigned)comp->fdc_last_cmd,
                          (unsigned)comp->fdc_track, (unsigned)comp->fdc_status);
                  fflush(trace_fp);
              }
              comp->fdc_irq_pending = 1u;
              if ((comp->fdc_nmi_mask & 0x80u) != 0u) {
                  uint64_t irq_args[1] = { 2u };
                  (void)cpu_component_dispatch_callback(cpu, "trs80_m4irq", "pulse_irq", irq_args, 1);
              }
          } else if ((comp->fdc_last_cmd & 0xF0u) == 0x80u && comp->fdc_sector_buffer != NULL) {
              if (comp->fdc_source_component != NULL && comp->fdc_source_component[0] != '\0') {
                  uint8_t target_track = comp->fdc_track;
                  uint8_t target_sector = comp->fdc_sector;
                  uint8_t target_side = (uint8_t)(((comp->fdc_drive_select & 0x10u) != 0u) ? 1u : 0u);
                  uint8_t target_density = (uint8_t)(((comp->fdc_drive_select & 0x80u) != 0u) ? 1u : 0u);
                  uint64_t read_args[5] = {
                      (uint64_t)target_track,
                      (uint64_t)target_sector,
                      (uint64_t)target_side,
                      (uint64_t)target_density,
                      (uint64_t)(uintptr_t)comp->fdc_sector_buffer
                  };
                  uint8_t sector_result = (uint8_t)cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "read_sector", read_args, 5u);
                  read_ok = (uint8_t)(sector_result & 0x01u);
                  if (read_ok != 0u) {
                      comp->fdc_status = (uint8_t)(sector_result & 0xFEu);
                  }
              }
              if (read_ok == 0u) {
                  comp->fdc_busy = 0u;
                  memset(comp->fdc_sector_buffer, 0xE5, 256u);
                  comp->fdc_status = 0x10u;
                  comp->fdc_irq_pending = 1u;
                  if ((comp->fdc_nmi_mask & 0x80u) != 0u) {
                      uint64_t irq_args[1] = { 2u };
                      (void)cpu_component_dispatch_callback(cpu, "trs80_m4irq", "pulse_irq", irq_args, 1);
                  }
              } else {
                  comp->fdc_busy = 1u;
                  if (comp->fdc_status == 0x04u) {
                      comp->fdc_status = 0x00u;
                  }
              }
              if (trace_enabled != 0) {
                  fprintf(trace_fp, "fdc_read cycle=%llu cmd=%02X track=%u sector=%u ok=%u status=%02X drq=%u count=%u\n",
                          (unsigned long long)now, (unsigned)comp->fdc_last_cmd,
                          (unsigned)comp->fdc_track, (unsigned)comp->fdc_sector, (unsigned)read_ok,
                          (unsigned)comp->fdc_status, 1u, 256u);
                  fflush(trace_fp);
              }
              if (read_ok != 0u) {
                  comp->fdc_drq = 1u;
                  comp->fdc_data_count = 256u;
              }
          }
      }
      return 0u;
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
