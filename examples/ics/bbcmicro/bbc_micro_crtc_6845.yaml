        start: 0xFE00
        size: 0x0100
        access: [read, write]

behavior:
  snippets:
    reset: |
      {
          const char *candidates[4];
          size_t candidate_count = 0u;
          const char *sysdir = getenv("PASM_SYSTEM_DIR");
          if (sysdir != NULL && sysdir[0] != '\0') {
              candidates[candidate_count++] = sysdir;
          }
          candidates[candidate_count++] = "examples/systems/bbcmicro";
          candidates[candidate_count++] = ".";
          if (comp->sideways_basic_rom == NULL || comp->sideways_basic_size == 0u) {
              for (size_t i = 0u; i < candidate_count; ++i) {
                  char path[1024];
                  FILE *fp;
                  long file_size;
                  size_t read_len;
                  int n = snprintf(path, sizeof(path), "%s/../../roms/bbcmicro/BASIC2.ROM", candidates[i]);
                  if (n <= 0 || (size_t)n >= sizeof(path)) continue;
                  fp = fopen(path, "rb");
                  if (fp == NULL) continue;
                  if (fseek(fp, 0L, SEEK_END) == 0) {
                      file_size = ftell(fp);
                      if (file_size > 0 && fseek(fp, 0L, SEEK_SET) == 0) {
                          size_t alloc_size = (size_t)((file_size < 0x4000L) ? 0x4000L : file_size);
                          comp->sideways_basic_rom = (uint8_t *)malloc(alloc_size);
                          if (comp->sideways_basic_rom != NULL) {
                              memset(comp->sideways_basic_rom, 0xFF, alloc_size);
                              read_len = fread(comp->sideways_basic_rom, 1u, (size_t)file_size, fp);
                              if (read_len == (size_t)file_size) {
                                  comp->sideways_basic_size = (uint32_t)alloc_size;
                              } else {
                                  free(comp->sideways_basic_rom);
                                  comp->sideways_basic_rom = NULL;
                              }
                          }
                      }
                  }
                  fclose(fp);
                  if (comp->sideways_basic_rom != NULL && comp->sideways_basic_size != 0u) break;
              }
          }
          if (comp->sideways_dfs_rom == NULL || comp->sideways_dfs_size == 0u) {
              for (size_t i = 0u; i < candidate_count; ++i) {
                  char path[1024];
                  FILE *fp;
                  long file_size;
                  size_t read_len;
                  int n = snprintf(path, sizeof(path), "%s/../../roms/bbcmicro/DFS-0.9.rom", candidates[i]);
                  if (n <= 0 || (size_t)n >= sizeof(path)) continue;
                  fp = fopen(path, "rb");
                  if (fp == NULL) continue;
                  if (fseek(fp, 0L, SEEK_END) == 0) {
                      file_size = ftell(fp);
                      if (file_size > 0 && fseek(fp, 0L, SEEK_SET) == 0) {
                          size_t alloc_size = (size_t)((file_size < 0x4000L) ? 0x4000L : file_size);
                          comp->sideways_dfs_rom = (uint8_t *)malloc(alloc_size);
                          if (comp->sideways_dfs_rom != NULL) {
                              memset(comp->sideways_dfs_rom, 0xFF, alloc_size);
                              read_len = fread(comp->sideways_dfs_rom, 1u, (size_t)file_size, fp);
                              if (read_len == (size_t)file_size) {
                                  comp->sideways_dfs_size = (uint32_t)alloc_size;
                              } else {
                                  free(comp->sideways_dfs_rom);
                                  comp->sideways_dfs_rom = NULL;
                              }
                          }
                      }
                  }
                  fclose(fp);
                  if (comp->sideways_dfs_rom != NULL && comp->sideways_dfs_size != 0u) break;
              }
          }
          if (comp->fdc_sector_buffer == NULL) {
              comp->fdc_sector_buffer = (uint8_t *)calloc(256u, 1u);
          } else {
              memset(comp->fdc_sector_buffer, 0, 256u);
          }
          comp->fdc_command = 0u;
          comp->fdc_params0 = 0u;
          comp->fdc_params1 = 0u;
          comp->fdc_params2 = 0u;
          comp->fdc_params3 = 0u;
          comp->fdc_params4 = 0u;
          comp->fdc_param_count = 0u;
          comp->fdc_param_req = 0u;
          comp->fdc_drive_select = 0u;
          comp->fdc_curtrack0 = 0u;
          comp->fdc_curtrack1 = 0u;
          comp->fdc_cursector = 0u;
          comp->fdc_sectors_left = 0u;
          comp->fdc_sector_size = 0u;
          comp->fdc_data_count = 0u;
          comp->fdc_data_index = 0u;
          comp->fdc_phase = 0u;
          comp->fdc_last_host_activity_cycle = 0u;
          comp->fdc_deadline_cycle = 0u;
          comp->fdc_status = 0u;
          comp->fdc_result = 0u;
          comp->fdc_data = 0u;
          {
              const char *auto_path = getenv("PASM_EMU_FLOPPY_AUTO_PATH");
              if (auto_path != NULL && auto_path[0] != '\0') {
                  comp->auto_boot_shift_until_cycle = cpu->total_cycles + (uint64_t)(CPU_SYSTEM_CLOCK_HZ * 1u);
                  cpu->memory[0x028Cu] = 0x0Fu;
                  cpu->memory[0x028Du] = 0x02u;
                  cpu->memory[0x028Eu] = 0x80u;
                  cpu->memory[0x028Fu] = 0xFFu;
                  cpu->memory[0x024Au] = 0x0Eu;
              } else {
                  comp->auto_boot_shift_until_cycle = 0u;
              }
          }
      }
    mem_read_pre: |
      /* Sideways ROM window 8000-BFFF: BASIC in slot F, DFS in slot E. */
      if (addr >= 0x8000u && addr < 0xC000u) {
          uint32_t rom_off = (uint32_t)(addr - 0x8000u);
          if ((comp->romsel & 0x0Fu) == 0x0Fu) {
              if (comp->sideways_basic_rom != NULL && rom_off < comp->sideways_basic_size) {
                  return comp->sideways_basic_rom[rom_off];
              }
              return 0xFFu;
          }
          if ((comp->romsel & 0x0Fu) == 0x0Eu) {
              if (comp->sideways_dfs_rom != NULL && rom_off < comp->sideways_dfs_size) {
                  return comp->sideways_dfs_rom[rom_off];
              }
              return 0xFFu;
          }
          /* Unpopulated sideways ROM socket (open bus approximation). */
          return 0xFFu;
      }
      if ((addr & 0xFFF0u) == 0xFE40u || (addr & 0xFFF0u) == 0xFE60u) {
          uint8_t is_user_via = (uint8_t)(((addr & 0xFFF0u) == 0xFE60u) ? 1u : 0u);
          uint8_t reg = (uint8_t)(addr & 0x000Fu);
          uint8_t *orb = is_user_via ? &comp->uvia_orb : &comp->via_orb;
          uint8_t *ora = is_user_via ? &comp->uvia_ora : &comp->via_ora;
          uint8_t *ddrb = is_user_via ? &comp->uvia_ddrb : &comp->via_ddrb;
          uint8_t *ddra = is_user_via ? &comp->uvia_ddra : &comp->via_ddra;
          uint8_t *acr = is_user_via ? &comp->uvia_acr : &comp->via_acr;
          uint8_t *pcr = is_user_via ? &comp->uvia_pcr : &comp->via_pcr;
          uint8_t *ifr = is_user_via ? &comp->uvia_ifr : &comp->via_ifr;
          uint8_t *ier = is_user_via ? &comp->uvia_ier : &comp->via_ier;
          uint16_t *t1c = is_user_via ? &comp->uvia_t1_counter : &comp->via_t1_counter;
          uint16_t *t1l = is_user_via ? &comp->uvia_t1_latch : &comp->via_t1_latch;
          if (reg == 0x00u) {
              return (uint8_t)((*orb & *ddrb) | (0xFFu & (uint8_t)~(*ddrb)));
          }
          if (reg == 0x01u) {
              if (is_user_via == 0u) {
                  /* Reading ORA clears CA1 and, unless independent CA2 interrupt mode, clears CA2. */
                  *ifr = (uint8_t)(*ifr & (uint8_t)~0x02u);
                  if ((*pcr & 0x0Au) != 0x02u) {
                      *ifr = (uint8_t)(*ifr & (uint8_t)~0x01u);
                  }
                  /* BBC-style key scan on slow data bus (System VIA port A):
                     col=sdb&0x0F (0..10 valid), row=(sdb>>4)&0x07. */
                  uint8_t sdb_out = *ora;
                  uint8_t col = (uint8_t)(sdb_out & 0x0Fu);
                  uint8_t row = (uint8_t)((sdb_out >> 4u) & 0x07u);
                  uint8_t kb_row = 0xFFu;
                  uint64_t cb_args[1] = { (uint64_t)col };
                  if (col <= 10u) {
                      kb_row = (uint8_t)cpu_component_call(cpu, "bbc_micro_crtc_6845", "keyboard_read_row", cb_args, 1);
                  }
                  if (col == 0u && cpu->total_cycles < comp->auto_boot_shift_until_cycle) {
                      kb_row = (uint8_t)(kb_row & (uint8_t)~0x01u);
                  }
                  uint8_t key_down = 0u;
                  key_down = (uint8_t)(((kb_row & (uint8_t)(1u << row)) == 0u) ? 1u : 0u);
                  /* BBC SHIFT LOCK (col6,row7) is a latch/toggle key, not momentary. */
                  if (col == 6u && row == 7u) {
                      uint8_t raw = key_down;
                      if (raw != 0u && comp->shiftlock_prev_raw == 0u) {
                          comp->shiftlock_latched ^= 1u;
                      }
                      comp->shiftlock_prev_raw = raw;
                      key_down = comp->shiftlock_latched;
                  }
                  /* Reflect key sense in bit7 of input side. */
                  uint8_t sdb_in = (uint8_t)(sdb_out & (uint8_t)~0x80u);
                  if ((comp->ic32 & 0x08u) == 0u) {
                      /* Drive keyboard sense on bit7 for MOS scan reads. */
                      if (key_down != 0u) sdb_in = (uint8_t)(sdb_in | 0x80u);
                  }
                  /* Return current slow-data-bus value directly for System VIA keyboard path.
                     DDRA masking can hide key-sense bit7 on some ROM init sequences. */
                  return sdb_in;
              }
              *ifr = (uint8_t)(*ifr & (uint8_t)~0x02u);
              if ((*pcr & 0x0Au) != 0x02u) {
                  *ifr = (uint8_t)(*ifr & (uint8_t)~0x01u);
              }
              return (uint8_t)((*ora & *ddra) | (0xFFu & (uint8_t)~(*ddra)));
          }
          if (reg == 0x02u) return *ddrb;
          if (reg == 0x03u) return *ddra;
          if (reg == 0x04u) { *ifr = (uint8_t)(*ifr & (uint8_t)~0x40u); return (uint8_t)(*t1c & 0xFFu); }
          if (reg == 0x05u) { *ifr = (uint8_t)(*ifr & (uint8_t)~0x40u); return (uint8_t)((*t1c >> 8u) & 0xFFu); }
          if (reg == 0x06u) return (uint8_t)(*t1l & 0xFFu);
          if (reg == 0x07u) return (uint8_t)((*t1l >> 8u) & 0xFFu);
          if (reg == 0x0Bu) return *acr;
          if (reg == 0x0Cu) return *pcr;
          if (reg == 0x0Du) { uint8_t v = *ifr; if (((*ifr & *ier) & 0x7Fu) != 0u) v = (uint8_t)(v | 0x80u); return v; }
          if (reg == 0x0Eu) return (uint8_t)(*ier | 0x80u);
          if (reg == 0x0Fu) {
              if (is_user_via == 0u) {
                  *ifr = (uint8_t)(*ifr & (uint8_t)~0x02u);
                  if ((*pcr & 0x0Au) != 0x02u) {
                      *ifr = (uint8_t)(*ifr & (uint8_t)~0x01u);
                  }
                  /* ORA no-handshake must still reflect live slow-data-bus keyboard state. */
                  uint8_t sdb_out = *ora;
                  uint8_t col = (uint8_t)(sdb_out & 0x0Fu);
                  uint8_t row = (uint8_t)((sdb_out >> 4u) & 0x07u);
                  uint8_t kb_row = 0xFFu;
                  uint64_t cb_args[1] = { (uint64_t)col };
                  if (col <= 10u) {
                      kb_row = (uint8_t)cpu_component_call(cpu, "bbc_micro_crtc_6845", "keyboard_read_row", cb_args, 1);
                  }
                  if (col == 0u && cpu->total_cycles < comp->auto_boot_shift_until_cycle) {
                      kb_row = (uint8_t)(kb_row & (uint8_t)~0x01u);
                  }
                  uint8_t key_down = 0u;
                  key_down = (uint8_t)(((kb_row & (uint8_t)(1u << row)) == 0u) ? 1u : 0u);
                  if (col == 6u && row == 7u) {
                      uint8_t raw = key_down;
                      if (raw != 0u && comp->shiftlock_prev_raw == 0u) {
                          comp->shiftlock_latched ^= 1u;
                      }
                      comp->shiftlock_prev_raw = raw;
                      key_down = comp->shiftlock_latched;
                  }
                  {
                      uint8_t sdb_in = (uint8_t)(sdb_out & (uint8_t)~0x80u);
                      if ((comp->ic32 & 0x08u) == 0u) {
                          if (key_down != 0u) sdb_in = (uint8_t)(sdb_in | 0x80u);
                      }
                      return sdb_in;
                  }
              }
              *ifr = (uint8_t)(*ifr & (uint8_t)~0x02u);
              if ((*pcr & 0x0Au) != 0x02u) {
                  *ifr = (uint8_t)(*ifr & (uint8_t)~0x01u);
              }
              return *ora;
          }
          return 0xFFu;
      }
      if (addr == 0xFE20u) {
          return comp->ula_ctrl;
      }
      if (addr == 0xFE10u) {
          return (uint8_t)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "read_serial_ula", NULL, 0);
      }
      if (addr == 0xFE18u) {
          return comp->adc_status;
      }
      if (addr == 0xFE21u) {
          return comp->palette_reg;
      }
      if (addr == 0xFE30u) {
          return (uint8_t)(comp->romsel & 0x0Fu);
      }
      if (addr == 0xFE08u) {
          return (uint8_t)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "read_status", NULL, 0);
      }
      if (addr == 0xFE09u) {
          return (uint8_t)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "read_data", NULL, 0);
      }
      if ((addr & 0xFFF8u) == 0xFE80u) {
          uint8_t reg = (uint8_t)(addr & 0x0007u);
          comp->fdc_last_host_activity_cycle = cpu->total_cycles;
          if (reg == 0u) {
              return comp->fdc_status;
          }
          if (reg == 1u) {
              uint8_t value = comp->fdc_result;
              comp->fdc_status = (uint8_t)(comp->fdc_status & (uint8_t)~0x18u);
              return value;
          }
          if (reg == 4u) {
              uint8_t value = comp->fdc_data;
              comp->fdc_status = (uint8_t)(comp->fdc_status & (uint8_t)~0x0Cu);
              if (comp->fdc_data_count != 0u && comp->fdc_sector_buffer != NULL) {
                  comp->fdc_phase = 3u;
                  comp->fdc_deadline_cycle = cpu->total_cycles + 200u;
                  comp->fdc_status = 0x80u;
              } else if (comp->fdc_sectors_left > 1u) {
                  comp->fdc_phase = 5u;
                  comp->fdc_deadline_cycle = cpu->total_cycles + 200u;
                  comp->fdc_status = 0x80u;
              } else {
                  comp->fdc_phase = 6u;
                  comp->fdc_deadline_cycle = cpu->total_cycles + 200u;
                  comp->fdc_status = 0x80u;
              }
              return value;
          }
          return 0u;
      }
      if ((addr & 0xFFF0u) == 0xFEE0u) {
          /* Tube ULA not present in this baseline model. */
          return 0x00u;
      }
      if ((addr & 0xFF00u) == 0xFE00u) {
          return 0x00u;
      }
    init: |
      (void)cpu;
      if (comp->fdc_sector_buffer == NULL) {
          comp->fdc_sector_buffer = (uint8_t *)calloc(256u, 1u);
      }
    destroy: |
      if (comp->sideways_basic_rom != NULL) {
          free(comp->sideways_basic_rom);
          comp->sideways_basic_rom = NULL;
      }
      comp->sideways_basic_size = 0u;
      if (comp->sideways_dfs_rom != NULL) {
          free(comp->sideways_dfs_rom);
          comp->sideways_dfs_rom = NULL;
      }
      comp->sideways_dfs_size = 0u;
      if (comp->fdc_source_component != NULL) {
          if (comp->fdc_media_loaded != 0u) {
              (void)cpu_component_dispatch_callback(cpu, comp->fdc_source_component, "unload_media", NULL, 0u);
          }
          free(comp->fdc_source_component);
          comp->fdc_source_component = NULL;
      }
      if (comp->fdc_sector_buffer != NULL) {
          free(comp->fdc_sector_buffer);
          comp->fdc_sector_buffer = NULL;
      }
      comp->fdc_media_loaded = 0u;
    mem_write_pre: |
      /* BBC I/O page: consume writes in FE00-FEFF as device space (never ROM writes). */
      if (addr == 0xFE00u) {
          comp->crtc_index = (uint8_t)(value & 0x1Fu);
          return;
      }
      if (addr == 0xFE01u) {
          /* Minimal CRTC handling: use register 12/13 writes to approximate screen base. */
          if (comp->crtc_index == 12u) {
              comp->crtc_start_addr = (uint16_t)((comp->crtc_start_addr & 0x00FFu) | ((uint16_t)(value & 0xFFu) << 8u));
              comp->screen_base = (uint16_t)(((uint32_t)(comp->crtc_start_addr & 0x3FFFu) << 3u) & 0xFFFFu);
          } else if (comp->crtc_index == 13u) {
              comp->crtc_start_addr = (uint16_t)((comp->crtc_start_addr & 0xFF00u) | (uint16_t)(value & 0xFFu));
              comp->screen_base = (uint16_t)(((uint32_t)(comp->crtc_start_addr & 0x3FFFu) << 3u) & 0xFFFFu);
          } else if (comp->crtc_index == 1u) {
              comp->crtc_hdisp = (uint8_t)(value & 0x7Fu);
          } else if (comp->crtc_index == 6u) {
              comp->crtc_vdisp = (uint8_t)(value & 0x7Fu);
          } else if (comp->crtc_index == 9u) {
              comp->crtc_rmax = (uint8_t)(value & 0x1Fu);
          } else if (comp->crtc_index == 10u) {
              comp->crtc_cursor_start = (uint8_t)(value & 0x7Fu);
          } else if (comp->crtc_index == 11u) {
              comp->crtc_cursor_end = (uint8_t)(value & 0x1Fu);
          } else if (comp->crtc_index == 14u) {
              comp->crtc_cursor_addr = (uint16_t)((comp->crtc_cursor_addr & 0x00FFu) | ((uint16_t)(value & 0x3Fu) << 8u));
          } else if (comp->crtc_index == 15u) {
              comp->crtc_cursor_addr = (uint16_t)((comp->crtc_cursor_addr & 0xFF00u) | (uint16_t)(value & 0xFFu));
          }
          return;
      }
      if (addr == 0xFE20u) {
          comp->ula_ctrl = (uint8_t)(value & 0xFFu);
          /* Decode BBC mode from ULA control:
             bit1=teletext select, bits2-3=chars/line, bit4=6845 clock (0:low modes4-7, 1:high modes0-3). */
          if ((comp->ula_ctrl & 0x02u) != 0u) {
              comp->video_mode = 7u;
          } else {
              uint8_t chars_sel = (uint8_t)((comp->ula_ctrl >> 2u) & 0x03u);
              uint8_t high_clock = (uint8_t)((comp->ula_ctrl & 0x10u) != 0u);
              if (high_clock != 0u) {
                  /* Modes 0..3 */
                  if (chars_sel == 0x03u) comp->video_mode = 0u;      /* 80 cols */
                  else if (chars_sel == 0x02u) comp->video_mode = 1u; /* 40 cols */
                  else if (chars_sel == 0x01u) comp->video_mode = 2u; /* 20 cols */
                  else comp->video_mode = 3u;                         /* 10 cols */
              } else {
                  /* Modes 4..6 */
                  if (chars_sel == 0x02u) comp->video_mode = 4u;      /* 40 cols */
                  else if (chars_sel == 0x01u) comp->video_mode = 5u; /* 20 cols */
                  else comp->video_mode = 6u;                         /* 80/10 on low clock -> text-like */
              }
          }
          switch (comp->video_mode) {
              case 7u: comp->screen_base = 0x7C00u; break;
              case 0u: comp->screen_base = 0x3000u; break;
              case 1u: comp->screen_base = 0x3000u; break;
              case 2u: comp->screen_base = 0x3000u; break;
              case 3u: comp->screen_base = 0x4000u; break;
              case 4u: comp->screen_base = 0x5800u; break;
              case 5u: comp->screen_base = 0x5800u; break;
              case 6u: comp->screen_base = 0x6000u; break;
              default: break;
          }
          return;
      }
      if (addr == 0xFE10u) {
          {
              uint64_t acia_args[1] = { (uint64_t)(value & 0xFFu) };
              (void)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "write_serial_ula", acia_args, 1);
          }
          return;
      }
      if (addr == 0xFE18u) {
          /* ADC control/status write (minimal idle model). */
          comp->adc_status = (uint8_t)(value & 0xFFu);
          return;
      }
      if (addr == 0xFE21u) {
          comp->palette_reg = (uint8_t)(value & 0xFFu);
          return;
      }
      if (addr == 0xFE30u) {
          comp->romsel = (uint8_t)(value & 0x0Fu);
          return;
      }
      if (addr == 0xFE08u) {
          {
              uint64_t acia_args[1] = { (uint64_t)(value & 0xFFu) };
              (void)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "write_control", acia_args, 1);
          }
          return;
      }
      if (addr == 0xFE09u) {
          {
              uint64_t acia_args[1] = { (uint64_t)(value & 0xFFu) };
              (void)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "write_data", acia_args, 1);
          }
          return;
      }
      if ((addr & 0xFFF8u) == 0xFE80u) {
          uint8_t reg = (uint8_t)(addr & 0x0007u);
          comp->fdc_last_host_activity_cycle = cpu->total_cycles;
          if (reg == 0u) {
              uint8_t command = (uint8_t)(value & 0x3Fu);
              if ((comp->fdc_status & 0x80u) != 0u) return;
              if (command == 0x17u) command = 0x13u;
              comp->fdc_command = command;
              comp->fdc_param_count = 0u;
              comp->fdc_param_req = 0u;
              comp->fdc_phase = 0u;
              comp->fdc_data_count = 0u;
              comp->fdc_data_index = 0u;
              if (command < 0x2Cu) {
                  /* Match BBC/B-Em i8271 behavior: command writes only refresh
                     drive-select bits, preserving side/control state written
                     through special register 0x23. */
                  comp->fdc_drive_select =
                      (uint8_t)((comp->fdc_drive_select & (uint8_t)~0xC0u) | (value & 0xC0u));
              }
              comp->fdc_status = 0x80u;
              comp->fdc_result = 0u;
              if (command == 0x2Cu) {
                  uint8_t result = 0x80u;
                  if ((comp->fdc_drive_select & 0x80u) != 0u) result |= 0x40u;
                  if ((comp->fdc_drive_select & 0x40u) != 0u) result |= 0x04u;
                  if ((((comp->fdc_drive_select & 0x80u) != 0u) ? comp->fdc_curtrack1 : comp->fdc_curtrack0) == 0u) {
