                  case 0x29u:
                  case 0x3Du:
                      comp->fdc_param_req = 1u;
                      break;
                  case 0x0Au:
                  case 0x0Eu:
                  case 0x12u:
                  case 0x16u:
                  case 0x1Eu:
                  case 0x3Au:
                      comp->fdc_param_req = 2u;
                      break;
                  case 0x23u:
                      comp->fdc_param_req = 5u;
                      break;
                  case 0x13u:
                  case 0x17u:
                  case 0x1Fu:
                  case 0x1Bu:
                  case 0x0Bu:
                  case 0x0Fu:
                      comp->fdc_param_req = 3u;
                      break;
                  case 0x35u:
                      comp->fdc_param_req = 4u;
                      break;
                  default:
                      comp->fdc_result = 0x18u;
                      comp->fdc_status = (uint8_t)0x18u;
                      mos6502_interrupt(cpu, 0xFFu);
                      break;
              }
              return;
          }
          if (reg == 1u) {
              uint8_t *dst = NULL;
              switch (comp->fdc_param_count) {
                  case 0u: dst = &comp->fdc_params0; break;
                  case 1u: dst = &comp->fdc_params1; break;
                  case 2u: dst = &comp->fdc_params2; break;
                  case 3u: dst = &comp->fdc_params3; break;
                  case 4u: dst = &comp->fdc_params4; break;
                  default: break;
              }
              if (dst != NULL) *dst = (uint8_t)(value & 0xFFu);
              if (comp->fdc_param_count < 5u) comp->fdc_param_count = (uint8_t)(comp->fdc_param_count + 1u);
              if (comp->fdc_param_req != 0u && comp->fdc_param_count >= comp->fdc_param_req) {
                  switch (comp->fdc_command) {
                      case 0x35u:
                          if (comp->fdc_params0 == 0x0Du) {
                              comp->fdc_step_time = (uint32_t)comp->fdc_params1 * 2000u;
                              comp->fdc_settle_time = (uint32_t)comp->fdc_params2 * 2000u;
                              comp->fdc_unload_revs = (uint8_t)(comp->fdc_params3 >> 4u);
                              comp->fdc_load_time = (uint32_t)(comp->fdc_params3 & 0x0Fu) * 4000u;
                          }
                          comp->fdc_status = 0u;
                          break;
                      case 0x3Du:
                          comp->fdc_status = 0x10u;
                          switch (comp->fdc_params0) {
                              case 0x12u: comp->fdc_result = comp->fdc_curtrack0; break;
                              case 0x1Au: comp->fdc_result = comp->fdc_curtrack1; break;
                              case 0x23u: comp->fdc_result = comp->fdc_drive_select; break;
                              default: comp->fdc_result = 0u; break;
                          }
                          break;
                      case 0x3Au:
                          if (comp->fdc_params0 == 0x12u) comp->fdc_curtrack0 = comp->fdc_params1;
                          else if (comp->fdc_params0 == 0x1Au) comp->fdc_curtrack1 = comp->fdc_params1;
                          else if (comp->fdc_params0 == 0x23u) comp->fdc_drive_select = comp->fdc_params1;
                          comp->fdc_status = 0u;
                          break;
                      case 0x29u:
                          comp->fdc_deadline_cycle = cpu->total_cycles + comp->fdc_step_time + comp->fdc_settle_time + comp->fdc_load_time;
                          break;
                      case 0x0Au:
                      case 0x0Eu:
                      case 0x12u:
                      case 0x16u:
                      case 0x1Eu:
                          comp->fdc_cursector = comp->fdc_params1;
                          comp->fdc_sectors_left = 1u;
                          comp->fdc_sector_size = (comp->fdc_command == 0x1Eu) ? 0u : 128u;
                          comp->fdc_deadline_cycle = cpu->total_cycles + comp->fdc_load_time + 200u;
                          break;
                      case 0x13u:
                      case 0x17u:
                      case 0x1Fu:
                      case 0x0Bu:
                      case 0x0Fu:
                          comp->fdc_cursector = comp->fdc_params1;
                          comp->fdc_sectors_left = (uint8_t)(comp->fdc_params2 & 31u);
                          if (comp->fdc_sectors_left == 0u) comp->fdc_sectors_left = 1u;
                          comp->fdc_sector_size = (uint16_t)(128u << ((comp->fdc_params2 >> 5u) & 0x07u));
                          if (comp->fdc_sector_size > 256u) comp->fdc_sector_size = 256u;
                          if (comp->fdc_command == 0x1Fu) comp->fdc_sector_size = 0u;
                          comp->fdc_deadline_cycle = cpu->total_cycles + comp->fdc_load_time + 200u;
                          break;
                      case 0x1Bu:
                          comp->fdc_cursector = comp->fdc_params1;
                          comp->fdc_sectors_left = (uint8_t)(comp->fdc_params2 & 31u);
                          if (comp->fdc_sectors_left == 0u) comp->fdc_sectors_left = 1u;
                          comp->fdc_sector_size = 4u;
                          comp->fdc_deadline_cycle = cpu->total_cycles + comp->fdc_load_time + 200u;
                          break;
                      case 0x23u:
                          comp->fdc_deadline_cycle = cpu->total_cycles + comp->fdc_load_time + 200u;
                          break;
                      default:
                          break;
                  }
              }
              return;
          }
          if (reg == 2u) {
              if ((value & 1u) != 0u) {
                  comp->fdc_command = 0u;
                  comp->fdc_param_count = 0u;
                  comp->fdc_param_req = 0u;
                  comp->fdc_status = 0u;
                  comp->fdc_result = 0u;
                  comp->fdc_data = 0u;
                  comp->fdc_data_count = 0u;
                  comp->fdc_data_index = 0u;
                  comp->fdc_deadline_cycle = 0u;
              }
              return;
          }
          if (reg == 4u) {
              comp->fdc_data = (uint8_t)(value & 0xFFu);
              return;
          }
          return;
      }
      if ((addr & 0xFFF0u) == 0xFEE0u) {
          /* Tube ULA not present; ignore writes. */
          return;
      }
      if ((addr & 0xFFF0u) == 0xFE40u || (addr & 0xFFF0u) == 0xFE60u) {
          uint8_t is_user_via = (uint8_t)(((addr & 0xFFF0u) == 0xFE60u) ? 1u : 0u);
          uint8_t reg = (uint8_t)(addr & 0x000Fu);
          uint8_t *orb = is_user_via ? &comp->uvia_orb : &comp->via_orb;
          uint8_t *ora = is_user_via ? &comp->uvia_ora : &comp->via_ora;
          uint8_t *ddrb = is_user_via ? &comp->uvia_ddrb : &comp->via_ddrb;
          uint8_t *ddra = is_user_via ? &comp->uvia_ddra : &comp->via_ddra;
          uint8_t *acr = is_user_via ? &comp->uvia_acr : &comp->via_acr;
          uint8_t *pcr = is_user_via ? &comp->uvia_pcr : &comp->via_pcr;
          uint8_t *ifr = is_user_via ? &comp->uvia_ifr : &comp->via_ifr;
          uint8_t *ier = is_user_via ? &comp->uvia_ier : &comp->via_ier;
          uint16_t *t1c = is_user_via ? &comp->uvia_t1_counter : &comp->via_t1_counter;
          uint16_t *t1l = is_user_via ? &comp->uvia_t1_latch : &comp->via_t1_latch;
          uint8_t *t1r = is_user_via ? &comp->uvia_t1_running : &comp->via_t1_running;
          if (reg == 0x00u) {
              *orb = (uint8_t)(value & 0xFFu);
              if (is_user_via == 0u) {
                  uint8_t old_ic32 = comp->ic32;
                  /* IC32 addressable latch on System VIA port B:
                     bit3 selects set/reset, low 3 bits select latch bit. */
                  {
                      uint8_t bit = (uint8_t)(value & 0x07u);
                      if ((value & 0x08u) != 0u) comp->ic32 = (uint8_t)(comp->ic32 | (uint8_t)(1u << bit));
                      else comp->ic32 = (uint8_t)(comp->ic32 & (uint8_t)~(1u << bit));
                  }
                  /* Approximate SN latch write on IC32 bit0 high->low transition. */
                  if (((old_ic32 & 0x01u) != 0u) && ((comp->ic32 & 0x01u) == 0u)) {
                      comp->sound_latch = *ora;
                  }
                  {
                      uint64_t sig_args[2] = {
                          (uint64_t)comp->sound_latch,
                          cpu->total_cycles
                      };
                      cpu_component_emit_signal(cpu, "bbc_micro_crtc_6845", "audio_command", sig_args, 2);
                  }
              }
              return;
          }
          if (reg == 0x01u) {
              *ora = (uint8_t)(value & 0xFFu);
              return;
          }
          if (reg == 0x02u) { *ddrb = (uint8_t)(value & 0xFFu); return; }
          if (reg == 0x03u) { *ddra = (uint8_t)(value & 0xFFu); return; }
          if (reg == 0x04u) { *t1l = (uint16_t)((*t1l & 0xFF00u) | (uint16_t)(value & 0xFFu)); return; }
          if (reg == 0x05u) { *t1l = (uint16_t)((*t1l & 0x00FFu) | ((uint16_t)(value & 0xFFu) << 8u)); *t1c = *t1l; *t1r = 1u; *ifr = (uint8_t)(*ifr & (uint8_t)~0x40u); return; }
          if (reg == 0x06u) { *t1l = (uint16_t)((*t1l & 0xFF00u) | (uint16_t)(value & 0xFFu)); return; }
          if (reg == 0x07u) { *t1l = (uint16_t)((*t1l & 0x00FFu) | ((uint16_t)(value & 0xFFu) << 8u)); return; }
          if (reg == 0x0Bu) { *acr = (uint8_t)(value & 0xFFu); return; }
          if (reg == 0x0Cu) { *pcr = (uint8_t)(value & 0xFFu); return; }
          if (reg == 0x0Du) { *ifr = (uint8_t)(*ifr & (uint8_t)~(value & 0x7Fu)); return; }
          if (reg == 0x0Eu) { if ((value & 0x80u) != 0u) *ier = (uint8_t)(*ier | (value & 0x7Fu)); else *ier = (uint8_t)(*ier & (uint8_t)~(value & 0x7Fu)); return; }
          if (reg == 0x0Fu) { *ora = (uint8_t)(value & 0xFFu); return; }
          return;
      }
      if ((addr & 0xFF00u) == 0xFE00u) {
          return;
      }
    step_post: |
      {
          /* BBC keyboard CA2-like strobe behavior. */
          uint8_t do_keyboard_scan = 0u;
          if (comp->keyboard_scan_last_cycle == 0u ||
              (cpu->total_cycles - comp->keyboard_scan_last_cycle) >= 512u) {
              comp->keyboard_scan_last_cycle = cpu->total_cycles;
              do_keyboard_scan = 1u;
          }
          if (do_keyboard_scan != 0u) {
              uint8_t strobe_level = 0u;
              uint8_t any_key_down = 0u;
              uint64_t cb_args[1];
              if ((comp->ic32 & 0x08u) != 0u) {
                  /* Autoscan mode: for each selected column, if any row 1..7 key is down, assert strobe. */
                  for (uint8_t col = 0u; col < 11u; ++col) {
                      cb_args[0] = (uint64_t)col;
                      {
                          uint8_t kb = (uint8_t)cpu_component_call(cpu, "bbc_micro_crtc_6845", "keyboard_read_row", cb_args, 1);
                          if (col == 0u && cpu->total_cycles < comp->auto_boot_shift_until_cycle) {
                              kb = (uint8_t)(kb & (uint8_t)~0x01u);
                          }
                          for (uint8_t row = 1u; row < 8u; ++row) {
                              if ((kb & (uint8_t)(1u << row)) == 0u) { strobe_level = 1u; any_key_down = 1u; break; }
                          }
                      }
                      if (strobe_level != 0u) {
                          break;
                      }
                  }
              } else {
                  /* Specific scan mode: selected column from ORA low nibble, rows 1..7. */
                  uint8_t col = (uint8_t)(comp->via_ora & 0x0Fu);
                  if (col <= 10u) {
                      cb_args[0] = (uint64_t)col;
                      {
                          uint8_t kb = (uint8_t)cpu_component_call(cpu, "bbc_micro_crtc_6845", "keyboard_read_row", cb_args, 1);
                          if (col == 0u && cpu->total_cycles < comp->auto_boot_shift_until_cycle) {
                              kb = (uint8_t)(kb & (uint8_t)~0x01u);
                          }
                          for (uint8_t row = 1u; row < 8u; ++row) {
                              if ((kb & (uint8_t)(1u << row)) == 0u) { strobe_level = 1u; any_key_down = 1u; break; }
                          }
                      }
                  }
              }
              if (any_key_down == 0u) {
                  for (uint8_t col = 0u; col < 11u; ++col) {
                      cb_args[0] = (uint64_t)col;
                      uint8_t kb = (uint8_t)cpu_component_call(cpu, "bbc_micro_crtc_6845", "keyboard_read_row", cb_args, 1);
                      if (col == 0u && cpu->total_cycles < comp->auto_boot_shift_until_cycle) {
                          kb = (uint8_t)(kb & (uint8_t)~0x01u);
                      }
                      if (kb != 0xFFu) {
                          any_key_down = 1u;
                          break;
                      }
                  }
              }
              if (strobe_level != comp->keyboard_strobe) {
                  /* Emulate via_set_ca2 edge/pcr behavior for System VIA input CA2. */
                  if ((comp->via_pcr & 0x08u) == 0u) { /* input mode */
                      if ((((comp->via_pcr & 0x04u) != 0u) && (strobe_level != 0u)) ||
                          (((comp->via_pcr & 0x04u) == 0u) && (strobe_level == 0u))) {
                          comp->via_ifr = (uint8_t)(comp->via_ifr | 0x01u);
                      }
                  }
                  comp->via_ca2 = strobe_level;
                  comp->keyboard_strobe = strobe_level;
              }
              comp->keyboard_any_down = any_key_down;
          }
