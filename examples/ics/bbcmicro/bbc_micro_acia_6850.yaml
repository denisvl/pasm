metadata:
  id: bbc_micro_acia_6850
  type: io_controller
  model: mc6850_acia
  version: "1.0"

state:
  - name: serial_ula
    type: uint8_t
    initial: "0"
  - name: acia_control
    type: uint8_t
    initial: "0"
  - name: acia_status
    type: uint8_t
    initial: "0x02"
  - name: acia_status_for_read
    type: uint8_t
    initial: "0x02"
  - name: acia_rx_data
    type: uint8_t
    initial: "0"
  - name: acia_tx_data
    type: uint8_t
    initial: "0"
  - name: tape_dcd_level
    type: uint8_t
    initial: "0"
  - name: tape_dcd_line
    type: uint8_t
    initial: "0"
  - name: acia_rx_state
    type: uint8_t
    initial: "1"
  - name: acia_rx_shift
    type: uint8_t
    initial: "0"
  - name: acia_rx_count
    type: uint8_t
    initial: "0"
  - name: acia_rx_parity
    type: uint8_t
    initial: "0"
  - name: acia_rx_clock_div
    type: uint8_t
    initial: "0"
  - name: acia_rx_parity_error
    type: uint8_t
    initial: "0"
  - name: acia_rx_framing_error
    type: uint8_t
    initial: "0"
  - name: acia_rx_overflow
    type: uint8_t
    initial: "0"

interfaces:
  callbacks:
    - name: read_status
      args: []
      returns: u8
    - name: read_data
      args: []
      returns: u8
    - name: read_serial_ula
      args: []
      returns: u8
    - name: write_control
      args: [u8]
      returns: u8
    - name: write_data
      args: [u8]
      returns: u8
    - name: write_serial_ula
      args: [u8]
      returns: u8
  handlers: []
  signals: []

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->serial_ula = 0u;
      comp->acia_control = 0u;
      comp->acia_status = 0x02u;
      comp->acia_status_for_read = 0x02u;
      comp->acia_rx_data = 0u;
      comp->acia_tx_data = 0u;
      comp->tape_dcd_level = 0u;
      comp->tape_dcd_line = 0u;
      comp->acia_rx_state = 1u;
      comp->acia_rx_shift = 0u;
      comp->acia_rx_count = 0u;
      comp->acia_rx_parity = 0u;
      comp->acia_rx_clock_div = 0u;
      comp->acia_rx_parity_error = 0u;
      comp->acia_rx_framing_error = 0u;
      comp->acia_rx_overflow = 0u;
    destroy: |
      (void)cpu;
    step_post: |
      {
          static int tape_trace = -1;
          static FILE *tape_trace_fp = NULL;
          static uint32_t tape_trace_count = 0u;
          uint8_t tape_enabled = (uint8_t)((comp->serial_ula & 0xC0u) == 0x80u ? 1u : 0u);
          if (tape_trace < 0) {
              const char *e = getenv("PASM_BBC_TAPE_TRACE");
              tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
              if (tape_trace != 0) {
                  const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
                  if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
                  tape_trace_fp = fopen(p, "a");
                  if (tape_trace_fp != NULL) {
                      fprintf(tape_trace_fp, "# bbc acia trace\n");
                      fflush(tape_trace_fp);
                  } else {
                      tape_trace = 0;
                  }
              }
          }
          if (tape_enabled == 0u) {
              uint8_t do_fire_receive_int = 0u;
              comp->tape_dcd_line = 0u;
              comp->acia_status_for_read = comp->acia_status;
              do_fire_receive_int = (uint8_t)((comp->acia_status & 0x01u) != 0u);
              do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x04u) != 0u));
              do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x20u) != 0u));
              if (((comp->acia_control & 0x80u) != 0u) && (do_fire_receive_int != 0u)) comp->acia_status = (uint8_t)(comp->acia_status | 0x80u);
              else comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x80u);
              comp->acia_status_for_read = (uint8_t)((comp->acia_status_for_read & (uint8_t)~0x80u) | (comp->acia_status & 0x80u));
          } else {
              uint64_t tape_args[2] = { 0u, cpu->total_cycles };
              uint64_t packed = cpu_component_dispatch_callback(cpu, "bbc_micro_cassette_adapter", "sample_input", tape_args, 2);
              uint8_t dcd_pulse = (uint8_t)((packed >> 17u) & 0x01u);
              uint8_t have_bit = (uint8_t)(packed & 0x01u);
              comp->tape_dcd_line = 0u;
              if (dcd_pulse != 0u) {
                  comp->tape_dcd_line = 1u;
                  comp->tape_dcd_level = 1u;
                  comp->acia_status = (uint8_t)(comp->acia_status | 0x04u);
              }
              if (have_bit != 0u) {
                  uint8_t bit = (uint8_t)((packed >> 8u) & 0x01u);
                  comp->acia_rx_clock_div = (uint8_t)((comp->acia_rx_clock_div + 1u) & 0x03u);
                  if (((comp->acia_control & 0x03u) != 0x02u) || (comp->acia_rx_clock_div == 0u)) {
                      switch (comp->acia_rx_state) {
                          case 1u:
                              if (bit == 0u) {
                                  comp->acia_rx_state = 2u;
                                  comp->acia_rx_shift = 0u;
                                  comp->acia_rx_count = 0u;
                                  comp->acia_rx_parity = 0u;
                                  comp->acia_rx_parity_error = 0u;
                                  comp->acia_rx_framing_error = 0u;
                              }
                              break;
                          case 2u:
                              if (bit != 0u) {
                                  comp->acia_rx_shift = (uint8_t)(comp->acia_rx_shift | (uint8_t)(1u << comp->acia_rx_count));
                                  comp->acia_rx_parity ^= 1u;
                              }
                              comp->acia_rx_count = (uint8_t)(comp->acia_rx_count + 1u);
                              if ((comp->acia_control & 0x10u) != 0u) {
                                  if (comp->acia_rx_count == 8u) comp->acia_rx_state = ((comp->acia_control & 0x08u) != 0u) ? 3u : 4u;
                              } else if (comp->acia_rx_count == 7u) {
                                  comp->acia_rx_state = 3u;
                              }
                              break;
                          case 3u:
                              if (bit != 0u) comp->acia_rx_parity ^= 1u;
                              if (comp->acia_rx_parity != (uint8_t)((comp->acia_control & 0x04u) >> 2u)) comp->acia_rx_parity_error = 1u;
                              comp->acia_rx_state = 4u;
                              break;
                          case 4u:
                              if (bit != 1u) comp->acia_rx_framing_error = 1u;
                              if ((comp->acia_status & 0x01u) != 0u) {
                                  comp->acia_rx_overflow = 1u;
                              } else {
                                  comp->acia_rx_data = comp->acia_rx_shift;
                                  comp->acia_status = (uint8_t)(comp->acia_status | 0x01u);
                                  comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x10u);
                                  comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x40u);
                                  if (comp->acia_rx_framing_error != 0u) comp->acia_status = (uint8_t)(comp->acia_status | 0x10u);
                                  if (comp->acia_rx_parity_error != 0u) comp->acia_status = (uint8_t)(comp->acia_status | 0x40u);
                              }
                              comp->acia_rx_state = 1u;
                              comp->acia_rx_shift = 0u;
                              comp->acia_rx_count = 0u;
                              comp->acia_rx_parity = 0u;
                              comp->acia_rx_parity_error = 0u;
                              comp->acia_rx_framing_error = 0u;
                              break;
                          default:
                              comp->acia_rx_state = 1u;
                              break;
                      }
                  }
                  if ((comp->acia_rx_overflow != 0u) && ((comp->acia_status & 0x01u) == 0u)) {
                      comp->acia_status = (uint8_t)(comp->acia_status | 0x20u);
                      comp->acia_rx_overflow = 0u;
                  }
                  if (tape_trace != 0 && tape_trace_fp != NULL && tape_trace_count < 40000u) {
                      fprintf(tape_trace_fp, "bit,%llu,%04X,%02X,%02X,%02X,%02X\n",
                              (unsigned long long)cpu->total_cycles,
                              (unsigned)cpu->pc,
                              (unsigned)bit,
                              (unsigned)comp->acia_status,
                              (unsigned)comp->acia_control,
                              (unsigned)comp->serial_ula);
                      fflush(tape_trace_fp);
                      tape_trace_count += 1u;
                  }
              }
              {
                  uint8_t do_fire_receive_int = 0u;
                  comp->acia_status_for_read = comp->acia_status;
                  if (comp->tape_dcd_line != 0u) comp->acia_status_for_read = (uint8_t)(comp->acia_status_for_read | 0x04u);
                  do_fire_receive_int = (uint8_t)((comp->acia_status & 0x01u) != 0u);
                  do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x04u) != 0u));
                  do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x20u) != 0u));
                  if (((comp->acia_control & 0x80u) != 0u) && (do_fire_receive_int != 0u)) comp->acia_status = (uint8_t)(comp->acia_status | 0x80u);
                  else comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x80u);
                  comp->acia_status_for_read = (uint8_t)((comp->acia_status_for_read & (uint8_t)~0x80u) | (comp->acia_status & 0x80u));
              }
          }
      }
      if ((comp->acia_status & 0x80u) != 0u) {
          mos6502_interrupt(cpu, 0u);
      }
  callback_handlers:
    read_status: |
      {
          static int tape_trace = -1;
          static FILE *tape_trace_fp = NULL;
          static uint32_t tape_trace_count = 0u;
          if (tape_trace < 0) {
              const char *e = getenv("PASM_BBC_TAPE_TRACE");
              tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
              if (tape_trace != 0) {
                  const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
                  if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
                  tape_trace_fp = fopen(p, "a");
                  if (tape_trace_fp == NULL) tape_trace = 0;
              }
          }
          if (tape_trace != 0 && tape_trace_fp != NULL && tape_trace_count < 40000u) {
              fprintf(tape_trace_fp, "acia_status_read,%llu,%04X,%02X,%02X,%02X,%02X\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)cpu->pc,
                      (unsigned)comp->acia_status,
                      (unsigned)comp->acia_control,
                      (unsigned)comp->serial_ula,
                      (unsigned)comp->acia_rx_data);
              fflush(tape_trace_fp);
              tape_trace_count += 1u;
          }
      }
      return comp->acia_status_for_read;
    read_data: |
      uint8_t v = comp->acia_rx_data;
      comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x04u);
      comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x20u);
      if (comp->acia_rx_overflow != 0u) {
          comp->acia_rx_overflow = 0u;
          comp->acia_status = (uint8_t)(comp->acia_status | 0x20u);
      } else {
          comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x01u);
      }
      {
          uint8_t do_fire_receive_int = 0u;
          comp->acia_status_for_read = comp->acia_status;
          if (comp->tape_dcd_line != 0u) comp->acia_status_for_read = (uint8_t)(comp->acia_status_for_read | 0x04u);
          do_fire_receive_int = (uint8_t)((comp->acia_status & 0x01u) != 0u);
          do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x04u) != 0u));
          do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x20u) != 0u));
          if (((comp->acia_control & 0x80u) != 0u) && (do_fire_receive_int != 0u)) comp->acia_status = (uint8_t)(comp->acia_status | 0x80u);
          else comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x80u);
          comp->acia_status_for_read = (uint8_t)((comp->acia_status_for_read & (uint8_t)~0x80u) | (comp->acia_status & 0x80u));
      }
      {
          static int tape_trace = -1;
          static FILE *tape_trace_fp = NULL;
          static uint32_t tape_trace_count = 0u;
          if (tape_trace < 0) {
              const char *e = getenv("PASM_BBC_TAPE_TRACE");
              tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
              if (tape_trace != 0) {
                  const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
                  if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
                  tape_trace_fp = fopen(p, "a");
                  if (tape_trace_fp == NULL) tape_trace = 0;
              }
          }
          if (tape_trace != 0 && tape_trace_fp != NULL && tape_trace_count < 40000u) {
              fprintf(tape_trace_fp, "acia_data_read,%llu,%04X,%02X,%02X,%02X,%02X\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)cpu->pc,
                      (unsigned)v,
                      (unsigned)comp->acia_status,
                      (unsigned)comp->acia_control,
                      (unsigned)comp->serial_ula);
              fflush(tape_trace_fp);
              tape_trace_count += 1u;
          }
      }
      return v;
    read_serial_ula: |
      {
          uint64_t fe_args[1] = { 0xFEu };
          (void)cpu_component_dispatch_callback(cpu, "bbc_micro_acia_6850", "write_serial_ula", fe_args, 1);
      }
      return 0u;
    write_control: |
      comp->acia_control = (uint8_t)((argc > 0u) ? (args[0] & 0xFFu) : 0u);
      if ((comp->acia_control & 0x03u) == 0x03u) {
          comp->acia_control = 0u;
          comp->acia_status = 0x02u;
          comp->acia_status_for_read = 0x02u;
          comp->acia_rx_data = 0u;
          comp->acia_tx_data = 0u;
          comp->acia_rx_state = 1u;
          comp->acia_rx_shift = 0u;
          comp->acia_rx_count = 0u;
          comp->acia_rx_parity = 0u;
          comp->acia_rx_clock_div = 0u;
          comp->acia_rx_parity_error = 0u;
          comp->acia_rx_framing_error = 0u;
          comp->acia_rx_overflow = 0u;
      }
      {
          uint8_t do_fire_receive_int = 0u;
          comp->acia_status_for_read = comp->acia_status;
          if (comp->tape_dcd_line != 0u) comp->acia_status_for_read = (uint8_t)(comp->acia_status_for_read | 0x04u);
          do_fire_receive_int = (uint8_t)((comp->acia_status & 0x01u) != 0u);
          do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x04u) != 0u));
          do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x20u) != 0u));
          if (((comp->acia_control & 0x80u) != 0u) && (do_fire_receive_int != 0u)) comp->acia_status = (uint8_t)(comp->acia_status | 0x80u);
          else comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x80u);
          comp->acia_status_for_read = (uint8_t)((comp->acia_status_for_read & (uint8_t)~0x80u) | (comp->acia_status & 0x80u));
      }
      {
          static int tape_trace = -1;
          static FILE *tape_trace_fp = NULL;
          static uint32_t tape_trace_count = 0u;
          if (tape_trace < 0) {
              const char *e = getenv("PASM_BBC_TAPE_TRACE");
              tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
              if (tape_trace != 0) {
                  const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
                  if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
                  tape_trace_fp = fopen(p, "a");
                  if (tape_trace_fp == NULL) tape_trace = 0;
              }
          }
          if (tape_trace != 0 && tape_trace_fp != NULL && tape_trace_count < 40000u) {
              fprintf(tape_trace_fp, "acia_ctrl_write,%llu,%04X,%02X,%02X,%02X,%02X\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)cpu->pc,
                      (unsigned)comp->acia_control,
                      (unsigned)comp->acia_status,
                      (unsigned)comp->serial_ula,
                      (unsigned)comp->acia_tx_data);
              fflush(tape_trace_fp);
              tape_trace_count += 1u;
          }
      }
      return 0u;
    write_data: |
      comp->acia_tx_data = (uint8_t)((argc > 0u) ? (args[0] & 0xFFu) : 0u);
      comp->acia_status = (uint8_t)(comp->acia_status | 0x02u);
      {
          static int tape_trace = -1;
          static FILE *tape_trace_fp = NULL;
          static uint32_t tape_trace_count = 0u;
          if (tape_trace < 0) {
              const char *e = getenv("PASM_BBC_TAPE_TRACE");
              tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
              if (tape_trace != 0) {
                  const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
                  if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
                  tape_trace_fp = fopen(p, "a");
                  if (tape_trace_fp == NULL) tape_trace = 0;
              }
          }
          if (tape_trace != 0 && tape_trace_fp != NULL && tape_trace_count < 40000u) {
              fprintf(tape_trace_fp, "acia_tx_write,%llu,%04X,%02X,%02X,%02X,%02X\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)cpu->pc,
                      (unsigned)comp->acia_tx_data,
                      (unsigned)comp->acia_status,
                      (unsigned)comp->serial_ula,
                      (unsigned)comp->acia_control);
              fflush(tape_trace_fp);
              tape_trace_count += 1u;
          }
      }
      return 0u;
    write_serial_ula: |
      uint8_t value = (uint8_t)((argc > 0u) ? (args[0] & 0xFFu) : 0u);
      uint8_t motor_on = (uint8_t)(((value & 0x80u) != 0u) ? 1u : 0u);
      {
          static int tape_trace = -1;
          static FILE *tape_trace_fp = NULL;
          static uint32_t tape_trace_count = 0u;
          if (tape_trace < 0) {
              const char *e = getenv("PASM_BBC_TAPE_TRACE");
              tape_trace = (e != NULL && e[0] != '\0' && e[0] != '0') ? 1 : 0;
              if (tape_trace != 0) {
                  const char *p = getenv("PASM_BBC_TAPE_TRACE_FILE");
                  if (p == NULL || p[0] == '\0') p = "/tmp/bbc_tape_trace.log";
                  tape_trace_fp = fopen(p, "a");
                  if (tape_trace_fp == NULL) tape_trace = 0;
              }
          }
          if (tape_trace != 0 && tape_trace_fp != NULL && tape_trace_count < 40000u) {
              fprintf(tape_trace_fp, "serial_ula_write,%llu,%04X,%02X,%02X,%02X,%02X\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)cpu->pc,
                      (unsigned)value,
                      (unsigned)comp->serial_ula,
                      (unsigned)comp->acia_control,
                      (unsigned)comp->acia_status);
              fflush(tape_trace_fp);
              tape_trace_count += 1u;
          }
      }
      comp->serial_ula = value;
      {
          uint64_t motor_args[1] = { motor_on };
          (void)cpu_component_dispatch_callback(cpu, "bbc_micro_cassette_adapter", "set_motor", motor_args, 1);
      }
      if ((comp->serial_ula & 0xC0u) != 0x80u) {
          comp->tape_dcd_line = 0u;
          comp->acia_status_for_read = comp->acia_status;
          {
              uint8_t do_fire_receive_int = 0u;
              do_fire_receive_int = (uint8_t)((comp->acia_status & 0x01u) != 0u);
              do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x04u) != 0u));
              do_fire_receive_int = (uint8_t)(do_fire_receive_int | ((comp->acia_status & 0x20u) != 0u));
              if (((comp->acia_control & 0x80u) != 0u) && (do_fire_receive_int != 0u)) comp->acia_status = (uint8_t)(comp->acia_status | 0x80u);
              else comp->acia_status = (uint8_t)(comp->acia_status & (uint8_t)~0x80u);
              comp->acia_status_for_read = (uint8_t)((comp->acia_status_for_read & (uint8_t)~0x80u) | (comp->acia_status & 0x80u));
          }
      }
      return 0u;
  handler_bodies: {}

coding:
  headers:
    - stdio.h
    - stdlib.h
  include_paths: []
  linked_libraries: []
  library_paths: []
