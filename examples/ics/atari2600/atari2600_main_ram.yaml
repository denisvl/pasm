metadata:
  id: atari2600_main_ram
  type: memory
  model: riot_internal_ram_128b
  version: "1.0"

state:
  - name: bytes
    type: uint8_t *
    initial: "NULL"

interfaces:
  callbacks:
    - name: ram_read
      args: [u16]
      returns: u8
    - name: ram_write
      args: [u16, u8]
      returns: u8
  handlers: []
  signals: []

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      if (comp->bytes == NULL) comp->bytes = (uint8_t *)calloc(128u, sizeof(uint8_t));
    reset: |
      (void)cpu;
      if (comp->bytes != NULL) memset(comp->bytes, 0, 128u);
    destroy: |
      if (comp->bytes != NULL) {
          free(comp->bytes);
          comp->bytes = NULL;
      }
  callback_handlers:
    ram_read: |
      if (argc < 1u) return 0u;
      if (cpu->comp_atari2600_main_ram.bytes == NULL) return 0u;
      uint16_t addr = (uint16_t)(args[0] & 0x007Fu);
      return cpu->comp_atari2600_main_ram.bytes[addr];
    ram_write: |
      if (argc < 2u) return 0u;
      if (cpu->comp_atari2600_main_ram.bytes == NULL) return 0u;
      uint16_t addr = (uint16_t)(args[0] & 0x007Fu);
      uint8_t value = (uint8_t)(args[1] & 0xFFu);
      cpu->comp_atari2600_main_ram.bytes[addr] = value;
      return 0u;
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
