behavior:
  snippets:
    init: |
      if (comp->riot_ram == NULL) {
          comp->riot_ram = (uint8_t *)calloc(128u, sizeof(uint8_t));
      }
      if (comp->pending_reg == NULL) {
          comp->pending_reg = (uint8_t *)calloc(128u, sizeof(uint8_t));
      }
      if (comp->pending_val == NULL) {
          comp->pending_val = (uint8_t *)calloc(128u, sizeof(uint8_t));
      }
      if (comp->pending_delay == NULL) {
          comp->pending_delay = (uint8_t *)calloc(128u, sizeof(uint8_t));
      }
    reset: |
      if (comp->riot_ram != NULL) memset(comp->riot_ram, 0, 128u);
      if (comp->pending_reg != NULL) memset(comp->pending_reg, 0, 128u);
      if (comp->pending_val != NULL) memset(comp->pending_val, 0, 128u);
