                          if (pfbit != 0u) {
                              hit_pf = 1u;
                              if ((comp->ctrlpf & 0x02u) != 0u) {
                                  pf_color = (right == 0u) ? comp->colup0 : comp->colup1;
                              } else {
                                  pf_color = comp->colupf;
                              }
                              color = pf_color;
                          }

                          /* Player 0 */
                          {
                              if (p0_draw_on != 0u) {
                                  uint8_t g0 = (comp->vdelp0 != 0u) ? comp->grp0_prev : comp->grp0_latched;
                                  uint8_t refl = (uint8_t)((comp->refp0 & 0x08u) != 0u);
                                  uint8_t bit = p0_draw_sample;
                                  if (bit <= 7u) {
                                      uint8_t bidx = (refl != 0u) ? bit : (uint8_t)(7u - bit);
                                      if (((g0 >> bidx) & 1u) != 0u) {
                                          hit_p0 = 1u;
                                      }
                                  }
                              }
                          }
                          /* Player 1 */
                          {
                              if (p1_draw_on != 0u) {
                                  uint8_t g1 = (comp->vdelp1 != 0u) ? comp->grp1_prev : comp->grp1_latched;
                                  uint8_t refl = (uint8_t)((comp->refp1 & 0x08u) != 0u);
                                  uint8_t bit = p1_draw_sample;
                                  if (bit <= 7u) {
                                      uint8_t bidx = (refl != 0u) ? bit : (uint8_t)(7u - bit);
                                      if (((g1 >> bidx) & 1u) != 0u) {
                                          hit_p1 = 1u;
                                      }
                                  }
                              }
                          }
                          /* Missile 0 */
                          {
                              if ((comp->enam0 & 0x02u) != 0u && m0_draw_on != 0u) {
                                  hit_m0 = 1u;
                              }
                          }
                          /* Missile 1 */
                          {
                              if ((comp->enam1 & 0x02u) != 0u && m1_draw_on != 0u) {
                                  hit_m1 = 1u;
                              }
                          }
                          /* Ball */
                          {
                              uint8_t enb = (comp->vdelbl != 0u) ? comp->bl_prev : comp->enabl;
                              if ((enb & 0x02u) != 0u && bl_draw_on != 0u) {
                                  hit_bl = 1u;
                              }
                          }
                          if ((comp->ctrlpf & 0x04u) != 0u) {
                              /* PF priority mode: PF > BL > P0 > M0 > P1 > M1 > BK */
                              if (hit_pf != 0u) color = pf_color;
                              else if (hit_bl != 0u) color = comp->colupf;
                              else if (hit_p0 != 0u) color = comp->colup0;
                              else if (hit_m0 != 0u) color = comp->colup0;
                              else if (hit_p1 != 0u) color = comp->colup1;
                              else if (hit_m1 != 0u) color = comp->colup1;
                              else color = comp->colubk;
                          } else if ((comp->ctrlpf & 0x02u) != 0u) {
                              /* Score mode: P0/M0 > PF > P1/M1 > BL > BK */
                              if (hit_p0 != 0u) color = comp->colup0;
                              else if (hit_m0 != 0u) color = comp->colup0;
                              else if (hit_pf != 0u) color = pf_color;
                              else if (hit_p1 != 0u) color = comp->colup1;
                              else if (hit_m1 != 0u) color = comp->colup1;
                              else if (hit_bl != 0u) color = comp->colupf;
                              else color = comp->colubk;
                          } else {
                              /* Normal mode: P0/M0 > P1/M1 > PF/BL > BK */
                              if (hit_p0 != 0u) color = comp->colup0;
                              else if (hit_m0 != 0u) color = comp->colup0;
                              else if (hit_p1 != 0u) color = comp->colup1;
                              else if (hit_m1 != 0u) color = comp->colup1;
                              else if (hit_pf != 0u) color = pf_color;
                              else if (hit_bl != 0u) color = comp->colupf;
                              else color = comp->colubk;
                          }
                          if (hit_p0 != 0u && hit_pf != 0u) comp->cxp0fb |= 0x80u;
                          if (hit_p1 != 0u && hit_pf != 0u) comp->cxp1fb |= 0x80u;
                          if (hit_p0 != 0u && hit_bl != 0u) comp->cxp0fb |= 0x40u;
                          if (hit_p1 != 0u && hit_bl != 0u) comp->cxp1fb |= 0x40u;
                          if (hit_p0 != 0u && hit_p1 != 0u) comp->cxppmm |= 0x80u;
                          if (hit_m0 != 0u && hit_p1 != 0u) comp->cxm0p |= 0x80u;
                          if (hit_m0 != 0u && hit_p0 != 0u) comp->cxm0p |= 0x40u;
                          if (hit_m1 != 0u && hit_p0 != 0u) comp->cxm1p |= 0x80u;
                          if (hit_m1 != 0u && hit_p1 != 0u) comp->cxm1p |= 0x40u;
                          if (hit_m0 != 0u && hit_pf != 0u) comp->cxm0fb |= 0x80u;
                          if (hit_m0 != 0u && hit_bl != 0u) comp->cxm0fb |= 0x40u;
                          if (hit_m1 != 0u && hit_pf != 0u) comp->cxm1fb |= 0x80u;
                          if (hit_m1 != 0u && hit_bl != 0u) comp->cxm1fb |= 0x40u;
                          if (hit_bl != 0u && hit_pf != 0u) comp->cxblpf |= 0x80u;
                          if (hit_m0 != 0u && hit_m1 != 0u) comp->cxppmm |= 0x40u;
                      }

                      if (comp->hmove_blank != 0u && x < (uint32_t)comp->hmove_blank) {
                          color = 0x00u;
                      }
                      if (y < 192u) {
                          uint8_t idx = (uint8_t)(color & 0xFEu);
                          uint32_t rgb = tia_ntsc_palette[(uint32_t)(idx >> 1)];
                          framebuf[y * 160u + x] = 0xFF000000u | rgb;
                      }
                  }
              }
          }
          /* Advance TIA audio model each color clock (mode-driven approximation). */
          {
              uint16_t p0 = (uint16_t)(comp->audf0 & 0x1Fu) + 1u;
              uint16_t p1 = (uint16_t)(comp->audf1 & 0x1Fu) + 1u;
              uint8_t c0 = (uint8_t)(comp->audc0 & 0x0Fu);
              uint8_t c1 = (uint8_t)(comp->audc1 & 0x0Fu);

              comp->aud_div0 = (uint16_t)(comp->aud_div0 + 1u);
              if (comp->aud_div0 >= p0) {
                  comp->aud_div0 = 0u;
                  switch (c0) {
                      case 0x00u:
                      case 0x0Bu:
                          comp->aud_out0 = (uint8_t)(comp->aud_out0 ^ 1u);
                          break;
                      case 0x0Cu:
                      case 0x0Du:
                          comp->aud_out0 = 0u;
                          break;
                      case 0x0Fu:
                          comp->aud_out0 = 1u;
                          break;
                      default: {
                          uint8_t bit0;
                          if (c0 == 0x08u || c0 == 0x09u) {
                              uint8_t fb4 = (uint8_t)(((comp->aud_lfsr4_0 >> 0) ^ (comp->aud_lfsr4_0 >> 1)) & 1u);
                              comp->aud_lfsr4_0 = (uint8_t)(((comp->aud_lfsr4_0 >> 1) | (uint8_t)(fb4 << 3)) & 0x0Fu);
                              bit0 = (uint8_t)(comp->aud_lfsr4_0 & 1u);
                          } else {
                              uint8_t fb = (uint8_t)(((comp->aud_lfsr0 >> 0) ^ (comp->aud_lfsr0 >> 2)) & 1u);
                              comp->aud_lfsr0 = (uint8_t)(((comp->aud_lfsr0 >> 1) | (uint8_t)(fb << 4)) & 0x1Fu);
                              bit0 = (uint8_t)(comp->aud_lfsr0 & 1u);
                          }
                          if (c0 == 0x04u || c0 == 0x05u || c0 == 0x08u || c0 == 0x09u) {
                              comp->aud_out0 = bit0;
                          } else if (c0 == 0x06u || c0 == 0x0Au) {
                              comp->aud_out0 = (uint8_t)((comp->aud_out0 ^ 1u) & bit0);
                          } else {
                              comp->aud_out0 = bit0;
                          }
                          break;
                      }
                  }
              }

              comp->aud_div1 = (uint16_t)(comp->aud_div1 + 1u);
              if (comp->aud_div1 >= p1) {
                  comp->aud_div1 = 0u;
                  switch (c1) {
                      case 0x00u:
                      case 0x0Bu:
                          comp->aud_out1 = (uint8_t)(comp->aud_out1 ^ 1u);
                          break;
                      case 0x0Cu:
                      case 0x0Du:
                          comp->aud_out1 = 0u;
                          break;
                      case 0x0Fu:
                          comp->aud_out1 = 1u;
                          break;
                      default: {
                          uint8_t bit1;
                          if (c1 == 0x08u || c1 == 0x09u) {
                              uint8_t fb4 = (uint8_t)(((comp->aud_lfsr4_1 >> 0) ^ (comp->aud_lfsr4_1 >> 1)) & 1u);
                              comp->aud_lfsr4_1 = (uint8_t)(((comp->aud_lfsr4_1 >> 1) | (uint8_t)(fb4 << 3)) & 0x0Fu);
                              bit1 = (uint8_t)(comp->aud_lfsr4_1 & 1u);
                          } else {
                              uint8_t fb = (uint8_t)(((comp->aud_lfsr1 >> 0) ^ (comp->aud_lfsr1 >> 2)) & 1u);
                              comp->aud_lfsr1 = (uint8_t)(((comp->aud_lfsr1 >> 1) | (uint8_t)(fb << 4)) & 0x1Fu);
                              bit1 = (uint8_t)(comp->aud_lfsr1 & 1u);
                          }
                          if (c1 == 0x04u || c1 == 0x05u || c1 == 0x08u || c1 == 0x09u) {
                              comp->aud_out1 = bit1;
                          } else if (c1 == 0x06u || c1 == 0x0Au) {
                              comp->aud_out1 = (uint8_t)((comp->aud_out1 ^ 1u) & bit1);
                          } else {
                              comp->aud_out1 = bit1;
                          }
                          break;
                      }
                  }
              }

              {
                  uint8_t v0 = (uint8_t)(comp->audv0 & 0x0Fu);
                  uint8_t v1 = (uint8_t)(comp->audv1 & 0x0Fu);
                  comp->aud_sum0 += (uint32_t)(comp->aud_out0 != 0u ? v0 : 0u);
                  comp->aud_sum1 += (uint32_t)(comp->aud_out1 != 0u ? v1 : 0u);
                  comp->aud_sum_ct += 1u;
                  if (comp->aud_clock == 37u || comp->aud_clock == 149u) {
                      if (comp->aud_sum_ct != 0u) {
                          uint32_t avg0 = comp->aud_sum0 / comp->aud_sum_ct;
                          uint32_t avg1 = comp->aud_sum1 / comp->aud_sum_ct;
                          uint32_t mix = avg0 + avg1;
                          comp->audio_level = (uint8_t)((mix * 255u) / 30u);
                          {
                              uint64_t sig_args[2] = { (uint64_t)comp->audio_level, cpu->total_cycles };
                              cpu_component_emit_signal(cpu, "atari2600_io", "audio_level", sig_args, 2);
                              aud_emitted = 1u;
                          }
                      }
                      comp->aud_sum0 = 0u;
                      comp->aud_sum1 = 0u;
                      comp->aud_sum_ct = 0u;
                  }
              }
              comp->aud_clock = (uint16_t)(comp->aud_clock + 1u);
              if (comp->aud_clock >= 228u) comp->aud_clock = 0u;
          }

          /* Advance object counters only during the current clock's visible phase.
             Do this before color_clock wraps, otherwise the last visible clock of a
             scanline incorrectly advances the counters once into the next line. */
          if (comp->hstate != 0u) {
              comp->p0_counter = (uint8_t)(comp->p0_counter + 1u);
              if (comp->p0_counter >= 160u) comp->p0_counter = 0u;
              comp->p1_counter = (uint8_t)(comp->p1_counter + 1u);
              if (comp->p1_counter >= 160u) comp->p1_counter = 0u;
              comp->m0_counter = (uint8_t)(comp->m0_counter + 1u);
              if (comp->m0_counter >= 160u) comp->m0_counter = 0u;
              comp->m1_counter = (uint8_t)(comp->m1_counter + 1u);
              if (comp->m1_counter >= 160u) comp->m1_counter = 0u;
              comp->bl_counter = (uint8_t)(comp->bl_counter + 1u);
              if (comp->bl_counter >= 160u) comp->bl_counter = 0u;
              if (comp->p0_active != 0u) comp->p0_ctr += 1u;
              if (comp->p1_active != 0u) comp->p1_ctr += 1u;
              if (comp->m0_active != 0u) comp->m0_ctr += 1u;
              if (comp->m1_active != 0u) comp->m1_ctr += 1u;
              if (comp->bl_active != 0u) comp->bl_ctr += 1u;
          }
          comp->color_clock += 1u;
          if (comp->color_clock >= 228u) {
              comp->color_clock = 0u;
              comp->hctr = 0u;
              comp->hctr_delta = 0;
              comp->scanline += 1u;
              comp->frame_scanlines += 1u;
              if (((comp->vblank & 0x02u) == 0u) && comp->frame_started != 0u) {
                  comp->visible_y += 1u;
                  if (comp->visible_y == 192u) {
                      comp->frame_ready_pending = 1u;
                  }
              }
              comp->p0_ctr = 0u;
              comp->p1_ctr = 0u;
              comp->m0_ctr = 0u;
              comp->m1_ctr = 0u;
              comp->bl_ctr = 0u;
              /* Re-arm objects each scanline using their start positions. */
              comp->p0_active = 0u;
              comp->p1_active = 0u;
              comp->m0_active = 0u;
              comp->m1_active = 0u;
              comp->bl_active = 0u;
              if (comp->hmove_blank != 0u) comp->hmove_blank = 0u;
              comp->extended_hblank = 0u;
              {
                  /* Do not force frame boundaries by scanline budget here.
                     Frame end should be driven by VSYNC falling edge. */
              }
          }
          clocks -= 1u;
      }

      if (aud_emitted == 0u) {
          uint64_t sig_args[2] = { (uint64_t)comp->audio_level, cpu->total_cycles };
          cpu_component_emit_signal(cpu, "atari2600_io", "audio_level", sig_args, 2);
      }
  callback_handlers: {}
  handler_bodies: {}

