      comp->audv1 = 0u;
      comp->aud_div0 = 0u;
      comp->aud_div1 = 0u;
      comp->aud_out0 = 0u;
      comp->aud_out1 = 0u;
      comp->aud_lfsr0 = 0x1Fu;
      comp->aud_lfsr1 = 0x1Fu;
      comp->aud_lfsr4_0 = 0x0Fu;
      comp->aud_lfsr4_1 = 0x0Fu;
      comp->aud_clock = 0u;
      comp->aud_sum0 = 0u;
      comp->aud_sum1 = 0u;
      comp->aud_sum_ct = 0u;
