metadata:
  id: trs80_m4video
  type: video_controller
  model: trs80_model4_video
  version: "1.0"

state: []

interfaces:
  callbacks:
    - name: render_frame
      args: [u32]
      returns: u8
  handlers: []
  signals:
    - name: frame_ready
      args: [u32, u64, u32, u32]

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      (void)cpu;
    destroy: |
      (void)cpu;
  callback_handlers:
    render_frame: |
      static uint32_t framebuf[640u * 240u];
      static uint8_t video_shadow[0x0780u];
      static uint8_t video_shadow_init = 0u;
      static int trace_enabled = -1;
      static FILE *trace_fp = NULL;
      static uint8_t trs80_model4_charset_cg8[256][12];
      static uint8_t trs80_model4_charset_init = 0u;
      static const char *trs80_model4_charset_cg8_hex = "";
      uint32_t frame_counter = (uint32_t)(args[0] & 0xFFFFFFFFu);
      uint64_t ga_cols_args[1] = { 0u };
      uint32_t cols = ((uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "get_video_cols", ga_cols_args, 0) == 80u) ? 80u : 64u;
      uint32_t rows = (cols == 80u) ? 24u : 16u;
      uint32_t cells = cols * rows;
      uint64_t ga_map_args[1] = { 0u };
      uint8_t map = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "get_memory_map", ga_map_args, 0);
      uint8_t video_enabled = 1u;
      uint8_t video_ctrl = 0u;
      uint8_t global_inverse = 0u;
      uint8_t expanded = 0u;
      uint8_t alternate = 0u;
      uint32_t fb_w = 640u;
      uint32_t fb_h = rows * 8u;
      uint32_t cell_w = 8u;
      uint32_t cell_h = 8u;
      uint32_t left_margin = (fb_w > cols * cell_w) ? ((fb_w - cols * cell_w) / 2u) : 0u;
      uint32_t top_margin = (fb_h > rows * cell_h) ? ((fb_h - rows * cell_h) / 2u) : 0u;
      uint32_t fg = 0xFFE8E8E8u;
      uint32_t bg = 0xFF101010u;
      if (trace_enabled < 0) {
          const char *env = cpu_host_hal_getenv("PASM_TRS80_M4_VIDEO_TRACE");
          trace_enabled = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          if (trace_enabled != 0) {
              const char *trace_path = cpu_host_hal_getenv("PASM_TRS80_M4_VIDEO_TRACE_FILE");
              if (trace_path == NULL || trace_path[0] == '\0') trace_path = "/tmp/trs80_model4_video_trace.log";
              trace_fp = fopen(trace_path, "a");
              if (trace_fp == NULL) trace_fp = stderr;
          }
      }

      if (trs80_model4_charset_init == 0u) {
          for (uint32_t i = 0u; i < 256u * 12u; ++i) {
              char hi = trs80_model4_charset_cg8_hex[i * 2u];
              char lo = trs80_model4_charset_cg8_hex[i * 2u + 1u];
              uint8_t hv = (uint8_t)((hi >= 'A') ? (10 + hi - 'A') : (hi - '0'));
              uint8_t lv = (uint8_t)((lo >= 'A') ? (10 + lo - 'A') : (lo - '0'));
              trs80_model4_charset_cg8[i / 12u][i % 12u] = (uint8_t)((hv << 4u) | lv);
          }
          trs80_model4_charset_init = 1u;
      }

      if (video_shadow_init == 0u) {
          for (uint32_t i = 0u; i < 0x0780u; ++i) {
              video_shadow[i] = 0x20u;
          }
          video_shadow_init = 1u;
      }

      if (cells > 0x0780u) cells = 0x0780u;
      {
          uint64_t ga_vc_args[1] = { 0u };
          video_ctrl = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "get_video_ctrl", ga_vc_args, 0);
          uint64_t io_mode_args[1] = { 0u };
          expanded = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4io", "get_screen_expanded", io_mode_args, 0);
          alternate = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4io", "get_screen_alternate", io_mode_args, 0);
          global_inverse = (uint8_t)(((video_ctrl & 0x08u) != 0u) ? 1u : 0u);
      }
      if (video_enabled != 0u) {
          for (uint32_t i = 0u; i < cells; ++i) {
              uint64_t cell_args[1] = { (uint64_t)i };
              video_shadow[i] = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "get_video_cell", cell_args, 1);
          }
          for (uint32_t i = cells; i < 0x0780u; ++i) {
              video_shadow[i] = 0x20u;
          }
      }
      if (trace_enabled != 0 && ((frame_counter % 30u) == 0u || frame_counter < 8u)) {
          uint32_t sample_cols = (cols < 16u) ? cols : 16u;
          fprintf(trace_fp,
                  "video frame=%u cycle=%llu map=%u cols=%u rows=%u page=%u expanded=%u alternate=%u inverse=%u r0=",
                  (unsigned)frame_counter,
                  (unsigned long long)cpu->total_cycles,
                  (unsigned)map,
                  (unsigned)cols,
                  (unsigned)rows,
                  (unsigned)((video_ctrl & 0x80u) != 0u ? 1u : 0u),
                  (unsigned)expanded,
                  (unsigned)alternate,
                  (unsigned)global_inverse);
          for (uint32_t i = 0u; i < sample_cols; ++i) fprintf(trace_fp, "%02X", (unsigned)video_shadow[i]);
          fprintf(trace_fp, " r8=");
          if (rows > 8u) {
              uint32_t base = 8u * cols;
              for (uint32_t i = 0u; i < sample_cols; ++i) fprintf(trace_fp, "%02X", (unsigned)video_shadow[base + i]);
          }
          fprintf(trace_fp, "\n");
          fflush(trace_fp);
      }

      uint32_t cursor_idx = 0xFFFFFFFFu;
      {
          uint32_t inv_count = 0u;
          uint32_t last_inv = 0xFFFFFFFFu;
          for (uint32_t i = 0u; i < cells; ++i) {
              if ((video_shadow[i] & 0x80u) != 0u) {
                  inv_count += 1u;
                  last_inv = i;
                  if (inv_count > 1u) break;
              }
          }
          if (inv_count == 1u) {
              cursor_idx = last_inv;
          }
      }
      uint8_t cursor_blink_on = (uint8_t)(((frame_counter / 30u) & 1u) == 0u);

      for (uint32_t py = 0u; py < fb_h; ++py) {
          for (uint32_t px = 0u; px < fb_w; ++px) {
              framebuf[py * fb_w + px] = bg;
          }
      }

      for (uint32_t y = 0u; y < rows; ++y) {
          for (uint32_t x = 0u; x < cols; ++x) {
              uint32_t idx = y * cols + x;
              uint8_t raw = (idx < cells) ? video_shadow[idx] : 0x20u;
              uint8_t char_index = raw;
              uint8_t ch_raw;
              uint8_t inv = 0u;
              uint8_t is_cursor = (idx == cursor_idx) ? 1u : 0u;
              uint32_t glyph_index;
              uint32_t cell_x = left_margin + x * cell_w;
              uint32_t cell_y = top_margin + y * cell_h;
              uint8_t draw_twice = 0u;

              if (expanded != 0u) {
                  if ((x & 1u) != 0u) {
                      continue;
                  }
                  draw_twice = 1u;
              }

              if (char_index >= 0x80u && char_index <= 0xBFu && global_inverse == 0u) {
                  uint8_t box = (uint8_t)(char_index - 0x80u);
                  uint32_t step_x = (draw_twice != 0u) ? 2u : 1u;
                  uint32_t col0_w = 4u * step_x;
                  uint32_t col1_w = 4u * step_x;
                  uint32_t row0_h = cell_h / 3u;
                  uint32_t row1_h = (cell_h + 1u) / 3u;
                  uint32_t row2_h = cell_h - row0_h - row1_h;
                  pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)cell_x, (int)cell_y, (int)(cell_w * step_x), (int)cell_h, bg);
                  if ((box & 0x01u) != 0u) pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)cell_x, (int)cell_y, (int)col0_w, (int)row0_h, fg);
                  if ((box & 0x02u) != 0u) pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)(cell_x + col0_w), (int)cell_y, (int)col1_w, (int)row0_h, fg);
                  if ((box & 0x04u) != 0u) pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)cell_x, (int)(cell_y + row0_h), (int)col0_w, (int)row1_h, fg);
                  if ((box & 0x08u) != 0u) pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)(cell_x + col0_w), (int)(cell_y + row0_h), (int)col1_w, (int)row1_h, fg);
                  if ((box & 0x10u) != 0u) pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)cell_x, (int)(cell_y + row0_h + row1_h), (int)col0_w, (int)row2_h, fg);
                  if ((box & 0x20u) != 0u) pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)(cell_x + col0_w), (int)(cell_y + row0_h + row1_h), (int)col1_w, (int)row2_h, fg);
                  if (is_cursor != 0u && cursor_blink_on != 0u) {
                      pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)cell_x, (int)(cell_y + cell_h - 1u), (int)(cell_w * step_x), 1, fg);
                  }
                  continue;
              }

              if (char_index >= 0xC0u && global_inverse == 0u && alternate == 0u) {
                  char_index = (uint8_t)(char_index - 0x40u);
              }

              if (global_inverse != 0u && (char_index & 0x80u) != 0u) {
                  inv = 1u;
                  ch_raw = (uint8_t)(char_index & 0x7Fu);
              } else {
                  ch_raw = char_index;
              }
              if (is_cursor != 0u) {
                  inv = 0u;
              }
              glyph_index = (is_cursor != 0u) ? 0x20u : ch_raw;
              uint32_t ch_fg = (inv != 0u) ? bg : fg;
              uint32_t ch_bg = (inv != 0u) ? fg : bg;
              {
                  uint32_t step_x = (draw_twice != 0u) ? 2u : 1u;
                  for (uint32_t dy = 0u; dy < cell_h; ++dy) {
                      uint32_t src_y = (dy * 12u) / cell_h;
                      uint8_t bits = trs80_model4_charset_cg8[glyph_index & 0xFFu][src_y];
                      for (uint32_t dx = 0u; dx < 8u; ++dx) {
                          uint32_t color = ((bits & (uint8_t)(1u << dx)) != 0u) ? ch_fg : ch_bg;
                          uint32_t px = cell_x + dx * step_x;
                          uint32_t py = cell_y + dy;
                          if (px < fb_w && py < fb_h) framebuf[py * fb_w + px] = color;
                          if (step_x == 2u && (px + 1u) < fb_w && py < fb_h) framebuf[py * fb_w + px + 1u] = color;
                      }
                  }
              }
              if (is_cursor != 0u && cursor_blink_on != 0u) {
                  pasm_overlay_fill_rect(framebuf, fb_w, fb_h, (int)cell_x, (int)(cell_y + cell_h - 1u), draw_twice != 0u ? 16 : 8, 1, fg);
              }
          }
      }

      {
          uint64_t frame_args[4] = {
              (uint64_t)frame_counter,
              (uint64_t)(uintptr_t)framebuf,
              (uint64_t)fb_w,
              (uint64_t)fb_h
          };
          cpu_component_emit_signal(cpu, "trs80_m4video", "frame_ready", frame_args, 4);
      }
      return (uint64_t)1u;
  handler_bodies: {}

coding:
  headers: ["pasm_overlay.h"]
  include_paths: ["../hosts/include"]
  linked_libraries: []
  library_paths: []
