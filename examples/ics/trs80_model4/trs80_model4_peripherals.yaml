metadata:
  id: trs80_m4io
  type: io_controller
  model: trs80_model4_peripherals
  version: "1.3"

state:
  - name: frame_counter
    type: uint32_t
    initial: "0"
  - name: last_cycle
    type: uint64_t
    initial: "0"
  - name: tstate_accum
    type: uint64_t
    initial: "0"
  - name: audio_level
    type: uint8_t
    initial: "0"
  - name: mode_image
    type: uint8_t
    initial: "0x08"

interfaces:
  callbacks:
    - name: get_mode_image
      args: []
      returns: u8
    - name: get_screen_expanded
      args: []
      returns: u8
    - name: get_screen_alternate
      args: []
      returns: u8
  handlers: []
  signals:
    - name: audio_level
      args: [u8, u64]

maps:
  memory:
    ranges:
      - name: full_mem_map
        start: 0x0000
        size: 0x10000
        access: [read, write]
  ports:
    read:
      - name: fdc_status
        mask: 0x00FF
        value: 0x00F0
      - name: fdc_track
        mask: 0x00FF
        value: 0x00F1
      - name: fdc_sector
        mask: 0x00FF
        value: 0x00F2
      - name: fdc_data
        mask: 0x00FF
        value: 0x00F3
      - name: fdc_nmi_status
        mask: 0x00FF
        value: 0x00E4
      - name: sio_data
        mask: 0x00FC
        value: 0x00E8
      - name: cassette_readback
        mask: 0x00FC
        value: 0x00FC
    write:
      - name: fdc_command
        mask: 0x00FF
        value: 0x00F0
      - name: fdc_track
        mask: 0x00FF
        value: 0x00F1
      - name: fdc_sector
        mask: 0x00FF
        value: 0x00F2
      - name: fdc_data
        mask: 0x00FF
        value: 0x00F3
      - name: fdc_drive_select
        mask: 0x00FC
        value: 0x00F4
      - name: fdc_nmi_control
        mask: 0x00FF
        value: 0x00E4
      - name: sio_write
        mask: 0x00FC
        value: 0x00E8
      - name: options_register
        mask: 0x00FC
        value: 0x0084
      - name: sound_option
        mask: 0x00FF
        value: 0x0090
      - name: cassette_write
        mask: 0x00FC
        value: 0x00FC

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      comp->frame_counter = 0u;
      comp->last_cycle = cpu->total_cycles;
      comp->tstate_accum = 0u;
      comp->audio_level = 0u;
      comp->mode_image = 0x08u;
    destroy: |
      (void)cpu;
    mem_read_pre: |
      {
          uint64_t ga_args[1] = { (uint64_t)addr };
          return (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "map_mem_read", ga_args, 1);
      }
    mem_write_pre: |
      {
          uint64_t ga_args[2] = { (uint64_t)addr, (uint64_t)value };
          (void)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "map_mem_write", ga_args, 2);
      }
      return;
    port_read_post: |
      uint8_t p = (uint8_t)(((uint16_t)port) & 0xFFu);
      value = 0xFFu;
      if (p == 0xE4u || (p >= 0xF0u && p <= 0xF3u)) {
          uint64_t fdc_args[1] = { (uint64_t)p };
          value = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4fdc", "fdc_port_read", fdc_args, 1);
      } else if ((p & 0xFCu) == 0xE8u) {
          uint64_t sio_args[1] = { (uint64_t)p };
          value = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4sio", "sio_port_read", sio_args, 1);
      } else if ((p & 0xFCu) == 0xFCu) {
          uint64_t cass_args[1] = { (uint64_t)p };
          value = (uint8_t)cpu_component_dispatch_callback(cpu, "trs80_m4cass", "cass_port_read", cass_args, 1);
      } else if ((p & 0xFCu) == 0xECu) {
          value = comp->mode_image;
      }
    port_write_pre: |
      static int trace_enabled = -1;
      static FILE *trace_fp = NULL;
      if (trace_enabled < 0) {
          const char *env = getenv("PASM_TRS80_M4_IO_TRACE");
          trace_enabled = (env != NULL && env[0] != '\0' && env[0] != '0') ? 1 : 0;
          if (trace_enabled != 0) {
              const char *trace_path = getenv("PASM_TRS80_M4_IO_TRACE_FILE");
              if (trace_path == NULL || trace_path[0] == '\0') trace_path = "/tmp/trs80_model4_io_trace.log";
              trace_fp = fopen(trace_path, "a");
              if (trace_fp == NULL) trace_fp = stderr;
          }
      }
      uint8_t p = (uint8_t)(((uint16_t)port) & 0xFFu);
      if (p == 0xE4u || (p >= 0xF0u && p <= 0xF3u) || ((p & 0xFCu) == 0xF4u)) {
          uint64_t fdc_args[2] = { (uint64_t)p, (uint64_t)value };
          (void)cpu_component_dispatch_callback(cpu, "trs80_m4fdc", "fdc_port_write", fdc_args, 2);
      } else if ((p & 0xFCu) == 0xE8u) {
          uint64_t sio_args[2] = { (uint64_t)p, (uint64_t)value };
          (void)cpu_component_dispatch_callback(cpu, "trs80_m4sio", "sio_port_write", sio_args, 2);
      } else if ((p & 0xFCu) == 0x84u) {
          uint64_t ga_args[1] = { (uint64_t)value };
          (void)cpu_component_dispatch_callback(cpu, "trs80_m4ga", "port84_write", ga_args, 1);
      } else if ((p & 0xFCu) == 0x90u) {
          uint8_t level = ((value & 0x01u) != 0u) ? 255u : 0u;
          if (level != comp->audio_level) {
              comp->audio_level = level;
              {
                  uint64_t sig_args[2] = { (uint64_t)level, cpu->total_cycles };
                  cpu_component_emit_signal(cpu, "trs80_m4io", "audio_level", sig_args, 2);
              }
          }
      } else if ((p & 0xFCu) == 0xECu) {
          comp->mode_image = value;
          if (trace_enabled != 0) {
              fprintf(trace_fp,
                      "io_portEC cycle=%llu value=%02X expanded=%u alternate=%u\n",
                      (unsigned long long)cpu->total_cycles,
                      (unsigned)value,
                      (unsigned)(((comp->mode_image & 0x04u) != 0u) ? 1u : 0u),
                      (unsigned)(((comp->mode_image & 0x08u) == 0u) ? 1u : 0u));
              fflush(trace_fp);
          }
      } else if ((p & 0xFCu) == 0xFCu) {
          uint64_t cass_args[2] = { (uint64_t)p, (uint64_t)value };
          (void)cpu_component_dispatch_callback(cpu, "trs80_m4cass", "cass_port_write", cass_args, 2);
      }
    step_post: |
      uint64_t now = cpu->total_cycles;
      uint64_t frame_tstates = (CPU_SYSTEM_CLOCK_HZ > 0u) ? (CPU_SYSTEM_CLOCK_HZ / 60u) : 66667u;
      if (frame_tstates == 0u) frame_tstates = 66667u;

      if (comp->last_cycle == 0u) {
          comp->last_cycle = now;
      }
      if (now >= comp->last_cycle) {
          comp->tstate_accum += (now - comp->last_cycle);
      }
      comp->last_cycle = now;

      {
          uint64_t fdc_tick_args[1] = { now };
          (void)cpu_component_dispatch_callback(cpu, "trs80_m4fdc", "fdc_step_tick", fdc_tick_args, 1);
      }

      if (comp->tstate_accum >= frame_tstates) {
          uint64_t frames_due = comp->tstate_accum / frame_tstates;
          if (frames_due == 0u) frames_due = 1u;
          comp->tstate_accum -= frames_due * frame_tstates;
          if (frames_due > 0xFFFFFFFFu) {
              comp->frame_counter = 0xFFFFFFFFu;
          } else {
              comp->frame_counter += (uint32_t)frames_due;
          }
          {
              uint64_t video_args[1] = { (uint64_t)comp->frame_counter };
              (void)cpu_component_dispatch_callback(cpu, "trs80_m4video", "render_frame", video_args, 1);
          }

          {
              uint64_t irq_args[1] = { 1u };
              (void)cpu_component_dispatch_callback(cpu, "trs80_m4irq", "pulse_irq", irq_args, 1);
          }
      }
  callback_handlers:
    get_mode_image: |
      (void)argc;
      (void)args;
      return comp->mode_image;
    get_screen_expanded: |
      (void)argc;
      (void)args;
      return (uint8_t)(((comp->mode_image & 0x04u) != 0u) ? 1u : 0u);
    get_screen_alternate: |
      (void)argc;
      (void)args;
      return (uint8_t)(((comp->mode_image & 0x08u) == 0u) ? 1u : 0u);
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
