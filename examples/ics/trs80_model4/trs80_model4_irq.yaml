metadata:
  id: trs80_m4irq
  type: interrupt_controller
  model: trs80_model4_irq
  version: "1.0"

state: []

interfaces:
  callbacks:
    - name: pulse_irq
      args: [u8]
      returns: u8
  handlers: []
  signals:
    - name: irq_edge
      args: [u8]

maps:
  memory:
    ranges: []

behavior:
  snippets:
    init: |
      (void)cpu;
    reset: |
      (void)cpu;
    destroy: |
      (void)cpu;
  callback_handlers:
    pulse_irq: |
      uint8_t irq_kind = (argc > 0u) ? (uint8_t)(args[0] & 0xFFu) : 1u;
      if (irq_kind == 2u) {
          cpu->halted = false;
          cpu->interrupt_pending = false;
          cpu->interrupts_enabled = false;
          cpu->sp--;
          z80_write_byte(cpu, cpu->sp, (uint8_t)((cpu->pc >> 8) & 0xFFu));
          cpu->sp--;
          z80_write_byte(cpu, cpu->sp, (uint8_t)(cpu->pc & 0xFFu));
          cpu->pc = 0x0066u;
          cpu->pc_modified = true;
          cpu->total_cycles += 11u;
      } else {
          z80_interrupt(cpu, 0xFFu);
      }
      {
          uint64_t irq_up[1] = { 1u };
          uint64_t irq_down[1] = { 0u };
          cpu_component_emit_signal(cpu, "trs80_m4irq", "irq_edge", irq_up, 1);
          cpu_component_emit_signal(cpu, "trs80_m4irq", "irq_edge", irq_down, 1);
      }
      return (uint64_t)1u;
  handler_bodies: {}

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
