metadata:
  name: Minimal8
  version: '1.0'
  bits: 8
  address_bits: 16
  endian: little
  undefined_opcode_policy: trap
  codegen:
    architecture_id: unknown
    numeric_style: c_hex
    flags_dump_style: raw
    decode_quirks:
      mc6809_indexed_postbyte_length: false
    display_kinds_enabled: []
registers:
- name: R0
  display_name: R0
  type: general
  bits: 8
- name: R1
  display_name: R1
  type: general
  bits: 8
- name: R2
  display_name: R2
  type: general
  bits: 8
- name: R3
  display_name: R3
  type: general
  bits: 8
- name: A
  display_name: A
  type: general
  bits: 8
- name: PC
  display_name: PC
  type: program_counter
  bits: 16
- name: SP
  display_name: SP
  type: stack_pointer
  bits: 16
flags:
- name: Z
  bit: 0
instructions:
- name: NOP
  category: control
  encoding:
    opcode: 0
    mask: 255
    length: 1
  cycles: 1
  behavior: '(void)cpu;

    '
- name: INC
  category: arithmetic
  encoding:
    opcode: 16
    mask: 240
    length: 1
    fields:
    - name: r
      position:
      - 3
      - 0
  cycles: 1
  behavior: 'cpu->registers[inst->r]++;

    cpu->flags.Z = (cpu->registers[inst->r] == 0);

    '
- name: HALT
  category: control
  encoding:
    opcode: 255
    mask: 255
    length: 1
  cycles: 1
  behavior: 'cpu->halted = 1;

    '

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
