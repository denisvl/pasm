metadata:
  name: Minimal8
  version: '1.0'
  bits: 8
  address_bits: 16
  endian: little
  undefined_opcode_policy: trap
registers:
- name: R0
  type: general
  bits: 8
- name: R1
  type: general
  bits: 8
- name: R2
  type: general
  bits: 8
- name: R3
  type: general
  bits: 8
- name: A
  type: general
  bits: 8
- name: PC
  type: program_counter
  bits: 16
- name: SP
  type: stack_pointer
  bits: 16
flags:
- name: Z
  bit: 0
instructions:
- name: NOP
  category: control
  encoding:
    opcode: 0
    mask: 255
    length: 1
  cycles: 1
  behavior: '(void)cpu;

    '
- name: INC
  category: arithmetic
  encoding:
    opcode: 16
    mask: 240
    length: 1
    fields:
    - name: r
      position:
      - 3
      - 0
  cycles: 1
  behavior: 'cpu->registers[inst->r]++;

    cpu->flags.Z = (cpu->registers[inst->r] == 0);

    '
- name: HALT
  category: control
  encoding:
    opcode: 255
    mask: 255
    length: 1
  cycles: 1
  behavior: 'cpu->halted = 1;

    '
