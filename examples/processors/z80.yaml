- name: ROT_SHIFT_IXD_R
  display: ROT/SHIFT (IX+d), r
  display_template: "{op:table} (IX+{disp:signed8}), {r:table}"
  display_operands:
    op:
      kind: table
      table: [RLC, RRC, RL, RR, SLA, SRA, SLL, SRL]
    r:
      kind: table
      table: [B, C, D, E, H, L, "(IX+d)", A]
  category: rotate
  encoding:
    prefix: 221
    opcode: 203
    subop: 0
    subop_mask: 192
    length: 4
