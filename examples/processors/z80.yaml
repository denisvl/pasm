  cycles: 20
  behavior: |
    uint8_t lo = z80_read_byte(cpu, inst->addr);
    uint8_t hi = z80_read_byte(cpu, (uint16_t)(inst->addr + 1));
    cpu->ix = (uint16_t)(lo | ((uint16_t)hi << 8));
