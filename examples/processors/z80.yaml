    \ {\n  uint16_t de = (uint16_t)((cpu->registers[REG_D] << 8) | cpu->registers[REG_E]);\n\
    \  de++;\n  cpu->registers[REG_D] = (uint8_t)(de >> 8);\n  cpu->registers[REG_E]\
    \ = (uint8_t)(de & 0xFF);\n} else if (ss == 2) {\n  uint16_t hl = (uint16_t)((cpu->registers[REG_H]\
    \ << 8) | cpu->registers[REG_L]);\n  hl++;\n  cpu->registers[REG_H] = (uint8_t)(hl\
    \ >> 8);\n  cpu->registers[REG_L] = (uint8_t)(hl & 0xFF);\n} else {\n  cpu->sp++;\n\
    }\n"
