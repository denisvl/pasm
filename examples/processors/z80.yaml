    cpu->flags.C = (carry_out != 0);
    cpu->flags.Z = (value == 0);
    cpu->flags.S = ((value & 0x80) != 0);
    cpu->flags.H = (false);
    cpu->flags.P = (cpu_parity(value));
    cpu->flags.N = (false);
    cpu->flags.raw = (uint8_t)((cpu->flags.raw & (uint8_t)(~0x28u)) | (value & 0x28u));
