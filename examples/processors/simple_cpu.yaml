metadata:
  name: SimpleCPU
  version: '1.0'
  bits: 8
  address_bits: 16
  endian: little
  undefined_opcode_policy: trap
  codegen:
    architecture_id: unknown
    architecture_enum_name: PASM_ARCH_UNKNOWN
    architecture_enum_value: 255
    numeric_style: c_hex
    flags_dump_style: raw
    debug_flags_expr: cpu->flags.raw
    numeric_formats:
      hex8: "0x%02X"
      hex16: "0x%04X"
    decode_quirks:
      mc6809_indexed_postbyte_length: false
    helper_features:
      condition_cases:
      - "!($Z)"
      - "$Z"
      - "!($C)"
      - "$C"
      - "!($P)"
      - "$P"
      - "!($S)"
      - "$S"
    display_kinds_enabled: []
registers:
- name: R0
  display_name: R0
  type: general
  bits: 8
- name: R1
  display_name: R1
  type: general
  bits: 8
- name: PC
  display_name: PC
  type: program_counter
  bits: 16
- name: SP
  display_name: SP
  type: stack_pointer
  bits: 16
flags:
- name: Z
  bit: 0
- name: C
  bit: 1
instructions:
- name: NOP
  category: control
  encoding:
    opcode: 0
    mask: 255
    length: 1
  cycles: 1
  behavior: '(void)cpu;

    '

coding:
  headers: []
  include_paths: []
  linked_libraries: []
  library_paths: []
